寅陸豐是雲南府十八條命案的正凶你可別讓他們跑了老頭這氣怎麼全跟我説你們是幹什麼的孫班頭放心吧他跑不了這事就這麼巧當初清水潭烈焰寨義釋三寨主火焚清水潭羅威羅聲遠的父親紫面龍君羅烈羅焰光他們哥仨讓老俠侯振遠給放了羅威羅聲遠的母親馬氏夫人是金銀亂石島大寨主三孔獨角蛟馬彪的妹妹被火燒死了羅威羅聲遠前廳不救父後堂不救母為了顧全這個把兄弟帶著喬玄齡韓寶吳志廣上船逃跑一直到東岸下船以後跑出去足有十幾裏地回頭一看清水潭這把大火烈焰騰空火光沖天阿羅威一跺腳罵道姓侯的姓童的逼死我母殺死我父此仇不共戴天焉能不報哇掩面而哭爹娘阿喬玄齡在旁邊勸無量佛賢弟呀你先別哭了看這樣老伯父絶對活不了啦老伯母已然被火焚死此仇不報怎麼能成為孝子呢你為我弟兄遭此大禍我喬玄齡要不為兄弟你死我就不叫紫面分水鱉兄弟你先別哭了韓寶吳志廣二位賢弟無量佛當初你們哥倆到我那兒結果我把飛龍觀搭上了現在咱們哥仨又到了清水潭烈焰寨咱又把清水潭烈焰寨給搭上了飛龍觀不能回去清水潭烈焰寨不能呆了你們倆人出個主意咱們上哪兒我盟弟為你們可不容易家敗人亡了你們説應該怎麼辦喬道兄到現在羅賢弟家敗人亡了你的廟也完了天地雖寬沒有我弟兄立錐之處羅威想了一下道兄韓吳二位兄長仇咱們一定要報我看這樣吧咱們不如到八卦山去暫住一時喬玄齡瞧著韓寶吳志廣韓寶吳志廣搖頭兄弟道兄阿不是跟你們哥倆都提了嗎我們是私自下山到北京城盜的國寶我們敢回去嗎我伯父李昆李太極那個人要知道我們回去了馬上就得把我們捆上交給童林仇不但報不了我們哥倆還得雲陽市口項上餐刀我們不能回去呀唉你們倆人又不能回去難道説咱們四個人就連個遮風避雨的地方都沒有嗎怎麼辦呢哥哥那沒法子咱們走到哪兒説到哪兒乾脆行無定所老道紫面分水鱉喬玄齡也為難羅威一看喬玄齡他們三個人真為了難了就説道兄韓吳二位兄長你們哥仨別發愁我有個地方去也是非去不可喲哪兒呀就是離這兒遠點屬湖南沅陵縣管在沅江以內有個金銀亂石島為首的大寨主三孔獨角蛟馬彪馬雲龍是我的親娘舅我母親的哥哥他也是鐵善寺的門人弟子跟我父親是師兄弟後來才成了郎舅之親這樣的事情出來了我不能不跟我娘舅提提我得讓他們哥兒幾個想辦法給我父母報仇雪恨呐無量佛賢弟你既有這麼個地方我們就去吧四個人把主意拿好啦連夜奔往沅陵縣一路上飢餐渴飲非只一日來到沅江雇了船來到金銀亂石島的島口船塢他們都下來了把事情跟嘍羅兵一提有的老兵還認識這是大寨主的外甥阿正趕上早晨起來大寨主升廳辦事嘍羅兵馬上進大廳報啓稟大寨主得知外頭有清水潭烈焰寨的少寨主你的外甥羅威羅聲遠到了馬彪一聽很高興阿唉呀我外甥小威來了傳我的命令趕緊讓他進來這個孩子幹什麼來了馬彪也有想法時間不大嘍羅兵來到寨門外説我家大寨主請你進去你頭前帶路嘍羅兵在前頭走羅威可跟喬玄齡商量了哥哥這九家寨主連我舅父在內鐵善寺是有門規山戒的呀山林的豪傑海島的英雄占過山落過草殺過人越過貨鐵善寺歡迎要是辦過壞事的或者是賣過薰香蒙汗藥的不夠份量的賊到這幾來可不能提喬玄齡一晃小腦袋無量佛嗷兄弟我不夠份量阿羅威搖頭不能這麼説因為我舅父他們最恨的就是發賣薰香蒙汗藥的這樣他們四個人穿過三道寨門趕奔大廳九家寨主全在喬玄齡韓寶吳志廣往這兒一站羅聲遠一瞧馬彪舅舅一跺腳哇一下就哭了舅舅阿我活不了啦你得給我一家子報仇哇就把這件事從頭到尾説了姓童的他興一家武術侯振遠助紂為虐滅咱們鐵善寺的山門不但是我們一家子就連太湖孟師伯父他們一家子也完了呀羅威接著説道他們説了一定要把鐵善寺的門人弟子刀刀斬盡刃刃誅絶見一個殺一個見兩個殺一雙要一網打盡我爹被擒恐怕不能活了我母親活活的被他們放火燒死沒辦法我找舅舅來啦你得給我報仇哇衆家寨主都是一怔馬彪馬雲龍一捋自己的鬍子氣得哇呀呀怪叫如雷小兒童林老匹夫侯振遠只要姓馬的把你們拿住就萬剮千刀我一定要給死難的師兄弟和親戚報仇雪恨方趁馬某心頭之願馬雲龍又對羅威説小威你暫且先住在山裏君子報仇十年不晚你別著急仇舅舅一定給你報舅舅不是我一個人我還約請了幾位幫忙的你看這位道爺也是好樣的叫紫面分水鱉這二位是雲南八卦山大寨主混元俠逍遙叟李昆李太極的侄子小粉蝶韓寶和鬧海金鱉吳志廣馬彪一聽心想怎麼八卦山的弟子也會跟羅聲遠喬玄齡在一塊兒韓寶吳志廣也並不隱瞞行完禮以後把自己的事情説了我們跟童林有仇有恨好我們大家是同仇敵愾來人呐把他們四個人帶到跨院給他們找一所房安排好了住處到時候吃到時候喝派人招待你們先在我這兒住下來小威你看好不好哇謝謝舅舅這樣把這四個人就安排在金銀亂石島了可巧菩提寺逃走的戲水江豬陸松坡也到這兒來了陸豐陸松坡只挨揍了一磚頭結果陸寅被海川給拿住了陸松坡想展翅彌猴陸曉村是我的兄弟無論如何我得設法救他可我一個人救不了好在這囚車是解奔雲南金銀亂石島這是個要路我得找叔叔去他父親叫陸占奎已經死了有個親叔叔就是金銀亂石島的六寨主金錢水豹陸占鼇這樣他就奔沅陵縣來了一路之上心急似箭等來到沅江金銀亂石島的江邊上他雇了船到亂石島的島口船塢下船開發了船錢然後來到頭道寨門人家兵丁過來攔住了你找誰呀阿衆位多辛苦在下家住在湖南常德府陸家堡我的名字叫陸松坡你這兒六寨主金錢水豹陸占鼇是我的親叔叔我給他請安來了順便有點家務跟他親面談談你候著這個時候正是大廳沒事弟兄們沒在一起陸占鼇在他自己的房間裏這是西跨院一所四合房精致極了十幾個人伺候著茶來伸手飯來張口兵丁進來一報告陸占鼇一怔這個孩子幹什麼來了嗯叫他進來兵丁出去把陸松坡引進來了爺倆一見面陸松坡趴地下磕完頭落座後陸占鼇就問松坡你不在家上這兒幹什麼來了其實陸占鼇有耳聞因為自己多年不回家陸松坡一個人在家裏頭胡作非為辦了很多壞事但是這也沒法子兒大不由爺唉叔叔你別提了這件事情還是你跟我提過的你不是有個哥哥在雲南府嗎叫撓頭獅子陸滾是阿怎麼啦唉呀他的兒子陸寅陸曉村回到湖南常德認祖歸宗因為他父親被李躍李光輝所害陸松坡就把這個事情由頭至尾都説了陸松坡最後説道曉村約我給父母報仇我不能不管呐一筆寫不出兩個陸字來孩兒我就跟著兄弟陸曉村去了雲南到那兒一找這李士鈞躲災避難被他跑了不瞞你説我們倆人在雲南府做了十八條命案陸古鼇聽了一攔等等兒到這兒來你可別提這個這還了得嗎本山的山規就是最避諱這種事幸虧是你跟我説了你要是當著大寨主這麼一説馬上把你綁起來亂刃分尸
