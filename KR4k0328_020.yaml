body:
  text: 第二十回清竹塘四寇劫囚車龍潭鎮於老訪雙俠上回書説到李士鈞孫亮押囚車直奔雲南而來沒想到走至冷風嘴兒聽江堤內嗆啷啷一陳鑼響一窩蜂上來不少賊人搶劫囚車李士鈞回手拉刀金眼鷹孫亮也把鑲牛皮槍帽兒摘下來了車把式是個行家把車停住掄著鞭子在裏面一蹲十六名兵丁刀出鞘槍去帽兒呼拉把囚車一圍臉沖外一站再看從江堤後邊嚕嚕嚕躥出四個人來為首者手持明亮的鋼刀惡狠狠地撲向囚車正是戲水江豬陸豐陸松坡後面的三個一個大高個兒面似生羊肝一身藍使一對二郎錛一個中等身材一身藍黃臉膛掌中擎五股烈焰托天叉另外一個肩寬背厚大高個兒一臉的大麻子十分凶惡手中一對短把牛頭鐺四個人一陳風一樣直奔囚車孫亮眼珠子都紅啦一顫槍厲聲罵道陸豐賊子你竟敢以身試法搶劫囚車説完孫亮舉槍直奔陸豐哽嗓就扎陸豐一咬牙雙手捧刀往上一挂噌地一聲孫亮就來了個趔趄陸豐趁勢一刀孫亮退頭一躲陸豐一擡腿正是孫亮的胸口嘭地一下把孫亮踹出一溜滾兒陸豐飛身過來舉刀就剁孫亮自知活不了他一閉眼正在這時李士鈞一個箭步就到啦從後面順水推舟退頭一躲用進手絶招左手的掌奔面門右手刀刃沖外對準陸豐雙腿戳來陸豐腳尖點地往起一蹦李士鈞刀走進步中挑奔陸豐的小肚子就扎陸豐一斜身刀在跨骨軸上就劃上了疼得陸豐齜牙咧嘴鮮血直流其餘三個賊人一見此情呼拉拉分為三面把李士鈞圍在當中真是一場惡戰陸豐不顧疼痛帶兵丁還往上沖嘍兵掏出鐵銼嚓嚓嚓把鎖銼開砸毀囚車又銼折了三大件搭救陸寅孫亮一看完了時間一長李士鈎也活不了雙拳不敵四手猛虎不如群狼阿他提槍往東進樹林就要上吊現在一看王爺和海川心花怒放忙道爺駕俠客爺快救救李士鈞吧我本想差事丟啦難以尋拿又白白斷送了李士鈞我居心不忍全家二十七口監牢待質可我已很難生還故里因此才到林中自盡不想遇到王爺俠客爺你快救救李士鈞吧晚一點兒就完啦他是武林中的好後代爺就發發慈悲吧説著磕頭如搗蒜王爺也怕李士鈞有閃失道海川你就快去吧事不宜遲阿海川很為難想著救李士鈞倒不算什麼不過既有賊人搶劫囚車必有賊人盤踞倘若一去王爺若有個好歹那還了得便對孫亮説孫班頭你起來若救李士鈞王爺誰管呐俠客爺李士鈞眼看喪命俠客爺有好生之德孫亮願在此陪伴王爺海川説孫班頭你連個差事都保不住還要保護王爺孫亮一聽就沒了主意正在進退兩難之際就聽樹林子外邊有人説話海川你跟王爺在這兒麼又有人喊師父孫亮也不磕頭啦他一看進樹林來了一老二小老人家佩寶劍發挽銀絲髯垂玉線精神飽滿二小粉裝玉琢正是老俠聖手昆侖鎮東俠侯振遠和司馬良夏九齡爺兒三個來到原來王爺海川走後侯老俠為的是讓他們小哥兒五個多親近幾天過了三天侯老俠跟三老提出來該走啦我們爺三個也不放心三老還挽留老俠再住兩天我弟兄多聆教益呀侯老俠擺頭三位老英雄再耽誤就追不上他們爺倆啦再説西南大道也很凶險海川一個人不成阿咱們後會有期吧鄭奎無奈拿出白銀二百兩九齡把銀子帶好吃了餞行酒席五小弟兄難離難舍直送出村口老遠灑淚分別夏九齡走在路上總想淘氣可在師大爺眼前他還不敢如果不是王爺病了兩次他們爺兒三個真追不上今天走到沅江岸清竹塘聽見林中説話是海川的聲音爺三個才進來相見老俠一看有個老頭跪在地下一個徑兒的磕頭央告海川在旁邊為難王爺坐在石頭上著急老俠給王爺請安王爺高興啦侯老俠這個人是雲南府八班總役孫亮説著一指侯老俠孫亮你磕響頭吧這是聖手昆侖鎮東俠藝壓武林的侯振遠侯老俠孫亮連連拱手叩頭求老俠宏施惻隱侯老俠無暇細問王爺説道老俠客海川正在為難李士鈞是俠義之後必須搭救事不宜遲阿侯振遠一聽當機立斷良兒九齡會同孫亮保護王爺尾隨于後海川隨我來老俠左手托劍鞘右手荷劍把按崩簧嗆啷啷龍淵寶劍離鞘猶如一道電閃海川也把包袱打開包袱皮一圍懷抱子母雞爪鴛鴦鉞虎視耽耽二人走出樹林腳下用力往西上了土山岡但見囚車被砸地下扔著鐵鐐押護兵遠遠地躲著嘍兵已沒有啦只有四個賊人各持兵刃團團圍住李士鈞確實是危險萬分侯老俠一看李士鈞的身法步眼心説這個年輕人受過真傳而且功底扎實李士鈞救了孫亮差事被劫三個賊人各持兵刃向他撲來英雄把心就橫上啦紫臉大個兒使一對二郎錛這二郎錛三尺六寸長兩頭好像冰鑹攥住當中還有擴手鵝眉枝子十分厲害他左手錛一晃右手一推叫佛前拜香照李士鈞胸前便扎士鈞刀往上翻一挂錛閃左手迎風劈柳蓋頂就剁可後邊使叉的黃臉譁楞楞一抖大叉對準李士鈞後心便扎李士鈞眼觀六路耳聽八方撤刀換式右腳扎根一旋身鼻子尖找地跟擰鏇子一樣左腳踹使錛的小肚子右手刀拔草尋蛇砍使叉的雙腿使叉的腳尖點地往起一蹦黑臉大麻子又用牛頭鐺照李士鈞的肩頭砸來李士鈞好俊的功夫右腳一踹地弓左步矮身形躲過雙鐺進步撩陰就是一刀使鐺的往後一撤步使叉使錛的雙管齊下三個賊人三個角兒圍住李士鈞等到陸豐救了陸寅之後他擺刀也加入戰團李士鈞力敵四寇由於受父親的傳授而且自己也刻苦用功四個賊人從四面八方攻來但李士鈞更有騰身步月的奇能聽風辨物四人竟沒有沾上他的身子李士鈞一開始就按著規律喘氣還招可是時間一長刀法快要亂啦步法快要散啦呼吸之間可能喪命阿正在千鈞一髮的時刻雙俠趕到了侯振遠抖丹田一聲喝喊呔賊人吞了熊心咽了豹膽竟敢搶劫囚車現有鎮八方紫面昆侖俠童林在此侯老俠這一嗓子賊人呼拉拉各自跳身出去海川一聽兄長為自己揚名立威心説我也給兄長來一嗓子海川手捧雙鉞高聲斷喝呔光天化日朗朗乾坤竟敢蔑視國法王章路劫囚車現有聖手昆侖鎮東俠侯振遠在此真是人的名兒樹的影兒賊人譁地一下順江堤逃跑雙俠各自撩長衫飛身就追眨眼之間上了江提居高臨下一看沅江水面寬闊濁浪排空西北隱現山峰江邊江葦從生再看這幾個賊無蹤無影哥倆明白這些賊人都精通水性加上沅江水深浪急江葦茂盛萬難尋覓賊人雙俠從江堤上下來一看李士鈞真是行家他叉開雙腿刀尖點地雙手捺住刀把低著頭閉著嘴喘氣呐半天的工夫李士鈞這才緩過來跪在雙俠的面前幾次蒙俠客爺相助總算逢凶化吉今日若非俠客爺虎駕降臨焉有李士鈞命在小子給二位俠客爺磕頭啦海川伸手相攔李士鈞快起來我給你介紹一下這位是我哥哥聖手昆侖鎮東俠侯振遠海川又一指李士鈞老哥哥他就是騰身步月李士鈞李士鈞搶步跪倒老俠客爺末學後進李士鈞再次拜見侯老俠伸手扶起海川這到底是怎麼回事童林才把李士鈞孫亮以及白沽的事情跟老俠説明侯振遠點頭道李壯士令尊李躍在江湖路上與老夫也曾相識不想他晚年遭此大故令人惋惜李士鈞又行禮道原來老俠客爺與先父有舊晚生失敬了這時候王爺帶二小和孫亮全到啦李士鈞過來給王爺磕頭行禮又見過司馬良夏九齡侯老俠把剛才的事情一説孫亮差點哭出來茫茫千里的大江找賊人何易大海尋針我怎回得雲南府哇孫亮想到這兒尋死的心又有哇他眼含熱淚心想只有厚顔相求這幾個賊不用説捉拿呀單憑能為我連一個都勝不了哇俠客爺念孫亮在六扇門裏當差做吏身無大過你就幫幫我吧説著以頭碰地淚流如雨李士鈞也跪下哀求海川伸手把二位攙起來安慰道此事關係數家的清白十幾條含冤的人命案我絶對管到底當然我要跟老哥哥商量一下二人又過去給侯振遠磕頭童林毫不思索慨然應允侯老俠又氣又愛氣的是你自己身奉聖旨請國寶拿二小毫無頭緒自己的事都管不過來還要管人家愛的是海川見義勇為別人的困難視為自己的困難頗合俠義的骨氣自己怎能攔阻誰想到童林這一急驚動了清竹塘內隱藏著的一位武林豪俠成名多年的老前輩他暗豎大拇指好童林夠個俠客我捧捧你因為此處不是這位老俠出世之時暫且不提順江堤往西不足五裏緊靠沅江南岸有個大鎮甸叫龍潭鎮兵丁們過來幫助把式整理好車把三大件都扔到車上孫亮帶路衆人奔了龍潭鎮一進東口兒果然買賣興隆人煙稠密路南有座大店字型大小是興隆店一個夥計二十多歲腰系藍色圍裙肩搭白湯布手巾挂好燈正在讓座南來北往的客人們天快黑啦你打尖住店吧咱們興隆老店童叟無欺新粉刷的牆四白落地租賃被褥都是裏面兒三新現拆洗的沒有蚊子蟲子蒼蠅跳蚤臭蟲紅白兩案的大師傅都是從京城裏請來的味道很好夥計們侍奉殷勤價錢更是公道客人們請吧再往下可就錯過宿頭啦這個夥計薄嘴唇很能説王爺可説就住這兒吧夥計點頭哈腰往裏讓大車從車門趕進去牲口刷飲喂遛連把式十七個人都在跨院住下了王爺一行七人由夥計帶薊南上房五大間當中三間一通聯兒東西兩個大暗間兒擺設也不俗氣裏外屋燈光全點上大家分頭放包袱然後洗臉漱口喝茶稍事休息王爺把夥計叫進來你們這兒飯食怎麼個吃法是零叫萊還是整桌的爺台兒可以叫整桌的八兩一桌有翅子沒海味十兩一桌海味全帶小費在外好吧你就給我們上一桌十兩的夥計下去了王爺重新把李士鈞的事情又跟侯老俠詳細説明鎮東俠也很讚歎時間不大酒宴擺好王爺坐在正中左邊是鎮東俠右邊是海川海川的左肩下是李士鈞侯老俠的左肩下是孫亮良兒九齡坐在最下邊九齡把酒都給斟好王爺端起酒杯讓鎮東俠道侯老俠喝一杯吧侯振遠也端起酒杯可一端酒杯侯老俠心潮洶湧暗思著海川隨貝勒爺屈尊來邀我出山相助捉二小請還國寶想我今年八十開外人老不講筋骨能為我還有多大本領前途茫茫吉凶未蔔我還能生還故里嗎捉賊無迹請寶無期這杯酒實難下咽因此長歎一口氣唉酒杯往桌上一放侯老俠的心煩勾起海川的心煩想自己在王府既能酬恩保護王爺又能盡孝敬奉父母豈能料到二小盜走國寶陷害我童林雖蒙老哥哥仗義相救但國寶無影二小何在什麼年月才能捉住二小請回國寶想到這兒亦是杯酒難下長歎一口氣唉往桌上一放酒杯孫亮端起酒杯心事湧上胸前前後三載訪盜拿賊全家二十七口飽受鐵窗之苦好容易拿住陸寅又復失去何年何月才能銷票無事呢同是長歎一聲唉把酒杯放到桌上了李士鈞端起酒杯也想起先人死得慘自己又蒙不白之冤陸寅歸案眼看要沈冤昭雪現在又丟啦歸案無期呀他又長歎一口氣唉把酒杯放在桌上王爺一賭氣也把酒杯往桌上一放叭嚇了大家一跳海川一看屋裏的空氣太憋悶他站起身來剛要往外走就聽店門口有人喊夥計我要住店呐嗓音很尖傳得很遠他心裏一動離開南上房直奔店門口海川一看這位住店的年歲太大啦足有百歲開外是個大個兒可腰已彎下來成了中等身材了厚嘴唇五官塌陷兩隻眼睛閉著兩道蠶眉壽毫長到眼下錢兒大的小辮兒垂在身後紅辮繩上拴著兩個康熙銅錢一走道叮噹亂響一部白鬍鬚苫滿小腹上邊淨是泥土身穿一件藍色綢衫上邊補著各色的補丁紅黃藍白好像舞臺上穿的富貴衣穿著一