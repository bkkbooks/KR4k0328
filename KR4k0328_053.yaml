body:
  text: 第五十三回跳寶局威鎮沙雁嶺三月三齊赴松棚會上回書説到武雲飛傷人命逃出北京城來到塞北口外住在沙雁嶺何家老店夥計何小三説出西院的寶局那是毀人的爐阿武雲飛一時高興叫何小三領著自己往西裏院而來進了月亮門兒北邊是三合房搭著大天棚進院子的北屋就是寶局何小三一挑簾櫳武雲飛跟著就進來了喝裏邊圍著裏三層外三層的人呐有坐著的站著的靠牆的蹲著的看那表情舒眉展眼的雙眉緊鎖的長籲短歎的頓足捶胸的還有擠眉弄眼齜牙咧嘴的真是千奇百怪無所不有當中長條的寶案子蒙著白布單正中一個茶盤裏放著四四方方的銅寶盒兒人群後邊還有登著大凳往裏探著看的寶案子本家有五個人一個掌匱的就是這淨街神孫利他們幾個人每天輪流倒替今兒個是孫利還有四個夥計你瞧四個夥計每人把兩隻手都放到案子上一共是四個人八隻手唯有這淨街神孫利只把右手放在案子上一共是九隻手按人家寶局的意思就是你來上這兒押寶來九死都沒有一生看起來寶局這個賭錢場實在虧心當然這個寶案子應當後面拿布搭起個篷兒來寶官兒在這裏頭做寶寶盒沖著自己胸前這面的是四方這就是麼沖著右手下垂手的就是二對門的是三末門的就是四裏頭這寶籽兒成個紅月牙兒這個牙沖哪邊就是幾這個不能錯這個幫寶的也不見得準是打開盒蓋摳這寶籽兒底下有個機關拿手指頭一動這個寶籽兒在裏邊就得跟著動這個寶官可不是做明寶他在寶案後頭高凳上一坐不怕你瞧出紅來什麼叫瞧出紅來就是他做的寶他知道是幾你要押得注小當然他不在乎比方説他要做的是四你壓五千塊錢的四他動心不動心呐他只要一動心在他渾身上下某一點上就有反映這就是漏紅有這麼一件事據説有個好寶官這些好押寶的跟了他好幾個沒有發現他漏紅在什麼地方最後發現了他的後腦勺爭嘴窩兒當中有顆痣痣上頭有根毛你要是押的是大注又押在他做的這個數上頭他這根毛就動一動就知道他動了心了正押在他做的數上那樣這寶官就得賠這叫漏紅可了不得這位寶官是大寶官口袋裏做得了把寶盒子掏出來往這兒一放不動了你隨便押大傢夥兒嘁哩哢嚓注下得都特別大你要押十兩銀子你就得擱十一兩那一兩是頭錢你壓二十兩就得多擱二兩一二三四這是四門隨便押你如果説押孤丁一個賠三一般的説都是兩門賭押大拐就是三四押小拐就是一二押紅拐就是一四押黑拐就是三二押單穿就是一三押雙穿就是二四都是兩門兒賭不見得準得輸沒準的事武爺瞧完了之後那兒可喊押押押大傢夥兒下著注武爺上來了衆位我押一注押哪幾你呐武爺對這玩藝兒根本是外行但是多少他也懂點兒一伸手掏出五十兩銀子再拿五兩做頭兒一共是五十五兩我押大拐大拐就是三四贏一二輸人家夥計一喊兔子啦因為上頭注大有五十兩銀子呢有過來揭寶的啪這麼一撕寶鐺兒一見響真那麼巧真三啦武爺可就螺啦五十兩銀子當時兌過來武雲飛一瞧頭一寶押贏了自己連本帶利往懷裏一揣他想久賭無勝家阿大傢夥兒一瞧武雲飛這個押寶的可邪興頭一寶押贏了抹頭就走不押第二寶何小三還在院裏等著他呢怎麼樣武爺默我這頭一寶就押紅了五十兩銀子給你二兩武爺回到東院自己喝茶去了到第二天這時候又來了不用何小三帶著了那兒正喊著押啦押啦開寶了武爺分人群進去衆位我押一注五十五兩銀子往這兒一擱我押大拐一揭寶又是三啦武爺又贏了跟著兌銀子拿起就走大傢夥兒一瞧這位可好呀黑臉賭馬上人家又接茬兒押了武雲飛回到自己的房中喝茶到第三天上又來了打這天起每天到這時候準押一寶正趕上都是三你説多新鮮一個多月武雲飛的錢可就贏了不少了白花花的銀子就一千多兩啦把銀子擱在自己的房中到了時候就來還照樣押大拐五十兩銀子這鐵算盤朱三可就琢磨上了晚傍晌兒一收匱本來他們這個寶局每天除刨淨剩也就是五六十兩銀子叫武雲飛這一注就給弄走五十兩去他們這四股兒分甭説還有大爺何光五股兒一個人就剩幾兩銀子了朱三對哥幾個説默我説哥兒幾個咱們得想點兒辦法這武雲飛武禿子一個多月贏了咱一千多兩銀子去進門就押了你看這事兒怎麼辦呢咱們這寶官兒怎麼到這時候一定就做三呢朱三這麼一説大傢夥兒就商量了朱三先説哎要不這麼辦咱們月亮門這裏給它安個眼這武禿一來你就咳嗽一聲咱們這屋裏頭趕快揭寶該賠的賠該摟的摟等到下一寶絶不再做三咱們改成二四一都可以如果這寶咱們做的根本不是三那咱們乾脆就等著他外頭一咳嗽他到這兒一押三這寶他不是就輸了咱們得設法把這筆錢贏回來大傢夥兒一聽鐵算盤朱三這手兒還真高那麼誰去呢這時鐵胳膊何四説這麼辦吧我在外頭當個眼線吧大家商量好了第二天琢磨著武爺快來了何老四就在月亮門這兒站上了果然吃完早飯沒什麼事兒了武爺也喝足了茶揣著銀子來了到了月亮門兒何老四就咳嗽一聲這一咳嗽屋裏頭這一寶正是三馬上就揭了注不齊就揭該賠的賠該摟的摟下一寶不做三了武爺等著下一寶做得了以後分人群進來我押大拐五十五兩銀子往這兒一擱一揭寶不是三武爺扭頭就走心説我沒押紅押黑了到了第二天武雲飛又來了剛一到月亮門何四咳嗽一聲他這麼一咳嗽武雲飛沒感覺自己挑簾兒進來這寶做的根本不是三因為人家一聽咳嗽就等著了等武爺的注押上了一揭寶不是三了武雲飛又押黑了自己轉身形出來了第三天又來了日復一日每天五十兩每天五十兩一個多月把銀子全部輸淨銀子輸淨了武雲飛恍然大悟嗷看來這個毛病是在月亮門裏頭放上眼了鐵胳膊何四一咳嗽我再進去裏頭就變了默他們這開寶局的實在是損陰喪德武爺這麼一想自己二十多歲正年輕應該教訓教訓這幫賭徒可自己沒帶著單刀就把匕首刀放在靴子裏吃完早飯喝點兒茶東屋裏頭正喊呢押押押開寶了這何四一瞧武雲飛來到他剛要咳嗽武雲飛一擡腿把匕首就抽出來了一伸左手照著何四的胸口窩上嘭就是一拳然後一把把他給攥住了一晃禿腦袋目露凶光你咳嗽你咳嗽我就捅了你這何四沒敢咳出來你給我滾到外頭去你要一出聲兒我就穿你何四蔫蔫地由月亮門裏頭出去了武雲飛晃著禿腦袋臉子一耷拉右手把刀掖在襖袖裏頭來至在北屋挑簾櫳進來道衆位等一等寶還沒揭吧大家夥兒一瞧喲喝禿武爺來了忙説這兒等著你呢哈哈沒揭呢沒揭呢掌匱的淨街神孫利這麼一瞧心説何四怎麼在外頭沒咳嗽呀這寶是幾可不知道呢再看人家武雲飛進來了瞧了瞧注都押下了武雲飛站在天門這兒説我説孫掌匱的哎武爺你玩兒來了阿你們這寶局都賭什麼的孫利就知道這裏有事忙道哎武爺金賭銀還押什麼賠什麼那好了你等一等阿武雲飛一擡左腿把這左腿就蹬在寶案子上了一撩自己的褲腳兒在大腿上最厚的這地方一伸左手啪這麼一抓肉拿匕首刀就旋下一塊肉來譁押寶的人們就知道這叫跳寶拉肉看起來武雲飛今兒個要跳寶不過人家寶局經常發生這種事情可不在乎這個血譁譁流出來順著禿武爺的腦袋滴滴嗒嗒直冒汗掂了掂這塊肉説道這手頭沒多大準兒也有四兩來肉吧啪帶著血往天門上一拽拿這把刀子唰就剁上了然後説我押三孤丁這回可不押大拐了押三孤丁開的就是三就是説你一個賠我仨武雲飛怎麼想的今天就押三了看你這寶局敢不敢做三如果這一寶不中我下一寶接茬兒拉把我武雲飛拉死為止我也押三孤丁不押大拐説真的押寶的人有點含糊了但人家淨街神孫利沒含糊嗨我開寶局要怕這個那就甭幹了這做活兒的夥計可暈了嘴唇兒都發青了咱咱咱還喊寶嗎孫利這麼一瞧哈哈哈這算什麼揭寶喊免一一來三不要二別來四阿撕寶的過來一看寶這寶正是三武雲飛自己想了反正押不上三我一刀一刀拉拉下來我就押三沒想到這頭一寶進門闖三就闖上了武雲飛大笑哈哈哈哎呀想不到紅啦叫你們掌匱的來我拉你們掌匱的三條肉找戥子去看看我這塊肉多重差一錢一釐都不行大傢夥兒面面相覷都看著淨街神孫利孫利心想叫做活的該賠的賠該摟的樓賠的摟的全完了就剩武爺這個三孫利正要派人把掌匱的找來鐵胳膊何四早到匱房把坐地虎王強跟鐵算盤朱三都找來了他們進門一看瞧武雲飛正攥著攮子腿上血直流知道他拉肉跳寶了王強強裝著笑臉地説道哈哈哈衆位沒什麼武爺好兄弟你知道這寶局是我們的武雲飛一翻眼睛上下看了看王強你不是坐地虎王強嗎不錯默默咱們認識熟人好阿你看見沒有派人把戥子拿來稱稱我大腿上這肉有多少你們孫利説了金賭銀還我不要他的肉他的肉不值錢要你坐地虎王強的肉照這樣你們大腿上給我拉下三條兒來差一錢都不行兄弟你這是怎麼了跟哥哥我怎麼鬧起小脾氣來了不要緊有什麼事你先跟我到外頭來到哪兒也是一樣不給錢不成我就住在這兒了攮子也在這兒放著兄弟你別這樣來呀趕緊拿上好的刀傷藥去時間不大夥計哆哩哆嗦拿這麼一個小笸籮裏頭滿滿當當的全是細白面兒的藥王強説兄弟你自己先上上藥武雲飛伸手這麼一摸哎喲武雲飛心説好損阿鹼面兒武雲飛伸手接過這鹼面兒的笸籮來笑呵呵地説道哈哈哈這藥可是上好的刀創藥阿伸手就抓起一把來這把鹼面照著自己的傷口上就這麼一捺一搓嚓嚓兩下一把鹼面兒全搓在傷口上了殺得這傷口往外冒黃油兒默喲萬把鋼刀扎於肺腑這個疼徑兒沒法説唰唰地順禿腦門往下流汗嘴唇兒發青直哆嗦但是武爺不含糊哈哈哈好藥好藥跟著伸手又是一把嚓嚓又是一搓把笸籮往傷口一扣拿這笸籮底雙手一壓把那些押寶的看熱鬧的嚇得目瞪口呆武雲飛哈哈大笑坐地虎王強一瞧得了一拍武雲飛的肩膀頭道口外算有你這麼一號了來吧點到就算有劃道兒當河走咱們先上你那屋裏去吧不行哪兒去王強你看武大太爺我含糊沒有武爺有你這一號了好樣的沒含糊那得了賠我肉來人呐趕緊準備淨水甭説上鹼面兒疼就用這涼水一洗這鹼面兒都夠嗆武爺這汗譁譁地流著身上都透了但是他沒哎喲出一聲來這就是好樣的把鹼面全部洗淨拿過上好的金創藥來給武雲飛敷上止疼拿布條給他捆上包好了讓武爺把大腿褲子撩下來然後把腿放下這時王強又問了得了你説吧我們哥兒四個都在這兒你瞧打算怎麼辦吧王強我姓武的沒含糊沒含糊哈好了這不是你説到這兒嗎應我姓武的三條少一條不成那你説吧好吧第一條你得記住了我武雲飛由關南來到塞北沙雁嶺舉目無親誰都不認識沒有別的寶局姓武的幹兩天大傢夥兒一聽得要把這四位給趕跑王強説武爺你你往下説哈哈哈如果你們弟兄四個人捨不得行阿咱們一條肉賠三條把你王強的大腿肉拉下三條兒來對上我的分量姓武的塵土不沾你看這好不好哇如果這兩條你們都不能應那對不起憑本領姓武的把你們這幫小子趕出沙雁嶺鐵胳膊何四臉色兒都變了姓武的你有什麼能耐剛才我不理你就是了你這條件太苛刻何四爺我要你的命他把刀都拿出來了攥