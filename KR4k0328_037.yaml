body:
  text: 第三十七回司徒朗逃往大西洋田子步窺視玲瓏島上回書説到八卦山試五絶藝海川試平行十三丈五望雲亭上拿二小不想是假人他眼睛裏都要噴出火來了北俠走過來道兄弟別生氣這裏頭另有原因你千萬千萬別著急咱們大家先回中央戊己土大廳有什麼話再説吧童林看著哥哥秋田不能再説別的了連于爺和侯振遠都勸兄弟阿消消火事情有個完咱們到底聽聽是怎麼回事大傢夥兒一塊走了兩個魚皮人也拿走了一直來到大廳二爺胡元霸先派人準備臉水大家擦臉漱口正喝著這時李昆也給救過來了李太極往那兒一坐兩眼發直海川問北俠秋田哥哥我問問你你説是什麼原因阿北俠秋田就把自己一來直到現在包括四五七莊主另設計謀之事全説了然後接著又辨道兄弟們于老哥哥和王老俠比咱們大傢夥兒的歲數都大經驗也多振遠阿你説你辦的這事對嗎老俠侯振遠臉紅了哥哥真沒想到太極公寬仁大義我算拿小人之心度君子之腹了侯振遠得承認真的我拿人家李昆當個英雄就不應該去杭州而應直接奔這來杭州金龍鏢局黃燦潘龍的事情要緊還是海川的國寶事情要緊阿看來本末倒置了海川聽完了點頭唉要不怎麼説李太極公是好人呢便沖著李昆一抱拳太極公你的苦衷我知道我們就不用再提了這裏頭我跟我哥哥侯振遠有很多的不是之處但是請問你一下鐵臂羅漢法禪這些人帶著國寶二小到什麼地方去了就這一句話李昆身上仿佛卸下五千斤份量來他説過去的就讓它過去了我們還是想法找法禪拿二小請國寶才是老俠侯振遠在李昆的面前一抱拳道太極公看來有很多的事情我們做得不到家這叫智者千慮必有一失阿我總認為帶著海川來也是往返徒勞沒想到太極公你是如此的高明好吧咱們事情就算完了現在我們就是打聽打聽這兩個人落在哪了李昆説道八弟這不是衆位俠客爺説了嗎你到船塢打聽一下他們調的什麼船到什麼地方去了田八爺走後不一會兒就回來了臉色不對皺著眉好像很為難田八爺對李昆低語道哥哥他們到大爺那去了阿李太極臉色一白這可壞了大家夥兒都不明白李昆李太極才把事情細説清楚原來在八封山的東北方向順著南盤江下遊走四十裏水路在江中心有個島叫玲瓏島玲瓏島的大寨主是李昆的大師哥他復姓司徒單字名朗闖蕩江湖有個美稱九尾宗彜世界妙手司徒朗跟李昆是一個村裏的人都是昆明縣北四十裏地這個村子叫李各莊李昆是李各莊首戶大財主父母雙亡家資萬貫使奴喚婢有很多的人但是一輩子無所好除去讀書以外就是喜歡練武可是得不到好老師村西口路北有一個酒館兩間門臉臨街進了這酒館往後有個避風門過去之後是一個小院三間北房東西廂房各兩間院裏頭很乾淨放著一點農具看來是種地兼做小買賣的掌匱的復姓司徒單字名朗這個人爹娘都沒有了他的長相十分凶惡個不高猴形臉窄腦門臉的正中還有一塊白錢癬本村的人對他沒好感而且這人脾氣很暴這天來了不少喝酒的都坐在那兒喝著酒説著間話司徒朗伺候著這個時候打門口進來一位老仙長司徒朗一看這位仙長真是風采可愛仙風道骨年紀也就在四十多歲細條的身材面似三秋古月三綹墨髯修眉朗目鼻直口正一對元寶耳身上穿著一件古銅色道袍佩寶劍高挽發纂金簪別頂司徒朗一眼看見這老道滿臉春風過來了哈哈哈老仙長喝點酒嗎不錯山人想喝點酒阿那邊請司徒朗讓這老道坐在一張桌上給他拿過兩盤菜來又燙了兩壺酒讓老仙長喝上了等喝完了以後司徒朗過來問你還喝嗎無量佛謝謝我不喝了嗷司徒朗把傢夥都拿走然後過來説道阿錢不多兩吊四百錢老道爺一掏錢哎呀無量佛貧道我這一次離開廟出來急了點身上忘了帶錢了你能不能給我記一帳過兩天我從你這路過再加倍奉還道爺沒關係你一個出家人又喝不了多少我這小酒館再賺不了錢賺出你這份來還不算什麼道爺你請吧給不給的沒事嗷謝謝檀越老仙長走了沒想到第二天老仙長又來了還照樣要了兩壺酒司徒朗還照樣給準備好菜然後司徒朗忙別的去了吃完了以後司徒朗歸置傢夥道爺還是兩吊四百錢嗷不多我可真對不起你我記得我拿著錢了沒想到一粗心我又忘在廟裏了沒關係哈哈哈你走吧我給你記上帳什麼時候你想來你就來默第三天老仙長又來了喝完了酒以後司徒朗收拾完傢夥一要錢老仙長還沒有説不瞞你説貧道今天買了幾斤豆腐我把這倆錢全都花了過幾天我化著緣再給你吧司徒朗有些不樂意但是臉上沒露出來道爺行阿你請吧沒關係明天有工夫你還來是是是我打算在這坐一會兒行阿司徒朗一拉避風門往後頭去了在後頭幹著活瞧這避風門一動老道長奔後院來了司徒朗心説這道爺幹什麼喝了三天酒不給我錢讓他走他不走他怎麼還遛到我後院裏頭老仙長進來以後笑著問無量佛檀越你貴姓阿你要問我復姓司徒單字名朗哎喲司徒今年多大歲數了阿十九了嗷十九歲好歲數我看你腰板腰腿都不錯阿嗨不瞞你説我從小就好練可是沒有名師這二年于家計沒法子父母沒有了我得湊和著謀生吃飯開了這麼一個小酒館掙個錢所以我把功夫就擱下了嗷你還很好練武阿我跟你商量商量貧道欠你的酒錢我是還不了啦我會兩下武藝教給你成不成呢哎喲道爺那我求之不得呀我可不知道你會什麼樣的武藝你瞧這個老仙長並食中二指旁邊有一塊木頭照著木頭上一戳噗把這手指頭杵進去一寸來深跟著拔出來了手指頭什麼毛病沒有司徒朗的箭翎耳一晃悠這這了不得了道爺你老人家是世外的高人呐你既然看得起我我就是你的弟子了老師請上受弟子一拜司徒朗趴在地上給道爺磕頭道爺説徒兒起來吧咱們就是師徒了我教你能耐你一天管我三頓酒飯吃不論好壞吃飽了就行我瞧你這屋裏頭還寬綽你把屋裏收拾收拾我就在你這後院住下了我收你但是有一樣跟任何人不許提你只要是一提咱們可是説清楚了我立刻就不教你了師父你放心吧你瞧北屋裏就很寬綽司徒朗把仙長領到北屋裏又把東屋收拾出來作為功房從這天起司徒朗就跟老仙長練上功了光陰荏苒轉眼就是三年經人家這位老仙長一指點司徒朗的能為大長但是任何人都不知道司徒朗守口如瓶吃完早飯以後老仙長要打一會兒坐司徒朗剛到外頭這個時候推門進來一人哎喲司徒掌匱的阿管家管家司徒朗知道這是東村口路北李公子他家裏頭派來的家人便問貴管家什麼事呀我們公子爺家裏來了幾個朋友打算喝點酒你給送五十斤酒去吧好我這就去打了五十斤酒滿滿一罈子封好了司徒朗擱在肩膀上打酒館出來穿十字街往東來到李昆公子爺的家裏家人一瞧哎喲喝掌匱的你給送來了司徒朗把酒交到門房見院裏站著垂手待立的家人有二十幾個挺精神李昆也把長大的衣服脫了辮子盤在脖子上正在打拳司徒朗一看不走了你想司徒朗跟那位道爺練了三年不管人家道爺教的什麼能耐也比李昆他們這玩藝兒練得強得多呀李昆練完了以後一瞧喲這不是酒館司徒掌匱的嗎李莊主哈哈哈你這功夫可練得不錯呀哎喲誇獎誇獎怎麼著掌匱的我練的這玩藝兒你也喜歡嗎司徒朗面有得色這個多少懂得一點兒李昆聽了吃驚那麼你看我這功夫怎麼樣司徒朗一撇嘴你還沒功夫呢哈哈哈你這功夫是費飯的功夫談得到功夫嗎司徒朗這口氣太大了李昆還算有涵養沒説什麼旁邊這幾位不樂意了李昆説掌匱的看來你是內行阿司徒朗一陳狂笑這才是他的真面目真正的性格司徒朗説不敢説內行比你們這幾位強一點兒這些人不服氣那麼你打趟拳我們看看好吧司徒朗也不客氣他把衣服掖好邁步過來往下一矮身刷一伸手哎喲李昆可就愣了人家這功夫可跟李昆練的那玩藝兒不一樣了肩架步伐都很好司徒朗叭叭叭練完了之後往那兒一站氣不湧出面不更色哈哈哈李莊主你看我這功夫怎麼樣阿李昆躬身施禮哎呀司徒掌匱的我跟你是一個村的老鄉親你這功夫可了不得你打的這趟拳我瞧著眼花繚亂太好了勝我萬萬倍那幾位也服了喲真是的你這功夫可真不錯你跟誰學的司徒朗搖搖頭這個別打聽哈哈哈回見回見他作了個揖就要走李昆一想自己有志練武這機會難得李昆就不讓走了司徒掌匱的你可不能走無論如何你也得告訴我你的老師是哪位我一定求你轉達我要拜他為師我跟他也學點功夫司徒朗知道師父有言在先不敢答應便説你這兒人挺多的我不能説更不敢答應你回見回見他又要走李昆攔住別價別價走你們都走李昆把這幾位朋友都轟了然後把司徒朗請到客廳泡上茶小心翼翼地伺候他很沈著地説掌匱的我謝謝你我李昆一生好武苦於不得名師我看你這功夫確實是名師所傳你無論如何也得教給我你看怎麼樣了司徒朗決意不説因為是老師有話任何人不準告訴但是這李昆的盛情難卻呀但説你要問我只能告訴你教給我的這位老人家是位出家的仙長到現在姓什麼叫什麼我還不知道在我家住著呢跟我説不準讓別人知道不讓我提只要一提老仙長站起來就走你看這怎麼辦李昆一擺手不要緊我到那兒給他磕頭去我把他接到我這兒來我這兒寬綽司徒朗説我也這麼想把老師接到你家來一切吃穿用都比我那兒強得多李昆馬上傳底下人套車跟著司徒朗來到酒館門口車子停住司徒朗一招手帶著李昆往裏走一直來到後院北房挑簾進去老仙長在這兒正坐著養神呐司徒朗叫聲師父李昆搶進幾步撲通就跪在地上老仙長一看李昆細條身材細腰窄背二十來歲雪白的臉蛋重眉毛大眼睛通關鼻梁四方口一對元寶耳漆黑刷亮的一條大辮子穿著一身銀灰色衣服扎著絨繩確實長得風流瀟灑一團正氣倜儻不羈老仙長問道無量佛你是誰快起來徒兒這是怎麼回事呀司徒朗也跪下了師父囑咐我讓我絶對不跟別人提可這個年輕人是咱們村的首戶財主家裏的條件十分好我覺得師父在這兒住著有點委屈了你這麼大年紀要吃的吃的不好要喝的喝的不好我想孝敬你一身衣裳都孝敬不起師父你收個有錢的徒弟讓他把你接走我到他那裏練去無量佛有錢沒錢但看你資質天賦如何如果你資質天賦好即便説師徒要著飯老師也願意把功夫傳給你如果你資質天賦不成不是練武術的身材既便你成天拿禦宴招待貧道也不能接受阿師父他行你瞧他這身條他練得也不錯李昆也一個徑地央告師父你就跟著弟子走吧弟子一定很好的孝敬你老仙長只好點頭大家打酒館出來老仙長上了車司徒朗和李昆跟著來到李昆的家中屋裏的陳設十分講究請老師進來以後哥兒倆正式拜師再説村裏有個小火神廟火神廟裏頭有個窮老道此人姓呂名瑞字德興老仙長到這一帶來先就住在呂瑞的廟中這個老道雖然窮但是為人憨厚老實這會兒老仙人讓李昆派人把呂瑞也找來這樣師兄弟三個同堂學藝過了些日子有一天老仙長把司徒朗一個人叫到屋子裏説道徒兒以後你準備幹什麼去呀弟子要回去照顧買賣了徒兒你跟我練了三年多了為師覺得對不起你唉師父這是哪的話兒阿只是弟子孝敬不到對不起恩師教訓之恩唉