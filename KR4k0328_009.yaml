body:
  text: 第九回討鏢銀蘇州逢子恆請南俠廟中遇仇人上回説到頭次杭州擂三結一掌仇童海川掌震法禪不想又生事端張雄保鏢過太湖有人劫鏢車韓大壽可能喝多了酒要拿金龍鏢局開開心袁德亮從中一拉勸道老五別胡來黃燦也是個朋友年裏節裏都有禮到再説咱們到杭州去玩兒什麼時候人家都盛情招待鏢車又沒非禮之處別惹是非韓大壽反而沒事找事弄倆錢兒花劫他們嗆亮亮鑼聲一起小頭目一個箭步躥出來手裏鋼刀一橫呔不服王法不怕天終朝每日在湖邊天子從此過留下買路錢華光爺爺從此過也要留下一塊打金磚牙崩半個説不字鋼刀一舉項上餐袁德亮韓大壽帶著兵把路擋住了鏢車周圍的夥計槍去槍帽兒刀出刀鞘兒臉沖外一護鏢車把式舉鞭子在裏手一蹲張二陪劉先生往旁邊一站手拉韁繩張雄甩鐙下馬按著刀把來到前邊他一抱拳説朋友們辛苦了在下落地燕子張雄衆位寨主與敝教師黃燦都是朋友請問在下保鏢路過貴寶寨有越軌之行嗎韓大壽一提蠟杆槍娃娃什麼叫越軌之行五大太爺看你不順眼要劫倆錢花把鏢車留下不然要你的小命兒張雄濃眉一立拉刀説道告訴你禮尚往來小太爺沒事不惹事有事不怕事過來動手韓大壽一撇嘴好小子你還敢叫橫兒噌地一下就跳過來陰陽把一擰噗嚕嚕一顫槍奔心就扎張雄滑步一閃刀走纏頭裹腦斜肩帶背就砍兩個人動手打起來張雄還是個孩子他還沒有一點經驗韓大壽是一家山王寨主能耐也強得多也就幾個回合張雄用刀一砍他韓大壽閃身一躲裹手一槍正扎在張雄的左肩頭雖説不重血刷地一下流出來了小夥子臉一發白帶著鏢師夥計上馬就跑韓大壽一陳狂笑哈哈哈小小年紀也敢輕捋虎須把鏢車押走把式趕車進棗林莊上了大船回山了長順魁劉先生也嚇壞啦回到杭州正趕上海川掌震法禪從擂臺上剛回來劉先生稟報二位掌匱的兩個人立刻來到金龍鏢局黃燦從北高峰剛到家張雄把事情都説了真是福無雙降禍不單行黃燦看了看張雄的傷勢已然敷了藥倒是不重這件事也不怨自己的孩子安慰幾句叫他去休息這時候長順魁掌匱的就來了黃燦陪著進了匱房三個人坐下掌匱的道黃掌匱咱們可得説説我們是相信你才請你給保鏢的丟了銀子你們是要賠償的黃燦是個講理的人由於現在太忙請兩位先回去吧等我杭州擂臺的事情一完再去太湖二位放心兩萬銀子我還賠得起只是我現在沒工夫掌匱的一聽很不樂意黃掌匱這話不對呀你的事情辦完了可我們的買賣還做不做啦鏢銀是有限期的雙方爭執不下老俠進來黃燦等教師進來這才把丟欠鏢銀之事詳細談了老俠聽完沖著老客一抱拳兩位先回去我立刻派黃燦前去要鏢這二位只好走啦老俠叫黃燦來到後院大庭徐源邵甫哥倆也跟著過來問師父有事吧你們倆跟著你師弟黃燦去太湖要鏢去説完二人帶兵刃包袱跟黃燦到匱房取了路費就奔蘇州去了飢餐渴飲曉行夜住不幾日來到蘇州找個飯館吃了點東西三個人就從棗林莊穿過去來到湖邊有不少的船隻也有不少的人黃燦過去一抱拳道在下杭州金龍鏢局鏢長黃燦隨著師兄們拜見你家孟大寨主煩勞通桌嗷黃鏢主請進湖吧説著一隻小船劃過來三人上了船直奔西洞庭鍾山獅子寨快到船塢碼頭有水寨主劉成劉順迎接下船之後恭請上山來到大寨以內五位寨主站起來迎接分賓主落座孟恩這才問道黃鏢主前來做甚黃燦一抱拳大寨主敝鏢局因和本鎮飛龍鏢局鬧了一點事因此局內之人大部都不能出來才遣小徒護鏢去濟南小徒張雄未出師門鏢行規矩全然不懂未免有失禮之處聞寨主將鏢銀留下因此特地前來拜山請鏢孟恩微然一笑黃鏢主劫鏢是我兄弟們所為只是不應耀武揚威因此以示警告才將鏢銀留下請問你們三位拜山請鏢是出於本意麼當然不願傷我們兩造和氣確是一片誠心孟少伯一陳冷笑哼既然如此他們為何手提兵刃黃燦一看哎喲臉色都變了道衆位寨主我這兩個師兄不做鏢行生意對緑林規矩並不知詳他們都是我恩師聖手昆侖鎮東俠的入室弟子此番奉師命隨我到貴寶山賴我黃燦一時大意與我兩個師兄無關原來拜山請鏢不能帶兵刃必須徒手而來這是規矩黃燦一大意心裏後悔得不得了袁德亮站起身來黃燦人敬人鳥投林你們帶兵刃拜山豈有誠意分明強行要鏢還敢指出你師父侯振遠來我弟兄占據太湖多年不知道什麼猴振遠羊振遠的要怕我們還不幹這個哪你也打聽打聽鐵善寺的門徒怕過誰徐源邵甫真急了各自把兵刃雙手一分山賊好大膽無故劫鏢還敢強詞奪理少俠客爺就是要鏢來的黃燦伸手相攔師兄這可不行你趕快收起兵刃黃燦絶不怕死也不怕事他只怕給師父惹禍他一攔卻把邵甫的牛脾氣給挑起來了黃燦你滾開這些賊寇當著我弟兄辱罵教師你都無動於衷這是你的孝順嗎山賊出來哥倆都躥出大廳來到院中五家寨主各自抄兵刃一個個的都飛身出來金頭獅子孟少伯一抖擯鐵虎尾三節棍無知的東西敢辱罵我弟兄哪個不怕死過來邵甫一分雙鏟墊步擰腰來到近前雙鏟走流星趕月蓋頂就劈孟少伯上左步論起前節譁譁一響當把雙鏟打掉拍手一棍打在邵甫後腰上一合未完邵甫就輸了徐源一看急了趕忙飛身過來仙人解帶攔腰就打孟恩藏頭一躲三節棍一掃徐源雙足點地往起一蹦沒想到孟恩一帶棍猛虎尋食又回來了正是徐源的小腿肚子上徐源應聲而倒韓大壽又把徐源捆好兩個人一招往邵甫旁邊一站孟恩用三節棍一指黃燦道你怎麼樣黃燦一陳大笑孟恩姓黃的不能破壞緑林規矩並不是我姓黃的怕你來吧你給黃某人來個痛快的説著雙手一背兵丁過來把黃燦捆好有這麼一句話英雄出在嘴上好馬出在腿上徐源邵甫都不敵人家黃燦絶對敵不住再説自己也沒拿兵刃徐源邵甫輸了沒關係黃燦是開鏢局的要輸了以後還怎麼幹哪所以他不能動手可黃燦明知不敵嘴裏可不能那麼説那麼徐源邵甫怎麼顯得這麼無能這倒不是真論本領孟少伯也比他們強得多何況徐源邵甫都生著氣正在這個時候嘍兵往裏跑來到孟恩的面前報告大寨主棗林莊現有聖手昆侖鎮東俠侯老俠客還有他的好友童林童海川前來拜山孟恩心説來得好快呀劉成劉順兩位寨主擺隊相迎於是嗆亮亮鑼聲響起迎出山來侯振遠童林哥兒兩個怎麼來到太湖原來打發黃燦等走後海川才聽老俠詳細説明老俠侯振遠本是個心細如發的人海川也替黃燦他們擔心老哥黃燦他們去成嗎你放心只不過是拜山請鏢沒什麼關係剛説到這裏張子美可搭茬兒啦老哥哥不對呀我看見徐源邵甫他們都拿著兵刃呐要是拜山請鏢那不就壞了嗎侯老俠也是叫事多鬧的經張老俠一説可提醒了嗯我也想可能徐源他們拿著兵刃的黃燦懂規矩可又不敢説事情恐怕要鬧大衆位兄弟在杭州保護王爺海川帶兵刃跟我辛苦一趟飛龍家如果催咱開擂王爺作主辦理老俠客只管前去海川要聽兄長的話不要任意而為快走吧於是老哥倆離杭州走下來了海川還有不明白的事哥哥徐源他們是不應當帶兵刃麼那咱們為什麼還帶兵刃呢這是兩回事你我弟兄又不是保鏢的更不拜山請鏢怎能不帶兵刃嗷兄弟明白了二人飢餐渴飲直奔蘇州過了寶帶橋這顯得十分繁華臨著太湖邊上有座大飯館字號是臨湖酒樓哥倆挑簾子進去夥計迎過來爺臺上樓吧也寬敞也清靜哥倆一點頭扶著扶手樓梯來到樓上兩個人一看真是勝友如雲高朋滿座靠著後樓窗有張桌子三個座位老俠臉沖北海川臉沖南把當中的座位空出來夥計拿了兩份杯筷放好哥倆要酒要萊時間不大可就吃上啦正在這個時候聽樓下喊樓上看座兒跟著就聽嗒嗒嗒地上來一個人海川一看喝真是鋼鑄金剛鐵打羅漢蕩蕩身高過丈前胸寬背膀厚虎體熊腰一身土黃布褂子腰裏系著牛皮帶足足有一巴掌寬尺二的豆包兒鞋駱駝毛繩勒著十字絆身背後背著鑲牛皮的軟鞘裏邊裝著八方紫金降魔杵頭如麥鬥黑黲黲一張大臉濃眉插入鬢角剃的青頭皮一條大粗辮子盤在頭頂之上一對雌雄眼一大一小大的睜圓了像個大雞蛋小的一道縫大獅子鼻頭大嘴岔憨憨厚厚上了樓四下張望舌頭一個徑地咂嘴唇好像是餓極了海川正瞧他他的眼睛也正看到海川見當中有個座位這個大個兒毫不猶豫地就奔這兒來夥計拿著一份杯筷還認為是侯童二位的朋友哪正好把酒杯放上夥計可又到別的桌上去了侯老俠看海川沖著大個笑嘻嘻的還認為是海川的朋友哪可不能慢怠立刻拿起酒壺斟上酒傻大個沖著老頭兒一呲牙端起酒杯一仰脖就下去啦海川心裏想阿原來這位是哥哥的朋友我怎能慢怠趕忙夾起菜來給遞過去傻大個也一呲牙哼好好夾起來就吃老俠趕快斟酒哼好好端起來就喝老俠斟著酒心裏不高興海川既是你的朋友哪有不給哥哥介紹的海川夾著萊心裏也彆扭這個人既是哥哥的朋友為什麼不給兄弟介紹一下海川一賭氣自己不吃啦一個徑兒地給大個兒夾菜老頭兒更沈得住氣傻大個喝完就給斟上時間一長海川不成啦問哥哥這是誰呀你倒是給我介紹介紹阿這位不是你的朋友嗎我還想你也不給介紹默真有這種新鮮事夥計夥計趕快跑過來道二位爺台來了朋友我已經告訴竈上啦多給準備幾個菜今天客人多忙一點兒説話就得海川這個氣我問你這位是誰呀喲不是兩位的朋友嗎海川要急老俠給攔啦夥計要的菜快給端來再給我們添酒好你哪夥計要走傻大個説話啦小子給我來一筷子餅一盆牛肉喲你這一筷子是多少哇真混蛋一大張一大張的摞起來夠一筷子那麼高兒就成啦侯老俠叫夥計快給要去老俠心裏想這大個明明是缺心眼是個傻小子那麼我跟海川不傻呀為什麼他喝一盅我給斟一盅呐看來我跟海川是傻子你叫什麼名字大個站起來兩隻手一捂肚子雌雄眼一瞪家住淮安府漂母河于家莊姓於名恆號寶元師父起的外號叫吒海金牛小名兒叫牛兒小子哥兒倆心中暗笑你叫牛兒小子喲老頭兒你怎麼會知道的不是你告訴我的嗎老頭兒我喜歡你才告訴你別跟旁人提你要是跟旁人提了牛兒小子可就不疼你啦嗷你這是上哪兒喲我忘了這可怎麼辦哪別著急慢慢地想傻小子想了半天道我去杭州打擂海川在旁邊一聽心裏也是樂這是誰呀讓傻小子去杭州打擂呀我問你你到那兒找誰呀我哥哥還找飯東就不致於挨餓啦你哥哥是誰呀傻小子樂啦哥哥在我兜裏揣著呐老哥倆一聽傻小子怎麼把哥哥揣起來啦傻大個伸進手去摸半天默在這呐二位一瞧是廟裏隔扇門上的銅合葉兒這是什麼姓童嗷合葉兒叫什麼傻大個站起來隔著窗戶往外看壞了這兒沒有哇哪兒有傻小子往東邊指外邊有有什麼樹林我哥哥叫林兒你哥哥叫童林對了要不我疼你哪老俠看童林海川看來這是咱們的傻兄弟你又添了左膀右臂海川很高興拉著大個坐下我問你你認識童林嗎不認識找著不就認識了嗎你是怎麼回事兒跟我們説説傻小子這才細説哥倆聽著半聽半猜大致也能明白原來海川學藝快出師之前尚道爺何道爺很高興能收這麼個好徒弟將來讓他興一家武藝尚道爺先去四川告訴大弟子叫他們將來幫助海川又去揚州找二弟子