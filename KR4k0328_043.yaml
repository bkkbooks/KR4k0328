你要胡來呀那我可得宰了你想著就跟上去了海川跟到金魚胡同的胡同口這麼一瞧喲金魚胡同正記茶葉鋪的經理王子延不是在這兒住嗎對去他家王倫在路南住大門關著走馬門也關著只見穿夜行衣的人拔腰上了王倫家的房海川也拔腰上了房心想他這是要幹什麼呀這我可得管海川往底下一看好像這下頭是底下人住的地方只見夜行人躥縱跳躍又上南房往裏可就到了王倫他們的正院了也就是第二道院的南房後坡海川慢慢地右手撑中脊這麼一看嗯這個人從北面的牆下去了他把刀亮出來躡足潛蹤在院中各處窺探海川一瞧那架式又不像劉俊心裏疑惑同時海川又發現人了東房上一位西房上一位影影綽綽好像是天壇動手的那二位東房上是穿藍袍的西房上穿黃袍二位可沒看見海川海川心説這可是王倫的家呀要説王倫在北京也是數得著的武術家呀現在房上頭有仨院子裏有一個可你王倫連影都沒有你算什麼武術家呀再瞧院子裏這個人順著西房往北來走到西房牆角這兒突然有根蠟杆槍照著夜行人就一槍夜行人往後一坐腰蹭就到了當院打北山牆一拔腰出來一個人説話的聲音不高但很有威懾的力量用槍一點道大膽賊人竟敢到我王倫家中擾鬧你這是飛蛾撲火自找死路還不扔傢夥被擒嗎唰一抖槍可就到了夜行人一借步用刀一架往外一推刀走順水推舟王子延前把一崩後把一壓用槍一崩他的刀緊跟著上右步槍把就順著夜行人的腿部打來夜行人腳尖一點地起來了王子延的功夫好呀一轉身右腿往左插這身子可就轉過來了啪一扣槍槍尖就奔夜行人的後腳跟扎來夜行人一斜身這一槍如果扎實了能把夜行人扎死但是槍尖只是在這個人的胯骨上一點往上跟步啪地一腳把夜行人踹了個跟頭再看這夜行人就地十八滾咕嚕一個鯉魚打挺站起來一長腰上東房沒想到東房上站起一個人來南方口音林寶這場官司你打了吧譁啦一抖鏈子雙鐝一轉腕子照著這個夜行人的腦袋就砸下來夜行人剛上來身子還沒站穩呢就這麼一晃悠往後一閃人家跳脊長身一腳就把他踹下當院夜行人知道王倫在下面呢一拔腰幾個跟鬥噌噌又奔西房了沒想到西房上也站起一個人來掌中譁楞楞一響哎呀混帳王八羔子林寶這場官司你打了吧刷刷地一下鏈子鈸就到了這個夜行人一矮身人家一擡腳對著這個夜行人的胸口啪又把他從西房上踹下來了夜行人知道要壞一打腰腳尖點地噌地一下又上南房躍脊後坡他要跑沒想到南房坡這兒也站起一個來朋友這官司你打了吧正是海川這個賊人一瞧心説院裏這位可以東西房上甭説自己已經吃虧了只有南房這位是個老實人我就從這兒跑他掄起刀往海川頭上一砍海川抱著兵刃譜右手一叼他的腕子一個金絲纏腕給叼住了拿右腳一踹他嗵地一下這小子就趴下了海川在南房上對下面的王倫高聲叫道王倫王掌匱認識童林嗎凶手我給捆住了哎喲俠客爺哎呀哪旮的俠客爺呀東西房上的二位可就愣住了這二位是誰呢被困的這位又是何人原來在浙江省會稽郡北門裏住著一位老鏢師姓袁叫袁泰人稱神鏢手神鏢手袁泰老伴已經去世啦他是個老鏢行會一趟刀法叫六合刀上中下走三盤三十六式會打穿梭毒藥鏢家傳獨門配的毒藥上打飛禽下打走獸十分厲害夜晚之間打香火百發百中老頭兒因為年歲到了辭了鏢行不幹了老人有一個姑娘今年才七歲叫秀英姑娘長得十分伶俐也很俊俏父女二人相依為命老頭兒也教女兒能耐盤腰弓腿站架子教拳腳也教刀棒但是老頭兒重男輕女總覺著自己這點兒絶藝傳給閏女將來有什麼用呢再説自己又這麼大的年紀家無三尺應門之童老頭兒心裏頭有點兒不痛快有一次老頭上街發現了一個小孩這小孩也就在七八歲沿門乞討時值夏日孩子滿身直招蒼蠅長了一身的膿疥但看這孩子長得不錯他住在買賣人的廈子棚底下這廈子棚沒門沒戶就這樣人家都轟他他太髒老頭袁泰看著怪可憐的心説這是誰家的孩子便掏出幾個錢來對孩子説得了你呀找個地方吃點飯能換件衣裳就換件衣裳袁泰回家了過了沒幾天南門裏六和綢緞店掌匱的章成錦章老先生來了他在南門裏還是個大戶跟袁泰老哥兒倆最好而且都善於下圍棋所以走得比較近乎到這裏一叫門小姑娘出來把門開開喲章叔來了嗷你爹在家嗎在你進去吧章成錦來到了北屋老哥兒倆坐下後袁泰問有事嗎給你提點事每常咱們老哥兒倆坐到一塊提來提去就是説孩子太小又是個姑娘你總想要個小男孩兒是阿我給你介紹一個你願意嗎誰呀在大街上要飯的那個長了一身膿包疥都臭了他是咱們鼓樓前林儒生家的孩子老頭一聽就不大樂意了林儒生是個財主在本地還很有名就因為他的行為不正吃喝嫖賭無所不為最後把全部家財都花盡了兩口子窮死了剩下這麼一個八歲的孩子名叫林寶就是袁泰前不久看見的那個孩子一提是林儒生家的孩子人家老街舊鄰都很討厭因為他們家有錢的時候沒幫過誰黎民百姓對他很不滿意背地裏沒有不罵的現在林寶一身瘡疥沒錢瞧所以就落到這種地步章成錦勸説道哥哥他父母不好怎麼能影響到孩子呢哥哥家裏又沒人我想把孩子叫來你花倆錢給他瞧瞧讓他有飯吃了就是救了他的命了我看他待你將來也錯不了老頭袁泰怎麼想呢林家的孩子我根本不應當要因為他的父母在本城人緣不好為富不仁可是瞧這孩子也真可憐得了要了不就完了嗎姑娘秀英也説爹呀把這小孩找到咱們家得了跟我一塊玩也是好的阿這樣章成錦就把林寶領到袁家老頭先給他打打辮子剃剃頭洗洗身上換了件衣裳請妥當的先生每天來家給他上藥治病萬萬沒想到此舉引狼入室招來橫禍飛災
