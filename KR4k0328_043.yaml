body:
  text: 第四十三回老劍客留箋救清官童海川夜捉害民賊上回書説到一目了然僧荊立堂為清官鳴不平夜入皇宮盜寶並且留下字箋順治皇上大怒傳旨要把北京城的僧衆抓起來嚴辦卻被起鄯大人給攔了皇上奴才有兩句話不知當講不當講你説萬歲劉振昌可能是個清官這裏頭也許有人陷害這個和尚進宮盜寶就是為劉振昌訴冤他是一個僧人有進紫禁城之能但絶沒有犯駕之意我認為如有犯駕之意皇上在宮內也不得安康我想皇上應該派人到河南探詢一下如果劉振昌確實是忠良被人所害就應當二次起復還讓他做河南巡撫只有平撫了民怨和尚才可能把國寶送回宮中奴才管見望我主宸衷獨斷順治很聰明一琢磨這事也對馬上傳了一個旨意派了個有才華得力的滿員到河南調查沒有多少日子滿員回來了把李寬在河南的所做所為上了一本奏摺順治看見這個摺子就留中了馬上傳旨意把李寬正法起復劉振昌官復原職果然了然僧把國寶送回了尚寶監但他不敢再回大相國寺於是就雲遊四海到處為家最後在靈寶縣金光寺住下荊立堂輩份大文武全才道高德重經文又熟本廟的老和尚圓寂之後大傢夥兒就恭舉他為金光寺的方丈荊立堂隱姓埋名多年因為有這麼一段事所以他不敢到北京來順治死後三兒子康熙做了皇帝風調雨順國泰民安老和尚一想我再到北京看一看天子腳下帝王之邦商賈雲集十分繁華老和尚依然住在報國寺但他聽説前三門有這麼倆把式匠老和尚才來訪他們現在老和尚把自己的事情一説石勇道師父你老人家在這兒住著只要我們不往外聲張什麼事兒也沒有何況已經是兩代賢君了呢這樣師徒爺兒仨就把二五更的功夫練起來了首先老和尚不準馮昆石勇再練鐵鎖擰棒子端筐子而是讓他們站架把三十六大架七十二小架站出來再教給他們打拳躥高縱矮雖然他們倆是表兄弟但石勇跟馮昆不一樣馮昆瘦小枯乾老師父給他縮小綿軟巧的功夫石勇則學習硬功教給他渾身上下過操練鐵沙掌這個過操就是身上抹上藥用外力撞擊全身使筋骨加強增強抵抗力這就叫外操筋骨皮內練一口氣用八寸的柏木板一尺半寬一丈長埋下半截兒去上頭半截釘上狗皮用雙掌去打光陰荏苒日月如梭轉眼間十年到了馮昆石勇兩個人的能為都很好老和尚給石勇起了個外號兒叫鐵臂熊給馮昆起了名號兒叫千里獨行一天老和尚把兩個徒弟找來説貧僧要離開你們回河南了師父你老人家這麼大的年紀還走什麼呐你就在北京城住著吧十年了什麼事兒都沒有哇你老人家一走好像我們弟兄有違弟子之道對師父你不孝敬不貧僧到河南述有很多的事情要做你們兩人等師父走後要好好兒地把功夫學成千萬千萬不要耽誤學如逆水行舟不進則退南北兩城有把式匠都可以訪一訪看看你們哥兒倆的本事到底如何老和尚執意要走哥兒倆只好準備了一桌豐盛的素菜給師父餞行飯後石勇端出一盤兒黃金來道師父你要拿得動你就全部帶走你要拿不動愛拿多少拿多少表一表我弟兄之心我要這麼多的錢幹什麼呐你隨便給我點兒散碎銀兩夠做路費就行了結果老和尚拿了十兩黃金小哥兒倆把師父送出了彰儀門師徒灑淚分別師父走了哥兒倆在家裏照樣兒用功時間一長前三門都知道他們兩人武功很不錯今天哥兒倆坐在客廳裏呆著聽見街裏頭喊好肥的牛肉石勇説哎你聽見沒有這賣牛肉的怎麼這麼大嗓門阿真是的默咱們瞧瞧去買點兒牛肉哥兒倆來到了大門口哎掌匱的買點兒牛肉推過來鐵三爸道阿買肉哇你這邊兒石勇看了看車子上有盤子和稱問買點兒牛肉多少錢一斤呐鐵三爸不知道價呀就説嗨我刺下肉來你隨便給石勇心説有這麼賣肉的嗎這純粹是沖我們哥兒倆來的馮昆也説那好吧給我來五斤鐵三爺拿起刀來找最好的地方唰就切下一塊肉來這塊肉起碼得有七八斤石勇看了馮昆一眼對鐵三爸道這塊肉五斤差不離多少錢呐哎你瞧著給石勇一伸手把肉接過來了表弟拿家去拿出錢來馮昆接過肉拿家去了不大會拿出一摞大銅錢有一寸多長康熙大老錢交給了表兄石勇拿食指跟大拇指一頂把這摞錢掐住了掌匱的拿錢來吧鐵三爸伸右手並食中二指就伸進去了大拇指稍微一頂一使徑默沒掏動哈哈哈掌匱的再使點兒徑兒鐵三爸腦蓋兒就紫啦第二次手指頭使徑一用力默還沒掏動第三下鉚足了徑石勇撒手了默三十多個大老錢飛了一地全都變形啦大傢夥兒譁一樂鐵三爸有點兒惱羞成怒説道嗯你這是怎麼回事兒阿拿我的牛肉給這個錢我能花嗎看起來你欺侮我姓鐵的外鄉人阿石勇心説賣肉的你訪我來了但又跟我説這個哈哈哈朋友你是外鄉的你不知道我們北京城的規矩是賣牛肉的都這樣阿嗷你瞧不起我我姓鐵的因為練功夫把萬貫家財都練盡了來吧咱倆人試巴試巴石勇心説你哪兒是個兒阿便説行阿怎麼個試法兒咱們不用插拳也不比武你打我三拳我打你三拳你看好不好石勇一聽行掌匱的給你個便宜你先打我好哇打完你你再打我光棍打光棍一頓還一頓好了來吧石勇下了臺階兒站在牛肉車子旁邊兒兩隻手一叉腰前胸疊肚騎馬蹲襠式站好了鐵三爸一掄胳膊眼珠子瞪圓照著石勇的左上胸就是一拳雖説是笨力氣但這一拳打得石勇晃了兩晃鐵三爸一瞧沒打動退出來一掄右胳膊一個箭步躥過去啪照著原來的地方又是一下兒這回看熱鬧的目瞪口呆連個喘大氣的都沒有石勇拿右手一指自己的前胸來來來再使點兒徑第三次鐵三爸掄圓了拳頭啪又是一下三下打完了石勇沒含糊深深地出了口氣朋友你這三下雖然是笨力氣看來也可以呀怎麼樣你三下打完啦那沒別的你打我吧鐵三爸騎馬蹲襠式往那一站石勇心説我也甭掄圓嘍就照你腦門一手指頭我能把你戳死到這兒朋友你可經不住我一巴掌阿石勇掂著手樂喝喝地猛然間從石勇身後轉過一個人來一伸左手把石勇的右手手腕兒攥住了朋友他經不住你一巴掌你還經不住我仨手指頭呐猛然間人群裏頭邁步又出來一位説朋友千人瞧萬人看衆目睽睽之下何必逞能要知道螳螂捕蟬黃雀在後他經不住你三個手指頭你能經住我一個手指頭嗎你道是誰童海川按理説海川身為堂堂俠客可不應當這麼顯露但是他畢竟年輕還有點兒火氣往前一邁步就把這位的手給攥住了海川攥住的這位是哪兒的人哪也是京城人他家住金魚胡同東口路南姓王名倫字子延他們家在騾馬市路北開了一個茶葉鋪叫正記茶葉鋪是他父親開的自東自掌買賣還挺好在他小的時候讀書很聰明後來大了一點兒父親就叫他到正記茶葉鋪照料買賣本來鋪裏有個領事的是個薰茶葉的老手他薰出來的花茶非常有味道這位老先生姓陳名字叫陳自平有一次有賊人到正記茶葉鋪盜竊打了他們好幾個人但陳自平老頭兒出來沒有三招兩式就把竊賊拿住交到地面上了大傢夥兒這才知道陳領事有很好的功夫他五十多歲跟王倫的父親最要好一次王倫到店裏來陳老頭兒見王倫身條很好骨架也不錯便問王倫的父親老哥你就這麼一個孩兒呀我還有一個姑娘你這孩子很聰明阿我打算收他做個徒弟不知你們爺兒倆樂意不樂意王倫當時就趴地磕頭了陳老頭下了辛苦教王倫教的都是內家功夫並且把點穴的功夫也教給了王倫光陰似箭日月如梭轉眼間就是十年老頭兒陳自平一定要告老還鄉王倫的父親拿出不少的錢來派王倫親自把老人家送到河南王倫回來在匱上料事別看二十多歲還很老練後來王倫的父親身染重病醫治無效去世了家裏只剩下老母妻子和還沒出閣的妹妹王香姑香姑今年十八了長得十分俊美舅父舅母沒兒沒女很喜歡這個甥女所以香姑一年到頭經常在舅舅家裏住舅舅家住在左安門外的南頂王倫每天順金魚胡同出來出前門走廊房頭二條再順著李鐵拐斜街走五道廟進虎坊橋騾馬市東口奔匱上去今天走到這兒碰上這檔子事沒想到海川出來把他的手給攥住了石勇敢情有點兒心眼你二位怎麼稱呼王倫一抱拳朋友你不認得我我知道你你不是叫鐵臂熊石勇嗎他是你表弟千里獨行馮昆我家住在東城金魚胡同東口路南姓王名倫字子延我的師父姓陳名字叫陳自平河南人我是騾馬市正記茶葉鋪的掌匱哎喲王大哥久仰久仰我知道你是把式匠這位是誰呀王倫臉兒一紅我還不認得呢你怎麼稱呼海川道我家住在北城根兒固山多羅貝勒府我是府裏的教習阿你是大名鼎鼎的鎮八方紫面昆侖俠童俠客爺嗎海川道哎不敢當説真的你們幾位元也不認識人家賣肉的何必跟人家鬧這麼個笑話呢我本不應當出來王掌匱的你多原諒咱們兩人都在東城住將來對著機會我一定訪問訪問你海川説完又對尾隨鐵三爸來的劉二爸説你馬上把鐵三爸找來咱們一塊兒聚會提提這事事情就過去啦原來海川跟王子延説話兒的功夫鐵三爸蔫蔫地把肉車子擱下怕寒磣回家了王倫納悶兒這是怎麼回事兒劉二爸就從頭至尾説了一遍最後説道我們鐵三爸可能回家啦我看這件事情就這樣吧這塊肉送給你吃了石爺不我給錢劉二爸一擺手算了人家鐵三爸也走了這錢歸誰呀要不我推著車子由王掌匱的跟童俠客爺出頭咱們一塊兒到趟牛街見見鐵三爸好不好海川説我正要跟鐵三爸這樣兒的朋友交往交往王倫點頭我也是石勇説了半天好話打算請童海川跟王子延到家裏坐會兒結果誰也沒去石勇馮昆也就回家了劉二爸推起車來王子延和海川説著話兒跟著車走兩人一説話都恨相見之晚出來往西奔菜市口來到牛街往南拐過了清真寺來到鐵三爸的家門前劉二爸把車子放好上前去啪啪啪一叫門三爸回來了嗎我們來了這裏鐵三奶奶出來了喲誰呀我你開門吧我們三爸説了有人找就説不在家海川跟王倫一聽笑道那看起來鐵三爸是在家呐説著就往裏進三奶奶臉臊得跟大紅布一樣鐵三爸從屋裏頭跑出來哎呀幾位辛苦辛苦海川一抱拳鐵三爸劉二爸把你的事情都跟我們提了能不能到貴府坐一坐請吧我剛搬過來沒多長時間客居在北京各處都不方便請高親貴友多多原諒千萬不要見笑鐵三爸很會説話和王倫一起把車子搭到院裏來把街門關好幾個人一塊進屋來了到屋裏一看很簡單但是收拾得十分乾淨鐵三奶奶忙著抱柴禾燒水沏茶等他們幾位喝著茶説著話就躲出去了這裏劉二爸就對鐵三爸説了我們東家讓我給你送車子送肉你也不問問這肉多少錢進的你賣多少錢明天我來再給你幫幫忙做個小買賣説真的生意經營好了每天也不少賣錢也不少掙你們夫妻兩個吃飯不成問題三爸答應劉二爸我沒做過買賣你可能也看得出來我連吆喝都不敢反正慢慢來唄海川王倫二位這才説話王子延一抱拳鐵三爸我們聽劉二爸説了你的事都很感動你來到北京城舉目無親因禍得福遇難呈樣阿咱們總算有緣馮永志跟石玉山兩個人也都是好朋友你趕上了他們是跟你鬧著玩呢這會兒也很後悔我們來是想跟你交個朋友將來咱們還多多親近你沖著我王倫了我那小字型大小在騾馬市今後你短著什麼丁大爸和張爸這些人照顧不到的時候你可以找我去我王倫一定幫