三個人商議巳定這才奔清雲寨而來羅威坐船迎接出來先請三位上了自己的船羅威拜見喬玄齡兄長你這是從廟裏來這二位兄台又是何人喬玄齡攙起羅威賢弟愚兄從飛龍觀至此來探望於你我給你介紹一下一指韓寶吳志廣道他們二位都是雲南昆明八卦山九宮八卦連環堡的少莊主他叫小粉蝶韓寶他叫鬧海金龜吳志廣二位賢弟這位是本山少寨主羅威羅聲遠羅威今年十九歲小夥子長得很俊俏韓寶也長得十分英俊彼此是惺惺相惜都很愛慕羅威躬身施禮不知二位賢兄蒞臨未曾遠迎實在抱歉韓吳二位趕忙還禮豈敢豈敢我二人與閣下素昧平生今日落難相投還望閣下容納羅威一怔兄台你的話使小弟不解呀韓寶長歎一口氣説來話長我們弟兄也是為了給緑林道爭口氣就把頭結一掌仇二結一掌仇盜國寶的事情細説一番韓寶説完了微然一笑少寨主咱們都是緑林人水米無交可人不親刀把子還親呐再説喬道兄因我弟兄已然拋家舍業來到寶山以求隱蔽閣下有此膽量收納我弟兄嗎喬玄齡很佩服韓寶的口齒心想這是激將法呀果然羅威一陳大笑哈哈哈韓兄太小看羅威了盜國寶乃英雄所為大丈夫為朋友則生為朋友則死家父和叔叔們要聽説你二位來了也一定很高興為朋友兩肋插刀説著執手往裏讓立刻吩咐水手開船進了竹城來到寨門下船之後由羅威把他們陪進大廳三家寨主都在大寨主羅烈紫臉大個頭肩寬背厚一身藍衣服很有威風二寨主何豹猛一看跟兩個腦袋似的人稱雙頭巴蝦巴蝦有力能負重石碑下邊形似烏龜的東西就是巴蝦他還有個外號叫病獬豸三寨主彭沖長得五大三粗人稱分水忽律傳説這種忽律既能在水裏又能在旱地總喜歡在江邊上爬伏人要在江岸上一過忽律嘴裏含著水水裏有沙子用這個來噴射行人的身影能使人致病所以留下一句成語叫含沙射影表示趁人不防範暗箭傷人的意思羅威給韓寶吳志廣喬玄齡一指引三個人給三家寨主行禮落座細問二小又重新説了一遍羅烈聽了高興兩位賢侄連同喬賢侄只管在此居住絶無危險韓寶他們打躬道謝備酒宴熱情招待又命羅威給安排住處到晚上彭沖來到跨院書房羅烈在這兒喝茶呐彭沖問道兄長韓寶吳志廣進宮盜寶犯了彌天大罪當然我們弟兄不怕事這多年咱在水面上做買賣沒有人敢動咱清雲寨一草一木現在你把這二位留下這可是禍無奈這是羅威的朋友咱們做長輩的也不能沒有一點兒情面你看怎麼辦好呐羅烈低頭沈吟賢弟之言是也有兩件事你應該知道第一韓寶他們盜國寶為的是陷害那個童林可咱們的師兄金頭獅孟恩的獅子寨被童林侯廷給滅了師弟袁德亮韓大壽被童林給殺啦同仇敵愾我們也要鬥鬥童林侯振遠第二愚兄的生日快到了如果童林他們聞風來到咱們山寨禍事臨頭需放膽那就以死相拚倘若過了愚兄的壽誕咱們善言勸他們離開山寨子韓寶吳志廣是八卦山的當初咱們學藝在鐵善寺相隔幾十裏路鄉土之誼桑梓之情當然要顧不知賢弟意下如何彭沖也只好答應下來韓寶這個人可機靈啦他準備在清雲寨住兩三天就要趕忙離開這是非之地因為韓寶知道自己是驚弓之烏漏網之魚得時時提防果然今天來了一老二小祝壽的羅烈先請陶二爺來到供桌前陶兄請上羅烈給你磕喜頭陶榮立刻抱住羅烈賢弟愚兄要給你拜夀不老哥哥這大年紀羅烈不敢當彼此對作一揖然後又叫過司馬良夏九齡這是我兩個徒弟給寨主爺拜夀司馬良夏九齡只好過來一躬到地羅烈伸手相拉不敢當不敢當中午時分壽席擺好大家斟酒布菜直喝到掌燈方休陶二爺有些微醉他放下酒盅歪過頭來問韓寶韓少莊主老夫每年都到山寨去為大寨主祝壽沒跟你們幾位見過面這次少莊主們能親來連老夫都為寨主們高興阿陶二爺別看是黑虎門出身但他為人正派他一進山就想到了韓吳二小真的落在山中侯振遠童林一到就要山破事敗人家羅烈待我陶榮不錯呀豈能恩將仇報可只要得了國寶侯童二位是光明磊落的俠士不會過為己甚自己説幾句好話別跟羅烈為難那樣自己也算盡了朋友之道最好我把國寶設法弄到手實不成我可以偷他的所以才跟韓寶套話韓寶為人機警就要順著陶二爺的話説沒想羅烈的酒也喝多了他搭上茬兒啦哈哈哈陶兄你在緑林道裏可稱前輩南七北六十三省都跑遍啦走的橋都比我們走的路多呀可你去過北京嗎陶榮一聽心裏高興了羅烈話兒給引出來連忙一抱拳聽你話的意思難道二位上過京嗎不瞞衆位陶某一生走了不少地方只是北京城沒去不怕衆位見笑我是沒膽子去呀京畿地面帝王之都天子腳下南北兩城裏九外七皇城四門五營二十三訊營城司防五城十五家大宛兩縣南北二司刑部堂都察院左右兩翼該管地面三步一個堆兒五步一個棚欄兒眼明手快的官人哎呀哎呀太多太多説真心話老夫怕栽在那兒不但我不敢去恐怕在座的賓朋誰也不敢去呀陶二爺説著話看韓寶見他眉梢眼角兒露出一絲冷笑不過一閃即逝心想成啦有門兒羅烈大笑陶兄這二位賢侄就剛從北京回來不但去了北京城還做了一件震撼緑林的大事這時候韓寶可就攔住道老前輩我弟兄末學後進何足挂齒況且此事不宜對外人言講阿陶二爺在一旁大笑二位少莊主陶某也不是外人説出來在下也高興高興麼旁邊兒的夏九齡心裏很佩服陶二爺到底薑是老的辣果然羅烈一擺手賢侄大家都是至交何必隱瞞就把盜寶之事詳細説明陶二爺的心中翻滾他想既然探明無誤我就應該告辭明天侯童二位就到請人家二位憑本領捕盜拿賊可這位老英雄心有不甘再説國寶是否在二人身上尚未查明他微一沈思主意就來啦立刻滿滿斟上一盅酒恭恭敬敬地端起來攀大了説二位賢侄我借花獻佛敬你們兩位一杯韓寶吳志廣很不好意思地站起來老英雄這可不敢當不不當之無愧説著斟了他們兩個人每位一杯陶榮雙豎大拇指二位賢侄衆位英雄你們敢到北京大內做出這樣驚天動地撼嶽搖山轟動武林的大事實令老夫欽佩真是長江後浪推前浪一代新人超舊人幼年時只聽説過有位前輩賽毛遂楊香武暢春園三盜九龍玉懷威振緑林道還有一位紹興府飛鏢黃三太黃老前輩在海子紅門鏢打猛虎沙灘放響馬劫過銀輦驚動九門了不起呀哈哈哈陶某實在羡慕唉話可又説回來啦羅賢弟我可覺得不大對徑兒聽説童林這個人衣不驚人貌不壓衆並不是什麼高一頭的英雄也不過是我等之輩二位少莊主雖在盛怒之下也該找他理論怎能驚動萬歲要知道天威難測呀一旦發怒牽扯多人盜來國寶總要還朝二位少莊主一時使氣後果如何人無遠慮必有近憂因小失大智者不為也韓寶一聽大怒陶老英雄住口我弟兄盜國寶敢做敢當就為的是兩掌結仇爭一時之氣何能貪生怕死只要童林一死我們立即宮闕獻寶親領死罪陶二爺點點頭好漢子我想你們當中就是沒有説合人如果有朋友斡旋其中使兩造言歸於好國寶還朝給二位報個畏罪自殺也可以化干戈變玉帛不然的話這覆巢之下無完卵呐陶榮剛説到這兒韓寶還沒説話呢羅烈一拍桌子啪地一聲盤碗亂晃陶兄你不要再説下去即便韓吳二位賢侄獻出國寶我羅烈和童林侯廷也勢難兩立陶榮可就一怔難道那姓童的也與賢弟有仇嗎哼我與他不共天地不同日月太湖鍾山的師弟被小兒童林致死他興一家武術與我無關大不該要滅我鐵善寺的山門羅烈一提這事咬牙切齒陶二爺不能再提啦只有一個辦法那就是偷他的陶二爺有主意羅賢弟愚兄還不知道這姓童的要與鐵善寺為仇做對那可是以卵擊石咱們今天是高興的事拋開不談啦不瞞賢弟説愚兄偌大年紀可沒看見過國寶什麼樣尤其是二位少莊主所盜的國寶真要能看上一眼死了都不冤呐羅賢弟和諸位不知有沒有這種想法這位陶二爺很有閲曆他用投石問路之法若要説自己要看國寶姓韓的決不給瞧瞧他指使羅烈瞧韓寶就不好推辭啦如果羅烈要説我們已經早看過陶少華就知道國寶準在韓寶的身上能偷就偷不能偷等侯童一到好拿二小請國寶果然這羅圖烈也想開開眼二位賢侄説來也是千載難逢的好機會能否請國寶叫大家開擴眼界哪羅烈説完了所有人都看韓寶那意思全願看看國寶韓寶一抱拳不是小侄駁衆位前輩的面子我弟兄也是高門弟子循規守禮只因一口氣才出此下策國寶乃禦用珍玩我等焉能褻瀆這事實難從命韓寶的話真咽人大廳內鴉雀無聲面面相覷顯得十分尷尬吳志廣覺得不好意思啦兄弟看羅老伯和大家的面子莫若請出來讓大家看一看好在這裏沒有外人韓寶狠狠地瞪了他一眼好吧那麼我就請出國寶來大家看看吧陶二爺心裏高興表面上卻不顯下人們端上一盆淨水來韓寶洗了手然後從軟囊之內往外掏大家的眼神唰地一下全集中在他手上了連個喘大氣兒的都沒有就看這個小包兒外邊用防水的油綢子包著再打開一層是黃雲緞裏邊是個綿墊國寶翡翠鴛鴦鐲赫然在目借著周圍的燈光一照唰拉拉霞光萬道瑞彩千條寶光豔豔照得大家眼睛感覺得十分明亮大廳以內就好像春光麗景百鳥鳴喧百花盛開空氣顯得都得新鮮寶鐲呈獻看得人目瞪口呆韓寶面有得色司馬良夏九齡想到教師赴湯蹈火正在尋找此物現在近隔趾尺怎奈勢力太小再説陶二爺本領平常投鼠忌器不能莽撞陶少華卻抽冷子伸手就搶韓寶猛地往後一撤把眼一瞪幹什麼這大年紀不自重立刻包好收起老頭兒笑少莊主不要見怪説真的我想撫摸一下這一回韓寶起了疑心他看陶二爺剛才的舉動便警惕起來心思姓陶的可能為我弟兄來的他只埋怨吳志廣沒心沒肺叫姓陶的知曉國寶在自己身上想到這裏站起身形一抱拳衆位先喝著請恕罪韓寶失陪了我到後面方便一下大家都説請吧請吧韓寶離席從大廳出來往西院有個月亮門兒進門兒之後輕輕地一提氣嗖地一下上房啦他想的是不能傻喝酒哇察看察看吧他從西院房上往大廳周圍瞧嗯怎麼前簷珍珠倒卷簾挂著兩個人往裏偷看阿果然童林的夥伴到啦他渾身都要發緊了伸手解包袱取出跨花攔包袱皮兒圍好右手抓雙攔藏於背後飛身奔後院再往前翻到大廳後坡輕輕地爬到中脊從背後把雙攔一分猛地長腰到前簷舉攔照定夜行人的腿上就扎徐源邵甫正往裏看猛地感到房上有人到啦再想翻身上房絶不可能兩人一縱身兒從房上下來腳扎實地探雙臂亮兵刃往上看韓寶抖攔一聲赫喊呔什麼人竟敢夜探清雲寨就這一句大廳內的燈光全滅啦譁楞楞各抄兵刃羅烈等人飛身往外走陶二爺他們爺兒仨準知道望潭莊來人啦暗暗囑咐兩位少爺別動手司馬良夏九齡答應三個出來院中燈火通明嗆啷啷鑼聲響徹連天嘍羅兵各持刀槍喊殺助威羅烈看了看徐源邵甫心中納悶水寨竹城十分堅固周圍山勢全是懸崖陡壁飛鳥難人遊魚難通他們是怎麼進來的呢莫非是陶榮吃裏爬外恩將仇報吧陶二爺早看出羅烈的心思伸手拉出軋把厚背翅尖雁翎刀一個箭步來到當院用手點指你是什麼人吞了熊心豹膽竟敢至山中攪鬧認識俺狸貓草上飛陶少華嗎徐源譁楞楞一抖鑌鐵雙懷杖心説這老頭怕寨主疑心他是暗姦才過來動手我要打你還是狠著點兒想到這裏一瞪眼無名的草寇也敢前來送死進招來陶二爺左手晃面門右手刀纏頭裹腦斜肩帶背唰地一下砍到啦徐源滑左步一矮身躲過刀右手懷杖反過來正砸在刀背上嗆啷刀就撒手啦陶二爺往前一栽身兒徐源左手懷杖照著老頭子的腰上啪嚓就是一下陶二爺心裏這氣爺兒們你真使徑呐應聲而倒來了一個大馬趴司馬良過來把刀撿起來大廳前一陳大亂韓寶吳志廣喬玄齡帶著一些小寨主大頭目呼啦啦各亮兵刃二十來位把老哥倆圍住徐源邵甫就算跟這些人拚啦可雙拳難敵百手猛虎不如群狼時間長了不行這時司馬良夏九齡就急啦那意思是要上到底陶二爺老成持重沖著他們使眼神搖頭本山三家大寨主還沒動哪真是千鈞一發呀突然就看兩邊寨門的兵丁一陳大亂往裏跑高聲喊道了不得啦山精大野獸電好厲害啦譁地一下就跑到大廳前羅烈他們一瞧阿闖進一人來半截大塔一樣一身紅紅緑緑好不怕人正是猛英雄于恆于寶元傻小子洞裏也是憋得難受心裏嘀咕怎麼還不響鑼呀趕緊響吧工夫大啦他從裏邊擠出來站在那一聽好哇響上啦猛英雄順著船塢後牆繞過來直奔寨門這裏有五十名兵丁把守裏邊有個小頭目正要關閉寨門傻小子就來啦有幾個兵丁看見用手一指你們瞧那是什麼玩藝兒晃晃悠悠一身紅緑阿山精野獸吧不對好像是個人快對口令今天晚上的口令是祝壽二字這邊喊祝對方接壽就知道是自己人啦傻於恆一聽什麼祝哇他還往前來也喊道祝這邊喊祝那邊也喊祝嘍兵一聽怎麼兩邊都祝哇是姦細響鑼擋住他別讓過來猛英雄一瞪雌雄眼伸手拿出八楞紫金降魔杵抖丹田一聲喊好小子擋我老牛嗨就這一嗓子石破天驚真好像半空中響起沈雷嘎啦啦嚇得嘍兵屁滾尿流真是黃口孺子難聞劈靂之聲病體樵夫怎聽虎豹之吼
