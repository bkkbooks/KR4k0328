body:
  text: 第十二回雍親王化嫌了爭端借祝壽夜探清雲寨上回書正説到南北昆侖會雙鉞分雙劍在擂臺之上與秋老俠見面師兄弟巧相逢可秋老俠一定要和侯振遠一死相拚海川南俠老哥倆一聽可急壞了海川忙問老哥哥你這是為什麼秋老俠哼了一聲老夫絶不袒護潘龍他也不能袒護黃燦為什麼他來此鎮擂又為什麼聘請司馬大弟海川一聽笑了哈哈老哥哥你錯怪他啦海川就把保王爺下山東請雙俠出山相助蒙侯老兄長慨然應允明下杭州鎮擂暗地查訪二小的事全説了海川最後説道我實不是為了鎮擂小弟與八封山已有兩掌之仇打法禪是小弟之事與擂臺無關請道兄原為與你講和不是來對壘交鋒的可惜老道哥跑到擂臺下説和來了南俠一聽敢情我説合不是地方剛想解釋鎮東俠已然飛身上擂臺撲嗵跪在秋老俠面前秋兄千錯萬錯是小弟一人之過只請兄長原諒常言道人受一句話佛受一炷香堂堂的聖手昆侖鎮東俠也是八十多歲鬍子都白了的老俠客千人瞧萬人看趴在地給你磕頭殺人不過頭點地北俠是位忠厚長者趕忙曲膝一跪雙手一抱賢弟請原諒愚兄年邁張狂吧司馬南俠海川分頭把哥倆攙扶起來侯振遠抱拳當胸道秋老哥哥事情原委以後細稟你先帶朋友回鏢局小弟帶黃燦一定給你請罪北俠一擺手賢弟説得不對此事皆由潘龍所起罪在潘龍身上賢弟海川俠陪司馬道爺回鏢局愚兄帶潘龍前去賠禮北俠命令潘龍宣布擂臺完畢叫拆棚付款然後回鏢局秋老俠叫潘龍把上身衣服脫掉然後命其跪在自己面前老俠用手點指潘龍你和黃燦之交竟然見利忘義挑起爭端以至殺人流血為師要親自責罰秋老俠用荊條打了他四十脊杖打得鮮血直流又叫夥計捧著衣服用絨繩把荊條背在潘龍身上秋老俠恭請天下英雄一百多位陪同直奔金龍鏢局而來侯老俠他們回到看臺稟明王爺大家都很高興陪著王爺上馬回鏢局一路上海川細細地先稟王爺知道王爺心裏太高興啦來到客廳侯老俠跟王爺商量爺駕草民要打黃燦去請罪王爺直搖頭侯老俠本爵要為黃燦説句公道話此事黃燦無罪將來見秋老俠本爵要説清此事為好息事寧人也不能濫責無辜老俠客不要性急大家也認為是對的這時候下人跟進來稟侯俠客爺飛龍鏢局秋老俠帶所有賓朋押潘鏢主負荊請罪除了王爺以外衆人呼呼啦啦全起來了隨侯老俠來到門外恭候秋老俠道振遠賢弟潘龍有違師訓釀此大禍愚兄重責押來見賢弟請賢弟消氣你隨便責罰潘龍跪在侯老俠面前請叔父責罰侯老俠伸手相攙侄兒受屈了快起來撤去荊杖拿來好藥治傷然後又讓把衣服穿好叫道黃燦過來給你伯父磕頭謝罪黃燦精明沒等話説完遠遠地跪下往前爬爬到秋老俠面前伯父只要不生氣請伯父嚴厲責罰侄兒秋老俠把臉一沈你起來你跟你哥哥潘龍孩童廝守現在卻見利而忘義使無辜之人流血死去皆你二人之過他無事生非你也不是省油燈阿本應重責念你還是錯誤不大還不過去給你哥哥見禮黃燦過來向潘龍磕頭道原諒小弟吧是小弟的不對你大人不記小人過哥倆抱在一起都掉下眼淚黃燦給潘龍擦淚大哥當著咱們的老家兒説句良心話是怨你還是怨小弟只要你説這事怨小弟就叫師大爺狠狠揍我一頓潘龍臉兒一紅瞪了黃燦一眼告訴你賢弟這事全賴愚兄互相賠禮道歉表過不提王爺面帶笑容侯老俠客給本爵介紹下吧侯老俠對秋老俠道秋老哥哥這就是兄弟童林的東家當今萬歲康熙老佛爺第四皇子雍親王爺府的固山多羅貝勒爺秋老俠跪倒行禮爺駕在上草民秋田拜見王爺一伸手給抱住秋老俠你是聖朝人瑞盛世耆英久仰久仰後邊的全過來給王爺磕頭潘龍也請罪王爺請大家全坐好説秋老俠德高望重給他們兩造了結一下吧爺對這件事都親眼目睹請爺給了結吧你的口諭都要謹遵大家異口同聲請千歲給了結吧王爺點頭好吧本爵給你們説和一下略停片刻又道潘龍黃燦你們兩人仔細聽有説不對的地方你們只管提出先説你們倆誰是誰非在這件事上黃燦跟潘龍是從小弟兄黃燦開了鏢局潘龍要想幹就應親自找黃燦哥倆商量一同幹不更好嗎你一定單開一號想開鏢局到別處去為什麼還在一條街上開呀看來你是鬥氣黃燦在這件事上不錯不但沒有不樂意還給你挂紅隨禮這是第一次讓你黃燦包下魚帖你也去包魚帖黃燦再讓你這是第二次飛龍鏢局越境捕魚黃燦第三次相讓看來弟忍兄不寬才釀成大事潘龍你説是這麼回事嗎王爺説得千真萬確草民對不起兄弟不為賺錢只為鬥氣請爺罰吧哈哈哈罰你是一定要罰的你認了錯這事就好辦啦第一從明天起兩造鏢局暫不營業清理帳目黃燦潘龍各找兩個既公正而又能辦事的人把雙方有關鏢局的動産不動産折合銀兩如果金龍是十萬兩飛龍是八萬兩潘龍再拿出兩萬資本平均之後把飛龍金龍兩鏢局全經官府登出重新報為雙龍鏢局賠賺兩人各半利益均沾潘龍為總鏢主黃燦為副鏢主有關鏢局之事需二人商妥你們兩人樂意嗎黃燦趕緊答應樂意潘龍也答言道爺有所不知論言談我不如他論做買賣我也不如他請爺做主叫我兄弟當總鏢主吧潘龍你想得很好但我不那麼想你是笨些但你憨厚黃燦能幹習匕俠一抱拳道王爺的話都要照辦只有一個人不能要王爺一怔老俠説的誰呀就是白亮這個奴才王爺有所不知草民也不袒護潘龍對黃燦賢侄這件事每件壞事都是他出的主意真正罪魁禍首是他潘龍黃燦兩個人剛剛和好留這麼個害群之馬會把這兩個人給攪了王爺不能心慈阿本爵沒想到這個東西這麼可惡你想得周到把他轟了吧北俠叫人把白亮找來道白亮阿潘黃兩家之事都是你一人挑撥離間從中蠱惑的老夫有心致你于死地王爺心慈不忍從此鏢局以內除名來人哪把白亮趕出去不再起用白亮眼淚都流下來了道小子遵命説完抱頭鼠竄而去北俠抱拳請爺吩咐吧第一給負傷人員醫治一切花費均由兩號擔負因傷致殘者由兩號負責生養死葬撫恤家屬其子已成人者可以到鏢局幹活如年少者必須養到能自立為止無子無女者概由雙龍鏢局負責到底第二件黃燦潘龍打架鬥毆其原因就是你們倆都有錢俗話説叫鬧油兒我要訛你們倆出點錢在靈隱寺預備幾十桌席邀請在座英雄一同前往王爺又對秋田道秋老俠你是位德高望重的老英雄海川又是你的師弟衆位老少英傑都有江湖美稱借著你的臉面讓海川在北高峰上獻藝你給賀個號不知秋老俠和衆位意下如何秋老俠趕忙站起來道爺駕想得太周到啦我先代表振遠賢弟還有潘龍黃燦給爺道謝有你在就是一福壓百禍至於給我師弟賀號很是應當就煩爺駕的大筆先給寫兩塊匾將來他們倆的買賣一定興隆不知爺駕肯為其賜福嗎王爺大笑道老俠命筆本爵當仁不讓阿謝謝王爺賞臉秋老俠一招手潘龍黃燦洗淨了手拿過來上好的南宣紙研好濃墨也搭著王爺高興大筆一揮精神飽滿筆力遒徑勝過褚遂良不亞虞士南的四個字雙龍鏢局派人選木料請金石鐫刻各鏢局鏢主都過來給黃燦潘龍道喜正在這時候牛兒小子過來沖著潘龍黃燦一瞪雌雄眼你們兩個小子混蛋啦誠心餓我是不是黃燦道傻爺們這就開飯於是山珍海味水陸雜陳不外乎猴頭燕窩海參熊掌擺有十幾桌秋侯二老親自敬酒先從王爺往下采衆雄謙虛客套一爺番秋田正要跟王爺商量管花賀號之事簾子叭噠一聲響從外邊進來一個人海川一瞧心中暗自發怔這個人滿臉風塵進來給海川行禮然後往旁邊一站侯振遠一看是王三虎老俠向秋老俠長歎一口氣道秋老哥哥這就是跟了我一輩子的夥計叫王三虎他和白亮可不一樣心地善良他三次在黃燦面前勸黃燦不讓鬧事黃燦都聽了侯老俠把當時的事情一説秋佩雨很感動這是好夥計叫潘龍拿紋銀二百兩賞給三虎三虎搶步上前謝老人家的賞跟著又給潘龍行禮謝潘鏢主釣賞潘龍下腰扶起來道三哥請起咱們以後一鍋掄馬勺啦有不對的地方你對我跟對黃燦兄弟一樣該説就説千萬別見外王三虎單腿打跪謝謝鏢主看得起我我一定盡心竭力張鼎張老俠把王三串叫過來道老三你從哪兒來呀王三虎沒敢説話張老俠一擺手説吧沒有外人小子已經探出盜寶欽犯落在什麼地方啦於是他詳細説出跟蹤的經過前面説過張老俠爺兒四個請南俠誤入飛龍觀打跑了喬玄齡韓寶吳志廣逃跑啦追到三岔河口二小跳水潛逃張子美打發王三虎跟蹤密訪王三虎是個老江湖緑林道之事他頗有經驗三虎出飛龍觀恰好陰雲散去露出皎潔星斗他來到三岔河口順水路往西北方向走仔細觀察這時候天光大亮他發現一灘浮水印三虎瞧了瞧有不少泥腳印嗷賊人是從這裏出來的跟著再往北又發現了一片泥腳印兒看來又是一個賊人從這兒出來的再往前走沒多遠有片樹林三虎進樹林蹲在樹根兒底下稍微休息一下四處張望想看出點痕迹來判斷這三個賊人逃往哪一方突然間他發現幾棵小樹上架著三根青竹竿阿王三虎明白啦原采這三個賊人前後上岸在這兒碰面了這三根竹竿一定是晾衣服的想到這兒三虎站起來走出樹林查看腳印兒往北了他跟著下來可是一人大跺腳印兒就看不到了走出有三十多裏路到了辰時左右來到一望無際的太湖附近眼前有個村子足有五千戶是個大鎮甸東西一條大街南北鋪面房村口外路南一大片密樹松林樹林北面緊靠道邊上有個菜攤兒四根竹子腿支著一個薄板兒的案子上面蒙著白布長單兒兩邊兩條長板凳樹根底下蹲著兩個木桶的清水桌子東頭有個很大的壺碗架兒一摞摞地茶碗扣著還放著一大筒茶葉一個鐵架子生著火上邊有一把大銅茶壺一個五十多歲的老頭兒系著藍布圍裙盤著小辮兒手拿芭蕉葉兒貓著腰兒呼達呼達地扇火三虎覺得口幹舌燥也有些渴臉沖南坐在凳上喊老掌匱給我來壺茶哎客人照顧你別急水還沒開哪候一候吧老頭兒拿扇子緊著扇一會兒水開了老頭把芭蕉扇兒插在脖子後面拿個大瓷碗放上葉子然後泡好端到三虎眼前三虎給了茶錢嘴挨著碗邊兒慢慢地吹著好叫它涼得快這時候從村裏走出一個人來手裏提著一個大竹籃子裏邊買了不少的萊往菜攤走來從三虎身後到了茶攤的東頭道掌匱的給我泡一碗兒好吧老兄弟菜又買好啦一天一趟掌匱的話惹起這位的心煩用竹籃子往薄板上猛地一蹲叭嚓王三虎這個樂兒可就大了因為他在碗邊兒上正吹呐這籃子又有分量用力一蹲案板一顫茶水濺了王三虎一臉他一捂嘴噌地一下蹦起老高來掌匱的跟這位提籃子的都嚇壞啦全都跑過來對不起燙壞了吧掌匱的又端上兩碗來放好提籃子的叫張二是王三虎的把兄弟認出王三虎道兄弟不咋吧你這些年都在哪兒混啦別提啦咱哥倆分手之後我也是各處奔波勞碌你的買賣怎麼樣可以你們的瓢把子還仗義嗎還行你們這兒混得住嗎不瞞三哥説水旱營生山裏也十分富餘總瓢把兒有名嗎大有名焉都是雲南狐兒山鐵善寺的門人弟子大寨主姓羅名烈字焰光人稱紫面龍君二寨主姓何名豹表字躍山人稱病獬豸三寨主姓彭名沖字伯言人稱分水忽律都有萬夫不當之勇兄弟你出山幹啥來啦唉是這麼回事兒大寨主夫人馬氏是湖南沅江金