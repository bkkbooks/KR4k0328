輪常轉順著山門往裏看一溜一溜的蒼松古柏這是一座幾百年的古剎山林阿那些大樹幾個人都摟不過來正居中是一條方石甬路一直從山門這兒往裏走就到了頭層殿的穿堂殿大阿大傢夥兒來到山門這兒老少群雄可就進了山門了進山門容易出山門可就不容易了這是虎穴龍潭阿兩旁邊兒的配房很多這個廟八裏地方圓確實是一座大廟等來到這頭層殿的穿堂殿正居中的大肚彌陀佛前頭擺著五供蠟扡兒祭祀之物左右兩根柱子上頭有一幅對聯上聯寫大腹能容容天下難容之事下聯配的是見人便笑笑宇宙可笑之人當中有一個紅橫批黑字金堵頭兒四個大字是皆大歡喜哎喲這大肚彌陀佛塑得跟真人一樣栩栩如生自來帶的那麼樂連王爺瞧著都好老少群雄從大肚彌陀佛旁邊轉過來後面是韋馱神護法韋陀合掌打問訊上頭架著八稜紫金降魔杵身體高大真有個相兒打這韋馱神眼前頭的門順著臺階下來是東西兩配房鐘鼓二樓等來到北殿還是穿堂殿這個穿堂殿裏頭就是魔家四將又稱四大金剛這四大金剛就是風調雨順栩栩如生拿著寶劍的這個劍鋒代表著風拿著琵琶的就是調弦所以代表的是調拿著雨傘的代表著下雨第四個拿著一條小長蟲其實這種東西叫曲蟺又叫蚯蚓也就是諧著這順的音風調雨順過了四大金剛的穿堂殿再往後可離著三層殿就很近了院裏也都栽種著蒼松古柏很多的花草當中的甬路東西的配房一邊七十二間這就是鐵善寺弟子練功站樁的地方了屋裏頭的那塊地都站進很深去東屋裏是五十四式西屋裏是五十四式都畫在牆壁上這是人家鐵善寺的獨門拳腳一百零八招的鐵蝠拳一人一個樣什麼姿式全都有這還不算還有一些專門畫的是各種不同的兵刃內外家全有詳細極了再往裏走正當中的這層大殿裏是十八羅漢也都跟真人一樣每個羅漢頭裏都有個小香爐點著香爺兒幾個瞻仰一番由這十八羅漢堂再穿過去東西兩道大院兒兩個月亮門月亮門上頭東邊是東來院西邊是西來院這裏住的都是外來的僧人十方住十方常修嘛到這兒挂單吃飯的僧人你得有衣鉢戒牒和三寶你得受過戒腦門子上得有三塊疤拉還有六塊九塊最多十二塊的這不簡單呀僧門裏的百丈清規十分嚴格就説到了齋堂屋裏有五百個和尚在吃飯你從門口過往裏面聽跟沒人一樣筷子不碰碗碗不碰齒誰真的有了響動齋堂有師傅馬上把你叫過來跪香你甭吃這飯了大家從三世佛的殿前頭轉過去到殿后頭哎喲大雄寶殿前地勢寬闊東西配殿都有十五間門面前出一步廊懸燈結彩東殿的大殿門開著也就是來的人可以把自己的行李包裹東西放在殿裏後窗戶開著很涼快東廊下設擺了很多桌椅只有一個人叱海金牛於恆在那兒坐著呢西配殿廊沿下人很多都是鐵善寺請來的大家那兒吃著點心喝著茶高談闊論山南海北聊著有僧衆侍奉當中是個大月臺這個月台頂上頭有天棚月臺的南頭是一個古銅的大香爐這個月台四丈寬四尺高周圍是石頭條石的幫兒當中是土的顯得十分結實在這上頭動手太方便了往北邊是倒下的台階有一個香池子新砌的説是薰香就在這裏頭老俠侯振遠明白要動手阿可能就在這上頭這個上頭有硬架天棚罩著整個院子在月臺的正當中頂上頭是個八角的天井周圍有鐵絲網著擰成了花兒圈著裏面鑲著玻璃窗一扇兒一扇兒的好像是個氣眼這可也不小呢往北大殿看前出一步廊斗拱重簷好巍峨的建築畫棟雕梁阿挂著蝦米須的斑竹簾已經卷起來了爺幾個往裏看迎著北山牆是神龕當中塑著釋迦牟尼佛法相莊嚴手一個指天一個劃地黃雲緞子的幡門撩著香煙繚繞有個翹頭的大供桌古銅的五供蠟扡兒還有一個大銅磬一隻胳膊粗的大磐槌兒又叫王花棒在蠟扡上的銅圓盤裏放著喝這大殿裏的地方十分廣闊靠牆邊的經箱經格子很多裏邊放著各種經卷供桌的前邊有兩把硬木太師椅椅帔椅墊都是黃雲緞子做成上面坐著兩位堂堂正正的大和尚
