body:
  text: 第二十九回亂中亂雙猛攪重陽強中強群俠看和尚上回書説到杜家兄弟到王老實家裏來問為什麼張有義在漂母河一帶如此欺壓鄉鄰王老實告訴哥倆就因為他兒子張政在淮安府當紅筆師爺方圓百八十裏誰敢惹他張有義呀那你也得告他呀憑白無故地占了你二畝地你一共才幾畝地呀你還吃什麼這麼辦吧我們給你出個主意告他去架不住杜勇杜猛老是鼓動王老實告狀王老實就寫了一張呈子在淮安府把張有義告了不料想張有義連城都沒進城裏就下來差人把王老實抓起來張有義的兒子張政使了個手段硬説王老實借了他家的錢二畝地不夠還得再給他三畝地王老實惹得起嗎連堂都沒過就下了大獄了杜勇杜猛知道這件事後哥倆覺著對不起王老實杜猛説哥哥咱們把練武的小兄弟們找來到村邊大樹林等他他這兩天去淮安府咱們劫住他讓他寫下字據把地還給王老實如果他不退地咱們就揍他也解恨呀小哥兒倆想問題太簡單顧前不顧後他們便和本村的十多個小夥子準備好紙筆墨和小桌子連同打人的棍子都準備好了打聽到張有義明天就去淮安城便躲在樹林後等著果然太陽老高的時候張有義騎著菊花青大騾子穿得很闊飛揚跋扈出了于家莊一直北奔淮安府剛走到樹林邊上杜勇杜猛帶著人出來了張有義一攏絲韁説道喲爺兒們這這是幹什麼有話好説杜勇一瞪眼張有義我是你祖宗走到樹林裏邊去老地主嚇傻了哎別呀我們都是鄉里鄉親的有什麼事直説吧杜猛一揪他你下來吧一用力把老頭子給揪下馬來這群小夥子連捏帶打推推操搡就把他弄進了小樹林張有義害怕了一個徑兒地央告哎喲哎喲得了老少爺們鄉里鄉親的饒了我吧他再一瞧不對徑兒呀這小桌上放著紙硯筆墨旁邊放著二尺四寸長跟雞蛋那麼粗的小木棍有二十多根這是要宰我呀杜勇一指張有義有這麼一句話土居三十載無友不親人你祖上也是在這埋的都是鄉裏鄉親的我問你兔子還不吃窩邊草呢你怎麼老虎盡吃回頭食呀王老實這人有多老實家裏多窮哇你占了人家的地告你不應該嗎可你借著兒子的勢力欺壓良善你太可惡了今天我們弟兄幾個要管教於你非打你個腿折胳膊爛不成張有義嚇得直哆嗦臉色也白了剛才那頓連推帶掇就夠他受的了他説好聽的各位爺們我錯了我不應該欺負王老實你們讓我到府裏托個人情把王老實放回來杜勇一擡手啪一個大嘴巴給張有義的槽牙打下兩顆來別廢話你看看這兒有筆墨紙硯你來寫個借字兒吧寫上某年某月某日借王老實紋銀兩千兩不但給王老實還了那幾畝地還得還王老實紋銀兩千兩怎麼樣你簽字畫押我們也不怎麼你如果你不寫那麼你想活著出這個樹林子就比較費徑了杜猛生氣呀得啦別跟他廢話來個開鍋爛吧弟兄們打呀杜勇説別打讓他趕快寫完到府裏把王老實給放回來如果他不答應咱們再給他來個開鍋爛張有義把苦膽都嚇破了好好我答應我答應便哆哆嗦嗦來到桌前拿起筆寫了一個借字借王老實銀子兩千兩怎麼個利息怎麼個歸還全寫好了並且把押也畫上了得我們也不難為你了你滾吧回頭把王老實放回來張有義上了騾子抱頭鼠竄出了樹林一路上魂不附體一直跑到淮安府衙門口把騾子拴好就往裏跑官人攔住站住諸位我叫張有義我兒子叫張政在衙門裏當紅筆師爺嗷張師爺進去吧等來到張政的屋裏張政一看他爸爸來了忙問爸爸你怎麼這樣兒出事了張有義泣不成聲地説道杜勇他們把我弄到樹林裏讓我寫了借字兒説讓我還給王老實的地和二千兩紋銀還得把王老實給放出去孩子你可得給我作主阿不然我們沒法在於家莊住了張政一聽臉就沈下來了説杜勇杜猛是什麼東西竟敢在太歲頭上動土老虎口邊拔毛好哇那借字沒用我趕緊找人把他們都抓起來今天就幹爺兒倆商量好了萬沒想到屋裏有個書童叫方車也是于家莊的人他聽説要害杜勇他們心裏很著急因為他跟杜勇他們是好朋友他暗暗合計著借了個詞就跑回家裏來到杜勇他們家忙説快跑吧他們就要來抓你們了杜勇不在乎我這有他的借字這借字一點兒用都沒有快跑要不就沒命了杜勇也害怕了好吧你先回去方車回府城了小哥倆收拾東西還通知各位趕緊跑他們來到漂母河見到了於恆牛哥哥我們走了你自己保重吧從這裏便和於恆分了手張政帶著人跑到莊裏這些人全跑了後來王老實倒是給放回來了可他的地全歸張有義這事也就不了了之了杜勇杜猛回不了家身上雖有幾個錢但也得靠打把式吃飯離開淮安南下經過幾省來到雲南昆明地界的懶龍溝聽説這有個燒窯的山場窯場的頭兒是有名的活閻王叫楊豹手下管著三百來人他們倆也補了名字下了窯時間一長他們才知道楊豹這傢夥重利盤剝欺壓工友喝衆人的血要不叫活閻王呢杜勇哥倆在這補了名字下了窯吃大鍋飯一天二十四個工錢可剛幹了十來天楊豹説杜勇響你幹了十天了你得用錢吧我借你點錢都是窮苦人誰不想用錢杜勇説好楊總管你借我五吊前後借上這麼十吊就利滾利了一天二十四個錢扣上吃飯錢十二個再扣你的利息再加上什麼剃頭打辮子錢得再幹上兩月你就欠他的錢了到了年底這些工友都寒心啦仨一群倆一夥的議論二哥你不想家嗎我想我媽媽老人家白髮蒼蒼的本想到窯上幹幾個月掙幾個錢帶回去讓他老人家湊合著吃飯可到了年底算盤子一響我還欠楊頭兒的錢想走都走不了真讓老人家白髮倚門望穿秋水柱子你怎麼了我想我媳婦本來我們小兩口一個孩子還不錯可是出了一當子事跟人家借了錢利滾利利套利我這輩子都還不清我説我到窯場幹活兒掙倆錢兒回去還帳哪知這錢也不好掙阿媳婦孩子想我呀杜勇杜猛這一瞧呀就勸説道你們別哭了哭死了也沒有用呀其實我們哥倆也短他的錢但這楊豹太可恨太狠毒喝咱們窮人的血呀那怎麼辦呢你惹得起他呀杜勇想了想就説咱們要想不受氣就得惹惹他只要人心齊咱們就殺了他你們誰把他殺了就算我杜勇幹的一位年紀大的工友可就説話了你呀來到這山場的日子不多其實弄死楊豹我們白弄宰了他往山澗裏一摔咱們再選個頭不就完了嗎可楊豹胳膊粗上面有人支援咱得罪不起呀杜勇一聽嗷是這麼回事阿好吧既然大家都有仨好的倆厚的咱們串到一塊好好商量商量再來殺他好你要敢宰了他我們大家舉你當頭兒杜勇説頭不頭的好説只要咱們把楊豹殺了可以喘口氣賺倆兒錢捎回家去我們就不白賣力氣了但是大傢夥兒必須心齊大家商量好以後每人都帶著錘子舊衣爛衫的直奔西去就到這窯洞了楊豹一看喲夥計們都來了杜勇過來可説楊豹我們大夥有幹的日子多的有幹的日子少的幹來幹去都為你一個人幹了大家都拉家帶口的不容易你不讓我們活我們也不讓你活楊豹兩眼一瞪目露凶光怎麼著你們想幹什麼想幹就在這兒幹不想幹的話還清帳目就給我滾杜勇你想在這兒挑事嗎楊豹説著就往杜勇跟前來了杜猛一聲沒言語繞到楊豹的後頭一輪鐵錘哢地一下子就把楊豹的腦袋給打裂了緊接著大家譁一下上去全都舉起錘子劈哧啪喳往下砸好嘛把楊豹砸成一堆肉泥爛醬了大夥兒還不解恨杜勇杜猛過來攔住成了大家起來把這尸體收拾收拾往山澗裏一扔血迹打掃乾淨咱們湊在一塊兒商量商量以後怎麼辦吧工友們坐在一起互相嘀咕有人説了杜勇這眼中釘肉中刺是你們哥倆給拔的主意是你們出的我們大家就公舉你們哥倆當頭了杜勇也義不容辭好公舉我們弟兄當頭兒成阿明天咱們往總匱呈報就説楊豹掉在山澗裏頭摔成肉泥爛醬連尸首都找不到了另外你們大家公認我們哥倆當頭有三件事咱們得説清楚頭一件咱們這兒一共多少人每個月大匱上收貨發錢錢下來咱們人頭份均攤不像楊豹那洋每天一人二十四個錢剩下的全裝他腰包了工友們説頭兒我們出個主意吧你們倆人每人兩份我們大家每人一份三百個人再公舉出十個小頭目來考勤每個小頭目多半份那樣我們每人也比現在掙得多了你看這頭一件這麼辦好不好杜勇杜猛一聽行阿就這樣反正有什麼風吹草動的我們哥倆頂著第二件事我們三百兄弟就勢趴地下磕頭搓土為香結為金蘭之好拜把兄弟從今以後有福同享有難同當誰也不準跟誰起歹心不管是窯上還是窯下都是兄弟同甘苦共患難行阿我們都同意第三件每個月咱們擠出二十人來這二十人的錢大家給他湊讓他拿錢回家探親他們回來後下月再走二十咱們一個月一次你們説樂意不樂意頭兒哎你想得真周到咱們就這麼辦了大家商定好後就按計劃往總匱一報事情的經過立舉薦杜勇杜猛當頭上面也就同意了哥倆就這樣幹上了有回淮安那兒去的也托人帶個信兒打聽打聽家裏到底怎麼樣了可是始終沒有準信呀這麼一晃就十多年懶龍溝這個事可是越來越興旺大傢夥兒又訂出制度來每月初二十六吃犒勞今天初二就吃燉牛肉犒勞大家沒想到傻小子於恆到懶龍溝爭肉打架杜勇吃驚地道哎喲牛兒哥哥是你呐傻小子於恆把兩個兄弟抱住五兒六兒真沒想到從你們跑了以後這麼多年也見不著你們兩個我還以為你們二人死在外頭了沒想到你們二人還活著傻哥哥心裏難過牛兒哥哥當初我們那件事情怎麼樣了這我不知道杜勇杜猛想起來了我這牛哥哥是個半憨子便説道哥哥別在這兒呆著了跟我們到窯洞去吧好些人都過來問頭兒這個人是誰阿我們還指望著讓你給報仇阿結果你二位跪下磕頭了我們這些人好多讓他給打壞了劉三頭兒的指頭讓他給咬下兩半截來靳師傅給扔肉鍋裏了我們還怎麼吃阿杜勇看了看大家連忙抱歉地説諸位真對不起這是我的親表兄我們哥仨十幾年不曾相逢見面了沒想到在懶龍溝見著了諸位看在我們的面子上受傷的趕緊先上藥今天咱們就歇工了歇工的工錢由我們哥倆給大家補償一會兒再派人買肉重新燉牛兒小子一聽等等我不怕髒把剩下的一鍋肉歸我吃杜勇笑了哈哈不要緊多買幾十斤肉給我牛兒哥哥屹來吧你跟我們到窯洞去吧這樣哥仨才回到窯洞等哥仨進了窯同杜勇就説牛兒哥哥你這一身衣裳都碎了傻小子點頭這不都是在這兒用石頭塊砍的嗎杜勇想了一下這樣吧給你做身衣裳説著就派人進來給傻小子量量尺寸也還按照這土黃布褲子左大襟白骨朵鈕子的樣子趕緊重新制做哥倆伺候著傻小子擦臉漱口喝茶牛兒小子直舔嘴唇我餓呀好等一會兒就吃表弟你瞧哥哥我這狼狽呀杜勇忙問是呀牛兒哥哥我們多年沒見面了你這是從哪兒來呐我們哥倆剛才都沒認出你來可你還認得我們倆人你們倆人五兒六兒我還認不出來嗎是呀我們小名你都記著呐你往雲南幹嘛來了牛兒小子一言難盡呀只道嗨別提了猛英雄于恆就把自己在淮安府怎麼跳河摸魚怎麼碰到老師怎麼學的能為怎麼在鏢局裏當差等等的事情凡是能想起來的陸陸續續慢慢地都跟這兩位表弟説了一直説到現在的鐵善寺傻小子的話他們倆都懂就聽傻小子問你們知道鐵善寺離這兒還遠嗎杜勇説不遠啦還有幾十裏地我就是要在九月九到鐵善寺找我林兒哥哥去的