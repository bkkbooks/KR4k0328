北面的樹林有人説話海川海川你跟良兒怎麼在這裏呢打樹林裏出來倆老頭前面走的銀面仙猿鐵臂昆侖石金聲後頭跟著金頭壽星洪勳爺兒四個見面行禮海川把昨天的事情都説了我們上這等環兒來了可直等到現在沒見環兒蹤影噯這個孩子很任性大人也很惦記準知道你們到七星山來讓我們哥兒倆來追你們海川呀咱們爺兒四個回去吧不管小冤家了哥哥這可不行咱們已經到了七星山無論如何咱們也得進趟山到山裏探尋一下再回去我們爺兒倆正看呢不知道要不走山口這七星山有沒有道路老哥哥咱們破得了七星八寶轉心亭破不了咱們只暗暗地先看一看你想咱要直呼直令走人家山口萬一虎頭蛇尾叫七星山段氏弟兄恥笑我兄弟無能石老俠點點頭海川又問洪老哥哥他後山可有一條道你知道嗎知道叫臥虎灣石老俠也説對了我當初給王環打聽他父親的時候我就是從臥虎灣走一線通進去的事不宜遲咱們爺兒四個要去還走這條道不過難走一點石老俠帶著路順著臥虎灣進來爬上了山就是那條大繩然後走一線通進來以後站在高岡之處往東南山看才發現了七星八寶轉心亭哥哥阿七星八寶轉心亭就在眼前不錯咱們瞧瞧去兄弟瞧可以不能妄動這麼著爺兒四個就來到七星八寶轉心亭下阿周圍的燈光裏面的燈光照如白晝三層滴水簷巍峨壯觀夜晚之間看著就更凶海川瞪著眼就要進去老俠石金聲一攔你先等等不是跟你説了嗎不準妄動哥哥咱已然到了這兒咱不能不進去金牌就在裏面咱們得設法得金牌呀對如果段國基段國柱知道像你弟兄這本事隨便出入七星八寶轉心亭得金牌那我就問問你他還跟你打賭幹什麼既然打賭他就知道你我弟兄的本事進不了七星八寶轉心亭人家才跟咱打賭你進去進去也得死海川也説我不進去老哥哥那咱們就耗著耗到一個月該怎麼辦呢醜媳婦難免見公婆哥哥不入虎穴焉得虎子那咱們也得幹呐石老俠搖頭那不行你我弟兄得有今日誰能怕死死有輕於鴻毛有重於泰山輕生喪命不是真正的英雄那是蠻幹這不是瞎鬧嗎洪爺也攔石爺也攔海川非得要進去不可司馬良在旁邊過來了師父二位大爺我看我有個萬全之策咱們爺兒四個把扎腰絨繩全解下來繩子頭接繩子頭咱們接成一根長繩一根二丈四要四根呢那就九丈六呀咱們這繩子結得實實的在徒弟我身上繞一繞我在頭裏走老哥兒倆在後頭揪著繩子師父你在旁邊看著點萬一有了危險你説一聲拉老哥兒倆一繃徑把我就能拉出來你看這法子行不行石老俠搖頭不行因為什麼不行等我們發現了問題了一喊出來我們再把孩子拉出來那孩子早就涉險了加點小心就是了行石老俠只好答應哎好吧這樣爺兒四個的絨繩都接上讓司馬良把長衫脫了好利索一點海川給拿著讓洪大爺把虎頭墨鱗刀借給司馬良司馬良把刀拉出來刀刃沖前刀尖沖下老哥兒倆繃住繩子盯住海川司馬良慢慢往前走後頭繃住繩子跟著走來走去就走到臺階這裏一點事沒有司馬良拿著虎頭墨鱗刀的虎頭墩著石頭臺階司馬良上右步往下踩一踩這石頭紋絲不動上了第一層然後拿這虎頭墨鱗刀觸第二層嘣嘣嘣聽聲是實的了然後左腳單腳上去加力往下踩踩住了確實不錯左腿收上去海川在旁邊瞧著真麻煩何必呢一拔腰噌地一下上去不就得了嗎這樣一蹬一蹬往上走再往上就七八九蹬就差不離上來了人都是這樣開始注意越來越不注意拿虎頭墨鱗刀墩兩下上右步左腳就跟上去了一踩挺實著左腳就跟上去了就在這第七蹬上墩兩下就跟上去了石頭臺階猛地這麼一立人在上頭從外手往裏手這麼一翻呢那麼你這人還不是滑溜下去嗎唰地一下就到司馬良的脖子了海川一喊不好石洪二老就唰地一下一繃繩子就把司馬良從臺階裏頭給拉上去了等老哥仨到跟前一瞧哎喲嚇得三俠都不敢看了怎麼回事呀都是二寸的大青蠍子把整個人包了起來海川拿大褂往下捆老哥倆劈哩啪啦地用腳踩最後全踩完了抖了抖褂子褲子確實沒有了再看司馬良全身浮腫氣如遊絲就這麼一點呼吸之氣了海川喊了幾聲司馬良不聲不響石金聲説兄弟你還喊呢喊有什麼用快走老俠石金聲這麼一伸手把司馬良就挾在肋下洪勳洪老俠把刀拾起來絨繩解開完全都分好各人系上剩下司馬良的繩子和大褂海川手裏頭一攥沙沙沙老三位可就出來了他們由一線通穿過去老俠石金聲真有辦法來到這斷壁之前先讓海川下去然後老俠石金聲把這大繩提上來把司馬良捆好又給放下去然後老哥兒倆才從上面下來海川又説哥我抱孩子吧不還是哥哥我來吧這段路不好走出離臥虎灣來到這山下海川呀孩子中毒十分危險要從這回太原府起碼有六七十裏路的路程可太遠海川咱們這就近就是耿家莊近十幾裏地別處咱們不熟好就奔耿家莊這麼著老哥兒仨就帶著孩子奔耿家莊了到了耿文家天已經大亮了耿文一見司馬良昏迷不醒渾身浮腫嚇壞了説道哎喲就叫蠍子蜇得這麼厲害呀俗話説一個蠍子蜇了不要緊兩個蠍子蜇了不得了三個蠍子蜇了三鈎子人就有性命之憂我看事不宜遲趕緊請幾位先生來王三爺馬上準備了車輛去請大夫不知司馬良的性命如何
