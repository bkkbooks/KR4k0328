body:
  text: 第四十七回北口外丟鏢結義氣護國寺收徒惹是非上回書説到四劍客三次試絶藝海川從清真寺告辭出來往北低頭而行想起清真寺四位前輩比試十分驚險這篩海爺的點穴銅鐝尚且不翼而飛看來武林的高人太多呀趕緊回家吧猛然迎面有人叫他師父海川一看正是大弟子穿雲白玉虎劉俊海川忙問俊哥兒你來幹什麼劉俊行禮然後站在旁邊師父你快回家吧有位教師爺來咱家把我師弟們都打啦還在家裏等候你呐海川一聽這是怎麼回事看佛敬僧我童林有什麼不對的地方你也應該等我回去呀為什麼趁我不在家的時候投井下石把我徒弟都給打了這太不像話劉俊呐怎麼回事師父咱們爺兒倆一邊走我一邊告訴你得了爺兒倆一邊趕緊往前走一邊急著談事情穿大街越小巷趕奔雍親王府自己的家劉俊把事情談了海川一聽恍然大悟這幾天海川不是常往外來嗎三出前門呀這徒弟們當中不一樣楊小香楊小翠洪玉耳孔秀甚至於鐵羅漢吳成這些人都能安下心來跟著師哥練功可是第一個不安分的就是這個夏九齡他總愛惹事還攛掇司馬良咱們來北京這些日子了你我都是江南人北京的五壇八廟皇王腳下咱們都沒逛過説真的師父今天不在家咱們逛逛去司馬良搖頭説你呀省點兒事吧別讓師哥為咱作難了師哥不依咱吧好像做哥哥的管咱太緊又不是咱師父依咱吧到外頭你就不同自己了萬一出點什麼事師哥為我們受責依我説呀好好地練功吧師父的能耐咱們要下徑學呢二哥練功也不在這一天吧真是的再説咱們也沒間著師兄弟從功夫上比一比咱也不落在別人後頭我們素常素往也是刻苦用功嘛今天趁師父不在家我們出去玩一玩看一看逛一逛很快就回來師父也不知道架不住夏九齡死説活磨呀時間一長司馬良到底讓夏九齡説服了他倆從幾歲上就在一塊每次都這樣司馬良就得歸順這回又成了順民小哥兒倆收拾好了來找劉俊劉俊問你們倆幹什麼去趕緊到場子裏練功九齡樂呵呵地説師哥我們跟你提點兒事我們從揚州來到北京這麼長時間淨練功了師兄和師父督促得嚴不得空間我們哥兒倆今兒打算逛逛大街去一會兒就回來師哥你給我們遮蓋著點兒師父來了你別提可以嗎二位賢弟呀這不是讓哥哥我為難北京城藏龍臥虎別説咱哥們歲數小但都有一手好功夫萬一你給師父惹點兒禍就對不起師父當然師父收徒弟一場還怕惹禍嗎但咱們要讓師父為難就不算孝順的弟子師弟呀你們兩人還是好好練功得啦讓你們去了哥我怕你們惹事你怎麼也這樣説呀咱只是沒上過北京想開開眼不管到哪兒眼睛不睜開有什麼事咱們只當沒瞧見耳朵塞上點兒白蠟塊兒聽見什麼信兒了咱們只當沒聽見師哥你給我們一會兒假得了兩人這麼一磨劉俊也想我這做師哥的人家又先進門夠尊重我的了應當讓師弟們去活動活動劉俊便説好吧給你們點兒錢夏九齡馬上拉住説我們哥兒倆都有這你放心得了哥兒倆高高興興地打府裏出來了小香小翠玉耳這仨都噘嘴小香嘟噥著説兄弟呀你們哥兒倆都去了不帶著我們其實玉耳倒挺明白五個人一齊走要了命師哥也不會批準去倆還能湊合他們哥兒倆出去沒事過幾天咱們再告假哥兒倆出來以後上哪兒呀離開王府到富貴巷就發愣了京城地方太大走到成賢街口由南往北過來一個老頭一拍兩人的膀頭二位少爺我也在柏林寺住咱們是街坊你們不是雍親王府的嗎是呀大爺你們倆怎麼出來了老大爺我們沒逛過北京城因為我們是揚州人離這兒太遠你説北京城哪兒的集市最熱鬧什麼集市呀你看我們鄉下都有集市嘛做買做賣賣什麼東西的都有呀嗷你是問這個呀老頭十聽哈哈笑道北京可有大集我告訴你們初一天齊廟初三土地廟初四花市集五六白塔寺七八護國寺九十隆福寺哥兒倆一算計今天正是護國寺夏九齡便問哎老大爺那我們跟你打聽打聽怎麼走呀默默兩位少俠客你們出成賢街西口往南過了後門橋走龍頭井斜著往北奔定阜大街到定阜大街遠遠地就看見護國寺了小哥兒倆聽完老大爺的話道了謝就奔著那條道走去了一路之上繁華似錦這是都城阿等來到定阜大街遠遠地望見了護國寺這是個大廟呀來到大門口善男信女燒香還願的人很多人群稠密擁擠不堪山門都開著上頭有一塊匾額書寫著敕建大隆善護國寺幾個金字小哥兒倆也跟著人群進去啦頭層殿完全都是針篦棚兒什麼是針篦棚兒就是賣針的賣篦子的那年頭單有這麼一種人男人群裏不走女人群裏打晃晃上一眼下一眼品頭論足偷看婦女瞧著這些人小哥兒倆就覺得彆扭但小哥兒倆不敢多説話再説哥兒倆出來是師哥特意恩準的我們不能給師哥找事更甭説師父了這麼著小哥兒倆可往後走來了來到二層殿這裏都是説書的唱戲的打把式和賣藝的還有摔跤的三層殿都是賣花的賣煙粉的再往後四層殿熱鬧極了小哥兒倆逛得口幹舌燥便來到西邊的塔院這裏人也不少前面有個大茶館盛友如雲高朋滿座夏九齡説二哥我走得挺渴的你渴了我也早渴了咱喝點茶去這樣哥兒倆來到茶棚找了一張桌坐下夥計趕緊過來拿著茶盤子問道二位少爺喝點什麼茶你自己帶茶葉了嗎沒有帶著你隨便給來點兒茶端兩盤幹鮮瓜子就得時間不大人家把茶沏好了端上來瓜子也端上來小哥兒倆一邊喝著茶一邊嗑著瓜子高高興興就在這時候旁邊有人説話哎呀這兩天我高興得沒法説了你知道我為什麼高興呀我不知道呀告訴你練完了功以後你們全走了師父不讓我走讓我收拾場子搬搬板凳擦擦軍刃多幹點活兒我有心不願幹幹嗎我練功還管這個呀敢情師父暗中都教給我絶藝了這絶藝這兩天練得這熟阿我想施展施展可惜沒有對手你知道我這絶藝是什麼我哪兒知道你這絶藝是什麼練練我瞧瞧哎呀哥哥我不能練呀我要一練叫你學會那怎麼行阿這絶藝是祕不傳人的兄弟這話説遠了前些日子你知道師父讓我完了事不叫走叫我收拾收拾東西然後師父把我叫到屋裏已經提前教給我絶藝啦哈你知道嗎喲真的師哥你學的什麼絶藝啦你練練我開開跟可是師父也跟我提了不讓我到處邊顯耀兄弟你不是外人這樣吧我先練練你瞧著接著你再練好吧司馬良夏九齡在旁邊一聽就明白了練功的一看這二位都是四五十歲穿著打扮也跟別人不一樣這兩人都穿著白綿綢的汗衫腰上沒扎繩兒大褂在邊兒上放著腳底下是螳螂肚的靴子靴子上頭扎著五毒蜈蚣蛐蜒蠍子全有再往這身上看兩人的身板挺好都是新剃的黢青頭皮五股三編小辮兒盤在腦瓜頂上在太陽穴這兒辮穗兒搭拉下來兩道肉杠子小眉毛兩隻趴趴眼兒趴趴鼻子三角菱口一嘴碎芝麻牙一對錐把子耳朵青鬍子茬兒腦門上擠著好些個紅點都是什麼對大天呀閉十呀天杠地柱呀虎頭鑽九簍阿盡點的是這玩意左右太陽穴貼著兩貼太陽膏一貼藍紙兒一貼紅紙兒喝這二人長得狗性氣一瞧就不是好東西原來他們的場子就在塔院西北角的天亮門裏頭這有一片房子就是師父開的把式場師父教他們這倆一個叫王虎外號叫滾地雷那位姓趙名龍也有個外號叫淨街神他們都是吃倉的人在當地就是混混兒出來就橫著指著打架吃飯什麼打群架呀打瘋狗呀罵傻子呀踹寡婦門呀刨絶戶墳呀哄哄小媳婦大姑娘上廟呀一句話就是沾點兒小便宜幹點兒嘎咕事這會兒兩人又逞能呢王虎説哥哥我給你練練師父教給我的絶藝他説完了以後往這一站騎馬蹲檔式兩隻胳膊往前一伸齜牙咧嘴就這樣然後一調臉雙拳又往前這麼一伸默兩下練完了趙龍一瞧這叫什麼功夫這你不懂剛才那是老虎大張嘴絶藝呀嗷現在這下呢現在叫張嘴的大老虎專門吃人哪哈你這能耐跟我比起來可就差遠哩那麼哥哥你練練我瞧瞧趙龍站起來兩隻胳膊順著左右兩臂往前一伸跟著一轉身兩隻胳膊又伸出去了哥哥你這叫什麼我這也是兩招呀剛才那招叫一條扁擔那麼這招叫扁擔一條畦司馬良夏九齡這個樂呀夏九齡一仰臉兒嘎嘎地樂出聲了王虎趙龍一聽有人笑可就不樂意再看司馬良和夏九齡原來是兩個小孩一個梳著雙歪抓髻前發齊眉後發蓋頸一個梳著沖天杵的小辮眉清目秀齒白唇紅這王虎沖著趙龍一努嘴看見啦沾點便宜王虎説著話就過來了二位學生下學啦哥兒倆出來逛廟喝茶呀夥計茶錢回頭我候了這回王虎就得著苦果子了夏九齡啪一拍桌子你是什麼東西想找我們哥兒倆便宜用你候錢這茶還能喝呀喝茶小太爺有錢喝我們倆練功你們樂啥練得不好就興人樂練得好我們還要學呢可惜你們這老虎大張嘴張嘴大老虎人家老師父不過蒙你們點錢你們家也投供過文武聖人夏九齡這小孩夠損的你們家沒人讀過書沒人練過功文武聖人都不從你們門口走哎喲好小子竟敢揭我們哥兒倆的短兒哥哥過來拿你的一條扁擔揍他我拿我的張嘴大老虎咬他王虎説完奔前一趕步左手一晃面門右手的拳頭對準夏九齡就來了九齡一叼他的腕子坐在椅子上擡右腳啪一下踹在王虎的胸口窩上只見王虎噌噌噌往後一退咕嚓把旁邊那張桌子撞倒了茶壺茶碗呼啦啦全掉在地上他捂著腳捂著腿哎喲去了趙龍就奔著司馬良了趙龍往前一趕步舉起扁擔就打司馬良往旁邊一閃掄圓了胳膊給了趙龍虎一個大嘴巴頓時他這腮幫子跟炸龍蝦片一樣呼呼就鼓起來好嘛槽牙也給打活動了腮幫子也破了鞋也掉了哎喲他打了我了疼疼王虎剛起來趙龍又來個咕嚓小哥兒倆劈裏叭嚓把兩人打得王八吃西瓜連滾帶爬夏九齡憤憤地説你們倆要是雞蛋非把你們倆的黃給砸出來小子你們等著默説完兩人抱頭鼠竄噌噌增出了茶館西門奔西北角塔院那邊的月亮門鑽進去夏九齡司馬良站在那兒整理整理衣服兩人還怒氣不息夥計過來了得了二位少爺你把人也打了你們哥兒倆不是也給茶錢了嗎你們走吧我們這小買賣也是廟上才有這麼兩天買賣你別在這等著了他們不出來啦不他不是讓我們倆在這兒等著嗎我們就在這兒等著夏九齡一伸手掏出十兩銀子啪地就拍在桌子上了摔壞了你們茶壺茶碗我們賠把你的桌子砸壞了我們也賠他讓我們在這兒等著我們就等著帶著徒弟來也沒事領他師父來也可以這夥計一擺手道二位少爺怎麼能這麼説人家老師哪能辦這個事呀請問二位小爺怎麼稱呼你要問我我姓夏叫九齡人稱多臂童子這是我的哥哥復姓司馬叫司馬良有個外號叫玉麒麟提起我們倆來北京城沒有名提起我們的師父來在北京城大小有個名他是北城根兒愛新覺羅雍親王府的教習叫鎮八方紫面昆侖俠童海川譁地一下你就知道這童海川的名有多大會武不會武的黎民百姓逛廟的耳朵都支稜起來了北京大柳樹南京沈萬三人的名樹的影誰不知道呀堂堂雍親王府教習鎮八方紫面昆侖俠童林奉聖旨下江南拿二小請國寶威震江湖這得了嗎夥計的耳朵都給震響了哎喲二位小俠客爺要是那樣你得了你好鞋不踩臭狗屎剛才那二位是臭狗屎你二位走得了夥計要不是沖著你怕擾你的買賣我們非在這兒呆著不可既然你説這個好吧二哥咱們走吧説完夏九齡司馬良揚長而去其實塔院月亮門