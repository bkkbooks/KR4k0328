body:
  text: 第二十四回失信義九寨主喪命潛水中于老俠擒賊上回書説到地道逃走四寇鎮東俠和海川都十分震怒這二位最恨失信之人于老俠年高有德老成練達頗有涵養帶著這些人來到前廳于老俠仔細觀礁嗯不對頭哇金銀亂石島九家寨主全都換好衣服都是短衣襟小打扮絹帕纏頭手持利刃準備廝殺兩旁燈球火把亮子油松照如白晝嗆啷啷啷聚將鑼聲響徹雲天九寨主身後站著韓寶吳志廣陸寅陸豐腆胸疊肚吐氣揚眉于老俠一看騰地一下火兒就撞上來了我們三個人一夜之間破你達摩堂實非容易真可説費盡三毛七孔之心九牛二虎之力説良心話萬一打不開三俠名譽掃地像西方俠于成這一百零一歲的武林前輩怎麼出人家金銀亂石島到現在打開了賊人卻跑到他們身後頭去了不過老頭是説合人沈得住氣來到切近一躬到地馬寨主三孔獨角蛟馬彪一看人家來了臉兒有點發燒看來呀不怕沒好事就怕沒好人呐因為西方俠于爺第一次在船上跟他們九家寨主見面叫酒逢知己千杯少話不投機半句多當場動手就打上了劍斬了喬玄齡打走了羅威羅聲遠老俠于成戰死四魚後傻小於于恆於寶元又來了玉頂白鶴穀瑞一瞧就覺得這事可了不得本來西方俠于成他們幾個人就是猛虎阿再加上這麼一個天真浪漫的猛英雄他們的本事可太大了他跟大寨主馬彪商量哥哥先請他們衆位回去有什麼話咱們大家回山商量商量然後再説馬彪很聽穀瑞的話嗯好吧這樣才請三俠他們大傢夥兒回店派人再找羅威已經找不到了馬彪的心裏很難過他就這麼一個外甥把喬玄齡他們幾個人的尸體完全都葬埋了船上的血都擦淨了大家回轉大寨到船塢下了船順著三道寨門一直來到大廳吃完了飯哥兒九個坐下商量二弟呀你打發三俠走了這是怎麼個意思呀哎呀我的哥哥衆位賢弟西方俠于成聖手昆侖鎮東俠侯振遠跟童林他們仨多大能耐呀那是跟咱們上一輩的並肩人物你我弟兄的本領根本打不過人家箭在弦上不得不發寒拘著火了真的在戰船上這樣兒打下去咱們得吃虧你瞧來的這傻小子沒有以前咱總認為在大江之中咱們的水性最好可謂江中無敵手阿但這位傻小子多大的水性誰在水裏幹得過他呀明明咱們要打敗仗不如這個時候説句好話全師而退我想了個辦法跟你們哥兒幾個商量商量大寨主聽到這兒便問嗯賢弟呀你説吧把他們幾位請進來時間不大韓寶吳志廣陸寅陸豐全都進來了大寨主馬彪看著陸寅陸豐就想到陸占鼇你把這樣的人帶到山裏來與你我弟兄的臉面名譽都不好呀韓寶吳志廣沒關係他為了一口氣跟童林鬥上了北京城盜國寶這説得講得在緑林之中是橫人辦事可這倆人就不是了臭賊呀沾上我金銀亂石島了我們是鐵善寺的門人弟子真給門戶丟臉哪不過事情已經到這兒了再埋怨他又有什麼用阿這時谷瑞跟韓寶吳志廣商量二位少莊主看來這件事情要鬧大了不瞞你們二位説在戰船上動手我們甭説把西方俠于成跟聖手昆侖鎮東俠侯振遠給贏了恐怕螺一個童林我們也辦不到哇韓寶點了點頭二寨主不錯這個童林我們會過説真的我們哥兒倆也打不過他一個人對呀所以這一次呢我使了一個緩兵之計二位少莊主在我們金銀亂石島後山我們鐵善寺的祖師爺在這兒立了一個達摩堂當然設有消息埋伏那裏頭都是九九八十一門各門各派的武術精華別看它裏頭有人物和鳥獸昆蟲但是它十分厲害諒三俠的能為再高要打算破這達摩堂是不可能的在達摩堂的當中有這麼一個鐵籠子我準備把你們四位捆好了當著他們的面把你們裝在鐵籠子之內跟他們三俠打賭破這達摩堂不知道你們二位肯讓我們弟兄這麼做嗎韓寶一聽覺得太懸便道二寨主我們哥兒倆因親靠親因友靠友我們鬥的是鎮八方紫面昆侖俠童林因為他把我師大爺鐵臂羅漢法禪僧我哥哥陸地金蛟賀豹都給打吐了血我們鬥的是他所以在紫禁城盜出國寶翡翠鴛鴦鐲只要皇上一怒傳旨把他抓起來一殺我們可以馬上舉著國寶到北京午門叩闕我們獻給萬歲請旨領死你要把我們哥兒倆一捆起來押在你這兒反為不美二位錯了就算你們哥兒倆能跟童林完得了我弟兄九人跟童林卻完不了你們哥兒倆也不是不知道童海川奉師命下山興一家武術滅我鐵善寺的山門我師兄紫面龍君羅烈羅焰光一家子被童林所害這是你們帶來的消息到現在我們這小外甥羅威羅聲遠叫侯振遠給踹到江裏去了還有太湖鍾山獅子寨我們師兄孟恩孟少伯這些人也叫童林給殺了光我們鐵善寺就跟他童林完不了你們哥兒倆害什麼怕呀不要緊我們可以給你們系活扣兒也是當時系他們什麼時候來我們什麼時候才把你們送進去到時候你們互相一背臉兒你的手解他的扣兒他的手解你的扣兒就全開了而且這個鐵籠子的底板是塊鐵板有個插銷只要你一拔這插銷鐵板立起來有一股地道直通到達摩堂外上來以後你們可回前廳來這不算什麼呀了韓寶還不大樂意穀瑞説這麼辦吧你們哥倆跟大傢夥兒瞧著咱們先把陸寅陸豐他們哥兒倆捆上讓他們呈驗呈驗然後再決定你們可不可以這樣辦來呀把他們兩人叫過來陸寅陸豐知道他們所為之事不光彩不敢硬碰低著頭兒過來一聲兒不言語兵丁按著谷瑞穀仙知所説的捆好了系活扣兒然後大傢夥兒帶著這兩人一直來到達摩堂在達摩老祖聖像的後頭拿鑰匙捅開了鐵籠子打開了鐵門兒把二人放進去鎖好了鐵籠子穀瑞説你們倆人試著自己解解兩個人扭過臉來互相一揪繩扣兒繩扣咕嚕下來了一拔插銷鐵板一立兩人出溜就到底下去了哥倆順著地道往外走結果走到達摩堂的東南角的一塊大石頭後頭這兒有塊板兒打開板從裏頭上來了谷瑞得意地問二位少莊主我們説瞎話了嗎了不過是拿你們四個人當作香餌咱們釣的是金鼇姓于的姓侯的姓童的都是成名人物他們不能説話不算但是有一樣諒他們能為再大也打不開我們達摩堂到時候一越限期打不開了不用讓他們死他們自己都得碰死二位還有什麼不放心的嗎韓寶吳志廣點頭答應可以啦説好了以後大家回去把這鐵籠子鐵板依然銷好然後回到前廳這才派金錢水豹陸占鼇送信來到興隆店説得三俠答應了決定明天進山人家金銀亂石島全都準備好了並當著三俠的面把四寇捆好押進鐵籠只等到時候來人打了而且派了三鼠迎接他們打達摩堂其實後山進展到什麼程度四個賊寇知道得清清楚楚早有人通風報信了馬彪一看壞了畫虎不成反類犬這三個人把達摩堂打開了也就在這個時候四個人一瞧童海川他們都到了第五層了知道人家打開了就趁著童海川跟達摩老祖聖像動手的時候他們互相一背身兒把繩扣兒蹬開鐵銷子一拉鐵板一立四個人順著地道噔噔噔下去了跑得噓噓作喘又打這大石頭後頭鑽出來撒腿就奔前廳跑了挑簾進來忙説大寨主二寨主衆家寨主人家西方俠于成他們幾個人已經打到達摩老祖聖像前了馬彪馬雲龍就看了穀瑞一眼穀瑞惱羞成怒哥哥馬上嗚鑼聚衆跟他們三俠拚了命令下達後嗆啷啷鑼聲一響所有的兵丁都來到前廳衆家寨主各自把兵刃帶好這四個年輕人也把東西包袱收拾好了來到大廳前隨同九家寨主往這兒一站現在西方俠過來抱拳説道大寨主我們已經應前言打開你的達摩堂了為什麼這四個人到了你的身後老俠于成面帶春風一點兒也沒著急馬彪馬雲龍有點羞刀懶入鞘其實馬彪倒是個硬漢子他幹張著大嘴説不出話來只得轉過頭來對穀瑞説二弟這事是你辦的你説説吧穀瑞這個氣你非得把我給賣出來呀玉頂白鶴穀瑞用手點指於老俠讓你們破破達摩堂跟達摩堂裏的昆蟲人物動動手就是試試你們弟兄到底有多大能耐敢不敢跟我弟兄較量配不配跟我弟兄較量現在你們把達摩堂打了知道你們的本領不錯了不過還有一樣要打算要這四個人還得贏得了我弟兄九人掌中的軍刃兵器然後你們可以任意捉拿螺不了哈哈哈這個話太不講理了老俠于成再能忍耐也受不了哇老頭兒蠶眉倒豎虎目圓睜一捋頷下的銀髯用手指點穀瑞好小子你説話不算話言而無信緑林道兒哪有你這樣的人物你分明是雞鳴狗盜之徒盡在老夫面前花言巧語即使再戰一場我也要把這四個賊人拿住你欺負我老呀不錯姓於的今年一百零一歲了但是我身體老巴掌不老過來你們哪個不怕死在老太爺眼前頭轉個圈兒讓我開開眼谷瑞穀仙知往後一撤步嘟老兒于成倚老賣老誇下海口哪位仁兄賢弟當場會鬥于成他剛説到這兒旁邊轉過人來了二哥小弟不才願與于成較量穀瑞一看是金錢水豹六寨主陸占鼇這個時候海川可要亮傢夥了老俠侯振遠一擺手兄弟你先別過去老哥哥于成人老功在本領高強我看老人家在達摩堂跟假人動手遊戲三昧那是鬧著玩的嗎老人家怎麼説咱們怎麼聽就是了先讓老哥哥打個三仗老人家一帶頭兒咱們就按著他的辦因為哥哥是説合人嘛他要傷人咱們待會兒動手也傷人他要弄死人咱哥倆也別含糊可他要不弄死人你我弟兄也不能手黑心狠海川點了點頭哥哥好吧只見老俠于成邁步往前來到切近一看陸占鼇虎視耽耽往那一站懷抱短把牛頭鏜他就是陸寅陸豐的本家叔叔陸占鼇怎麼第一個就過來了他有點兒彆扭哇因為陸寅陸豐是通過自己介紹來的我姓陸的也是善寺門人弟子像陸寅這樣的人根本不能往山上帶那麼既然領來了也出了事兒到現在我姓陸的不過去寒磣呐陸占鼇想到此抱著短把牛頭鏜邁步往前來雙手一分嗡地一下用手點指老兒于成你敢到金銀亂石島前來撒野認識俺金錢水豹陸占鼇嗎老俠一陳狂笑哈哈哈陸老六哇你有幾合的勇戰敢在老夫面前發狂我要讓你在我的眼前頭轉上一個圈兒我一百零一歲就算白活畜牲進招來亮你的軍刃叫我亮軍刃你也配跟你動手還用亮軍刃我就這兩隻肉巴掌你也不是對手陸占鼇也真急了往前這麼一趕步左手牛頭鏜一晃面門右手牛頭鏜蓋頂就砸于老俠剛才跟假人打了半天説真的假人終歸是假人真人終歸是真人呀假人到底好對付真人可不成阿短把牛頭鏜又沈又猛陸占整個兒也大手一晃右手鏜就到了老人家一甩臉右手一捋頷下的銀髯伸左手就要抓他的鏜杆金錢水豹陸占鼇可就不敢往下砸了但是他想跑可辦不到了只見老俠于成腳尖點地噌地一下往前一進身就來到他的跟前了伸左手一晃面門右手烏龍探爪照定陸占鼇的胸口嘭地一掌就打上了金錢水豹陸占鼇呀一聲慘叫撒手扔短把牛頭鏜噔噔噔咕咚往後一躺兩腿可就翹起來了老俠一個箭步就躥過去了把陸占鼇的右腿腕往下這麼一穿就是右腿的膝蓋猛然間雙臂用力往起一震一抖哢嚓右腳連著左腳往起硬擡硬把陸占鼇給一劈兩半了腸子肚子往外一流鮮血迸濺老人家把這半拉身子叭唧往這兒一拽用手指點就憑你也跟于老太爺這兒説瞎話我把你猴兒崽子劈嘍老人家蠶眉倒立虎目圓睜一托鬍子真是墜角蒼龍落牙猛虎阿孔秀一瞧道哎呀這個老頭子十分厲害説著説著好話兒嘛就給劈了一個哎喲大傢夥兒瞧著這老頭兒心説真可以阿金銀亂石島大廳前呼啦啦一陳大亂嚓楞