後事宜的全部經過跟王爺説了一遍嗷海川老俠客既然把陸寅陸豐給拿住了哈哈不要緊老俠客一定能幫著你把韓寶吳志廣給拿住你説對嗎于爺心説這個王爺心眼子太多啦侯振遠就用話拴我你這兒又來了便説道王爺這個你放心我跟海川已經説了不拿住韓寶吳志廣我是絶不回家那本爵我可給你道謝了大傢夥兒擦臉吧擦臉漱口喝了點兒茶預備飯萊大家吃完飯等著孫亮李英他們回來就在這個時候夥計從外頭進來了來到大傢夥兒跟前説哪位姓侯呀嗷老人家侯振遠一愣誰找我呀我姓侯嗷老爺子哪位姓童阿海川搭茬兒了我姓童阿嗷是你們老二位外頭來了一個人打算跟你們二位見個面兒嗷好請進來吧夥計轉身形出去了一會兒的工夫一挑簾兒從外頭進來個出家人爺兒幾個一看都不認識這人歲數不算太大三十多歲細條兒的身材穿著青僧袍腰裏扎著一根絨繩兒佩著一口戒刀青中衣兒開口薄底僧鞋刀條兒一張臉滿臉的橫絲肉看得出來這個人很陰險兩道似有似無的眉毛青頭皮兒還沒受戒呢一雙眼睛不大滴溜兒圓小鼻子頭三角的菱角口一對錐把子耳朵頷下無須斜插柳兒背著個小包袱夥計把這位大師傅引進來以後就給指引著大師傅你瞧這位姓侯這位姓童阿彌陀佛侯老俠童俠客貧僧問訊老俠侯振遠一抱拳和倘你從什麼地方來我弟兄與你素不相識來到店中一定有事吧阿彌陀佛你要問貧僧我是從雲南狐兒山鐵善寺廟裏頭來奉我家方丈之命給你們二位投遞書信老俠侯振遠跟童林都是一愣傳説在武林中鐵善寺好像比少林寺都早它這門戶裏頭傳下來的一種功夫叫鐵蝠拳一百零八式硬功硬架據説年輕的小夥子就這一趟拳打下來渾身都跟水撈的一樣這拳腳很硬棒它這個廟是十方長住十方長修可不是子孫院兒子孫院兒呀就是師傅死了傳徒弟徒弟死了再傳徒弟十方長住這種廟是外請當家的只要你德高望重夠那個身份人家就可以把你請來現在鐵善寺的方丈當家的僧名叫濟慈年歲可不小了有個美稱叫紫面伽藍佛他的親兄弟是本廟的監寺名字叫濟源有個外號叫鐵面伽藍佛親兄弟倆共掌鐵善寺在他們哥兒倆上邊也就是上一代的方丈名字叫亞然江湖人稱水晶長老亞然和尚這個和尚的門戶跟童林他們是一門的因為四大名劍的二爺就是個出家的和尚叫碧目金睛佛薑達薑本初薑二爺的大徒弟就是水晶長老亞然和尚薑二爺一共是四個徒弟二徒弟天海佛霞公長老竇瑞三徒弟西方長老秋蟬四徒弟現在是直隸省昌黎縣青雲山青雲寺的方丈人稱青雲長老寶鏡禪師薑老劍客爺這一生共有三對半鹿角棒他自己使了一對兒另外兩對兒一對兒傳給了自己的大弟子水晶長老亞然和尚他文武兩家內外兩科俱臻絶頂而且年歲也到了論起來他是童林的師大爺因為童林的師父是三爺張鴻鈞的徒弟這是二爺薑達的徒弟一僧一道水晶長老亞然和尚這人有個缺點就是護短對自己的弟男子侄他本人十分愛護要有別人欺負他的弟男子侄他還有點不樂意這個愛護可不是一般的愛護近於溺愛有的時候就成了放縱那個時候濟慈濟源還沒有那麼高的份兒呢但他們的徒弟可以説桃李滿天下尤其是濟源他收了很多徒弟都是屬於占山為王的比方説鍾山獅子寨的金頭獅子孟恩孟少伯他們師兄弟幾個是濟源的徒弟紫面龍君羅烈跟這死了的三孔獨角蛟馬彪這些人也是濟源的徒弟他們的徒弟即使在外頭有些個胡作非為越貨殺人的舉動也沒被鐵善寺的法規戒律制裁一來是由於水晶長老亞然和尚有點放縱二來有時候説一説濟慈濟源就給攔了只説你放心吧沒什麼事其實呢這些人幹了很多觸犯清規戒律的事時間一長濟慈濟源的羽翼豐滿本領也夠份兒了老和尚亞然一想我也沒法跟他們一塊兒嘔氣了得啦我讓賢吧這可是錯誤因為這不是子孫院兒應當是聘賢呀水晶長老亞然就沒有帶著自己的小徒弟金面韋馱法正爺兒倆離開了鐵善寺退歸下院對出家人來説青燈古佛了此一生深山老林小廟之中爺兒倆有點吃的喝的與人無悔與世無爭就算隱避了當濟慈濟源接過手來又沒有老前輩在這兒監督坐鎮沒人管了他們的勢力可就更大了金頭獅子孟恩孟少伯從金銀亂石島回來了在兩位老人家面前花言巧語搬弄事非説了侯振遠童林很多壞話濟慈濟源勃然大怒要與侯振遠童海川一拚生死
