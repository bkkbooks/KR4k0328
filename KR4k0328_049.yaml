body:
  text: 第四十九回鬧鏢局行刺童海川謁師祖巧遇野飛龍上回書説到護國寺拋鉞亮劍海川帶弟子們來到大柵欄雙龍鏢局與衆位兄弟見面有説不完的話直到初鼓在南客廳群俠打坐休息剛交二鼓有人從房上下來十分輕巧落地無聲西方老俠于成最警覺心想外邊來了夜行人絶不是自己人要是自己人就該説話了不然的話萬一發生誤會那還了得側耳往外聽這個人往客廳來了上了臺階有一些亮光嗷可能亮出軍刃來了這人是行家他一扶隔扇門知道這門沒插管兒他用手一托門帶把隔扇門開了矮身形往裏來于爺和大傢夥兒都看清楚了喲這不是雲霞道士杜清風嗎杜清風的長道袍已經脫了在身上圍著背插劍鞘右手攥著寶劍雲霞道士杜清風現在是劍山蓬萊島的站殿將軍他的兩位兄長都是軍師最拿事的是他二哥雲台劍客燕普燕雲風燕普帶著人從四川已經到了北京杜清風也一起來了因為自己的徒弟們大部分在北京人老了也惦記著看看杜道爺和二哥燕雲風他們來住在鮮魚口裏的孝順胡同也就是西勝鏢局裏杜道爺首先想到的是自己的小徒弟鐵羅漢吳成這樣便到了德勝門裏果子市扁擔胡同的瓦片吳家一叫門底下人把門開了還有認識的喲這不是杜老道爺嗎你快請進來無量佛吳成呢讓他出來我家少爺不在家哪兒去了他另投了老師杜道爺這氣就大了他背著我投師這是瞧不起我呀又問他師父是誰你不知道北京城大名鼎鼎北城根雍親王府的教師爺下江南拿二小請國寶北高峰獻藝賀號鎮八方紫面昆侖俠童林呐無量佛喲小兒童林你竟敢搶走我的徒弟好嘞我遇不著你沒轍遇著你我要你的命杜道爺的人格不如徒弟們人家馬寶善焦秋華那是好人心眼正阿杜道爺為人可不那麼正直回到西勝鏢局一邊生氣一邊想這個事我大徒弟馬寶善還不知道我得去告訴他一聲這樣才出現了馬童二人比武杜清風橫插一杠的事情其實人家馬寶善並不知道師父來大清早杜道爺來到護國寺角門這往裏一走出來好幾個喇嘛問道你找誰呀道爺不認識我啦山人雲霞道士杜清風你們廟裏的大喇嘛是我的徒弟哎喲你是我家大喇嘛爺的老師呀當初住在白塔寺教我們大喇嘛爺功夫的是你老人家呀哎你的二徒弟一定是豎臂摘星焦雨焦二爺了不錯焦雨那個時候是個窮苦的孩子是他哥哥馬寶善在山人面前提的這時有個喇嘛可就説了哎呀不過我家焦二爺叫北城雍親王府的教師童林給打吐血了今天約童林來如此這般我們大喇嘛爺正報仇杜道爺一聽不行我得趕緊瞧瞧去這樣杜道爺來到月亮門裏找了一處隱蔽的地方觀瞧馬童二人如何打石頭月臺上如何對話都看得十分清清楚楚聽得明明白白馬寶善打童林這三掌也看見了輪到童林真的下決心要打馬寶善時杜道爺心説了你馬寶善七十來歲的人白活了你打他可以他打你不用動地方手一擡你的命就沒有了這才高聲喝喊並與海川交手沒想到海川拋鉞亮劍削了道冠帶軍刃揚長而去杜道爺一看海川走遠了趕緊派人跟著杜道爺把道冠撿起來到了罩棚馬寶善一瞧師父鮮血滴滴嗒嗒往下流臉色發青顯得狼狽和乏力自言自語地道小兒童林阿我就這麼幾根頭髮了挽了個發鬏兒卻叫你給削去了這道冠一掉我非僧非道這多寒磣阿如果有人要問道爺你昨個是老道今天怎麼改和尚啦老道改和尚是罵人的話叫山人何以為人阿師父馬寶善過來給師父叩頭杜道爺道無量佛起來起來你好糊塗呀叫師父説你什麼呢馬寶善也納悶童林明明不敵師父阿便問師父你螺童林還費徑嗎不不費徑不費徑怎麼叫人家把道冠給削掉了無量佛別提啦他拿出寶劍來不使寶劍的招卻砍為師為師只是這麼一猶豫他的手法太快我一躲躲閃不及才削了道冠這也是山人的晦氣焦秋華在裏屋可説話了哥哥請你把師父請進來杜道爺趕緊進來一看焦秋華虛弱的身體老仙長的眼淚險些掉下來焦雨阿焦二爺掉著眼淚道不過請師父放心弟子我快好了我是讓童林給打了但這不能怪人家童林實在是弟子我的不好可是我的哥哥非要給報仇不可我説千萬不要這樣你看怎麼樣到現在仇報不了老師也遭此慘敗叫弟子心裏頭難過阿師父你這腦袋怎麼辦呢杜道長疼得直哆嗦爺兒仨坐在屋裏直發愁先讓小喇嘛用淨水把老仙長的傷口洗一洗然後把上乘的金瘡藥拿出來敷上老仙長的疼是止住了可頭髮往下一披散僧俗兩非確實難看唉為師我無法見人了馬寶善真想不出什麼絶招來師父你以後就總戴帽子吧杜道爺説大熱的天我無法戴帽子還是焦二爺給想了一個辦法師父你把這道冠上抹點膠粘在腦瓜頂上再把你的短頭髮梢也粘上點膠往後一收粘在道冠周圍杜道爺説那多難看呀不要緊你把這頭髮的周圍用墨抹黑了我看也不就將就湊合了杜道爺想了想無可奈何地説無量佛事到如今也只好就此吧正在這時候打發監視童林的小喇嘛回來了童林回到自己家中帶著他的八個徒弟直奔大柵欄雙龍鏢局去了聽説江南來了不少的英雄俠義據説他們住在那裏暫時不走杜清風一咬呀無量佛此仇必報焦二爺搖頭師父你報什麼仇阿劍削道冠之仇小畜生小小年紀把山人治得如此狼狽不堪我偌大年紀無法出去見賓朋這仇我怎麼能不報哇焦二爺説道師父海川是正人君子所謂一步一個腳印的俠客他奉聖命下江南拿二小請國寶北高峰獻藝賀號武林之中出了這樣的人物我們都應該捧他童林給咱們武林增光露臉呀再説童林是皇四子貝勒府裏的教師爺師父官私兩面咱們都鬥不起人家就不應該和人家為仇作對而且這事兒算不了什麼杜清風搖頭不以為然如此深仇大恨焉能不報哇你們不用管了老仙長養精蓄鋭耗到晚上把寶劍帶好道袍脫下來往身上一圍擡擡胳膊腿周身上下弄合適了不繃不吊杜道爺就打護國寺起身形越城牆過護城河一直趕奔南城工夫不大來到大柵欄飛身形上了鋪面房一直往東來到雙龍鏢局分號的西大牆越牆而過各處窺探一番然後來到正院的客廳一瞧客廳裏頭有人睡覺便飄身下來到了臺階上輕輕拉出寶劍來捅了捅插管沒插著這才把隔扇門打開杜道爺攏目仔細觀瞧爺幾個不認識杜清風都很納悶這個地方還有人行刺奔誰上手呢老俠于成這兒瞧著心想看來看去杜道爺看到海川了雙目停在他身上不動了于爺心説嗷這是我們海川引來的賊阿這個老道的頭髮怎麼一半白一半黑呀老俠于成愛護兄弟恐怕海川睡著了遭暗算老俠于成要跟這杜道爺客氣客氣哈哈道爺才來呀杜清風心説人家發現了噌一下躥到當院老俠于成一托鬍子一提大衫飛身形由客廳裏跟出來了海川噌地一下也躥出來了噌噌噌南俠北俠鎮東俠各自亮軍刃巨闕劍轆轤劍龍淵劍再加上海川的落葉秋風掃四把寶劍猶如四條金龍將杜清風團團圍住海川高聲喝喊杜清風你往哪里走大傢夥兒這才知道是杜清風于爺也真急了你這個老雜毛我劈了你杜清風要是單對單的他真不在乎任何一位可是現在他不敢動手心裏説人家人太多我還是走吧他順著這角門可就往東去了穿過棧道又朝南走了爺兒幾個完全都出來了西方俠于爺知道杜清風的功夫了不起群俠緊追不放越過一排房二排房一直來到後院後院裏放著鏢車拴鏢的垛子空場地很大杜清風朝南走到後院爺兒幾個順著棧道也追過來了猛然間打東房上唰身輕似燕飛一樣似地下來一個人杜清風那麼快都沒躲開這位拿著一個東西照著杜清風的軟肋上嘭一下就給點了穴杜清風攥著寶劍想跑可就跑不了了張著大嘴不能喘氣一會兒把腦袋就給憋紫了這位站在杜清風韻旁邊海川一看哎呀原來是一位出家的老道長矮身材雙肩抱攏由於年歲太大了有點馬蜂腰身上穿著古銅色的道袍掐著鵝黃色的口腰扎水火絲縧左肋下配著一口寶劍面似三秋古月紅中透粉粉中透潤紅粉相間一臉的寶色仙風道骨皺紋堆壘兩道蠶眉斜飛入天蒼壽毫長到唇邊比西方老俠于爺的年齡還顯得大這位仙長微擡眼瞼二眸子金光爍爍亞賽兩盞金燈鼻如玉柱唇似丹霞大耳相對連鬢絡腮一部銀髯苫滿胸前也搭著個子矮鬍子顯得更長了頂都謝沒啦白髮蒼蒼楊木道冠竹簪別頂背插拂塵老仙長往這兒一站風采可愛一看就知道這是一位武林道的老前輩他右手拿的這個東西使海川更驚奇哎呀三尺六寸長的點穴鐝正是在清真寺師父師叔跟老篩海爺僧道俗試三絶的時候老篩海爺丟的單支點穴鐝原來被這位給拿走了哇就看這老仙長舉著單支點穴鐝用左手點指無量佛杜清風你挽發為道身在三清實為可恨護國寺童林拋鉞亮劍是留你一條命他既能削你的道冠如果寶劍再往下一耷拉焉有你的命在你知恩不報反來為仇以怨報德現在又來到大柵欄行刺今天山人警告於你如果依然為非做歹山人不容説完了這單支點穴撅照著杜清風的後背叭地一下就把杜清風打出一溜滾去無量佛喲杜清風鯉魚打挺起來看了看道爺拔腰上西房跑啦海川高聲喝喊老仙長請留步仙長卻説無量佛再會再會老仙長也拔腰上西房于爺他們哥兒幾個緊跟著上去神龍見首不見尾蹤影不見大家都下來這才來到前廳把燈點亮了群俠坐好北俠問海川來行刺的是杜清風不錯那麼這位老仙長爺是誰呀海川説衆位哥哥我不是已經稟明這件事了嘛我應約到清真寺出現了恩師師叔和老篩海爺僧道俗試藝的情況當時老篩海爺的單支點穴鐝往上這麼一撩就不見了這位老仙長手裏頭攥著的就是老篩海爺的點穴鐝可見這位老人家的功夫不言而喻了停了一下海川又説莫非這位老仙長來也是為了明年的亮鏢會嗎于老俠想了想道完全有這種可能性于爺又對侯老俠説振遠呐我想有這麼件事還得辦明天你跟海川到趟牛街三個孩子被困在十八棵楊是老篩海爺救了他們你來北京無論如何要到清真寺去一下如果海川不上這兒來可以不去人家海川來了你們倆人應該一塊跟老篩海爺見個面給人家道謝二來海川的兩位恩師已在清真寺住下這是咱們大家的前輩你和海川就代表咱們哥兒幾人給兩位前輩請個安問問好説真的這話出在北俠和南俠的嘴裏可以出自于爺的嘴海川真不敢當哪能代表于爺給我師父請安呢你想阿人家于爺的份多大呀但是于爺説出來了講得又占理老俠侯振遠連忙點頭哥哥你説得太對了要是去的話順便問問可能二位前輩和老篩海爺他們知道昨晚上這位老仙長是誰于爺説對好吧大家休息吧沒説幾句話把燈吹熄睡了一夜無話第二天早晨起來黃燦潘龍帶著幾個徒弟們進來預備臉水伺侯群雄擦臉漱口梳洗已畢大家吃完早點海川這才跟鎮東俠商量哥哥于老俠昨天晚上吩咐咱哥兒倆去趟牛街清真寺咱去吧侯振遠答應道好吧走老俠侯振遠和海川哥兒倆可就遛遛達達打雙龍鏢局往西了順著大柵欄西口出去走觀音寺奔李鐵拐斜街走五道廟到了虎坊橋走騾馬市菜市口一直再往西直奔牛街北口再往南一點兒到了清真寺走北角門這回海川沒露怯不喊回事了一直往裏走鼓上飛仙丁瑞龍鐵三爸鐵木金神形無影伍金堂哥兒仨正往外來一眼看到童林和侯振遠了哎呀是童俠