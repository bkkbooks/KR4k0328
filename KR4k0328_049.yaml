道海川呐你長能耐了我早就惦記把這小子摔死到底什麼事他一口一個小兒一口一個小兒罵你你還管他叫燕師傅你説你這人怎麼學得這麼有涵養了這都是你哥哥侯振遠素常素往教育的結果阿真是鳥隨鸞鳳飛騰遠人伴賢良品自高阿海川哥哥我服了你了我一百零二了都受不了這窩囊氣海川樂了哥哥這路人是傻小子你要跟他慪了我們倆這十三省總鏢頭大印就歸他了這路人什麼都不懂你能跟他一般見識老俠于成點頭倒是你説得對海川接著説這是有人跟他有仇暗中挑撥我們哥兒倆讓我們哥兒倆揍他這叫借刀殺人咱不能中了小人之計哥哥你説對不對不過燕雷這樣的人總有一天有人要揍他的你説咱們大傢夥對他不錯他連個謝字都不提就走了咱不能跟他一般見識阿老俠侯振遠秋佩雨馬道爺連苗潤雨張子美二爺侯傑這些個老人物也都讚賞海川説他小小年紀又有這麼一身絶藝還能有唾面自乾的涵養真不錯呀大傢夥兒都從心裏頭佩服説著話兒工夫可就不小了爺兒幾個正要吃飯猛然間院裏嘁噅哢嚓腳步沈重有人唰一挑簾子爺兒幾個這麼一瞧哎喲這是怎麼了穿雲白玉虎劉俊纍得滿頭大汗背著猛英雄甘虎進來了甘虎黃臉現在成了蠟白的了順著嘴角往下流血流了劉俊一脖子爺兒幾個呼啦啦全都站起來了海川忙問劉俊你師弟這是怎麼了叫誰給打了南俠口誦佛號無量佛快背著你師弟先放到東邊那床上去劉俊把師弟甘虎放好了仰面朝天躺下然後掏出手絹來擦了擦脖子上的血才備敘前情原來劉俊心眼很多呀他心説甘虎師弟跟著沒好事阿這樣他老擋著甘虎跟燕雷不讓甘虎挨上燕雷燕子坡出大柵欄東口進鮮魚口西口再出鮮魚口東口往北拐就是北孝順胡同裏頭等來到西勝鏢局門口一看座東朝西的大門布局十分嚴謹構造得也很講究上有門燈下有懶凳兩邊有門環南北兩面是走馬大門裏面很多層院子房舍和大空場可以存鏢車可以拴牲口可以放各種鏢鏢銀不見得都是銀子也有綢緞藥材和珍寶西勝鏢局裏懸燈結彩很熱鬧懶凳上坐著七八個彪形大漢等到了這裏大家可都站起來了劉俊一抱拳衆位辛苦了請問鮑鏢主在不在這些人不屑一顧地問哎喲喝少爺你找我們鏢主有什麼事我是大柵欄雙龍鏢局的這位是你這兒的朋友野飛龍燕子坡燕二師傅來找鮑鏢主他路過我們雙龍鏢局跟我們那兒打聽結果我師父派我把燕師傅送到你們鏢局來了嗷你候著阿門丁轉身形往裏走時間不大鮑古鮑圖全出來了鮑古大高個高顴骨花白鬍子花白剪子股的小辮鮑古一抱拳哎喲喝燕二弟哎鮑爺我打四川來的我走瞎了道這位我是雙龍鏢局的我姓劉叫穿雲白玉虎劉俊這是我師弟霹靂狂風甘虎少俠客劉俊通名姓甘虎敘前情誰知激怒了燕子坡要怒打甘虎
