body:
  text: 第六回識英雄義結鐵掌李盜寶賊行刺雍親王上回書正説到李源學藝這一天老俠于成把李源叫過來問李源你的功夫難至上乘這不是説你不刻苦用功主要是你資質天賦所限即便如此如在江湖路上行端履正不難成名徒兒這有紋銀百兩以做路費今後要勤習苦練回到家裏你依然開店為生不久我派你師弟于秀還去山東他的為人我知道到時候一定還要住你的店請你替我管教於他明白嗎徒兒明白不過他是我的師弟呀老俠長歎一聲道唉你好不明白呀為師由於練武不能娶妻延續後代在武林我是個有志氣的賢士可在家中我就成了不孝之子于秀是我的侄子將來是要他捧著把我埋了呀可他小小年紀剛剛進入武林門戶如此眼空要是遇上有本領的人物豈不斷送了他的小命我十分後怕為此我讓你管教他不使我於家絶後哇孩兒記下就是什麼時候你到徒兒那裏去一趟阿有機會我是要去的你回到家中都問個好吧是師父師徒倆灑淚惜別在路上非止一日不提這天天色已晚李源回到油坊鎮大街上路靜人稀李源來到店門口一看匾可就怔住了改成劉家老店了自己一想怎麼我的店歸了別人誰給我賣的想到這兒往裏走進了門洞一看匱房裏邊燈光很亮算盤珠劈啪亂響帳桌後邊坐著一個人面黃肌瘦眼眶也陷啦腮幫子也都嘬進去啦右手中指無名指夾著筆管無神地眼睛盯著帳篇兒李源一看阿是管帳劉山劉三爺心裏想著我這個店八成歸劉三了吧這可讓李源猜對啦他這一走八年音訊皆無李源走的第一年劉三爺到年底開了清單向李大奶奶交待帳目盈利多少開銷多少花紅多少饋送多少一清二白李大奶奶很相信他叫他看著辦去第二年李源還不回來劉三爺一琢磨哎喲可能掌匱的死在外面了又想李大奶奶婦道人家也好欺騙這一年下來可就虧空了兩千兩銀子劉三爺花言巧語就提買賣做賠了第三年又賠了劉三爺到年下拿清單跟大奶奶説今年又賠了錢大奶奶匱上有點富餘二年全部賠淨現在掌匱的又不回來這麼大的店人吃火耗怎麼辦哪大奶奶也説掌匱走的時候跟你做了交待賠賺我都不管到時候你別餓著我就行這個店房你願怎麼辦就怎麼辦我一概不管劉三説大奶奶趁早咱把店倒出去得啦李大奶奶答道行阿其實劉三早就下了黑心想把這買賣倒在他的名下所以他把門口這塊匾找人在背面刻上劉家老店字型大小一翻個兒就挂上了街坊鄰居看著都新鮮怎麼日進鬥金的店歸了劉三爺啦自從這買賣一歸他省吃儉用一文錢都不亂花如果晚上一攏帳差一個銅錢兒他寧可一夜不睡都要找對八年來白花花的銀子足足盈餘一萬兩每晚都要把幾個銀匱打開看看這碼得整整齊齊的二百個銀元寶才能睡覺今晚劉三爺正在算帳從外邊進來個人他剛要説銀錢重地間人免進擡頭一看阿嚇得他魂飛魄散一哆嗦差點把帳勾了急忙問道掌匱的回來啦李源一看他臉色蠟白嘴唇直哆嗦就知道他壞了良心便問老三你這幾年多受纍啦應當的應當的哈哈哈老三咱這買賣這幾年做賠啦劉三一害怕説沒賠掌匱的這幾年淨賺白銀一萬多兩買賣太好啦好老三我當年託付於你算對啦謝謝掌匱的栽培你把帳給我攏一下劉三把帳目往總一攏舊管新收開除實在叭叭叭帳目有啦你看吧現銀多少帳目多少是吻合的好你把銀匱都扣好鎖上劉三一一照辦李源把鑰匙拿過來揣在懷裏問道劉三這門口的字型大小匾怎麼改為劉家老店啦唉你別提啦你這窮朋友親戚太多借錢的踢破門坎兒開始還能對付後來簡直沒辦法啦我才想了這麼個辦法把匾的另一面刻上劉家老店説這店兌給我啦李源哈哈一笑説好主意劉三馬上叫人拿高凳把匾再翻過李源道你記住這件事將來李源傷了人命啦還把劉家老店再翻過來後話休提李源這才來到跨院見李大奶奶夫妻倆把所有的事都説啦次日李源來到匱房劉三心裏七上八下以為飯碗子保不住啦説掌匱的你查查帳吧李源搖搖頭説老三帳我不查你這幾年太辛苦了大家也都辛苦我也必須有份人情你把店裏的夥計一個不剩全叫到匱房來時間不大全來了都見過掌匱的李源眼望大家説同仁們這八年的光景我沒跟大家在一起大家受纍啦尤其是我這劉三兄弟他更是操勞從今天起劉三兄弟升為李家店的二掌匱凡是用人散人擴充添置一切大事他説了就算不用再征得我的同意由他再推薦一位寫帳的先生只要心好就得手底下差點兒沒關係由劉三兄弟慢慢教導其餘人員該幹什麼還幹什麼這幾年除本淨剩一萬二千兩銀子我只要五千兩擴充咱們的店鋪劉三兄弟分三千兩其餘四千兩由劉三兄弟分給大家劉三聽了感激得熱淚直流大家都過來向李源道謝劉三這回又打起精神來把東西兩院完全蓋起客房李源把學藝經過都告訴了劉三劉三爺叫一個精明強幹的夥計在後院侍奉客人沒有多少天于秀保鏢來到李家老店劉三爺從匱房出來先派夥計讓于老客到後院其餘的都讓到西跨院鏢垛子都趕到後院夥計侍候于秀擦臉漱口喝茶吃飯還不時的打量著於秀老客是保鏢的大管爺一點兒錯沒有失敬失敬不必客氣你們掌匱的姓李吧不錯看來你是老顧主兒不然你不知道你們掌匱的跟你們説過嗎他在八年前叫人家給打啦默大管爺我們掌匱的一年到頭挂在嘴皮兒上説當初有位山西於老客把他打吐血啦他總想給於老客道道謝就是人家不來啦為什麼還要道謝老客你還不明白嗎唯敵我者是輔我我們掌匱的自被打以後破釜沈舟臥薪嘗膽以後練鞭這功夫練得真叫棒阿打個人跟打豆腐似的總盼著那位老客來狠狠地揍他一頓不就道謝了嗎哼敢情揍人是道謝呀巧啦當初揍他的就是我老西來呀叫他出來道謝吧喲大管爺就是你哪行啦你趕忙去廁所先方便方便幹什麼回頭省得我們掌匱的把你大便打出來哼量他也不是對手你快叫他去夥計答應著走後不久李源樂呵呵地進來説於老客久違啦來吧咱們倆人到院裏來好哇兩個人到當院李源一抱拳説請吧等一等李掌匱你還沒立字據哪李源一想他還沒忘當年的事哪好吧兩個人都立了字據然後站在院中于秀往前湊步左手晃面門右手挂風聲照定李源就打李源胸有成竹微然往左一滑步右手穿掌順著於秀的右臂外邊往前直插隨著右手一虜左手照著於秀的前胸啪這一掌就打上啦噔噔噔於秀退出四五步撲通就躺在地下哇地一聲口吐鮮血李源叫過幾個夥計攙起于秀在院裏來回的遛圈好半天這口氣才喘上來於秀直哼唧面色發白順嘴角流血説話可就沒徑啦好哇老西上你們這住店平白無故地把我打吐了血這是老虎店吃人哪咱們到千總衙門打官司去李源把他扶進屋漱了口把那上好治內傷的獨門藥讓他吃下去李源這才大笑著説道師弟莫怪我這可是老爺子叫我打你的別套近乎誰是你的師弟師弟不是套近乎李源就把八年的事全説啦師弟不然我能勝你嗎兄弟我扶著你上家裏去叫你嫂子帶人侍候你這支鏢我給你保了去於秀來到當院見過嫂嫂大奶奶精心照顧直埋怨李源次日李源押鏢趕路到了地點交了鏢取了收條返回家中一同看護於秀直到傷好夫妻又買了好多禮物李源送他們回山西見老俠以後李源出外闖蕩又是八年也搭著有于老俠的威名罩著交了很多俠義賓朋大家給賀了號叫展翅金雕鐵掌李源回到家中就算成名啦現在六十多歲跟前有兩個兒子長子李永外號金頭獅子次子李寬叫銀頭獅子話把何滔滔不絶把事情説完了王爺可接著問何夥計那你們為什麼叫英雄把式店嗷這可不是自己挂的老東家揮金似土仗義疏財交朋友血心熱膽凡是南來的北往的只要是武林英雄白吃白喝缺路費還要給路費開始還有人説間話這是沽名釣譽可這麼多年始終如一緑林朋友這才佩服王爺直搖頭説何夥計你這話不對呀老客兒我什麼地方説錯啦我們來的時候就有個賣藝的落到長街賣膏藥沒人買我給錢還有人不叫給錢他為什麼不到這兒來呀嗨你別提啦説真的武林也有規矩這個賣藝的來到油坊鎮就該懂得規矩他首先打聽本地有沒有子弟老師傅要有的話他應該進門道辛苦他願意開場子本地老師傅必要幫忙不願意缺個路費十兩八兩的本地師傅必要幫著湊不能讓朋友困在此地可這位賣藝的來了黑不提白不提耍硬胳膊打開場子就要錢有人告訴老東家這是瞧不起你老東家也説得好姓李的一生指著朋友我怎能往人家粥鍋裏撒沙子他上咱這來了咱就幫著湊他不來也得叫他掙錢吃飯沒想到我們二少爺李寬背著老人家去啦不讓鄉親們買藥為的是叫賣藝的到店裏來你一給錢無形中抹了我們把式店的黑這不二少爺回來啦我家老東家很生氣正在書房訓子呢可我們住別的店怎麼住不上這不明擺的事看你二位是練家子就為的是請你到把式店來默話把何薄片嘴兒真能聊哇王爺想了一下道你們東家在哪兒住告訴你吧就在東院兩所四合院你別不愛聽比你家可寬敞多啦海川一聽心裏暗笑兩所四合房就比王府寬敞我住的教師府也比這店大得多呀王爺倒不計較只是王爺想見見這位老東家跟老東家攀談海川也有這心意知道李源是于老俠的高徒王爺跟話把何商量能把老東家請來見個面嗎話把何打量王爺問客人怎麼稱呼北京人名叫胤禎這位呢他姓童名林表字海川阿原來是胤童二位老客你要見老東家是可以的可有一個條件麼條件就是別提武術二字為什麼呀我們老東家有個脾氣不管他天王大地誰要一提會武藝老東家非揍他不成如果要是項長三頭肩生六臂撇唇咧嘴七個不服八個不忿那我們老東家揍他就要狠一些喂要像你這位童老客穿著打扮土裏土氣呆頭呆腦像個老趕怯勺打得就輕多啦頂多打個嘴啃地狗吃屎我也知道你二位會個三角毛兒四門鬥兒打個旋風腳折個紡車兒跟頭什麼的可我們東家叫鐵掌李呀真要打上腿折胳膊爛我沒趕上前些年真把住店的給打得吐血呀話把何只是信口開河要知道童林是個暴脾氣他也好勝阿也是從來不服人的主兒他想這個夥計説話夠損的把我打個狗吃屎夥計你們老東家沒能為我們還不請哪沖你這一説我們非請不可好童老客你別發火呀回頭暴發火眼還得買眼藥去我這就去請你稍候吧好極啦有勞有勞話把何來到東院書房門口就聽見老員外這兒正訓兒子呢李寬正在述説爹爹孩兒不讓鄉親們買藥是設法把他請到店裏來款待沒想到出來二位給錢的一氣之下才進場子質問唉總怨孩兒沒經驗賣藝的給我練了一招倒拿毛踢了我一個跟頭孩兒只是告訴爹爹一聲並不是想請你給孩兒找回臉面你不要生這麼大的氣啦以後孩兒再不敢啦老英雄面沈似水哼這麼説為父委屈你啦你這奴才就桀驁不馴把父教當做耳旁風在外面惹是生非回來還要強嘴真正可惡大少爺李永在旁邊也勸爹爹弟弟知錯認錯已經改了就成啦人非聖賢孰能無過過而能改善莫大焉你別生氣啦老俠長歎一口氣唉孩子們當年唐太宗李世民身為皇帝教育他的兒子李治就談過創業難守業尤難民猶水也能載舟也能覆舟我父子怎比唐王可也講大比小哇為父仰仗你師祖的蔭德得來這點點名譽實非容易多