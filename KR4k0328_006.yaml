倒海川一飛身來到切近想用鉞把他扎傷吳志廣踩中脊飛身而下照定海川斜肩帶背就剁海川左腳當軸兒一轉身左手鉞一挂左腳扎根用右腳裏踩一腿嘭吳志廣也是一溜滾兒這時韓寶起來海川雙鉞一加緊心中想道若憑我的本領贏他們倆是有餘可想拿他們兩個很不容易正在作難忽聽得北房上有人痰嗽一聲賢弟與什麼人動手海川一聽是老哥哥李源急忙大聲喊道老哥哥快來這是盜國寶的賊人別讓他跑了老俠從房上飄然而下韓寶一掉臉用右手照老俠面門就打老俠雙手一攥兩頭當中一崩他的手腕韓寶一撤老俠左手把一撒右手單提棒掄起來一抽正中韓寶的腰上啪嚓一下把韓寶打出一溜滾去韓寶躥上東房吳志廣上了西房老俠李源讓海川照顧王爺自己飛身上房追了下來眨眼間來到村口老俠高聲喊欽犯往哪里逃走韓寶嚇得魂不附體急急如喪家之犬忙忙似漏網之魚腳下攢徑沙沙沙飛也似地狂奔老俠把騰蛇棒扛在肩頭微微一伏腰腳步加緊韓寶一看要壞又一看南邊大片的莊稼地吱溜就鑽了進去老俠一想拿不住他多栽呀往前一探步左手棒一掄唔地一下正打在一個人的腿上噗通這個人就趴下啦老俠用膝蓋一頂他的腰眼兒掐折他的絨繩抹肩頭攏二臂四馬倒攢蹄給捆上啦鼠輩竟敢盜國寶逞凶這官司你打了吧就聽見這個人説話是江南口音哎呀師父是我哇我只是偷過你二十兩銀子怎麼就要把我送官哪阿老俠低頭一看冤家是你呀貓腰把綁繩就給解開啦這個人站起來把絨繩系好趴地下磕頭哎呀弟子有禮你老人家為什麼見面就打我呀這個人中等的個兒頭細條的身材很靈便長圓的臉膛兒兩道細長的眉毛瞳仁發亮越黑天越發亮穿著一身藍腰裏別著一口刀這刀有尖兒沒有刃兒刀背刀刃都一樣騎著走三裏地都刺不了屁股把這刀往牆的磚縫裏插來回一晃搖磚就活動了如果挖窟窿偷人最合適所以這口刀叫搖山動這個人姓孔名秀字春芳有個外號叫走遍天下無遮攔探囊取物他是揚州人孔秀小時候家裏很苦在他八歲那年由於鬧瘟疫父母雙雙去世上無三親下無六故孩子就在街上要飯充飢鈔關街上有兩座大廟西邊是老道廟叫玉頂九龍觀東邊兒是和尚廟叫龍泉寺方丈名叫普照有個外號叫長眉羅漢鐵背禪師很好的功夫他就是童林的二師哥這座大廟的山門外左右有兩根大旗杆高有一丈八尺十幾道鐵箍底下兩塊大灰杆石孔秀總和他一般大的孩子爬這兩根旗杆孔秀身體靈便比誰都爬得快每次爬的時候影壁旁邊站著個矮個兒小老頭兒瘦小枯乾花白鬍子穿著一身米色綢長衫繭綢褲褂福字履笑眯眯地看著孔秀有時候也給孔秀幾個錢叫他買吃的這天孔秀爬完要走老頭走了過來叫道孔秀哇你還沒吃飯吧嗯這就討去來來來你到我這裏來孔秀答應著跟隨老頭來到東院到了北屋老頭叫孔秀等著時間不大叫孔秀到房去吃飯吃完以後來到北屋孔秀磕頭説道我謝謝你老爺子不謝不謝你家裏還有什麼人哪家裏只剩下我一人其餘的全部死絶了孩子你也應該學一技之長阿老爺子喲不要擔心我現在對當乞丐很有些能耐的老人搖頭説道孔秀哇乞討不是長久之計別的你都沒有學呀即便是偷人家沒有師父也是行不通的原來這位老英雄姓陶名潤字少仙有個外號叫神手東方朔他弟兄兩個都是橫跳黃河豎跳海萬丈高樓用腳踩日走千家夜進百戶偷富而濟貧做了很多善舉的人老二現在揚州北邊開了個大店日進鬥金姓陶名榮字少華有個外號叫狸貓草上飛前十年就給哥哥捎信叫他去店裏享福可大爺為人耿直不願給兄弟找麻煩陶大爺愛好下棋這普照禪師也喜歡手談為了這個就在龍泉寺東院租了這個院子沒事就跟和尚下棋就這樣陶大爺發現了孔秀尤其是那雙眼睛做為緑林人可太好啦其時越黑他越看得清楚這樣才把孔秀叫到東院現在老英雄告訴孔秀你的身體練別的不行只能練黑道兒的買賣孔秀樂意拜陶大爺為師教孔秀盤腰窩腿學拳腳軍刃然後學上道兒開始偷人光陰似箭日月如梭孔秀從八歲開始學藝眨眼就十二年這身小巧之藝很不錯陶大爺給了他一身夜行衣百寶囊一口搖山動把門戶的規矩都告訴孔秀雖是黑道也不準越理胡行二十歲的孔秀在江湖路上行道很快出了名而且品性端正闖出個外號叫走遍天下無遮攔探囊取物孔秀遊歷江湖來到常州府自己的錢已不太多了北門裏路東五間門臉的一個大飯館黑匾金字滿春園上邊有兩個小字是清真裏邊刀勺亂響香味籠罩著半趟街自己想著先吃飯然後踩道晚上偷一點錢花他一進屋夥計們跟穿梭的一樣來往端酒上菜飯座滿著一個夥計過來爺台上樓吧好吧夥計一聲喊樓上看座唉樓上有人答應孔秀來到樓上一看人也不少西邊臨街的樓窗兒有張八仙桌孔秀坐好一邊吃一邊往外看他瞧路西有一條寬寬的胡同路南有兩家大戶人家敢情這是後門兒孔秀吃完飯給完了錢來到前邊這個胡同更顯得寬敞胡同口有個木牌子上邊三個字清風巷東口路北頭一家敞亮大門東邊有走馬門一邊八棵門槐整磚到頂的高牆裏面房子不少甲第連雲再往西來路北又是一座大門樓西邊的走馬門門口也是八棵門槐磨磚對縫的牆這兩家都關著門孔秀一想今晚上就在西邊這家照顧照顧吧他一看路靜人稀在走馬門旁邊的牆下用粉漏子拍了個暗記兒然後找了個地方休息耗到天交二鼓換好夜行衣小包袱往身後一背搖山動往腰裏一別飛身上房施展小巧之能直奔清風巷先到牆角認清粉記用手抹掉然後上房加小心各處窺探到了三層院北房以內燈光明亮孔秀施展珍珠倒卷簾之技從橫楣子往裏看東頭是個暗間裏邊沒有燈眼前是兩間一通連兒的屋子迎面幾案盆景都是最珍貴最講究的八仙桌上放一個五彩的大果盤上面放著幾個大佛手散發清香上首坐著一個千嬌百媚的大姑娘穿著素衣服兩隻小腳穿南繡平金的小靴子一身藕荷色衣裙系著一條粉綾子汗巾藕荷色的絹帕在二紐兒上系著這姑娘也就是十四五歲圓臉膛面似出水芙蓉彎眉大眼長得太俊啦他正坐在椅子上看書哪孔秀是個正人他一瞧這是姑娘的閨房有銀錢自己也不能進屋竊取他正要收身上房就看這姑娘一拍桌子站起身來一挑粉綢子門簾進了里間屋也就在孔秀要翻身上房的時候他的後腰上叭噠一下就重重地挨了一彈兒哎呀哎喲好疼阿他知道壞了一鬆手唰地一下一個雲裏翻腳墜實地擡頭往房上看剛才那個姑娘身後背著寶劍斜身背著彈囊左手拿插把彈弓正站在房上傳説五代時候四川眉山有一位張遠霄入青城山學道遇見一位四目老人傳給他打彈弓蜀國國主孟昶有一張遠霄挾彈的畫像後來宋太祖派大將曹彬滅了蜀國花蕊夫人把這張像就帶到宮中來交給宋太祖趙匡胤了其實最古的時候茹毛飲血的年代父母死了棄尸荒郊任鳥獸啄食孝順的兒子研究出擲彈的方法為的是不忍父母遺體被毀用彈打鳥叫飛土逐肉趕走鳥獸後來人類進一步的發展彈弓的尺寸是十八拳兩頭叫腦兒拴這竹排子要用水牛筋叫牛筋爪兒用別的東西不行當中盛彈兒的地方叫鬥兒鬥的兩邊並不均等一邊長些一邊短些用的時候短的方面沖上若要拿反了這彈正打在自己手腕子上再説這彈丸要用膠泥就是有粘性的泥把頭髮鉸成碎末還要摻上鐵末為的是分量重團成滴溜圓差一點也不成晾乾了才能用這姑娘左手持弓右手拿彈孔秀可叫苦了他往上一仰頭哎呀姑娘的彈丸正打在腦門上孔秀抹頭就跑這正是姑娘彈打孔春方
