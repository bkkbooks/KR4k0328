body:
  text: 第五十一回除舊歲師徒同獻藝過新春師兄巧相逢上回書説到諸葛建邀海川九公主墳相會等到他回到西勝鏢局自己的屋中萬沒想到杜清風燕雷都在他的屋中燕雷質問他諸葛建支支吾吾不敢説出詳情杜清風口誦佛號無量佛老英雄我們都是緑林人只要不把奪取十三省總鏢頭這件事情説出去那麼旁的沒什麼關係諸葛建無法長歎一口氣唉杜道爺燕二將軍你要問這麼回事我惦記訪訪童林我約他明天晚上在安定門外九公主墳見面無量佛你約別人可以你知道我杜清風跟童林有仇嗎他搶走了我的小徒弟打傷了我的二徒弟還要打死我的大徒弟拋鉞亮劍削了我的道冠老英雄你要去可以你得把山人帶上杜道爺這個可失了咱們武林道的規矩了再説你是武林道的老前輩你要找童林報仇童林住家在什麼地方誰都知道你自己去我約童林出來是光明正大約的至於奪取十三省總鏢頭的事我只字不提我就是訪訪童林我要把你帶去人家童林説我諸葛建算是什麼人無量佛我管不著老英雄你不帶著我咱們就得一塊兒見見老軍師見見我師哥燕普咱們説説杜道爺你這就有點發賴了杜清風真是無恥之極無量佛我就賴了你不帶著我不成那我帶著你咱們可是這麼著我跟童林論武的時候你不能跟童林論武哪怕人家童林跟我論完武沒事了你也不能出手但要童林走半道你劫他這我管不著還有我跟童林見面你可不能露面無量佛我不露面唉帶著我嗎諸葛老頭子我也去二將軍你有什麼臉面見人家童林呐你吃飯不給人錢叫人打得體無完膚人家候你的飯帳恭請你到大柵欄雙龍鏢局沐浴更衣請你吃喝已畢派徒弟給你送到西勝鏢局可你把人家徒弟打吐了血二將軍你還有什麼臉見童林呐以我良言相勸二將軍你可不能去阿少説這個我見童林我怎麼不敢見他他讓他徒弟敗壞我的名譽我就跟他勢不兩立二將軍人家既然有讓徒弟敗壞你的心幹嗎還要把你帶到鏢局請你吃飯更衣阿那個我不知情你帶我不帶我你要不帶我去反正我是犯了法了犯了咱們的令了我也豁出去了不過臨死我得拉個墊背的走咱們找我哥哥説説去這時杜清風對諸葛建説無量佛老英雄你把二弟燕雷也帶著去他幫著我你看好不好反正你見童林我們不露面好吧二將軍我真是沒法子唉明天咱一塊去第二天老早地吃完瞧著我跟童林見面談話然後我們試藝比武等我們倆人交完手童林一走你二位再露頭這比什麼都強行了行了咱們就這麼辦了兩人到樹上頭藏了起來月到中天海川來了這才跟諸葛建見面誰知他們倆人看了一會兒就受不了了這不是殺童林的好機會嗎杜清風出來燕雷也出來了當場打在一處沒想到海川受傷吐血扔寶劍往前一栽身倒下了當他昏迷不醒的時候三人卻被點住了一位老仙長對童林説你瞧見沒有這三人我全給拿住了你怎麼處置他們都可以殺了他們都可以要像賽南極諸葛建童林決不能殺雲霞道士杜清風海川也不能殺主要這燕雷太壞了我童林一口一個燕師父叫著你給你候了飯帳讓你沐浴更衣我打發徒弟給你送到西勝鏢局讓你們賓朋見面你卻把我徒弟打吐了血若此時童林心地狹窄置燕雷於死地別人也説不出什麼話來但人家童林可沒有老仙長這三位今天在九公主墳迫我童林拋鉞亮劍這也是武林之中交流武藝許可的既然是老人家把他們三人治住任憑老人家發落吧你説怎麼好就怎麼好無量佛好老仙長攥著這鐵鐝走過來用點穴鐝一指諸葛建諸葛建阿諸葛建你也是江湖路武林道的前輩你要想跟童林見面就不應當鬼鬼祟祟你把童林正大光明地約出來跟童林交換交換武藝彼此都有好處這是可以的為什麼還要帶著杜清風跟燕雷來呢當然看得出來你們四個人在這動手的時候你有意袒護童林不然的話童林早死多時話雖如此你這叫什麼呢約童林來你的心術不端山人本應當手起鐝落擊碎你項上的人頭念你八十歲的老人闖蕩江湖十分不易武林之中到你這份上就很可以了希望你苦海無邊回頭是岸激流勇退閉門思過自己找處深山老峪一忍以樂晚年不再出世這便才對阿得了你走吧拿這鐵鐝輕輕地一拍諸葛建的後脊背啪地一下諸葛建緩上氣來了長長地出了一口氣看了看這位老仙長又看了看杜清風跟燕雷尤其是轉身形看了看童林滿腹的話説不出來只能沖著童海川一躬到地説道唉童俠客諸葛建有口難分説將來再會吧説完作了個揖進樹林走了老仙長又對杜清風説你的弟子焦秋華馬寶善本都是好人約童林也沒有什麼大的歹意論馬寶善的本領要害童林也辦不到童林失手打傷了焦秋華已是追悔不及你作長輩的就應當把仇恨給化解才對可你反而要將童林置於死地還説要給你徒弟報仇試問你徒弟焦秋華有這個心嗎他們都不見得有你這種狼心狗肺童海川拋鉞亮劍斬了你的道冠你便迫不及待地要報仇試問童林既能斬你的道冠為什麼不能斬你的六陽魁首這是童海川手下留情誰知慈心生禍你恩將仇報反而到鏢局子行刺幸虧被山人發現已然教育過你可惜你置若罔聞山人苦口婆心勸你你不聽今天晚上又投井下石乘人之危到九公主墳來助紂為虐山人本應當置你於死地唉念你我都是出家的道長三清弟子你也這麼大的年紀了在江湖路也實非容易得啦你逃命去吧老仙長把這點穴劂倒過來用這粗頭趨前掄圓了對準杜清風的後脊梁啪就是一下他喘過氣來了可出去了一溜滾阿起來之後貓腰撿起寶劍長歎了一口氣又看了看打人的這位仙長掉過臉走了老仙長一看最後剩下燕雷了便邁步往前惡狠狠地用鐝點指小畜生你是皮包血肉十個月懷胎的人不是披毛帶掌的衣冠禽獸阿你到北京城沒了銀兩路費吃人家飯不給錢還跟人家打架這麼多的人打你人家童林與你水米無交不相識看你是個練武的候了你的飯帳哎這在武林之中本不多見阿你不但不領人家童林的人情反而小兒長小兒短的還執意要跟童林比武奪取十三省總鏢頭人家童海川把你帶回大柵欄雙龍鏢局也對你很不錯派弟子把你又送到西勝鏢局作為甘虎傻傻呵呵的傻孩子來説要説你兩句也未嘗不可但你惱羞成怒把甘虎打吐了血阿講人心比自心你這種以怨報德的人決不是好人吧到今天你還有臉面來到九公主墳跟海川動手待山人擊碎你的頭顱沒想到老仙長把這點穴劂舉起來剛要打童海川跪下央告老人家暫息雷霆之怒阿晚生童林有話要説無量佛童林哪山人欲把燕雷置於死地你還要給他講情嗎唉有這麼一句話遇見文王講禮義燕雷不講理不講信義這是他的人性但老仙長舉足不傷螻蟻命愛惜飛蛾紗罩燈你是個靜悟參修的前輩何必要跟他一般見識呢既然把杜清風諸葛建都放了以晚生良言相勸你把他也就放了吧老人家聽了點點頭燕雷小畜生你聽聽人家童林在這個時候還要給你講情得了既然童林給你講情我也不能違背童林的善意好老仙長往起一帶點穴鐝這個徑頭就打得足了起碼得有八成徑阿照著燕雷的後腰上啪把燕雷也給打出一溜跟頭去當時後脊背就腫起來了疼得燕雷直轉腰子把日月雙輪撿起來飛身形上樹也走了老仙長回來把點穴鐝插在背後從懷裏掏出一個小紅葫蘆把紅葫蘆鐵蓋打開真是異香撲鼻一共倒出三十粒藥來然後説道童林呐你受傷吐了血不給你這三十粒藥吃阿恐怕明年三月三亮鏢會你就不能登場不過你應該完全吐淨你的身體裏邊還有淤血將來遇見急怒恐怕你還要吐血你先吃三粒從明天起你每天服三粒再服九天這十天吃完了之後你自己慢慢調養氣息你又會武功很快地就能痊愈把藥吃下去吧海川心説按理説我跟仙長素不相識人家兩次三番搭救自己苦口婆心相勸於我而且又是我本門的前輩我怎麼能不吃呢弟子謝謝老人家了海川説罷便把三粒藥吃到嘴裏頭用唾液浸化這三粒藥一下去海川的精神倍長不像方才那麼四肢無力了然後把這二十七粒藥揣到懷裏頭放好老仙長關心地問你自己能走嗎老人家弟子能走要是能走你回家好好休息幾天吧是老人家兩次三番搭救弟子性命感恩不淺阿臨別之際你老人家把你的名姓告訴弟子可以嗎無量佛童林你要問山人我的名姓唉滿天星月訪賢良不遇空回亦感傷若問山人名和姓三月三日必登場説到這兒左手一撩自己的道袍腳尖一點地抱元守一一長腰飛身形上樹蹬著樹梢捷似飛鳥轉眼之間蹤影不見了海川站起身形自己轉了轉拿湯布手巾擦了擦自己的嘴落葉秋風掃寶刀撿起來撞好了圍在腰中子母雞爪鴛鴦鉞拿起來把包袱皮包好了自己摸了摸藥有點徑了慢慢地沿著甬路一直往前走夜靜更深想起今天晚上這一幕自己也真是後怕得不得了幸虧老人家趕到了萬一老人家趕不到我童林的性命何在看來今後這種事情我可得加點小心了不能輕身涉險膽大妄為了英雄想到這兒擡頭看已經到了關廂飛身形越過護城河來到城牆根底下施展狸貓登樹枝的功夫就走上去了到自己家的東牆外越牆進去來到的自己房中慢慢地把燈點亮收拾一下覺得自己渾身發軟漱了漱口把藥放起來這樣調勻了氣息把燈吹了稍事休息天還沒亮三更左右劉俊就起來了叫起師弟們後便來到師父的房門外把燈點亮喲師父你昨兒什麼時候回來的你這臉色怎麼這麼難看阿嗷怎麼了你瞧瞧拿過鏡子來讓海川一照海川瞧著自己的臉阿真跟五更天的窗櫺紙一樣煞白煞白的師徒爺兒倆過心海川就把昨天九公主墳的事情從頭至尾全説了最後問劉俊劉俊哪你看看這位老仙長到底是誰幾次搭救為師的性命這有二十七粒藥今天再吃三粒一天一天我連吃九天身體也就好了劉俊這才知道師父吐了血海川説這是努傷吐血你不要害怕是我自己努著了不是外力促使我吐的血這你放心不過聽仙長説血沒有吐淨恐怕將來阿遇見過力的事情還要吐血劉俊聽完了道師父那你好好地休息吧我帶著師弟們練功去了這樣劉俊可就把燈吹了讓師父休息劉俊暗暗地來到王府見王爺就把師父昨天的事情提了王爺嚇了一大跳趕緊跟著劉俊來到海川的屋中海川呐你這一晚上的事我剛才聽俊哥跟我提了海川笑著説這孩子又跟爺提什麼呢真是大驚小怪驚動爺駕操心海川要下地王爺伸手扶住了你呀好好地養養吧你看這個事你怎麼不告訴我呀哪能一個人去阿上次護國寺的事情我聽了之後都後怕何況這一次呢害人之心不可有防人之心不可無老仙長這話説得太對了你好好養養病吧阿王爺你待我童林恩重如山阿真沒想到我有這麼點事你老人家的大駕還來到我的家裏看我你的恩德我童林怎麼報阿海川説到這兒心裏有點發慘王爺忙問海川你怎麼了咱們爺兒倆不是有交情你要説那個我怎麼謝你阿你不但有保護我的性命之責本府的生命財産都由你來負責我也能挂在嘴頭上嗎這個事情不要緊著提提出沒有意思好吧俊哥你回頭上我那邊去到帳房要它二兩人參給你師父燉點人參湯喝海川攔了唉王爺這倒不必吧因為我的身體不是補一補好咱們不能誤明年三月三的亮鏢會老仙長的話是對的劉俊呆會兒讓你師父想著吃藥爺兒倆