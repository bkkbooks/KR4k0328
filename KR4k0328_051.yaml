器空是一塊美玉要不把它琢出來成為一件珍玩它不能成為美器阿孩子你要讓為師像教笙管笛簫那樣教給你大槍為師絶對不教羹堯可就愣了師父為什麼呢唉我教會你騎射大不了你也是張飛趙雲之流怎麼能成為七擒六出的諸葛丞相你要打算跟為師我學能耐只能學七擒六出的諸葛不能學血戰長阪的子龍為相可以為將可不成因為你家世代書香你父親官居一品為這個你應該繼承你父親事業師父弟子願意學孩兒阿這可不是一朝一夕之功時間再長只要師父肯教弟子就願意學好孩子要是那樣就正式地拜師這樣寫好了武聖人的牌位又給老師磕了一個頭咱們這些武聖人的老師你仔細看了嗎弟子沒有他可不是旁人正是前七國孫龐鬥智後七國樂毅伐齊的無極真人孫臏他是咱們的祖師父你知道啦哎我知道了好吧從今天開始單日習文雙日習武單日習文是哥兒倆雙日習武是一個這樣二五更的工夫可就真擱上了光陰荏苒日月如流屈指算來將近十年了年羹堯都十八九啦大高個小夥子渾身是徑一身的好武功一肚子好學問真是滿腹經綸年熙堯也讀出來了這天爺兒倆吃完早飯正要繼續練功老和尚對年羹堯説道羹堯阿師父今天不練啦喲怎麼了師父把你父親請來我要説兩句話是羹堯規規矩矩來到前廳面見天倫和以前判若兩人師父不教孩兒了請父親去要跟父親説兩句話老大人年嘉林明白這位高僧教年羹堯是由邪引正因勢利導現在把兒子教出來老大人感激得無以名狀趕緊來到書房道高僧阿犬子説你呼喚下官但不知有什麼吩咐當年跟老員外爺提過教令郎以十年為限這日月如流已經是十年了令郎刻苦用功不使這錦繡年華如水流逝結果功夫和學問出來了我想我該走啦就這一句話年羹堯撲嗵就跪下啦淚唰就流出來了師父難道説弟子有慢待師尊之處嗎你老人家怎麼能走哇孩子你這是什麼話我一定得走阿因為我江南還有事情呢這個不用求來的時候不是你父子相求而來走時你父子再挽留我也該走了我在此無益教你也沒得教了年大人羹堯熙堯都出自老僧之手熙堯只是一般的才華唯有羹堯將來能夠出人頭地我才以文武兩科之技傳授於他哎高僧我先謝謝你你一定要走你是個出家人身如間雲野鶴我挽留也挽留不住明日我給你餞行第二天準備了一桌豐盛的素席恭請高僧吃飯爺兒三個作陪酒過三巡菜過五味老大人年嘉林一躬到地高僧阿蒙你的春風化雨使孺子成才不但身受者感德無涯即是老夫也承恩不淺呀阿彌陀佛大人過獎了令郎才華出衆也是你二老夫妻之榮年門的德厚貧僧何功之有但願他將來雛鳳清於老鳳聲立朝剛正不阿做一個清廉之官那你也高興貧僧也高興高僧你説得太對了吃完飯以後年羹堯跪下了師父你一定得走了嗎和尚點頭道你我師徒緣盡於此我到江南去還有些事情年羹堯懇求地問十年之久與弟子耳鬢廝磨把文武兩科技藝相傳弟子尚不知恩師上姓高名十年來老師不言弟子不敢動問臨別在即你還不把名字告訴我一家嗎孩子起來我告訴你為師我俗家姓顧名啓字肯堂人稱東山先生出家的名字叫寶如和尚我自起的名字叫癩頭僧不瞞你們父子説我也是十年寒窗苦鐵硯磨穿但是我連考了三次九年都沒進了學真是不願文章高天下但願文章中試官人家試官不中咱這叫文到福不至阿因此我很失意灰心這樣我不再考了願意出家為僧自己雲遊四海到處為家走到江南巧遇江湖武林兩位出家的仙長他們是江西省貴溪縣臥虎山上玉頂玉皇觀的兩位觀主一位是談笑清居無極子尚道明一位是愛蓮居士太乙劍客何道源他們哥兒倆愛為師我的文學我十分喜歡他們哥凡倆的武學這樣我打算拜他們二位為師兩位仙長只收一個出家僧人為師弟為師把文學相贈他二人也把武學相傳取彼之長補己之短數年之後為師我離開了江西闖蕩江湖至今幾十年了才落出這麼個號來叫寶如和尚貧僧我來到北京舊地重遊我在一個茶館裏頭喝茶聽了許多間話但不便跟你父子去講年老大人再三央請老和尚才簡單提了為什麼要來應聘原來老和尚在東單口外頭一個茶館裏喝茶很多人高談闊論北京人坐茶館喝上兩碗之後先説山後説天説完大塔説旗杆海子城門駱駝象什麼大説什麼就有人説了默你們聽説這口兒裏哈哈這位老大人咱們可説著阿他們家德性差怎麼回事間談莫論人非你説這個幹什麼他們家那大少爺把兩位先生都給趕跑了一位先生叫蠍子給蟄跑了一位掉茅房滾屎蛋了人家先生要告他幸虧本家老員外爺説好的不然的話咳都打上官司了哎喲真是那樣嗎那還有錯真沒想到阿年嘉林年大人一輩子養活這麼個桀驁不馴的兒子怎能成材呢別説啦來啦奔窗戶頭一瞧打東單三條胡同口裏年羹堯出來了老和尚瞧著喝這個小夥子好身板阿那倆人説話了其中一個説你瞧見沒有現在小鳥又沒籠頭了滿處去跑啦誰還敢上他們家去呀寶如和尚仔細地觀察年羹堯心説唉老師沒能耐阿這可是一匹千里駒呀可惜又一想對我間著也是間著老和尚這才來到年羹堯家裏應聘到了現在老和尚把這件事情這麼一提最後説道沒想到老大人你腹能容物容留貧僧在這裏呆十年幸不辱命所以我把令郎成全出來了老和尚接著又對年羹堯説羹堯阿我走以後你當然要科舉這個為師不攔你不過我告訴你幾句話應該牢記羹堯跪下眼裏含著淚恩師有諭請告誡弟子和尚點頭道孩子由於你的福德深厚高官顯爵不難至也但有一條你必須記住功成者退孩子到了你功成名就的時候激流勇退師父的話弟子當銘之肺腑師父分手以後弟子什麼時候還能跟師門再見一面呢老和尚安慰説有緣總能見著無緣想見也難貧僧去也一家人往外送直送到大門口看著老和尚走遠了老大人回來謝了祖先年羹堯年熙堯兩個兄弟趁當年風華正茂大比三年都進學了三年登科六年登甲年羹堯殿試中在二甲以內也搭著妹妹當了雍親王的側妃這樣年羹堯一帆風順官運亨通青雲直上現在官居禮部侍郎頗受皇帝的青睞酒席筵前年羹堯當著海川把這事情從頭至尾一説海川可就愣啦王爺鼓掌大笑哈哈哈哎呀老年呀這麼長時間你都沒跟本爵提過這些事海川礁見沒有你們倆可大水沖了龍王廟一家人不認識一家人啦王爺你説得對年大人愣啦王爺你這是什麼意思王爺説出一番話來
