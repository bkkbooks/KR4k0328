施主你今天是大喜的日子壽誕之期怎麼有些不高興阿洪方長歎一口氣道唉普師父不是外人我因為這個兒子有點難心的事普妙一怔洪員外你兒子十年前不是被拐了嗎怎麼又有兒子啦老員外搖搖頭從頭至尾敘説一番普妙念佛阿彌陀佛洪員外你把小公子請出來貧僧看看洪方立刻派人把玉耳叫出來普師父一眼就看出來了這玉耳當時雖説三歲這時也好像看著普妙眼熟老員外叫玉耳上前拜見普妙把孩子拉過來一看非常高興阿彌陀佛洪施主此子乃左臂神刀洪炳南之子這玉耳兩字乃是貧僧在他周歲之時他母親請我所刺並且拜在貧僧名下為徒大水來臨之時我曾走遍柴禾口杳無下落算來已經五年啦老員外本是慈善之家理應叫他認祖歸宗才是洪方二目發直一語不發玉耳跪在洪員外的面前爹爹你這救命之恩養育之德孩兒終身不忘兒願隨師父去尋找天倫母親請爹爹原諒老員外落淚如雨孩兒你放心為父一定叫你隨師前往來你隨父到後面拜見你母親説清此事爺倆到後院玉耳給洪老安人磕頭自有一番惜別之情老員外跟普妙師父説玉耳隨你前往年供柴月供米此子一切花費均由老夫承擔回到火神廟普師父説你現在是練功夫的時候當年我偷學你父親的左臂刀現在我落葉歸根再傳你玉耳盤腰窩腿普妙拳腳兵刃一齊教光陰似箭日月如流眨眼間達十年之久普妙把放火的本領也盡情傳授起名兒叫左臂花刀小火神小香小翠幾次攪鬧都被玉耳打跑這回遇見洪利才刺破玉耳的耳垂兒這時普妙趕到阿彌陀佛洪施主洪老英雄一看普師父是你呐哈哈哈嫡親之子就在眼前還不相認等待何時這是我兒玉耳然也哎呀兒阿洪利見子思妻眼前一發黑撲通當時昏死過去玉耳一聽嗥啕痛哭爹爹呀踉踉蹌蹌跑過來跪在埃塵伸手抱住烘炳南把頭扎在懷裏老爹爹呀苦命的孩兒玉耳今天才能見到你老人家一面小香小翠也知道是表弟啦過來把玉耳抱住也痛哭流涕九齡司馬良直勸普師父一個徑的念佛洪炳南擦幹眼淚捧著孩子的頭仔細看這兩個字普妙説洪施主我看先到小僧廟中稍微休息一下敘一敘離別之情吧洪利點頭大家一齊來到山門往裏直奔禪堂普師父把偷學左臂刀刺字巧遇傳藝以及玉耳被洪方巧救都説了洪利泣不成聲普師父叫玉耳給父親磕頭小香小翠九齡司馬良也都過來各敘前情炳南公帶玉耳跪在普妙的面前若非普師父搭救我洪利便成了千古罪人隆恩厚誼生當殞首死當結草哇普妙扶起來道阿彌陀佛總算貧僧與施主有香火之緣只是尊夫人這多年來杳無音信我想吉人自有天相將來一定一家團聚既是楊府上還有賓朋玉耳收拾一下物件隨父去吧玉耳擦著眼淚師父説完跪下一陳悲傷普師父一笑孩子離合聚散人之常情你又何必難過為師我的門戶不響孩子你將來若想名揚武林就必須另投師門玉耳答應洪利抱拳普師父我孩子的舅父家裏來了侯童二俠還有王爺咱們一同前往吧不然的話王爺知道你的見義勇為古道熱腸也要派人來請普妙也換了件僧袍大家離廟來到楊府王爺一見這五個孩子一個賽一個非常喜歡又細問了玉耳學藝的事情這五個孩子形影不離王爺一看這樣便説哎你們五個結成盟兄弟今後在江湖上也有照應王爺的提醒兒老人們都樂意一敘年齡司馬良行大往下夏九齡楊小香楊小翠洪玉耳王爺高興來我給你們舉香請來三義瑪兒三義瑪兒是劉關張桃園三結義擺好香蠟王爺燒香五個孩子磕頭然後挨著給長輩行了禮熱鬧了兩天海川幾次要走都被挽留住洪炳南一看不行便道這樣吧王爺二位俠客爺此去順沅江往西南約一百多裏有個三義莊我當年離家去廣東正巧投宿在三義莊當初叫二老莊後來結交了我才改為三義莊這莊後街有兩家一個叫神刀紅眉叟鄭奎鄭天雄一個叫鐵戟將高林高元甫他們是我的兩個拜弟你們爺幾個去他們那裏我在家中安置安置隨後再去他們小弟兄不是又能多在一起幾天嗎侯老俠一聽很好當時告辭楊萬春拿出黃金百兩給王爺他們做路費王爺叫九齡放在小包袱裏衆人便上路去了走了兩天到了巳分時眼前一個大村鎮進到正街東口有一塊路石上邊有字三義莊他們來到十字街路北有五間門臉兒三層樓的一個大飯館兒黑匾金字望友樓夥計挑簾子爺台裏邊請吧爺兒八位進來之後順樓梯來到二層樓這個飯館兒好像四合院當中有院落周圍都是樓搭著硬架兒天棚他們順著走廊往後樓走進來一瞧後窗戶全開著明窗淨几王爺到後窗戶往外看後邊是一條大街對著飯館並排三所大瓦房門窗戶壁全一樣都帶花園兒只是當中這所的大門關閉上鎖左右兩所大門開著王爺看得出神心想這是怎麼回事呢後邊有人説話爺台你看這房子有些特殊吧嚇了王爺一跳王爺一看就是剛才在門口讓座兒的那位便問你叫什麼名字我姓王行二窮人家沒學名不過侍候人的嘴頭就要甜説出話來你愛聽我外號叫巧嘴八哥兒王爺這個樂王爺問王二後街三座瓦房一草一木都同一樣式為什麼當中鎖門呐我想可能是親弟兄三個大哥不在家兩兄弟為了友愛不敢住在當中富而好禮古有銘言一定是這麼回事吧王二把頭一搖爺台你真聖明不過全像你説的也就不足為奇了這三所房子不是一個姓是異姓兄弟我們這鎮甸後改為三義莊了就因為這個兩位老東家一位姓鄭一位姓高雖説是異姓兄弟確比親弟兄還親呐這話説起來有二十來年啦有一位洪利老英雄到此拜望雖然萍水相逢真是一見如故老哥三情投意合一定要結為兄弟這樣才把村子改為三義莊老哥倆拿出錢來先破後立蓋了這麼三所房兩位東家和洪員外商量要親自去柴禾口把盟嫂接到這裏來住因為洪員外的家境並不富餘可洪員外説這麼點兒事又何必親自前往呐等我回家後就把妻兒接來到那個時候你們還能見不著嗎兩位東家也不敢深説這洪員外就從三義莊走啦哪知道這一走就毫無音信了兩家人盼星星盼月亮盼了一天又一天盼了多少個春夏秋冬老哥倆不能等了準備車輛人馬去往柴禾口等到了西湖城哎呀爺台你猜怎麼樣村民皆被大水沖走老哥倆悲痛萬分回來之後才把當中大門鎖上每天派下人收拾打掃完畢之後就關門老哥倆開的這飯館望友樓這是盼望朋友的意思老弟兄倆思念兄長的時候必到望友樓來要説交朋友説什麼羊左之交管鮑之好桃園三義雷陳之風小子我全沒看見只有我們東家我親眼看見啦王二不愧是巧嘴八哥兒這片話連侯老俠海川聽得都津津有味五小也都怔啦玉耳的眼淚流下來王二説著也是眼睛發紅爺台東家原來是我侍候老弟兄準在你站著的這個地方望著大門落淚見房屋如見友爺台你看腳下都是濕的那是多年的思兄淚呀窗臺上光亮光亮那是東家用手撫摸的痕迹王爺問王二你説了半天你認識左臂神刀洪炳南嗎不認識淨聽説啦那好我來給你介紹一下玉耳過來玉耳趕緊走過去王爺介紹道他就是你提到的洪炳南之子左臂花刀小火神洪玉耳王二又驚又喜你是我家少爺不錯正是洪玉耳我奉父親之命前來給叔父請安家父不久即至有勞你代為回稟喲真是少爺呀王二給少爺磕頭恕小子不知實在怠慢玉耳伸手攙扶王二你快去稟告兩家叔父玉耳在此恭候啦王二一聽撒腿就跑一直來到後街東道這所大房子進大門直奔客廳神刀紅眉叟鄭奎鐵戟將高林哥兩個正在客廳喝茶呐王二跑了進來氣喘吁吁道兩位老員外爺大喜啦什麼大喜洪少爺來了在後樓還有好些朋友呐阿真是意外之喜老哥倆往外跑與玉耳見面相逢
