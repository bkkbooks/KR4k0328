body:
  text: 第十四回楊家莊姑舅喜重逢火神廟父子痛相認上回書説到下雲南拿二小請國寶老俠侯振遠和海川帶弟子司馬良夏九齡保王爺離開杭州一路上遊山玩景也不寂寞行州過府走隘穿關奔江西渡鄱陽湖到嶽陽瞻仰嶽陽樓要逛八百里洞庭湖只見煙波浩渺一無邊際真是沙鷗翔集錦鱗遊泳岸芷汀蘭鬱鬱青青風景幽美胸襟為之一闊他們爺兒五個指指點點棄舟登岸進了君山首先看到的是當年楊么起義修鑄的大鐵鍾用木錘一撞聲聞數十裏再看看龍女牧羊柳毅傳書的柳毅井又參觀了聽經的兩個大石龜相傳佛祖講經天雨奇花地湧金蓮二龜聽了入神到天明回不去變成石龜最後又看了大片斑斑血淚的湘妃竹據説大舜死於蒼梧他的兩個妻子娥皇女英撫竹而痛哭眼淚流幹繼之流血血迹染在竹上站在君山最高處東望嶽陽樓聳入雲端西觀百丈峰層巒疊翠真使人樂而忘返過了洞庭湖順沅江來到桃源縣地界這是陶淵明作桃花源記的地方因此叫桃源縣天到巳分時王爺趕路有些餓了問海川咱們是不是該吃飯啦我覺著肚子發空了侯老俠客一指道前面就有個通街大鎮甸咱們到那兒打尖吧爺兒五個來到切近這個村鎮有幾千戶人家東西長街有三條他們爺兒五個走的是正街來到東村口路旁有個大石碑上有六個字桃源縣楊家莊進了街一看來往的人跟流水似的路南裏是個大廟的紅色後牆虎皮石的下基看這廟的樣式規模很大牆裏面可能是個大花園參天古木走到廟的西邊是個大高坡廟牆從後面看很高從西看就不高啦這大坡和西廟牆連著牆比土坡只高一尺多坡上有大片果木樹緑葉成蔭過了十字街路北有個大飯館子黑匾金字楊家酒樓裏面刀勺亂響香味飄到了街上兩層樓樓窗門開著爺兒五個進來樓下已經是座無虛席啦一個年輕夥計樂嘻嘻地走過來道爺臺上樓吧樓上看座位五位順著東面騰騰騰上了樓他們來到南樓窗下桌前就座王爺臉沖北侯老俠臉沖東海川沖西王爺知道那兩個孩子不願意跟他們三個人在一處坐便道夥計你先給我們這兩個學生找張桌兒坐下叫他們單吃夥計答應著把他倆讓到東邊一點在對著樓梯口的那張桌子上坐下了夥計用布巾擦抹桌子道爺用什麼酒菜好給你準備去老爺三要酒要菜一會兒就喝上啦夥計這才來到二小面前二位少爺等久啦一邊説話一邊在瞧他們倆九齡有心從一進飯館就發現夥計們總偷偷地看他們九齡問夥計你過來説著九齡掏出二兩銀子給你買雙鞋穿吧夥計眉開眼笑道謝謝二位少爺讓你破費唉夥計你給我配四個酒菜半斤一壺的酒來上兩壺可以你不必拿酒杯這兩壺酒拿來放在我這邊一壺放在我哥那邊一壺少爺這是為什麼你不知道那邊三位都是我們的長輩不年不節不許我們喝酒我們必須偷著喝夥計答應啦時間不大菜都端上來放好盤碟筷子把兩壺酒放在桌子腿的旁邊司馬良膽小説九齡師大爺看見要責備的九齡搖頭道咱故意讓王爺瞧見他心善瞧見就得説拿上來喝吧這就算奉明文然後咱每人再要半斤師大爺就不好意思説咱啦司馬良一聽對呀兩個人一貓腰拿酒壺喝一口然後直起腰來吃菜再一貓腰喝口酒直起腰來吃口菜旁邊吃飯的看著都發笑王爺一眼就看見啦你們倆人真可氣想喝酒拿上來喝偷偷摸摸的幹什麼九齡一擠眼趕緊站起來立刻把夥計叫過來再給我們每人來半斤夥計答應著把酒給送來侯老俠一樂你太慣著他們就讓他們撅著屁股喝吧你這一句話他們奉明文啦其實侯老俠早看見啦就是不説話爺兒五個在兩個桌子上開懷暢飲正在這時候樓梯騰騰一陳響上來兩個人吃飯的人們一看默真有長得一樣的人前邊那位一身藍綢子衣服梳著沖天杵小辮兒前發齊眉後發披肩瓜子臉蛋面色紅潤跟九齡長得一模一樣後邊那位一條大辮子漆黑刷亮長方臉型濃眉大眼也是一身藍跟司馬良長得差不多夥計先生們都跑過來道二位小少爺快快坐下吧這二位挨著九齡他們這張桌坐下夥計端酒上菜侍奉殷勤九齡就明白啦這二位不同一般人物他低言悄語哥哥怨不得夥計瞧咱原來咱倆跟這兩人長像相同乾脆叫這二位付咱們爺兒五個的飯帳吧司馬良知道他又要冒壞道你不要胡來你放心我給他來個迷魂掌説到這裏九齡一招手兒夥計夥計馬上跑過來二位少爺添酒上菜嗎九齡一搖頭不我看旁邊這二位是英雄你告訴帳桌兒先生和那二位少爺他們的飯帳我們付了夥計過去一説那個梳沖天杵的一瞪眼胡説怎麼能讓客人付我們的飯帳不行不行九齡馬上站起來一抱拳二位兄長小弟見二位兄長儀錶非俗十分敬愛想跟二位兄弟近乎近乎一定付你二位的飯帳你不同意那是瞧不起我們那邊二位也都站起來兩位賢兄太客氣啦我們雖説萍水相逢可是一見如故哇乾脆咱們搬在一起用酒吧九齡一笑恭敬不如從命請那兩個小孩立即派夥計把酒菜都放到一處四人坐好又叫夥計添酒上菜跟九齡長得一樣的那位説你告訴帳桌我們吃多少錢都記到家裏帳上夥計答應著九齡一拉謝謝二位兄弟的美意我們人多邊説邊旁邊桌上那兒還有三個人呐投想到這兩個小孩兒毫不在乎沒關係有多少人也不要緊把那張桌的飯錢咱們一塊兒給了夥計答應著走啦九齡心裏美滋滋的讓酒讓菜請問二位兄弟怎麼稱呼梳沖天杵的這個指著自己在下姓楊名叫小翠他是我哥哥叫小香都是父傳子授的藝業我的外號叫鐵腿鹿我哥哥叫插翅鶴沒領教二位哥哥怎樣稱呼九齡一指自己我叫多臂童子夏九齡他是我哥哥玉麒麟司馬良小翠小香都作揖道久仰久仰二人也連連作揖不敢不敢請問你和這飯館怎麼這麼熟悉楊小翠一笑夏兄有所不知這個買賣是我家的我們住在後街家父也是老武林出身子不言父名他是上萬下春江湖人稱展翅大鵬我們中午每天練完功都到這兒來吃飯九齡點頭四個彼此勸酒越喝越投脾氣一問年紀司馬良夏九齡比楊小香小翠他們大就呼兄喚弟喝得興高采烈小翠問夏哥哥你們能不能到捨下去一趟一來使小弟盡地主之誼二來多盤桓幾日三來尚有大事相求兩人一聽九齡問你二位有什麼事情呢小翠的臉一紅唏噓半天最後才説出來司馬哥哥夏哥哥不知道我和兄長從幼小隨爹爹練藝由於我們兩個貪玩把大好時光白白過去辜負了古聖先賢的教誨大禹聖人惜寸陰陶侃賢人惜分陰所謂少年不努力老大徒傷悲直到現在本領也不高前幾天我們到東口大廟後邊去玩兒在土坡上往後院裏邊看發現廟裏有個小孩兒年齡比咱們都小長得挺好最叫我和哥哥好奇的地方是他左手持刀正在練藝他看見我們就大怒起來飛身上廟牆來到土坡上破口便罵激怒我弟兄亮刀動手我二人不敵都叫那個小孩給打啦我們又不敢向父親説出來今天遇見二位兄長能否助我們一臂之力呢九齡一聽很高興楊兄弟你們兩個的事就是我們兩人的事也不是九齡説大話只要到那兒咱就把臉面找回來他是包子把餡兒給打出來他要是雞蛋把黃兒給打出來不過小翠一瞧怔了問夏哥哥有什麼難處嗎唉你不知道你看九齡一指那張桌的侯振遠你知道那個白鬍子老頭嗎那是誰呀九齡一吐舌頭那可是了不起的大人物是我們的師大爺山東侯振遠人稱聖手昆侖鎮東俠阿大名鼎鼎的老俠客知道又一指海川你看這位挺快的司馬良一聽心説你怎麼信口開河説師父快呀正想指斥小翠忙問道那位是誰呀是我們的師父北京童海阿是不是新出世的英雄北高峰獻藝賀號的鎮八方紫面昆侖俠對你怎麼知道最近有武林同道來我家提過九齡他們一高興心説師父的名聲比我們走得還快呐小翠又問當中坐的那位是誰呀九齡一琢磨道更了不起有這麼句話與虎同眠焉有善獸與鳳同飛必定俊鳥是誰呀威振武林名聲太大啦他姓胤名叫胤禎順天府人氏有美稱嗎有江湖人稱天下第一俠司馬良一聽心説好麼你真能胡謅九齡跟小翠商量你先叫夥計過去跟那個老頭説飯帳你二位付了他們只要答應了就可以請到府上去啦小翠一聽好辦夥計過來夥計來到近前什麼事呀少爺小翠掏出十兩銀子來給你的夥計可沒想到忙謝道哎喲我謝謝少爺你高興啦為什麼賞小的這麼多錢你帶起來是小翠一指鎮東俠你看見那個白鬍子老頭兒了嗎看見了你過去把三位的飯帳只要付下來十兩銀子歸你你要付不下飯帳來今晚上你就卷鋪蓋回家夥計可嚇壞了沒法子他滿臉笑容奔侯老俠來啦老爺子喀嘻嘻兩隻手直揉搓老爺子再給你添些酒吧侯老俠一擺手張落別的客人去吧要酒的時候叫你夥計可站著不走老俠一看問怎麼不走哇夥計低著頭兒老爺子看你老偌大年紀依然這麼健壯真是盛世耆英一定兒孫滿堂多福多壽你是位修好的人呐王爺海川都納悶兒這個夥計要幹什麼老俠一笑夥計貴姓免貴你呐我小子叫劉二劉夥計你有什麼事嗎唉老爺子不瞞你老説我現在正著急哪有什麼著急的事兒我劉二是本鎮的人家裏有個光棍兒的父親三個沒娶媳婦的哥哥兩個沒成家的弟弟加上我們兩口子就指著我一個人在飯館兒侍候爺台們很不容易糊口哇可不順心的事兒都叫我趕上啦又來了親戚我寡婦嶽母還有三個寡婦大姨子兩個沒出門子的小姨子這二十來口人我養活不起呀老俠一聽道你先等等説你們家裏人跟來的親戚男女搭配太合適啦喲老爺子你別給配對兒阿侯老俠他們老三位都笑啦劉夥計你跟我念叨這個幹什麼唉老爺子我今天要得筆外財就看老爺子可憐我啦你要賞臉一點頭兒我就承你的恩啦你只要一搖頭小子我就卷鋪蓋回家飯碗就算砸啦説著話劉夥計挺難過侯老俠喝著酒問他作文章也要有個題目呀你只問我答應不答應不説什麼事我不能答應劉夥計才把事情提出來你只要讓我們公子爺付了飯帳十兩銀子就是我的啦老爺子小子謝謝你啦剛才九齡跟小翠他們一答話侯老俠就生氣啦好小子初入江湖就學這壞毛病指人家的迷魂掌要吃人家小小年紀不學好説劉夥計不是老夫臉硬我這人一輩子沒吃過別人不過十兩銀子嗎你家少東家不給我給你這沒有關係麼劉夥計説得舌敝唇焦老俠執意不肯這時候楊小翠走過來樂嘻嘻地給侯老俠深深地鞠了一躬老人家後輩知道你呐你老人家姓侯名廷表字振遠聖手昆侖鎮東俠侯老俠客爺對吧跟著又給海川作了一個揖道後輩也認識你呐你老姓童名林表字海川鎮八方紫面昆侖俠説完了又轉身給王爺也深深地施了一禮這位老人家我也認識你呐王爺一聽嚇了一跳這孩子怎麼也認識我呀一定是九齡這個冤家信口開河説的便問嗷你也認識我嗎認得你是順天府京都大地方的人氏姓胤單字名禎江湖人稱天下第一俠雙俠一聽差點兒樂出來王爺可大笑起來心説好小子給我賀了這麼一個號對對我是天下第一俠你找我們有什麼事嗎楊小翠心裏高興阿三位俠客爺在下叫小翠家父展翅大鵬楊萬春也是當代武林中的人他常常教育我們遇高賢不能交臂而失必要請到家中聆教以增見聞今天三位俠客爺蒞臨敝處如果不請到寒舍款待家父定要申斥因此叫夥計劉二説我付你飯帳以便恭請三位俠客爺稍留片刻光臨我家不知三位