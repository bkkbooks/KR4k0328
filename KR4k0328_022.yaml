body:
  text: 第二十二回誇海口夜入達摩堂施絶藝三俠闖五門上回書正説到三俠進山亂石島大寨主三孔獨角蛟馬彪馬雲龍傳令備船隻迎接三俠在山口之中見面寒暄幾句然後三孔獨角蛟馬彪馬雲龍帶著所有的衆家寨主把隊伍調轉擁三俠同進大寨一進寨門順著山路往上走老俠侯振遠一看山勢十分險惡不過看于老俠的意思好像是胸有成竹一點兒不在乎衆人一直來到修在半山腰兒上的二道寨門這裏也是重兵把守順著二道寨門再往裏走直到三道寨門可就到裏寨了寨門兩旁邊順著山勢修的寨牆足有一丈七八尺高這個牆就地取材都是用石頭砌成的挺好看寨門兩旁邊兒各站著二十名兵丁弓上弦刀出鞘嚴加防備大寨主拱手請三俠進了三道寨門東西兩配房不計其數正中二十五間大廳院裏頭栽種著奇花異草濃郁芬芳大廳前出一步廊臺階下每邊站著五十名兵丁各挎一口腰刀刀嶄腹齊都是挑選出來的二十歲上下的小夥子大寨主馬彪一抱拳老俠客請吧哈哈哈于老俠點頭大寨主頭前帶路老三俠隨著馬彪哥兒九個往裏走大廳內十分寬敞迎面有二十四扇落地的圍屏上頭繡著喜鵲登枝都是南繡平錦的迎面有個長條的桌子桌子後頭有一把金交椅金虎皮蒙著這個地方沒人坐連大寨主也不能在這兒坐馬彪馬雲龍一躬到地老俠客既然來到鄙寨請來上坐西方俠于成于洞海可知道這地方坐不得你要往這兒一坐人家説你要謀奪我的山寨馬上就跟你打起來輸贏勝負不説你沒有理西方俠于成這麼大的年紀哪能上這個當哈哈大寨主常言説帥不離位這是閣下的座位老朽不敢僭越我們還是便座一談吧馬彪馬雲龍心説于成久經大敵緑林道的事兒瞞不了他既然如此恭敬不如從命來呀看座馬上有人過來從上垂首擺上三個茶几三個兀凳兒下首裏擺上九個茶几九個兀凳兒一切準備好獻上茶來大傢夥兒執手落座老三俠坐好人家九家寨主也坐好了老俠于成一抱拳大寨主這一次你把我弟兄三人叫到貴寨一定有要事相商馬彪看了看于老俠老俠客不瞞你説這一次把三俠請到鄙寨確實是有點事老俠客你是我們二十年前的朋友也是武林道的老前輩作為説和人來説你昨日在戰船上破釜沈舟苦口婆心地相勸我弟兄應當聽從只因我的弟兄們一時糊塗這樣才招怒了你們兄弟幾位戰船上動了手當時我馬彪也在想像老俠客們都是威名遠震的前輩我們怎麼敢得罪呢為此我先暫時請你們幾位到店中我們哥兒九個回到山寨以後細細思量覺得很對不起你們我們又追查了韓寶吳志廣陸寅陸豐也確實是這麼回事兒更覺得對不起你們不瞞你説我們是鐵善寺的門人弟子也是很講情理的我們本應當聽從你的良言相勸把這四個人拱手相讓哈哈大寨主這不很好嘛我們可以作為朋友嘛對可無奈一節咱們江湖緑林道上的事兒你還不明白嗎舌頭底下壓死人呐我們要把這四個人交給你知道的是道義相投我們跟你是朋友不知道的説我們弟兄九人懼怕三俠那樣一來我弟兄在江湖緑林道可就設法混了嗯大寨主你們弟兄在江湖上也很有名氣甭説你們弟兄還有你們弟兄的長輩呢還有雲南狐兒山鐵善寺呢沖這也不能讓你們弟兄栽了跟頭可有一樣你不給人這事情完不了你給人多少對名譽有損事情很難兩全大寨主你的意思打算怎麼辦呢唉老俠客我們有點不盡人情的請求在我們金銀亂石島的後山這個地方的地勢很好我們鐵善寺的各代祖宗集思廣益一代一代費盡了心血把各門武術之長完全運用在人或者是飛禽走獸上修造了一座達摩堂這裏頭有九九八十一門武術這些個武術都是各門的精華也就是讓我們一代一代往下相傳所有的弟子都從達摩堂裏鍛煉本領向各門武術學習這個達摩堂可厲害一般的武術家是打不了的我們願意把這四個人放到達摩堂內老俠客咱們訂好了日子如果你們衆位在日限之內把達摩堂打開了那時候你們把四個人帶走任憑他們投案打官司我弟兄犯窩主之罪還要在三俠面前請罪嗷哈哈老俠于成微然一樂那麼要是打不開呢哎老俠客要打不開你們弟兄都是武林道出名的人物也就沒有臉面再進我的金銀亂石島了那時候也就得不到他們弟兄四人了老俠客你看怎麼樣呀老俠于成明白我二十多年前來過這裏有意參觀參觀達摩堂人家衆家寨主可沒讓聽説這達摩堂是仿造古少林寺的一種機器人做的自行走輪轉弦底下的弦槽跟蛛網一樣縱橫經緯十分清楚裏頭可厲害呀老俠于成便問大寨主破達摩堂是怎麼個破法呢老俠客破就是憑你們三俠的能為占敗裏面的飛禽走獸跟這些假人但是不準給我們毀壞因為所有的飛禽走獸及這些假人的底下都通著弦呢你要用刀用劍把這弦給砍斷了不就給糟踐了嗎所以要憑你的能為贏我們的假人贏我們裏面的飛禽走獸只要你精通各門武術你就辦得到嗷這麼回事兒老俠于成剛要説話童海川在旁邊搭茬兒了大寨主小可年輕按理説這一次來到你的貴寶山我童林只能聽著或者是請我兩位兄長説話不過這裏頭有我童林的干系我不能不説話你提的這個達摩堂在未打以前你讓我們看呢還是不讓我們看嗷童俠客當然説定了以後我們就同著三俠到達摩堂去看一看要是那樣兒韓寶吳志廣陸寅陸豐這四個人怎麼往達摩堂裏放呢童俠客在中央戊己土大廳裏邊兒有個鐵籠子我們把這四個人綁好了鎖在鐵籠子裏你到時候破了達摩堂自能到這鐵籠子切近便可以打開鐵籠子把他們四個人帶走這人就算歸你了海川點頭好吧大寨主我們先跟你去看看這達摩堂然後再定你看可以嗎當然可以我弟兄陪著三俠到後山去看一看順便也把韓寶吳志廣陸寅陸豐押往後山來人呐把他們四個叫進來時間不大四寇出來陸寅陸豐低著頭不敢説話但是韓寶吳志廣趾高氣揚滿不在乎進來以後一抱拳大寨主你把我們弟兄叫進來有什麼事情嗎二位少莊主我真有點對不起你們二位了沒有別的準備跟三位俠客爺打賭破這座達摩堂拿你們四位作為誘餌來人呐綁起來呼啦啦兵丁過來啪啪啪抹肩頭攏二臂把四小全都給捆了韓寶吳志廣氣得一跺腳呸姓馬的你真是人面獸心我弟兄千里投朋萬里靠友來到金銀亂石島希望你給我們遮風擋雨沒想到羊入虎口你拿我們當了一刀菜了姓馬的緑林道有你這號的嗎別著急二位少莊主你們是八卦山老俠李昆李太極手下的弟男子侄愛屋及烏看佛敬僧我應該高看但這件事情也是因為你們二位呀所以請受點委屈吧來呀押走韓寶吳志廣咬牙切齒也沒辦法這樣九家寨主陪著三俠一部分兵丁押著四寇大傢夥兒由大廳出來往西走通過一個大花園走到後寨門三俠跟著他們從這後寨門出來再往前走只見群山環抱之中有塊平坦的地方達摩堂就在這兒建造得起碼有十幾丈高當中是達摩堂的亭子頂周圍是分水三層滴水簷朱紅油漆的抱柱周圍還有仿漢白玉欄杆八面有臺階臺階分九層從整個形式來説是座北面南向的在達摩堂房脊上還有一杆大旗杆上面懸挂著杏黃緞子做的旗面紅走穗兒紅飄帶紅火焰兒上頭有黑字在這達摩堂周圍還有抱柱和半截的朱紅隔扇窗戶底下是條兒磚砌出來的坎牆朱紅的踏板迎著臺階當中有扇朱紅大門只見青銅兩獸面泊口含金環在門上頭有一塊立額紅匾青字上頭寫著兩字丙丁意思是南方丙丁火在這正門的裏頭站著一個人此人藍色絹帕纏頭一身藍綢子衣服腰裏扎著一根絨繩兒腳底下薄底兒的靴子左腳在前右腳在後但是紙殼的腦袋玻璃泡兒的眼珠兒達摩堂很有講究三層的滴水簷兒是指天地人三才分五面叫五行周圍八個門兒暗合著八卦之意九層臺階視為九宮裏頭都是相生相剋能轉能動的假人獸便形成了八十一門武術迎門站的這人就是一門武術它是按二十八星宿當值排列的今天是火星當值所以它進的是南門丙丁火大寨主帶著三俠往裏走只不過就是看個大概這都是假人已經上了弦了那為什麼人從旁邊過它不動呢沒挂總弦挂上總弦你夠得著它它就能打在你的身上這些假人身上在致命的地方都有一盤弦一個銅帽只要你手點上了啪嚓一下這銅帽就動裏頭弦就散了跟鐘錶發條似的這假人就不會動了大家進了二道門兩旁各有一個角門都關著二道門是藍門門開著呢上頭一塊立額藍匾金字寫著兩字甲乙暗含東方甲乙木之意木能生火按五行相生這第二道門就生著頭一道門這門的正中有一隻大仙鶴造得栩栩如生跟真的一樣很好看但此鶴的作用卻在表達一種武術它暗含著達摩老祖八式掌中鶴立沙灘步宜穩指掌八面任屈伸的招數再往裏走可就進了三道門這三道門亦有兩扇角門關得很嚴黑漆大門上頭也有一塊立額黑底兒白字寫的是壬癸意思是壬癸水水能生木那麼這個門就生著第二道門大傢夥兒這麼一瞧這三道門裏立著個大人熊一人多高熊也在武術之內熊有拔山之力靠山背這功夫就來自熊的身上當年軒轅皇帝把熊也吸收在武術之中三俠看了看可就到了四道門了這第四道門是白門兩邊的角門也關著當中的大門是開著的一塊白匾金字寫的是庚辛這就是西方庚辛金金生麗水所以它生著第三道門老三俠往裏邊一看在這門裏頭臥著一隻斑斕猛虎喝跟真的一個樣阿虎有三絶藝掃堂腿就是從虎身上來的軒轅皇帝也把虎吸收在武術之內三俠跟著他們進第四道門後前邊可就是第五道門了五道門兩邊也有角門關得很嚴五道門是黃門門上頭也有一塊立額立額上是黃底兒的紅字寫著戊己兩個字這就是中央戊已土快到達摩堂的正中了土能生金這第五道門又生著第四道門海川這些人往裏仔細看裏頭沒有別的當中迎門有一個達摩老祖的神像看著十分莊嚴肅穆高大的法身穿著青僧袍五領四帶大領闊袖外罩棋子兒布的大背心腰裏扎著駱駝毛的毛繩兒足有核桃粗細腳底下是白襪子開口的黃僧鞋往臉上看面似烏金一部黑鬍子兩道九旋肩直插入鬢不過這雙眼睛也是玻璃珠兒的環眼鋥亮大耳朝懷合掌向心旁邊有個架子上頭插著一條九耳八環禪杖是純鋼打造鋥光瓦亮在達摩神像的身背後有一間屋子這麼大的一個鐵籠子七八尺見方四面有鐵立柱跟鳥籠子一樣當中有個門兵丁拿鑰匙開了鐵門把韓寶等四個寇賊推推操搡都搡到裏邊去把鐵門咣啷一關嘎叭鎖上了旁邊立柱上有個鈎兒把這鑰匙就挂在這鐵鈎上為什麼這個籠子像個鳥籠子呢因為這籠子的正上頂有這麼一個火圓盤亮銀的起碼得有四五尺見圓圓盤底下吊著一個大燈裏頭完全都是油周圍都有撚兒如果晚上點著火苗兒一起亮銀罩再這麼一反光整個兒的達摩堂內都看得很清楚謔這氣勢兒是不小阿馬彪一笑童俠客把他們四個人就鎖在這兒只要你們弟兄三個有本領打齊我這五道門那時候這四個人任憑三俠帶走我弟兄不但不管而且還要束手到案打官司不知你三俠意下如何海川聽完點頭道情況不就這樣了嗎對童俠客有什麼話我們到前廳去談請把四寇可就鎖在鐵籠子裏了大傢夥兒陪著三俠一直來到前廳重新落座大寨主馬彪面有得色童俠客有什麼金言賜教講在當面吧