body:
  text: 第十六回老劍客松林管間事李士鈞落難常德府上回書説到下雲南拿二小請國寶王爺和海川在雲南大道松林裏避雨忽然間樹林外有腳步聲噔噔噔往裏走有人説話哥哥你快走吧這場官司我替你打啦胡來這種官司我都不打能讓你打嗎哥哥官人追來啦咱哥倆不能同歸於盡呐你走吧那個人説不行海川一怔把雙鉞交與左手探身子往外看王爺也站起來悄悄地挨著海川往外看只見從東邊走進兩個人來一個二十左右中等個頭兒細腰窄背身上穿白綿綢的褲子汗衫兒腳下白襪子青緞靴脖子上挂著脖鎖兒身上衣服有些不乾淨可能是打官司坐牢跑出來的這人長得十分俊美圓臉膛兒面如冠玉兩邊濃眉一雙大眼睛漆黑的一條大辮子後邊扶著他的這個人大約三十歲猿背蜂腰身穿藍綢子長衫河南綢的褲褂兒腰裏扎著絨繩刀鞘別在背後右手提著把翹尖厚背雁翎刀青鞋白襪長得天庭飽滿地閣方圓面白似玉劍眉虎目辮子盤著藍色絹帕纏頭穿白的口口聲聲要打官司穿藍的口氣堅決不讓打官司到底為什麼阿正在這時候從他們的身後噔噔噔跑進來一位老人年紀六十往外面如薑黃兩邊濃眉深眼窩黃眼珠子放光大鷹鈎鼻子拴根繩能挂十斤的錘兒手提一杆蠟杆兒紅纓槍槍頭有八寸十分鋒利八楞的槍檔犀牛尾的大紅纓兒這槍桿由於用得時間長了都被汗水漚紫啦光滑萬分老人光頭沒戴帽子花白剪子股的小辮垂於背後倒是一派英雄氣概老人來到且近你往哪里跑竟敢趁我一時疏忽劫走差事看槍吧嚕嚕嚕一顫蠟杆兒槍槍走一條線冷嗖嗖地槍尖兒對準穿藍的胸前便扎穿白袍的可喊哥哥你走吧穿藍的一瞪眼賢弟這老兒青紅不分皂白不辨良莠不知我宰了他説著話一看槍到啦上左滑步往下一剁老者的手老者往後一撤反背斜劈也從對面滑左步槍尖點腦門跟著夾槍帶棒就砸穿藍衣的並不躲閃而是往前上步右手反腕刀走掃堂老者虎坐坡往後縱身退出有五尺四平的架子一端槍穿藍的夜戰八方藏刀式蹦左腿躬右腿左掌在前兩個人貼身進招打在一處王爺不明白是怎麼回事問海川你説這是怎麼個意思海川看得很入神使槍的招數不錯也是個久經大敵的人物可他的槍招在這使刀的面前發不上來好像使刀的也精於槍法甚或比使槍的還高明這使刀的可受過真傳實教功夫扎實年歲不大很老練老者根本不是使刀的敵手時間長了老者真會敗海川現在聽王爺一問便説爺請看這使槍的一定是個官人呐對我也這麼想穿白的還有脖鏈兒呐一定是犯人使刀的半途劫下官人迫來才打起來對對本爵我看不出來你是行家這兩個誰強阿使槍的遠遠不如使刀的要是那樣就別袖手旁觀啦理應相助哇可看著那一位也不是壞人我也這麼想怎能使他們不打啦問問誰是誰非我想咱爺倆也是官人也在辦案咱們跟這使槍的同病相憐今天要幫了他將來也會有人幫咱們你説對嗎對對那好吧你還是在這兒藏著我知道海川手捧雙鉞剛要往外縱身出來就在這麼個工夫從西南大道上月亮地兒一照看得清楚傳來一陳譁譁楞楞串鈴響來了一位騎小黑驢兒的這小驢翻蹄亮掌四蹄蹬開眨眼之間順著大路從西南往東北一溜煙兒似地來到樹林外邊籲小驢聽話站住了喝這頭小驢兒黑如墨染渾身上下一根雜色毛兒都沒有跟黑緞子一樣七層氊子的軟屜兒黃緞子包邊兒鐵過梁上挂著一口寶劍一巴掌寬白鯊魚皮鞘金什件上面鑲珠嵌寶光華璀燦黃帶子纏把吞口劍首都是真金的黃色挽手垂著黃色燈籠穗兒這小驢左右兩隻銅鐙牛皮蹬繩合股籠頭藍色韁繩前胸挂著一串紫金的串鈴皮絆胸皮坐墊紫檀木的驢宙輥兒十分神駿上面坐著一位出家的道長高身個兒頭戴九梁道巾雙飄繡帶正中一塊美玉流光泛彩身穿黃色道袍白護領內襯淡青色的襯袍腰中系水火絲縧左邊搭絲縧扣兒雙垂燈籠穗兒白色高筒襪護著膝蓋黃緞子的雲履面似三秋古月兩道修眉一雙朗目不亞如兩盞金燈鼻如玉柱唇若丹霞一部銀髯灑滿前胸不散不亂根根見肉透風跟緞子一樣發挽銀絲髯垂玉線鶴髮童顔仙風道骨右肩插著一個馬尾拂塵雪白的馬尾兒湘妃竹的杆兒就見仙長腰裏一提氣唰地一下從驢上下來微晃兩肩一道白線似的來到二人作戰之處身法之快無與倫比老仙長探右手拔下拂塵口誦佛號無量佛二位檀越一夜之間因何在此爭殺難道非要流血而後止嗎貧道不明暫且罷戰貧道給你們辨別是非曲直可以嗎無奈這二位勢在拚死仙長的話如同耳旁風老仙長説了幾遍都不聽仙長把臉一沈無量佛既然不聽貧道就要強求了説著話往兩個人當中插去海川一看偌大年紀太危險使刀的這位機靈往後一撤使槍的還是不依不饒叭顫槍就扎這仙長有些生氣就看他用馬尾刷兒這麼一甩腕子正纏在槍杆上仙長微用內力一揚手腕兒這條槍脫手而飛出去好幾丈落在地上海川一驚好充沛的內功阿看來這仙長不一般定是武林高手風塵的俠隱老頭兒沒槍啦説道仙長爺他們是十惡不赦的采花淫賊身背十幾條命案我是雲南府八班役總頭孫亮奉命辦案你老人家主持公正就該協助在下才是老仙長一聽無量佛他們是賊憑你一説空口無憑山人不信這樣吧山人要問個明白老仙長來到兩弟兄近前道看你們堂堂儀錶非俗小小年紀竟敢殺傷人命那個犯人一瞪眼他胡説八道信口雌黃無量佛他説得既然不對你可以説説叫山人明白這年輕人無法便説出一番話來明裏暗裏的人都聽得傷心落淚無不讚歎真是驚天地劍客出世密松林巧逢奇案湖南常德府北門裏路東有一條胡同叫鳳尾巷路北第二家住著一個年輕人姓白名潔字玉如他幼年喪父父親名叫白闊章為人忠厚精明強幹掙下了不少家私在常德城裏開個綢緞店還有米糧行除了自己住的一所房還有五所住房另外還有二十多萬兩銀子的儲蓄在常德府城裏雖説熬不上前三戶可也有了名氣只因操勞過度才到中年便身染癆病而死那時兒子白潔才七八歲安人鄭氏很賢惠持家有法教子有方他們家住的前後兩個大院子好幾十間房有人勸老安人雇個僕人老安人不願意可對街坊鄰居甚至本城的鄉親就不然啦只要你困難來到白家借多少給多少到時能還就還不能還絶對不去討下次再來照樣還借白潔自幼秉承母訓知書達理通曉人情循規蹈矩家裏間房雖多不敢招街坊防微杜漸怕招來不務正業的白少爺從小喜歡練武如果出去見人家賣藝的打一趟拳回家之後總在院裏蹦蹦跳跳老安人也不管後來十多歲啦街坊有位劉三哥夫妻兩個由於劉三哥愛練武卻遇不上明師自己胡練把功夫練壞啦他右胳膊練得像麻秸杆一碰就折可左胳膊練得像小房梁似的碰誰一下誰都受不了因此叫左胳膊劉三他們夫妻經常到白家借個錢兒白家有活兒夫妻都搶著給做兩家走得很近乎有時白潔要跟劉三哥學兩手劉三不敢答應兄弟我要把功夫都教左了對不起老太太你要練習武藝首先起早遛彎換換空氣別的我也不會白玉如真聽話次日清早起來梳洗已畢帶好街門到北門過吊橋順河沿一直往東來到東北城角晨星尚且未退自己就活動開了彎腰踢腿瞎蹦一氣天亮把長衫穿好溜溜達達地進城每天如此鳳尾巷西口路西有個包子鋪掌匱的姓仇名良字國棟三十多歲身體健壯玉如來到包子鋪找張桌兒坐下仇掌匱的立即過來哈哈白少爺早哇吃幾個包子嗎仇掌匱的你給我來十個再要一碗粥仇良答應著給端上來問你上哪去啦玉如邊吃邊説我每天到城外去遛彎兒喝你遛早彎兒太好啦聽説你還練武呐是阿我就喜歡練藝哈哈哈不過練武藝可不同你讀書讀書遇到個昏庸的老師只不過念幾個白字兒可練武要遇到糊塗師父要把身體練壞了老安人願意你練武嗎白潔點點頭家母倒是不攔阻好那麼你是跟哪位師父練的嗨幹麼還找師父我就是自己瞎練鐵打房梁磨繡針功到自然成這些日子我覺著渾身長徑掌匱的不信你看看説著白潔一攥拳你看多大徑兒這要打在人的身上可受不了哇仇良一聽大笑哈哈哈少爺你算了吧就你這無師自練呐能把身子骨練壞了你胡同裏的左胳膊劉三爺就是個榜樣即使練不壞就你這練法幾年都白練就拿攥拳來説拳經上説伸手如瓦攏攥拳如卷餅你這是什麼拳呐這麼辦現在包子也沒熟飯座兒也沒上呐咱二位開個玩笑你打我試試仇良騎馬兜襠式站好你打吧打動了我算你有功夫打不動證明我説得有理來吧照我胸口上使足了徑打玉如一搖頭仇掌匱你別犯傻氣別看我拳頭小打上人可厲害你可經不住打壞了多沒意思不是鬧著玩兒的仇良搖頭沒關係真的打壞我也不訛你老街舊鄰的你還不知道我的為人嗎白潔站起來道這可是你説的那咱就試試來吧你只管用力打絶無妨害玉如也搭著是個孩子年輕氣盛把袖面兒一挽你注意我可要打啦他緊握右拳用了八成徑沖著仇良胸前真打上啦玉如想給仇掌匱一拳會受不了沒想到他連身形都沒晃一晃面帶笑意怎麼白少爺你沒多大徑兒呀嗷大概是沒吃包子要不吃飽了再打哈哈哈沒徑沒徑玉如的臉一紅掌匱的我怕把你打壞不敢用力呀唉你隨便發力那好玉如第二次真的用十成徑兒啪地一下仇良仍然紋絲不動哈哈怎麼樣玉如真怔啦仇掌匱的讓我再打你一下試試仇良不在意行阿少爺你使足了徑白潔這回用了十二成的徑掄圓了拳頭嘭地一聲人家仇良照樣不動白玉如都有點兒喘啦仇師父你是了不起呀大概你的武功可稱第一啦你要不嫌棄白潔願拜你為師跟你學習武藝不知你肯不肯把金玉都授於我説著白潔把袖面放下跪下就磕頭仇良一下子把他抱起來道白少爺我可不敢當你看出什麼來啦要拜我為師我剛才打你就像打在硬牛皮鼓上我越用力打我的手越疼看來你的功夫深啦你收下我吧仇良搖頭道你讓我收你做弟子天膽我也不敢我沒有多大本領只練了四五年再説你令堂鄭老安人救了我一家給我蓋房子又拿本錢讓我做這個小買賣使一家五口不受凍餓之苦你願學我是傾囊相助不過不準對別人去講次日白潔來到包子鋪仇良把白潔邀到後院北房推門進去一看喝屋裏擺著兵刃架子各種兵器擦抹得很亮三合土砸的地十分平坦仇良先給白潔盤腰窩腿有了腰腿再學拳腳花單槍刀日積月纍白潔功夫漸長一晃都四五年啦一天仇良説白少爺你可以回家練啦從明天起你就別來啦玉如一聽嚇壞啦問仇師父你怎麼不教我啦不瞞你説凡是我會的全都教給你啦在哪兒練都一樣白潔只得答應白潔跟母親要了點錢把東院的兩間小房子收拾出來請木匠也做了個兵器架兒刀槍劍戟的買了幾件自己埋頭練功這天白沽貪練功夫睡得晚啦一覺醒來窗紙發白他恨自己為什麼不早起趕忙穿好衣服下床梳洗等出來一看呐嗨原來起早啦下弦月亮還沒落剛好喊開城來到北門帶紅纓帽把門的官兵都認識白潔白少爺起早啦諸位辛苦我還認為天亮了呐出了城依然奔東北城角樹林子練功把扎腰的絨繩解下大衫兒脫下來都挂在樹枝子上不大會兒東方破曉村子裏雞叫了就在這麼個工夫白潔聽見樹林子裏邊有人哼哼可把他嚇了一跳等來到樹林的東邊兒一看這