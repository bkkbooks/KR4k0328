教軍刃五莊主賀永一退步回過身來一招手有兩個家人扛著他的狼牙釧就過來了往前這麼一遞賀永伸手一調臉兒雙手一合狼牙釧哈哈哈好你怎麼稱呼鐵戟將我叫高林高元甫説完雙戟一合往前一趕步刷地一下兒對準賀建章的胸前便扎五莊主賀永跨右步一繃左腳一斜身釧往外一挂跟著滑右步一斜身高林往下一矮身金牛拱地從釧底下過來右手一搭左手戟仙人指路照五莊主賀永的胸前便點來得很快五莊主賀永跨左步一閃身拿釧頭一點高林往後一撤分雙戟兩個人打在一處也就是七八個回合高林雙戟走掃堂人家五莊主賀永一立自己的釧釧攥沖上拿釧頭兒一拄地高林的掃堂就過不來了高元甫往回一撤的時候五莊主上左步斜身再一上右步照著高元甫的頂梁就砸下來了高元甫跨右步往五莊主的後背一躲賀永就勢兒一推後把打右面兒一轉叭一調臉兒這釧頭就到了奔著高元甫的胸前高元甫一瞧壞丁人家軍刃來了自己躲不開他橫著往回這麼一拽徑兒但是肩頭還是讓釧頭給扎了一下流出血來高元甫嚇了一大跳縱身形出來疼得臉色兒發白劉俊趕緊過來把高元甫攙起來五莊主賀永往後一撤步哈哈哈看來這位老英雄功夫不錯但跟我比多少是差點兒這樣兒吧還有哪位過來拳腳軍刃盡你挑説到這兒旁邊兒有人念佛阿彌陀佛五莊主連螺三陳好俊的功夫貧僧不才當場討教墊步擰腰過來往這兒一站原來是海川的二師哥長眉羅漢鐵臂禪師普照手裏頭拿著鑌鐵亮銀槳頭裏是一個扁片兒後頭是一個圓杆兒在圓杆兒的後頭有一塊短短的橫杆兒這是木頭的普照右手一攥後把左手搭槳杆就跟划船的徑頭兒一樣老和尚過來道五莊主好俊的功夫貧僧普照當場討教嗷普師父請進招來不用客氣還是五莊主先請吧五爺賀永往前一趕步一顫自己的狼牙釧奔普照的頂梁就打普照擡頭一看這釧打來了後把撤手金剛亮臂右手攥住這槳杆往起一撩力量很足一下就把五莊主的大釧給磕出去了單手一亮槳橫風掃月對準賀永的脖項就打別看這槳葉沒有刃兒要真砸上能把腦袋給削下來賀永矮身形單釧走掃堂普照腳尖兒一點地長腰起來兩個人插招換式打在一處刷刷刷就是十個回合五莊主賀永一個金剛亮臂搠起狼牙釧一扎普照普照久經大敵立刻用銀槳的杆一壓順著一削賀永不撒手這手腕子非折了不行賀永趕緊把大釧就扔了如果這槳葉兒要是立著戳他五爺賀永就有性命之憂普照跨左步一斜身拿這槳葉兒平著一扇只扇在他肩頭以上就把賀永給扇出一溜滾兒去阿彌陀佛五莊主謔哈哈哈承讓承讓賀永臉色通紅賀永輸了自己起來撣了撣土提拎起釧來交給下人回去了八卦山還有哪位莊主與貧僧再戰三合正在這個時候兒鐵臂羅漢法禪僧就過來了他右手攥著亮銀方便鏟道老師傅你的功夫不錯呀把我的五弟給戰敗了貧僧法禪不才當場討教長眉羅漢鐵臂禪師普照雖然跟法禪不認得但知道頭一次杭州擂自己師弟童林就差一點兒把他拍死也知道法禪很不軟普照合著亮銀槳道高僧請進招來吧好法禪大鏟一合嘎楞一聲響對準普照的頂梁就劈下來了這大鏟頭兒比簸箕都大三面是刃兒嘎楞楞地響著普照上步一閃身合槳往外一挂法禪就勢往下一耷拉胳膊大鏟就回來了這下兒正是普照的腳底下普照腳尖兒一點地長腰起來法禪一轉鏟鏟頭就到了自己的身後鏟梁在眼前左手的後把月牙子擎起來照著普照的脖子就來了普照往後一撤步蹦起來上右步一斜身棚鏟頭蓋著普照的頂梁就砸就這三下好玄啦普照趕緊長腰出去兩個人越打越快十幾個回合開去普照可就不行啦封閉躲閃看管定勢不求有功但求無過不敢往裏進招了人家法禪把禪杖施展開來上中下走三盤恰如銀龍攪海把普照就圍上了普照一個失閃法禪橫梁架海把普照的亮銀槳就給磕飛了然後把方便鏟照著普照的胸口一扎普照橫著一躲在左肩頭上這大月牙尖子就扎上了撩了一個一寸多長的大口子這血喇就下來了普照蹬蹬蹬倒退出好幾步去法禪往後一撤身普照念佛阿彌陀佛高僧的功夫太好了貧僧輸了金睛紅龍應太和跟劉俊趕緊把老和尚攙下來了神行賽羅宜普妙拿出藥來給普照點上止住了疼痛好在傷不重衣服破點兒就破點兒吧法禪看了看大家道還有哪位請過來貧僧奉陪剛説到這兒旁邊兒有人説話高僧阿好俊的功夫在下不才當場討教原來是常州府北門裏清風巷賽判飛行俠苗澤苗潤雨苗澤通報了名姓法禪知道這是高人搠鏟梁蓋頂一擊老俠苗澤上左一滑步刀走纏頭裹腦二位當場打在一處
