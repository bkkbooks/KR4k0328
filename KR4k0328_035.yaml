body:
  text: 第三十五回司馬空八卦山投書童海川比八步打燈上回書正説到十老請八卦堂藥鋪老俠王十古王十古決定隨同海川去昆明回到內宅取軍刃又把事情跟老妻王大奶奶説明為了朋友要去八卦山一些日子對於這件事老太太倒沒阻攔只説你去吧想著看見李昆兄弟替我問候第二天一清早起來王十古圍好了十三節人骨鞭小包袱打好乾坤太極圖放在裏頭家裏都安置停妥大家從這兒起身登程就奔鐵善寺來了非止一日來到鐵善寺順山道往上走直奔鐵善寺的山門遠遠地往鐵善寺一瞧喝門口可聚了很多人自從他們爺兒十個走後鐵善寺的人就盼著老俠于成告訴二爺侯傑每到晚上多加點小心萬一王爺要出點什麼事你我都擔不起甭説出外頭跟人家八卦山鬧著事呐就鐵善寺請來的這些人裏也還有好些個二五眼的呐我們不得不防于老俠侯二爺白天陪著王爺在一塊兒説話計算日期琢磨著要來嘛可就該來了這個時候一個小僧跑進來阿彌陀佛王爺諸位老英雄阿山下來人了我家老當家的亞然和尚陪著很多人那裏頭還有一個老人生朋友到了王爺他們呼啦一下子二百多位東西配殿的人全跟著一齊往外走濟慈和尚頭前帶路來在山門外大家衆星捧月地陪著王爺王爺這高興呀抱拳道衆位把王老俠客請到了海川給王十古介紹道哥哥這就是當今萬歲康熙爺的四皇子雍親王爺王十古搶步進身跪倒了磕頭草民有何德能之處敢勞王爺玉葉金枝你出寺迎接我給你磕頭道謝哎呀老俠客久仰大名如雷貫耳今日一見緣在三生休要行禮折殺胤禎快起快起衆英雄往裏走一直來到東配殿大家落座全陪著王十古坐著王爺可説哎呀你們爺幾位來得很快呀老俠王十古把自己的事情都説了然後問王爺王爺你看這事情草民來了應當怎麼辦王老俠你是武林道的前輩本爵對緑林道是個門外漢你跟太極公是朋友他手下的孩子們跟海川鬧了事北京城大內盜走了國寶此事皇上十分震怒命海川待罪捕盜皇上既然震怒了事情就不好辦但只要國寶還了朝剩下的事都好辦王爺給王十古這麼一個杠杠翡翠鴛鴦鐲得給了皇上韓寶吳志廣到底怎麼樣都不要緊到時候報一個畏罪自殺皇上也沒處找去王十古也把自己來時所想的跟王爺提了草民跟李太極確實懸個朋友人家太極公太極十三式自成一家藝壓武林是多年的成名前輩我王十古打算寫封信讓他定日子約草民進山跟他談談或是請太極公到鐵善寺來由他去定到那個時候見面再談王爺點頭老俠客這是第一步太好了拿過紙筆墨硯來王十古提筆在手一揮而就寫完之後給大家念念裝在信封內説道海川你説派誰去好呢剛説到這兒旁邊有人念佛無量佛王老俠客貧道願往大傢夥兒一擡頭原來是南俠海內尋針昆侖道長司馬空王老俠説哎呀司馬仙長阿你這一次千里迢迢長途跋涉把我王十古接到鐵善寺坐未安席你又要下書去我王十古心中很不安寧還是派別人去吧無量佛王老俠一來貧道也不纍二來我想派個弟子去就不如派個大人去你説呢王十古點了點頭振遠賢弟阿還是你們爺兒幾個拿主意吧阿道哥要去那就請道哥辛苦一趟吧南俠換了一件道袍把書信揣在懷裏手裏拿著拂塵辭別衆人從鐵善寺下來直奔八卦山南俠司馬空到底是什麼心呐司馬老仙長想得也很多老篩海爺金元告訴三小回廟後設法請王十古南俠司馬空自報奮勇也跟著去了南俠又跟于爺想得不一樣南俠心想這又何必呢鐵善寺這麼多人非王十古不行那麼別人就不可以斡旋斡旋嗎現在把王十古請來有這麼一個機會我拿著信去憑我司馬空的名譽憑我司馬空的身份憑我司馬空的三寸不爛之舌準能夠順説李昆獻出國寶看來這南俠也惦著露個臉等到了金家酒店順著柵欄門往裏走挑簾櫳進了屋子花斑豹金榮帶著兩個夥計都在屋子裏等南俠一進來金榮趕緊過來司馬老仙長上下打量金榮看他還真有個相便問無量佛你是酒店掌匱的嗎阿不錯花斑豹金榮就是在下請問仙長你是海內尋針昆侖道長司馬仙長吧喲金寨主正是貧道我這一次到這兒來打算拜見你家大莊主但不知可以不可以老仙長這樣吧你既然打算進山我準備船隻你看好不好金榮出去安排老半天工夫蹬蹬跑進來了金榮陪著司馬空由酒店出來到南盤江岸的渡口一瞧阿這氣派可大了鋪江蓋水的船隻足有大小八十只旗幡招展每一個船上都有幾名莊兵卒巾號坎打著裹腿絹帕纏頭手中抱著利刃如臨大敵正居中這只大船已經系好了纜繩搭好了跳板這個大船長有八丈寬也有三丈挂零一隻大舟船三十二名水手四個抱頭的兩個掌舵的在船頭兩塊夾板三道鐵腰一丈六尺長的大竹竿藍緞子三角旗面白蜈蚣走穗白火焰白飄帶金槍頂紅纓子上頭有字雲南八卦山鬥大一個李字被江風一刮撲嚕嚕嚕嚕一個徑地響船上一邊站著四十名垂手侍立的兵丁八個馬扎上坐著八位莊主爺那勢派大了南俠一想李昆這是什麼意思阿這是接我嗎接我也不至於這樣阿耀武揚威刀槍林立這是嚇唬我吧一定是南俠正想著只見人家八位寨主爺下了船來到江邊上為首的一位問哈哈哈你是司馬仙長阿南俠單掌打稽首口頌佛號無量佛你是八卦山的李老莊主太極公吧不才司馬空拜見嗷久仰老仙長的大名阿總想著到揚州去拜望老仙長但是我的事情太多未能如願今天一見簡直三生有幸哈哈哈恕過李昆接待來遲呀無量佛老俠客貧道司馬空有何德能之處敢勞老俠客如此的客套看待實在不敢當彼此寒暄之後都上了船老俠李昆用手一指衆兵丁提錨鎖響串鑼解纜繩撤跳板船篙點岸橫插南盤江直接奔北岸等來到山口由船塢又換乘小轎直奔山寨而去只見大片的山峰插入雲端煙籠霧繞一排排的莊兵都抱著軍刃列隊兩旁南俠心説這是如臨大敵阿他也不言語跟著往上走轉眼之間來到南莊門司馬仙長一瞧李昆這麼闊怎麼他的家裏頭連個正兒八經的門樓都沒有只是一般的普普通通的屏風門實際上南俠不懂這是八卦連環堡九個人下了肩輿後由田子步頭前帶路引進了正南門每一道院每一道門都有重兵把守全帶著傢夥司馬空心説這是幹什麼衆人一直來到中央戊己土大廳北俠可沒出去接他在屏風後頭坐著呢李昆李太極請南俠上座哥八個依次相陪獻上茶來南俠喝了一碗茶剛要説話李昆抱拳司馬仙長你是鼎鼎大名的南俠我弟兄要交你巴結都巴結不上你這一次來使我八卦山蓬蓽生輝可有一樣你要是從揚州九龍觀來那你我弟兄就至親至厚你看得起我李昆移尊下教我求之不得我得把你打板高供因為你是從你的廟裏來的如果你要從鐵善寺來哈哈哈可就兩説著了你要真的憑你三寸不爛之舌兩行伶俐之齒打算順説李昆你縱有風流侯公之善辨浪子陸賈之奇才范睢蔡澤之言蘇秦張儀之口恕李昆不奉陪呀南俠一聽心説哎喲李昆呀你好厲害呀我聽劉俊説人家劉俊到你這下書來連一個兵都沒瞧見就是普普通通的人隨便出入阿怎麼我司馬空一來你們兄弟八人擺船隻迎接到江岸一路之上列武陳兵這是沖我示威阿相反的到大廳我還沒説話呢你就把我嘴給堵上了你明知道我是從鐵善寺來的嘛你怎麼還説出這話這是不讓我説話南俠又一想我們到底還是朋友嘛我該説的就説至於説你怎麼樣讓我起火讓我著急讓我生氣我可以不著急不生氣思索至此南俠道無量佛李莊主貧道這一次是從鐵善寺來但是李莊主你是上三門高門的弟子侯童二位也是武林道的高門戶你們雙方為這件事情如果爭鬥起來引起殺人流血叫武林同道説我們同門自相殘殺我看這就不美了吧恐怕叫晚生下輩恥笑山人這次來原為的是勸一勸李莊主為什麼不能化吳越為一家呢雙方彼此多幾個朋友在武林同道多幾個幫手老莊主獻出國寶獻出二小不就完了嗎南俠説的是實話李昆李太極聽完了把臉就沈下來了司馬仙長我剛才説的話閣下沒聽清還是憑三寸不爛之舌來作説客讓我李昆交國寶交二小束手到案打官司這可不是我李昆不夠朋友我不能聽你的侯振遠童海川大鬧鐵善寺掌震濟源僧這就是沖著我李昆示威這叫敲山震虎殺雞給猴看讓我李昆看看你給不給國寶你交不交二小交了是你的便宜如其不然你八卦山就是鐵善寺我是個泥人也有三分土性吧想不到你還沖著我弟兄八人説這樣的話你要是幫著童海川打架不惱助拳人我姓李的不在乎你要幫著我我不敢用咱們還是刀兵相見吧來阿擺隊伍把南俠送出八卦山哎喲人家往外攆了南俠雖然説是出家人也不由得無名火起李昆你拿我司馬空不當人阿有心亮寶劍跟李昆鬥鬥其實南俠真的亮出寶劍人家李昆也不跟他動手人家會有説話我跟你無冤無仇阿我鬥的是侯振遠童林阿我把侯振遠童林打敗了你要幫忙你上來我不含糊現在我犯不上白饒一命司馬老仙長一看作説客的辦法不行也就把氣平下來了禍福無門庸人自擾阿我把人家王十古的信拿出來就完了我逞這個能幹什麼想到這兒便對李昆説老莊主不要著急這一次貧道到八卦山一是為了瞻仰八卦山八位莊主的風采二來有閣下的故人托我帶來一封書信請你觀看阿你是奉我朋友下書信來的哎呀司馬仙長你怎麼不早説呢司馬空一伸手把信拿出來了閣下故人廣東王十古托我給你帶封信來哎呀老仙長阿恕我李昆冒昧冒犯仙長這是我李昆的不對了南俠一聽人家給我作揖是沖著王十古王十古是他哥哥沒有王十古這三字人家敢拿草紙把我捏出去有王十古這三字就給我作揖賠禮道歉默司馬空心説李昆呀李昆可真有你的阿南俠雙手把書信遞過去了李昆李太極把信接過來對胡元霸道二弟趕緊吩咐人預備臉水漱口水準備好了胡二爺把信接過去李昆李太極洗了手漱了口然後重新捧著書信沖著鐵善寺沖著東南方向鞠了三躬這下可把司馬空的鼻子給氣歪了李昆呀你對王十古就這樣你對我司馬空就那樣不都是個俠客嗎不都鬍子白了嗎誰能高三丈南俠氣得直咬牙可表面上還樂呵呵地站在這裏李昆看完了信説二弟你們大傢夥兒洗洗手把哥哥的信接過去看一看哥兒七個過來胡二爺舉著大家一一過目閲畢裝好胡二爺問李昆哥哥王老哥哥這封書信咱放在哪李昆猶豫了半天道兄長的書信放在哪也不恭敬拿到後頭放到祖先堂去吧是胡二爺親自捧著信送往後面祖先堂司馬空心説哎喲要把我氣死了李昆一躬到地説老仙長奉我兄長之托來到八卦山恕過李昆言語衝撞多有冒犯我給你準備酒宴一定盛情款待南俠心説我要吃了你的飯我非得噎嗝不成便對李昆説太極公不瞞你説我來的時候已經吃過飯了太極公要認為可以你趕緊修書信貧道我回去李昆擺手不敢給兄長修書兄長的書信我弟兄領了要是那樣就請南俠客回到鐵善寺面見我的哥就説我弟兄八人給他請安了至於我們弟兄打算怎麼辦明天我派我二弟胡元霸親自到鐵善寺一來多年未給哥請個安二來把我弟兄的心思跟哥哥提一提那個時候任憑我兄長示下南俠説無量佛老莊主既然如此貧道告辭等一等接你進山送你出寨哎呀實在隆重貧道受寵若驚我不敢當阿你就派