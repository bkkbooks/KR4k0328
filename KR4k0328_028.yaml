body:
  text: 第二十八回青草坡英雄打猛虎懶龍溝於恆遇至親上回書正説到壞事包張旺蠻子孔秀在半路途中餓著甘虎于恆兩位猛英雄于恆是真傻可甘虎是外璞內秀他明白這兩個的鬼主意這回兩個傻小子要嚴懲兩個壞小子這天早懸四個人從店裏出來甘虎於恆兩個人大步流星走得很快甘虎對於恆説牛兒小子再快點兒慢著點兒一會兒還得馱他們倆呢甘虎搖搖頭説你快點兒吧傻小子於恆可就跟上甘虎走到前頭虎兒什麼事阿我説你明白了嗎我明白什麼我什麼也不明白不是這一路沒吃是他們倆成心餓著咱倆嗷原來是這麼回事那咱倆幹嘛還要馱著他倆呀甘虎説誰讓他倆是臭豆腐和壞事包呢這樣吧一會兒孔秀還得讓你馱他壞事包讓我馱著這回咱們不讓他們一個先上一個後上咱倆讓他倆一塊上你等著孔秀一叫你先別太蹲叉著腰等著我也叉著腰等著然後咱倆一塊蹲下等他倆一騙腿咱們把他們的手腕子搬住開始轉圈掄他們倆不管他們倆怎麼求饒我不鬆手你也不鬆手我怎麼鬆手你就怎麼鬆手那要把他們掄壞了呢嗨他們怎麼不怕把咱倆餓壞了呢要説也對這壞事包和臭豆腐一個好東西也沒有兩人剛商量好張旺和孔秀跟上來了孔秀先説道哎呀牛兒小子你還來馱我吧阿彌陀佛虎兒小子你也來馱我吧好我來馱你牛兒小子你來馱臭豆腐甘虎心想牛兒小子你可別説漏了兩個人都蹲下身孔秀一騙腿兒騎上牛兒小子張旺一騙腿兒騎上虎兒小子就在他們倆剛一騙腿的時侯手腕就給攥住了甘虎一揪壞事包張旺張旺就知道要壞事兒馬上也把甘虎的手腕給扣住了傻小子於恆也是一樣他一揪蠻子孔秀孔秀也把他的手腕給攥住了但是人家兩個傻小子的手就像是鐵鉗子一樣緊緊地把兩個壞小子夾住然後給掄起來了哎喲不要掄不要掄了阿彌陀佛別掄了甘虎一瞪眼別掄了沒那事小子你們倆人成心餓著我們倆有飯你們倆偷著吃還騎著我們倆今天把你們倆掄死算啦阿彌陀佛你可別介哎喲牛兒小子爺們兒不要掄了甭廢話他不停我就不鬆手嗚嗚實在把兩人給掄得夠嗆甘虎猛地一撒手去你的吧叭差一點兒把壞事包張旺給摔死咕嚕嚕滾出好遠傻小子于恆看甘虎摔上了他也摔上了哎呀慢一點呀還沒等孔秀喊出來於恆撲通一聲也把孔秀扔了出去哎呀壞事包你出的這個餿主意簡直要了我的命了倆傻小子走過來張旺孔秀趕緊起來揉脖子好哇可把我們摔著了你們倆太壞了你是臭豆腐他是壞事包你們倆餓著我們還騎著我們哪有那事阿老實點兒不老實我們還開掄哎喲別介甘虎瞪眼到時候就得吃肉不給吃就開掄這回倆壞小子被倆傻小子給管住了説哪兒吃就哪兒吃説哪兒住就哪兒住沒走幾步甘虎把自己皮搭子解下來裏面有三十二斤八楞紫金降魔杵手裏提著壞事包給我扛杵阿彌陀佛這這我扛得動嗎嗷看來你是不願扛杵阿我可是扛了你好幾天你不扛杵也行來把我扛起來走我扛你幾天你扛我幾天怎麼樣這可把壞事包給嚇壞了阿彌陀佛我還是扛杵吧甘虎有二百多斤更扛不動了張旺把杵拿過來扛上了傻小子于恆一看甘虎讓張旺扛杵他也把杵解下來了臭豆腐你也給我扛杵哎喲牛兒小子你不要跟虎兒小子學呀就得學他跟我説了他怎麼辦我就得怎麼辦你扛不扛阿你要不扛就蹲下讓我騎上你你扛我那我更扛不動了我還是扛杵吧沒法子孔秀也把大杵扛起來了還一個徑兒地埋怨哎喲壞事包你出這餿主意簡直不怎麼樣現在太陽老高就住店壞小子扛不動杵阿等到早晨太陽出來了晚晚地才出店什麼好吃什麼想吃多少就吃多少一路直把兩個壞小了管得老老實實飢餐渴飲曉行夜宿非止一日到了雲南境內這天下午太陽還高高地挂在天上張旺就忙説阿彌陀佛咱們住店吧我們倆可拿不動了行阿住吧甘虎答應了於恆又搭茬道住店就住店吃飯就吃飯反正你們倆得扛著杵對就得你們倆扛著什麼時候到什麼時候算西南東北的通衢大道旁有一個村莊不算太大路北有塊木牌子上面寫著三個字密林鎮四個人進了村口路南有家小店叫許家老店前後兩三座院阿彌陀佛咱們住店吧張旺正説著店夥計迎出來了四位爺台住店嗎往店好像還早了點兒彌陀佛你別管早晚我們先吃飯吃完飯我們也許走也許不走有上房嗎二道院三間南上房好吧那我們住店吧夥計帶著這四個人順著店門洞進來門洞的西邊有個門挂著門簾門的上面有一塊橫匾緑油漆灑金星寫黑字匱房旁邊還有一個小點兒木牌上面寫著小字銀錢重地間人免進張旺孔秀明白這是匱房四個人正走到門口忽然從裏面傳出嘎嘎的笑聲要不然幾個人誰也不會往裏面瞧這個人的笑聲特別大四個人不由得放慢了腳步全往匱房這邊看傻小子於恆更是瞪著雌雄眼往裏面瞧這間房很寬敞南面有窗戶北面山牆臨街跟大門一平靠南邊的窗子下有一個長條桌子上面擺著文房四寶放著一本帳有天平砝碼看來這是寫帳先生呆的地方靠西牆是個銀匱鎖著銀匱上面有個鑲牛皮的皮褡子匱子旁邊立著一條八楞紫金降魔杵露著黃澄澄杵把上的八寶鐙疙瘩傻小子一看心想這條杵可比我那條強人家那杵多好要是我能給弄過來他看上人家的杵了匱房的北牆是炕中間有個炕桌上面擺著酒菜面對面坐著兩個人東邊這位看不見臉只能看見西邊坐著的人只見這人個大得像甘虎似的也是口袋布一身短衣襟小打扮扎著皮挺帶腳底一雙踢死牛的豆包鞋也是一張大黃臉不同的是這人眼角顴骨都發黑好像是從口外來的被口外的硬風吹得皮糙肉厚對過這位瘦小枯乾穿著一身白綿綢子褲子汗衫兒鞋放在地下這位就是本店的掌匱許蒙人稱搖頭貓據説這是從小落下的毛病坐在哪兒都好搖頭許蒙是鐵善寺的門人弟子也是個緑林道他對面的黃臉大漢是黃風鬼燕凱也是鐵善寺的弟子家住塞北沙燕嶺是那的二寨主他騎著一匹白毛駱駝金睛雪花駝這次鐵善寺設擂重陽會聘請南北十三省所有的英雄到鐵善寺來下帖子的工作大部分靠黃風鬼燕凱就因為他有這匹日行千里的駱駝一路上把帖子送完了最後來到密林鎮和許蒙見面許蒙説你帖子不是都送完了嗎就在我這多住兩天吧黃風鬼答應了於是就在大車院裏立上一根將軍柱楔了個圓環挂上個草筐籮裏面拌好了精飼料喂駱駝柱子周圍鋪上沙子因為駱駝要臥在沙子上叫趴沙然後許蒙備下酒席在匱房裏款待燕凱黃風鬼燕凱把他的八楞紫金降魔杵和他裝銀子的皮褡子立在銀匱上靠著牆兩人喝著酒説著話這一切傻小子于恆全看在眼裏夥計帶著他們四個人繞過木頭影壁順著西夾道繞到第二層院子的三大間南房四個人進了屋把前後的窗于支開十分涼快屋子十分乾淨像是有錢人才能住的屋子四個人坐在炕上張旺孔秀忙把杵放到床上這兩人纍得直喘擦臉漱口後夥計問四位爺台吃點嗎我給你們泡菜去傻小子于恆沖夥計一招手過來夥計一看于恆的雌雄眼瞪著怪可怕的喲爺台你有什麼事就沖你説這話就應當給你一個嘴巴把你的嘴抽到後腦勺去夥計害怕怎麼回事爺台到你這來是喝嗎渴了找茶館到你這是吃飯你不知道我們是餓嗎夥計連連點頭是是是我給你預備飯去什麼飯臭豆腐壞事包我管不著給我們倆一人一筷子餅夥計不知道臭豆腐壞事包怎麼回事可也不敢問只問道一筷子餅是多少混蛋這都不知道一斤一張的餅摞起來拿筷子一量有一筷子高就行你這是幾天的飯幾天一頓一盆燉牛肉要爛糊的有沒有夥計笑笑你打聽打聽我們許家店燉牛肉在這一帶都出名本村住戶家裏來了親朋好友都到本店來買牛肉回家款待客人你就知道爛糊不爛糊行行虎兒你是不是也吃這個是也來一筷子餅一盆牛肉聽見沒有聽見了我給你端去夥計轉身剛要走張旺把他給叫住了你給我們倆沏點茶把茶和菜一塊端上來我們倆纍了得先喝茶再喝酒菜行阿爺台我給你安排去夥計剛要走於恆又把他叫住了站住哎喲爺台你又有什麼事阿要吃牛肉吃餅得先騰地方得找個地方拉屎呀嗷你要解大手哇什麼大手小手的我要拉屎你從這出去往西順著夾道再過一層院就到了咱們的大車院院裏面有大車還有後門現在可能後門沒關著西南角上有兩間大房子那就是廁所好小子滾蛋吧喝你説話可真夠難聽的夥計轉身走了虎兒小子走吧拉屎去我不去嗨走吧跟我搭個伴兒去再説了到那蹲蹲坑就許拉出來了肚子騰出點地方能多吃點肉多吃幾張餅你這人怎麼這麼糊塗阿好吧我跟你去兩人一同出去了壞事包張旺忙囑咐道快著點兒一會人家把餅和肉就端來了兩人按照夥計所説的路線來到了大車院果然有個後門兩扇大柵欄門開著大車院中間有個碗口粗的木樁約有四尺多高木樁中間有個鐵環子挂著個盛飼料的笸籮一根繩栓在柱子上地下臥著金睛雪花駝雙峰駝就像兩個大肉包鼻子上穿了個窟窿眼用一根竹棍穿過去柱子的那根繩的另一頭就拴有這竹棍上金睛雪花駝胸前挂個鈴鐺它正趴沙呢于恆甘虎沒見過駱駝都不認識于恆是淮安人只見過船甘虎早先是南京金陵人那兒也沒駱駝於恆問他你認得這是什麼嗎甘虎自尊心很強知道當然知道叫叫叫長脖子馬於恆搖頭説我告訴你吧這叫小耳朵驢得了吧我看咱倆還是先拉屎吧別價咱們還是先騎騎它吧你瞧這還有個屜是人騎的于恆不樂意地説騎它騎不好再摔下來挺大的嘴巴興許咬人管他呢甘虎一擡腿朝駱駝的屁股上給了一腳駱駝吼地一聲叫了起來甘虎把繩解下交給於恆拉住了於恆牽著駱駝出了後門臉朝西甘虎一騙腿兒上去了甘虎仗他個高人家駱駝是先趴下等人上去了它才起來甘虎不懂他跳上駱駝的背上駱駝前後晃了晃甘虎覺得不大舒服他把駱駝當了一般牲口籲這籲字甘虎明白是讓牲口站住但這是黃風鬼燕凱的駱駝正好和一般的牲口相反籲是快跑這是從小給駱駝排練出來的因為燕凱是緑林人不能駱駝在前面跑後面迫的一群宜人一喊籲它就停下了所以黃風鬼燕凱特意反著訓練越喊籲跑得越快甘虎不知道他這聲籲的奧祕駱駝噌地一下躥出去一溜煙的向前奔去金睛駱駝是寶駝腳底特別的快呀騎上它快騾子快馬都迫不上阿傻小子於恆一瞧喲壞了站住站住可你再怎麼喊連人帶駱駝影都沒了喲這長脖子馬跑得這麼快壞了虎兒小子把人家長脖子給拐跑了人家不得跟我要呀我哪兒給人家弄去傻小子於恆順著大柵欄門就往裏跑越過緊後頭這層房子直奔二層院來了再説傻小於甘虎騎著駱駝心裏非常害怕突然這駱駝如虎嗥叫吼聲大極了甘虎更是膽顫心驚你別以為大騾子大馬踢人一腳受不了這駱駝踢人可更受不了哇因為它這一蹄子踢上你外表看不出來一點兒傷沒有傷在肉裏頭它這一叫喚黃風鬼燕凱在匱房裏聽見了喲誰動我的駱駝了許蒙攔住哎燕寨主我的兄弟你放心哥哥我在咱們密林鎮一帶還不敢説有個大名但是緑林道的朋友他也得讓個面呀他敢動咱們的金睛雪花駝嗎不我這駱駝沒有生人動它不叫喚你聽見沒有要不咱們瞧瞧去兩個人下了地帶著夥計往後來這匱房可就沒人了十幾個人順