傅從鍋臺裏面拉出來啪地一下就給扔到肉鍋裏去了這肉鍋裏油花四濺哎喲燙死我了牛肉濺出來了傻小子撿著就吃劉三爺看見就喊默靳師傅你可犯了地名了這位靳師傅叫靳國你這回不叫靳國叫進鍋了好幾個人都幫助架也架不上來劉三爺在一旁喊哪兒來的野種跑到這兒來蒙肉吃還不算還把我們大師傅扔到鍋裏哥兒們兄弟們打他有個叫王二楞的小夥子嗖地一下於就蹦起來了他長得壯實個兒也不比於恆差喝你這小子竟敢到懶龍溝來蒙飯吃我王二爺饒不了你王二楞伸手就去叼於恆的腕子於恆一躲説幹什麼吃你點肉是賞你臉呢你伸手就打人你是哪幾哄來的于恆用右手往王二楞的肚子上一捅也奔肉鍋來了壞了那幾個年輕人好容易把靳師傅從鍋裏撈出來剛撈到鍋臺邊兒哎喲哎喲這王二楞又砸下來了剛好把靳師傅又給砸鍋裏去了劉二爺大喊哥兒們兄弟們給我上呼啦啦一下子上來了十幾個年輕人個個都是上山打窯的主兒身強力壯打呀十幾個往上這麼一圍於恆這雌雄眼一瞪來了一招叫虎抱龍又猛又狠這是金鋼八式掌裏的招數劉三喊上了好哇這小子受過高人指點只見於恆猛一轉身掄起就打擡腳就踢這些工友可吃虧了你起來他躺下他躺下你起來劈裏撲楞十幾個不行二十幾個二十個不行三十幾個上來就是一倒一大片一個個烏眼青捂著腮幫子的揉腿的什麼姿勢都有大夥兒議論説這大眼兒賊厲害呀劉二爺還真有招大家不要靠近他預備石頭子兒崩他這山場上到處都有石頭哇大塊小塊都有果然大夥兒呼啦啦都撤出來了把傻小子閃在當中這些人貓腰撿石頭就崩砰噔乒乓一陳亂砍石頭塊砸在他腦袋上身上喝這是幹什麼呢給我解癢癢呀他一點兒不在乎本來就一隻眼他就把那只眼也一眯愛往哪兒砸就往哪兒砸大家手底下不間著砰噔乒乓如急風驟雨一陳亂砸人家一人一隻手扔一塊就好幾百塊呀這樣打來打去就把傻小子打倒在地上了傻小子心説來吧打吧像這種山場弄死個人很不算什麼石頭子都快把傻小子埋起來了成了石頭堆了傻小子兩碗肉五個饅頭下去用這石頭子一崩倒崩舒服了好像睡著了他閉著眼睛劉三爺説別打了別把他崩死了大家都不打了在四下瞧著劉三爺説我過去看看劉三爺用手扒拉扒拉傻小子的臉露出來了劉三爺心裏想許把他砸死了吧他怎麼不言語呢劉三爺的右手往他下巴頦一擱想試試他的鼻子還有沒有氣劉三爺的手剛到傻小子的嘴邊兒傻小子閉著眼迷迷糊糊想起了剛才吃的那塊脆骨來擱在嘴裏哢嘣哢嘣默那個香呀他琢磨著香就把嘴張開了劉三爺正把手伸到傻小子的嘴裏傻小子想怎麼想脆骨這脆骨就來了傻小子哢喳一下哎喲把劉三爺的手指頭咬下兩個半截來劉三爺托著右手阿呀臉也白了汗也出來了好幾個人把他架一邊去了猛英雄起來往四下一瞧喝他的腳底下可淨是石頭是人家崩來的他貓腰撿起一塊兒石頭好哇這回瞧我的吧他撿起石子往四外崩劈裏叭啦又是一陳崩得大夥兒叫苦連天劉三爺叫著快快架著我去找掌匱的好幾個人架著他一直往西去山根底下有兩座大窯洞也安上了門窗陽光充足挺亮堂的窯洞是冬暖夏涼這裏有兩位掌匱是親兄弟倆這時二位正在窯洞裏喝茶呢他們準備等外面的兄弟們吃得不大離兒時也要吃飯了這時劉三爺被人架著進來了二位頭疼死我了喲劉三爺怎麼回事你要問是如此這般這麼這小子到這兒來蒙飯吃還要打架我以為他被打死了把手伸到他嘴裏他一下子把我的手指頭咬下來兩半根兒這人來擾咱們懶龍溝的山場阿真大膽竟敢到懶龍溝來攪鬧哼豈有此理來人呐先給劉三爺的手上點藥説著一伸手到木架上拿下兩口刀兄弟倆每人一口往身上一背這兒有人給劉三爺上好藥哥兒倆可就出來了眨眼之間到了山場別打了什麼人敢到我懶龍溝攪鬧這時大家讓傻小子於恆給崩的四下逃竄有好些流血的兩位頭兒你來了這小子太凶了傻小子於恆説不讓我崩我就不崩了肉可得給我留著猛英雄往這兒一站身上的衣服都給崩碎了特粗特壯銅鑄金剛鐵打羅漢一般阿兩個頭兒過來了於恆一看這兩個頭也都在三十多歲哥兒倆長得差不離濃眉大眼鼻直口正一對元寶耳青鬍子茬一條大辮子穿藍大褂腰裏煞著褡包每個人都拿著一口刀晃晃悠悠走了過來問你是什麼人擾我懶龍溝分明是太歲頭上動土老虎口邊拔毛傻小子捂肚子一瞪眼心想這二人怎麼瞧著怪眼熟的呀傻小子用手一指前面這位道你你不是小五嗎跟著又一指後面的那位説你不是小六嗎這二位一愣上下一打量於恆恍然大悟哎呀你是牛兒哥哥噹啷啷這兩人把刀扔下進身磕頭牛兒哥哥你好阿十多年不見了傻小於伸手把他們攙了起來説道五哇六哇原來是你們兩個真是千里他鄉遇故交呀敢情傻小子是淮安府的人跑到雲南這兒碰到親戚了這個五兒叫杜勇這個六兒叫杜猛他們是親哥兒倆呀他們的母親就是牛兒小子于恆的姑姑不過於恆的父母沒有了杜勇杜猛父母也沒有了但他們杜家的家業可比於恆他們家富裕得多哥兒倆也是淮安府漂母河于家莊的人哥兒倆憑自己過日子過得也不錯於恆吃窮了經常到表弟家去吃飯所以哥兒仨的感情特別好杜勇和杜猛也從小愛練武功而且功夫還不錯他們家有個街坊姓王名字叫王仁外號叫王老實他為什麼叫王老實呀他是指賣豆腐種地吃飯他家東口有那麼十幾畝地這個地呀挨著于家莊的首戶大財主姓張叫張有義張有義有個兒子在淮安府當紅筆師爺這一來張有義仗著官府的勢力仗著他兒子的勢力無惡不作欺男霸女魚肉百姓于家莊的黎民百姓沒有不恨這個張有義的王老實的地挨著張有義張有義瞪著眼就霸占了王老實兩畝地人家硬把界石移過去了王老實敢怒不敢言得了忍了吧王老實能忍本村的人誰都知道可誰聽見這事誰都生氣尤其是杜勇杜猛都是十幾歲又會兩下於就找王老實去了哥兒倆説王仁哥你怎麼讓張有義這麼欺負你呀王老實長歎一口氣眼含痛淚細説一遍杜家弟兄聞此言氣沖鬥牛怒生肝膽欲與張有義論爭一番
