body:
  text: 第六十二回石寶奎掌震三尺鬼夏九齡招親石家鎮上回書正説到大魔莊張方巧遇親娘舅銀鈎太保尚義的亮銀鈎被打掉張方萬般無奈才奔石家鎮而來二人從東村口進來遛遛達達往前走一眼看見路北臨街的民房當中有一條棧道一直通到鎮口外棧道的西邊就是一條大牆牆也高也遠也通到北村口張方一琢磨我小時候跟著我爹到我石大爺家來過仿佛這房子就是神掌地行仙石寶奎石大爺的張方還認得出來廣亮大門門口兩邊有八棵門槐枝葉茂盛就在這麼個工夫咣啷一聲響門分左右打裏頭咳嗽一聲出來個白鬍子老頭大個兒赤紅臉皺紋堆壘頂都謝了白剪子股小辮垂於腦後一部大白鬍子苫滿前胸蠶眉朗目兩隻眼睛不亞于兩盞金燈哦正是神掌地行仙石寶奎老俠來到門口夥計把門開開老頭出來遛遛達達往西走走出不太遠路南裏有個兩層樓的小飯館早晨起來賣包子老頭兒一想得了在這兒吃點東西吧石老俠扶著扶手騰騰騰地上樓梯來到樓上看前後窗戶開開過堂風很涼快老俠石寶奎坐好了讓夥計給送過來包子一碗粥還有一碟白糖老人家就吃上了眨眼之間二十個包子粥也下去了吃飽喝足夥計們把傢夥都撤下去把桌子擦抹乾淨老三呐給我寫在帳上吧老爺子今兒個別寫帳了阿哈哈為什麼有人請你的客把飯帳給付了胡説到咱們的家門口來讓人家付飯帳咱們只能付人家的飯帳你怎麼隨便胡來呀你看他説了是你的侄子不是外人有些年沒瞧見你了哪兒呢你看阿老三拿手這麼一指有人説話大爺侄子我付了你的飯帳老人家右手一推鬍子扭項觀瞧這是誰哈哈大爺你連我都不認得了我家住在鎮江瓜州我爸爸張鼎是你的兄弟噢你是方兒阿可不是我嗎我聽説你不是廣東學藝去了嗎大爺我是學藝去了你從家裏頭來呀阿你爸爸跟你媽都挺好的嗎托大爺福都很硬朗那麼你上這兒幹什麼來了怎麼大清早兒就來到我家大爺我有點事兒我不好意思跟你提呀孩子哎咱們爺一輩子一輩的交情有什麼不能提的孩子你坐下張方也知道老頭的脾氣性如烈火這種人拿話一激他他的脾氣就上來大爺我在廣東龍門縣清源山寒風島祥慈觀跟我師父歐陽爺學藝十二年大爺可不是我吹呀三稜凹面呂祖錐一條六隻棗孩兒鏢還有三隻邁門弩師父起的外號叫病太歲南七北六十三省練功夫的他要能在我的跟前轉仨圈那就算他不辜負平生所學幾十年的力氣沒白費阿喲這麼好的能耐呀大爺得把你刨出去石寶奎心説還真不錯跟別人這麼説跟我還得把我刨出去好往下説張方接下道我奉師命下山回家了沒想到我們鎮江出了十八條命案這個采花賊叫采花羽士陳道常我順便拿這十八條采花命案的主凶蒙聖恩欽封我為隨行衛員伴差官保護著年羹堯欽差查辦四川開倉放糧噢方兒你做了官兒可不嘛大爺但是水漲船高不管我張方的官兒多大你也是我大爺呀你也跟我爸爸是朋友阿哈哈哈好孩子對後來呢大爺你聽我説我跟我師叔童林帶著我幾個師兄我們一塊兒保著大人由打北京城出來沒想到到保定府清苑縣有大膽的賊人行刺賊人是誰呀一棵苗禿子義士馬亮紅毛禿頭狸子馬俊這爺兒倆為首帶著一百多賊人進了清苑縣公館孩兒我全憑三稜凹面呂祖錐一條跟我師叔童林我們爺兒幾個把賊人全打跑了可是大人十分震怒這麼多的賊人來到公館行刺你們沒拿住一個這怎麼成呢準備了公文一份讓我師哥多臂童子夏九齡跟我私訪分頭追趕捉拿賊人沒想到我們碰上了不但碰上紅毛禿頭狸子馬俊而且還碰上采花羽士陳道常沒想到他們逃奔大魔莊兩個魔鬼頭把這欽犯跟淫賊留在家中嗨這兩個東西可恨怎麼能容留這樣的賊人呢是阿孩兒我夜晚之間跟我師哥夏九齡就去到他家大爺真沒想到阿這花面魔王袁金標鐵面魔王袁金豹兩個魔鬼頭這麼大的能耐當場一動手我師哥夏九齡叫他們給逮住孩兒我真急了唰啦啦一伸手我把三稜凹面呂祖錐亮將出來跟賊人這麼一戰哎喲這一場凶殺惡戰呐無奈雙拳難抵四手猛虎不敵群狼他們人太多上百口子人圍著孩子我一個呀一不留神我的三稜凹面呂祖錐叫魔頭袁金豹給打掉在他的院中孩兒我好不容易才跑出來石老聽了後心想見著我先説山後説天説完大塔説旗杆海子城門駱駝象什麼大説什麼鬧了半天叫人家給打敗了便問你怎麼到我這裏來了你聽著阿來到村口外頭我可就發了愣大爺我我我在姥姥家的門口叫人欺侮了我寒磣不寒磣呐哎對這寒磣可我姥姥家門口的人不寒磣嘛大爺連你都在內呀孩子我叫人欺侮了你不管張方這麼一説老頭一托鬍子哈哈哈哈哎小子阿你怎麼不找我來呀張方心説有門這一句話把老頭子的火兒激上來了大爺我不能找你呐説著就哭起來石寶奎卻勸道你先別哭別難過你怎麼不找我呀我想這個大爺我沒孝順過你呐我拿二兩點心三兩茶葉我孝敬你算小子我一份孝心我來到家門口我就應當拜望拜望你我給你磕個頭沒想到我剛到這裏遇上這事我沒孝敬你我有什麼臉兒上你家裏頭呀我又一想得了離尚家台兒挺近的我找我舅舅去吧老俠石寶奎點了點頭你找你舅舅去了嗨不找我舅舅我不生氣一找我舅舅我真生氣孩兒阿你生什麼氣我趴在地上跟我舅舅舅媽磕頭我舅媽耷拉著臉子不大好看問我你幹什麼來了我就把這件事情這麼一説我舅舅這就穿衣裳拿軍刃沒想到我舅舅給他們打趴下了石寶奎眼一瞪這還了得我給你撈面子去説罷就走張方心裏想笑嘴上卻説大爺你先等一等常言説得好人老不講筋骨為能英雄出於年少老人家九十高齡一世的英名倘若為這件事情被二魔所傷孩子我吃罪不起也把老人家的一世英名給葬送你老人家歲數太大了默喲張方這小子真能做戲默他用兩手捋著老頭的白鬍子一個徑地哆嗦老人家一托頷下銀髯用手點指仰天狂笑哈哈孩兒阿我聞戰國廉頗年逾百歲而為將東漢平津年近古稀而為相他們一文一武都有超人頭地的本領何況老夫雖然年邁老馬嘶風雄心未減孩兒阿隨我來張方高興得直想跳高我把老頭激得連南北都不認得了爺兒倆一前一後下樓出離了小飯館來到自己家門口石寶奎乓乓乓一拍門夥計把門開了石寶奎道你上後頭去告訴姑娘把槍給我拿前邊來我要帶著我這小侄子走趟大魔莊我揍袁金標袁金豹去夥計不知道哪兒的事阿往裏走一直到後面繡樓前有婆子攔住夥計把事情一提婆子趕緊來到樓上面見姑娘給聖手嫦娥女石素蘭把這事情説了姑娘當時可就一愣爹這是為什麼阿這雙魔有多大膽子又得罪老頭子來到里間屋門後一伸手把老人家的槍拿出來交給婆子下了樓交給家人家人拿著一直來到大門口外頭張方一瞧九尺長的槍桿一尺八寸長的槍頭鴨兒踴式鋥明瓦亮槍桿是臘杆的比鏡子面都亮紫亮紫亮的這是大槍老人家把槍拿起來方兒阿走直奔大魔莊去了這個時候太陽都老高了爺兒倆走近村口外的樹林裏頭有人往外探頭張方就瞧見了喲我舅舅來了尚二爺不放心知道哥哥石寶奎的脾氣性如烈火自己的外甥張方這嘴一點把門的沒有萬一爺兒倆再吵起來這個就麻煩了尚二爺不能在東村口袁家墳呆著了他轉到大魔莊的西南樹林邊上來一看哥哥石寶奎提著槍氣哼哼地往前走張方在後邊跟著張方一眼就瞧見了尚二爺説大爺你瞧那不是我舅舅嗎哎我瞧見他了他怎麼又來了哦他這是覺得不合適了對默默默仔細看看他他的膝蓋上有土沒有爺兒倆往前走可就來到了切近尚二爺很佩服張方這小子鬼迷三道的他真把老頭子給捋出來了要我請去我準挨幾口唾沫便趕緊出來哥哥你來了老俠石寶奎面沈似水一捋頷下銀髯阿我來了我不來等你來呀哼你受纍了尚二爺聽他説替外甥打賊受纍道唉哥這是我應盡的責任阿老頭的眉毛都立起來了嗨我真沒想到阿兄弟你你會這麼不爭氣尚二爺一聽阿可能因為自己護手鈎叫袁金標袁金豹給打掉了哥哥嗯誰讓咱沒能為呢哥哥小弟我跟人家一動手我才知道我們家這十八趟形鈎原來在我爸爸那個時候就丟了人家袁家都給偷去了把咱們的鈎招給化在裏頭了這心裏頭這麼一不痛快這亮銀鈎叫人打掉了我們爺兒倆沒法子才出來到了現在我只能説到石家鎮找你尚老二哥哥給你們爺兒倆掙掙面子去你們爺兒倆順他們大門口一直往東由他東牆進去設法尋找他叫什麼夏夏九齡阿我師哥呀隨行衛員伴差官呐我師叔童林的徒弟呀哎你們爺兒倆去找他我從他的正門去找魔鬼頭兒老爺兒仨商議已定老人家石寶奎一伸手唰地一下把鑲牛皮的槍帽摘下來往自己絨繩上一掖右手提著大槍帶著這爺兒倆打大魔莊西村口進來大清早起街上沒人路淨人稀這爺兒倆順著袁家的門口往東奔他馬號大門石寶奎來到袁氏弟兄家門前喊道開門門道裏有家人坐著聽到叫門趕忙站起來譁啦一聲響門分左在一看老俠來了誰不認識阿喲石老俠客爺你來了小子們給你請安起來起來告訴袁家弟兄就説老夫我來了老爺子你請進我們給你通稟請著石老俠往裏走這大門可就開開往裏進二道門再往裏到屏風門轉過來底下人已經通知了袁家弟兄袁金標袁金豹一見石寶奎來了袁金標跟袁金豹説看來咱們惹了禍袁金豹問哥哥惹什麼禍因為你把尚義打了唾既然能打尚義就能打石寶奎兵來將擋水來土屯哥哥別害怕沒關係越怕他就越嚇哥哥哎你沈住氣這回尚義咱們不在乎了咱們還怕誰呀石寶奎扔下八十奔九十的人了人老不講筋骨為能他還能活幾天呐這時候老俠石寶奎已經進到當院袁金標趕忙一躬到地老人家清晨起來你就到了寒舍恕我袁某未曾遠迎你多包涵老俠一笑袁金標袁金豹你們兩人出身緑林還懂得緑林道德規矩在我石寶奎眼皮底下不能越禮胡為這樣哩我睜一隻眼閉一隻眼也別説我石寶奎高擡貴手你們在這安然自在的住了這麼多年沒想到現在你們越理胡行竟敢打了我的小弟尚義哈哈老夫豈能容你石老頭子這一聲長笑笑得雙魔起雞皮疙瘩袁金標又一躬到地道老俠客爺不是這麼個意思我的孩子袁玉的朋友你看就是他們二位這位是紅毛禿頭狸子馬俊這位是陳道常陳道爺我們不能不招待沒想到在這時候有個姓夏的跟姓張的兩個人來了到這就要動手拿他們二位我們也不知道為了什麼我們哥兒倆怎麼著也不能讓人家在我家裏當場拿人呐一動手我們把姓夏的給促住我們把姓張的也趕跑了沒想到銀鈎太保尚義尚二爺也來了愛屋及烏看佛敬僧有老人家你在頭嘍我們敢跟尚二爺無禮麼我們不敢我們説了很多好話尚二爺一瞪眼不但要救人而且要拿他們二位這我們就不讓了我們把尚義尚二爺給贏了老俠客你怎麼到這裏來又説這話呀哈哈哈尚義是我的小弟弟誰要動他一根汗毛我就讓他們給立根旗杆你打了他就等於打了我相反的陳道常在鎮江有十八條命案你們為什麼容留這下賤的賊人在你的家裏紅毛禿頭狸子馬俊保定府清苑縣行刺他是國家的欽犯你們不守緑林道的規矩你們這倆魔鬼頭就找死老夫也絶不能容交出人來吧袁金標還要對付鐵面魔王袁金豹嚓楞