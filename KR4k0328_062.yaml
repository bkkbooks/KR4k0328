了唉呀我怎麼在這最危險的時候遇見他呀陳道常往東一跑呀迎面姑娘在前簷站著陳道常亡魂皆冒往西跑越大牆撒腿如飛他跑了張方可喊別打石大姐我是張方張方這嗓子很高呀猛然間西邊有人説話什麼人到老夫的家中攪鬧這個時候姑娘可從房上下來張方也轉過來了大爺這不是我大姐嗎這個時候石大姑娘可就到了跟前兒石寶奎問孩兒呀你這是幹什麼呢怎麼上這兒來張方把剛才的事都説了這老哥兒倆跟夏九齡都在客廳裏喝酒一聽這邊有響動讓九齡別動哥兒倆出來到現在老頭一問姑娘把事情也説了嗷這情有可原你還認得不認得這不是鎮江瓜州張家莊你叔叔張鼎的兒子張方嗎小的時候你們不是在一塊玩過嗎方兒這是你大姐姑娘一瞧喲真是張大兄弟剛才打著你沒有差一點把我這小辮上水上漂大錢都給打沒了我就是追這個惡賊從家中迫到山西姥姥的家門口才跟你們爺兒幾個見著剛才發現陳道常想迫他石姐姐拿彈一打我我估摸著賊跑了天網恢恢疏而不漏總有一天他會跑不了的大爺你説的這個一點不假爺兒幾個往回來重新洗手落座又喝上了老俠石寶奎喝著喝著心事上了心頭由於剛才的事情使老人家想到男大當婚女大當聘閨女素蘭不小了如果説門不當戶不對人家也不敢要我也捨不得把孩子聘出去門當戶對的也不容易喝著酒看到了夏九齡這個小孩長得又好剛才九齡也把自己的事情全説了他是鎮八方紫面昆侖俠童海川童俠客的弟子隨行衛員辦差官將來真是保著大人查辦四川完畢以後這小孩也能得個一官半職家裏我又有錢我又不指著掙錢養家這個孩子要跟我的閨女結為連理可是天成一對地就一雙呀但是人家這麼好看的小夥兒這麼好的能耐名門之後現任官職人家能沒媳婦嗎老俠不好意思提張方瞧出來了張方站起來説舅舅你跟我哥哥先喝著酒阿大爺咱們爺兒倆外面説句話噯哈哈哈好好好賢侄九齡二弟你們爺兒倆先喝著這爺兒倆出來挑簾櫳下臺階往東沒走幾步張方站住大爺你剛才喝著喝著酒你不喝了停杯不飲我看你有心事好孩子你聰明得很大爺真有心事你老人家這心事我説出來你一定佩服你看我姐姐不小了男大當婚女大當嫁你看我師哥長得也好又是現任官又是將門之後將來也錯不了你惦記把我姐姐許配給九齡你又不知道人家有媳婦沒有難以啓齒對不對默呵老頭樂著朝張方腦門上給了一巴掌哈哈哈小子真是的你呀説的全對但不知道這個話怎麼提呢咱爺兒倆回去這事兒你別管你交給我張方爺兒倆回去落座張方保媒夏九齡招親石家鎮
