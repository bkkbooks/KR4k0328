body:
  text: 第六十三回小白猿石府學絶技念舊義奮勇覓金牌上回書説到石家鎮九齡招親石老俠張方爺倆來到屋中落座重新喝酒喝了兩輪酒張方又站起來師哥來來來咱哥兒倆到外頭説句話張方帶著九齡也下了臺階往東一拐九齡問他師弟呀你看這裏喝酒呢你出來進去的什麼意思朋友門前如王府這不能隨隨便便呀師哥阿你教育我都對人家這事我能不出來進去的我問問你你跟這石老頭有什麼交情嗎嗨賢弟我跟人家素不相識有什麼交情一來老人家是成名的武林中的前輩二來跟我師父也算慕名的朋友三來主要的不是通過你嗎你的父親是我的大爺從南俠司馬空這兒説他是我叔叔在我師父童林這兒是我大爺呀這沒的説話不是這樣説這裏我起小就來過老頭從小時候疼我著呢你到這來就橫吃橫喝嗯這就不象話你説對嗎九齡就知道張方冒壞把臉往下一沈師弟這話是你説的呀還是石老俠説的要是石老俠説的我得質問質問他唉別價師哥呀我出個主意這主意要答應了哥哥你在這兒連吃帶喝比我張方都硬氣那麼什麼事兒呀張方就把石老俠的意思從頭至尾説了哥哥呐這石大姐俊極了功夫也好著呢你看我這水上漂的大錢都給我打沒了哎呀你想想這合適嗎我自己不能做主呀我師父沒在這兒雖然沒在這兒可全在你呀我倒不是説過這村沒這店石老俠客可看得起咱們呀將來我見著我叔那個時候我替你説你看好不好那好吧你可兜著點這個沒的説小哥兒倆回來了九齡的臉一紅張方在旁邊説哥哥阿你瞧瞧我舅舅是姑娘的師父老爺子是姑娘的爹我張方願意從中做大媒把我石大姐的終身大事許配給你至於將來見著我叔童林那個時候咱們再下訂禮但是現在咱們這事就算訂下來了你看好不好磕頭叫嶽父九齡跪倒了磕頭然後又給尚二爺行禮尚二爺年輕説快起來吧快起來吧這可是一件大喜的事呀哥哥我得給你道喜呀哎呵呵呵同喜同喜男女僕聽説以後都到屋中來道喜頒發賞金這個時候姑娘也知道信兒了自是歡喜第二天一清早起來擦臉漱口喝茶又預備一桌豐盛的酒席石寶奎問你們小哥兒倆打算從我這到哪呀我們從這奔山西太原府想大人也就快到了在那裏和我叔童林見面呢好吧你們走我們也派人打聽著讓你舅舅尚義也打聽著如果打聽著童海川童俠客跟大人到了太原我跟你舅舅我們哥兒倆去一趟張方也明白老人家的意思説好吧咱就這麼辦了飯吃完了老人家派人拿出黃金五十九齡趕緊給攔了老人家你看我們在這裏到太原也不遠了你給我們這麼多錢幹什麼我們兩人都是官人有盤纏錢呐你們有是你們的張方搭腔説道哥哥你真是的老丈人給姑爺錢給多少拿多少掖起來小哥兒倆告辭出來老哥兒倆在後面跟隨一直送到村口説了幾句珍重的話這才告別飢餐渴飲曉行夜宿距離太原不太遠了出現了一片山叫陽光這麼一照呀哎喲就好象魚鱗金甲似的霞光萬道瑞彩千條張方説師哥你看這山怎麼樣挺好看的對山裏有人是賊不是賊咱不管他準有人你怎麼知道這麼好看的山哪能沒人占據呀不過也不見得這兩天不瞞你説我手心有點癢癢九齡也是個好生事的孩子好吧咱們就奔前山轉吧小哥兒倆就順著這片山往南轉下來了越距離南山口近了越聽見山口這方面人喊馬嘶等小哥兒倆到這裏一瞧謔這山口有很多人拉著馬的可很多一眼望不到邊起碼有個二三百口子夏九齡一瞧靠西邊兒有三間蘆葦棚蘆葦棚頭裏站著十幾個垂手侍立的人四個人亮傢夥當場動手有兩條鑌鐵虎尾三節棍使三節棍的歲數大有五十多歲花白鬍鬚功夫很好有一個年輕的青鬍子茬大個兒跟兩個人動手這兩個人奇裝異服每人一條鑌鐵四稜方頭沖兩頭都是四方的跟棍子一樣當中兒是圓的打了個難解難分的呀猛然間九齡往東面一瞧就在他們動手的這個地方旁邊有一塊大石碑這個石碑有六尺來高半尺多厚二尺多寬上頭有六個大紅字彩鳳山祥雲島在石碑的南邊一溜站著幾位頭一位中等身材有點怯了巴嘰的二一位二十上下歲一雙多大眼睛皂白分明第三一個也是二十上下歲的一個小夥瓜子一張臉長得跟大姑娘一樣面白似玉兩道濃眉一雙大眼睛閃閃奪神張芳問師哥誰呀我一個也不認得我告訴你這三個裏頭我認識倆第一位你瞧他挺怯的吧是呀那就是你的叔叔我的恩師鎮八方紫面昆侖俠童林童海川喲我這童叔怎麼這怯呀對了二一個也是我的師兄復姓司馬單字名良人稱玉麒麟我們倆從小在一塊喲那麼這三一個呢三一個我也不認得咱們過去吧兩人擦著山根兒在人群的後頭擠來擠去擠到了跟前九齡過來師父你好呀弟子給你磕頭跪地下就磕頭海川把夏九齡攙起來你從哪來的呀怎麼到今天才露面呀是呀説起來很長轉身叫張方過來海川一瞧這人怎麼這麼寒磣呀九齡一笑他是鎮江瓜州張家莊我師大爺風流俠鐵扇仙張鼎之子病太歲張方師弟這是你叔張方立即行禮叔叔你好呀侄男張方給你磕頭海川心裏話我哥哥張鼎都六十多歲了那老頭兒又乾淨又利索想象他年輕時候一準兒漂亮我雖然沒有看見過我那老嫂子我琢磨著也長得很俊不然的話我哥哥張鼎看不上人家怎麼他們兩口子會養活下來一位這樣尊容的少爺呀嘴上卻笑道哈哈哈賢侄呀快起來海川這一笑什麼想法呀張子美是大英雄我也不能往別處想這要是別的人我該説這孩子是我哥哥的兒子嗎他這一樂張方明白了叔你這一樂可不大好唉怎麼了你是説我爸爸跟我媽都長得很俊怎麼養活我這麼一個兒子你還認為我不是我爸爸的種童林是個老著臉的人沒想到讓張方給鬧得很抹不開只好找話説哎呀方兒呀聽説你做媒嗯叔是這麼回事兒我爸爸也跟我都説了雖然説這一次我把我師哥救了我們哥兒倆總算見著了紅毛禿頭狸子馬俊了雖然我們沒拿著但總有一天能拿著沒別的見著大人你一定要保舉我也當個隨行衛員辦差官我就不回去了海川説可以既然你給你師哥從中為媒把石老俠的千金小姐許配給你師哥你們放下訂禮之物了嗎沒有為什麼沒有呀你想想我大爺跟我舅舅那意思得見你所以來的時候人家就説了只要你到太原府雙方的父母老家兒見著自然把庚帖寫好再下訂禮運算正式的訂婚我再問問你叔這裏幹什麼呢你們爺兒倆到這幹什麼來了好吧我借著這個機會跟你們提提海川就一指這個小孩才説出一番話來本來從保定府清苑縣欽差大人大轎一起備下兩份公文九齡一份司馬良一份讓他們一路之上訪查紅毛禿頭狸子馬俊結果沒走出兩天去司馬良就跟上大轎了説這兩天也沒查著這個馬俊的結果但是夏九齡沒回來爺兒幾個兢兢業業保護著欽差按官站直奔太原府一路之上進州州官接過府府官迎什麼事也沒出來到太原府東門外十裏接官廳這太原府知府劉成是兩榜進士出身老百姓給他起了個外號叫劉青天他帶著全城的文武官員有名的紳商來到接官廳迎接欽差大轎落平劉青天跪倒了給大人磕頭年大人把手本收下貴府公館打在何處稟欽差大人東門裏臨時的一個大店請大人多屈尊好既然如此頭前帶路前呼後擁直奔太原府東門裏東大街北大店懸燈結彩上垂首貼著泥金紙報查辦四川欽差大人年親兵一到馬上接岡本城守營的兵丁就退到二線大炮三聲響鼓樂齊鳴來到二層院子四坐亭子放好了大人從轎裏頭出來挑簾走進正廳迎面的架幾案八仙桌兩旁邊有椅子在西面是單間是大人辦公的地方後頭院兒單有寢室大人來到里間屋馬上洗臉洗手吩咐一聲請三寶海川劉俊司馬良師徒三人捧著三寶往裏走劉俊捧起了寶劍就是上方劍它是權力呀五王八旗龍子龍孫國家重臣各路要員犯法可先斬後奏接著海川捧起金牌司馬良捧著聖旨爺兒仨進來完全都交給了欽差大人大人一樣一樣安放在中廳再把檀香爐點起來親自參拜了三寶然後坐下把所有的手本完全都看了看叫差人進來把手本完全都避回滿城文武監生員還有大小的官員一律免參免見單有太原府知府劉成從公館門外遵命而進撩袍端帶往裏走蹬堂階挑簾櫳到屋中擡頭觀看呀三寶在上劉成趕緊正冠往後一撤步撣了撣身上的土抹下瓦行袖面行罷了三拜九叩君臣大禮然後重新給大人行禮欽差大人在上太原府知府劉成拜見大人用單手一接貴府免禮平身多謝大人來呀賜座旁邊有人端過來座位太原府知府劉成一躬到地欽差大人在此焉有卑府的座位坐下好講話謝大人其實這個坐著比站著也不怎麼舒服跨著半拉凳子面湊湊乎乎半站半坐在那兒欽差大人上下打量太原府知府中等的個方面大耳三縷墨髯頭上帶著紅纓帽頂子挺亮青巾石的頂子身上穿著兩截褂四方四品雲雁補子這人長得修眉大眼確實長得很端正看著很清廉的樣子大人也知道他外號叫劉青天貴府這次本欽命奉聖旨四川放賑蒙聖恩賜本欽命金牌上方劍代天巡狩如聯親臨可以代理民事貴府你在本地很有政聲這個本欽命早有耳聞如有倚仗官府勢力的頑匪刁民貴府治不了他可以跟本欽命提一聲我替你做主劉成趕緊往起一站躬身施禮稟大人自從卑府到任以後仰仗著聖天子的洪福老大人的虎威本地面倒也安然如常確實沒有什麼不法的賊匪頑民請大人放心好貴府很會辦事你下去侍候明天本欽命就走因為四川的事情十分緊急如果貴府辦事很得力將來本欽命一定要保舉於你多謝大人的栽培説完就退下去了劉成一下去大人立刻換好了便服管家年福年祿小書童福兒跟楊師爺等都上來伺候著海川等衆人就下去了第二天五更時公館的門上就忙亂起來所有親兵完全都起來該幹什麼幹什麼各司其職太原府知府劉成以及城守營的守備總鎮這些人可就全來到伺候著大人起程海川等衆人進來行完禮年大人站在八仙桌角邊兒伸手把聖旨捧起來一轉身交給海川海川把聖旨接過來安放在頭座黃亭子內二一樣當然就是金牌了代天巡狩如朕親臨年大人往前一探身嗯大人就愣了海川等一等海川都快到門口兒了一回身問大人有什麼吩咐你看這金牌因何不見了海川他們爺幾個一擡頭哎喲真嚇壞了果然金牌不翼而飛再瞧大人伸手從金牌的紫檀龍座上拿起個字箋來大人看完了發愣海川你瞧瞧這個海川接過來一看本來是紫臉呀這一來成了紫茄子了上頭有字兒夜至三更天來到府太原盜牌回山去慶壽上西天海川寒磣透了我堂堂的鎮八方紫面昆侖俠頭次下江南能人甚多我都會過怎麼這一次賊人大膽夜入太原府盜走金牌我們爺兒八個十六隻眼睛一夜不閉為什麼在我的眼皮子底下把金牌盜走大人這是童林的疏忽大人把臉往下這麼一沈請師爺馬上把這個字柬謄寫幾份又轉身喊來呀傳太原府知府劉成劉成在下邊正著急呢恨不得大人一時上了大轎平安無事離開太原府這不就完了嗎怎麼大人不下來呀暗著往裏打聽知道出事了就在這個時候管家年福出來大人諭下太原府知府進見劉成就哆嗦開了跟著年福往裏走一直來到中庭挑簾櫳進來伸手把帽子摘下來跪道劉成拜見大人年欽差沈著臉虎目含嗔用手點指貴府昨天本欽命來的時