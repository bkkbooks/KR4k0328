你們哥兒倆在這等著別死我馬上還願去你們哥兒倆把我帶往太原府面見劉青天就説我要出頭管這件事情你們哥兒倆辦不到我不管我師父還要管呢劉青天也知道我師父是保障一方的武林前輩關著面子也不能把你們哥兒倆怎麼樣還有就是大人的公館那方面兒你們剛才提那公館的伴差官鎮八方紫面昆侖俠童海川是呀他是俠客我師父也是俠客我師父九十六他沒我師父大聽説挺年輕那就是我叔兒這公館的事情也可以讓劉青天轉告大人有本地的老俠客之徒少俠客小白猿王環出頭管這件事情大人也不能緊著追究陳龍一聽賢侄的主意倒挺好可是一樣你還到呂祖閣還願那我媽讓我去還願我不能不還去呀賀虎來精神你娘讓你還願阿哎祭神如祭天你連聖人的話你都不聽嗎來把佛爺瑪揪下來把這紅帶兒解下來就這刨坑拿香一燒你呀就沖著西北呂祖閣八叩頭哎呂祖也不能把你怎麼樣了如果呂祖降罪降在三叔我身上陳龍也説賢侄呀我看你三叔這主意不錯何必非上呂祖閣呀王環這麼一琢磨可也對得了咱們就這兒還了刨個坑把這佛爺瑪銀紅帶兒解下來往坑裏一擱拿香一燒一會兒呼呼呼呼著了等到完全都燒成灰了用土一埋拿腳一跺這兒完了爺兒三個來至在太原府府衙官人都急壞了二位班頭哪去了劉大人坐堂立等陳龍答應就説我們哥兒倆來了不過請大人書房講話差人進來稟報劉青天劉青天這氣呀我這坐堂等候你全都燒成灰了用土一埋拿腳一跺這兒完了爺兒三個來們兩人不進來不上堂讓我到書房講話好吧散堂劉知府吩咐散堂剛回到書房陳龍賀虎帶著王環進來趴地下磕頭下役陳龍賀虎拜見大人王環過來草民拜見府台劉成問這個年輕人是誰呀陳龍答道這是我拜兄快手王能之子小白猿王環本地小王家匜銀面仙猿鐵臂昆侖俠石金聲之徒他要出頭幫著我弟兄二人捉拿盜牌之賊請回金牌他要辦不到他師父石老俠一定出頭因此我們把他請出來了我們哥兒倆實在沒這能為哎呀公館要追究下來又當如何王環一抱拳大人公館追究下來無關緊要他那隨行衛員伴差官童海川童俠客跟我師父是最好的朋友嗷要是這樣少俠客你也是本地人當分本府之憂你請坐陳龍賀虎下去了馬上取來紋銀四十兩備一份海捕公文讓王環帶好了王環出來照樣密訪明察無奈哪里訪去一眨眼就是四五天這天天已經黑下來了離太原府的東關也就有十幾裏路有個大鎮甸叫趙家樓趙家樓東口路南有個大店叫雙和老店王環這麼一想住店吧王環往裏一走夥計就過來了爺台你住跨院呀你是住正房單間阿正房有嗎正房已經有人住了你就住東廂房三間也很寬敞沒人打擾你那好吧咱就東房把王環引進東房王環正準備要飯來吃院裏頭有人喊話店裏頭的夥計有我們山上的人嗎明天就到了正日子壽誕之期瞧瞧有咱們的人呀我們要同走如果不願意今天晚上去呢明天一清早去你記住了哪屋的店飯帳給我們老爺子記上帳王環這麼一聽這個字柬上夜至三更天來至府太原到了太原盜牌回山去我們把金牌帶走了幹什麼慶壽上西天怎麼這位少寨主要給他們老寨主祝壽阿一看就是緑林人阿這兩人一位高個胖胖的一位矮個瘦瘦的有一個特點這兩人的腦袋上都一根頭髮沒有鋥光瓦亮的大禿子王環挑簾櫳出來站在東廂房廊簷下見南正房的廊簷下門口外頭站著兩人一個中等身材雙肩抱攏猿背蜂腰粗藍布大褂又肥又大光頭沒戴帽子紫黔黟的臉面劍眉虎目鼻直口方好精神下垂手肩下站著一個二十歲上下的小夥王環這麼一瞧喝你別看自己俊這小夥更俊長方臉面白似玉一條大辮兒很莊重王環問夥計這南正房屋裏頭這二位怎麼稱呼哎呀我可不知道哇少爺你給我打聽打聽人家要問你為什麼打聽你告訴他東房裏頭有你位朋友要打聽打聽這爺兒倆一位是紫面昆侖俠鎮八方童海川童俠客一位是二弟子玉麒麟司馬良爺兒倆也帶著公事丟了金牌打發劉成走了限期破案海川他們爺兒幾個都在這兒站著呢臉上有點不好看二話沒説帶好海捕公文腰裏掖著落葉秋風掃把子母雞爪鴛鴦鉞包袱一提只帶著二弟子玉麒麟司馬良讓劉俊在公館主持全盤爺兒倆也是各處密訪好在爺兒倆都穿著便服誰也不知道訪了幾天可沒訪著今天也住在雙和老店外頭這人一説話爺兒倆也出來了爺兒倆剛進屋夥計進來你們爺兒倆該吃飯了吧海川説不錯夥計在旁邊站著爺台你貴姓阿嗷我姓童名字叫童林這位爺呢這是我徒弟叫司馬良嗷是是是轉身形就出來了海川還納悶呢夥計老問我們爺兒倆幹什麼呐那夥計挑簾到東屋跟王環一提説你這樣吧你帶著我到南屋去跟這爺兒倆見個面好吧你呐帶著王環就奔了南屋挑簾櫳進來夥計一抱拳這位童客爺現在有你的朋友來拜望你海川這氣我哪來的朋友在這兒不是沒有有我們也沒工夫見他呀夥計一閃身王環過來一躬到地叔父你好阿侄男給你行禮嗯你你是誰呀叔父你老人家不認識我我是本地小王家匜人我姓王名字叫王環有個外號叫小白猿提起我來你不知道提起我的師父來你跟他是朋友誰呀銀面仙猿鐵臂昆侖石鐸石金聲是我的授業恩師於是王環報出師門與海川才相逢見面
