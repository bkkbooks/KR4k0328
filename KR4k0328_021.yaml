body:
  text: 第二十一回戰沅江西俠殺四魚亂石島東俠敗三鼠上回書説到淫賊陸豐陸松坡來到金銀亂石島找他叔叔本山六寨主金錢水豹陸占鼇把雲南的事情一説可把陸占鼇嚇壞了鐵善寺的門人弟子怎能任憑胡行門規甚嚴大寨主要知曉此事定把你們置於死地你怎麼淨幹這個事呀我我以後不幹了不過我得把這個事情跟你説説哇因為囚車一定從這兒路過叔叔無論如何你得通過大寨主設法把我兄弟陸曉村救下來陸占鼇點頭到了大廳面見衆家寨主你就説陸寅陸曉村是為給他父親報仇這個沒的説我一定記住你的話馬上預備飯爺倆把飯吃完了陸占鼇細細地又問了陸豐陸松坡一遍這才把這事情弄清楚爺倆休息一夜無話次日清晨來到大廳面見馬彪和衆家寨主行完了禮馬彪問道賢侄阿你幹什麼來了老人家你要問陸松坡便委委屈屈把陸寅的事情説了我的一位伯父陸滾被雲南李英李士鈞的父親給害死了為這個我們找李英報仇雪恨殺人惹了禍啦我兄弟被捕囚車要從咱們沅江山口外頭經過請你老人家宏施惻隱搭救我兄弟才是陸松坡這麼一説大寨主馬彪不是傻子他心裏明白根本不願意管這樣的事可是陸占鼇一個徑兒的央告最後大寨主應了道讓四寨主五寨主和你願意怎麼辦就怎麼辦吧這樣陸占鼇下來以後跟魯明通程志遠陸松坡爺兒四個一商量先派人打聽時間不久回來了説囚車很快就到他們準備了五隻船連吃的都準備好了帶著兵丁來到沅江南岸在江葦當中把小船彎住了在這兒吃在這兒喝淨等著囚車來囚車真的來了一聲呼哨響陸占鼇等人帶著兵丁上去就把陸寅陸曉村救到了金銀亂石島老俠侯振遠跟鎮八方紫面昆侖俠童林童海川高聲喝喊一報號陸占鼇他們跑了他們可並不是怕雙俠因為童林侯振遠露面了這是鐵善寺的仇人必須得回山報信陸占鼇魯明通程志遠帶陸豐陸寅到了大廳面見大寨主行禮陸占鼇提出來道大哥我們回來的為什麼這麼早哇就因為有侯振遠童林要給李英孫亮這些人撑腰我們聽見他們的名字有心動手但沒有兄長的命令我們才回來報告大寨主聽了説道很好很好這個時候第一撥兵丁回來了來到大廳給大寨主和衆家寨主行完禮就把到龍潭鎮打聽的事情都説了第二撥兵丁又回來報告了西方老俠于洞海準備明天雇船進山要説合這件事大寨主一聽列位賢弟不問可知這是于成知道你我弟兄他必然泄底了雇船明天進島他們不來便罷倘若來時我叫他飛蛾投火自尋其死衆家寨主都説哥哥你這樣辦當然可以為了咱們鐵善寺可有一節西方俠于洞海二十年前訪過咱們他可了不起呀嗯人老不講筋骨為能英雄出於年少他上咱們這兒來都八十多歲了現在又有二十多年了一百挂零的人他還有什麼出手的一個老棺材瓤子你們還怕他大傢夥兒一聽齊道對哥哥我們聽你的大寨主馬彪馬雲龍馬上傳命令準備好了麻洋戰船四十隻虎頭大戰船一隻兵丁都調齊了一切準備就緒第二天一清早派人打探站在山頭上高高地就能望見整個江面一會見回來報告稟報大寨主三隻小船一共有六個人奔咱們傘銀亂石島來了嗯好來呀準備登船馬彪馬雲龍傳下了命令所有的人全都上了船這才從金銀亂石島的島口沖出來嗆啷啷鑼聲一陳響等來到半江之中往對面觀瞧馬彪攏二目可看得清楚哇三隻小船飄飄遙遙正居中白髮蒼蒼一位老人家正是二十年前見過一面的西方老俠于成于洞海真是發欺三冬之雪須壓九秋之霜年邁蒼蒼精神百倍令人望而生畏馬彪心説我還説他是老棺材瓤呢看這樣可還夠厲害的上垂首小船的船頭上站著一位白髮蒼蒼的老人左肋下佩著寶劍按著劍把捋著銀髯下垂首船頭上站著一個年輕人紫微微臉膛劍眉虎目鼻直口方大耳垂輪小辮兒歪扛著人字兒的脖子梗梗著眼睛鼓著渾身氣眼十足看此人金在沙中玉在匣內一身兒藍懷抱子母雞爪鴛鴦鉞也是令人望而生畏大寨主馬彪看完了一回頭你們誰認識左右這兩隻小船船頭站著的人小粉蝶韓寶趕緊過來一躬到地大寨主晚生認識嗯説説看上垂首這白鬍子老頭兒是山東東昌府巢父林侯家莊聖手昆侖鎮東俠侯振遠就是這個老匹夫與童林為虎作倀助紂為虐阿那麼下垂首這個那就是咱們的正對頭鎮八方紫面昆侖俠童林童海川喝大寨主馬彪一聽頓時無名火起兩邊的船越離越近了老俠于成可害怕了人家這船多大呀甭説兩旁邊的就當中這條船如果不停下硬往前沖沖到咱們哪只船上哪只船也要翻哪再説侯振遠童林兩兄弟可不會水呀人家大船慢慢地停穩了距離這三隻小船都不過二丈四五大船拋了錨兩方面的船都不走了大寨主站起身來到船頭這個時候老俠于成用眼睛看這大寨主身背後的四個賊人心説這個事不大好辦但是事已至此箭在弦上也不得不發一看大寨主馬彪滿臉笑容來到船頭老俠一抱拳哈哈哈哈我當是誰呀這不是金銀亂石島的大寨主馬彪馬雲龍嗎二十年前于成拜山蒙你不棄多加款待至今猶記心頭沒想到二十年後咱們二位又見著了總想來到金銀亂石島再與衆家寨主相逢無奈賤軀多病不能如願今天可就算巧了哈哈哈哈大寨主一向可好老俠于成這麼一説大寨主馬彪一陳冷笑嗯于老俠你年過百歲不在府上納享清福今日來到鄙山一定有事吧大寨主雖然説老朽年邁可我這人的脾氣還是好動不好靜這次來到江南訪友我走到你貴寶處的龍潭鎮在招商店內遇見幾位朋友説著話用手一指這位姓侯名廷字振遠人稱聖手昆侖鎮東俠這位是我好兄弟姓童名林號兒叫海川江湖人稱鎮八方紫面昆侖俠還有雲南的兩位班頭金眼鷹孫亮騰身步月李士鈞我問他們怎麼會在這兒留戀呢原來是李英孫亮丟了囚車案情太重這案子牽扯到雲南府的十八條命案殺害少婦長女的淫賊陸曉村跟陸松坡就在貴寶寨盜國寶的二寇小粉蝶韓寶鬧海金鼇吳志廣據説也在貴寶山為此他們打算登山拜訪又恐怕寨主不明真相傷了咱們江湖緑林道的義氣他們正在萬般無奈百無所出的時候可巧跟我碰上了我與寨主是故舊之交打算把他們帶到貴寨與衆位寨主相見寨主本來做事素稱正大光明看在你我昔日的交情沖著老夫的臉面萬望寨主將這四個人交出來不但衆人感激寨主成全之德就是小老兒于成也感念寨主的盛情阿寨主絶不吝嗇吧于成斗膽上言按理説三孔獨角蛟馬彪馬雲龍是個通人情的人沒想到他一陳狂笑哈哈哈哈老俠客你住口我們弟兄是鐵善寺的門人占山已是非法怎麼還能容留盜國寶的要犯更不能向著這些淫賊那麼既然如此我為什麼還要把他們四位留在山中老俠你剛才講你有個朋友鎮八方紫面昆侖俠童林他奉師命下山興一家武術這個我姓馬的管不著可是大不該與我鐵善寺的門人為仇他揚言要拆掉我鐵善寺的山門所以我才把他們四位留在山裏這叫預備窩弓擒猛虎安排香餌釣金鼇老俠客我們的事你最好少管急速回你的山西靜養免生多少是是非非如果老俠客你一定要管我們跟童林有滅門戶之仇豈能與他善罷甘休老俠于成聽完以後微然一笑馬大寨主你不可自誤哇童林興一家武術實有其事滅鐵善寺的山門之説萬無此理不過是寨主誤聽過耳之言搬弄是非使你們兩家不和道聽途説絶不可信還望塞主三思而行哼于老俠你不必袒護童林只因太湖要鏢童林助紂為虐殺了我兩家師弟還有兩個侄子二次又把我妹夫羅烈羅焰光在烈焰寨給血洗了我親胞妹被他們活活地燒死我妹夫到現在活不見人死不見尸難道這也是道聽途説嗎老俠客分明你袒護童林前來難我依我相勸你呀別管這件事這樣還可以保全老俠客你的名譽還可以保全我們二十年的交情倘若你一定要管哈哈于老俠你就當場亮兵刃與我弟兄較量三合將我弟兄戰敗四寇不喚自至打不了我弟兄九個老俠就憑你兩行伶俐之齒三寸不爛之舌打算説出四小絶不可能老俠客這叫酒逢知己千杯少話不投機半句多老頭兒于成的眉毛就立起來了左右手一伸過了頭頂把自己的小辮挽了個揪好小子你們這幫猴崽子欺負我老哇怎麼著要把我這個説和人給打了把送殯的埋墳裏我長了一百零一了還沒見過告訴你馬彪你不講理老太爺于成也不是好惹的老頭一伸手把鬍子揣在二鈕的下邊把長衫底襟撩起來往絨繩上一掖二位賢弟振遠海川哥哥我可叫他們給氣壞了你們給我看著點兒于老俠説著話腳尖一點小船的船頭距離大船可兩丈好幾呢就看老頭兒這麼一躬腰噌地一下捷似飛鳥就上了大船來你們哪個過來一對一的也可以窩於狗一擁齊上老太爺我也不在乎猛然間旁邊有人高聲喝喊老兒于成倚老賣老可認識你家大頭目老俠于成往後一撤步擡頭觀看噌噌噌過來四名頭目都是短衣襟小打扮絹帕纏頭一身青歲數差不多都在四十左右于老俠看著這四位都有點面熟實際上老人家知道他們這是沅江三鼠竇氏三傑手下的四個頭目四條魚叫三尾鱔魚曹正大頭魚曹峰活甲魚曹德大嘴鮎魚曹寶二十年前于老俠客來到江南一帶間遊一走到沅江忽然看見連男帶女幾個人痛哭流涕一問才知道這幾個人都被沈江三鼠劫過他們當中還有被四魚殺害過性命的本地鄉親沒有不恨這四個人的老俠要找這沅江三鼠就是惦記著要把這四魚弄死等到了沅江三鼠的窩子裏頭見了面他們淨説好的故意説是鐵善寺的門人弟子這樣于老俠投鼠忌器沒殺他們才來到金銀亂石島拜見馬彪這些人馬彪這些人還真是高舉手矮作揖説好聽的豐盛款待老俠客才有些不便下手離開了金銀亂石島沒想到今天在船上説翻了這四魚過來了老俠于成看了看他們小子你們也要在老太爺的面前嘣噠嘣噠真是太歲頭上動土老虎口邊拔毛叫什麼名字趕快報來哼你家大太爺三尾鱔魚我叫曹正老頭兒的眉毛一立虎目圓睜心想二十年前我就要宰你們可惜我手軟了直到今天你們還是作惡多端又在我姓於的眼前撇唇咧嘴看來絶不能饒你們嗷你是三尾鱔魚曹正阿老夫耳朵裏有你這個人物沅江三鼠手下的四魚頭目就有你吧我排行在大老兒敢在我金銀亂石島的大船上如此無理哪裏走往前一趕步他還真沒拿傢夥左手一晃面門蹦起來泰山壓頂照老俠的頂梁就是一拳老頭兒滑左步跟右步右手一叼他腕子的二棒子伸左手一插他的胳膊右腳一擡對著曹正的襠裏頭啪嚓一下曹正一聲慘叫哎呀只見他七竅流血撲通死尸出去一條兒譁這些人就亂了老俠于成往後一撤步二鈕底下一推鬍子伸左手一攏你也敢在老夫面前飛揚跋扈經不住我一腳你還算人物這時候身背後有人高聲喝喊老兒于成傷我兄長大頭魚你家二太爺曹峰在此往前一趕步舉雙拳泰山壓頂對準老俠的後腦海腦後摘筋就打來了老頭兒鷂子翻身你看這麼大的年紀腰腿那個靈活徑兒老俠遊戲三昧根本不顯露真功夫一轉臉用手一抓他的二棒子往前一拉右手就勢一擡烏龍探爪正是曹峰的面門曹老二去吧叭一巴掌就把曹峰的腦袋給打碎了哎呀一聲慘叫大頭魚曹峰躺下了活甲魚拐拐著兩條小短腿圓圓的身子小腦袋細脖挺晃晃悠悠過來了呔老兒于成傷我家兩位