碰上郭福跟馬亮説這件事情準備施展緊背低頭毒藥釘老頭進來了馬亮一瞧鄧九公哎喲老爺子你好馬亮十年前你在我家裏起過誓不論在何時何地不準再使用緊背低頭毒藥釘今個背著老夫你又要使用你琢磨琢磨成嗎老爺子十年滄海變桑田時過境遷這不是十年前啦也不是你的府上這是大樹林裏依我説老爺子馬亮不使緊背低頭毒藥釘不成了這關過不去了爺們你高擡貴手吧哈哈那你得跟我説説怎麼回事你要問如此這麼這麼回事現有鎮八方紫面昆侖俠童林跟我作對他馬上就追我來了我徒弟郭福説了不使緊背低頭毒藥釘我過不去這關呐爺兒們你多原諒吧那你可起過誓你還記著你這誓言嗎老爺子我早忘了老俠把臉一沈説我要再使緊背低頭毒藥釘叫人把我活埋了那好現在你要使我就得活埋你説著話一按刀把喳啷啷一聲響滾珠寶刀亮將出來你説活埋我請問你你拿刀宰我這行嗎哈哈你不能拿刀宰我説的是活埋呀那我活埋你你不能拿刀刨坑吧老頭一想到哪兒找把鐵鍬去呀這黑臉閻羅郭福在旁邊搭茬了師父哎我這有哇馬亮這氣呀怎麼趕這時候你搭茬掄圓了給郭福一大嘴巴小子我抽你你怎麼到這時候搭茬呀你瞧這不是鏟嗎郭福拿著短把追風荷葉鏟這能刨坑也能埋你呀小子你怎麼想得這麼周到哇我説這沒有刨坑的傢夥就完了你怎麼搭這茬呀這馬亮要哭老頭鄧九公也笑了哈哈哎呀郭福拿著鏟倒不錯呀行了刨了坑吧好嘞馬亮説哎你怎麼真刨坑呀你當初不是説叫我將來抓把土把你埋了嗎原來這馬亮教郭福能耐一天郭福請師父喝酒去路上瞎嘀咕師父哎你教我這黑道買賣將來弄倆錢我好好地孝敬你小子我也這麼大的年紀了有了今個沒了明個只要我一閉眼的時候你能抓把土把師父埋了你就算孝敬郭福記住這話馬亮氣得直哆嗦我是説我死了以後埋我我現在還歡蹦亂跳呢你就惦記埋我你怎麼這麼孝順活著埋更來徑哈哈來吧嚓嚓嚓黑臉閻羅郭福的短把追風鏟很快他又有力氣三下五除二刨了個坑郭福叫他師父你看這坑刨得合適嗎馬亮這氣你準知道我要躺下呀老俠客鄧九公這樂呀呵哈哈馬亮哇你徒弟太孝順你了好小子馬亮把雙鐝亮出來左右一分姓鄧的我要把你贏了我重新刨坑行阿可我要贏了你咱們這坑可就合適了馬亮往前一趕步左手鐝晃面門右手一鐝唰地一下奔鄧九公的小腹就戳來了老俠鄧九公跨左步跟右步一閃身刀背往外一挂轉腰一腳正踹在馬亮的心口窩上還真巧馬亮一轂轆就掉到坑裏去了黑臉閻羅郭福立刻鏟土就埋老俠鄧九公寶刀還鞘捋著銀髯站這瞧著正在這個時候樹林的南頭有人樂哈哈哈老俠客鄧九公飛身形打樹林裏出來了等到了樹林南邊擡頭往四外看微風搖動樹葉不見人影老俠鄧九公納悶這人哪兒去了自己可從樹林外頭又進來了就這麼一會工夫到了坑前一瞧馬亮的雙鐝沒有了一棵苗禿頭義士馬亮叫他徒弟郭福給救出來爺兒倆逃跑了鄧九公從樹林出來琢磨上了樂的這人是誰呢這一樂不要緊叫馬亮溜了不然的話我就在這看著我也知道郭福這一切都是假的他為救馬亮也不容易阿老俠鄧九公離開樹林直奔風雲莊回到家裏頭家人還沒睡呢老爺子你回來啦咱們少爺白天騎著千里雪內一盞燈出去直到現在還沒回來嗷哪去了呢老爺子我説這話你唉風雲莊雷大爺的家人給送了信來叫他們的少爺雷寶給劫去了這叫什麼事呀好吧我出去看看鄧九公剛走到風雲莊的街口影綽綽看見街裏頭一個小孩拉著馬出來是柳影鄧玉老俠説了一聲鄧玉哎喲可把鄧玉給嚇壞了再説鄧玉這小孩很聰明他從馬號進去果然在牲口棚內發現了千里雪內一盞燈雷寶不騎了也把馬拉到了家裏槽頭上但是他家裏有好多的馬呀好麩好料拌好這些馬都要吃敢情那千里雪內一盞燈不讓它們吃誰吃咬誰本家的這些馬有些不樂意呀大家合到一起踢它沒想到千里雪內一盞燈挺厲害一擡屁股一尥蹶子劈裏啪啦把老雷家的這些馬都給踢一邊去了這個時候鄧玉來了千里雪內一盞燈一看鄧玉那意思很委屈鄧玉過來給它胡擼胡擼腦門然後把它那四個蹄一個一個擡起來拿棉花一包用麻繩系好了不讓馬有響聲千里雪內一盞燈善通人意它知道主人的心慢慢地走鄧玉到馬號把門打開拉著馬出來一直奔家裏走老人猛地一喊鄧玉瞧見了爹爹你這是幹什麼呢你別提了孩兒很喜歡你的馬趁著你今天不在家我想騎騎沒想到我正騎到風雲莊的東北大樹林兒打樹林裏出來個大褂罩著了我的馬頭我摔下來了是鐵爪貉子雷寶我過來一叫哥哥給他一還禮他硬説咱這馬是他的我説這馬是我們的我要跟他打又打不過他我這才想到晚上偷馬巧遇隨行衛員夏九齡我們哥兒倆拜了把兄弟哼為父不在家你竟敢背著為父胡亂而行回家吧是鄧玉把這棉花繩都取下來一騙腿上了光屁股馬自己回家了老俠鄧九公來到雷家門口輕輕一叫門底下人把門開了哎喲喝鄧老爺子來了嗷你們家有什麼事嗎老爺子你快去看看吧誰不知道殺官情同造反我們二爺竟敢作主殺官人你説這不是閉門家中坐禍從天上來很好的日子不能很好地過嘛老俠鄧九公點了點頭好吧我到裏頭看看你請吧越過前層院到北大廳挑簾櫳進來雷煙跟雷普這哥兒倆正説話呢就聽雷大爺説老二呀你也是六十多奔七十的人啦好和壞是和非你也應當分清了吧咱們不能得罪官人呐馬家爺兒們在保定府清苑縣行刺人家官人跟蹤至此捉拿要犯你還要拒捕官差要殺官人這多危險呐咱們可是奉公守法的安善良民我問問你殺官情同造反你知道不知道馬叔侄安的什麼心難道你看不出來嗎紫面豹子雷普低著頭一句話也説不上來大爺這兒正歉落老二呢鄧九公進來了哎喲喝你來啦雷大爺過來行禮雷普也行禮哥哥你坐下吧鄧九公擺手説先不忙老二呀我也勸勸你你在風雲莊一帶跟著你哥哥可以説是保障一方了但是類似一棵苗禿頭義士馬亮他絶不是好人剛才我到樹林邊上鎮八方紫面昆侖俠隨行衛員辦差官童林童俠客爺已經來到風雲莊咱甭説跟人家動手跟人家一瞪眼就是拒捕官差一咱們惹不起二咱們的家就完了你跟你哥多年創這個家也不容易再説回來賢侄雷寶要看著哥哥我那馬好他可以要去為什麼鄧玉騎著馬走到半道上他把馬劫去呀這是什麼行為其實這件事情雷普不知道更甭説雷大爺了雷普一聽就火了把眼一瞪説我説姓鄧的你怎麼還往我腦袋上扣屎盆子我兒子再不好也不至於動你的馬呀你們家的孩子淘氣到了現在嫁禍於人説我家孩子不好你又跑到我哥哥這裏挑撥我們弟兄不和姓鄧的今後我的家你少來鄧九公用手點指我兒子剛在你家把馬匹盜走鞍轡嚼環還在你家擱著呢你怎麼還不承認子弟不良你應當好好地教育哥哥我從不護犢子還有二弟咱們交朋友幾十年啦我什麼時候挑撥你哥哥跟你不和了你們兩人的品德不一樣呸姓鄧的你欺人太甚來看我的軍刃説完雷普來到院中高聲喝喊姓鄧的你出來大爺急喊二弟你這是幹什麼呢怎麼跟哥哥這樣無禮阿哥哥你別管姓鄧的亮你的刀二太爺今天鬥鬥你雷普是惱羞成怒哇老俠來到當院往這一站老二你還要動手心説我閉著眼都能贏你譁啦一聲響雷普的三節棍蓋頂就砸老俠鄧九公跨步一閃身人家不亮招也不還招雷普頭一棍就打空了接著雷普棍頭往地上一打一翻腕子對準鄧九公右面太陽穴反棍砸下來老俠鄧九公往下一矮身縮頸藏頭躲棍又走空了這棍頭一點地啪一抖腕子又回來對準鄧九公左面太陽穴又打下來了老俠往下一矮身你停住雷普哇我拿你當我親兄弟對待沒想到你偌大的年紀如此不知好歹愚兄讓你三招不過是手足之情再要動手休怪老夫無禮姓鄧的休要口狂譁啷啷一抖三節棍就在這時候東角門邊有人喊雷普拒捕欽差真乃大膽
