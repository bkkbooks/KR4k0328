body:
  text: 第五十八回清苑縣馬俊單行刺風雲莊義結鄧九公上回書説到清苑縣馬俊行刺夏九齡訪案在小飯館吃飯遇見一個小孩兒他説離此地不遠有個鄧家堡他就是那兒人氏他的祖先是山東平陰縣人父親姓鄧名龍字九公人稱寶刀手老英雄有一個滾珠寶刀在武林中頗有大名小孩叫柳影鄧玉因為自己腿快鄧玉一提九齡一抱拳你原來是鄧少俠客失敬失敬鄧玉也趕忙答禮不敢當不敢當提起來為我父親丟臉九齡細問鄧賢兄你到底有什麼難言之隱為什麼要摔酒杯長歎呢唉別提了因為我父親最好間談好下圍棋離我們這兒不遠有座大廟叫菩提寺寺內有兩位方丈一位叫降龍羅漢寶闊另一位叫伏虎羅漢寶月還有我父親的一個朋友他們都是好下棋的主兒我父親今天又到廟裏下棋去了我父親養著一匹好馬叫千里雪內一盞燈這匹馬是白馬雪霜白唯有在它腦門兒門鬃的下面有茶碗口大的一塊黃月光這馬上譜夠八駿圖之一有千裏的腳程我乘父親不在家把這馬拉出來騎了一騎其實鄧玉沒有別的意思就是騎著玩一玩兜兜風他把馬韝好扳鞍認鐙上了坐騎一加鞭這馬不但跑得快還穩當一溜煙出去就十幾裏地眼前出現一片大樹林馬剛把步放開了正有徑呢走到這大樹林邊上沒想到從大樹林裏拋出來一件長衫撲地一下把馬頭給蒙住了千里雪內一盞燈正走著呢突然一個黑東西把腦袋給蒙上了這馬一聲嘶鳴前蹄一立鄧玉猝不及防從馬上就掉下來鄧玉爬起來一瞧打樹林裏出來有二十多人過來一人把這長衫拉下來有人就把馬拉到樹林裏去了這個人把長衫穿起來絨繩一系站在鄧玉面前樂了哈哈哈哈兄弟你好阿鄧玉一看是熟人西南有個村子叫風雲莊莊主姓雷在這一帶很了不起大爺叫千里飛來雷煙那足夠一位俠客的身份揮金如土仗義疏財交朋友血心熱膽跟鄧玉的父親鄧九公是把兄弟老頭為人公正他有個親兄弟一母所生可就不成了叫紫成豹子雷普專門結交賊人而且背著他哥哥有些坐地分贓的舉動賊人作了案就得給他送些錢來這些雷大爺確實不知道雷普有個兒子這個人叫鐵爪貉子雷寶二十多歲大高個寬肩膀一身青大肚囊黑臉蛋青胡茬兒濃眉闊目鼻直口方大耳相襯還確實有個像兒這鐵爪貉子雷寶幹什麼來了由於從小家教不好他大爺沒兒沒女對他十分嬌慣這樣他經常背著他大爺在外頭斷道劫財但誰也不認為他會幹這種事兒因為他們家是大財主他大爺雷煙在這一帶頗有名望可是雷寶早喜歡上這千里雪內一盞燈了今兒趕上鄧玉騎這馬他把絨繩解開長衫脫下來一蒙這馬腦袋把鄧玉摔下來底下人把馬牽走了現在鄧玉一瞧喲喝雷寶哥哥過來就行禮起來吧哈哈兄弟幹什麼去我父親不在家我把馬韝上惦著騎上遛個彎兒沒想到碰上哥哥你了嗷這馬是你的可不是我的嗎不對這馬是前幾天我丟的沒想到你騎著呢到現在我把馬得回來了才瞧見你嗨你怎麼偷我馬呀雷寶把臉就沈下來了鄧玉一聽這是哪兒的事阿便急忙解釋道雷寶哥哥我父親跟你大爺都是好朋友咱們都是好弟兄成天見面馬是我家的我們家有這匹馬的時候還沒有你呢雷寶聽了一耍橫這馬腦門上哪寫著是你們家的我看著好就是我的那你不講理我可不是不講理嗎不過不講理不是一天半天啦早就不講理你要幹什麼幹什麼馬是我的你給搶去不成不成怎麼著還要動動手嗎説著話把辮子盤起來了把長衫往絨繩上一掖鄧玉來吧鄧玉往上一趕步右手一晃面門撲就一拳鐵爪貉子雷寶一揪鄧玉的腕子一抖把鄧玉就扔了個跟頭哼你還要動手別説你連你老子都不成告訴你吧這馬歸我啦走柳影鄧玉一想這可糟了我背著父親把馬騎出來要叫我爹知道準不行相反的這馬叫雷寶拉去這是敲竹杠阿有心找盟叔雷煙去可是雷煙跟我爸爸在一塊兒呢這樣自己把土撣了撣奔金官屯來了鄧玉把事説完了九齡問他咱們哥兒倆一見如故兄弟那你打算怎麼辦呢鄧玉想了一下説我想我找他大爺雷煙是不行因為他大爺跟我父親在一塊兒叫我父親知道我非挨罵不成不如今天晚上我到雷寶他們家把馬偷出來得了他們家離這多遠不算遠從這兒往西北幾裏地就到叫風雲莊他們家你認得呀認得我淨去呀這雷家全結交什麼人呐我這盟叔雷煙他是一位老英雄七十多歲循規蹈矩可是他二弟就是雷寶他爸爸胡作非為他們本身就打家劫舍坐地分贓凡是賊人背著雷大爺全上他們家去當然雷大爺在家那是一正壓三邪可是雷大爺不在他們可什麼人都交兄弟咱們哥兒倆一見如故我幫著你偷馬怎麼樣那我謝謝我還沒領教兄台你我跟你説你知道城裏頭欽差大人駐馬了聽説了奉旨的欽差年大人奔四川開倉放賑我叫多臂童子夏九齡我跟我的師父鎮八方紫面昆侖俠童林還有我的幾個師兄弟我們爺兒們都是隨行衛員辦差官保欽差奔四川昨天晚上有大膽的賊人紅毛禿頭狸子馬俊到公館行刺我訪案來到這兒你説説雷家能不能容留這馬俊柳影鄧玉點了點頭説當然有可能對了馬俊是不是還有個叔叔叫一棵苗禿頭義士馬亮夏九齡驚奇地問你怎麼知道他跟雷家有交情這馬亮當年還上我們家去過呢嗷兄弟這是真的嗎那沒錯好吧你幫著我把馬偷出來我幫著你捕盜拿賊好哇兄弟吃完了飯夏九齡付了飯帳哥兒倆從蓬萊春出來了在街上鄧玉買點東西買了幾根麻繩一斤多棉花夏九齡也不知他幹什麼走出村子往北有個大樹林這時太陽已經往西轉了兩個人到樹林以內越聊越近鄧玉挺高興夏哥哥你是官人我不應當高攀但我