body:
  text: 第五十五回童海川掌震燕子坡西方俠巧奪蛇骨鞭上回書正説到三月三亮鏢會鐵羅漢吳成梅花圈上力勝十傑野飛龍燕雷臺上逞凶打了吳成舊恨新仇激怒海川他飛身上了梅花圈英雄心裏在想我兩個弟子被你所傷無情無義以怨報德我讓你知道童林的厲害所以二人當場動手才打在一處這西勝鏢棚內可坐著高人呐雲台劍客燕普這麼一瞧海川用的這是龍門派的招數阿打人用的是擠擦法純屬於內家拳這種五臟之力後發制人以氣行動的功夫了不得呀再説童林的功底又好恐怕我這個傻兄弟燕雷今天要吃虧不過這樣也好童海川一時候雖然能贏燕雷但是不至於要了燕雷的命燕雷這個人在劍山蓬萊島眼空似海目中無人我不是不知道借童林的手應該好好教訓教訓他也讓他知道知道天外有天老哥兒幾個一看海川慢慢地駕輕就熟輕輕鬆松地把八卦拳施展開了腳踩八門按幹坎艮震巽離坤兌八八六十四式加上三百八十四套奪命連環掌招如泉海唰啦啦把燕雷給圍上了燕雷也不含糊他善長燕普所傳二十年的純功阿摟打搪封踢彈掃挂運用自如兩人招數加緊各施平生所學各展自己絶藝真是棋逢對手將遇良才人家童海川跟燕雷沒動手的時候各鏢棚內的不少位自認為武功不錯的主兒都還想上梅花圈顯露一番呢真有一股摩拳擦掌躍躍欲試的徑頭兒直到現在海川和燕雷一交手一看人家的能為我還惦著上梅花圈呢我阿我忍了吧即使上去我也得挨揍阿是阿人家童俠客的功夫確實有獨到之處真不愧是鎮八方紫面昆侖俠又一位也説道這個野飛龍燕雷也不錯阿真是議論紛紛只見兩個指數加緊穿梭蝴蝶相仿十幾個回合二十幾個回合開出去海川就咬了牙了當然憑一招一式贏他也實在是費點兒徑這個燕雷也不上當招數甚好功夫純熟身法又快何況他有渾身的橫練呢兩個人動手在三十個回合的時候野飛龍燕雷上右步一斜身對面上扶手奔海川的左右肩膀上就這麼一搭海川一瞧機會來了心説我要不給你點兒便宜我贏你費徑呐這回我就給個便宜其實燕雷這個掌法來得並不快但是它去的這個地方是海川的左右肩井穴他打這兩穴真要打上海川的兩個膀子就全都得廢了只見海川就勢雙掌往當中一橫類似童子拜佛門戶一收燕雷的雙掌夠著海川了海川的雙手也就夠得上他但是海川猛地燕子分雲用左右手往兩邊一分于爺都納悶海川呐徑敵當前你怎麼這麼大意用這種招數這不是取敗之招嗎説真的人家老俠于成是大行家呀燕雷是從自己的胸前出手夠你的兩肩你猛地雙手往左右一分人家的手可離著你近了而且你的手要想打人家可就遠多了當場動手呼吸之間見生死呀燕雷一瞧這個招便宜呀童海川的前胸完全都露出來了燕雷就勢隨著童林的胳膊左右一分雙手往下一拉默他來得快呀一甩胸右手對準海川的胸前唰地一下這掌就到了幾位老俠客都在台下聚精會神地看著呢大家心裏為海川急呀因為這架式海川要輸招兒看來海川再想回手封人家也來不及了人家燕雷是從前胸出手來得快而你童林的兩隻手在外頭呢等你回來的工夫人家就打上你了其實海川贏燕雷的奧祕也就是在這兒海川並沒有雙手往回去搭而是雙手往回一拉就跟練形意的三元之式一樣雙掌又回到自己的面前這三元是兩個胳膊是一元虎口張開是元前胸是一元燕雷的手掌都按到海川的藍布大褂了才知道這藍布大褂的裏頭沒有胸口海川用的這手功夫叫緊背空胸你這手掌打空了你發不出力來打人家大褂管什麼呢這時燕雷知道上當了但再想往回逃那你可就沒功夫了只見海川往右面一偏臉左手的後溪穴一挂他的右胳膊上右步進步穿掌右手可就到了迅雷不及掩耳其快無比唰地一下海川的右手插進來右步前伸左腿後繃一看掌用上了自己繃住了徑兒由打腎眼兒把這口真氣就提上來了海川用的是丹田氣也就是所説的氣功打人這一掌要是擊上燕雷阿燕雷肚子裏的五臟六腑可就要張牙了就看海川這麼一甩臉虎目圓睜把吃奶的徑都使出來了海川當初在九公主墳不就給努住了嗎這回海川又把徑兒用過了只聽海川暗暗地説了一個默字嘣一掌出去把燕雷就給打上了燕雷隨著掌聲轟地一下就出去了起碼出去有一丈挂零燕雷應聲咕嗵可就躺下了海川就覺得自己丹田這口熱氣呼地往上一撞海川心説可壞了公主墳我就努住了蒙那位老仙長給我藥吃否則三月三亮鏢會我就上不了台老仙長還告訴我你的淤血未淨切勿性急慪氣過力你還要吐血看來我今天還得吐血就見海川的臉色一變英雄一晃彪軀在梅花圈上就打晃兒了西方俠于成怕兄弟躺下了那不栽了跟頭嗎你打人家躺下你也躺下了老俠于成腳尖一點地飛身形過來伸左手避開他的嘴因為知道童林要吐血然後一架海川的胳膊兄弟海川隨著于老俠一攙他往前一撲一張嘴噗這口血就出來了這個時候于爺就勢一伸手把童海川夾起來轉身形長腰下了梅花圈野飛龍燕雷隨著海川這一掌躺下了他兩隻手一按地騰地一下就坐起來了眉毛眼睛鼻子嘴面目痙攣五官挪位臉色煞白黑臉蛋成了白的了就看這燕雷鼻子翅一發顫往後又躺下了跟著往起再一起這口血才噗地全噴出來喝台板上兩人的兩口血都噴到這裏了燕雷咕嗵又躺下昏死過去了雲台劍客燕普馬上命令鮑古鮑圖兄弟二人急速派人到梅花圈上把兄弟攙下來心説就這一巴掌阿半年好不了阿時間不大燕雷被人擡到西勝鏢棚的後面雲台劍客燕普拿出藥來先讓兄弟吃下去又