仙長罵了幾句也就過去了仙長只能回到玲瓏島住在自己三徒弟呂德興的廟裏這天晚上老哥兒倆帶著呂德興出來看玲瓏島的夜景呂德興就告訴了有一個叫鎮海川的風景非常好老爺兒仨就到鎮海川看夜景來了猛然間聽底下喊童林呐童林想不到你死於此處尚道爺一探頭看見童林要扎自己這才喊住把海川救上來了海川説我和我哥哥侯振遠來的我遭了這樣的危險不知道我的哥哥侯振遠怎麼樣莊道爺聽完立即吩咐德興呀你去查看一下你對這山裏頭了如指掌德興轉了一大圈天都快亮了才回來告訴尚道爺所有消息埋伏都沒拿住人可能侯振遠沒進山海川一想不能呀我上來啦我哥也上來了唉怎麼沒見面呢稍事休息天光閃亮呂瑞説師父師叔師弟呀你們爺幾個收拾一下咱們奔前山去吧我把船準備好了聽説前山已經打上仗了你出了廟就能聽見前面喊殺聲連天好那麼我們就去一趟老劍客莊道勤撩起道袍一伸手撲嚕一下把腰中的軟劍摘下來了佩在自己的肋下這口寶劍叫落葉秋風掃價值連城聽到前山鑼聲響亮喊殺陳陳他們順著後山密路就下來了小船準備好了兩名水手一個撑船一個掌舵爺兒五個上了船不一會兒就到了玲瓏島的前山海川擡頭一看喝這仗可打凶了原來侯振遠海川老哥兒倆來玲瓏島後小船就回去了把機靈鬼王三給放了王三來到中央戊己土大廳後咚咚咚一撞鐘老俠王十古于成秋田司馬空這些人全到了大廳連同李昆田八爺胡二爺任三爺湯六莊主全來了等大傢夥兒進來以後機靈鬼王三把這件事一説田子步聽了就一跺腳這可麻煩了李昆心想要這樣一來哎呀這哥兒倆若有個好歹我可怎麼辦阿正在這時候兵丁進來啓稟大莊主各位老俠客咱們金家渡口可來了不少的人唉聽説是從鐵善寺來的金榮也跑進來吁吁直喘地説大莊主快去準備船隻大莊主雍親王爺帶衆英雄來到李昆直哆嗦八弟備船原來王爺見海川他們去了一天一夜一點消息沒有很不放心便和水晶長老亞然和尚濟慈這些人商量去了這麼長時間一點音信都沒有二位高僧你們爺兒倆想一想是不是這些人在八卦山出了事水晶長老亞然和尚搖頭阿彌陀佛王爺你只管放心吧李昆出身名門絶不能心起歹念要害這些位英雄我覺得是沒事如果耗到天亮還不來我們大夥一起去一趟人多力量大到那問一問李昆該怎麼辦這樣你看好不好王爺聽了點頭嗷這倒是個好辦法早晨起來仍沒音信來亞然和尚道王爺人無頭不走鳥無頭不飛你得領頭去呀王爺説好到了大雄寶殿就把這五花棒拿起來了什麼叫五花棒呀五花棒就是人家廟裏頭和尚念經打磐錘兒王爺説好啦我就拿這大磬錘子大家聽我的合在一起各自拿兵刃走派幾個人看守鐵善寺大家坐船來到金家渡口南岸下船後王爺把李昆叫過來細問一番李昆如此這般一説最後道不想法禪他們逃跑昨天晚上振遠海川奔玲瓏島去了王爺一聽急得直跺腳嗨李昆好糊塗呀所有的衆英雄上船跟著本爵趕奔玲瓏島説完又命楊小香楊小翠司馬良夏九齡洪玉耳把大船的船艙板打開讓他們大家進了後艙裏邊讓五小看住了李昆然後王爺到了大船上五花棒一擺譁啦大船順著南盤江就奔玲瓏島了等來到玲瓏島對面的船隻列開就聽玲瓏島裏面嗆啷鑼聲響亮王爺一來也有人報告了司徒朗司徒朗聽完了立刻傳話備船隻出山應敵來多少人我也跟你們完不了司徒朗把軍刃帶好蔣雄徐君鐵臂羅漢法禪僧五爺賀永七爺韓忠帶著雷春賀豹韓寶吳志廣一群人紛紛登船二百名兵丁乘船順著螺絲灣口沖出來來到山口外邊船隻排開王爺站在船頭哪一個是司徒朗老英雄呀司徒朗箭翎耳一忽閃我就是阿我問問你昨天聖手昆侖鎮東俠侯振遠鎮八方紫面昆侖俠童海川二人夜探玲瓏島直到現在未曾回轉你是不是把他們拿住了司徒朗這才知道敢情昨晚上侯振遠童林來了怎麼沒聽見有人報信呢他這麼想可不這麼説阿你要問阿童林侯振遠被俘以後因為他們兩人不服氣我早把他們兩人給殺了瞧瞧這句話多惹事王爺一聽一著急一撒手嗚地一下大磬錘就落入江中回過身來一抱拳王老俠于老俠你們諸位都聽見了沒有給他們哥兒倆報仇吧王爺這一喊賽判飛行俠苗澤一按刀把頂崩簧嗆啷一聲響把紅毛寶刀將亮出來刀殼子往背後一別王爺我一定給海川振遠哥報仇墊步擰腰上了船司徒朗你偌大年紀不講信義枉殺人間俠客還不過來受死我要給他們二位報仇火眼金睛賀永一分鑌鐵狼牙釧墊步擰腰就來了飛身形上了大船呸鼠輩狗仗人勢狐假虎威幫著童林欺壓我弟兄五爺賀永我要你的命兩方面的鑼就響了嗆啷啷鑼聲響亮王爺這裏瞧著心如火焚把八爺田子步叫來子步你給我如此如此這般這般帶著一部分人去是田八爺帶著一部分人走了幹什麼去了咱們先不提王爺這回發狠了非給海川他們哥兒倆報仇不成韓寶吳志廣這些人都在司徒的大船上瞧著呢賀建章甩起狼牙釧蓋頂就劈老俠苗澤跨左步擺寶刀急著相迎兩人在戰船上就打上了招數加緊呀越打越快七爺韓殿遠一按自己的小片刀刀把嗆啷一聲響哥哥哎看我的韓殿遠墊步擰腰上了船剛到船上風流俠鐵扇仙張鼎張子美一抽鐵扇子飛身也上來了往這一站韓忠你恬不知恥認識俺風流俠鐵扇仙張鼎嗎韓忠瞪眼呸誰認識你哪里走左手一晃面門刀就到了老俠張鼎擺鐵扇子跟韓忠打上了哎喲喊殺連天可就更亂了也就在這個時候鐵臂羅漢法禪僧飛身上了大船道姓秋的你上來咱們倆是師兄弟你架著胳膊肘往外扭你欺壓我弟兄助紂為虐今天貧僧要跟你討教三合我跟姓穀的練是法禪不跟他姓穀的練法禪照樣有本事姓秋的你過來王爺勸説秋老俠你別客氣了禍到臨頭須放膽法禪既然不仁老俠客也就別講義了請吧老俠秋田萬般無奈自己按著大寶劍的劍把子飛身形上了大船司徒朗蔣雄徐小俠都在對面看著老俠秋田一上大船用手指點師弟阿當年你恨師犯弟結果你我弟兄才分道揚鑣這麼多年我惦念你到八卦山看望於你你跟我面合心不合師弟阿你也奔七十歲的人啦你們辦的這事對得起誰呀你哥哥跟人家説好了金玉之口試藝五絶交二小獻國寶結果你們把國寶二小帶走讓你哥哥偌大的年紀為難他多痛心阿呸秋田你胡説八道來到八卦山花言巧語挑撥我弟兄不和直到現在你還説這個哪里走老俠秋田一按劍把嚓楞把轆轤大寶劍亮出來劍鞘子往旁邊船板上一放一舉大寶劍好吧你進招來阿彌陀佛法禪滿臉殺氣舉火燒天式嘎稜稜一舉大鏟奔老俠秋田的頂梁就劈老俠向右一滑步拿寶劍的手反腕子刷地一下紫燕抄水對準和尚的脖項就抹大和尚法禪閃身形躲過去兩位當場動手打上了真正的同堂學藝兄弟變臉了其實北俠治死法禪很不算什麼可有一樣呀怎麼著我們倆一個村的人鄉土之誼桑梓之情孩童在一起再説我們倆一塊磕頭在谷老恩師門下儘管他半道上辦錯事被老師逐出門牆但是他到底跟我有鄉里之情阿六人打成三對難解難分王爺這邊的三位俠客都有一種想法就是不願意把對方治死可是老俠張鼎一瞧韓忠這人恬不知恥有幾次讓著他默他反倒來徑啦老俠張鼎一想得啦幹脆我要你的命吧你韓殿遠也不是好人張老俠想到此微然往下一矮身縮頸藏頭扇子往起那麼一舉一反腕子扇子就把韓殿遠的手背砸碎了嚓楞楞一聲響刀就飛了再看韓殿遠唰地一下臉白了眉毛眼睛鼻子亂動面目痙攣老俠一趕身又在他百會穴正穴眼用大鐵扇子一挫腕子把他那腦骨也給砸裂了韓殿遠一聲慘叫撲嗵往後一仰身當場斃命
