body:
  text: 第三十八回誓同心夜探玲瓏島逢絶地幸喜遇恩師上回書説到田子步到玲瓏島探視可把韓忠他們嚇壞了他們認為這一定是田老八到這兒探聽消息來了便對司徒朗説哥哥我們可就指著你了司徒朗一擺手你們別管該站著站著該坐著坐著來呀把田八爺給我帶進來進了玲瓏島田八爺心裏就為難啦挑簾來到大廳田八爺一看哎呀這勢派可不小哇四哥五哥七哥都在這兒坐著小兄弟的都在旁邊站著司徒朗左胳膊支在桌案上用左手托著自己的前額往桌上一趴連理都不理田八爺邁步往前來低頭道兄長在上小弟田方拜見司徒朗仍然不理田八爺連起都不好起來又道哥哥弟田方來看你了司徒朗還是不理八爺一想看來你是不理我了我田方人稱小武侯我要不能和你説上話我還叫什麼小武侯哇於是田方自己站起來到了案子前頭啪啪雙手一拍桌子道哥哥哎冤死田方屈死田方了趴在司徒朗耳朵邊直哭哎喲哭得這個痛哇別人也沒言語也沒人勸哭來哭去把司徒朗給哭煩了叭一撥楞腦袋田方你哭什麼我死了麼上我這兒嗥喪你噁心我八爺心説你愛怎麼嚷就怎麼嚷你不是説了話了嗎説了話就好辦哥哥我田方冤呐我冤死了我沒處訴冤去只有在哥哥你這兒訴冤司徒朗耷拉著臉你怎麼冤呐你説哥哥你容我説話嗎這叫什麼話叫你説你就説好吧我應當不説可哥哥你非讓我説我就只好説了田子步擦了擦眼淚自從小弟來到玲瓏島屈前奉教屈指算來已經十幾年了哥哥小弟自認為沒有得罪哥哥的地方只是由於這些年來山裏事忙我掌管著一些事務分不開身不能給哥哥及時來請安可每逢到了節年或兄長的壽辰我總派人給哥哥把禮物送到島上小弟視兄長如師兄長待小弟親如手足這一次我親臨玲瓏島甭管幹什麼來了哥哥不看僧面看佛面不看魚情看水情哥哥你這麼樣拒絶我我給哥哥磕頭你不理我我心裏難受呀當年我給哥哥拜過師呀師徒之情手足之義哥哥你就沒有一點憐憫小弟之心嗎好像是我素常來往對哥哥孝敬不夠讓哥哥挑了我的眼如果這樣我還哭田八爺放聲大哭哇哇淚如泉湧得了得了別哭了不我不哭難受嗨得了得了算我不對司徒朗一看田八爺這麼哭他的心就軟了坐下坐下我是坐下我惦記著跟你説會兒話我還要走呢好吧你説吧哥哥你也知道八卦山的事兒可能我這三位哥哥和侄兒都跟你提了他們也都在這兒坐著呢可這件事的原委根由你可不知道田方就把這件事由頭至尾説了一遍既然我們跟人家打了賭了君子一諾千金不能反悔試藝五絶我們八卦山輸了就應該把兩個孩子交出去退一步説兩個孩子逍遙法外但國寶不能不還朝哇我就問你偷了皇上的東西總不給那成嗎甭説偷皇上的東西偷你的你幹嗎司徒朗一聽對呀偷我的我也不幹呀可不是嗎可他們不顧手足之情到你這兒來花言巧語跟你説了好多的話要不你不至於對我這樣你不理我我心裏怪難過呀我這次來就是想問問哥哥你能不能答應我三件事頭一件事你讓他們大家回去一是保全我們八卦山弟兄八個的手足之情二是使人家童海川銷票無事三是從今以後把你和我哥哥李昆的隔閡打消老人見了老人親呐一番相見一番老能得幾時為弟兄哥哥你已經八十多了你還活八十多呀你眼前頭誰是你的近人親人呐你不就這麼兩個師弟嗎哥哥你怎麼就這麼心眼兒死呢司徒朗一聽心説這個八爺跑到我這兒還編排我一堆不是便説好吧你往下説我要求你從今後跟八卦山就像一個人一樣我們大家夥兒雲消霧散你看不好嗎老八説真的你這片話打動了哥哥的心可有一樣受人之托忠人之事我跟你哥哥李昆倒沒什麼相反的姓童的這些人怎麼這麼厲害呀請出王十古試藝五絶當然國寶理當還朝韓寶吳志廣這兩個奴才也應當打官司就這麼樣讓他們回去我可不幹你回去吧讓你哥哥李昆到我這來一趟如果你哥哥不來那就讓侯振遠和童林到我這兒來一趟吧我們總得見一下子手兒事情都好辦你看怎麼樣田八爺心説我的目的就是瞧他們在這兒沒有別的我不管哥哥我哥哥李昆來了你們哥兒倆言歸於好是件好事如果侯振遠童林來了你們言歸於好把兩個孩子交出去把國寶交出去從此化險為夷我們雙方打消了心裏隔閡那當然更好可人家到了這兒你們要是翻了臉當場動手打起來了手足相爭弟兄變目我這三個哥哥帶著兩個侄子從你這兒又跑了這樣人也得罪了仇也結下了國寶也不能還朝我們八卦山的事兒也完不了反而讓我的兄長李昆七十好幾的人心裏為難受窄我做兄弟的心裏可彆扭哇田子步口似懸河舌如利劍不愧小武侯司徒朗果然上當了你放心他們爺幾個誰也跑不了韓忠心説田老八好小子你這一句話就要了我們爺兒幾個的命了我們再想從玲瓏島跑可就難了司徒朗這人説話是算話的田方一抱拳哥哥要是那樣我就回去一趟我哥哥是不是來人家侯童是不是來那就另説了反正我把話給你帶到了好吧我等你們三天走吧田八爺轉身形出大廳出了玲瓏島上了自己的小船船打回頭刷啦啦順水路往回來都到下午了田八爺下船上山順著八卦山往裏走一直來到中央戊己土大廳爺幾個全在這兒等著呢八爺進來就把事情經過全説了侯振遠和諸位老俠一聽都稱讚説哎呀田老八這個小諸葛還真了不起一個拴馬樁把這仨哥哥倆侄子全給拴住了我哥哥司徒朗説了你不去不行侯童二俠不去也不行給人給國寶都得你們去李昆面色蒼白老俠侯振遠一擺手事情不是到了這地步了嗎咱們大家從長計議人多主意多大家商量個主意太極公念手足的情誼司徒朗老義士也是個赤膽忠心為朋友兩肋插刀的人物他不是個壞人大傢夥兒一塊坐著説話圍繞著玲瓏島的事情議論開了田八爺又把玲瓏島的情況給大家仔細介紹了一遍直到掌燈吃晚飯的時候才散海川在吃飯的時候可就一聲沒言語吃完了飯回到自己房裏心想事情是誰的是我童林的商量的結果也沒有個最好的辦法有説打的也有説暗探的總之都不容易不過我童林也得試試也得嘗嘗乾脆今天晚上我上趟玲瓏島吧海川又想甭説上玲瓏島出人家這個九宮八卦連環堡都不容易海川正愣神呢瞅見門口站著一個侍候的僕人海川點首讓他進來這個人也就二十多歲身子骨很棒穿著一身藍扎著絨繩灑鞋白襪子漆黑的一條大辮子盤在腦後你姓什麼童俠客爺我姓王排行第三莊主爺給我起了個外號叫機靈鬼王三童林説你很機靈阿在八卦山呆了幾年了童俠客爺我在八卦山可呆了好幾年了我從十來歲就在這兒有好多年頭了你家裏還有什麼人呢還有爹娘兄弟姐妹一大家子人呢你在八卦山掙多少錢嗨這二五眼的事兒一月一兩五錢銀子海川一伸手拿出十兩銀子來道給你這十兩銀子買雙鞋穿我看你在這兒侍候我忙忙叨叨的我心裏很過意不去哎喲這這我怎麼敢呢我們八莊主早就有話兒不讓我們要客人的錢嗨拿著吧你知道我知道不就完了嘛那我就謝謝你了王三也就收起來了童林問王三這個九宮八卦連環堡你熟嗎閉著眼打個滾兒都能來回走可你剛到這兒你不知道海川點頭嗷我悶得慌你能不能帶我到你們這個九宮八卦連環堡外面去遛遛喲這麼晚了你還出去不過你老人家要樂意的話小子我可以陪你出去海川把子母雞爪鴛鴦鉞帶好了就跟著機靈鬼王三打九宮八卦連環堡中出來八卦連環堡周圍都是大山海川擡頭看天滿天星斗銀河耿耿玉露冷冷夜靜更深喝這夜景真幽美俠客爺你剛來到我們這兒要説這八卦山確實不錯你是在這站一會兒就回去呢還是想遛遛你們八卦山四水團圍船可得多呀好大小船隻一百多條呢在哪兒擱著嗨有船塢哇你琢磨琢磨沒有船塢哪行呀這船塢在什麼地方船塢你打聽那個幹嗎俠客爺你幹什麼王三既然山頭這麼美我想下山到船塢找條船逛逛南盤江這江中的夜景更美呀你説對嗎嗨俠客爺你真是個風雅之士呀童林心説我還雅呢真的咱們南盤江的夜景可美極了要是你老人家樂意我就帶著你到船塢去找條船陪著你到船上去走走你老人家也高興了掃去白天的愁雲回去好美美地睡上一覺兩個人就順著小道下來轉來轉去轉到了東面兒到了船塢俠客爺咱們山裏也沒事兒呀可今兒怎麼一隻船也沒有了呢海川一瞧可不是嗎船塢裏空蕩蕩的除了水什麼也沒有沒聽説八卦山要幹什麼呀王三也納悶兒俠客爺我們有一百多條船呢怎麼沒有了呢哎那兒不是一條船嗎王三往江裏一指遠遠的桅杆上有一個小紅燈籠時閃時滅哎呀真是一條船王三高興喂你看見沒有它往這邊兒來了果然這條船漂漂悠悠往這邊劃過來了嗨過來船家機靈鬼王三一喊這只船越來越近來到了江邊攏了岸系好纜繩兒海川一看船上只有兩名夥計船頭有夾杆一根長竹竿挑著燈籠船艙板兒全蓋著機靈鬼王三問你們二位幹什麼呢我們是奉爺命巡邏的回船塢交班哈哈哈你是哪位我是中央戊己土大廳的夥計叫機靈鬼王三哎喲王三爺你二位幹什麼呢王三指著海川説認得不認得這是鎮八方紫面昆侖俠童海川俠客爺俠客爺要到江中看夜景找了半天可沒找到船這船都哪兒去了這兩個夥計也搖頭我們走的時候還滿著呢怎麼一會兒工夫全沒了不要緊俠客爺也不白使喚你們夥計説嗨俠客爺要到江上轉轉給錢不給錢都行我們還不是應該伺候嗎請你上船吧王三可説俠客爺我陪你上船吧怎麼你陪著我去那可不是嗎那我想想你想什麼我一個人在這裏等著合適嗎海川想了想這樣吧我給你找個地方你等我一會兒我轉一轉就回來到原地找你王三點頭也可以海川往回轉身領著王三往前走半箭之地過了一片樹林有一個山坎抽個冷子就把王三的脖子給掐住了往下一按抹肩頭攏二臂四馬倒攢蹄捆結實了拿中指一揉他的氣管這下把王三憋得夠嗆了俠客爺我可沒得罪你呐你幹嘛把我給捆上呀王三事到如今我不能不和你説實話了我有心趕奔玲瓏島前去探路順手捉拿你家少莊主韓寶吳志廣把國寶請回來一天不拿回二小得回國寶事情就完不了我看你們莊主也挺著急不瞞你説他是我的師哥呀我如若不把你給捆上你回八卦山一報告我的船走不了就被人家追回來我只好對不起你了回來之後我還要多給你幾個錢俠客爺你放心你把我給解開我決不言語決不海川斬釘截鐵地説你別再説了你説出天王來我也不能相信你撕下王三一塊衣裳襟來叭地一卷把這塊破布條塞進他的嘴裏了王三都要哭了海川轉身形回來到了江邊對二人説你們二人多受纍又掏出七八兩銀子來説道得了這點銀子給你們買壺酒喝哎俠客爺我謝謝你了這算什麼海川用手一指大江之上就行了眨眼之間船就譁啦啦地向東順流而下走到半江中心船可就不走了海川一愣這下可完了自己在岸上是俠客爺到了江心可就不靈了自己不會水呀他一伸手把包袱皮打開拿出雙鉞來你們要幹什麼哈哈俠客爺你把我們當壞人了我們是八卦山的船能是壞人嗎那麼你們倆為什麼不走了阿因為有個朋友在等著你呢海川一愣朋友在哪兒呢你看把艙板打開噌地一下一個人就躥出來了身