body:
  text: 第四十八回教師府掌打焦秋華遇強敵抛鉞亮寶劍上回書正說到豎臂摘星焦雨焦秋華來到海川的府上拜見童海川沒想到小弟兄非要跟人家動手焦二爺想自己年歲大了不能跟這些位少俠客較量但是不打不成這才院中一戰孔秀司馬良夏九齡小香小翠都輸了洪玉耳墊步過來一抱拳焦師父晚生不材當場求教老英雄一笑少俠客怎麽稱呼玉哥通名姓往前搶步左手一引右手奔焦二爺胸前便打呼地一下就到了焦秋華一看啊這個比前五個都強焦雨伸手一拿沒想到玉耳的右拳一變爲反背撩陰掌焦二爺高興啦這小孩可不錯立即接招動手四個回合焦二爺用了一招秀婦穿梭把玉耳也戰敗了所有徒弟除了吳成劉俊以外全都輸了哎呀師哥我們都輸了你怎麽辦劉俊把臉往下一沈說道師父督促你們用功可你們背地裏埋怨師父管你們很嚴到現在真用上了你們哪里是焦二爺的敵手劉俊又轉身對焦二爺說焦老英雄請你到屋裏坐我不是不能跟您動手因爲我有難言之隱因我是做師哥的不稟明老師我天膽也不敢跟您動手您稍候來呀師弟沏上茶讓焦二爺再喝碗茶等我把師父找來焦二爺心說這小孩厲害不用說他過來也得趴下他說他不能跟我動手因爲沒奉師命但那意思是我不怕跟你交戰不過找個藉口說我師父不在這兒他們都輸了我做師哥的不能跟他們瞎摻和同時他又把我拴住好叫他師父來打我嘿好一個年輕人英雄出在嘴上啊這樣把焦二爺安頓住了劉俊一個人出來穿大街越小巷趕緊奔牛街一直往前走海川從南往北來碰上了這裏劉俊一邊走一邊提這事海川聽明白了海川說這個這怎麽能怨人家豎臂摘星焦雨呢焦二爺也是個人物呀替我童林管教徒弟太好了今後我有事出去嚴格督促你的師弟們練功不叫他們在外頭滋事生非爺兒倆說著話穿過大街走過小巷來到家門口挑門簾進來說真的海川真有點護短他一看徒北們身上都有土一個一個很狼狽心裏怪難過的一看焦二爺站起來了焦二爺黑黲黲的臉龐內力充沛二眸子亮華閃閃海川知道焦秋華有一定的功夫便道您是焦老師嗎在下就是童林您請坐童俠客爺冒昧冒昧斗膽拜訪您請坐我聽我的弟子劉俊說您老人家到我這兒來孩子們招您生氣了童林請罪賠禮不童俠客還是焦秋華沒有大人之材本來這次是拜望拜望您您不在我焦秋華就應當走你的高足們一定要把我攔住讓我進來坐會兒在下也不願跟令徒們動手令徒們一定讓我獻獻醜才領教了幾位焦老師您是有名的人物我童海川也知道我這次下江南辦了一些事但主要的是靠交朋友焦二爺是北京有名的把式匠拜訪不到這是我童林失禮的地方徒弟與徒弟之間爭鬥起來誰勝誰負無關緊要雖說打了孩子娘就出來老英雄我們都是長一輩的人了經歷了不少的事也聽前輩們說過面合心不合影響到老一代的弟兄之間的不合那就錯了咱們倆都是北京的把式匠都有點同仇敵愾之心呢人家外地來的武術家至北京訪友我們弟兄都得站在一條線上呀老英雄您是個人物我童海川也願結交你這位老朋友您先回去等過幾天我一定拜訪您去給您賠禮令徒們被打傷了我童海川還要安慰一番童林說的真是心裏話所做所爲可以說仁至義盡了因爲童林這個人不會藏私嘴裏說的跟心裏想的是一樣的尤其是童林看見徒弟們挨打他心裏是不痛快的但是他看焦秋華是個英雄願意結交這位老朋友焦二爺也明白童林這人直來直去渾金樸玉而且也看出童林的功夫來了心說我焦秋華跟人家動手也不成焦二爺的意思是就坡兒下了只要你童林說兩句好話我就告辭了但就在這個時候焦二爺看見夏九齡沖著自己撇嘴焦二爺心說喲喝童林的徒弟沖我撇嘴那意思你打我們這些徒弟可以我師傅來了嚇死你也不敢動手要不他怎麽撇嘴呀焦二爺一想我就這麽走啦在童林的弟子心目中我算個什麽人物我打人家孩子人家大人一來我就夾著尾巴溜了這叫什麽人物想到這兒焦二爺便對海川說童老師我聽說您奉師命下山興一家武術別開天地自己別立一門把式這次您下江南顯了大名焦秋華真不敢跟您相比我自慚形穢自己的能耐不夠我想跟您討教討教跟您學幾手可以嗎儘管焦二爺說得很謙虛童林聽了這話可不滿意了你找的是我童林可是我不在家你把我徒弟打了如果在我童林剛一下山的時候我受不了這個咱們倆早見手了輸贏不提我也得跟你幹幹你憑什麽背著我打我的徒弟打狗還得看主人呢愛屋及烏看佛敬僧嘛可是我童林現在不然了諸位哥哥在一塊兒作爲一個俠客來說得有點度量呀怎麽著我跟你說了許多好話請你走你還要動手難道說我怕你嗨動手就動手吧海川一抱拳老英雄按理說您到了的寒舍我不應這樣既然老英雄一再懇求那麽咱們倆位到院裏吧海川剛說到這孔秀搭碴了哎呀老英雄我看你倒在哪旮裏頭好呀海川很不樂意因爲劉俊把實情都跟師父提啦這孔秀是個成事不足壞事有餘挑撥是非的人完了事以後我一定要責備他沒想到現在他又說出這種話來海川就瞪了他一眼說了聲嗨孔秀還不後站哎呀學生遵命然後把簾頭撩起來讓二位來到院中弟子們全都跟出來了焦秋華焦二爺往上垂首一站再看海川往下垂直一站焦二爺可看清楚海川了土黃布褲子汗褐左大骨頭鈕子粗藍布大褂又肥又大紮絨繩高腰白襪子紫微徽的臉面劍眉虎目鼻直口方大耳垂輪小辮歪扛著人字的脖子哽哽著太陽努著眼睛鼓著渾身的氣眼是足壯的看此人金在沙中玉在璞內哎呀焦二爺說這個他的弟子一個個穿裝打扮還可以但這童林怎麽穿得這麽土呀真正的威震南七省的童俠客怎麽總穿這士黃布褲子汗褐還左大襟兒的哎呀您要怯出個樣來不過人家海川渾金璞玉看得出來功底很深海川轉到下垂首一抱拳老英雄請吧焦二爺一想得了我打人家徒弟不對了人家師傅一來我要是蔫巴溜一走了怪寒磣的乾脆是福不是禍是禍躲不過你是俠客我也要跟你討教討教這叫甯撞金鍾一響不打鐃鈸三千我也得跟你來來焦二爺往前一搶身高聲說道童俠客焦某無禮了老頭往前一趕步左手一個引手上右步一歪身轆轤翻車單劈掌唰一下對準海川的脖子來了焦二爺很有功力啊這招海川要是真讓焦二爺劈上那也真夠嗆呀但是看慣了南七省人物的手法再瞧瞧二爺的手法就軟多啦行家一伸手就知有沒有海川往下這麽一矮身微然縮頸一躲右手一穿往下一拉腕子伸左手右手往下按左手往前伸唰一下左手就到了烏龍探爪奔二爺面門就打焦二爺往旁邊一閃身用手一扶海川往下一矮身跟右步一斜身單鳳朝陽奔對方太陽穴就來了焦二爺一看掌到往下一低頭腳走掃堂海川腳下一點地長腰起來雙手一抱拳焦二爺一回身也一抱拳封住門戶兩個人彼此道請當場動手又打在一處走行門讓過步幾個回合開出去豎臂摘星焦雨焦秋華吸了一口涼氣哎呀看來以貌取人失之千里呀我總認爲童海川是個怯人可是人家這功夫不怯呀掌法出來聞所未聞見所未見自己只能看著人家的掌法施展不敢往裏進招人家童林的招數就是特殊呀怨不得人家興一家武術果有其能啊焦二爺二心上下忐忑不安啦海川一看不錯你焦秋華的功夫有點功底也就是了要說真好你還差著一大塊兒呢海川一看焦二爺的掌奔自己胸前來了海川不躲了因爲知道焦二爺是走後留招只見他又雙手扣住童子拜佛式雙劈掌直奔海川的面門如果海川往旁邊一躲焦二爺便飛鵬展翅這裏頭能變化呀人家海川懂得海川一看焦二爺雙掌到了就勢用左手順著左邊從嘴角一捋這招叫白虎洗臉海川自己的左手掌心一搭焦二爺的雙手腕然後上右步一斜身左手奔往焦秋華的面門一托說真的海川這手只要挫上焦秋華焦秋華的鼻梁骨就得折了焦秋華往旁邊稍微一閃海川微然一斜身左手在胳臂肘底下往前這麽一揣這手功夫可來的快啊正是焦秋華蓋穴的穴眼上只見海川氣貫丹田掌心一按他的穴眼撲地一聲就打上了把老頭子打出七八尺遠去往地下一躺焦秋華就知道要壞了五臟六腑翻了個兒眼前吧啦啦啦地直冒金星發黑呀耳朵眼兒嗡嗡嗡地放響箭嗓子根兒發甜一張嘴哇就噴出一口血來就覺得兩肋子窩子紮得慌難受之極臉色都變了海川哎喲一聲向前一趕步伸手一扶焦秋華老英雄童林武術已練而煞手未學誤傷老英雄追悔不及您可多多原諒呀童林說的可是真心話武術我練了沒有練了煞手學沒學沒學呀煞手就是拿手就跟稱東西稱分量一樣您要一斤半伸手一拿往秤盤裏一放頭高頭低正好一點不差您稱去吧這就叫煞手這是本事我童林功夫練了但是這煞手我還沒辦到也就是當我打你的時候我知道用幾成力但你這個人素質怎麽樣我用幾成力打你到什麽程度傷輕傷重吐血不吐血我還掌握不好我把您打重了海川說的是實話不能跟西方俠于成那麽准打你到什麽傷就是什麽傷那辦不到焦二爺只是心裏難過啊搖搖頭弟子們呼啦啦全圍過來了海川安慰著說老英雄真是對不起您您在我這裏養傷吧焦秋華搖了搖頭說話少力七分微弱俠客爺我謝謝您您這一掌倒教育了焦某焦某知道自己不成啊真是人外有人天外有天您還是派人把我送到護國寺我的把式場去我回去慢慢地養傷吧焦二爺順著嘴角往下滴著血臉色難瞧海川點了點頭好我實心實意交您這朋友來呀劉俊趕緊過來了師父你馬上帶著你師弟們準備一個門板用繩子跟杠子上面墊上一層被褥墊得厚點再放一個枕頭把老英雄搭到門板上你們擡著門板給送到護國寺去快時間不大徒弟們分頭尋找東西很快就準備好了海川問你們誰去呀劉俊趕緊躬身施禮師父弟子前往你一個人不成孔秀嗷海川這一叫把孔秀臉都嚇白了幫著你師哥把焦老英雄送到護國寺哎呀弟子快去海川把臉往下一沈師父弟子遵命就是了孔秀真有點含糊了師哥您在前面我在後邊吧劉俊說可以自己擡前邊孔秀擡後邊兩個人慢慢地由擡家裏邊出來海川命人把血迹打掃乾淨自己一想得啦打人一拳提防人家一腳我也要留點兒神了看看弟子們好像都很滿意了他們各自把衣服都換過了到上房打起精神來侍奉海川再說劉俊孔秀他們倆人穿大街走小巷趕奔定府大街工夫不大來到護國寺的山門前孔秀對劉俊說師哥我們就把老英雄放在這旮裏回去得了劉俊一搖頭這像話嗎劉俊上前去啪啪啪一叫山門時間不大出來一個喇嘛把門開開了喲這不是我們師叔嗎啊你們找誰呀劉俊抱拳我們是由北城根雍親王府來的老英雄到我們家去拜望我們的老師兩人當場過手一時不慎老英雄受了點兒傷我的老師是雍親王府教師鎮八方紫面昆侖俠童林我是他的大弟子穿雲白玉虎劉俊我帶著我的師弟把老英雄給擡回來了您給通稟一聲嗷您候著喇嘛轉身形奔裏走時間不大就聽裏邊說話師弟啊你被何人所打愚兄一定給你報仇雪恨醜面佛馬寶善邁步往外走呀帶著十幾個喇嘛孔秀噌地一下跑到路南去了嘴裏嘟噥著哎呀躲著一點吧要是不成的話我可以跑劉俊這氣大了馬寶善來到眼前你你是什麽人劉俊一抱拳您怎