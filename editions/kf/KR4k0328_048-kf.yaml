人又喊上了兄弟你好哇哎呀自己的二哥一輪明月照九州蒼首白猿侯傑侯敬山海川趕緊過來叩頭二哥您好哇給二爺行完禮旁邊有人搭話兄弟你好哇海川一看風流俠鐵扇仙張鼎張子美老俠客在這兒站著呢海川過來哥哥我給您叩頭了剛起來旁邊有人說話兄弟你好哇賽判兒飛行俠苗澤苗潤雨行完禮之後旁邊又有人說話兄弟你好哇展翅金雕鐵掌李源哎呀哥哥海川過來照樣行禮剛行完禮旁邊有人說話嗓若銅鍾哥哥想死我了就這兒想你啊拍著自己的胸口就過來了見童林就叩頭正是猛英雄叱海金牛於寶元海川趕忙相攔傻兄弟哥哥也想你啊師父哎你好哇甘虎過來見禮彼此見禮大家夥兒全都過來了小兄弟們都彼此見禮海川把吳成叫過來挨著排的給他介紹告訴大傢夥兒這是我新收的弟子大家坐好以後海川忙問于老俠老哥哥怎麽大家都在這兒瞧不見我哥哥侯振遠呢于老俠笑著說你看你你就是跟他近他這麽一會兒不在這兒你就惦著嗷這不是來了嗎簾子板一響老俠客侯振遠在前頭黃燦潘龍在後頭海川忙迎上去哥哥小弟童林給您叩頭了哎呀兄弟起來起來我這是帶著他們兩個給大夥安置住處去了現在小弟兄們很多黃燦潘龍趕緊過來給師叔叩頭二位賢侄請起請起小弟兄們也都過來見過師大爺和師兄大家重新落座小弟兄們也別屋談話去了于老俠這才問道兄弟你倒好哇我們在杭州這些日子可挺想你的你見著王爺了嗎老哥哥我還沒見著王爺呢我聽說爺跟你們老哥兒幾個一塊兒回來的怎麽你們爺兒幾個都趕到一塊兒了于老俠說一來有事二來你也知道我們都惦記著回家可王爺對誰也難分難舍誰要一走王爺心裏可就怪難過的這麽著得了好在咱們都得上北京乾脆陪著王爺吧王爺這幾個月可用上功了秋老俠答話了哈哈海川啊于老哥哥提到這兒了我也說句王爺可真練得辛苦了徒弟們下場子練功二五更的功夫王爺跟我們提出來啦也要把二五更的功夫拿起來王爺說我不擱下了回到北京就讓海川給我弄個場子我也要跟海川練海川聽完了點點頭看來王爺可了不得啦把你們哥兒仨的三套劍法都學會了于爺說總而言之臥薪嘗膽破釜沈舟王爺還真下得辛苦接著于爺又問童林海川你在北京都遇到些什麽事啦跟我們說說好吧不過我先問問衆位哥哥來到北京到底是爲什麽呢我多少也聽見點信兒了老俠侯振遠說你聽見啦聽見就聽見吧最好咱們都不要往外聲張傳說明年三月三亮鏢會要出事劍山蓬萊島派人來要奪取十三省的總鏢頭與國家大爲不利我們這些人身爲俠義跟鏢行多少有點關係而且咱們也請了一些人咱們無論如何不能讓他們劍山蓬萊島把十三省的總鏢頭奪過去嗷是這麽回事我沒聽到這麽詳細的內容于成又問海川兄弟你在北京都遇到什麽事啦海川並不隱瞞就把頭出前門認識王倫王於延鐵祿鐵木金二出前門巧遇神龍手歐陽君清風羽士任元金魚胡同拿林寶三出前門來到清真寺僧道俗會篩海賭氣比武丟點穴鐝的事情全說了大傢夥兒都納悶兒當著幾個老前輩能把這點穴鐝抄走了這可是個了不得的人物啊一般的人誰有這個能耐和膽量呢大傢夥議論了半天百思不得其解海川又把今天的事情說了我掌打了豎臂摘星焦雨焦秋華今天又到護國寺去跟喇嘛爺馬寶善比武可是來了一位道爺叫雲霞道士杜清風非要置我於死地不可我們兩人交手數十個回合之後自感不敵人家招數正有些發亂突然有一位高人的聲音在耳邊給我吹話叫我抛鉞亮劍這樣我削了杜清風的道冠擦傷了他的頭皮後來回到家裏才知道王爺回府衆位哥哥到了前門這麽著我帶著徒弟們才來的于老俠說海川你可不對啊老人家蜜蜂嶺傳藝贈劍送給你這把寶劍你怎麽不告訴我們大傢夥兒讓衆位也跟你一塊兒高興高興到了現在你才說出來唉海川連連擺手道哥哥你別挑眼了師伯說了劍招不熟千萬不要跟衆位兄長們提及此事連王爺我都沒告訴總而言之這些日子在北京城裏小弟不敢疏神大意不敢把光陰浪費現在我總算把軍刃練得熟一些了今天哥哥們問到了小弟才把這事兒說了說完把寶劍拿出來請哥兒幾個看了一番老俠秋田看完了讓海川把寶劍收起來然後說道海川啊當初我恩師送給我轆轤寶劍的時候提過這件事說師祖有兩口寶劍一口寶劍叫落葉秋風掃另一口就是轆轤寶劍不瞞你說大師伯喜歡落葉秋風掃所以這口寶劍讓大師伯要去了轆轤大寶劍本應交給二師伯的可我師父跟二師伯的感情最好我師父喜歡這口寶劍這樣寶劍又從二師伯的手上到了我師父那裏師父送給我又這麽多年了不然你也應該受這口轆轤寶劍哥哥您老人家使這口寶劍多年了這很好很好大傢夥兒給海川道了喜又說起了杭州的事情各位談笑風生十分熱烈掌燈時分大家分上下兩桌吃飯飯後又談了會兒閒話這個時候大柵欄街裏頭下更了天已交初鼓我看咱們是不是休息呀老俠于成這麽一說大傢夥都點頭同意就讓徒弟們擺上椅子正居中在八仙桌頭裏是西方俠于爺這兒都是坐著睡覺的躺著睡覺的都跑到後院兒去了上垂手是北俠秋田下垂手是南俠司馬空北俠肩下就是老俠侯振遠南俠的肩下是二爺侯傑二爺肩下是張子美侯老俠肩下是苗潤雨再往下是李源童林徒弟們都走了隔扇門對好把燈熄滅俠客爺們盤膝打坐閉口屯舌舌頂上顎眼觀鼻鼻觀口口問心氣息調勻迷迷糊糊地就算睡著稍微地一迷離天交二鼓了就在這時候突然間院裏頭有衣襟帶風的聲音輕如四兩棉花落地無聲想不到鏢局以內竟有大膽賊人前來擾鬧
