倆大個麵條裏多帶點播面甘虎於恒一個燒火一個往鍋裏添水添了滿滿一大鍋水兩人打火種點著柴禾趴在竈門上吹火啦工夫不大鍋開了趕緊把麵條下到鍋裏等再次開鍋兩個傻小子也不管生熟得啦你一碗我一碗擱點鹽花一攪和就吃上了哪管事兒呀兩人你一碗我一碗喝起湯來把滿滿的一大鍋湯喝個乾乾淨淨兩人撤下火把竈堂弄乾淨了說唉總算吃飽了阿彌陀佛真飽了嗎牛兒小子點點頭吃飽了就困虎啊咱們睡覺去裏屋去我給你們出個主意張旺把這倆領進裏屋把被子放在一邊然後讓兩人腦袋沖裏說道空著點睡也照樣飽這主意倒不錯倆傻小子一會兒的工夫就睡著了就是把他們擡到當街去也醒不了於是張旺把夥計叫進來他們倆睡著了該我們倆吃了二位爺台來點什麽呀要好酒好菜時候不大酒菜擺了滿滿一桌張旺和孔秀倆滋嘍一口酒叭噠一口菜吃得順嘴流油酒足飯飽後撤下殘席張旺又對夥計說再給我們來二十個火燒四斤醬牛肉把二十個火燒都切開把四斤牛肉塞進去我們倆路上帶著一人一半兒一天不吃飯夥計心說這兩人怎麽這麽壞他們好酒喝著好菜吃著讓那倆大個只吃四斤面這不是開玩笑嘛夥計給他們倆準備好燒餅夾上肉兩個人私自揣起來第二天一清早算完了店飯賬兩人帶著傻小子上路了怎麽樣飽了吧虎兒搖頭飽什麽呀一點兒都不飽還得想法子吃東西呀壞事包點頭是呀到了飯口只要遇見村子咱們就吃飯沒村子咱們也沒法子孔秀不是跟你們提了嗎這是山路不比平川大道不遠一個村不遠一個鎮的這條路什麽都沒有咱們趕上什麽是什麽孔秀也附和道你說得挺好咱們就這麽辦吧就這樣走出兩三天的路清早起來離開店房還好一些走到曠野荒郊孔秀喊上了喲牛兒小子什麽事兒我走累了腰酸腿疼啊那怎麽辦我想讓你蹲下騎在你的脖子上你馱著我走哎傻小子別的心眼沒有就知道吃心想現在不能得罪孔秀這臭豆腐現在管著我呢我要不馱著他他一口也不給我吃馱著就馱著吧沒法子于恒蹲下身孔秀一騙腿兒上去了把於恒的八紫金魔杵往前推了推騎上他的脖子兩手按著他的頭傻小子晃晃悠悠站起身來慢慢地馱著孔秀往前走孔秀得意地對張旺說我說張旺啊我騎上這老牛穩穩當當的你怎麽還不騎虎啊阿彌陀佛虎兒小子哎你看見沒有孔秀累了我也累了沒關係我也馱著你呀嘿虎兒小子兄弟呀你真好來來來你蹲下霹靂狂風甘虎也蹲下了壞事包張旺也把他的八楞紫金降摩杵往上推了推然後一騙腿兒騎上了甘虎也把他馱起來了本來倆傻小子就大肩膀上又馱著兩人走在道上人家瞧著都樂這叫什麽事呀就這樣每天晚上住店倆傻小子就能多吃一點東西壞事包張旺和蠻子孔秀可得意了兩個人吃飽喝足了騎著一隻虎一頭牛一點兒都不費力就這樣一天兩天一連走了四五天孔秀可說師兄我這旮裏是老太太坐牛車穩穩當當的阿彌陀佛我和尚騎老虎是伏虎羅漢於恒想不出別的你讓我馱著就馱著多給我點吃的就行但是甘虎慢慢地明白了怎麽我們倆餓他們倆不餓而且他們的嘴上老是油漬漬的我們不可能一路上趕不上村莊鎮店是他們倆成心要餓我們哪
