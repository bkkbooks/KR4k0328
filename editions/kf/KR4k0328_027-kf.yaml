body:
  text: 第二十七回展家林拜訪展大旺麒麟山用計捉墨魚上回書說到甘家堡海川收下劉俊爲徒既有廣東龍門縣頭頂太極腳踩八卦乾坤妙手王十古的書信又有代師保師三炷香兩隻蠟紅氊子鋪地海川受禮劉俊又給衆位行禮連傻小子於恒他都給叩頭眼看都行完禮了海川把司馬良夏九齡孔秀三個人叫過來這是我的長門長戶的大徒弟劉俊你們三個人也來給師哥磕頭孔秀沒敢說什麽夏九齡可不樂意了師父我們先進門啊怎麽他是師哥啦廢話你們都是記名徒弟作我的弟子可以不作我的弟子也可以咱們算半師半友離開我也可以劉俊可不一樣三炷香兩支蠟紅氊子鋪地保代二師擔保你們怎麽能跟你師哥劉俊比呐承認這師哥就是我的徒弟不承認你們另拜師門我承認我們倆還以爲我們進門了呢得了兩人又給于爺甘老俠磕頭二位師大爺求求您們給我們倆也作個保代二師也給我們寫份門生帖借花獻佛我們也在您的府上給我師父正式磕頭拜師老哥倆也同意寫了門生帖司馬良夏九齡也挨著排的磕完頭這才最後給劉俊磕頭叫師哥孔秀過來了師父我歲數最大進門也最早海川一笑你是最後一個因爲你到現在還沒拜師呢好了我拜師了他也趴地下磕頭給于爺跟甘爺磕頭行禮沒有別的您做我的保代二師得了于爺搖了搖頭爺們兒大爺對不起你你不是神手東方朔陶潤陶少仙的徒弟嗎我可不知當初你師父童林怎麽收的你那是我當初的師父展翹金雕鐵掌李源給我介紹的于爺一聽得啦這麽一會他晚下一輩去了李源是我徒弟呀他是李源徒弟是我的徒孫啦我師父是樂意收我的那不成啊你叫探囊取物到處探囊取物你師父不管你我這個代師怎麽管你我早就不取物啦嘿敢情不取物了王爺說得啦老俠客這個徒弟我看著收的你就給他做個代師好了沖著王爺于老俠也給寫好了門生帖也照樣的磕頭拜師然後把錢糧一焚把祖師爺的牌位一焚大傢夥兒過來給海川道喜擴大門戶添人進口看得出來這門戶越來越興旺海川可跟甘老俠說哥哥我應當拿出錢來準備兩桌席請你們大傢夥兒喝點兒喜酒可是小弟我在您的府上您說我怎麽辦甘大俠笑了兄弟你要拿錢愚兄不接受哥哥給你代辦吧在我家裏咱們就簡便一點兒老俠客傳出話去替童林收徒弟置辦酒席一聽說要備酒席傻小子於恒心裏頭想嘿剛才吃了半頓兒了現在又要吃肚裏頭地方小哇應當騰出空兒來我先拉去唉甘老頭子我得先拉點兒啊要不然一會兒沒地方擱啦海川一聽我這傻兄弟真丟人不過甘老俠很高興很喜歡這傻小子因爲他這個樣子跟老頭兒的兒子差不了多少啊好好好來人哪家人趕緊過來了老爺子有什麽吩咐甘老俠說這是我傻兄弟要到東院兒小花園裏頭解手去一會好吃飯是讓他跟我來吧猛英雄跟著出去了順著大廳往正東到角門順著箭道往北走過一排房去往東有個月亮門兒東院兒是個花園甘老俠的府上很講究碎石子兒鋪的甬路周圍都是花池子這位爺台您瞧見沒有順著這條道兒一直往東到東牆兒那兒就是廁所您解完手順著這條道兒再回來我挺忙就不陪著您去了行嗎那那當然可以呀傻小子一個人就奔這廁所來啦解完手往外走沒走幾步往北也有這麽一條碎石子鋪的甬路於恒是真傻呀他瞧見這條道兒就忘了剛才那條道兒了他站到這兒發愣也就在這麽個工夫甬路的北邊好像有一種聲音跟打雷似的咕嚕嚕喲是不是要下雨呀白日青天的沒雨呀這是什麽響聲啊聲音越響越大傻小子可就順著這條道往北去啦走出沒多遠一片大花園包圍著五間房傻小子一瞧這高興啊喲這個大廁所多好其實人家這是花廳兒夏天乘涼的聲音就從這屋兒裏頭出來房間正中的兩扇門關得很嚴實大豆瓣鎖鏈兒大鈴鐺鎖鎖著傻小子到門口這兒推怎麽推也推不動傻小子可就往西來了西邊這是個大窗戶傻小子拿指頭照著這窗戶嗵就捅了一個大窟窿本來就一隻眼雌雄眼兒嘛往裏邊一瞧喲他可高興了這是兩間房一通連屋裏頭靠西頭兒有把鐵太師椅前頭有個大鐵桌子這個鐵桌於跟一般的桌子可不一樣桌子心兒往下凹著就跟藥鋪軋藥的大鐵碾子一樣在這裏頭有兩個大鐵球都夠一尺見圓上頭的鐵銹都磨亮了不過那是叫人用手摸的就在椅子上面坐著個大個兒說真的比傻小子於恒的個兒都高晃蕩蕩平頂身高真夠一丈開外前胸寬背膀厚虎體熊腰黑黃的大辮子纏在腦袋上面似薑黃頭如麥鬥兩道花兒攪的眉毛三道旋兒斜飛入鬢一雙大眼睛黃眼珠滴溜兒亂轉大獅子鼻大嘴叉兒青鬍子茬兒一對大耳垂輪身上穿著口袋布的褲子褂子腰裏紮著皮挺帶這個皮挺帶是牛皮的上邊鑲著銅飾件兒鋥亮發光腳底下是踢死牛的豆包兒鞋布襪子憨憨厚厚他一邊兒揉這倆鐵球一邊樂那手伸出來真跟小蒲扇兒一樣傻小子一瞧這個人怎麽跟自己差不離呀從個頭模樣上都很像啊其實這就是甘老俠夫妻兩個的孩子從年歲上說可比於恒大他將近三十歲了小名叫虎兒老兩口子教了他一身能耐這個孩子比于恒可機靈多了於恒是真傻他不過是外表傻於恒不會躥不會蹦有個牆頭兒都過不去人家甘虎可不一樣兒照樣提腰上房能躥能蹦有輕功力大無窮生下采就天不怕地不怕而且還有一身的橫練兒善避刀槍但是脾氣不好母親陳氏給起了個外號兒叫霹靂狂風現在爲什麽把他鎖在這裏呢就因爲劉俊賣藝總怕有人唆使著傻兒子出去跟人家打起來說真的甘老俠還有點兒管不住他他怕他媽但老頭兒也有降得住他的絕招比方說你要淘氣就把你活埋這傻小子甘虎害怕要不然我架著劈柴把你燒死這他也害怕他知道金鍾罩鐵布衫一活埋就死或者是一燒就死人避不住火他在這兒玩得挺好到時候有人給送大餅牛肉吃傻小子于恒一高興投留神咚啪嚓一下腦袋撞到窗戶欞裏頭去了來了一個大巴鬥腦殼沖著甘虎這兒直擺悠哎你好哇甘虎這兒正揉大鐵球呢瞧見於恒也笑呵呵地說嘿哈哈哈小子你身子怎麽不進來我進得去嗎好啊你是誰呀我姓嘿你看我沒法兒說我站不起來這脖子卡住了嗷那你再退回去呀退回去我不就進不去了嗎你問我姓什麽我就沒法兒說了你不會從門那兒進來嗎你你這不混蛋嗎那那不鎖著嗎嘿你也混蛋鎖著你不會給擰折了嗎喲我忘這茬兒了這個鎖鎖不住他們傻小子一使勁兒把腦袋退出去了來到門口兩隻手一攥這鈴鐺鎖嘿一用神力嘎地一下兒把這大鋼鎖給擰折了鎖鏈兒倒下來往旁邊一放一擡腿當把門瑞開就進去了這個時候霹靂狂風虎兒小子也從這大椅子上起來了他進到屋裏頭甘虎迎到屋門口倆大個兒往這一站互有愛慕之意甘虎一想嘿這大個兒真好嘿小子你你姓什麽叫什麽傻小子於恒趕緊一捂肚子丁字步兒一站雌雄眼一瞪你你是由頭裏問還是從後頭問還是由當間兒問嘿我當然是由頭裏問呐那我告訴你家住在淮安府漂母河于家莊姓於名恒號寶元師父起的外號兒叫叱海金牛小名兒叫牛兒小子嗷你就是牛兒小子嘿你怎麽知道的不是你剛才說的嘛那我跟你不錯才告訴你你可別跟別人提小子你叫什麽東西我姓甘呐我叫甘虎我小名兒叫虎兒小子喲你是老虎我我是老牛我有犄角能頂你我沒犄角我嘴大我的牙快我能咬你喲你也甭咬我我也別頂你甘虎說這就對了於恒接著問唉你怎麽跑這兒來了嘿你不知道哇前邊那那老頭兒啊那是咱爸爸是你一個人的這這可不能瞎摻和得對他不讓我出去他敢我把老小子宰嘍別介那是我爸爸你怎麽給宰嘍呢我沖著你我不饒他欺侮咱虎兒小子還成啦不我得聽他的他說過我要不聽他的話他刨坑把我活埋嘍要不然他架著劈柴把我給燒死都沒那事兒你跟我頭裏去前邊兒好些人呐走不行啊我怕他呀再說他跟我媽一商量他們倆人就把我給打啦我還是在這兒忍著吧別忍著不要緊有什麽漏子我頂著老牛是不含糊的我管他叫哥哥嗷你管我爸爸叫哥哥那沒錯嗷這麽說你這輩兒大呀咱到時候什麽輩兒不輩兒的我就是牛兒小子你就是虎兒小子墳地改菜園子這倆人拉平兒了那好吧可是這麽著你可不准打他呀我不打兩個人一前一後打屋兒裏頭出來了傻小子甘虎帶著路牛兒小子在後頭跟著來到前大廳屋裏頭人很多夥計這麽一瞧少爺怎麽出來了一挑簾子倆人一前一後奔裏走海川在這兒坐著一瞧喝這倆人一個是銅鑄的金剛一個鐵打的羅漢倍兒齊老俠甘風池這麽一瞧嗯虎兒誰讓你出來的甘虎還真害怕他往後退著說爸爸別管我啊我可給你說了半天好話了這老牛要要打你我直央告他甘爺佯裝生氣傻小子於恒舌頭舔著嘴唇就過來了我告訴你這虎兒小子是我的朋友你要敢欺侮他老牛可不饒你哈哈哈甘老俠這樂呀兄弟你放心沖著你我也不能欺侮他海川越看越高興哥哥這是誰呀大傢夥兒也瞧嗯天真浪漫確實是好兄弟我跟你老嫂子沒教給孩子什麽能耐他只學會了一條八法神杵渾身的橫練兒骨硬如鋼這條杵叫八棱紫金降魔杵三十二斤你嫂子給他起的外號叫霹靂狂風因爲孩子脾氣過暴不過有一樣兒別看他這樣兒很聰明海川高興地說哎呀跟我這傻師弟天成一對地就一雙太好了老俠甘鳳池也想自己的孩子在家裏頭時常惹禍他跟這老牛倆人要對付到一塊兒了還真不錯不如讓他給海川磕頭拜海川爲師將來也能有點出息老跟著我在家裏又有什麽用呢甘老俠想到此便對海川說海川你奉師命興一家武術應該桃李滿天下我這孩子資質天賦都不夠我想著讓他給你磕個頭你替我們老兩口子再教他幾年將來在江湖也能謀碗飯吃可以嗎老哥哥這我怎麽敢當啊我真喜歡這孩子好了一言爲定虎兒我給你新介紹一個師父鎮八方紫面昆侖俠童林童海川上前磕頭爸爸他他瘦小枯乾的有多大能爲給我當師父胡說老俠甘雨把臉往下這麽一沈磕頭海川這兒坐著呐也不言語甘虎沒法子迫于嚴命甘虎心想我一磕頭說師父在上徒兒有禮他必要用手一攙他攙我的時候我叭一攥他的腕子往身後這麽一抖他統共才百兒八十斤呐我這一下兒給他扔到門外頭去他還當得了我師父嗎甘虎想到這兒往前一趕步到了童林的跟前師父在上弟子甘虎拜見恩師他趴地下磕頭其實海川早就瞧出來了往下一貓腰伸雙手一攔啊徒兒免禮甘虎一反腕嘭把海川的腕子給攥到手裏頭了人家海川也不理他微然一反腕兒也把甘虎的手腕兒攥住了甘虎這麽一用力喊了聲嘿你給我出去海川微然一坐勁重如泰山三下兒沒拽動甘虎心說這個人瘦小枯乾怎麽這麽大的勁兒呀他一緩勁兒海川一抖腕子噔一下兒還沒敢使勁把甘虎給抖了一個大屁股墩兒爺兒幾個在旁邊兒瞧著甘虎起來了爸爸呀他夠我的師父甘大俠鼻子裏哼了一聲你看你找沒臉吧海川兄弟你別往心裏去哥哥不這樣兒以後不好教他對對對甘虎趴地下磕頭了挨著排兒的一介紹該叫大叫大該叫小叫小最後海川把於恒給叫過來了師弟呀我給你介紹介紹別介紹了我認得他他是虎兒小子我是牛兒小子不行你是叔叔他是侄子你們倆人差著輩呐不差讓他長一輩兒甘爺這氣這叫什麽話甘虎給你傻叔叔行禮甘虎沒法子