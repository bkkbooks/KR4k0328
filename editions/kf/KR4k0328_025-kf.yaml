body:
  text: 第二十五回下請帖邀請衆豪俠甘家堡幸會甘鳳池上回書說到楊法本下書信邀請衆豪俠是由於當年太湖要鏢銀殺了韓大壽他們孟恩逃回鐵善寺見濟慈濟源哭訴一番又說了海川他們老哥兒倆許多壞話濟慈很是不滿他們派人到杭州去探問才知道童海川兩次杭州打擂掌震法禪于北高峰獻藝賀號鎮八方紫面昆侖俠要興一家武術現在又聽孟恩說他們要滅鐵善寺的山門正在這時紫面龍君羅烈他們跑回來了見著兩位當家的也哭訴一番我的山完了叫侯振遠童林一把火給燒了他們說要興一家武術要滅我鐵善寺的山門按理說兩個老和尚應當親自出寺仔細調查一番但是兩個和尚沒有這樣做而是偏信蜚言怒駡二俠發誓要將侯振遠童海川置於死地餘怒未消兩個和尚商量出一條絕戶計欲借九月九重陽會之際邀請天下英雄到鐵善寺赴會屆時鐵善寺的門人弟子全來同時也邀請侯振遠童林來赴九月九重陽會尋機致死侯振遠和童海川因爲這是爭奪門戶之仇哇兩個老和尚在廟裏準備就緒讓小徒弟法本去送信就是這個當說客的和尚他俗家姓楊有個外號叫狠毒蟲別看他是個小徒弟在鐵善寺裏他跟兩個和尚可說得上話還竟給兩位方丈出壞主意這樣狠毒蟲楊法本等師父把信寫好了之後就按著官道奔杭州想迎上侯振遠跟童林把這封請帖交給他們哥兒倆請二位赴會鐵善寺沒想到今天一清早來到金銀亂石島這裏人山人海交頭接耳議論紛紛法本可就過去了跟老百姓一打聽才知道三俠斬了九個寨主六個師兄全叫侯振遠童林給殺了這裏頭還有個西方俠于成把沅江三鼠三位師兄也給殺了整個兒金銀亂石島徹底覆沒真是新仇舊恨交織在一起氣得法本咬牙切齒楊法本在江邊候等一會兒的工夫山裏的船出來了三俠帶著所有的人一下船他們進了龍潭鎮的興隆店過了一會兒楊法本來到興隆店經店小二通報跟侯振遠童林見面說出自己是鐵善寺的海川一聽就明白了他把侯老俠的話給攔住了問道大師傅你怎麽稱呼嗷阿彌陀佛童俠客您要問我我出家的名字叫法本人稱狠毒蟲楊師傅你到這兒來找我們弟兄有事嗎阿彌陀佛童俠客此番面見閣下有點兒小事因爲敝山在九月九設擺重陽大會邀請天下英雄武術家蒞臨鐵善寺每十年一次今年就逢此盛會鍾山寨的師兄金頭獅子孟恩回到鐵善寺我家方丈一問才知道童俠客由侯老俠幫助打算奉師命下山興一家武術揚名天下立您的武術門戶我們還聽說童俠客不但把鍾山獅子寨給剿滅了同時也把清雲寨給火焚了您還揚言要滅鐵善寺的山門不知道鐵善寺什麽地方把您給得罪了更不明白聖手昆侖鎮東俠侯老俠八十多歲的武林前輩一定要幫著您大興門戶助紂爲虐爲這個給您帶來了一封信想請您於九月九去一趟和我家方丈見個面總而言之紅花白藕青荷葉三教原來是一家此僧中不二法門就問到底爲什麽沒想到我今天早晨到這兒才知道不但鍾山獅子寨清雲寨裏鐵善寺的門人弟子被殺的被殺被趕的被趕你們還把金銀亂石島我九個師兄全給殺了看來要滅我鐵善寺的山門是不假了我一定把這事情回復我家方丈你們要是去告訴我一聲兒好稟報我的師父以便掃榻恭候竭誠相迎說完了之後打開小包袱拿出一封信來往上一遞海川一伸手把信接過來一瞧信寫得很婉轉久慕侯俠客童俠客大名如瞻泰山北斗今敝山擬設擺重陽會於九月九日恭請天下英雄赴會因此擬請二位蒞臨鐵善寺皆因弟子孟恩羅烈等回山言道童俠客興一家武術要與我鐵善寺爲仇做對不知所因何故至時奉請閣下光臨我們見面暢談鐵善寺方丈紫面伽藍佛濟慈鐵面伽藍佛濟源合十這合十就是打問訊俗語就是請安問好的意思海川看完了一想我別給兩位老哥哥瞧也別給王爺瞧了就對楊法本說楊師傅二位方丈的意思邀我童林跟我兄長侯振遠九月九必到鐵善寺不就是這麽點兒事嗎說著把信瓤兒照樣兒給裝起來把這封信又交給法本了楊師傅原書不敢領受當面退回上訴你家方丈九月九日侯童必到好君子一言如白染皂童俠客快人快語貧僧欽佩那麽貧僧告辭說完以後把原書揣在大衫以內行完禮走了屋裏頭從王爺往下一個說話的也沒有老俠侯振遠完全明白童林的心因爲哥兒倆在一塊處的時間長了海川想我童林奉命捕盜拿賊請國寶狐兒山鐵善寺跟八卦山相隔不過幾十裏地他說我童林要滅他鐵善寺的山門我不便於跟他分辯有什麽話我得上鐵善寺去仰仗我童海川的生平所學和衆豪俠的相助必能戰勝鐵善寺這叫做敲山鎮虎讓你李昆李太極瞧瞧如果你不獻國寶不獻二小你也知道我姓童的不是好惹的如果我童海川到了鐵善寺叫人家給打趴下我寧死鐵善寺不死八卦山海川是鐵了心了老俠侯振遠心裏頭可有點兒難受思忖著我八十多了在綠林道端起這碗飯來已經吃了多年這刀尖上的飯不好吃啊我們弟兄已經成名了抱著胳膊根兒在巢父林一忍耳不聞金戈鐵馬之聲目不睹斬將覆車之事閉門思過這多好哇死也要死在我自己家裏的炕頭上但是海川來了二弟侯傑他們爺兒幾個到了北京人家童海川照顧得多周到哇現在海川賠著王爺一塊兒來了我侯振遠兩手一合說拿二寇我管不著那我侯振遠是什麽人了這樣我才答應在未曾答應以前我可想到了這是一場渾水呀我跟童林出我這家門兒容易將來還能不能帶著這口氣兒回我的家可就兩說著啦怎麽樣現在事情越鬧越大了不但得罪了雲南八卦山九宮八卦連環堡的八位莊主而且還得罪了八位莊主的不少朋友就這一件事就夠我侯振遠喝半壺的這還不說現在跟鐵善寺又搭上鈎兒了不去寒磣不寒磣我要說我敢去就憑我們哥兒倆要鬥鐵善寺呀說真的沒那能耐呀但是渾水已經趟上了還能想別的嗎那就到哪兒說哪兒吧侯振遠這麽一想對自己還有個原諒老頭兒于成想我招誰惹誰了我一百零一歲不是小孩了我管他鎮八方鎮七方呢他愛鎮哪兒鎮哪兒沒鎮到我們家門口去我賭運氣幹嗎我這麽一訪這倆人不要緊金銀亂石島的事情出來了現在鐵善寺的事情又接上了如果說侯振遠童林要去鐵善寺我去不去去人老不講筋骨爲能英雄出于年少像童林這樣三十多歲栽了跟頭將來還找得回來我一百零一歲要栽了跟頭什麽時候去找呀我有今幾個沒明兒個的人呐自己爭什麽強鬥什麽勝唉老頭兒不由得歎了一口氣侯振遠聽出來了就說哥哥您看金銀亂石島的事情完了沒想到鐵善寺這事情又出來了看來鐵善寺這件事要比金銀亂石島大上百倍千倍萬倍呀依我說哥哥您這麽大的年紀一世成名淨胳膊淨腿連個屁股墩兒都沒叫人家推倒過呐保全您的老名譽回家得啦我們哥倆陪著王爺從這兒奔鐵善寺吧老俠于成一擺手侯振遠你這是什麽話事情出來了爲什麽讓我走哇我一頓半斤面你管不起我了哈哈哈哈哎呀振遠咱們別來這一套啦我認了誰讓我打家裏出來了呢乾脆哥哥我跟在你們哥倆後頭站腳助威搖旗呐喊吧我也算個幫忙的好不好侯振遠過來搶步行大禮哥哥我謝謝您我給您磕一個您拿這老命保我們哥倆我們連個頭都不給您磕嗎老俠于成伸手攙起來了算了算了海川借這機會過來道哥哥我給您磕頭道謝海川磕了兩個頭于爺也給攙起來了王爺過來道謝于老俠呀謝謝您鐵善寺的事情完了還得請您到八卦山呢王爺剛才不是跟您提了麽捉不住韓寶吳志廣草民我決不回家小蓮花於秀一聽心說得不讓你出來你老人家非出來到現在出了這麽大漏子我又怎麽敢過去說讓老爺子回家呢那還不罵我呀他心裏幹著急西方俠也說得好兩位賢弟不用說有王爺的金身大駕就是你們哥倆的面子我也絕不含糊赴會哥哥一定去可是有一樣兒兄弟都誰去呀老俠侯振遠一聽道老哥哥赴會也就是咱們哥兒仨去呀別人怎麽能勞動呢老俠于成搖了搖頭這倒好明除去你我海川沒別人啦侯振遠一聽老俠于成話裏頭有話就問道哥哥小弟一時的愚暗不明老人家一定有成熟的主意侯某不才請您相告于爺一擺手說宴無好宴會無好會呀鐵善寺兩個和尚設擺重陽會他們請了那麽多的人這分明是要跟海川爭奪門戶哇海川要興一家武術如果一旦之間輸給人家了這家武術就算夭折啦這個門戶就立不起來啦如果就咱們弟兄三人就顯著人單勢孤我想是請點兒朋友多一個朋友就多一份力量啊你們說對不對主爺一聽老俠客爺您遠謀深慮呀太對太對啦不能就咱們這麽幾位去我們還是請點兒人吧常言說得好食酒千日不可一日不醉用兵一世不可一日不備還是防備點兒好老俠侯振遠搖了搖頭王爺于老哥哥我們三番兩次杭州擂的英雄各路的豪傑雖說都是知己的賓朋但這一次重陽會再要勞動這些個好朋友爲咱們赴湯蹈火唉我心裏頭不落忍呐于爺說兄弟你這話不對你我的朋友都是行俠仗義的講的就是自己原無事只爲他人忙何況是良友呢這個不算什麽來吧把文房四寶取過來咱們開個單子老俠侯振遠答應了然後把紙張鋪好蘸好了筆于老俠在旁邊兒問海川海川你說吧你的朋友是哪幾位哈哈從你這兒來老人家我的朋友不算您就是我這兩位哥哥別的我沒有朋友哇賢弟你這是開玩笑哇怎麽著也得有幾位好賓朋啊唉老哥哥我倒想起兩位來就是揚州鈔關街龍泉寺我的師兄長眉羅漢鐵臂禪師普照再有就是就近的玉頂九龍觀的觀主司馬老哥哥南俠客海內尋針昆侖道長司馬空哎振遠寫上寫上還有誰往下說吧老俠侯振遠一邊兒寫著一邊兒也想起兩位來像望潭莊的二老神手東方朔陶潤陶少仙狸貓草上飛陶榮陶少華還有兩位一位是鎮江瓜州的風流俠鐵扇仙張鼎張於美另一位是常州府北門裏清風巷賽判飛行俠苗澤苗潤雨海川又想起一位來說道還有于老哥的徒弟我那位老哥哥展翅金雕鐵掌李源嗯寫上寫上再有什麽鎮遠鏢局鎮海鏢局遠東鏢局永發鏢局漢口利勝鏢局等凡是請得到的吧由頭至尾把兩次杭州擂的朋友完全都寫下了然後大傢夥兒把它分一分分成南北兩條道兒又讓夥計出去到街上刻字鋪把戳子刻來裁好了紙往上一列印一填字約定九月九日以前在雲南狐兒山下黔南客棧王家老店見然後派人把白亮王三虎他們叫進來了把意思一說這倆人是義不容辭給他們準備好了路費讓他們分兩道走老俠侯振遠囑咐說道理先跟人家說清了有時間就來沒時間您千萬不要勉強說好了以後打發他們兩個人走了大傢夥兒說著話兒時間不大簾子板叭嗒一響李英孫亮從外頭進來了從王爺起挨著磕頭請安給爺兒幾個道了謝于老俠讓他們二位坐下後問道孫亮啊你們的事情怎麽樣啦整個兒金銀亂石島已經派官兵進駐了查封一切財産該怎麽辦就怎麽辦所有的死屍盡皆掩埋財産就算充公了陸寅陸豐兩個賊人承蒙您老人家把他們拿住以後現在沅陵縣大牢之內押著呢已經有了口供了衙門讓我們倆人先回來把破囚車以及官兵都帶回來然後從沅陵縣起身再派官兵準備囚車讓我們哥倆解往雲南就銷票無事亍多謝你們老爺兒幾個幫忙啦于爺大笑著說哈哈哈好吧你看你們一回來我們這兒有點事兒老