爬坡一直趕奔甘老俠的府上從東北越牆而過躡足潛蹤蠕蠕而行加著一百二十分的小心一層院子一層院子往前走來到了大廳的後面兒大廳裏頭燈光明亮正是吃飯的時候他們倆人來到後窗戶施展珍珠倒卷簾的功夫往裏看那位不說這裏頭有西方俠于成百歲有零的武林道老前輩能聽不見響動嗎敢情聽不見一大傢夥兒吃著飯說著話兒談笑風生出來進去聲音嘈雜二傻小子於恒那邊搗亂呢他們這一攪亂這聲音就更大了和尚聽他們說了一會兒話兒就撤下去了二次上民房出村口兒法廣說師兄啊甘鳳池吃裏爬外啦不錯呀咱們鐵善寺有他姓甘的不多沒他姓甘的不少可有一樣兒如果咱們要在他這兒把童林能夠宰嘍一來給甘鳳池一個難堪二來給甘鳳池魚頭擇擇咱們不也算報了仇了嗎法鐸一聽師兄呀咱們在這兒宰童林咱倆人有這麽大的能爲嗎糊塗呀師弟我們給他來個金風未動蟬先覺暗算無常死不知咱不是明爭一刀一槍的確實幹不過他暗中行刺還不成嗎對呀這麽著我行刺你給我尋風你看好不好可以呀兩個人商量好了返回來再進甘老俠的宅院那可就是輕車熟路了後來法廣這麽一琢磨還是我行刺你呀給我看著點兒吧這樣兒法鐸趴在西廂房的後坡扒著中脊往下看院兒裏頭十分清靜一點兒聲音都沒有法廣擡擡胳膊腿周身上下合適不繃不吊然後從房上唰地一下兒下來了法廣身法不錯真的是落地無聲但是人家北屋兒裏頭的人物都是什麽人呐聽得見呐他鹿伏鶴行慢慢地往前蹭蹲著走來到北房上了臺階兒先掏出刀來撥撥插管兒然後把門推開了老俠于成他們都看著呢法廣壓著刀蹲在這兒左腳在門坎兒裏頭右腳在門坎兒外頭他攏目一看屋裏這幾個人最後他看見海川了心說小兒童林呐我鐵善寺門人弟子與你一天二地恨三江四海仇今天晚上來冒這麽大的風險爲的就是你嘿該著的事兒法廣想到這兒他一攢勁腳尖兒點地往起剛一長身兒海川就明白了這個和尚奔我來的凶僧不奔我來是你的便宜奔我來只要你敢拿刀過來我這一掌就能砸死你海川也卯上勁兒了但是西方俠于成怕兄弟睡著了誰也不能跟誰說話呀等法廣這麽一長身兒老俠客爺要跟他客氣客氣哈哈哈哈和尚大晚傍晌的串門兒來了有這麽串門兒的嗎法廣一瞧人家知道了他往後一退身兒蹭一下兒奔當院了西方俠于成絕不讓他跑了老頭兒坐在椅子上腰眼這麽一疊氣兒哧燕兒飛的一樣就出去了于成于老俠到了法廣的身後法廣就勢這麽一調臉兒左手一晃面門右手的刀對準老俠于成的頂梁就劈下來了夜晚之間把式匠也一樣耳聽六路眼觀八方這叫聽風辨物風聲一到就知道什麽東西對自己的身上哪個部位不利老叟戲嬰童法廣就跟沒滿月的小孩兒一樣任憑老俠擺佈老人家微然甩銀髯往左邊一調臉伸右手一叼他的腕子左手一橫對準他的小肚子嘭地一聲法廣在老頭兒的手底下就起不來啦嗆啷啷一聲響刀扔了老人家磕膝蓋頂腰眼兒抹肩頭攏二背四馬倒攢蹄捆上法廣了法鐸在後房坡上瞧得清楚啊這個老頭子真厲害法鐸踹中脊一長腰攥著刀唰一下就下來了人不落地連人帶刀就奔老俠的身背後來了他想給老頭兒來個金風未動蟬先覺暗算無常死不知誰知老人家早有準備只見他拿左腳一踹法廣往前一咕嚕鷂子翻身兒伸手就抹法鐸的後腦勺兒左手拍他後脊背還沒敢使勁真要使一成勁兒他就得吐了血兩成勁兒這和尚當時就得死到這兒叭這麽一拍老俠客磕膝蓋頂腰眼兒抹肩頭攏二背四馬倒攢蹄也把法鐸給捆了這個時候海川和甘老俠上了房小弟兄們由東屋裏頭呼嚕呼嚕全出來了王爺也摸著黑穿好衣服出來了老俠于成站在當院向甘鳳池和海川一點手示意他們下來衆人來到屋裏頭把燈點亮王爺可問哎呀甘老俠外頭什麽人呐真對不起王爺有賊人到家中前來擾鬧使王爺受驚啦甘老俠不要客氣這沒什麽小弟兄把這兩個和尚的下腿給解開了身上還是五花大綁捆著阮和阮壁徐源邵甫兩個架一個都架到當院陸陸續續老幾位全都進了屋于老哥哥好快的身法叫您見笑說真的這賊人一來我還怪害怕的還好總算給拿住了您拿住的這兩個和尚我全認得請王爺審審吧王爺說好來呀把他們倆人押進來時間不大把兩個和尚架進來他們往這兒一站立而不跪小弟兄們全進來了老俠侯振遠一瞧這倆和尚都夠凶的便問道你們倆人是和尚皈依三寶秉教沙門手持利刃夜入民室對我弟兄不利該當何罪兩個和尚一瞪眼呸老兒侯振遠你當我不認識你告訴你我弟兄與你們仇深似海現在被獲遭擒了要殺要剮任憑於你們王爺說別著急和尚你認得侯振遠侯老俠好像你還跟我們大傢夥兒有仇但不知仇在哪里呀你說你認識我們我們怎麽不認識你呀對我家千歲問你們話兩位和尚對我們有仇有恨不要緊希望你們說出來好吧你要問我的名字叫法廣這是我師兄法鐸姓甘的也知道我們倆人都是雲南狐兒山鐵善寺廟裏頭的弟子找的就是你們侯振遠對王爺說爺您聽明白了沒有這是鐵善寺的人轉身又對法廣法鐸說道和尚不提鐵善寺今日夜晚行刺老夫侯振遠絕不能容既然提出鐵善寺來哈哈哈愛屋及烏看佛敬僧啊來侯振遠親自過來把綁繩給解開了二位請吧回到廟裏告訴你家兩位方丈九月九日侯振遠還有我兄弟童林是日必到鐵善寺絕不食言雍正劍俠圖第二部民國常傑森著
