body:
  text: 第三十六回八卦掌巧打太極圖望雲亭奮勇拿二小上回書正說到八卦山試五絕藝法禪僧的月牙方便鏟會戰賽判兒飛行俠苗澤苗潤雨苗老俠的天罡刀法十分出奇呀扇砍劈剁施展開來上中下走三盤跟法禪動開了手法禪的大鏟也不軟兩個人打了三十幾個回合法禪鏟走掃堂苗老俠飛身形起來捧刀隨著地皮兒一豁就勢兒刀往前一翻一甩腕子對準法禪的脖子就抹法禪往下一退頭老俠客抽刀獻掌把刀往回一拉法禪的命就有危險了但老俠苗澤只是手在法禪的胸口窩兒上抨打了一掌法禪來個大屁股墩兒苗爺往後一撤步高僧承讓承讓法禪起來拿著大鏟臊眉搭眼地跑到一邊兒去了苗爺剛要說話東邊兒有人搭茬兒苗老俠客不愧是一代的名俠說著話邁步往前走賽判兒飛行俠苗潤雨一看謔原來是本山的二莊主二爺胡庭胡元霸呀這可是個高人手上有鷹爪力啊胡元霸來到切近一躬到地不才胡庭跟您討教哎喲二莊主你是老一代的前輩英雄苗澤奉陪胡元霸一按刀把頂碰簧嚓楞楞一聲響把刀就亮出來了刀鞘子往背後一別夜戰八方藏刀式站好他要會鬥苗潤雨苗爺往後一撤步刀走白猿獻果二莊主苗澤無禮了說完往前一搶身上右步一躬身左手一搭腕子刀橫在自己的面前刀刃沖著胡元霸的哽嗓咽喉就抹胡二爺也是綠林久經大敵一看人家苗澤苗潤雨出手不俗馬上收右步弓左步右步往左邊一滑刀往底下一沈一扇苗潤雨的腕子苗潤雨往後撤步胡二爺上右步跟左步就勢兒刀一反把刀把沖上刀刃沖前刀尖沖下刷就是一個撩陰刀苗潤雨苗老俠一瞧好快呀往後一倒腰出去有五六尺跟著胡二爺一個長河斬蚊一捧刀刷地一下刀又到了奔苗潤雨胸前便點二爺胡元霸在人家名俠苗澤的打制的刀我這刀碰上你的刀按理得吃虧可是我的招法占上風轉眼之間十幾個回合二十幾個回合開出去棋逢對手將遇良才但是苗爺錯走一招人家胡元霸斜肩帶背一劈苗潤雨就應當往下一矮身縮頸藏頭躲讓胡元霸拔腰起來躲他這招沒想到苗爺上右跨步拿左手的腕子一搭右手腕跟著啪刀尖一挑人家胡元霸的刀這下苗爺輸招了胡元霸就勢在他拿刀尖一挑的時候啪一滾腕子跟著攔腰一斬一反這一刀苗爺就躲不開了呀只見人家胡元霸往回一撤刀苗爺縱身形出去了往後一撤身抱拳躬手胡二莊主不枉是成名的老前輩高明高明在下苗澤失招了哈哈哈我輸了大家看得出來這是一時的失手但是真要是仇殺那麽這一失手你的命就沒了正在這個時候展翅金雕鐵掌李源撩長衫撲嚕一抖鹿筋藤蛇棒就亮出來了哎呀苗兄你老人家累了暫時後退待我李源來說完往前一趕步啪把鹿筋藤蛇棒往自己胸前一橫裏頭是藤子的外頭拿鹿筋擰成兩頭一邊一個銅疙瘩這東西悠起來軟中帶硬胡二爺一看哎喲喝老朋友您貴姓啊家住清河油坊鎮展翅金雕鐵掌李源的便是原來是黃河以北成名的大俠想不到今日也蒞臨敝山榮幸榮幸老英雄請來進招李源也不客氣撥封八打招術右手的後把二撒手右手一立鹿筋藤蛇棒就直上直下舉火燒天大銅疙瘩對準胡二爺頂梁就砸胡二爺把自己右手刀藏在中腿旁邊左手掌伸出去來了個夜戰八方藏刀式他一閃身這棒可就空了胡二爺就勢右腳往當中插跟著右手再抽出來刀往前遞對準李源的右腿便砍李源腳尖一點地長腰起來橫棒一斜身人家胡二爺把刀一卷左手是掌右手是刀往這一站兩個白猿棒三十六式上中下走三盤舞動如飛恰似烏龍攪海怪蟒翻身啪啪啪接著風聲十分快兩旁邊的人看得都眼花繚亂啊兩個人轉眼之間就幾十個回合開出去了說真的李源李老俠的本領得在苗爺肩下不如人家苗潤雨幾十個回合開出去李源就進不去招了西方俠于成一看徒弟要失手心想得了別讓徒弟栽這跟頭了于成托著鬍子往前一蹭身兩步就到跟前了哈哈哈胡二莊主暫時先住手李源虛點一棒縱身形出去他十分感激恩師啊李源趕緊把自己的鹿筋藤蛇棒往身上一圍整理好了衣服一躬到地二莊主現有在下的老恩師山西太原府太谷縣于家莊西方俠長臂昆倉飄髯叟於老前輩跟您討教二爺胡元霸一瞧知道這是鼎鼎大名的人物便把刀裝入鞘內摘下交給底下人二莊主回過頭來老俠客您是武林的老前輩西方老俠哈哈哈胡老二你也甭捧我有這麽句話人老不講筋骨爲能英雄出於年少啊我畢竟是老了胡二爺心說你老了你這個老頭表面說好話腳底下使絆子聽說在鐵善寺月臺上你也跟濟源說你老了老了的結果一巴掌沒把濟源給拍死那麽大的鐵面伽藍佛給他一杠子一刀他都不在乎可您的一掌他就當場吐血我不能不留神啊胡二爺道老英雄太客氣啦晚生胡庭本是末學後進今天遇見前輩了晚生一定奉陪跟您學幾招得些教益哈哈哈胡老二你太客氣了怎麽把刀擱下了想跟我動動拳腳啊這也好你進招來吧老俠于成一捋頷下銀髯真叫份大二爺胡元霸往前一搶身老俠客晚生先進招了說完左手往前一挑一個引手腋底藏花式對准老俠的胸前便按其實呀老俠于成就是一招份大欺著你啊于老俠弓右步一斜身身子往胡元霸的胸前撞又拿右手往回搭這手功夫叫定心肘胳膊肘對準胡二爺胸前便撞二爺胡元霸的右手空了人家于爺欺身進來胡元霸一看要吃虧不由得往後一撤步右手回來雙手合在一塊一封老俠于成的胳膊肘于爺就勢進步摔掌正是胡元霸的臉上食指大拇指年落在胡二爺兩邊的太陽穴上手掌一貼他的臉往下一蹭刷地一下沒使多大勁胡二爺可就受不了了眼淚也下來了鼻子也破了于老俠往後一撤步哈哈哈胡老二慢著點走你不大好受吧胡二爺心說我是不好受您這一擼我臉都險一些被您給擼破了二爺胡元霸回去了老俠于成往那兒一站衆位剛才王十古老俠跟李莊主說得明白咱們雙方在大廳前是以武會友點到而已當然我們誰跟誰也沒有多大的仇恨彼此印證印證功夫輸贏無關緊要還有哪位過來呀哈哈哈我再奉陪奉陪由於年歲大了不能緊著動手沒有那麽大的精力哪位來啊六爺湯隆湯茂海墊步擰腰過來了湯隆的外號叫寶刀手此人紫臉膛大高個花白鬍子他來到跟前老人家弟子湯隆當場討教六莊主好好好老夫于成久仰你六莊主的本領聽說你刀法很是出奇不願意使刀嗎老俠客您老說得明白啊咱們以武會友刀不能用就跟您討教討教拳腳明知不敵班門弄斧老前輩不要見笑嗷六莊主太客氣了來來來進招來吧湯隆往前一搶身守如處女動如脫兔雙拳刷地左右一分對準老俠的左右肩頸便砸老人家于成童子拜佛在當中往上這麽一支雙手往回一抽抨地一下把湯隆湯茂海的兩隻胳膊全攥住了左腳紮根一擡右腳用自己的膝蓋照著湯茂海的檔裏頭就來了這手功夫就叫老和尚撞鐘湯隆心說要壞人家把我胳膊攥住了那只能等死了但老俠于成可沒撞右腿這麽一擡跟著落下去了輕輕地撒手湯隆來了個坐蹲湯隆臉一紅嗷老俠客我輸了回見回見老俠于成臉沖著湯隆正要說話沒想到七莊主韓忠這個人在後頭瞅冷子刷照著老俠于成後腰眼就給了一刀如果于老俠沒看見這刀砍上頂多把人家長衫給紮破了但紮不進于爺的身體裏去韓忠這一刀李昆看見了心說真丟臉于爺也看見了老俠于成左手一推鬍子一掉臉拿自己的左腳靴子底往上這麽一頂就這麽一搭一下就把韓忠的刀給踢飛了跟著換身左腳一紮地蹦著起來右腳就到了正是韓殿遠的心口上抨把韓忠踹出一丈多去王十古心說韓忠呀你真不知道羞恥韓忠一個鯉魚打挺起來臉臊得跟紅布一樣沖著老俠一個勁地作揖我排行在七我叫韓忠老俠我對不起您哎呀鼎鼎大名的七莊主您過來動手啊輸蠃無關我們這是以武會友不是仇戰暗算老夫你未免有點差啊韓老七對不起你這腳踹得勁兒大點李昆李太極很不高興心說你是堂堂的七莊主辦這種事情暗算傷人甭說你傷不了人家這麽大的俠客即便你真把人家傷了你也不好看啊老人家李昆看了看所有的兄弟用眼睛這麽一瞟那意思是誰也別過去了回頭于成能把咱們都給包了圓這還行啊李昆李太極往前趕步一抱拳于老俠客我多年以前就想拜望您苦於沒有時間這一次想不到閣下的金身大駕會來到八卦山這也是讓我弟兄多學一點能爲的機會遇高人不能交臂而失啊七弟韓忠實在無禮望前輩莫怪唉大莊主太客氣了你們那邊還有誰沒動手啊田家的老八沒動手任家的老三沒動手還有就剩下閣下了那麽太極公是不是惦記著咱們在一起隨喜隨喜過過汗呐老俠客您是高人李昆無論如何也要給您接接招說著李昆擺開了架式左腳在前左手在前右手按在中臍偏身一站左腳尖往起這麽一挑這叫太極十三式老俠客進招老俠于成晃身形上右步跟左步左手一引右手輕輕的對準李昆的面門就打李昆李太極往旁邊一閃身用手推出窗前月跟首掌走大鵬展翅右手對準老俠的胃脘穴上就按老俠撤右步伸左手往下一挽他還是那手倒攆猴往後一撤左腿右手掌對準太極公胸前便打李太極往旁邊一閃身展開自己的太極十三式兩位老俠十個回合開出去于老俠想讓大家看看同時也讓王十古瞧瞧請你是爲了說和要爲了打不用請你我于成的兩隻巴掌還不老呢于老俠大褂一兜風往下一矮身真是形似猿猴恰如狸貓啊腳底下一點響都沒有只能聽見嚓嚓嚓身法展動的聲音但是有一樣于成不贏李昆人家給王十古留著呢王十古明白了老俠于成的心心裏想著該是自己過去的時候了又一想我把老挾于成給換下來這可不太好啊正在猶豫這時候海川噌地一下就過去了海川心說事是我的無論如何我也得來一下子啊不能讓衆位哥哥過去了海川來到于老俠跟前說哥哥您起來童林敢說話呀老人家虛點一掌縱身形出來故意地喘著氣說啊啊哎呀讓太極公把我忙壞了海川呀好兄弟你疼護哥哥乾脆你跟太極公討教討教吧太極公改日再會了啊啊承讓承讓哈哈于老俠一樂李昆一攔前輩您先等會兒嗷太極公有什麽吩咐盛名之下絕無虛士晚生李昆年近七旬往外在江湖路也走了些年了聽見您的名可不是一天年輕時候就聽到了果然名不虛傳您的功夫確實是好我李昆不敵您容讓我的地方李昆銘記肺腑看來李太極是光明磊落的人李昆想人家看得出來我幹什麽不說出來于老俠讓著我了那我心裏承著說真的我要不言語可不好叫人說我李昆太賴老俠于成一擺手太極公客氣我老了我確實不成了海川啊來吧跟太極公你們二位交談交談老俠于成回來了海川過來道太極公你我應當一戰我就是童林啊哈哈知道童俠客閣下年輕有爲武林道後起之秀作爲在武林裏呆了幾十年的李昆認爲出了您這樣的人物是件幸事童俠客好吧我討教討教您的別開天地自立一門的武術功夫請海川往後一撤步前掌往前一伸凹腹吸胞往那兒一站目如懸磐好精神跟小老虎似的李昆也佩服我這手下的年輕的人多著呢但跟人家童林比差得多人家功底磁實海川往前一趕步左手晃面門右手掌麒麟吐書掌挂一團風嗚地一下對準李昆李太極的胸前便打剛才海川八步打了燈李昆不是沒看見海川好充沛的內力啊真的