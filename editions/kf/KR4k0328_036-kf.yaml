寶吳志廣我得給因爲咱們是上三門的弟子咱們是講理的人啊海川不來啊當然他不知道韓寶吳志廣是咱八卦山的人可是在清河油坊鎮店房行刺童林知道了既然知道韓寶吳志廣是我八卦山的弟子我住家有門開鋪子有板你應當上我這兒來啊只要你童林到這裏我就得獻國寶我就得把倆孩子綁出去我們哥兒八個最低的限度也得打一個家教不嚴之罪的官司啊我們也得請罪啊北俠秋田聽了點了點頭這便才是李昆又道童林不來童林不懂什麽可是侯振遠呢他幹了一輩子綠林道了他能不懂這個這分明是瞧不起我他要幫著童林捕盜拿賊我不埋怨結果帶著童林上了杭州鎮擂把四弟法禪給打吐了血您可以問問四弟他去的時候我一再說明不准去因爲這裏頭摻和著童林這些人他不聽我的結果讓海川給打了打四弟是不是殺雞給猴看啊如果不是那樣我李昆也得往那兒想啊你們把我們老四打了這是打個樣給我瞧的不獻國寶不獻二小將來童林的巴掌也落在我的腦瓜頂上啊哥哥咱們武林道就有點嘔氣啊不過我還退一步想你們杭州的事情完了是不是應當到八卦山來呀只要到這兒你一說仁義話咱們就一天雲霧散我李昆不再說別的我獻國寶打官司可是他們北高峰獻藝賀了號下雲南先到鐵善寺跟鐵善寺挂上鈎了這不是殺雞給猴看嗎其實鐵善寺離我八卦山才幾十裏地啊哥哥比方說鐵善寺的事情出來了他們先到我八卦山來首先我李昆出頭我跟濟慈濟源都有交情我給他們兩造說和然後我獻國寶打官司這不是很好嘛誰知他們四十裏地外在我門口外頭打濟源這叫敲山震虎啊但是我知道哥哥您在那兒呢我害怕哥哥您不來哥哥您這一來就給我臺階了您先住幾天看看他們打算怎麽辦如果有了下腳的地方啊哥哥您從中說句話您是我師兄啊我的事情您做得了主啊兄弟你看得起哥哥我秋田秋佩雨兩肋插刀我也不能讓咱們同室操戈手足鬩牆用自己人的刀子捅自己人的胸口哥哥我八十好幾了你們雙方都拿我當個兄長這個事咱們得完完一定能完了這您放心不過您在這住幾天看他們怎麽辦好吧這樣秋老俠才不給鐵善寺送信沒想到過了些日子劉俊下書信來了這書信寫得浮皮蹭癢的人家李昆當然是試試劉俊哪能殺劉俊呢結果劉俊走了吃完了飯李昆他們哥兒倆到寢室坐下喝著茶李昆問哥哥您說劉俊這小孩幹什麽來了哈哈哈他呀他是惦記著看我在這怎麽樣了是不是遭你軟禁起來了還是你把我暗算了嗷哥哥說得不錯是來探聽虛實的看來鐵善寺出了高人了好吧我不理他這茬其實人家李昆早就準備了巡邏船準備了打更的各處都埋伏人三小一到八卦連環堡外那船給他們引到山根這兒人家山裏就知道信了很快把三小引到大廳給拿住李昆李太極等放了三小後跟北俠說哥哥我本指望這次能把侯振遠童林他們給拿住一個我這氣也就消了咱們國寶也就獻了哈哈哈沒想到拿到仨孩子咱大人不能跟孩子慪氣啊兄弟你很開明我看這事要不就哥哥我出個頭咱們就完了吧李昆搭言得了既然他們沒鑽咱們這圈看來鐵善寺還很有能人哥哥咱們這麽辦吧明天您就回去把他們衆位約到這來也一樣把我李昆叫到鐵善寺也一樣哥哥我可不沖著侯振遠我沖的您兄弟你別說了我八十多歲了連這事都不明白嗎這個事我不願意出頭你知道拙嘴笨舌說不上話來了事人得能說我辦不到但是非我不可對對對明天您就回去沒想到派到鐵善寺打聽情況的人回來了十老請八卦奔了廣東龍門縣這件事情連老頭秋田都有點挂勁了心說侯振遠你們辦的這叫什麽事啊我上這幹什麽事啊我上這幹什麽來了你們不聽我只字片語瞅空子請王十古看來這件事情我了事不夠份量啊你們另清高明了衆位好漢子怕翻身光棍怕掉個辦事您得四水相合說真的不是秋佩雨跟侯振遠童林這樣的交情秋佩雨就翻車了你們托我上這來我來了可沒聽我一句話呀你們把我擱在哪啊把送殯的埋墳裏我算哪頭的當天晚上哥兒倆坐在寢室喝著茶李昆道哥哥您瞧我不應當說您但您的朋友辦的這叫什麽事您來了一句話都沒聽說他們又去請王十古哥哥這事可完不了了爲什麽哥哥都知道王十古比我能耐大都知道王十古是當代俠客中的魁首他們請王十古壓我李昆一頭我就是個泥人我得有點土性啊你打算怎麽辦呢哥哥我打算這麽這麽這麽辦真的王十古來了我可不是撅朋友我跟王十古也交情莫逆和你我之間都是一樣的弟兄我惦記著把他們撅一頓撅不了那是我李昆沒能耐那我就獻國寶打官司哎呀兄弟呀你辦的這個不妥當啊怎麽了你們八個人不是一個心到了時候要給你一撤梯子一撂台兄弟你可就抓瞎了撂台撤梯子啊哥哥不能吧兄弟你八個人是手足哥哥我疏不間親但我看得出來有跟您離心離德的一個法禪一個賀老五賀永一個韓老七韓忠跟您就別著勁呢韓寶吳志廣是你的侄子但是不屬於你這個支派的真正跟你貼心的是胡家老二任老三湯老六田老八您尤其要注意你們老七哥哥您放心儘管過去老七是個賊自從歸入了八卦山這個人循規蹈矩還算不錯替八卦山做了不少的事哈哈兄弟你聽我的王十古一來你就完事這樣你不寒磣不我可完不了咱們是師兄弟您打我也打得罵我也罵得王十古到底是客情啊誰都知道王十古比我強我要一完就顯得怕了王十古了你要不完我說這話你別不愛聽你非栽跟頭不成我再勸你一遍只恐他人之心不似你心啊你們雖然是弟兄你也得防範一點哥哥我自個的兄弟怎麽回事我還不知