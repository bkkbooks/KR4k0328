川的鉞也是八法神鉞八八六十四式兩人的招式一樣多看海川那架式很快能蠃能把這和尚紮躺下可人家海川不急著蠃而是見招還招見式打式隨式而走因勢利導就跟這和尚在門裏頭轉上了直到假達摩身上的弦全都走淨了和尚回復原位往那兒一站鏟不動了海川才一撤步雙鉞一按鼻孔之中一省力一點首讓爺兒幾個全進來把鉞交給徒弟包好然後一抱拳兩位哥哥您看這達摩聖像我們不能給毀了兄弟你看得起祖師爺我跟你哥哥侯振遠都十分承情感激啊哥哥看來就算成功了幸不辱命把達摩堂破了隨小弟趕奔後面捉拿韓寶吳志廣海川說著話心裏有些發顫想自己下江南出生入死到現在總算如願啦沒想到等爺兒幾個呼啦啦轉到鐵籠子跟前一瞧嘿喲海川身爲俠客按理說不能著急呀但是也氣得三屍神情暴跳五靈豪氣騰空哇哥哥您看即使九寨主以後將四寇交與我弟兄我姓童的有三寸氣在也不能跟他們善罷甘休老俠侯振遠也說兄弟即使你跟他完得了哥哥我跟他也完不了哇童林這人的脾氣稟性跟侯振遠侯老俠大不一樣童海川年輕脾氣有點暴躁沾火就著但是侯振遠就不然了十分有涵養能夠唾面自乾的人現在都給氣成了這樣原來鐵籠裏的四個賊人逃跑了童海川和侯振遠嫉惡如仇最不喜歡不講信義的人這個時候西方俠于爺也看見了這鐵籠子沒開鎖但是鐵板已經撬起來了影綽綽借著燈光往下看有座地道順臺階可以下去老俠于成心裏頭可也怒啊心說馬彪你拿我當說合人啊你把送殯的埋墳裏呀所有的人面面相覰都沒說話海川跟哥哥侯振遠四目對視氣哼哼地說哥哥自古皆有死人無信不立人生在天地之間怎麽能不講信用呢哥哥您跟兄弟我還沒交長如果有人跟我說一句瞎話只要讓我知道了我能一輩子不理他老哥哥您是說合人您別往心裏去這件事情就算把您撇開了侯老哥哥咱們走吧老俠侯振遠一跺腳哼金銀亂石島衆家寨主不講信用哈哈哈哈說到這兒眉毛就立起來了西方俠于爺過來一抱拳兄弟別著急不是還有哥哥我這個說合人嘛這樣吧我們大家先奔前廳到了前廳以後也許人家把四個賊交出來到那個時候我們弟兄就沒的說了老哥哥真是的沖著您如果金銀亂石島寨主就能交出四寇咱們還是一天雲霧散海川好朋友你成全哥哥到了時候他們要不交人蠻不講理兄弟你們哥兒倆別答茬兒我老頭子跟他們有賬算大傢夥兒一瞧老頭來氣了兄弟瞅我的吧海川答言老哥哥我們哥兒倆聽您的如果賊人袒護四寇不用老哥哥您我和我哥哥侯振遠也跟他們完不了李英孫亮很著急不敢說什麽話只好隨著大傢夥兒從達摩堂出來了兵刃都歸置齊了一直往前走走到後寨想叫後寨的門恐怕人家不給開越牆而過又有點兒不太好於是于老俠帶著大傢夥兒順著寨牆往西面轉再往南直轉到三道寨門前就聽見大廳前嗆啷啷鑼聲響亮各處的兵丁齊奔大寨而來大寨以內燈火通明亮如白晝等於老俠他們來到寨門前兵丁一攔站住于老俠跟底下人不犯態度衆位元多辛苦還認識我吧白天我來了小老兒家住在山西太原府太谷縣于家莊姓于名成表字洞海遊蕩江湖有個小小的外號西方俠長臂昆侖飄髯叟這是我的弟男子侄跟你們寨主打著賭呢我們是從達摩堂來讓我們進去吧兵丁一想咱們不敢攔阻再說也攔不住哇衆位俠客爺您往裏請吧三俠帶衆人往裏闖斬九寨主大破金銀亂石島
