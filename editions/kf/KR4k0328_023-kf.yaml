body:
  text: 第二十三回破機關智勇數三俠達摩堂地道走四寇上回書說到三俠打賭鬥智大破達摩堂鎮八方紫面昆侖俠童林會戰持刀的假人假人很厲害三刀劈過去這假人往回一撤右步拿左手的胳膊支著左手可不是掌攏成了鈎子鈎子往下一耷拉右手的刀背就擱在自己左臂的裏邊了假人往回一轉身唰地一下這是掃堂刀海川也明白如果我腳尖兒一點地可以蹦起來假人就回去了因爲老哥哥侯振遠剛才贏那個槍就是那麽贏的海川又一想我別那樣辦了海川大踏步往左這麽一滑拿這右手的刀順著它的刀來了就這麽一支它的腕子讓假人的掃堂刀起來拿刀尖兒一挑它順自己的頭頂過去捧刀就紮正紮在假人右臂的下肋窩上剛好又碰上裏頭一個銅帽嘭這盤弦一散假人咕咚就躺下了海川看了看假人不動了這才撤步抽身出來由東角門來到外頭老哥哥你們哥兒倆看我這刀法怎麽樣啊哈哈哈于爺一笑兄弟好哥哥我贊成把刀交給李士鈞以後大傢夥兒來到這二道門兒的正門這麽一看呐門裏頭迎面站著五個猴兒門上頭寫的是甲乙兩個字這甲乙木木能生火也是相生的意思這五個猴兒可跟真人的個頭兒差不離迎面是三個在這三個前頭一邊一個好像是圈了一個圈兒您可別看是假的跟真猴兒一樣玻璃眼珠兒叫燈光這麽一照唰唰地冒亮這猴爪子可跟假人的做法不一樣啊不是兩隻爪子都帶弦只有一隻爪子帶弦這東西可厲害爪子上都是純鋼打制的鋼鈎哇海川他們爺兒幾個來到了角門外他看看這老哥兒倆哈哈老哥哥您看這一共是五個猴兒于爺點頭不錯海川是五個猴哇二位兄長看來打這五個猴兒可得費點手勁于爺說兄弟你說得一點都不假這麽辦吧問問這些孩子們誰有膽子過去跟這五個猴兒會一會老俠侯振遠明白我和我的二弟蒼首白猿侯傑侯敬山練的是螳螂手跟猴兒拳這五個猴兒分明是猴兒拳但是五個猴兒在一塊兒別說它不是按武術做的就是五個真猴兒要圍住你也夠嗆呀老俠侯振遠一抹頭兒你們大傢夥兒聽見了沒有你于師伯提了你們誰敢過去跟這五個猴兒動動手驗證驗證自己平生所學剛說到這兒旁邊有人念佛阿彌陀佛師大爺侄男願往老俠侯振遠一看呐是壞事包張旺一臉的滋泥二指寬的皮條勒著個月牙兒金箍黃頭髮披散在肩頭以上穿著青僧袍上頭油漬滿服系著絨繩別著三棱峨眉刺青中衣薄底青僧鞋這個人的外號兒叫壞事包其壞無比老俠明白這孩子久經大敵呀他這麽精明的主兒爲什麽要討令去跟這五個猴兒試試就不怕吃虧嗎張旺你願意跟這五個猴兒試試嗎是侄男願意試試好吧你可多加小心呐請伯父您放心張旺是這麽想的我們爺們兒是練猴兒拳的就我們山東的螳螂手猴兒拳南七北六十三省不敢說打遍天下無敵手得有這麽一號我張旺跟著師父二爺侯傑也練了這麽多年了我跟真人動手還沒吃過多大的虧那麽跟這假猴兒我還不至於吃虧吧我要一個一個都給它們打趴下這不也是人前顯耀嗎張旺也是憋著露臉來的壞事包張旺把自己的僧袍整理整理來到正當中這二道門順著臺階一長腰就上去了飛身過來往這五個猴兒的當中這麽一站他用左手並食中二指來了個金龍吐須把後排當中這個猴兒的眼睛唰就摳下來了這張旺很厲害您還記得打杭州擂嗎他把人家眼珠子摳出來了等張旺這手金龍吐須點下來這假猴兒不躲而是猛然間往後這麽一仰就好像人們練功的這個鐵板橋左爪紮根它底下帶著弦呐離不開地但是它的右爪子沒弦這猴兒猛地往後這麽一仰上盤是躲張旺的這只手實際上它這右腿卷起來了照著壞事包張旺的肚子噌就一蹬因爲這猴兒爪子都是鋼鈎兒的風聲快呀要蹬到肚子上唰這一下就給開膛了張旺知道不好他往後倒腰要走卻來不及了左右倆猴兒唰地一下轉過來對準張旺的脖梗子腦瓜頂兒後腰合算是八隻前爪一下就蜂擁而上這下張旺的樂兒可大啦你要往後躲八隻猴兒爪子上來了叼到你哪兒都是鋼鈎十分厲害你要不躲當中面前的這猴兒一爪子能把自己給蹬死萬般無奈自己縮頸藏頭往後一仰嘁哩哢嚓這八個爪子可全叼在張旺的身上了嚓地一爪子下去就是幾道血槽兒血下來了張旺要了命了他還有頭髮呐哎喲把張旺的頭髮給生薅啦孔秀高聲喝喊混賬東西你不會趴下嗎你往外爬呀張旺一想對呀寧可叫這八隻猴兒爪子把自己撓了也不能讓對面兒這猴爪子把自己叼死他狠了命的往下一俯慢慢地爬出來了這五個猴又退回原位壞事包張旺慢慢往外爬老人家侯振遠面沈似水在這兒看著一會兒張旺爬出來了可不是樣兒啦僧袍都一條一條的了疼得他臉色蒼白嘴唇發青渾身哆嗦哎喲師大爺師叔衆位師兄師弟們我說這猴兒怎麽這麽厲害呀我真沒想到侯老俠哼了一聲可惡的東西平常日子練功總認爲自己成了要知道人外有人天外有天你自己背地裏練拳不能好好的下苦功夫到了時候你看你狼狽不狼狽師大爺我真夠狼狽的哎呀你過來吧您別看孔秀這人他嘴不好心腸兒特別軟來來來師哥我攙著你你到這旮裏來我給你上一點藥混賬東西你爲什麽要逞能呢你也很機靈嘛我也很機靈我挨了打了嘛你叫猴兒給撓了阿彌陀佛我哪知道這麽厲害呀我認爲我是學猴兒拳的怎麽著我也對付得了沒想到我真對付不了哎呀混賬東西撓得可夠嗆撓得夠嗆你看看我這頭髮都薅一半兒去啦叫人一瞧我五十多歲都脫頭髮了哎呀你可好嘛掉了不少的頭髮還不如剃光了成爲光頭和尚嘛孔秀把他的頭髮給捋順了把他的破僧