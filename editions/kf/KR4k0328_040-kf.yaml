body:
  text: 第四十回蜜蜂嶺傳藝贈寶劍桑家林大戰司徒朗上回書說到蜜蜂嶺傳藝海川依然相送老劍客莊道勤問他你怎麽還送海川依依不捨瞅著莊道爺的劍道師伯侄男總覺缺少護身保命的欲言又止老仙長明白了想了一會兒好吧咱爺倆見面就算有緣伸手撩道袍吸肚子撲嚕把寶劍拿出來了海川呐此劍乃是你師祖相贈今將此劍就相贈於你了尚道爺一瞧幹什麽師哥一輩子鐵公雞一毛不拔今兒個對待我們海川怎麽豁出去了把地契都拿出來啦又聽莊道爺道海川你知道這口寶劍的來歷嗎師伯告訴你這口寶劍是禹王年代所制取五金之鐵精六合之金英打造鍛煉而成它能陸斬虎豹水擒蛟龍斬金斷玉吹毛可過確實是一口價值連城的寶劍這口寶劍本在揚州禹王廟裏後來大明朝洪武起義濠梁被南俠王愛雲所得老俠客一生仗此劍屢建奇功後來就送給了他的師弟通臂猿猴吳禎吳禎幫助朱洪武開國打了多年的仗他是直隸靜海人後來燕王掃北建都燕京吳禎很有功勞被封爲靜海王在後吳禎死了這口寶劍就存放在他的家廟裏把寶劍存好了拿泥糊上大清國紫氣東來寶鼎畿內順治皇帝參觀明朝的功臣家廟這口寶劍的泥皮剝落露出了劍把順治皇帝就派人把這口寶劍拿到了宮中不清楚這口寶劍的來歷最後命文武群臣按照軍刃譜進行考察才查到這口寶劍叫秋風落葉掃此劍長三尺三寸三分在晚上使用這口寶劍能發出三尺三寸三分的光芒來不用跟你動手拿這口寶劍嗆啷啷一晃這個光華就能使你眼睛睜不開以後宮中有了邪穢江西信州龍虎山的天師奉召進京到了宮中鎮壓了邪祟這樣順治皇帝就把這口寶劍給了天師由於你師祖是天師近友所以天師就把這口寶劍贈予了你師祖你師祖原先有一口劍就是轆轤大寶劍現在你師哥手裏那是你師祖給你師父尚道明的你師父又給了你師叔爲師我就愛這口劍你師祖就把這口寶劍給了我我是個出家人舉足不傷螻蟻命愛惜飛蛾紗罩燈可以說一生當中我沒枉殺過一人今將此寶劍相贈於你望你好自爲之不枉咱們爺兒倆這次見面一場海川獲到此寶真想趕緊拿過去可海川雙手一擺師伯師祖贈給您是因爲您老人家德才兼備而且能夠保住它弟子年輕既無德又無才不能承受此寶師伯弟子不敢要莊道爺想也罷了知機子谷道爺搭茬了無量佛師哥當年小弟那口寶劍我就給了秋田這麽多年在他的身旁如同在我的身旁海川這孩子很不錯您把寶劍給他錯不了莊道爺經谷道爺這麽一說只好給海川了尚道爺何道爺也幫著徒弟道謝海川跪倒磕頭莊道爺念佛無量佛哈哈海川呐這回你回去吧是弟子遵命爺兒五個一調臉腳底下加緊唰唰唰轉眼蹤迹不見了海川這才往回走一直來到東配殿王爺一看海川回來又細問一番海川呐怎麽送他們四位老人家去了這麽長時間海川不能明言啊說了一些話幾位老人都走啦不錯都走了我們這兒正在商量事也正在等你回來水晶長老亞然和雲南府知府梁玉書是好朋友我想寫一封信讓亞然長老親自去一趟告訴他我這次微服到西南另有公幹讓他不要通知制台衙門也不要告訴總督把他邀到這來翡翠鴛鴦鐲交給他讓他派專人護送北京然後備好公文讓他再派兵丁囚車押送二小去京你看行嗎海川點了點頭王爺您想得挺周到還有西方老俠要回家我說別回家了咱們爺兒幾個帶著這幾個年輕人打這起身奔杭州再到鏢局子住些日子我也先不回家了你帶著弟子回北京神行賽羅宣普妙左臂神刀洪利展翅大鵬楊萬春在這說半天了打算讓本爵我跟你提小香小翠洪玉耳這三個孩子願拜在你的門下哎呀爺衆位哥哥們教的孩子都錯不了哇我哪有什麽好本事來教阿彌陀佛海川你別客氣我讓玉耳這孩子拜你我跟洪老英雄說了不止一次了洪老英雄對你的爲人十分欽佩你應當昌大門戶兄弟你就不必推辭了海川慨然應允幾個孩子當時趴地磕了頭一敘年齒大弟子穿雲白玉虎劉俊二弟子司馬良三弟子夏九齡四弟子楊小香五弟子楊小翠六弟子洪玉耳七弟子孔秀海川把孔秀擱在盡後頭他表面上不敢說什麽可心裏老大的不樂意幹嘛我年齡最大倒排在後頭了正在這個時候吳霸過來說師父我準備跟你告假回去了吳霸是海川的徒弟跟這些個師兄弟合不到一塊他不算童林這七個弟子以內的甘虎也不算海川說好吧吳霸沒什麽事你就回家吧以後可以到北京城找我去王爺告訴說你如果做買賣缺少本錢也可以上北京到我那裏拿錢去你多經營布匹我給你辦好貨你回陝西賣布吧吳霸道謝甘雨甘鳳池和過海烏龍展大旺等人也說海川呐我們也要告假了有什麽事的時候你再找我們虎兒就託付給你啦哥哥只管放心吧王爺和海川準備酒席一撥兒一撥兒地給餞行老俠王十古王爺執意挽留但是人家要回去看病了海川道謝王十古老俠又託付海川照顧劉俊然後就走了等大傢夥兒送走了王十古再回到家配殿鐵善寺請的人可陸續全走了猛然間門頭僧進來了王爺于老俠客侯老俠童俠客我們雲南府的大班頭來給王爺俠客爺請安來了王爺這麽一聽哎喲喝快快有請門頭僧出去時間不大孫亮李英進來了爺駕千歲我們給您磕頭了哎喲快起來咱們坐這說話兒孫亮說謝謝爺我已經告老啦現在雲南府八班總役我舉了李英李士鈞哎喲士鈞當上雲南府的班頭了那可好大家都坐下王爺細問金眼鷹孫亮和李英與衆人分手後的情況原來他們押著陸寅陸豐打沅陵縣起身形來到了雲南府後面見知府梁玉書知府大人審問了口供收監行文上憲批下來是把陸寅陸豐提出來驗明正身押赴刑場斬殺接著把人家金眼鷹孫亮班頭的全家二十七口從牢裏提出來釋放全家見了面李英到孫亮的家裏住了幾天又跟自己家人李能見了面把所有的事情說明孫亮交代了公事回家告老李士鈞任了雲南府的大班頭而且親自把義母跟白潔接到雲南府又把自己的媳婦孩子接到家中兩家三代住在一起享受天倫之樂等鐵善寺八卦山的事情完了孫亮李英這才來鐵善寺拜見王爺把這事情由頭至尾一說王爺點頭太好了白潔怎麽沒有來呀不瞞您說白潔他現在功夫不錯了他也謀了一份差事沒有時間不然也就給爺和衆位俠客請安道謝來了王爺高興地說好好好你們兩人來太好了這有兩封信水晶長老亞然一封本爵一封王爺這封可有自己的堂號要不人家憑什麽證明呀王爺讓他們兩人把這兩封信帶到府衙面見知府梁玉書知府接信後立刻傳話備了大轎自己把官防印帶著一切收拾好了由李英陪著到了鐵善寺來到山門外下了大轎往裏面通稟王爺吩咐一聲有請梁知府來到廟中東配殿大家一看梁知府五十多歲黃白色面孔三綹墨須髯頭上戴著小呢兒春秋帽犀牛毛的紅纓四道梁青金石頂身上穿著藍色絲面的皮袍外著青馬褂前後的四方雲雁補子腳底下五分底的清官靴梁知府過來給王爺磕頭王爺趕緊吩咐一句貴府免禮平身請坐知府很懂規矩爺有爺在此哪有卑職的座位不坐下好講話王爺又對海川說把公事拿出來讓知府大人看看海川讓劉俊把包袱打開梁知府伸手拿過公文一看這是慎刑司的龍批上面有禦寶拿的是韓寶吳志廣王爺派人把韓寶吳志廣押到知府的眼前問了問口供梁知府趕緊吩咐李英到轎內取出大印用了大印童林這就算完事了知府請示王爺那麽這囚車如何辦理呢嗷囚車由鐵善寺給打知府點頭道到時候雲南府派四十名官兵護送也就是了王爺十分讚賞好就這樣定了不過貴府還要辦一件大事現在翡翠鴛鴦鐲在本爵身上你把國寶取走專人護送入都梁知府心說您手下有這麽多能人不派而把國寶交給我我護送是有危險的呀可又推辭不得只好說是卑職願遵王爺諭雍親王一伸手把國寶托在掌上高高地正身一舉梁知府趕緊往後一撤步甩瓦行袖面行內鴉雀無聲王爺代傳聖諭貴府免禮平身梁玉書站起身形然後把國寶接過去大家落座後王爺說貴府你打開看一看國寶吧梁玉書也知道得有這麽一層手續小心翼翼地把國寶拿過來打開之後自己看完了一點問題沒有王爺對梁玉書說就由你來辦理啦梁玉書把國寶揣起來告辭走了海川往外送來到山門外執手作別梁玉書說哎童俠客囚車打好了您給我送個信我馬上把官兵派來護送囚車好奔京師海川連連作揖看著知府上了轎李英保護著走了過了幾天兩輛囚車全打好了牲口也買齊了這才請雲南府派兵丁準備明日成行上路第二天知府把公事給備好並且把路費銀兩備齊派了四十名官兵有一位把總老爺帶著都到鐵善寺來了官兵把韓寶吳志廣提到囚車上海川一看沒事了就和王爺等人告辭了帶著七位徒弟持刀帶劍離開了鐵善寺四十名官兵七十裏地一大站三十裏地一小站走累了就要休息到了晚上住店睡覺的時候爺兒幾個要帶著韓寶吳志廣一起睡當然海川要加著一百二十分的小心人心隔肚皮你待他再好他撲嚕一跑怎麽辦呢既要嚴加防範還要細心照顧饑餐渴飲曉行夜宿非只一日來到河南北部前邊有個大鎮甸名叫桑家林大桑家林正南十五裏地有一大片桑樹林方圓約有幾十裏路這是咽喉的要路囚車越走離著桑樹林越近了海川坐在轎車裏邊劉俊跨著車轅兒前面是兩輛囚車四十名官兵分兩行左右往前走左背花刀小火神洪玉耳開路蠻子孔秀壓陣左邊司馬良夏九齡右邊楊小香楊小翠海川瞧著前邊的桑林有些怵目驚心便對劉俊說你看這前邊大片桑樹林煙籠霧繞上不著村下不靠店這個地方可能有賊人告訴你師弟們留點神劉俊在車上喊師弟們注點意啊前面這大片樹林可是凶多吉少呀衆人果然見大桑樹林枝葉茂盛堪可參天剛走到一半再往裏還有一裏半路前頭出現了一片叢雜的樹就在這個時候猛然間從樹叢裏頭傳來嘴唇吹哨的聲音吱嘍嘍嘍嗚一下子燕飛似地躥出一個人來左背花刀小火神洪玉耳一瞧是出來劫囚車的忙與四十名官兵將兵刃亮將出來呼呼往兩輛囚車上一圍把式一攏繮繩兩輛囚車不走了司馬良回手拿鏈子錘夏九齡回手拿鏈子槊楊小香楊小翠各自把刀亮將出來飛身形上了囚車洪玉耳一伸手把吳志廣韓寶的髮髻攥住拿刀就擱在脖子上了心說要劫也不能讓你劫活的海川在車裏看見這人啦五短的身材細腰窄背猴型臉窄腦門癟腮幫兩道細眉斜飛入天蒼大三角眼鷹鼻子一嘴碎芝麻粒牙臉的正當中長一塊四方大白癬露著光板脊梁一身的癟肉皮嚓楞楞一晃五行輪囚車停下正是九尾宗彜世界妙手司徒朗司徒朗在戰船上不敢與自己的師父動手下江跑了在水裏頭跑出去足有三四裏路這才上岸哎呀老頭兒十分狼狽跟水雞子一樣他提拎著五行輪的包袱嘩嘩往下流水冷啊三角眼瞪圓了擡頭一看玲瓏島山上大火已起司徒朗一跺腳他咬了咬牙發恨地道呵侯振遠童林老太爺能跟你們完得了嗎我二三十年經營的玲瓏島一把火你給我燒了叫我八十多歲的老人有家難奔呐他正站在那發愣咬牙猛然間身背後有人說話師大爺啊哎呀司徒朗回過頭來一瞧心裏頭怪難過的陸地金蛟賀豹也是一身水十分狼狽這八尺的漢子泣不成聲淚灑胸前大爺您要給我爸爸報仇啊