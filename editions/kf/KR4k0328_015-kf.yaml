body:
  text: 第十五回司馬良招親三義莊洪炳南闔家慶團圓上文書說到王爺來到三義莊在酒樓用飯聽王二說出二老思兄之意告訴他左臂神刀洪炳南之子左臂花刀小火神洪玉耳就在這裏王二撒腿就跑來到家裏稟報兩家員外爺兩員外立時來到望友樓進樓鄭天雄眼含淚問道玉耳賢侄在哪里呀小英雄搶步上前您大概是二叔父吧小侄玉耳參見鄭天雄淚灑胸前抱住玉耳想死叔父你天倫何在很快就來叔父莫急這位是三叔父吧侄男叩頭孩子我是你三叔高林起來起來哪陣香風把侄吹到總算蒼天見憐償我們弟兄的宿願但願得你父母早日到來咱們也好團聚呀玉耳落淚如雨下說二位叔父侄兒的娘親已不在人世了老哥倆也難受呀就把當年去接如何驚聞噩耗之事都說了又問賢侄這幾位是誰呀叔父都是父親的好友此處不便介紹願借二位叔父的高軒暫住不知意下如何孩子什麽是叔父的家就是你自己的家請老幼賓朋到寒舍一談說著就邀衆位家去一直來到客廳坐畢玉耳拉鄭高二位到王爺的身邊說叔父我給您二位介紹一下這位是當今萬歲康熙老佛爺的四皇子雍親王爺鄭高二老慌忙叩頭死罪死罪在王爺駕前請死慢待王爺大不敬請王爺寬宥才是王爺扶起二位道本爵私行至江南不要聲張出去你們二位交友血心熱膽義氣千秋正是本爵要結交的益友良朋何罪之有快起來再給您二位介紹兩位這位是山東聖手昆侖鎮東俠侯廷侯振遠大名鼎鼎的前輩侯老俠客我二人武林末學該以晚輩之禮拜見說著就要行大禮老俠攔住道聽洪老英雄提到二位的爲人急於相見老弟老兄何分彼此呢過譽過譽不敢當王爺又把海川叫過來二位這位是武林中的新人物直隸童海川啊莫非是杭州擂掌打法禪僧靈隱寺獻絕藝北高峰賀號鎮八方紫面昆侖俠童俠客嗎王爺點頭正是哎呀我弟兄幾世修行的怎麽一時之間王爺雙俠蒞臨敝宅做夢也想不到哇玉耳又把四小介紹給二老大家落座喝茶才把所有每個人的事情詳細說清這時候酒宴已齊才謙讓歸座鄭奎給王爺滿斟一杯山肴野味不成敬意爺請多包涵吧由於鄭奎至誠相讓王爺也不客氣鄭老英雄本爵也是自家人最好別客氣大家開懷暢飲海川跟王爺商量玉耳已然到家將來炳南公一到樂享天倫咱們可是王命在身限期不多還是告辭走口巴王爺點頭答應鄭老英雄我們的事情也很急不如趁此機會告辭吧鄭奎高林苦苦相留真是盛情難卻商妥明天一早就走吃完晚飯王爺有些累啦再說明天還要趕路呐便道二位莊主本爵今天走累了給我們找地方休息吧王爺放心早收拾好了命令家人掌起燈光鄭高二位陪著來到西跨院兒院裏盛栽松竹十分幽靜來到北房借燈光一看靠牆的書格子置放二十三史各種書籍俱全王爺他們坐下王爺很疼愛這幾個孩子問高老英雄您給他們也安排住處叫他們早早休息吧高林站起來賢侄們隨我來高遠甫帶著他們五個來到東跨院北房然後說道你們就在這屋裏休息我可不能奉陪你們啦如果你們解手還出剛才進來的角門往北奔內宅有個夾道走到東邊有月亮門兒一直往東南角兒就見到廁所啦玉耳好生陪著哥哥們休息玉耳答應著他們五個性情相投又兼聚少離多真是難以分開商量著怎樣才永遠不分離此時已交二鼓司馬良站起來道咱們可該睡覺啦我先去方便方便回來再睡九齡站起來道我也去玉耳小香小翠也都站起來我們也去五個小英雄出角門順夾道往北進了月亮門兒北邊是東西下一段花牆再往北是個大花園兒眼前這個院落好像是堆料的地方有好幾垛新磚還有一垛垛圓木方木五個人仔細看著道兒等來到東南角看見廁所發現東面是南北的大牆廁所北面是個沖東的大車門不過已經上鎖這個院是司馬良他們住的跨院後邊的第三層院到了廁所門口猛然問聽上面嗖地一下從東門上邊出現了一個夜行人不但司馬良發現了九齡他們四個也發現啦就勢五個人全蹲下身來屏住氣息仔細觀看這個人煞白的一張臉年紀在二十八九歲一身雲串通口夜行衣絹帕纏頭背插單刀絨繩勒住十字絆兜襠滾褲腳底下抓地虎靴子他飄身下來鹿伏鶴行可就往北啦司馬良准知道不是好人不過他大一點明白事故多一些兒像鄭天雄高元甫也是武林人物在此居住多年都是成名的人物貓狗小賊他不敢來這是哪路賊呀看他走向北邊那面是個花園已經是鄭家的內宅賊人去可以我行嗎身爲少俠客去人家內宅瓜田不納履李下不整冠朋友門前如王府哇想到這兒自己不敢追啦後來又一想焉有見賊不管之理豈能退縮不前司馬良從後邊就跟上啦這賊人越牆而過綠林裏邊有規矩逢門不亂入看來他是個內行司馬良也飛身跨上牆頭單胳膊一挂往裏看啊真是個大花園既有四時不謝之花又栽八節長春之草君子竹大夫松牡丹等等桃紅李白芬芳綠柳青蘿搖曳紅紫芳菲爭奇鬥豔這賊人分花拂柳一直往北司馬良那顧許多飄身而下也跟上了繞過幾座假山穿過涼亭花團錦簇之中有一座兩層小樓兒畫閣雕梁斗拱重簷十分講究當中欄杆兩邊扶手明樓梯樓上五間燈火輝煌有姑娘說笑聲音樓下的五間沒燈亮周圍是綠樹成蔭樓前是個草坪碧草如茵草坪的邊上有五個大魚缸木架架著當司馬良看情況的時候這個賊早就蹬著扶手上樓啦司馬良伸手輕輕地拿出鏈子錘躡足潛蹤來到樓下看窗戶上被燈光一照人影搖搖都是年輕婦女的樣子再看這賊人用左手指甲把窗紙割了一個月牙口兒賊人手扶窗臺兒貓腰往裏觀看這樓裏住一位千金小姐就是鄭天雄老英雄的獨生女兒名叫玉蘭今年十八歲老人愛如掌上明珠在姑娘小時候請了一位七十多歲的老秀才可說是飽學鴻儒教姑娘讀書念了十年真是才儲八鬥學富五車長得更是沈魚落雁閉月羞花高元甫無兒無女這姑娘受到四位老人的愛護姑娘每晚上都要帶著幾個侍女做些女工針黹在燈下刺繡司馬良看得真切腳尖兒點地一鶴沖天輕身飛起剛往拉杆上一落雙手一悠鏈子錘嘩楞挂著風聲照著賊人的後腦就要砸當司馬良往下砸的時候他又猶豫啦打死他沒活口哇最好把他擒住這一來錘下去就慢啦賊人往旁一閃雙錘砸在窗臺上叭嚓可把屋裏的姑娘們給嚇壞啦司馬良隨著又從欄杆上下來照賊人跨骨上嘭一下正踹上賊人就勢一溜滾鯉魚打挺站起身形噌地一下往樓下蹦司馬良飛身下來高聲喊好賊人哪里走一抖雙錘伏腰就追上去了前邊是假山石賊人剛要繞猛然從假山根下花叢之中嗖地一下躥出一人正是夏九齡冷不防枯樹盤根鏈子槊就到啦正纏在賊人腿腕上嘩楞一抖把賊人摔出一溜滾去賊人起來撒腿往東邊花林中逃竄沒想到噌噌出來兩個人正是小香小翠各自拉刀蓋頂就劈賊人已成驚弓之鳥不敢戀戰剛一躲小翠的刀小香的刀正紮在賊人的大腿上褲子也破啦血也下來啦一跛一點撒腿往西跑哪想到花叢中飛身形出來一個人正是左臂花刀小火神洪玉耳他一壓左手刀飛身過來仙人解帶攔腰就砍賊人都懵啦玉耳刀到他再也躲不開了玉耳裏合一腿踢在他的肩頭嘭應聲而倒司馬良他們正趕到用膝蓋一頂賊人腰眼抹肩頭攏二臂四馬攢蹄給捆上啦五小到了一起九齡才說良哥您追下賊來我們也跳過了牆賊人有規矩哪里進哪里出我們四個人藏好這叫預備窩弓擒猛虎安排香餌釣大鼇司馬良心裏高興還是把兄弟呀同仇敵愾和衷共濟五個人正商量快去到前廳報信就在這個時候有人痰嗽一聲什麽人在此大膽喧嘩前邊走的鄭天雄後邊跟的高元甫兩員外因爲盟兄洪炳南很快就到再說洪玉耳賢侄已經來了正在內宅商議好像聽見東院花園有動靜老哥倆才來到花園看見這幾個人在這兒忙問你們怎麽跑內宅來啦夏九齡答道二位前輩真不巧今天到您的貴府正趕上鬧賊被我哥哥司馬良捆上啦您看看吧高老員外一聽臉色一紅早不來賊晚不來賊單單在今天來賊叫我弟兄不好看這五個孩子都沒言語往西出月亮門順夾道穿過中廳到西跨院一看王爺在臺階上站著二俠都在院中原來鄭天雄走後老爺三並沒休息安歇王爺脫了鞋盤腿坐在炕上雙俠坐在桌子兩旁說了一會兒話突然好像聽見有聲音老哥倆站起來王爺也忙著下炕提鞋海川把雙鉞取出一提氣飛身上北房登屋脊往四下觀望耿耿銀河明月在天聽見東院有動手的聲音海川下來王爺問海川有什麽動靜東院有人動手王爺心急咱們的孩子都在東院呐海川點頭要不叫海川去看看侯老俠聽了搖頭道爺駕想一想鄭高二位也是武林人物人家不找咱們咱不能去五個孩子在一起也無妨礙王爺知道侯老俠想得周到真的來賊厲害自然會派人來請不等請就去好像看不起人叫鄭高二老多想不大會兒五個孩子來到夏九齡忙上前稟報回爺的話他們家後邊有女眷來了采花這個賊字還沒說出來侯老俠狠狠地瞪了他一眼胡說滿口亂道你還算懂規矩麽嚇得九齡把賊字咽了回去王爺一聽這老頭兒對孩子們太嚴厲問老俠客孩子說錯了嗎侯老俠道王爺鄭高二老名門大戶又是武林高手家有女眷怎能傳揚此事若被外人知道與本宅婦女名節有關呐王爺一聽心中很佩服侯老俠的見解咱們這部書說的是康熙年間封建時代的事女子沒有地位受舊禮教的束縛他們說女子無才便是德又說生死是小失節是大像鄭天雄這樣的人家要傳說出去就不得了啦姑娘的名節也受影響將來找婆家都不好辦還要防範姑娘自己心窄尋了短見鄭高兩位老弟兄來到前廳一看管家帶著十來個人把賊人捆得結結實實這才來到西院海川一見二老到啦問兩位員外後院有賊人擾鬧家宅甚感不安我們好不放心呐鄭天雄高元甫都抱拳一笑驚動爺駕甚是慚愧請王爺俠客爺安心已經沒有事啦又稟明王爺道賊人已經拿獲請王爺不必挂念說著又問九齡夏少俠你們誰拿住的賊人九齡現在一看鄭高二老有感激之情便道方才到您的花園兒很失禮啦像您這貴府高門什麽樣的賊人吞了豹子膽敢來擾鬧剛才我們在花園說拿住了賊人二位員外是不會相信的不過小子也沒有那麽大的本領拿賊也不敢居功您問我哥哥得啦說完搭拉著小臉蛋一聲不語老俠侯振遠心裏不樂這孩子的話暗帶譏諷鄭高二老要心地狹窄可就不合適啦侯老俠暗暗看了鄭高二位一下罷了不愧是老英雄九齡的言語人家臉上毫無反應司馬良將前情敍說了一遍鄭天雄聽完後哈哈大笑道我弟兄甚爲感激少俠客由於園內居住小女老夫誤認爲少俠客無故前往方才在花園出言不遜是老夫之過也幾位少俠多擔待拿住賊人保全名聲老夫當有重謝侯振遠暗暗點頭鄭天雄是個人物王爺聽完問鄭老英雄聽良兒千說賊人十分可惡現在哪里回王爺由家人看守好吧把他押來高元甫親自把賊人押來家人都在外面侍立王爺一看這賊人很兇惡青色絹帕纏頭刀已經給摘下了一身夜行衣剛要問話鎮東俠侯振遠一擺手道高老員外您叫人把他帶走爺駕不用細問啦家人進來推搡著賊人踉踉蹌蹌地出去啦大家都不明白王爺忙問侯老俠怎麽不問問老俠微然一笑爺駕高鄭二位員外這個賊人老夫認識侯振遠這麽大的俠客怎麽能認識這種臭賊呢其中