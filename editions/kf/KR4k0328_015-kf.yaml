怨上上下下都很合得來高老安人根本不拿她當下人看待後來玉蘭大啦最喜歡她的刺繡總來西院跟她學媽媽長媽媽短的叫她慢慢地洪氏安人才知道原來是在金蘭之好的弟弟家中幹活有心提出來我丈夫到現在下落不明真的日久天長高家夫婦有待慢之處到那時自己前不能進後不能退倒沒有安身之處啦如果不提他們拿我當成僕人反倒心安理得我幹活吃飯可洪氏慢慢地知道這老弟兄修建房屋爲的就是我夫妻心裏萬分感激有時候高元甫夫婦提到兄嫂思念之情流於言表洪氏安人也是憂心如焚想痛哭一場經過十幾個春秋洪氏安人五十歲的年紀鬢髮皆白啦這次玉耳來到儘管高元甫總在東院可消息傳來說大爺的公子來啦她有心去看看又不敢今天小姐訂親高安人知道洪氏安人與玉蘭姑娘好才叫她到東院來剛到東院又聽說大爺來啦所以到前廳取訂禮時她壯著膽子故意和高員外說話以便觀察丈夫是否在此現在一見丈夫洪利這十八年的生離死別使洪氏安人一陣哽咽落淚如雨覺得天旋地轉身形亂晃玉耳一下躥過來嘭地一把扶住母子天性啊玉耳嘩啦一下熱淚直流媽媽洪氏悠悠氣轉一來思念丈夫想兒子二來在盟弟府上當了十幾年的女僕又有些羞愧難忍洪氏安人手捧玉耳的臉你你你是我洪家後代十五年被水把母於沖散的嬌兒嗎正是不孝的孩兒玉耳兒呀只道母子今生今世不能相逢要想見面除非是鼓打三更夢中相會難道是做夢不成媽兒子確在母親懷中不是做夢你父親呐洪利不顧一切撲了過來那個年頭太封建不能擁抱不管心裏如何外表總要矜持洪利扶住洪氏唉千錯萬錯都是洪利一人之錯總算老天有眼你我一家難後重逢鄭奎高林一見如此忙到洪氏的面前跪下道小弟等不知是嫂嫂十幾年來以奴婢下人對待上天不容在嫂嫂面前請死說著以頭碰地洪利忙伸手拉起道不知者不怪罪若沒有二位賢弟你嫂嫂早就死於溝壑怎能有今日團聚鄭奎起來跟洪炳南商量這裏有王爺大駕不如請兄嫂侄男先到內宅吧炳南公點頭答應來到內宅請兄嫂坐好四老夫妻磕頭玉蘭玉耳也互相見過各敘前情哭一陣分散十八年實非容易喜一陣夫妻父子劫後重逢樂享天倫酒宴備好爺幾個來至前廳洗盞更酌賓主盡歡飯吃完了大家落座王爺很高興炳南公父子相逢夫妻團聚真是本朝盛事人間罕見祖上的陰功父母的德高真是喜報三元可喜可賀炳南也抱拳此乃借康熙老佛爺的洪福齊天草民同沾雨霧之恩這時海川提出要告辭可老弟兄一再挽留五小弟兄也確實難舍難離王爺又都愛他們想了半天說道這樣吧既然五個孩子不願離開就叫他們在一起多住兩天我和海川今天就走侯老俠帶他們先別走過幾天讓他們爺幾個再追我們你們看怎樣鄭高洪三老答應這才準備好一切鄭奎拿出黃金五十兩王爺也不客氣叫海川放在包袱裏大家送到村口灑淚分別童海川跟王爺由於心急頭一天就貪晚啦第二天又走得很急暑熱天氣生長在北方的人們乍到南省是不習慣的何況王爺養尊處優呢第三天一起來王爺就覺得渾身困倦四肢無力便說海川呐這兩天咱爺倆走得太急啦天氣悶熱白天受暑夜晚受寒我可能要病咱們找個好些的大店住下請個郎中先生看看吧王爺點頭但事情不盡人意爺倆一直走到天黑也沒找到一處像樣的店只好在一座荒村小店住下這裏連單間都沒有要用什麽沒什麽可有一樣這個店便宜兩個人兩吊錢打尖兩吊錢起火王爺無法隨著海川進了店一進店屋的門兩邊是大炕一邊都能睡二十來人大炕鋪著蓮花竹席炕上放的都是半頭磚就是枕頭這些磚被人們汗水漚得很光亮住這兒的都是做苦工的販夫走卒推車挑擔的勞苦人天氣這麽熱除了汗氣味兒就是臭腳丫兒泥味兒實在難聞王爺一進來就要吐海川告訴夥計我們這個夥伴受夜寒啦你給買二兩紅糖一塊鮮薑來給了夥計一吊錢海川請王爺靠著牆這是最好的地方又賃了兩床大被鋪好了請王爺躺下小包袱放好海川找來個鐵臉盆放些熱水用自己的湯布手巾給王爺擦把臉海川是想請個郎中先生無奈離大鎮起碼有五十裏就算開了藥方也無法抓藥乾脆就用薑糖水海川說您趁熱兒把它喝下去病就好啦您是感冒一發汗就好王爺一看這個碗稠糊糊的發黑就煩了王爺心說不喝吧辜負海川的心喝吧實在喝不下去萬般無奈王爺一連喝了十幾口也搭著天熱汗嘩地一下就流出來海川太難喝了我實在咽不下去呀說完躺下半夜王爺的汗可出透了頓感輕鬆了許多海川坐了一夜天都亮了叫夥計打來漱口水洗臉水王爺海川擦了臉海川問王爺您身體怎樣王爺明白自己並沒好又怕海川爲難便說得啦走吧這點小病不算什麽海川放心啦這才上路海川的意思要有通衢大鎮請王爺再緩一下爺倆說說笑笑的也不顯寂寞走了一天也沒遇見大點兒的村鎮爺倆走的是東北西南的大路太陽也快落山了地上餘熱未盡往西北方向看大塊兒的黑雲遮暗了大地這時候唰拉拉一道電閃嘎啦啦一個沈雷狂風一卷大雨點兒叭噠叭噠地下起來王爺不由地機伶伶打了冷顫海川這可要壞我還沒好利索要一挨淋病一反復我可要病倒你扶著我快點走吧海川左手拿包袱給王爺遮擋一下右手扶王爺順著大道走下來沒走多遠大路的北邊看見一座小廟這廟只有一層殿正殿的東西山牆上有兩個窗戶似的氣眼正殿裏只有個獨坐的神仙缺胳膊少腿沒眼睛破爛不堪東西兩邊都釘著木板隔扇一邊一個門挂著青布的門簾兒供桌上放著茶壺茶碗周圍是鷹不落的紅廟牆當中有山門洞沒有門啦門外有根旗竿上邊挂著帶字的旗子上寫義勇團練所王爺一看天氣風大雨點兒小便跟海川商量你看天一會兒可要黑如果今晚借住團練所那可就太慘了再說也太不方便不如往前趕一站找個客店住一夜倒好海川也覺得這地方王爺要住下是不行便又繼續趕路天公不做美現在風停了雨又刷刷刷下起來二人小跑著出來有四五裏路海川擔心王爺的身體您覺得怎麽樣王爺气喘吁吁雨雖然不大淋到身上覺著很涼啊爺還能走嗎剛才倒顯得不太累這一氣小跑兒感到腿直發軟我想找個村鎮住店休息一下海川搖頭道這個地方上不靠村下不靠店兒怎麽辦呢王爺觀看半天海川你看前邊有片大樹林子也能避一避雨呀海川一看這是很大的一片樹林子各種桑榆槐松應有盡有煙籠霧繞尤其是越黑天越怕人海川直搖頭您的病還沒好呢怎麽能進樹林兒休息怎麽著也比雨地淋著好哇樹林裏有不沾雨的地方歇會兒不錯走吧爺倆進了大樹林兒這兒是墳地北邊有個月牙形的土墳山子上邊也長了不少的樹這座祖墳真大足有一房多高墳前頭有個石供桌擺著一個石香爐兩邊還有幾個墳頭明堂很寬闊地上綠草如茵往南出樹林是一條西南東北方向的大道墳塋地上也都淋濕啦無法坐下王爺一想墳後邊可能好一些到墳後一看由於西北風被這大墳山子這麽一擋又有好多的大樹果然好得多王爺剛要坐下海川一拉您先等一等把身上的包袱先解下來又把鉞包兒打開雙鉞取出把包袱皮鋪好又把衣包放上請王爺坐在衣包上海川蹲在旁邊拿起子母雞爪鴛鴦鉞一看原來這些日子始終也沒用它又兼暑熱這純鋼打制的兵刃有點反鏽雙鉞乃恩師所賜見雙鉞如對良友好像恩師站在身旁豈能讓它長鏽發暗海川把腰裏的湯布嚓的一下撕下一條來先把雙鉞在濕土上往返一磨然後用湯布條蘸濕沙土用力擦抹不大工夫喝這對子母雞爪鴛鴦鉞擦得鋥明瓦亮寒光耀眼這工夫也不小啦風吹烏雲散雨過天晴一輪皎月高挂天空透過疏落的林間照得眼前一亮海川見雙鉞上連個土星都沒有啦站起身來懷抱雙鉞王爺一看海川真是一條頂天立地的好漢心裏很高興海川練趟鉞本爵看看海川一想王爺叫練那就練一趟叫王爺看看好長精神他雙手分鉞大鵬展翅往下矮身龍驤虎視剛要變式就聽見墳前腳步響噔噔噔跑進兩個人來
