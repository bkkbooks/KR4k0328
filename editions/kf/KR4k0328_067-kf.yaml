body:
  text: 第六十七回小白猿夜進七星山遭兇險得遇愛賢女上回書正說到王環夜走耿家莊巧遇望月牡丹董玉父仇不共戴天王環把董玉追出村外怕賊人鑽入高梁地一使詐語果真司馬良躥了出來原來海川責備幾句司馬良丟了王環要說師父責備徒弟這個沒的說但是司馬良自己要強的心特別大師父一說自己臉上下不來一個人可就走出公館穿大街越城牆過了護城河司馬良不是本地人他知道七星山在東南就奔東南方向來了他不認道全是青紗帳往哪看都是莊稼出來幾十裏地忽然間聽見前邊喊惡賊人你哪里逃走他正從高梁地的邊上穿過就勢蹲在這地上借著月光往前看哎喲喝師弟在後頭壓著刀正追望月牡丹董玉司馬良認得他呀嘿小子你是我師弟的仇人我還能讓你跑了嗎伸手把鏈子錘取出來套好了皮挽手往這兒一蹲小子你來了我就照你腿上一錘把你腿砸折了見董玉要鑽司馬良心說合適你來吧沒想到王環這時候喊上了你往高梁地裏鑽我哥哥在那等你呢嗨司馬良就生氣了你瞧見我你別喊呐你要一喊他還往這裏鑽嗎果然這麽一喊嚇得董玉一愣神王環就追到了董玉沒法子還要往裏鑽司馬良高興了小子你來吧反正你跑不了沒想到王環又喊上了哥哥您出來您別在那蹲著了司馬良一生氣噌一下就站起來了嘩啷一抖鏈子錘師弟我在這蹲著你喊什麽董玉一瞧哎喲一聲撒腿往西就拐下去了急急如喪家之犬忙忙似漏網之魚司馬良道你瞧你你看見我你就別喊了你這一喊不要緊結果賊人跑掉了王環一邊跑一邊說我哪瞧見您了這麽黑的天氣我瞧不見我使的是詐語說著兩人一齊追下去董玉心想我鑽穀子地吧別淨在道埂上跑了道埂上他們得眼又有月亮兒看得見我我跑不了我一鑽莊稼地他們就不敢追了果然他往北一拐就奔了穀子地司馬良一瞧要壞王環說二哥您瞧見沒有他鑽進穀子地可麻煩呀司馬良高聲喝喊董玉你鑽穀子地吧我師父在那蹲著呢董玉一聽他師父是誰我不知道比他能耐大是真的呀嚇得董玉喊就這麽一愣小哥兒倆一攢勁可就追下來了董玉一想我還管那個呢我鑽唄司馬良見他鑽進去喊道師父您別那兒蹲著了您出來董玉可就到了師父您快出來吧就看有人一長身良兒爲師在此你喊什麽司馬良這樂師父王環也瞧見了叔叔別讓惡賊人董玉跑了董玉擡頭一看由穀子地鑽出一個人來空著手什麽都沒拿正是海川原來爺兒幾個在差官房商量正在這麽個工夫張方進來海川忙問賢侄什麽事張方道我這麽一眨眼兒的工夫您瞧見沒有二哥司馬良又走了他准追王環去了若是一前一後奔了七星山可有危險海川急道好吧我瞧瞧去囑咐張方劉俊好好地看守公館然後自己帶好了子母雞爪鴛鴦鉞腰裏圍著落葉秋風掃打公館出來了不願意叫城門一直往東南城角越城牆護城河腳底下用力直奔七星山而去海川雖然來過一趟七星山但他不認道因爲都是莊稼地結果他也奔南來了剛從穀子地出來借月光一看正見司馬良王環追趕望月牡丹董玉過來海川心說成了我就在這蹲著吧來了我一伸手就把你給拿住就聽司馬良喊呐你鑽穀子地我師父在那兒蹲著呢海川這麽一聽嗨我這二徒弟長能耐了黑天這麽遠就能瞧見果然等董玉到了他一長身爲師在此望月牡丹董玉一瞧前頭一個後頭倆這可怎麽辦得了我給你一下子吧董玉蹦起來就給海川一刀海川金絲纏腕一叼他的腕子右手叼著了橫著一腿啪地一下把董玉就踹在地上腳尖一踩腰眼兒環兒過來捆王環說道叔叔別捆他了說著一捧刀我紮死你照董玉後腰就紮海川一攔他別讓他領國法受王章給你爹爹報仇已經把他逮住仇就算報了捆上他王環把刀入鞘就把董玉抹肩頭攏二臂四馬倒攢蹄捆了個結結實實又把刀拿過來給他插入鞘中正在這時候南邊又來了一大群海川心想喝這賊怎麽這麽多呀原來耿武帶著王三爺等家人點著燈籠拿著叉把掃帚呼啦啦來了三十多位到了這裏海川高喊幹什麽的耿武過來道朋友是這麽回事家中鬧賊我們追賊追到這兒朋友請問你尊姓大名爲何到了這裏嗷賊人已經拿著了望月牡丹董玉是七星山的賊人你要問我太原府欽差大人公館的隨行衛員辦差官鎮八方紫面昆侖俠我叫童海川嗷童俠客爺衛員大人在下給您行禮您要問我離此不遠我是個武舉叫耿武我哥哥名字叫耿文是個文舉我們在耿家莊住了多年父母沒有了只有一個妹妹就把今天的事情都提了彼此見了禮耿武說俠客爺您打算怎麽辦吧把這賊是不是解往太原呢對可是現在都這麽晚的天氣不如明日天亮再說寒舍離此不遠您不如到我家中稍事休息明天我準備車輛把賊人送往太原讓他領國法受王章您看怎樣海川連連道謝耿武那可打擾你哎童衛員大人您到我家去不是給我家增光露臉嗎來人呐把這個賊人搭起來王三爺立刻拿杠子一串派人把董玉搭起來海川王環司馬良爺仨跟著耿武說說笑笑趕奔耿家莊一直來到客廳把董玉叭嘰往地下一拽耿文哆哩哆嗦地由打後宅出來兄弟怎麽來這麽多人呐耿武給介紹完了耿文連連給童俠客爺行禮俠客爺您來了給我們壯了膽不瞞您說把學生我給嚇壞了海川一笑這個賊人十分兇惡明天再送往太原不過您派人好好地看守別讓他跑掉耿武一喊王三哥別讓這賊跑了總管王三爺過來哎員外爺您放心絕對跑不了於是王三爺讓家人四馬倒攢蹄重新捆好把刀摘下來他來到自己的屋中把修理鞋的一套工具大布兜子拿了出來又讓底下人找了很多的劈柴棍削成了一頭兒尖就圍著董玉四周往地上釘連衣裳穿肉釘在一起這一圈一釘就把董玉釘得齜牙咧嘴爹媽怪叫一身的鮮血釘好了之後拿縫鞋的長繩子在木頭上圍著董玉周圍繞繞完之後拿大針串好麻繩往這繞的繩子上縫董玉他不管你肉不肉的胳膊腿有肉的也串過去這一回疼得董玉奶奶爺爺亂叫您饒命吧您別縫我了把他給縫在地上了王三爺把東西收拾好進了客廳道俠客爺您瞧瞧去我把他給縫在地上了他要打算跑也成他就得背著地跑那誰背得起來能背起跑嗎等大夥兒出來一瞧海川哈哈大笑說你們總管這辦法還真不錯王環痛快了總算給爹爹報了仇說話間夜宵準備好了這才把公館的事情全提了吃著半截飯王環就琢磨了明天一清早耿家備車輛把董玉放在車上解回太原我童叔父還讓我親身涉險奔七星山嗎司馬良師哥他當然不讓去我就更不讓去了針尖對了麥芒明明知道我王環到了七星山就得死他決不讓我去莫若趁這個機會我離開耿家莊王環思索至此處吃著半截飯他出來了誰也沒有留神他來到門口就問哎你們這廁所在哪呀啊您打這順著箭道往後第二道院往東有個跨院您到那兒就可以解手了其實呀王環沒有解手順著箭道往後越牆出去順箭道胡同往北出了村口他可就往東奔七星山了腳底用力沙沙沙出去四五裏地走來走去他一看曠野荒郊大樹林兒裏頭有一座破廟廟牆坍塌倒壞破爛不堪山門樓兒還有可兩邊的牆已經都坍塌了磚頭瓦塊扔了一片沒人管了荒草叢生他攏目看了看山門這塊藍額金字也都壞了不過還能看得出來敕建太極觀他邁步進來一直往北破殿裏走來到北殿隔扇門沒有了神像有一個掉了半個腦袋胳膊腿也全沒了露出木頭棍子來破供桌圍子上頭淨是土得了我就這裏吧王環把這破桌圍子拿下來抖落抖落土抖落淨了王環把自己的軍刃一順往桌上一躺蹺著二郎腿他就睡了迷迷糊糊地一睜眼天就大亮了王環坐起來緩勁出了破廟轉了轉又進了破廟耗來耗去耗到午時王環出來找了個村莊有賣吃食的自己買了點吃的喝了點兒水哎食水調合沒事了可就到了下午他又回到破廟一直耗到夕陽銜山晚風四起倦鳥歸林王環一想成了吧英雄就從太極觀破廟裏出來一直往正東撲奔七星山實際他走到七星山的西北山角兩界山了兩界山上有座大廟叫西風寺西風寺的長老就是西風長老秋禪這位就是四大名劍的二爺閉目金睛佛姜達姜老劍客爺的弟子王環就走在這西北角山坡前這時候天色晚了他沒法進山就在這裏來回的轉悠轉了老長時間瞧見草木深處出來一頭膘滿肉肥的青牛在牛的後胯上偏身坐著一位牧童看上去也就在十六七歲面賽粉團兒瓜子一張臉梳著雙小辮兒前發齊眉後發披肩蓋頸彎眉大眼鼻如玉柱唇似塗朱野調無腔信口吹唱著山歌就出來了牧牛童自在身走橫橋臥樹蔭短蓑斜篙相斯襯夕陽鞭影垂柳處春雨笛聲紅杏林卉上最好騎牛穩日夕沈歸家晚飯稻粥香撲鼻噴噴唱著歌吹著橫笛悠然自得王環可就過來了躬身道這位大哥沒等話說完就瞧這小孩從牛背上一出溜唰地下來上一眼下一眼打量王環咱們可得表一下這個小孩是小姑娘可不是小小子這個姑娘的父親做過一任知府這是知府的孩子從幼小父母都沒有了身背血海深仇現在已經學了一身的絕藝她從牛身上飄身下來問你有什麽事呀王環一想別叫大哥了他一躬到地說這位大兄弟您對這個山裏的道路熟嗎當然熟啦七星山狻猊寨呀誰都知道周圍都是大山呢我打算進趟七星山可惜我不認道這個小孩上一眼下一眼地打量王環那你爲什麽不走山口那有兵丁把著不管黑夜白日你可以進山王環心說小孩聰明便道因爲我有個舅舅在這個山上頭當份差事是個小頭目過去每年往家裏捎一次錢最近這三年了沒捎錢也沒有音信舅母放心不下打發我來打聽打聽如果我要到前山一打聽萬一我舅父在山裏頭出了什麽事那多麻煩我打算暗中探一探小孩恍然大悟點點頭嗷這麽說你打算暗中探山你會點武藝嗎我會點武藝你要會點武藝可不行啊你得會得比較好一些哎這位大兄弟不瞞你說我上個山還湊合這小孩一笑也不見得這山可不大好上你一定要進山我告訴你這條道吧你瞧見沒有東南上這片大樹林兒過去之後你瞧著好象是絕壁山崖其實不是有一條山道可以進去就是窄一點難走一些只要你有武功走著不難你過了這個山梁以後再往前這個地方叫臥虎灣就跟一隻老虎一個樣你可以順著臥虎灣的山脊盤上去盤來盤去沒有山道了你看上頭下來一條葛藤你甭害怕那個葛藤很結實你兩手倒著葛藤爬上去再到上邊往前走有一個山窟窿這個地方叫一線通你穿過一線通就是他七星山的後山王環一聽心想這個小孩怎麽這麽熟啊要看這小孩弱不禁風他怎麽能知道的這麽詳細啊問道這條道您走過嗎啊不累的時候一天走個十趟八趟的累的時候一天走個三趟五趟的我已經告訴你了你就按這條道走吧用手一拍牛屁股沖王環一笑回見就這麽一斜身跟燕飛的一樣唰地一下就輕飄飄地落在三丈遠的牛背上了王環看著小孩的後影慨然長歎唉真是人比人得死貨比貨得扔這個小孩也就在十幾歲就從他一長腰往牛背上一蹦甭說我連我師父都辦不到我王環是老恩師的親傳十二年的弟子我總認爲我王環的本領還是不錯的今天看見人家這小孩的身法我王環跟人家比起來實有天壤之別得了此番前來爲的是討金牌我就按人家這小孩指引的道路走刀山油鍋槍林劍樹我姓王的也得闖一闖王環想到這裏可就順著指