可是你韓頭目的奇功一件呀姑娘不瞞您說老寨主有話要拿住咱們七星山的仇人王環賞紋銀一萬兩提升爲三寨主看來呀姑娘我要升官發財了韓頭目理應如此讓我瞧瞧一轉身伸手從春桃手裏把紅紗燈拿起來一看四馬倒攢蹄臉沖著地辮子耷拉著身上還背著刀呢一聲不言語十分狼狽段銀娘到這裏用手點指王環呀你小小的年紀我段家與你何仇何恨彩鳳山祥雲島劈了楊山我管不著千不該萬不該用鏢打死我的兄長段世寶說著蛾眉倒立杏眼圓睜咬牙往前一伸手砰把王環的辮子揪住了猛地一使勁一擰王環的脖子恨不得這一下子把王環的腦袋給擰下來嗨姑娘一看王環的臉心裏嘣一跳哎喲這小孩劍眉虎目鼻直口方烏黑瓦亮的一條大辮子長得比姑娘都俊這左手不由地松了下來心想用這麽大的力氣把人家的辮子揪住那夠多疼啊我總認爲王環項長三頭肩生六臂其貌不揚面目猙獰可憎原來是一個二十來歲的俊美少年看起來在彩鳳山祥雲島萬般無奈才殺了我哥哥姑娘想到這兒輕輕地把手鬆開韓頭目王環是殺哥哥的仇人嗎我要把他帶到房中仔細盤問問個究竟到底因爲什麽殺我哥哥段世寶來呀把王環接過來搭到我的屋裏去韓志一聽心想我二百兩銀子都沒了您給弄走哎呀姑娘這可不成什麽不成呀姑娘您別著急我們還沒見著寨主爺呢如果見到寨主爺寨主爺說要把這小白猿王環搭到您屋去我們一定給您搭去姑娘粉面通紅秀目含嗔嘿他是一個二十來歲的男子漢搭到姑娘我的屋裏你這話是什麽意思看起來你是找死吧韓志知道姑娘武藝高心說別宰了我呀二百兩銀子我找誰去韓志要哭只好把王環輕輕地放下丫鬟接過肩兒把王環搭起來紅紗燈照著路分花拂柳直奔姑娘的閨房姑娘邁著碎步來到自己的房內一進門挑簾櫳進來把王環放在外間房的地上馬上把杆子撤去拿過布撣子來丫鬟輕輕地把王環身上的白灰面抽打乾淨丫鬟們這才過來把王環的下腿順下去往椅子上一坐又給綁住了把刀摘下來往八仙桌上一放王環一瞧眼前這位千嬌百媚的大姑娘不知道什麽意思丫鬟們在兩旁站著姑娘可就在下垂手椅子上坐下臉色一紅這位大哥你是不是姓王呀王環點頭不錯我姓王單字名環師父起的外號叫小白猿彩鳳山祥雲島你劈了我家巡山寨主楊山鏢打了我的兄長段世寶是你不是姑娘你要問絕對不錯楊山段世寶皆是某家一人致死你們要殺便殺要剮便剮若要皺一皺眉頭俺王環不是英雄好漢
