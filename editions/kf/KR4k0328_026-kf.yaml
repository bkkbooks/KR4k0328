body:
  text: 第二十六回甘家堡真假童林會小俠客得遇王十古上回書正說到白馬河甘家堡投宿巧遇畫地無形隱逸俠甘雨甘鳳池夜晚法廣法鐸行刺他們提出是鐵善寺的老俠侯振遠解綁繩釋放他們並且告訴他們侯某帶兄弟童林是日必到鐵善寺其實雍親王爺于老俠客甘大俠都知道鎮東俠的意思可海川就有些不明白他想既然這兩個和尚是鐵善寺的那就一個羊也是趕倆羊也是放乾脆刨個坑兒在村外邊人不知鬼不覺的埋了算完再說一看這兩個和尚賊眉鼠目就不是好東西分明綠林的敗類老俠侯振遠可不是這個心你不提鐵善寺我們非宰你們不成提出鐵善寺來你們不說童海川興一家武術滅鐵善寺的山門連山門都給滅嘍你們鐵善寺的弟男子侄能在侯振遠童林的手下逃出去嗎我們放了你讓你的方丈也明白明白絕對沒有這回事如果你們兩家方丈通過這件事與我們弟兄言歸於好武林道我們弟兄多交幾個朋友如果你們執迷不悟姓侯的姓童的是人物你們這些個晚生下輩也不鬥你們我們鬥的是你們家的長輩濟慈濟源你給捎個信兒得了法廣跟法鐸臉兒一紅說一命之賜永不能忘我弟兄告辭兩個人一轉身形走了到村外法廣對法鐸說師兄呀這個姓於的功夫太好了可不是嘛要不就在金銀亂石島把咱們九師兄弟全給殺啦我覺著我能跑了哇沒想到我出來站在當院他也到了這老頭子身法太快了我呐捆你的時候我從房上下來想給人家一刀可是迷迷糊糊的就讓人給逮著了看來他們的能耐不錯回到廟裏頭咱們得啓稟兩位老人家多加小心於是兩個和尚揚長而去老幾位都來到北房打發小弟兄睡覺去了海川有點兒不明白哥哥像法鐸法廣這樣的人怎麽能放了這于甘老哥哥也不利呀侯老俠搖頭他們是鐵善寺的門人弟子我們是武林的高手要鬥也鬥他們家裏的大人像這些個晚生下輩咱們把他贏了管什麽宰了他管什麽呀王爺也勸海川你連老哥哥的心都不懂一鳴二聲你興一家武術有人說是滅他們鐵善寺的山門可是你把他們人逮住給放了這樣謠言就不攻自破了海川點頭道您說得對爺兒幾個把燈吹了稍微的一迷離天可就亮了底下人進來伺候著他們老幾位擦臉漱口便坐喝茶這個時候東屋的小弟兄們也全都起來了梳洗已畢來到上房在兩旁邊兒垂手侍立叱海金牛於恒坐在那兒聽他們幾位說著話兒說的都是江湖綠林道的軼事天越來越亮了趕緊派人準備酒飯因爲今天爺兒幾個要奔鐵善寺還是兩大桌叱海金牛於恒他們這些人一桌王爺他們爺兒幾個一桌酒過三巡菜過五味談笑風生正在這個時候老俠甘鳳池可提出來了海川呐看來鐵善寺我不能去啦昨天晚上法鐸法廣都上我家行刺來啦我要還上人家鐵善寺去也太不知趣了九月九以前愚兄一定到黑熊鎮黔南客棧哪怕給你們哥兒幾個背後搖旗呐喊呢多一個人就多一分力量海川說老哥哥像您這樣的大俠我請都請不到我給您道謝啦不過我可沒有請帖請帖完全都拿走了侯老俠接著說你來了比什麽都強啊爺兒幾個喝著酒從外頭進來一個下人慌裏慌張臉色都不對了看了看大傢夥兒來到甘鳳池的背後一低頭在甘老俠的耳朵這兒嘀咕說完這人就走了甘大俠勸酒喝酒喝酒王爺就知道這裏有事沒想到剛要問外頭又進來一個這個可就更慌張顧不得矜持了到了甘鳳池的跟前就說腿折了您瞧瞧去吧甘老俠把臉一沈擡走就是啦底下人走了王爺不喝了停住問甘老俠誰腿折了擡哪兒去請您幹什麽去既然我們爺兒幾個到一塊兒不屬外了您有什麽事不可以開誠佈公啊海川也問哥哥好像是家裏出了事兒了唉也沒什麽大事你們爺兒幾個打東口來路北裏不有個廟嗎是啊我們看見了那個廟是火神廟您別看廟小哇咱們這村兒沒店有住店的就住到那廟裏了僧衆們管人家飯但是也收人家飯錢和店錢總而言之他這是與人方便自己方便頭幾天呐來了個打把式賣藝的是個小孩兒我可沒見也沒提名提姓第二天一清早兒起來他在火神廟頭裏就擺了個場兒跟人家廟裏借了兩個凳子往那兒一擺咱們這村裏頭大部分人都會點武藝差不多年輕力壯的都跟我練過有人可就告訴我了你們哥兒幾個爺兒幾個都是咱們武林本道的人我甘鳳池在白馬河甘家堡大小也算個把式匠你要打把式賣藝到了我這村兒你先打聽打聽有我甘鳳池這麽一號您到我家來一趟倒不是說非得給我買點兒禮物道個姓說個門戶您怎麽擱場都行如果出了事兒了我甘鳳池還能給你頂著如果買賣不好不掙錢您要缺少路費短個三十兩五十兩我甘鳳池給可是這個打把式賣藝的到這村兒不分青紅皂白畫個圈兒練藝就要錢有孩子們就跟我提了說這可是瞧不起您我說人家年輕輕的孩子學了幾年功夫走到咱們這兒路費短缺磨扇兒壓了手住店要店錢吃飯要飯錢人家爲了掙幾個錢還得問本村誰會把式啊咱們可得把話說在頭裏誰也不准到把式的場兒去擾鬧否則我在水牌上給你除名你就不算我的徒弟但是我的傻兒子很厲害我又怕有人唆使他到那兒鬧去我把兒子鎖到花園好幾天了不讓他出去嘿敢情不是那麽回事兒練武藝的小孩子在那一練鄉親們當然要給錢誰給錢他都攔了他說您甭給錢我不要錢您看這不鬥氣兒嗎有人問他你打把式賣藝不爲掙錢吃飽了撐的他說出來了我聽說白馬河甘家堡有個成名的人物叫化地無形隱逸俠甘雨甘鳳池我不爲掙錢就爲會會這位甘大俠嘿敢情是會我的人家是個孩子二十來歲我都七十好幾了我跑那兒跟人家幫亂去我告訴他們不管他他要打算會我我決不去壞啦一天就傳過風去了他在場子裏頭罵上我了王爺一聽還有這事兒呐甘老俠接著道小夥子說了很多難聽的話三天了我就是不出去今兒個一清早我有個病徒弟姓穆叫穆順外號兒叫金鋼腿剛才說過啦這個村兒裏的孩子都可以說是我的徒弟也可以說不是我的徒弟我沒有一個正式的弟子這個孩子去啦賣藝的孩子又在說啦我鬥的就是這姓甘的沒想到他又不敢出來難道說他沒有徒弟嗎泥人兒也得有點土性啊出來會會呀咱們試試嘛穆順病了在家歇了好幾天他不知道這件事今天一清早剛巧碰見這賣藝的小孩非要跟人家比試頭一次來人告訴我說穆順這孩子上那兒去了第二次來人說穆順進去叫人家把腿給踢折了我說擡家去哈哈哈哈得啦就是這麽回子事咱們爺兒幾個喝酒吧王爺站起來了天底下還有這麽不講理的人呐老俠客這麽辦吧我們大傢夥兒去一趟王爺站起來往外走海川也站起來說大傢夥兒先別吃了走咱們爺幾個瞧瞧去于爺也說咱們就全去吧衆位都起來了陪著王爺往外走只有傻小子於恒沒去大傢夥兒到火神廟一瞧裏三層外三層圍了一個圈兒往裏看衆人一看到甘老俠都閃開了老少群雄擠到裏邊兒來海川一瞧不錯北邊就是那山門的臺階有一張小桌子上頭放著把茶壺一口單刀立在旁邊還有一條花槍也在那兒放著呢在桌兒前頭站著個年輕人看上去也就在二十歲左右中等身材細腰兒窄背小腰兒就一掐掐面似六月荷花紅中透粉粉中透嫩紅粉相間兩道寶劍眉一雙豹子眼皂白分明大眼睛一閃一閃的真精神誰看見誰得愛小孩兒沖著大傢夥兒作了個羅圈兒揖鄉親們在下是外鄉人來到貴鄉寶地說我練把式不要錢我上這兒過癮來啦還是我吃多了在這兒消化食呐都不是我跟老鄉親們一再聲明就是白馬河甘家堡這兒有一位化地無形隱逸俠甘大俠客他是武林道的前輩我很敬仰他打算在這兒抛磚引玉把甘大俠客引出來我跟他討教討教沒想到我到這兒三天啦這個甘大俠客閉門不出他一定是膽小微微畏刀避劍貪生怕死不出來沒想到今天一清早兒來了這麽一位金鋼腿兒聽我說話有點兒不憤了過來跟我一動手嘿也許他在別人那兒是金鋼腿兒在我的跟前是麻稭杆兒腿一碰就折了我這一腳踢的可不是金鋼腿兒穆順我踢的是甘雨甘鳳池我想借他之口傳他之耳讓姓甘的來跟我試試我跟衆位說從今天起我再練三天等著甘大俠我跟他分個強存弱死真有假亡甘大俠要不來對不起衆位鄉親我可就走了我就爲的是討教討教跟甘大俠學兩招兒我不這麽樣兒人家甘大俠不出來我這麽樣兒了他還不出來那就是我剛才所說的他貪生怕死啊我說練就練這話老俠于成都聽見了笑著說嘿嘿嘿甘爺這小孩子兒說你吧甘爺這氣這老頭子怎麽激事兒啊猛然間人群兒裏頭有人說話喲朋友你的口氣太大了好吧我來跟你討教討教墊步擰腰蹭一下兒蠻子孔秀就躥出來了老鄉們一瞧怎麽來個江南人呐二十多歲白淨臉兒瘦條兒的身材賣藝人趕緊一抱拳師父怎麽稱呼你要問我嗎正是剛才提到的畫地無形隱逸俠甘雨甘鳳池啊旁邊的鄉親這個罵呀因爲他們有管甘老俠叫叔的叫伯父的叫爺爺的叫太爺的全有你提你是甘鳳池合算你成了我們家的太爺啦再有甘老俠在這兒呐沒有說話賣藝人上下打量朋友你不怕風大閃了你的舌頭甘老俠是威名遠震的武林前輩你算什麽東西你給人家甘老俠提鞋恐怕人家都不要你這叫什麽話你怎麽這樣說甘老俠是七八十歲老成持重的前輩人家有鬍子你的鬍子呐嗷我的鬍鬚嘛啊我告訴你我怕吃飯礙事嘛昨天把它刮了哈哈哈哈老鄉親們也都樂了賣藝人見他說瞎話不挑好日子便道你要說你是甘大俠那我就不跟你動手了你到底是誰好了我告訴你吧我家住在揚州姓孔名秀表字春芳外號兒叫走遍天下無遮攔探囊取物他一邊兒說著名姓兒一邊兒往前走說到物這兒猛地一伸手唰地一下於並食中二指對準這賣藝人的眼睛就來了這叫金龍吐須其實這賣藝人受過高人的傳授一瞧他指手劃腳往前走就知道他要動手這小孩兒沒動地方只見他往右邊兒微然一甩臉伸左手一立一掏孔秀的手腕兒騰地一下金絲兒纏腕就給拿住了其實賣藝人要傷孔秀只要一擡腿左手攥著你的胳膊腕子右腳一蹬你的胸口能把你這手腕子給你抻折嘍但人家捏住了孔秀的腕子一伸右手大鵬展翅左手一撤一碰他胳膊這孔秀樂兒大啦噔噔噔撲通來了一個大坐墩兒看場的人們哈哈哈都樂了孔秀起來說這叫什麽話我替你們本地的甘老爺子掙面子你們倒恥笑我輸招其實他也知道寒磣臉兒一紅鑽到人群兒裏頭站在阮和阮壁這些人的後頭不言語了賣藝人大笑哈哈哈哈衆位這位叫走遍天下無遮攔探去呀大傢夥兒這才明白敢情這個外號兒是小偷兒孔秀這個氣這賣藝人接著說他哪有本事呀我想這個人可能是甘大俠客的弟子吧還有哪位想過來試試嗎剛說到這兒打人群裏頭飛身形進來一個小孩兒說道蠃個三陣兩陣敗個三陣兩陣都無足挂齒你又何必口狂呢不才在下跟你討教三合這個賣藝的上下一打量進來的這個小孩兒中等的個兒細腰窄背一身藍梳著沖天杵的小辮兒前發齊眉後發披肩蓋頸瓜子兒一張臉兒修眉大眼鼻直口正一雙元寶耳長得俊極了原來是多臂童于夏九齡賣藝人問好了你打算跟我動手你叫什麽名字你叫什麽名字啊你只要一拳一腳把我贏了我馬上告訴你名姓兒哈哈哈我也是這意思你只要贏了我我告訴你那好吧既然不報名