開他我就沒日子孝敬他了您要打算收我作徒您起碼拿出十兩二十兩銀子來作爲我這幾年的飯錢給我大伯我也就心安理得了老俠聽了很是感歎好老朋友你過來你聽這孩子說話像沒心腸的人嗎有這句話我就領情啦您把他帶走吧不然的話我們爺兒倆都得餓死我打魚他放魚我怎麽也打不夠呀他走了我一個人打點魚也夠吃夠喝了但是我希望您好好的照顧這孩子無量佛你都不虐待他我一個出家人怎麽能虐待他老仙長一伸手真掏出紋銀二十兩說真的張大伯打三年魚也掙不了二十兩呀哎喲道爺我謝謝您呐小孩忙說大伯您拿著吧就算我孝敬您的啦將來我學好了能耐長大成人我能掙錢了只要您老人家硬朗朗的我一樣孝順您好孩子好孩子老人說著話進了倉裏頭拿了幾件破衣裳交給小劉俊小孩兒帶好了在船上給大伯叩了八拜灑淚分別老仙長把他帶走了爺兒倆先回店第二天給他買了幾身合適的衣服讓他沐浴更衣剃了頭打打辮子帶著小孩回廣東了來到家中金睛紅龍應太和把他們爺兒倆接進去老俠王十古便把收徒之事一說應太和也很高興王老俠又說這小孩姓劉小名叫俊哥就給他取名叫劉俊吧帶到你師娘那兒去叫師娘看看我收了個小徒弟應太和把劉俊帶到後頭跟老師娘見面從打這天起老俠王十古就不讓這孩子離開自己了眉聽目語老俠客要想喝水甭說話用眼睛一看那茶盤這孩子就能明白了十分聰明王老俠一高興給孩子盤腰窩腿七歲正好練功三十六大架七十二小架王老俠越做越高興這孩子穎悟非凡聞一知十架子站出來了就打小拳一趟拳兩趟拳三趟拳慢慢地二五更的真功夫就擱上了王十古可說太和啊瞧你師弟了嗎將來比你強應太和隨即應道這個孩子不但腰腿好而且很聰明我忒笨唉你知道這一點就成爺兒仨一塊兒耳鬢廝磨晝夜練功光陰荏苒日月如梭轉眼間就將近十三年劉俊都二十了文的也好武的也好老俠教給這孩子一對鏈子撅上中下走三盤七十二式拳腳更好王老俠給孩子起了個外號叫穿雲白玉虎但是一來老俠年歲太大了二來藥鋪太忙劉俊這個孩子的功夫不能擱下正在上長之際王十古就跟劉俊商量俊哥兒我打算給你再介紹一位老師成嗎您給我介紹誰呀我在您這兒學得挺好的王老俠說孩子我想一來你應當回趟南京到你父母的墳前祭奠祭莫然後買點東西瞧瞧那位撫養你長大成人的老伯看看街坊鄰居二來我這藥鋪裏瞧病的病人太多我照顧不過來了最近有朋友到我這來聽說新近有一位新出世的朋友興一家武術很年輕北高峰獻藝賀號鎮八方紫面昆侖俠童林童海川我雖然不認得他但他要興一家武術就必須廣收弟子徒弟多了枝繁葉茂他這門戶才興得起來你去給他當徒弟他學的是八卦蟠龍掌與我教你的武術正接近你給他磕頭正合適好好學習將來能夠成大名呀劉俊真不樂意但師父既然說了也就沒法子了老俠就給童林寫了一封信不知名的朋友我拜託你收下這孩子是我教的將來咱們有機會見面我一定面謝信寫得很委婉王老俠又給俊哥拿了一百兩銀子做路費劉俊辭別了師父師母師兄拿好鏈子鐝就奔南京來了來到南京如意橋真是去日兒童皆長大昔年親友已凋零雖然說自己才二十歲可是離家已經十三年啦景物全非他買了把鐵鍬先到父母的墳前除去荒草填了填墳磕了頭再打聽張大伯頭七八年就故去了最後跟街坊鄰居問候大家才認出他是俊哥來劉俊把自己學藝的經過從頭至尾說完了街坊們都讚歎哎呀孩子你回來太好了你們家的房子年久失修可都完了劉俊說您放心房子我不要了我也不準備在這兒住啦還得繼續學藝這時有人告訴劉俊說咱們如意橋也出過把式匠現在搬到白馬河甘家堡住去了他就是化地無形隱逸俠甘雨甘鳳池成了名的人間俠客呀嗷咱們這兒也出過人物對了劉俊可就想起臨走的時候師父說給你寫了封信但我不認識童林人家童林要是不收你你也甭難過可以另投師門只要是好人功夫好你就能跟著他多增教益不管是誰都是師父劉俊一想如果真找不著這位童俠客爺乾脆我就拜這白馬河甘家堡的甘老俠爲師這樣他在村裏呆了幾天辭別鄉親們可就奔杭州找童林去了一打聽兩次杭州擂童海川掌打法禪僧南北昆侖會雙鉞分雙劍北高峰獻藝賀號這些事家喻戶曉傳爲美談劉俊下了決心非拜童林爲師不成後來跟人家一詢問才知道童林奔雲南八卦山尋國寶捉二寇去了這麽著劉俊也奔雲南這邊來了他想找著童林是不容易的等走到白馬河甘家堡投宿到火神廟聽廟裏的和尚說才知道這就是化地無形隱逸俠甘雨甘鳳池的府上劉俊當時有兩種想法一種想法是第二天拍門找我給您磕頭又怕人家不收相反的這甘老俠客到底有多大能爲自己也不知道再者我還惦著拜童林呐爲這個劉俊才擱這個把式場和人家廟裏和尚說好了我租賃你們幾條板凳一張桌子租賃你們的刀和槍我在這練練功掙幾個錢哪知道他擱上把式場就爲了訪甘雨甘老俠一說大話人家不出來穆順來了一個進步截腿把穆順的腿給踢折了沒想到這會兒來了這麽多的人連老帶少劉俊一瞧就知道了這裏頭准有甘鳳池果然到現在一動手叫海川給贏了這才來到甘老俠的家中與群雄見面自己拿出信來童林一瞧有些不明白劉俊把自己的遭遇從頭至尾這麽一說海川聽完了才說哎呀我跟你的令老師也沒見過我童林年紀大小比你大個十來歲怎好爲人之師我教不了你呀看來王老俠這不是錯薦了嗎甘鳳池一擺手海川你這話不對有教無類這個孩子奉師命來的頭頂太極腳踩八卦乾坤妙手王十古又看得起你受人之托忠人之事慕名的朋友更要緊再說你自興一家武術別人的功夫再好他不會你的功夫呀誰給你磕頭你都可以收下你的擺法別人不會你怎麽能說不能當師父呢于老哥哥您說對不對于老俠點頭海川你應當收高道有先後術業有專攻怎能認年齡而不論功夫呢這麽辦吧當著王爺甘大弟的保師我的代師咱們立刻寫門生帖讓劉俊正式磕頭拜師海川呐人丁多門戶興旺一個徒弟沒有你再好一個人成嗎海川只好答應嘿哥哥們說的倒也是王爺那麽您看我能收徒弟嗎王爺樂了這不太好了嗎幾位老哥哥都捧著你劉俊這孩子也確實不錯很好很好侯老哥哥二哥哥你們認爲怎麽樣二位俠客爺都說海川呐收徒弟吧沒徒弟不成啊衆位哥哥連王爺都向著你呀你看王十古老俠客給你教了十二三年了他功夫這麽好你收來多省事呀海川點頭應允那麽好吧甘老哥哥您替我準備吧童林自己寫牌位他先寫了三個牌位第一個牌寫的是鬼穀子王栩鬼谷先師第二位老師寫的是無極真人孫臏第三位老師寫的是大明朝洞玄真人張三豐這屑于武當內家師然後寫了兩個牌位就是自己的老師上面寫著談笑清居無極子尚道明恩師下面寫著愛蓮居士太乙劍客何道源恩師三個大牌位兩個小牌位寫好了以後放在桌子上頭準備了五供蠟扡整股的高香老俠于成把門生帖寫好放到盤裏頭海川抱拳王爺您替我燒香吧海川我對於咱們這個武林道的事是外行你收徒弟怎麽要我給你燒香啊還是應當你自己燒嘛整股的香點著了放在香爐內海川在祖師爺面前一跪虔誠一番意思就是咱的門戶之中老師有諭除去五戒之外不能傳于罪人海川明白這一次有衆位哥哥有保代二師還有舉薦人弟子不能不收了這樣大拜了八拜磕完頭之後海川坐好了然後讓劉俊跪在那裏先燒了整股的香把銅盤托在頭頂以上門生帖寫好了由甘老俠客當保師西方俠于爺當代師老俠于成代替劉俊把門生帖遞給海川海川接過來看完了放在桌上然後受弟子大拜磕了八個頭劉俊起來以後童海川讓劉俊先給王爺磕喜頭這是應當的又給幾位哥哥磕喜頭然後又讓劉俊挨著排兒的給衆位師伯磕頭磕完了以後海川把傻小子叫過來對劉俊說道這是你的親師叔叱海金牛于恒於寶元又對傻小子說師弟呀得受咱們徒弟這個頭嘿我沒受過頭受頭什麽滋味嗷就是讓他給你磕頭記住了我叫牛兒小子大傢夥兒一聽誰跟他生那份氣呀劉俊趴在地上給師叔磕完了頭
