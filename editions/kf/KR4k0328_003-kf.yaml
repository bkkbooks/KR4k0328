兩兩巡更也不放在心上二人飛身下城牆夜色茫茫真好像兩綹輕煙直入貝勒府滾脊爬坡各處窺探沒想到正廳院中有人搭話哥倆在東房上看見海川無驚人之處這才答話下房沒想到碰釘子了海川人怯手底下不怯打掉單刀二人逃走回到地壇兩個悄悄換了衣服閻保心裏頭煩哪張旺勸了半天兩個人挨著躺在席上輾轉反側跟他們倆在一起的是的鮑信侯俊侯玉三個人第二天五個人嘀咕半天閻保事情詳細說明這五個是親師兄弟同仇敵愾先進城裏到打磨廠刀剪店買了一口雁翎刀就劈開了口商量已定第二天晚上又來啦被海川把侯玉的鐵拐打掉五個人跟鬥敗了的雞一樣而歸到地壇換衣服來到地壇南石門一看壞了侯二俠坐在席上四位師兄都在其實阮和是長門大師哥在家裏他威信最高師兄弟也都怕他一般都是他叫起兒練功他在二位老人家盛怒之下也敢說話阮和本人功夫既好又有魄力同時也誠實可靠有時還能替二老主筆這次來京主要由他來管束師弟們第一天晚上張旺閻保走他也覺察到了第二天晚上五個人前後離去阮和一查看夜行衣包帶兵刃全沒了他就知道有事本來二爺是坐功晚上睡覺也是盤膝打座他來到二爺跟前低聲叫道叔叔二爺微睜雙眼什麽事五個師弟白天就好像有事晚上都走了傢夥衣包呢也全帶走啦啊二爺吃一驚這時候阮壁徐源邵甫也都起來了直等到四鼓已過才見五個人無精打采從南石門外來到拜壇上二爺面沈似冰問道閻保你們的軍刃哪阮和把五個人的兵器全拿下來放到二爺的面前叔叔閻師弟的刀是新買的小師弟的拐不見啦二爺很生氣你們幹什麽去了軍刃因何不在跪下閻保知道師父生氣啦自己悔恨交加撲嗵跪在面前師父息怒都是徒兒不好不能約束師弟們請師父責罰其實侯二俠素常疼徒弟這是人所共知的今天可真生氣啦你們這兩夜有什麽事情如此狼狽你的刀哪去啦爲什麽是新刀從實講來如有不實爲師定要責罰閻保是個面噁心善的人怎敢隱瞞從頭至尾備敘前情這武林之中講究的是過節兒過板兒姓侯的來到北京孩子們在不知名姓的人物面前栽了跟頭等於大人丟臉哪老英雄想到這兒用手指點你們實屬膽大妄爲要知道泰山高矣泰山之上還有天滄海深矣滄海之下還有地能人背後有能人軍刃被人留下爲師臉面何存把軍刃收好休息去吧一擺手徒弟們都躲開了第二天清早二爺空手戴好大草帽遛遛達達地進城啦來到成賢街國子監西口穿行往東到東口就看見貝勒府宏偉高大巍峨壯觀皇家氣象二爺一看從南往北有遛早彎兒的老人上前去一抱拳老哥您喝早茶了噯噯剛喝完出來遛個彎兒活動活動你早哇我是外鄉人到北京來逛逛跟您打聽打聽東邊這片大府是什麽府第啊這是固山多羅貝勒府本府的皇子晉封雍親王啦這是王府嗷怨不得這麽高大謝謝啦拱手作別老英雄一想事情很不好辦也不知這位名姓怎麽問問哪二爺信馬由繮從西往東進了富貴巷從府門前過去來到東頭原來東邊有座大廟這是柏林寺緊靠王府東邊還有座小一些的府第門口有不少的瓦木工匠老英雄湊過來笑嘻嘻地抱拳衆位這麽早就出工幹活啦有個三十多歲的看樣子是工頭老朋友聽你的口音是外鄉人吧對對從山東來唉這麽大年紀還外出謀生不過到了北京還好混生活你要有力氣能和灰和泥的只要不偷奸耍滑的每天管飯兩吊工錢不瞞你說上邊交待得急幾天就要完活人手越多越好你看怎麽樣謝謝您賞飯吃幹什麽這樣急呀咳您不知道給王府教師爺修房接家眷哪位教師爺老朋友您愛問我愛說真是人走時運馬走膘駱駝單走羅鍋橋咱王府有位更頭姓童名林因爲有強盜夜入王府被童頭給打跑啦上人見喜一步登天這位更頭升任本府教習這不是嗎讓州官送家眷莊園處派下來修葺這座小府請童教師居住嗷我這才明白我還有個朋友乾脆把他也找來幫幫工掙倆錢可以嗎行行說完這個人領活兒去啦老俠誤打誤撞把事情都問明白啦原來五個弟子被更頭給打啦二爺往回下裏走來到府門前喊了一聲回事從裏邊走出一個人來你找誰呀辛苦我是童教師的鄉親來找童教師候著下人往裏來正遇見何吉總管說明此事童林才把老人家讓到屋中現在一提名姓使童林一驚侯二俠從頭至尾說了一遍童教師我的幾個孩子無故冒犯王府被閣下教訓一番您替我管教他們在下十分感激打算請您今晚到地壇暢談不知童教師肯撥冗前往嗎海川慨然允諾前輩示下童林敢不如命嗎今晚小子一定前去好童教師快人快語老夫欽佩今晚恭候閣下蒞臨告辭了說著戴上大草帽往外走海川直送到大門外看著老人的後影兒出西阿斯門走了海川兩眼發直站在府門外思緒萬千想得很多自己剛剛當了王府教師就遇見這麽一位四遠馳名的老俠盛名之下豈有虛士我打了人家的孩子人家大人出來了論經驗閱曆無法相比可箭在弦上不得不發話可又說回來啦師父叫我興一家武術如果只能戰敗碌碌之輩又怎能躋身武林立起門戶如果仰仗平生所學戰敗俠傑這叫搬倒大樹有柴燒就能魚躍龍門倘若不勝我才三十多歲來日方長找恩師再下苦功也爲時不晚禍到臨頭須放擔豈能猶豫莫若拿這位老俠客當做試金石看看自己到底有幾許本領想到這裏心中坦然往回下走來到自己屋中陳升陳福已經把屋子收拾乾淨教師爺二總管剛才來啦說王爺請您哪好吧我就去海川奔客廳心裏琢磨著王爺一定要問如果不說實話有所不妥要說出實話王爺身爲皇子他具有唯我獨尊的優越感自己受王爺的賞識王爺是袒護自己的反過來王爺有個多想你姓侯的何等人敢欺侮我府內教師你長著幾個腦袋你說這是武林會友的老規矩我偏不讓你有這個規矩那不就壞了嗎再說王本人好武如果他知道是位成名的老俠一定羡慕非要跟著不可我也絕對攔不住家累千金坐不垂堂啊畫虎畫皮難畫骨知人知面不知心我怎敢請他前往呢還有我真的被侯老俠打了不用說打傷至殘甚或身死扔我一個跟頭王爺知道都會不舒服萬一他要動用皇家勢力到那時我進退維谷這要傳到綠林人耳朵裏那我童林豈不成了仗勢欺人嗎實在有損名譽乾脆不提等來到大廳見王爺行禮落座海川鄉親走了嗎走啦啊海川哪你這一次榮升教師你離鄉土百十裏路再說家眷一到鄉親們焉有不知的道理哪今後類似的事情很多大不過是謀事借住求財你記住一律不准推辭只要能辦到的就要辦不用問這是借錢吧爺真是聰明過人哈哈這不是明擺著的事嗎你身上不是有一百銀子嗎不夠再到莊園處去拿吧海川真是萬分感激這給爺添了不少的麻煩你錯了今後你的事就是我的事只是你有事別瞞我咱爺倆一齊商議二位在一塊兒只不過是談論武藝以及海川知道的江湖軼聞到時吃飯喝茶有話即長無話即短由於昨晚熬了夜吃完晚飯王爺休息去了海川回到自己屋中拿起雙鉞和包袱告訴陳升李福去到下房睡覺海川出府門到西口往北走幾步到了成賢街兩頭的胡同口有牌樓海川邁大步一直往西走來到安定門西大街路西有個天泰軒清真飯館飯館門口站著一個夥計海川走過去一拱手大兄弟我跟你打聽一下地壇在什麽地方夥計用手一指您快走說話就關城門啦城後繞過箭樓一直往北不太遠您往東看裏邊煙籠霧繞柏樹林周圍的大紅牆兩邊壇門可能都關著那就是地壇爺台天都黑啦你上那兒幹什麽去找個朋友夥計一聽這位可能是發囈症曠野荒郊連個人家都沒有找誰呀海川道謝提著包袱往北出離安定門到地壇會二俠去了
