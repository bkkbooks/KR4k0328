body:
  text: 第三回識好漢五小鬧王府會英雄老俠探虛實上回說到海川把二賊寇趕跑忽然想到王爺萬一把我當成壞人自己有口難辯哪便覺得十分害怕他看了看北屋順更道回轉伙房看大家睡得很香就把更竿放好把包袱皮兒往腰裏一系手拿雙鉞剛要走張老千醒啦剛要說話海川在他耳朵邊小聲嘀咕老千你睡吧我頂一夜不要聲張說完出來海川現在要幹府裏教習的活兒他飛身上房施展輕功提縱之術回看府牆周圍仔細查看防範直到天亮才回到伙房大家全起來梳洗已畢都喝茶哪正說昨天晚上童頭沒叫起兒怎麽回子事海川從外邊進來老千便問昨晚怎麽沒叫起兒海川搖了搖頭看你們睡得香沒有叫你們海川坐在鋪上把兵刃放下剛坐好就聽外邊說話管家何吉來了老千聽了趕忙迎過去何老爺您來找我們有事呀何吉說我找你們頭來了海川一聽何吉來了心裏就吩白了昨晚的事情可能王爺知道啦自己一時無策先頭沖裏枕在鋪蓋上假裝睡覺原來王爺昨天晚上在里間屋裏觀看漢書地理志看得有些累了叫何吉收拾寢具這時王爺就聽見外邊海川跟夜行人說話王爺很有膽量他一伸手把牆上的鎮宅大寶劍摘下來按劍把亮出劍來往外就走何吉卻嚇壞了攔住王爺道爺先避一避奴才出去看看可能有歹人他說著話把燈吹滅王爺臉一沈道奴才你總說你比何春膽大剛有一點風吹草動你就直哆嗦真沒出息何吉無法只有緊挨著王爺出來了王爺輕輕地拉開格扇門隔著簾子往外觀看海川手持竹竿正站到院中兩個賊人各有兵刃武器王爺心裏很替海川擔心這個更頭手無寸鐵面對兩個強敵而無制敵之術這不是甘受其苦嗎就在這刹那之間只見外邊改觀啦原來這兩個手拿兵刃的賊都不是這個更頭的對手打得賊人十分狼狽最後打掉一口刀賊人上房跑啦這一切王爺歷歷在目叫何吉到里間屋把燈點上寶劍還鞘挂好道吉啊這件事你看清了吧今晚上來的賊人要不是這個更頭趕上本爵脾氣你是知道的我一定要出去拿賊賊人都是高來高去好身手咱爺們兒就要吃虧甚至喪命幸虧更頭趕到這個人了不起但我看他撿刀的時候有些害怕他可能是擔心咱們看他高來高去認爲他是壞人或送官府或辭去他的更頭本爵我不是那不明事理的人你明早侍奉我梳洗完畢過去叫他來次日清晨王爺起了個大早何吉何春侍候盥漱完畢何吉來到伙房現在一看童林睡了便喊道童頭兒童頭老千也說童頭何老爺來瞧您您一會兒再睡何老爺用手撥拉海川海川一想得啦醜媳婦難免見公婆一折身坐起來喝何老爺來啦您吉祥何吉這個樂童頭你醒啦辛苦一趟王爺請你啦就這一句話老千他們都怔啦自從盤古立地天沒見過王爺請更頭的童林也一搖頭問何老爺別嚇唬我了王爺叫我都叫不著怎麽能說請哪海川不想去何老爺你回王爺說我睡覺何吉說是你的造化來啦快去吧時間長了王爺怪罪下來咱擔不起啦童林聽了只好隨何吉來到大廳海川在王府呆了幾個月這是第一次見王爺在上首坐著海川跪道更頭童林請爺安王爺呷伸右手這叫接安說真的五品官請安王爺都不接呀起來起來你叫童林回爺的話我叫童林號海川你的家在什麽地方京南霸州童家村你怎樣練的武藝來京何干不要擔心望你實話實說海川這才把自己韻事情一字不漏的詳細說完王爺點了點頭道你童林是明珠埋土哇看來童林要青雲直上了童林哪你不要害怕你是更頭不負捉賊護府的責任話雖如此你奮勇拿賊不但保護了我的王府而且也救了本爵的性命本爵絕不能如此糊塗拿你當做壞人這一點你只管放心單就昨晚一件事本爵也要重賞於你謝謝王爺海川你不必客氣我再問你你看昨晚來的是何等賊人回王爺的話草民看這個夜行人倒不像壞人看他們的功夫也不是下五門而是正門正戶但猜不透他們的心思王爺點點頭道你看賊人還會采嗎王爺如果他們是竊賊草寇以偷盜竊取爲目的那他們今晚就不敢來啦我看他們是綠林人物敗在草民之手心有不甘很可能再采尋釁對對對你說他們還會多來人吧爺算猜對啦他們一定會多來人王爺一聽就急啦吉啊馬上把教師爺請來商議童林攔住道何老爺您別去府內教師如果真有本領他昨晚就該露面拿賊直到現在還沒來見王爺哪他也一定是指佛穿衣吃飯沒有什麽真本領您又何必爲難教師爺呢王爺一聽童林這個年輕人心眼兒不錯對吉啊拿我的名片到北衙門調些兵來保護王府海川又一擺手請王爺不必擔心官兵再多擋得是不來賊想來的賊官兵是擋不住的王爺現在對童林越來越有好感他說話王爺特別愛聽你說昨辦有草民一人足以抵擋賊人昨夜之事王爺想必看見草民是更頭不敢拿賊也不敢殺賊王爺聽了點頭道對對聽你的官兵咱不調啦就靠你一人海川一聽急了王爺您另請別人吧草民跟您告假王爺一聽忙問童林你怎麽告假呀海川急忙解釋當場動手各憑己能刀槍無眼俗話說士爲知己者死草民爲王爺倒不在乎可殺了賊人要償命那可就不上算啦童林你不必如此殺死多少賊人本爵做主與你無幹說話間天黑下來啦張老千帶著九個人進來給王爺請安然後一屋五位取碗倒香油放燈草點著了用大盆一扣瓦片一支用香火頭在窗上燒了很多小孔一切準備就緒王爺把大寶劍拉出來何吉何春也換上薄底鞋屋裏一片黑王爺坐好哥兒倆一邊一個格扇門關著外邊連個打更的都沒有深夜靜悄悄王爺擔心賊人突然露面不及提防又擔心童林直到現在還沒來更擔心童林一個人不能抵擋衆多的賊人正想著一看海川從角門出來雙手搬著一個二人凳不慌不忙來在院子中間東西方向放好只見童林腰裏挂著那七叉八岔的軍刃王爺也叫不上名兒來再看他頭西腳東往二人凳上一躺兩臂一回雙手一搭腦袋往上面一枕仰面沖天睡了王爺拉著大寶劍來到門口隔著簾子看得很清楚童林是睡著了王爺心裏真著急便對何吉說道吉啊你出去把童林叫醒何吉答應得很痛快可就是不動彈王爺道何春你哥哥不敢去你去回爺的話水大不漫橋奴才哥哥不敢去我怎敢搶先呢王爺站起來直奔門口自己要去何吉何春倆人上前攔住爺請您別出去爺一瞪眼幾個賊草寇嚇得你們就這樣本爵還要幫助童林拿賊哪何吉一聽王爺說呼嚕就喘便一指道王爺您看貝勒爺往外一瞧童林直挺挺地躺著整個兒人跟筆管一樣直立而起雙腳就站在木凳的西頭兒了在他站起來的同時從東房上下來一摞瓦足有二十來塊帶灰頭的老瓦分量特別重正砸在這木凳的東頭啪嚓碎瓦亂飛正值深夜響聲很大王爺他們都嚇了一大跳才明白童林根本沒睡覺往東房上看扔瓦的正是昨晚那個陀頭和尚在旁邊站著那個斜眼睛的人手裏仍然拿著一口軋把翹尖厚背雁翎刀往南房上看房中脊站著一個大個兒前胸寬背膀厚虎背熊腰手拿一口大寶劍再往西房上看也站著一個人中等身材細腰窄背扇子面的身子骨兒一身夜行衣左手拿鑌鐵拐右手拿力這就是四個人了王爺爲海川擔心其實海川看得更清楚北房上還有一個一身夜行衣手持單刀一共是五個人童林精神倍漲飛身形從長凳上下來左腳紮根用右腳一踢木凳蹂這木凳就好像有人搬動一樣輕輕落在西配房的廊簷下左右手中分子母雞爪鴛鴦鉞夜戰八方式氣貫丹田抱元守一站在院中示威在王爺看來童林就像出水蛟龍跳澗猛虎這一切都是打閃認針的工夫東房的和尚一踹中脊如箭脫弦唰地一下腳落實地舉刺就紮這招叫紅雲捧日明晃晃地鵝眉刺奔童林胸前紮來也就在同一個時候西房使拐的飛身下房右手刀防身左手拐一掄挂著風聲直奔海川頂後砸來前後夾攻王爺著急他倒提寶劍這時候何吉在王爺左邊何春在王爺右邊叉著腰左腳往前伸著王爺一著急兩手一用力忘了自己的寶劍尖兒沖下往下一墩正紮在何春的左腳面上哎呀何春提起左腳兩手捂著疼得齜牙咧嘴正在這時只見海川左腿一躬右腳跟過來連刺帶拐一齊躲右手鉞尖子照著和尚的腕一戳左手鉞照定和尚的脖子就掠和尚一褪頭海川左腳就到啦海川左腳踹上和尚身法極快跟著把左腿撤回來往後叉步左手反腕子一撈架抄拐這是鉞法的絕招後邊這位往左大跨步海川右肩一揚臉往左甩右腿飛起用右腳的外側橫著踢他身後來人的右肩膀十字擺蓮腿嘭地一聲兩個人同時倒地噌噌噌又從房上跳下三個人來各自亮刃惡狠狠撲過來五個人把海川圍在當中童林虎目圓睜雙鉞一分使了一招鵬展翅瞻前顧後防左護右身手敏捷如同猿猴恰似狸貓上下翻飛賽過梨花蕊落這五個人就像正月十五元宵節的走馬燈嘀溜溜地亂轉好似王八吃西瓜滾的滾爬的爬這五個人哪個氣呀你若是四海聞名的俠客義士武林雲中標過名挂過號的人物我們敗給你也算甘心衣不驚人貌不壓衆土裏土氣真看不出來是個練武術的我們五個都不成這還了得五個人越想越氣越氣越狠越狠越毒可越毒越挨打把吃奶的勁都用上也不行王爺在北房看得清楚也真爲海川擔心著急何吉更是嚇得齜牙咧嘴海川力敵五個夜行人面無懼色好一場鏖戰時間一長五個人漸漸不支海川卻劍眉雙立虎目圓睜左腳紮根不動真是走如風站如釘右腳往北橫滑右手用鉞尖子一挂左手壓北面來的刀右腳拿樁站穩左腳大擺蓮腿飛起來正踢在和尚胸口上嘭地一聲把和尚踹出一溜滾同時右手合鉞摟這個使刀的脖子使刀的低頭一躲嘭把他的纏頭絹帕給擄下來同時左手奔使拐的頭頂紮去而右手鉞運用神力猛砸鐵拐噹啷把拐砸落於地下海川的右肩往南大斜身左手鉞撤回反鉞撩陰使寶劍的稍一愣神躲閃微慢把夜行衣劃破海川跟著童子拜佛雙鉞合併靈猴戲月這兩招連用威力最大最後一個使刀的被海川右腳擡起踹在這個人的後胯上仰面朝天甩出去一條兒剩下幾位一個個鯉魚打挺站起來飛身上房各自逃生海川心想必須拿住一個這時候最後一個上東房就是那個破爛袈裟的和尚海川想他就是罪魁禍首便大喊一聲凶僧哪里逃走肩頭微晃腳尖點地往上一蹲飛身上了東房和尚上房站在前簷等海川從底下往上蹦起來的時候氣貫左足猛地一擡腿往下一踏前簷的簷頭瓦嘩啦啦這一腳蹬下來足足有上百斤直奔海川頭頂砸來海川往上起簷瓦往下砸換個別人不死也帶傷啊好海川當機立斷他身子已然懸在中空一看簷頭下墜左腳尖一挑右腳尖一點這叫憑物借力登萍渡水之功接著海川兩腿微彎猛地一蹬魚躍龍門右肩斜沈橫著從碎瓦下邊躥出去腳尖點地再上房四外觀瞧五條黑影往五處逃跑夜色茫茫眨眼之間不見蹤迹海川沒敢從房上下來又順著後面更道查看幾次眼看天交五鼓他才回到伙房進來一看海川可就怔住了老千他們都在換褲子一瞧海川臊紅了臉道童頭您回來啦海川點點頭問老千你們這都幹什麽哪童林這一問大夥更都臊得面紅耳赤旁邊有個夥計答話道頭兒您就別問啦他們都尿褲子啦嗷昨兒晚上嚇壞啦老千你們真可以不是說了半夜橫話嗎你還說你們縣裏淨出英雄豪傑你的膽量很大嗎咳頭兒您快別提啦我們縣裏淨出英雄唯獨我還不夠英雄沒賊的時候我膽子大極啦一