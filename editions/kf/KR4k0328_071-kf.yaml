是您讓弟子我去我怎麽能不去呢相反的去我害怕呀袁先生你害什麽怕呀唉老師呀有這麽一句話寧可得罪十個君子也不願意得罪一個小人像段氏弟兄他都是綠林道的賊呀我要幫著童衛員大人幫著衆位破七星八寶轉心亭就把他們給得罪了我得罪童海川童俠客沒關係您派人請我來我不去童俠客不會加害于我相反的要得罪了段氏弟兄段氏弟兄可就要害我呀你也知道晚生家中有八旬老母兒孫滿堂一大幫人也就是說上有老下有小我得罪了綠林道我袁化防不勝防您看爲這個我也有點害怕二爺姜達一擺手你錯了解鈴繫鈴你應當把七星八寶轉心亭破壞不要緊如果段氏兄弟有一天要打算害你老僧自然要管你記住了他們要把你害死我也給你報仇有我呢要是那樣那麽什麽時候走袁先生您收拾收拾馬上就走時間有限再說大人是到四川放賑去走不了多著急那好吧把家務事歸置歸置到裏面稟明了母親老太太沒說什麽好吧完了事就回來免得爲娘惦記袁化又跟自己的老伴交待清楚了袁化把鏈子鐝帶好隨著張方孔秀薑老劍客爺一塊來到薑家三人又告辭姜本初這才奔太原府天都快黑了他們三位來到耿家莊在村口上遠遠地瞧見有不少的人呀銀面仙猿鐵臂昆侖老俠石金聲海川金頭壽星洪勳九尾宗彜世界妙手司徒朗金針道長韓景和還有司馬良夏九齡等全都在這裏等百靈先生袁化到了大家呼啦啦過來挨次地見禮各道寒喧耿文耿武一躬到地袁先生是咱太原府管轄地面的人物不要在這裏講話有什麽話咱們到家中再說吧來到客廳分賓主落座燈也就點上來袁化擦臉喝茶休息海川這才抱拳拱手把事情全提了沒有別的袁先生撥冗至此使童某感激不盡當然這也是西風長老秋禪前輩的臉面也是大傢夥的臉面袁先生您既然來了怎麽樣破七星八寶轉心亭我們就是這些人請您分派百靈先生袁化點了點頭童俠客你們都是慕名的朋友一見如故我也不客氣七星八寶轉心亭並不難破在下到山裏伸手就破但是他七星山後山緊挨兩界山嶺這個地方非常隱蔽有一條暗路這條暗路叫駱駝嶺這個地方原先沒人把著現在有人把著七星山兩家寨主把洞庭湖的老寨主父子爺兒倆請來帶著四百名長箭手在駱駝嶺駐紮他這個長箭手十分厲害硬弓硬箭老寨主叫多頭太歲趙遠峰少寨主叫癩頭太歲趙小喬爺兒倆每人一條鎮鐵虎尾三節棍這四百名長箭手最凶如果我們一旦去破七星八寶轉心亭段氏弟兄一定知道消息他們要讓趙家父子帶四百名長箭手把七星八寶轉心亭團團圍住說真的我們在亭子裏很是危險我們應當先派人把駱駝嶺趙家父子給抓住把他這四百名長箭手給他趕散這樣咱們才能破亭免去後顧之憂現在咱們兵分兩路一部分要破亭一部分要到駱駝嶺把這父子治住您看童衛員你們爺兒幾個瞧瞧誰去合適呢旁邊有個答言袁先生老朽不才願效犬馬之勞百靈先生袁化一看是九尾宗彜世界妙手司徒朗嗷如果司徒老義士爺去那當然就沒什麽問題海川也說哥哥這麽大的事情您一個人去我們也不放心呐要不您帶兩個孩子去吧司徒朗一聽也好我帶誰去呢哎呀師大爺侄男一定要跟老人家一同前往我是吃不了虧的大爺我也跟著您去嗨老頭司徒朗一瞧是病太歲張方跟蠻子孔秀說你們倆孩子這麽老遠把袁先生請來也沒休息又接茬跟我幹這個去多辛苦哇您這是哪的話呀爲國還能說什麽辛苦不辛苦啊咱們要是把七星八寶轉心亭一破金牌得了爺兒們我們一點也不累要是那樣我們先走了老義土司徒朗把五行輪包袱提起來張方孔秀也把軍刃帶好了爺兒仨就打耿家莊出來一直來到臥虎灣下順著兩界嶺七星山當中爺兒仨可就奔了駱駝嶺這地方十分幽避非常險惡快到啦孔秀又冒壞哎呀師大爺哎孩兒趙遠峰趙小喬這兩個壞東西嗎我是曉得的你怎麽知道老爺子您不記得九月九重陽會嗎當然您沒去您不知道事情您聽說過雙猛鬧重陽鐵善寺山下蜜蜂嶺前管轄頭道山口的就是這兩個混蛋王八羔子叫我們的傻師弟虎兒小子甘虎把這父子爺兒倆揍個不亦樂乎想不到他們又跑到這旯裏攪鬧其實趙遠峰趙小喬當初叫甘虎給打了您不記得這茬了嗎他們沒有臉再上山裏去這爺倆帶著四百名長箭手暗含著撤了因爲人家請他們到鐵善寺是爲了要害童林侯振遠沒想到把黃風鬼給射死了而且還叫甘虎給打了不認字的蒙不認字的父子倆一害臊回洞庭湖去了剛到洞庭湖段氏弟兄的請帖就來了父子倆又帶著四百名長箭手奔山西段氏弟兄讓他們爺兒倆帶著長箭手把守駱駝嶺一旦七星八寶轉心亭失了勢你們爺倆帶領四百名長箭手包圍七星八寶轉心亭不准走漏一個當然這四百名長箭手願意在這裏在洞庭湖自己的寨內每月發薪發不了多少一兩八錢銀子有時候就給幾吊錢可是要跟著他在七星山人家多給錢所以都願意在這裏孔秀到現在把事情都說出來了這兩個混賬東西嗎我們都認識他但是他們倆十分厲害您不如派一個人去把趙遠峰趙小喬誆出來張方一聽這小子怎又奔我下手啦老頭司徒朗明白壞孩子讓我支使張方去我偏不支使孔秀哎呀大爺好啊既然把他誆出來合適你去吧我在這準備拿人孔秀一聽大爺知道侄男我是沒有本領的飯桶你沒有本領這是自然可有一樣你誆還誆不下來嗎孔秀一想我又搬磚砸自己的腳了只好說好侄男遵命一伸手把搖山動小刀拿出來這搖山動有尖沒刃是挖人家牆偷盜用的說著一搶左腳就在自己的眼前頭搬起個朝天凳來右手拿起搖山動的小刀噌噌噌還