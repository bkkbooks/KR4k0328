body:
  text: 第七十一回童海川月下會三俠駱駝嶺智誆趙小喬上回書說到金雞好鬥雙鋼掌赤膽俠慧斌山神廟學藝最後問師父的名字老人家一陣大笑哈哈哈慧斌我與你是近鄰鳳翔府西門裏姓董名幹字化一人稱鎮古俠和你一起伴讀十五載陪伴著你讀書習武十五年的師兄你知道嗎弟子唉我跟師兄這麽多年在一塊兒我不好意思問告訴你他家住在陝西延安府東門裏姓胡名叫胡林這是我的大徒弟本門本戶他最大他叫飛天金精鼠他有一手絕活就是縮骨法只要腦袋過去了這人就過去了就這能耐耗子本身就沒骨頭有個縫隙就鑽得進去慧斌趴地下給師兄磕頭老人家董化一問慧斌慧斌呐你的能爲是很不錯了爲師死後你師哥和你的三位師叔經常來到金鳳山看望於你我謝謝師兄謝謝三位師叔門戶中的五戒爲師不願多說希望你謹遵五戒門規在江湖路上行端履正你呀做一個好武林弟子你是一個和尚如果你要眼空四海目中無人犯了門規五戒你三位師叔都可以來到金鳳山要你的項上人頭六陽魁首慧斌這麽一聽哎喲我說我師父把三位師叔請來幹什麽這是給我請來的劊子手啊將來我好好的不用說了如果不能夠恪守門規就宰我嗨師父您可真有出手的姜二爺念佛阿彌陀佛慧斌呐你師父的話你聽見了嗎弟子聽見了那好極了謹記你恩師的銘言董老劍客招手慧斌呐進前來是慧斌往地下一跪就勢老人家一伸手撩自己的藍布衫嘩啷啷拿出一條傢夥來慧斌一看謔這是什麽東西呀通體雪白唰唰地冒寶光十一節頭裏是個六寸五的鐵鞭穗渾鐵的就跟那小甜瓜腦袋似的黃絹線的穗子包著使的時候鐵鞭穗就露出來後頭是鐵鞭把兩邊是八寶燈疙瘩當中有黃帶子勒著把黃挽手黃色燈籠穗兒這十一節都有透眼穿著鹿筋繩每一節與每一節之間都有算盤疙瘩擋著三個算盤疙瘩上頭有三個鋼環兒一搖嘩啷啷地響慧斌呐我教給你一百零八招打穴之招那是爲師我的絕藝你瞧見這條鞭你喜歡嗎師父弟子當然喜歡嗷告訴你這條鞭連穗兒帶把共有十三節叫墨魚骨鞭此鞭難得啊在你師祖身上佩帶多年出師的時候爲師我喜歡我從你師祖手上要過來在我的身旁佩帶也已多年今天咱們爺兒倆臨別在即我就把十三節墨魚骨鞭相贈與你以示紀念慧斌一聽眼淚就下來了師父天不假年您老人家先弟子而去使弟子痛不欲生這是您老人家心愛的東西弟子我怎能有心要您的鞭孩子不必如此寶鞭雖好也是身外之物你讓爲師把此物帶走那麽此寶就不能出世了你拿這條鞭帶在身上時時刻刻都像爲師身在左右那不好嘛是趴地下磕頭老人家把這十三節墨魚骨鞭疊好了往前一遞慧斌伸手一托老頭把鞭又拿了回來慧斌一想師父怎麽又捨不得了慧斌呐一百零八招打穴之招上中下走三盤只要你將來勤習勤練南七北六十三省只要使鞭的得讓你過去你是第一條鞭倒不是說你這條鞭就無人能敵了只是在你這一輩子在你這個時代裏的把式匠你算第一條鞭可有一樣學如逆水行舟不進則退呀你要認爲你的功夫盡善盡美眼空四海目中無人你誰也瞧不起功夫日見消退你可記住了廣東龍門縣青龍街東口有個藥鋪叫八卦堂八卦堂藥鋪掌櫃的姓王名喚十古有個外號叫頭頂太極腳踩八卦乾坤妙手王十古這個人算少林寺人室弟子此人幼年三入嵩山少林寺大殿的匾後頭巧得人骨寶鞭老方丈一圓僧普靜和尚有意成全王十古後閣佛樓放好了天罡鞭圖暗示於他他在後閣樓得天罡鞭三十六路活把鞭的鞭圖拿到自己的家中五師自通按圖習練這個人能爲高強藝業出衆教朋友血心熱膽南七北六十三省群俠之首將來你見著這個人這個人才是你的勁敵呀恩師之言弟子謹記就是了好吧你把鞭帶上吧慧斌這才把十三節墨魚骨鞭拉過來圍在身上你們爺兒幾個還有事嗎問了幾遍沒有誰答話老人家董化一點點頭得了讓我一個人好好的在屋裏呆會兒吧爺兒幾個沒有一個說話的耗來耗去耗到交了子時就看老人家臉色一變從鼻子眼裏頭唰出來兩道長鼻涕都過了嘴唇往下一低頭敢情老人家去世了慧斌不敢哭哇姜二爺托著老頭的這個鼻涕頭慢慢地又給老頭托到鼻子眼裏去姜二爺趕快派人把棺材蓋打開慧斌呐咱們爺兒倆拿著鐵鍬走咱們刨坑去現在先給你師父入了殮有幾個人把老頭搭出來給老劍客爺入殮棺材蓋也蓋上不打楔子不釘釘單擺浮擱姜二爺帶著慧斌老爺兒倆拿著鐵鍬去了深深地刨了一個大坑刨好了鐵鍬放到那兒然後爺兒倆回來一看這兒念經的念經祭奠的祭奠爺兒倆也到棺材頭裏念完了經然後告訴慧斌慧斌呐把棺材挾起來走吧慧斌總認爲師父的屍體在裏頭分量要重一些等慧斌挾起棺材來他有了感覺嗯怎麽裏邊沒分量啊怎麽把我師父盛殮起來我挾著還跟空棺材一樣慧斌滿腹狐疑又不敢說師兄咱們把棺材打開瞧瞧慧斌挾著棺材來到墳地放到旁邊拿繩子把它套住了爺幾個四吊角把棺材慢慢放下去穩好了以後調正了立刻把老師掩埋了埋得很結實不留痕迹時間一長您找都找不著爺兒幾個都回來了來到山神廟內姜二爺說慧斌呐你師父跟你說的話剛才我可都囑咐你了你要牢牢切記看得出來你師父就拿你做了衣缽傳人將來爲我們的門戶發揚光大你要身染下流玷污門戶壞了門規五戒那時可休要怪你師叔們沒有叔侄之情慧斌一聽您這叫多餘我一個出家的和尚有什麽犯門規的地方呐我幹嘛去呀我既不圖名也不貪利師叔你們放心吧要是那樣好啦我們可都得回家了哎呀三位師叔辦完了事情我想請三位師叔在廟裏頭住上幾天再走不遲不行你我後會有期吧姜二爺張三爺董四爺全走了慧斌挽留不住又問胡林哥哥跟小弟到前山吧胡林搖了搖頭兄弟師父把我找來從收下你算起十五年有餘啦哥哥我也有個家呀我也得回去看看去慧斌知道胡林是回大爸唉師哥我怎麽說呢小弟我給您道謝吧老頭一擺手用不著師弟呀咱兩個耳鬢廝磨一塊兒十五年了師父臨死之際爲什麽要把三位師叔請來你要好好地想一想歐陽修爲什麽只教你硬功不教你軟功師父爲什麽又費那麽大力氣教你軟功成全於你哥哥我疼愛你但是這裏頭的事情也很多希望你好自爲之師哥您放心我明白好今後一定要謹守門規三位師叔此番前來就聽咱們師父一句話要好好地保護你這好好地保護你裏頭也有你將來享大名的一面可也有約束你的一面哥哥您放心吧兄弟我全知道說完胡林飄然而去了慧斌到了東鳳莊面見哥哥把事情一提天下第一傑方奎很高興兄弟呀你的機緣太好了一個練武的哪有你這樣的福分呐能遇見兩位名師看了看十三節墨魚骨鞭價值連城啊但鍾愛之將不可力敵師父都教給我了我要辭別兄長闖蕩闖蕩方大爺答應慧斌一走三年之久落出個外號叫金雞好鬥雙鋼掌赤膽俠回到金鳳山立起杆子來廣收桃李轉眼間就十幾年慧斌三十八歲出師四十一歲回山到現在五十四歲他哥哥方伯林八十一歲最近有點兒不痛快的事情很讓意斌心裏彆扭爲這個就跟哥哥提了方奎直勸道我勸你你不聽我也知道你這個人倔強咱們到兩界嶺西鳳寺看看你師哥秋禪去讓你師哥替你出個主意應當怎麽辦金雞好鬥雙鋼掌赤膽俠高僧慧斌點了點頭哥哥我也不是想不開不過這件事情您兩頭爲難那頭麽是您哥哥這頭麽是兄弟我一般遠好吧咱們到西鳳寺跟我師哥西風長老秋禪商量此事軍刃帶好了老哥兒倆打廟裏頭起身形直奔兩界嶺西風寺順著山道可就來到西風寺的門口山門洞開著往大月亮地裏一瞧那月臺上有人動手師哥西風長老秋禪大僧袍撩起來會鬥一個年輕的壯士看這個人出手不俗慧斌也看出來了這是本門本戶之人月臺下頭還有幾個年輕人站著觀陣哥哥咱們看看去方奎這才高聲喝喊高僧啊月下與何人動手海川縱身形出去又手一合看住門戶大和尚秋禪也往後一撤步合掌打問訊張方九齡孔秀這些人可看真了一個白髮蒼蒼的老人笑容可掬十分忠厚後頭這個大麻臉和尚面門上這條子肉撲嚕嚕亂顫凶極了海川一瞧喲這都是誰呀老哥兒倆一拔腰上月臺了秋禪長老跟方奎哥倆見面慧斌和方奎都給秋禪長老行禮秋禪伸手相攙起來起來你們哥兒倆怎麽這麽閑在呀嗷我們哥兒倆到這兒瞧瞧您來很長時間沒有來想師哥您了這個年輕人是誰您怎麽跟他們打上了咳我給你介紹介紹童俠客你請過來這位陝西鳳翔府東鳳莊的莊主三清教長教的道門門長歐陽修歐陽老劍客爺的嫡傳弟子天下第一傑方奎方伯林這位是我的師弟姓方名傑字伯生出家的名字叫慧斌闖蕩江湖有個美稱叫金雞好鬥雙鋼掌赤膽俠他們是親哥倆童林一聽哎呀本門本戶啊急忙搶步進身躬身施禮道高僧晚生童林拜見童海川這人就這樣好不自大慧斌就這樣不好十分自大慧斌知道童林是我三師叔的師孫江西臥虎山老觀主尚道明何道源的弟子我的師侄彼此行禮各道寒喧才細問經過西風長老秋禪都說了方奎一聽道口哈哈哈童俠客你們哪兒有這麽請人你是請人家西風長老秋禪介紹擺亭人按理說你是官人這是公事可有一樣你們是懇求人家來的哪能到這兒把人家徒弟打了海川到現在也說不出什麽來道方老前輩您說得對還是我弟子一時無知事情已經過去我給高僧賠了禮無奈高僧不樂意非要動手一戰不可所以我跟高僧勉強地奉陪奉陪並不是要分一個強存弱死真在假亡方奎聽了很好童俠客你小小年紀奉師命興一家武術武功一定有獨到之處聽說你在北高峰獻藝賀號得了鎮八方這麽大的一個美稱我八十一歲了才得了一個天下第一傑我跟你比差得遠剛才高僧跟您動手我瞧了半天一時的技癢難撓我也斗膽打算請教請教童俠客咱們也是點到爲止誰勝誰負本無關童俠客你看可以嗎海川一想事到如今我也不得不硬著頭皮上了我在人家金針道長韓景和眼前說下了浪言大話我請不來秋禪長老那怎麽算呢老前輩您是前輩弟子是末學後進既然如此我願奉陪不到之處請多原諒哈哈哈童俠客你太客氣了這麽辦吧你們爺兒幾個都往後慧斌秋禪這些人都往後退張方可爲海川擔心呐這樣行嗎您瞧這大鐵塔麻和尚一定厲害他哥哥也不含糊月亮地下邊天下第一傑方奎方伯林往前一搶身左手一個引手上左步跟右步腳踏中宮右掌反過來往前一搶身叫進步撩陰掌海川就勢上身雙手不動左腳紮根右腿擡起來拿腳後跟一挂人家方奎的右臂唉踢彈掃挂方奎往回一拽手的時候海川往下一落右腿雙拳走雙風貫耳對準方奎的左右太陽穴就來了方奎往下一矮身縮頸藏頭躲右腳一個坐腰掃堂海川腳下一點長腰起來雙方彼此看住門戶當場道請打在一處雖然說不是仇家有道是當場不讓步舉手不留情當著這麽多人誰來個屁股蹲兒來個趔趄也不大好看呐都是各自用心海川八卦綿絲盤龍掌施展開來腳踩八門招隨身進掌法神出鬼沒方奎一瞧人家童林小小年紀有這麽好的武功可真是不得了哇自己不往裏進招只好封閉躲閃看管定勢不求有功但求無過耐戰三合慧斌見哥哥贏不了童林邁步往前來啊哈童俠客武術高強內力充沛青