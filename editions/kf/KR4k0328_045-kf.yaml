body:
  text: 第四十五回尋兇手千里入京師收弟子征服鐵羅漢上回書說到神龍手歐陽義士帶著布鋪掌櫃的飛奔篩月庵他們來到東殿的後窗下何瑞生一指老義士您看燈光大概林寶已到歐陽君知道瑞生無能可他的膽子比天大林寶心毒手黑怎能叫他涉險呢便道何掌櫃你不要往前去在此等候吧待我到廟裏去捉拿這個混賬王八羔子林寶去何瑞生答應歐陽君一伏腰來到山門拔腰蹬中脊聽東殿林寶跟小尼姑正在說話林寶說鳳清躲災避禍我要去北京可把你抛下了阿彌陀佛親人你可不能走咱們倆熱熱呼呼的你要走把我帶去我也逛逛北京難道北京還沒有尼姑廟嗎林寶搖頭那怎麽成我現在急如星火那多危險呀鳳清把林寶狠狠拉住道你哪能走哇你要走就得把我也帶上她拉著林寶不讓走歐陽君高聲喝喊林寶混賬王八羔子這場官司你就給我打了吧哪知道林寶噗地一下把燈吹了鳳清抱著他不鬆手林寶一怒撲哧就把這個不守清規的小尼姑給殺了然後擰腰從後窗戶出去了歐陽君腳底加力追趕白玉人林寶追著追著到了一個小村子裏三轉兩轉沒有了何瑞生說哎呀他一定從這裏往北京跑了歐陽君憤憤地道我一定到北京找到他把他拿住歐陽君回到家中把自己的軍刃帶好銀兩帶足奔了北京曉行夜宿非止一日來到北京城在廣安門裏找店住下每天出來在熱鬧場所尋找林寶這天走到前門大街看見賣檳榔的歐陽君一高興想拿他開開心結果在天壇跟任元打上了直到來至飯館吃飯任元想起來了他不是隱賢村歐陽德老前輩的後人歐陽君嗎歐陽君也在想他不是仁義村的清風羽士任元嗎如果要真是他嘛我這個跟頭可就栽大了兩人同桌共飲時歐陽君先說我問問你我們兩個人打了半天架了你叫什麽名字住在哪里呀你要問我嘛我住在會稽縣北門外六十裏仁義屯我叫任元人稱清風羽士歐陽君心想糟了便說道我也是會稽縣人氏人稱神龍手歐陽君哎呀老弟呀真是不打不相交兩個人過來彼此見禮歐陽君說我栽了跟頭了我這個大褂是你給撚的哎呀不錯的你撚檳榔嘛我就撚你的大褂我這是對你幫助幫助你幫助我嘛爲什麽要偷我的銀子偷你的銀子嘛我是想幫助幫助你你全是爲幫助我好了你幹什麽來了任元就把神鏢手袁泰父女二人被惡賊白玉人林寶致死的經過都說了最後問道老弟你幹什麽來了我也是爲這件事情來的啊兄弟你在哪旮裏住著我在廣安門裏您呢我嘛我在北新橋那裏住著呢好吧你不要回廣安門了跟著哥哥我走吧你還不把我的銀子還給我嗎任元也樂了把銀元包拿出來交給神龍手歐陽君哥兒倆一前一後打飯館出來順著紅橋磁器口一直往北進哈德門走東單忽然發現一條黑影唰地一下過去了哎呀兄弟這是混賬東西小冤家白玉人林寶哇兩人就跟到金魚胡同王倫王子延的家林寶到王倫的家裏幹什麽來啦原來林寶拿著破壞星王均的信來到北京城德外甜井村闞子良的家門口一看不料門上貼著十字封條林寶可就愣了這是怎麽回事呀他跟別人打聽可誰也不知道來到北京城舉目無親打聽不著人這怎麽辦呢來一天來二天來了幾天他發現遠處有個拾掇鞋的鞋匠三十來歲坐在馬紮上給人修鞋林寶過去了師傅您是本地人嗎啊不錯我是本地人我跟您打聽打聽這闞家怎麽叫人家貼封條查了這個皮匠翻臉看了看他問道你打聽他幹什麽呀我打算見見他這皮匠把攤收了放在一戶人家存起來跟林寶兩人來到背靜處才問林寶您跟他什麽關係我跟他不認識有朋友寫了一封信讓我到北京城找他我是江南人嗷您趁早甭找了我是他的踩盤子夥計他已經打了官司叫官府抓進去了林寶一聽這怎麽回事因爲他得罪了金魚胡同王子延王子延在北京城是個有名的把式匠人家是個正人君子結果拿著名片到宛平縣把他告了這姓王的這麽凶他怎麽把我的朋友給害了我找他去北京城可藏龍臥虎你不用管了說完林寶就跟皮匠分手了林寶來到金魚胡同離王倫的家不算太遠了忽然間由東口裏頭往西一拐來了一輛轎車轎車的右面車轅上坐著一個女傭人乾乾淨淨把式搖鞭趕車進了胡同口後邊有一個騎著馬的旁邊有兩個家人正是王倫親自帶著家人車輛趕奔南頂村姥姥家接妹妹香姑回府來到家門口王倫可看見林寶了林寶不動了站在旁邊看著這輛車王倫一看就知道他不是好人把式搖鞭趕車到了門口大門開了打裏邊出來幾個傭人和丫鬟把這車轅的接腳凳拿過來放在下邊一挑簾女傭人把姑娘香姑攙出來了林寶這麽一看魂飛千裏外魄散九重天呐真沒見過長得這麽俊美的女子面似魚嶺梅花腰如隨風楊柳婆子丫鬟簇擁著衆星捧月把姑娘攙著到院裏林寶心想他們家有女眷今天晚上我就來殺他的全家林寶拿化石粉在牆外畫了個記號就我地方躲起來了等到晚上林寶從哈德門來然後把化石粉全擦掉拔腳上房進去了王子延是練家子早看出林寶不是好人就傳家裏人連同妹妹帶婆子丫鬟天一黑把燈吹了在屋裏睡不著忍著不准走動不准出聲不准有光亮摸著黑躺著大傢夥兒也不知道出什麽事了王子延把軍刃帶好了就在西山牆一蹲把槍一立往四外看著果然林寶來到院中他從西邊往北一走王倫給他一槍這一槍險些把林寶給挑了杯寶腳尖一點地長腰上東房東房上喊哎呀林寶哇你這個混賬王八羔子官司你打了吧讓人給踹下來了上西房西房上喊哎呀林寶你這混賬王八羔子你往哪里跑呀也把他踹下來了他上南房海川抱著兵刃譜等著呢林寶知道一個是清風羽士任元另一個也是他們那地方有名有姓了不起的人物神龍手歐陽君底下這是本家主人要跑嘛我只有往南跑想到這兒林寶劈頭蓋頂就給了海川一刀海川一斜身一擡右腳林寶的刀就飛了左腳一勾右手一扣一跨步把他就勢按在那裏了抹肩頭攏二臂四馬倒攢蹄海川把他給捆上了右手一提拎對王倫說道王掌櫃的認識我嗎啊王倫一瞧哎喲俠客爺過來就磕頭海川把林寶放下伸手攙起王倫道哎呀請起請起這時候任元歐陽君也從房上下來了海川問你們二位和好了任元歐陽君把自己的事情全說了海川和王倫才知道被捆的這位是鏢打恩師逼死師妹的惡賊人白玉人林寶王倫進南客廳把燈點亮了挑簾櫳把三位俠客讓進去王倫真沒想到一夜之間能會到三位英雄著實地高興挨著排地見了禮海川想領著我溜城牆的是誰呢王倫立即吩咐廚房預備酒席款待三位俠客爺歐陽君問俠客爺您從哪兒來呀海川就把買完了兵刃譜回家走到前門大街打算逛逛天橋沒想到走到珠市口大街發現他們老二位在那的事情說了一遍歐陽君臉一紅哎呀俠客爺我們哥兒倆丟人的事情都叫您看見了你們二位丟人的事情我看見了可是我童林丟人的事情你們二位沒看見人家給我大褂底擺上拴了城磚掐了我的辮穗我都不知道領著我二次溜城牆難道這些個事情不是我童林丟人的事歐陽君任元早就聽說鎮八方紫面昆侖俠童林這人物了今日一見果然是位英雄人家露臉的事敢說丟人的事也敢說任元道童俠客爺真是人外有人天外有天呐據我想這個人領著你溜城牆是說明他的腳程嘛還可以但不一定有多大本事要是說大褂底擺拴城磚掐您的辮穗我想這還是別有高明人吧他們正說著話夥計進來了把桌子往前搭迎面桌子後頭放一把椅子東西兩面各放了一把椅子一個凳放在北面主人王倫坐下讓了半天海川居中坐下了身背後是架幾歐陽君任元對臉坐下酒宴擺下山珍海味水陸雜陳雞鴨魚肉冷葷熱素往上一端老四位恨相見之晚歐陽君一抱拳道哎呀童俠客我和任老兄早就久仰你的大名了兩次杭州擂獻藝賀號這是出在我們杭州地面呐這些個事情我們哪能不知道呢早就想拜訪拜訪可惜沒有這麽大的福分沒想到在王朋友的家中遇到你了俠客爺您奉師命興一家武術當然您那八卦綿絲盤龍掌嘛那是武林獨到的功夫您盡認爲得意的還有什麽呢海川趕緊伸手相攔你們二位都是武林的高手在下哪有什麽得意的功夫要說我童海川別的是不行不過我從師學藝十五年繞樹行動我的腳程還是可以的剛說到這裏沒想到當院有人說話了腳程快未必吧海川一擡頭心說這位說話的大概就是領我溜城牆的吧院裏的人一陣亂海川一回身就把兵刃譜夾到胳膠窩底下了墊步擰腰噌地一下就到了桌前腳尖一使勁一縷輕煙就出去了擡頭看那人在東邊等海川拔步上房那人抹頭就跑海川心說今天還能讓你跑了嗎海川下了房順著長街腳底攢勁唰啦啦也一直往正北奔四牌樓下來了掉頭往東海川一瞧沒錯了又奔城牆果然到了城牆底下那位施展狸貓登樹之技就上去了海川心說得了又領著我溜上城牆了打東北角奔西北角三轉二轉又來到崇文門海川再看這人又沒了哎呀滿天的星斗海川對天長歎呐有心再回金魚胡同王倫的家可能人家歐陽君任元已經走了海川便無精打采從城牆上下來順著大街一個人慢慢行走來到自己家門口也沒叫門越牆進去等進自己的屋摸黑稍事休息休息天就亮了再說歐陽君任元熬到天光亮殘席撤下後歐陽君道我說王兄啊我們弟兄兩個感念您的照顧哇來吧搜一搜賊人的身上把林寶的身上這麽一搜搜來搜去搜出不少的東西來主要有一封信就是破壞星王均介紹林寶的經過到北京甜井村找闞子良王倫一看這封通道把信交給我吧有這封信闞子良就出不來了非得殺他的頭給本地的老百姓平一平民憤任元說王兄啊這個您拿著吧我們沒有用我跟您打聽打聽我們要交本地面的話我們到哪兒去您可以從交道口南大街奔大興縣去交差好啦任元歐陽君道了謝把林寶扛起來奔大興縣衙門北京城是順天府天子所在地從地面上來說也是府縣順天府代管二十四州縣那麽北京城這個地面歸兩個縣管就是大興和宛平東南兩城是大興縣西北兩城是宛平縣宛平縣的縣衙門在交道口往西大興縣的縣衙門在交道口往南路東頭兩人來到大興縣衙門大興縣正堂名字叫賈俊兩榜進士出身任元就把事情說了這個小孩八歲時要飯長了滿身的疥瘡我哥袁泰把他帶回家治好傷收爲徒弟教他十一年能耐最後他喪盡良心鏢打恩師逼死師妹我是個義務人奉太爺的海捕公文捉拿林寶讓他歸案我請出朋友歐陽君一同來到北京城才把他拿住林寶這小子一聽嚇壞了哆裏哆嗦大興縣準備了一輛囚車派了四名押護兵備好了公文二人辭別了大興縣府衙押著林寶直奔浙江再說海川三次溜城牆自覺能力還差呀所以白天爺兒幾個練功晚上海川還在王府的花園假山前頭練夜功今晚練完了雙鉞把小包袱放在地上又把秋風落葉掃大寶劍從腰裏亮將出來欲練八仙劍一百二十八趟就在這個時候猛然間假山旁邊有人喊好劍海川一擡頭就瞧這個人沖自己一豎大拇指抹頭就跑躥縱跳躍上了府裏頭的高房海川也就閃電般追上去了上了北城牆海川一想這人又要領著我溜城牆了今兒我要追不上你還叫什麽鎮八方紫面昆侖俠呀海川一抽寶劍腳底下用力打西北角往南這麽一轉借著星月的光華看清楚了這個人穿著一身土黃布腰裏紮著青褡包身上披長衫辮子盤著一邊跑一邊偷偷地回頭豎大拇指海川也憋上勁了沙沙沙走到西南城角上這個人順著城牆拐彎海川心想我要在後面追你定追不上了非得走一條近道他斜著腳尖一點城牆燕子三抄水往南邊的城牆上跳這人拐過來正被海川迎住他往東一跑海川噌就過來了這人一看海川跑到了前頭回頭就跑跑著跑著順著城牆掉下去了海川一看這人沒了自己感到面紅耳赤沒法子把軟劍鞘拽下來把寶劍撞上往身上一圍自己溜溜達達往回來從北城根下來越大牆進了貝勒府到自己府裏休息越想心裏越氣次日早晨底下人進來道教師爺門口來了三個人找您海川趕緊到門口迎接到了街門一看上垂首是個大高個海川認得這是李鐵拐斜街的石勇石玉山下垂首瘦小枯幹的這位是他的表弟千里獨行馮昆馮永志下垂首當中這位是誰呀晃蕩蕩身高有九尺左右跟自己的傻徒弟甘虎傻師弟于恒差不多黑森森的臉濃眉大眼鼻直口方大耳垂輪青鬍子茬一條大辮子在脖子上纏著還挺精神原來這人姓吳名字叫吳成有個外號叫鐵羅漢他們家在北京城裏房子有上百所買賣鋪子大小好幾處德勝門外水旱豐收的土地不下百頃是了不起的財主他父母全都沒有了就是他一個人家大業大騾馬成群使喚人也很多他一輩子什麽都不喜歡就好練武他師父姓杜名字叫杜清風江湖人稱雲霞道士後來有人跟他提說李鐵拐斜街住著一個姓石的外號叫鐵熊功夫棒著呢他不服就找石勇去了到了石勇家門前啪啪一敲門底下人把門開開喲這位爺您找誰呀你們家裏住著一個姓石的嗎叫鐵臂熊石勇石玉山不錯您呐是我家主人好我家住在德勝門裏果子巷扁擔胡同我叫鐵羅漢吳成你把他找出來我把他背個跟頭您候著吧夥計撒腿往裏跑來到後廳大爺二爺你們哥兒倆快出去瞧瞧吧果子巷吳家的少爺鐵臂羅漢吳成說要把您給背個跟頭石勇和馮昆趕緊跑出來了到門口一看喝真叫棒這個人就跟半截大黑塔一樣石勇也有點兒含糊了忙說貴足蒞臨賤地恕兄弟未能出來遠迎當面請罪哎你也別客氣小子你不是石勇嗎不錯是我你知道我嗎您不是德勝門裏扁擔胡同的吳老師嗎老師咱不敢當鐵羅漢我叫吳成聽說你有點兒功夫我惦記著把你背個跟頭您請進來甭進去我把你背倒了南北二城就得屬我石勇這麽一瞧來者不善呐我要是和他動手不定準贏得了他哎呀這怎麽辦呀千里獨行馮永志這個人心眼多哥哥您先等一等吳老師您就在這跟我哥哥動手嗎對背完了他背你你叫什麽名字我叫馮昆馮永志嗷好嘛把你們倆人都背了這南北二城咱就第一馮昆嘲笑地說道哈哈您背我們倆呀您背我們四個南北二城您也考不了第一不瞞您說北城牆根有一位鎮八方紫面昆侖俠童林童海川那才是咱們北京第一流的真正把式匠我幫您通個信您要把他背倒了您才是真正南北二城的第一名要是背不了他您就是把我們兩人宰了您也數不了第一吳成聽完支吾道這我不認得人家不認識不要緊我們哥兒倆認得呀那好你們哥兒倆同我去吧於是三個人穿大街越小巷趕奔北城根來到雍親王府海川家門前馮昆過來道童爺我們給您行禮了海川伸手相攙二位起來二位怎麽這麽閑在呀我們來半天啦聽說您會客呢我們沒敢進去打擾您呐來我給您介紹一下這位是德勝門裏果子巷扁擔胡同吳家的少爺姓吳叫吳成有個外號叫鐵羅漢海川一聽就有點兒不樂意問二位這是什麽意思呀吳成搭茬了什麽意思啊告訴你人家跟我說馮昆石勇這二人是北京城第一流的把式匠我把他們兩人揍了我就可以考第一結果我上他們兩人家去了他們倆不敢動手他倆說甭說我把他們兩人揍了就是把他們兩人宰了我也考不了第一說揍了你才能考第一我們就找你來了海川對馮昆和石勇說我跟二位都不錯二位爲什麽同著人家師傅奔我寒舍來人家是找你們的馮昆急忙解釋說就這一位童俠客爺說真的我知道扁擔胡同吳家是有這麽一個把式匠大概就是他我們哥兒倆惹不起他惹不起他你們哥兒倆就往我這送嗎二位今後可不准咱們就這一次海川又轉臉對吳成說吳師傅你要打算跟我討教討教武藝還可以但你要說打敗我童林你就在北京城考第一了那不成北京城藏龍臥虎出名的把式匠有的是這個你說這個倒也對童師傅看起來你倒是個好人那咱二位動動手吧考第一不考第一的單說我既然來了就惦記著跟您試吧試吧這個可以請吧四個人一塊兒進了院子來到客廳前頭徒弟們都出來了往旁邊一站等著看熱鬧海川說吳師傅你大老遠的找我來咱二位比個輸贏勝負總得挂點兒彩甭挂彩我贏了你的算白贏你贏了我我趴地下磕頭拜你爲師你看好不好海川一想這便宜我可占大了他贏了我算白蠃我贏了他他給我磕頭拜我爲師就說那好吧咱們一言爲定吳師傅您進招來海川在北邊臉朝南一抱拳鐵羅漢在南邊抱拳說好了既然如此那咱就不客氣了說著話吳成左腳一趕步左手一晃門面舉右手泰山壓頂就是一拳海川輕輕地向左一滑步用左手一立拿左手掌一劃吳成吳成的胳膊剛要往回抽海川的大手就到了接著就是一掌這是人家八卦掌麒麟吐書的招數吳成滴溜一轉身左胳膊往前一支墜肘沈肩兩隻手往自己胸前一抱合適了靠山背順著右脊背一撞海川的胸口海川退左步一閃身他已經撞空了海川用左右手一抄他的小肚子借勁使勁砰就打上了就這一下撞吳成的勁兒也真足真巧海川這麽一發力塵土飛揚碎磚頭末子亂蹦再找這吳成蹤影皆無
