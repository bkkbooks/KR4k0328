我沒有孝順過師父他老人家偌大年紀我不忍心去找麻煩你錯啦我侍候老爺子幾十年他的爲人我明白他沒事不惹事有事不怕事你這件事不經過他老人家絕對完不了你是他徒弟他也絕不會袖手旁觀你寫信吧不清楚的地方我替你代稟黃燦無法把信寫好讓三虎帶路費來到侯家莊三虎沒想到這裏正招待王爺李源海川他們哪三虎說了以上經過王爺他們一聽也很生氣老俠聽完卻徽微一笑你下去休息然後帶路費回去見黃燦告訴他我很快就去杭州見面再談吧王三虎答應著行禮出去王爺可就怔啦心想老俠已經答應海川拿二小請國寶怎麽又答應徒弟鎮擂哪王爺不好意思問他用眼看李源李老俠可就明白啦他一抱拳哥哥我問您一句話老俠點頭大弟請講吧您已經答應海川賢弟捕盜怎麽又應黃燦賢侄的擂臺呢老俠笑了笑說大弟有所不知韓寶他們盜國寶留的字箋上有一句棒打三江任縱橫看來他們在三江地面有朋友他們作案後絕不敢回雲南我知道李太極門規極嚴看來他們只能在外面漂遊只能去三江躲避這是第一還有他們既然在你府上行刺看來這二人仍在附近我們去杭州鎮擂實際引蛇出洞這是第二還有海川要獨興一家武術擂臺能招來四海人物可使海川多與武林接近多交朋友才能立足武林哪這是第三第四既然海川隨著爺駕離開北京爺駕又喜歡武林一道也讓爺駕耳聞目睹一些武林俠義道的情形何況海川原來還要賀個江湖美號戴一朵守正戒淫花這些都必須由你我弟兄完成大弟你想過沒有如果由你我弟兄出頭遍撒書箋人家還有個瞧得起瞧不起咱們呢如果借著杭州立擂不就省了你的事了嗎王爺李大弟海川你們爺仨聽我這話對不對王爺聽了心裏很感激老俠心細如發辦事周到太好啦本爵明白老俠客的深謀遠慮拿二小請國寶事當然重要可實在拿不著他們還可以去雲南找到他們家的大人去要嘛而這杭州擂對海川初入武林倒是個千載難逢的良機本爵謝謝您也替海川謝謝你們九位說著就作揖海川也感激地站起來給兄長磕頭飯畢大家喝茶暢談老俠又叫阮和阮壁等收拾東西物件以及衣服行李準備了馬匹又陪著王爺來到村口外轉了個大圈兒侯家莊周圍也是大樹叢林環繞風景十分優美王爺遊興很濃又逛逛有巢氏的墳墓明堂河水碧綠澄清遊魚可數直遊到夕陽西下才回到家中侍候王爺擦臉漱口掌上燈來擺好酒席牛羊二肉酒過三巡菜上五道正在這時候就聽見噹啷啷外面響起了急促的鑼聲這是村中救火的鑼聲阮和從外邊進來說師父侯家莊周圍起火老俠一聽站起來連王爺都往外走海川把鉞包袱打開懷抱雙鉞也走了出來站在院中一看天都紅啦分西北東三面燒的一片救火的喊聲其實海川一出來就聞到硫磺硭硝的味兒很大知道這是有人故意放的火老俠客侯振遠能聞不出來嗎老人家心裏不是滋味多年來侯家莊百姓由於我弟兄在此居住連個草刺都沒損失過怎麽今天王爺來啦倒有賊人放火臉面何存李源賢弟你在家中保護王爺二弟侯傑你帶閻保鮑信侯俊侯玉張旺還有一部分家人分頭救火告訴鄉親們只保人口平安房屋柴草被焚事畢皆由我弟兄賠償是阮和跟你師弟保護家宅是老俠一回頭海川隨我來說著一按劍把右手一撩長衫嗖地一下直奔西箭道哥倆一前一後越過花園大牆後面一片火海街坊鄰居都在救火海川納悶兒哥哥要上哪兒原來侯家莊西北方向有一片丘陵最高的有十幾丈高老俠想仇人放火火燒起來他們很稱心快意必要找個高處瞭望這個地方最好不過哥倆剛穿過一片小樹林借火光擡頭看喝海川這高興啊上邊果然站著四個人海川認識倆侯老俠認識倆海川認識的兩位元是韓寶吳志廣那兩位都在二十歲挂零一身夜行衣斜背小包袱背一口鋼刀原來韓寶吳志廣已經知道李源帶王爺他們去山東巢父林兩個人一商量他們決定暗中跟隨趁機下手行刺就這樣來到東昌府城中他們到東大街一看路邊有座飯館裏邊刀勺亂響香味飄溢字型大小是醉月樓門口十分潔淨門上有一副對聯上聯是猛虎一盅山中醉下聯是蛟龍半盞水底眠韓寶說哥哥咱們先吃飯吧吳志廣點點頭兩個人一進屋夥計就迎來二位爺台樓上請上邊涼快座位也寬敞樓上看座位上邊一搭話兩個人便走上樓去樓上有雅座也有散座二人找了個靠窗的地方夥計擦抹桌案端酒上菜兩個人很快吃完夥計算賬吧夥計樂呵呵地搖頭爺台有朋友候您二位的飯賬啦兩人都一怔人生地生誰候賬呀這時候雅座一扯簾兒出來二位少莊主爺我們小哥倆給您請安啦說著話就行禮韓寶他們一看認識八卦山後莊菜園子的小頭目過牆小蜜蜂吳得玉窗前一枝花柳未成他們家住巢父林外東北三十裏地的李家台十幾歲就不學好男人堆裏不走女人群裏晃悠所以才得這麽個外號後來他們想拜侯老俠爲師寫好門生帖來到侯家把禮物獻上家人給他們一通稟侯老俠叫他們進來老俠一看這倆人獐頭鼠目尖嘴猴腮二目無神面色蠟白一看就知道不是好東西問他們叫什麽名字二人報名姓還提外號老俠大怒派人把他們倆轟出去禮物給扔出去吳柳自討沒趣便記恨在心柳未成還有個弟弟也叫他們倆給引壞啦兩個人想到外地去投師這才到了雲南來到金家渡口在金家酒店喝酒金榮金亮一盤問才知道倆人訪友不遇這樣兒把他們帶進山來被八莊主田方派去後莊管理菜園子一呆四年這才想回家看看途中他們在醉月樓吃飯巧遇韓寶吳志廣四個人見面倒很親熱他鄉遇故知麽吳柳說是探望老家的又問韓寶怎麽到了山東我們跟著童林來的柳未成也高興啦您二位幸虧遇見我們兩個不然進不了巢父林哪我們也跟侯振遠有仇這回一塊幹吧四個人商議好出了醉月樓買了四十根長香四十斤硫磺硭硝到了侯家莊他們一起看了地勢晚上把引燃的東西分成四十份一個人點十份完了以後到西北角見面居高臨下看熱鬧四個人分頭行事各自點火等四個人來到西北土山頂上又等了一袋煙工夫火才著起來火大無濕柴四個人正看得痛快老哥倆就到啦海川道內有盜寶賊人侯振遠一回頭愚兄知道你喊什麽老俠客一按劍把左手一托劍鞘大拇指一頂崩簧嗆亮亮龍淵古劍離鞘猶如一道立閃寒光刺人二目侯振遠蠶眉直立虎目圓睜要劍斬二賊
