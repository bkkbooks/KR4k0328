body:
  text: 第七回童海川收徒李家店侯振遠應邀巢父林上回說孔秀在常州行竊姑娘用彈弓打他啪啪啪孔秀的脖子後腦勺脊梁骨屁股蛋這一陣彈弓可把孔秀打得夠嗆哎呀要了我的命了這位姑祖宗打得真准孔秀慌不擇路他往後院跑姑娘追著打正好後邊是一趟街東門外正對著路東的清真飯館滿春園趕巧樓上有個年輕人看上去二十多歲正扶著欄杆往胡同裏看一眼就看見孔秀往胡同口這邊跑這個年輕人扶欄杆一飄身唰地一下翻身進了胡同口張開雙臂把孔秀給攔住了孔秀一看這個人七尺上下細腰窄背身穿藍綢子長衫白綢子褲子汗衫兒腰系絨繩緞靴子高桶兒白綾襪子鬆散地梳了一條漆黑油亮的大辮子面如冠玉劍眉朗目鼻直口正大耳有輪是一個倜儻的英俊青年後邊這個姑娘邊追邊喊師哥這個人上咱家窺探被我給追出來了年輕人說了一句知道了看了看孔秀便問你是哪的朋友爲什麽越禮胡行我們家中只有小妹在家你因何前去孔秀一瞪眼混賬東西你不要多說我是正門正戶的管你什麽姑娘不姑娘的因爲她是個小姑娘一個人在家我若下手多有不便要是你在家那我早就偷你個混賬王八羔子了年輕人也大笑起來朋友這一說你倒有理我們倒沒理啦一點也不錯的我又沒拿你們什麽東西可是這個小姑娘打破了我的頭還要追著打你又來截我天底下還有好人走的道沒有這姑娘聽了也不敢笑怕師哥數落自己這年輕人把臉一沈你偷盜竊取反而有理你叫什麽名字孔秀伸手把搖山動拿出來往自己襖袖上蹭一邊蹭一邊往前走你要問我姓孔名秀字春芳任你走遍天下無遮攔探囊取物字還沒說出來冷不丁兒用小刀對準年輕人的胸前便紮孔秀原以爲這個年輕人沒有經驗哪知道他受過高人傳授只見他不慌不忙用了一招斷掌啪地一下鐺啷啷把小片刀打飛臥腰一腳嘭地把孔秀踹出一溜滾去哎呀孔秀想要起來辦不到了年輕人一個箭步過來磕膝蓋頂腰眼兒抹肩頭攏雙臂把孔秀給捆啦就在這個時候南牆上有位老人家咳嗽一聲孩子們黑夜之間與何人動手男女二位都叫了一聲師父您快來也沒看見老人家怎麽晃身離孔秀有三丈挂零一陣風似地就站在了孔秀的身旁孔秀嘴可不閑著我說這位老爺子您給說句好話把我的綁繩解開我好給您行個禮免得叫您挑眼呐老人家一聽大笑起來把這位的綁繩解開年輕人過來給孔秀解開孔秀站起來一看這位老人家是個大身材猿背蜂腰身穿藍綢子長衫挽著袖口腰系駱駝毛繩白綢子小褂藍綢子中衣兒高桶白襪子寸底福字履赤紅臉頭頂全歇了白剪子股小辮垂於腦後兩道蠶眉雙鬢斑白壽毫長到唇邊虎目如燈鼻如玉柱唇似丹塗一副銀髯滿胸前不散不亂真是發欺三冬雪須壓九秋霜老馬嘶風雄心不減孔秀說老爺子老前輩小子給您叩頭了起來起來老爺子貴姓啊老人搖搖頭你姓什麽叫什麽有門戶麽師承誰呀我名叫孔秀自幼父母雙亡拜神手東方朔陶潤陶少仙爲師學的就是偷盜竊取可門規很嚴小子不敢做損陰喪德之事老人點點頭你說得不假不過萍水相逢我想勸你幾句這偷富濟貧恐怕也不是長久之策吧你二十多歲正是年富力強的時候豈能把這錦繡年華白白虛度應該堂堂正正地做番事業揚眉吐氣地走路應該找個安身立命之處陶少仙是你師父這個人品性端正偷富濟貧一輩子結果還是兩袖空空老境堪憐哪你應該另投師門重學技藝找個正當事情幹幹不然日月蹉跎老將至矣那可就一事無成呐我看你是兩隻鮮眼這很難得可不能不用在正途上將相本無種男兒當自強嘛把你的刀拿過來孔秀答應把刀撿起來遞過去道老爺子我聽您的話改邪歸正您可不要殺我再說我這口刀專爲挖窟窿偷人用的也沒有刃哈哈哈老人家一陣大笑冤家老夫殺你何需用刀哇老人家把刀用左手接過來把刀央兒夾在右手中指和食指中間左手一推刀把嘿就看這刀喀喀喀圍著兩個手指轉了三圈兒好麽成了鐘錶的發條啦孔秀看得傻眼了老爺子神力小子低頭服輸了哈哈哈你再看這個老人家把二指抽出來攥住刀把左手在刀把前邊也攥住右手往下拉左手往前一推喇地一下小片刀又直啦哈哈哈孔秀你看如何孔秀咕嗵就跪下啦老爺子我這是太歲頭上動土老虎口邊拔須您老爺子恕罪吧這孔秀哪知道眼前這三位是誰呀常州府北門裏清風巷東口路北第一家住著的這位老人家姓冷名鎮表字遠回江湖人稱百折不撓青雲叟十二劍客裏數得著的上上人物掌中一口劍內外兩家俱臻絕頂挨著老劍客西邊住的是賽判兒飛行俠苗澤苗潤雨的家論輩份論資格苗老俠可比不上冷老劍客苗老俠紅毛寶刀一口天罡刀三十六路也很了不起老妻去世只留下一個女兒名叫飛霞從五六歲就跟隨冷老劍客學藝全憑一口劍一把插把彈弓劍客爺們給起了個美稱叫金弓女二郎今年才十五歲這女子不但功夫好人品也出衆男青年名叫滿玉華是個清真教徒這滿春園飯館就是冷苗二老拿的本錢由滿玉華當掌櫃苗老俠去山東訪朋友冷老劍客在家孔秀畫的粉迹冷老劍客早已發現便到家更囑咐飛霞晚上留神又去飯館告訴玉華你叔叔家今晚興許要鬧賊孔秀一來冷老劍客就看出來是個初出茅廬的人物姑娘在屋裏坐著等孔秀他可就到啦姑娘到屋裏取劍拿彈弓挂彈袋從後面打將出來老劍客爺知道孔秀的能耐不大怕孩子們把孔秀給殺了便制止弟子又現絕藝警告孔秀冷老劍客叫玉華取來紋銀二十兩給你拿了去希望你回頭猛醒萬一偷盜有本領的人物焉有你的命在老夫不是逞強只是讓你明白我謝謝老爺子磕了個頭然後帶起搖山動走啦孔秀離開常州往北走到了揚州拜見老師陶少仙孔秀提起自己挨打的事陶老英雄心中難過也願意孔秀另投老師孔秀才來到直隸清河油坊鎮打聽李源是位有名的老俠他頭頂門生帖兒前來拜師跟李源見面時孔秀把從前的經歷都作了說明李老俠想了想說收下你吧不過今後要改掉你這偷盜惡習沒想到孔秀一學武藝事情根本不那麽簡單李老俠的功夫是硬功孔秀練不了兩年也沒學出一點眉目來孔秀萬般無奈偷了老俠二十兩銀子跑啦李源知道以後這個罵呀好小子竟敢偷師父兔子還不吃窩邊草哪倒是李大奶奶直勸徒弟花你幾個錢你還生氣算了吧孔秀離開油坊鎮已經三年多啦又從江南回到清河想起師父來這樣今晚才趕到油坊鎮遠遠聽到師父在喊他順著莊稼地走出來沒想到叫李老俠打了一棒韓寶已經逃走李老俠把他解開問從什麽地方來師父我從揚州來跟我回家爺兒兩個順東牆走進來先給王爺請安細細地把剛才的事情一說王爺很高興老俠客這倒是件好事咱們的事情好辦了總算知道國寶是誰偷的啦海川問道哥哥怎麽韓寶跑啦又指孔秀這是誰呀李源道海川要不是他我就把賊人給拿住啦他是我徒弟孔秀快給王爺磕頭孔秀先給王爺行禮再給海川行禮王爺很喜歡孔秀李源一想海川正在用人之際王爺也需要有人侍奉何況海川還要自立門戶收桃李哪不如讓孔秀拜童林學點內家功夫老俠便把自己想法跟爺兒倆一說王爺挺樂意海川想了想說哥哥我就先收個記名弟子吧李老俠才讓孔秀拜師孔秀給海川磕了八個頭再給王爺磕然後給李源磕改口叫伯父彼此道喜然後都坐下李源跟王爺商量今晚之事說明不是侯門弟子盜的國寶啦看來我們該著手訪韓寶他們可他們家裏有大人哪八卦山李昆是武林高手我想歸根到底還是要去見李昆王爺如果要見李昆就不是我和海川能辦到的咱們還要去山東見雙俠一定請出侯老哥哥來那是武林中的佼佼者再說還要通過他帶著海川多認識武林高手更需要他幫你創立門戶哇王爺海川從心裏敬佩李源想得太周到啦王爺道李老俠您說得太好啦海川你真得謝謝哥哥海川就要行禮李源拉住說你們爺倆休息明天還要趕路我帶孔秀到後邊見見他伯母去這樣侍候王爺躺下孔秀隨老人家到後面見伯母還有師弟們不在話下一夜無事次日清晨爺幾個吃完早飯離開油坊鎮踏上大道孔秀背著大褥套大傢夥兒說說笑笑頗不寂寞進山東走濟寧州直奔東昌府爺兒幾個正往前走李源用手一指王爺海川請看東南方向就是巢父林王爺一看喝黑壓壓霧沈沈煙巒彌漫一望無際哎呀李老俠怎麽這麽大的樹林哪這個樹林方圓近百里裏邊有百八十個大小村莊鎮店不是本地人不用說人行小路就是大車道也找不著哇嗷這個大森林有年頭啦爺讀書多年知識淵博一定知道相傳有巢氏積木爲巢到他死後後代人就把他葬埋於此所以才叫巢父林巢氏的墳就在林中正北一道大河從東南方向流出巢父林這就是明堂河這裏是水旱保收景致清幽的好地方說著可就來到樹林附近但見森林浩渺樹葉颯颯好不怕人桑柳榆槐松柏應有盡有王爺他們隨李源一進樹林林中濃蔭蔽日雜草叢生頓感涼爽再往裏走只見一片綠油油的莊稼禾苗茂盛水網交錯都是從明堂河流出來的支流百姓日出而作日落而息安然自在離侯家莊越走越近了這不過是百戶人家的小村莊周圍樹林圍繞一條寬敞的街侯家在村西口路北外邊都是土地圈兒裏面全是瓦房大門敞亮座北朝南一邊四棵大門槐路南是個大場院足足有三十多畝門口有不少的長工月工臺階上站著一位一身粗布衣服的老頭鬚髮皆白啦這是侯家的老總管侯寶老侯寶一眼就看見了李源別看這麽大的年紀腿腳很利索趕忙帶著幾個人迎了過來李老員外爺侯寶給您請安您有些日子沒來啦李源可不敢受他的禮搶前幾步攔住道老哥哥您倒好哇託福託福李永李寬過來磕頭侯寶大伯您好侯寶作揖還禮折壽折壽侯寶老哥哥您快到裏邊提一聲我和北京的朋友看大爺二爺來啦是是年輕的攙著侯寶總管往裏走沒想到侯二爺正出來連王爺海川他們都看見啦有這麽句話在家無常禮侯二爺光著膀子手裏一把大芭蕉扇呼噠呼噠扇著就出來啦侯寶喊道二員外爺快換衣服去來了北京的客人啦其實侯二爺已經看見李老俠啦不就是李源賢弟嗎可再一看還有海川和另一位生人老俠臉一紅撒腿往裏跑說話間侯老俠侯振遠帶著弟子們出來啦王爺眼睛一亮只見老俠中等身材身穿米色綢長衫白綿綢褲子汗衫兒白色高桶襪子寸底福字履大紅緞子鑲邊上邊五福捧壽紅緞子沿邊兒雪白的寸底上邊連個泥點兒都沒有頂都歇啦白剪子股兒的小辮臉上皺紋堆累飽經風霜兩道蠶眉壽毫老長一雙虎目含威賽似兩顆明燈鼻如玉柱唇似丹朱一副銀髯胸前飄灑這可就難得啦多數老人下半截鬍子都發黃可侯老俠全是白的不散不亂根根透風形神瀟灑一點武夫之氣沒有文謅謅好像一位教書的老先生王爺再一看這位老俠客左肋下佩帶一口寶劍綠沙魚皮鞘金飾件金吞口藍帶子勒把兒雙垂藍色燈籠穗兒這口寶劍折金斷玉削鋼剁鐵價值連城名叫龍淵古劍老俠客今年八旬開外精神矍鑠按劍把往外走步履剛健面帶笑容李源賢弟李老俠搶步過來跪倒磕頭兄長您倒好哇侯老俠雙手相攙賢弟愚兄怎敢受此大禮託福託福海川趕緊走過來您是侯老哥哥吧請受小弟一拜李源趕緊介紹哥哥這是北京來的朋友童林童海川