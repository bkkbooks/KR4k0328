是常德府北門裏鳳尾巷在下姓白名潔字玉如原來是白恩公您那麽早到城外幹什麽嗨因爲在下好練武所以起得早才與閣下見面這叫千里有緣來相會咱們前生有緣您貴姓啊在下祖居雲南府東門裏我姓李名英字士鈞先父給起的外號叫騰身步月嗷您來到湖南做什麽仇家是誰爲什麽被人家打傷唉在下來常德訪查仇人被他們暗算身中暗器若非恩人搭救焉有命在大恩不言謝在下想與恩公結爲金蘭昆仲不知您意下如何白潔自從見李英言行循禮而且一派英雄氣概現在聽李英一說立刻撩衣跪倒固所願也不敢請耳兄今提出敢不如命哥哥請上受小弟大禮李英也單膝點地雙手相攙兄弟愚兄遇難得結良友平生之幸既然結爲昆仲就在五倫之內從此終身不渝請起哥哥知道小弟府上現有老母門戶雖然單寒尚可得以溫飽弟自幼秉承母訓咱既結義就當稟明老母對應該稟命而行再說也該登堂拜母次日清晨弟兄梳洗已畢白潔一抱拳哥哥娘打發我出來請您呐李英心裏很歡喜賢弟頭前帶路您隨我來弟兄二人一前一後出書房進二門在桌子北邊木椅上坐著一位老媽媽白髮蒼蒼慈眉善目上身穿藍布褂下穿青裙兒看不見腳白潔一指李英娘啊這就是我的哥哥雲南李英李士鈞跟著一回頭兒哥哥這就是咱們的老娘李英搶步近前推金山倒玉柱磕頭就拜老娘在上孩兒李英與娘親叩頭老太太本意就是要看李英的相貌所謂鑒貌辨色觀其外知其內李英從外面一進來老太太一看他步履從容氣度安詳一團正氣雖是武夫可文質彬彬一看就是有家教的規矩人老太太立刻叫白玉如潔兒快快扶起你哥哥老安人面帶微笑我兒請起來坐下談話李英趕緊答言孩兒遵命李英起來在老太太旁邊的兀凳上偏身坐好老媽媽細問我兒家在何方李英欠身回答孩兒祖居雲南府東門裏家中尚有何人父母可曾在堂做何營生老身敢問先父母已棄世多年在世之時在雲南府東門裏開了個雙盛鏢局業已關閉多年現在家中尚有您兒媳一雙孫兒孫女孩兒的事情一時難以對母親說明只是孩兒爲訪仇人來到此地夜遇仇人遭了暗算誤中鏢傷若非兄弟搭救早已不在人世今又蒙娘親相留養傷再造之恩孩兒粉身碎骨也難答報老安人長歎一口氣唉孩子見你舉止談吐知道你很有家教這次逢凶化吉是你父母好善所致我母子有何功勞可言不瞞你說你義父去世尚早沒有三親六故我對於你兄弟未免放縱驕慣今既與你爲友望你替爲娘好好教育今日我把你兄弟託付給你希望你記住爲娘的話才是說完讓白潔拿出兩卷布頭二十兩紋銀送給李英做見面禮這一天晚上白潔睡不著覺三更啦又到書房找兄長論武一看屋裏黑著燈兒房門虛掩心想哥哥累啦不要驚動啦剛要走又一想不對呀兄長是個細人怎麽睡覺不關房門兒我還是喚醒他爲是便低聲喊道哥哥您睡了嘛連叫數聲無人答應白潔推門進來摸著火種點著了燈一看屋裏收拾得很清潔衣服鞋襪都疊放得十分整齊就是兄長不知哪里去了白潔走到臨街的大門一看也關得很嚴緊又到廁所去看全沒有可早晨到書房一看李英沈沈大睡等李英醒來白潔搭茬著問他李英一笑道兄弟知道愚兄是綠林人你千萬不要對我疑心認爲我背著母親兄弟夜至別家非偷即盜那你可就想錯啦綠林人最講義氣二字即使萬不得已的時候我與賢弟是手足桑梓之情鄉里之義就沖你也永遠不會動常德府一草一木哪有在賢弟家鄉做歹的道理呀白潔點點頭李英又提先頭劣兄身中毒鏢是仇人暗算可我哪兒來的仇人因何結仇又爲什麽背井離鄉抛了你嫂嫂侄男女來到湖南現在爲什麽晚上出去這些個你都急於要知道無奈不能現在說給你聽現在說了也沒好處請賢弟相信愚兄是個懂禮的血性漢子永遠也不會違禮而行你想想我要把事情告訴你一旦外漏到那時候不是你泄漏的也成了你泄漏的所以你別再開口我也不再提總有一天你會知道的白潔聽完點頭答應從這天起白潔不再提啦這天吃完早飯李英出去買了一些使用之物等回到書房白潔不在心想到後院內宅給老娘請個安就勢問問玉如幹什麽去啦這樣李英來到內院上房門前娘在屋裏嗎挑簾子進上房先給鄭老安人請安然後問安人兄弟到什麽地方去啦嗨你還不知道啊跨院有兩間功房他去練武啦啊兄弟還練武呐別提啦剛才他跟我說自從你來家中之後高興得把武藝忘了練啦我跟他說古人樂以忘憂樂以忘食你這是樂以忘練這不剛洗完臉就去啦李英知道白潔好武可不知道他會武藝更不知道他是哪一門兒的想到跨院看看告辭出來奔夾道兒有個月亮門兒進了門院子裏靜悄悄有兩間東房房門掩著李英聽見屋裏噗嚕噗嚕像捉雞似的他慢慢地來到屋門外從門縫兒往裏看白潔脫了個光膀辮子盤起來手裏拿著一杆蠟杆兒槍叭叭叭地正擰呐李英看出他是六合槍的套路可一點兒功夫沒有看他練得吁吁作喘大汗直流還是直眉瞪眼地練李英又可疼又可氣氣的是不會假充會疼的是把身體練壞可是一輩子大事李英心說這哪是練武藝簡直是受大罪呀李英等白潔把氣喘勻靜了在門外痰嗽一聲白潔一聽是兄長趕忙把槍放在地上喲哥哥來啦伸手把門開開李英進來沖著白潔一笑兄弟練得好槍法呀白潔聽兄長誇獎心裏好痛快哥哥小弟這趟槍叫六合槍實受高人的傳授小弟也確實下了相當的功夫才練得不錯了說真的五冬六夏也真不容易您在門外看了半天啦您是大行家您看還可以嗎李英一聽還自誇其得呐便沖著白潔微笑不語白潔怔啦哥哥您笑得我直發毛難道不好嗎賢弟愚兄不是譏笑你也不是戲言我真不當說你這功夫只占兩個三字李英左手伸出來三個手指反復擺動說你這功夫練好了費飯練不好把身體就搭上啦啊那您怎麽說兩個三字嗨賢弟這兩個三字就是從生下來練三天練到死後接三天都白費勁呐玉如一聽臉上有點不高興就問哥哥您說小弟功夫不成怎麽練才成啊李英忙回答道你也別多心也別灰心喪志有道是破釜沈舟苦心人不負有心人但是你既不得其門也不得其法這樣吧我把練槍的規矩說一說再給你練趟槍看看槍乃軒轅皇帝所留槍爲左兵之祖大刀乃右兵之帥凡是練槍的武師都要講規矩穿上長大的衣衫沒有像你這光著脊梁練的還有練槍專講槍點槍眼所謂槍走一條線可我在外邊聽你練槍就跟捉雞似的連個槍點都沒有這不是瞎鬧嗎我說賢弟你不信我練趟槍法你看看說著李英食指拇指一捏槍平著就把槍拿起來就這一下白潔的眼睛都直啦李英左手一搭槍桿賢弟快穿好衣服我給你練趟槍白潔高興辮子放下來長衫穿好往旁邊兒一站就看李英左腿蹦右腿弓二目凝神陰陽把一合噗嚕嚕一顫槍真像玉蟒翻身金龍探抓一紮眉心二鎖喉三紮肩肘四勾頭五胸六肋七雙腿八九十狸貓撲鼠霸王卸甲金雞亂點頭裏撩外滑崩砸窩挑吞吐撤放槍招完全展開開始一招一式白潔還看得出來後來只見一片槍尖兒遍體紛紛如飄瑞雪白潔感到眼花繚亂驚訝萬分李英練的是李家家傳的秘譜三十六手絕命連環槍李英練完收住招數氣不湧出面不改色連個汗珠兒都沒有賢弟看哥哥我練的這趟槍怎麽樣白潔乍撒兩手哎呀兄長的槍法與小弟所練有天淵之別真是曾經滄海難爲水哥哥這可沒說的古人說樂有賢父兄誰叫我有您這哥哥呢投師不如訪友沒別的您教我吧李英連連搖頭賢弟你練不了哇怎麽哥哥不教我李英搖頭不是愚兄不教而是你不能練你出身富家茶來伸手飯來張口你是個膏粱子弟真正的練武就要脫胎換骨真要練個三冬兩夏如果想練就練不想練就不練少爺脾氣那就無法成材呀你白費力我白費心兄弟真想學必須咬緊牙關我這槍是李氏家傳的三十六式絕命連環槍化成三百六十招還有我李氏家傳十八手閃手花刀三手絕命刀我都可以教你你雖然有腰有腿啦尚需三年苦功兄弟你有長性嗎娘能捨得嗎兄弟要想三天打魚兩天曬網那可不行說完面帶笑容看著白潔白潔的眉毛梢兒一挑哥哥放心如有不願學怕吃苦的時候請哥哥隨便打罵李英也看白潔的決心很大便寫好了祖師牌位李英率白潔磕完頭就開始用功原來白潔聰穎非凡聞一知十而且吃得了苦由於練功心切把寒冬暑熱抛於九霄雲外春花秋月一晃三年李英一看兄弟練成了他很高興這天練完了功兩個說說笑笑回到前院書房李英等白潔坐下問兄弟你的功夫不錯啦看來這三年的苦練可難爲你呀要知道學如逆水行舟不進則退今後永遠記往還要練功不准偷閒躲懶不過倒不需哥哥看著練了我想跟你商量一下愚兄離開鄉井幾年啦想回趟家看看不久還要回來懇求賢弟在娘的面前替我告假一個月再請娘給我紋銀二十兩做路費娘親手頭有富余就請賢弟費心如果娘的手中不寬綽就算啦千萬別讓娘爲難白潔聽了李英的話難離難舍哥哥要回府看望嫂嫂和侄男侄女兄弟不敢阻攔路費不成問題只不知哥哥真的很快回來嗎不可叫小弟懸念李英一笑愚兄一生不輕諾絕無謊言你捨不得愚兄走難道愚兄就捨得離開你和老娘嗎白潔只好來到上房老太太沒有休息白潔趕忙進來問安三年光景老媽媽知道李英是條鐵漢儘管還不知他的來歷可人怕久挨金怕煉交這麽一位知心的朋友即便自己真的百年之後有李英照顧兒子我也能安心於地下了這時老人見白潔進來便問兒呀不在外邊陪伴兄長來到內宅何事老太太看出兒子臉色不愉快孩子到底有什麽事情娘兒子爲了李英兄長的事啊你哥哥有什麽要緊的事呢白潔把兄長要回家探望借路費的事全都稟明了安人老太太也是從心裏不願李英走不過這幾年抛妻別子遠離鄉井怎能不讓人家回家探望老安人對兒子說依爲娘的主意早就要讓他回家看望妻子孩兒去啦娘雖有這心可娘不能說出來說出來怕你兄長多心仿佛咱們養不起他似的往外攆人家現在你哥哥提出來不是正應當嘛路費之外我還要送你嫂嫂和侄男侄女一些物件表表心意娘立刻准備飯給你兄長餞行去吧一夜無事次日清晨李英帶好東西軍刃白潔直送到關廂李英說賢弟回去吧聽娘的話我很快就回來連你嫂嫂侄子全帶來白潔點頭默默地跟著一直到十裏之外李英伸手相搭兄弟送君千里終有一別不必再送啦白潔眼淚圍著眼圈轉點頭答應李英上大路走上好遠見白沽還在佇立相送玉如流下了別離之淚回到家中稟明母親吃完飯以後白潔躺在母親床上睡了老太太本認爲孩子幾年來刻苦學藝可能有些累到晚上吃完晚飯回到書房清晨起來熟練了功夫吃完早飯他又睡了一連三天老太太心裏著急這可不成啊憂悶成病那還了得兒啊娘也知道你兄長一走心裏悶倦可總睡覺不行呀吃完早飯你去外面活動活動不能吃飽了就睡白潔怕母親著急娘啊孩兒一定出去遛遛娘倆吃完了飯白潔答應著出來到街門前回手帶上門便聽見有人嗡聲嗡氣地問兄弟你吃飯啦白潔回頭兒一看道三哥哥您倒好哇這個人三十多歲五官端正面帶忠厚只是他的左胳膊又粗又壯跟小房柁似的可右膊好像麻稭杆山核桃那麽細他姓劉單字名德排行在三人稱左胳膊劉三劉德爲人忠厚仗義只要街坊鄰居有事總是跑前跑後地張羅比方說有人挨餓啦找他他只要有就給你解難排憂哪怕下午他再挨餓都不在乎劉三最好練武每天清早起五更到大樹林裏來練就是往大樹上撣這兩只胳膊一隻三千下每天如是風雨不阻這左胳膊越撞越粗越有勁不用說急眼打架就算是鬧著玩兒用左胳膊一碰你就得出去一溜滾兒可這右胳膊越撞越乏力肌肉萎縮像麻稭稈兒只要碰一下痛徹肺腑白潔遛早彎出城經常碰上左胳膊劉三劉三剛出家門看見白潔穿著白綢子褲褂寶藍綢子大褂漆黑刷亮的松三把兒一條大辮子真夠俊的三哥幹什麽去嗨這不西關龍王廟開光說書的唱戲的打把式的賣藝的熱鬧極啦趕廟會挂棚腳的人山人海說真的三哥並不貪這個聽說有一個賣藝的是個老人兒功夫好極啦我去開開眼咱哥倆搭著伴去西關吧兩個人說說笑笑奔西關了劉三問兄弟你現在不是跟朋友練了嗎哥小弟比從前是強多了有人說咱們這地方沒練武的還說武聖人沒從咱這地方走過我叫他嘗嘗哥哥我左胳膊的厲害我聽說他練的槍法不錯你跟他比比白潔搖頭不行沒跟人家動過手嗨別粘糊有三哥哪二人走到廟的東北角兒這裏圍著水泄不通的一圈子人三哥咱們進不去呀你去跟人家說說真是個雛兒連話都不敢說呀白潔無法過來一抱拳鄉親們借光借光我們要到裏邊兒看看您讓一讓這位一回頭沖白潔一瞪眼想看早點兒來呀我讓你誰讓我呀這句話把白潔噎得夠嗆三哥人家不讓劉三一努嘴你起來跟著走說著用左胳膊一撥拉閃開閃開好嘛他的左胳膊真有勁前邊的人東倒西歪哥倆擠進來啦二人這麽一看場地周圍用長竹凳圈了一個圈兒北面有個小竹桌放著茶壺茶碗一個小圓笸籮那是用來放錢的這個場子是藝人包的廟會開幾天他就包幾天到時人家把茶端來凳子桌子放好桌上還放著一個哨碼子賣藝的大高個兒黃臉兒鷹鼻子花白鬍子白潔一見此人才惹出一場殺身大禍
