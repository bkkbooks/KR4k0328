body:
  text: 第五十九回夏九齡荒寺遭毒手病太歲府衙顯奇能上回書說到風雲莊捉拿馬俊寶刀手老俠鄧九公在大廳內規勸老二紫面豹子雷普沒想到雷普惱羞成怒手持三節棍蹦到院中哇呀呀怪叫如雷提棍就打正在這時候有人高聲喊喝嗓音洪亮很有威懾力量連千里飛來雷煙都嚇了一跳鄧九公往後撤步閃身擡頭觀看從東院走過來兩個人前邊正是鎮八方紫面昆侖俠童海川後邊跟著心愛的弟子隨行衛員多臂童子夏九齡海川看馬亮跑了並沒追怕自己的弟子遭毒手進了屋中九齡的綁繩解開師父九齡趴地下磕頭童林爲什麽不早救下九齡呢海川要試試孩子的膽量如何果然小小年紀真不怕死海川很是高興九齡啊你怎麽到這來啦夏九齡就把自己的事都說了海川點了點頭今後你自己要多加小心你在屋裏來回來去走動走動緩緩麻木我得追賊去說完了海川轉身形出來飛身上牆頭往東看影綽綽馬亮急急如喪家之犬腳底下用力如鷹脫勾似箭離弦往東跑海川腳底下攢勁可就追了過來追到樹林的西邊隱在樹後頭往裏看這有一個人就是黑臉閻羅郭福他正給馬亮出主意要施展緊背低頭毒藥釘海川心說你要不用暗器傷人則罷但要施展陰毒暗器那是你的末日已到我非殺了你不可沒想到寶刀手鄧九公進來質問于馬亮海川一看這可是位高人清苑縣鄧家堡寶刀手鄧九公在武林已馳名很久了海川由於站得很近可就轉到南面來兩人怎麽說話怎麽動手怎麽刨坑最後怎麽一腳把馬亮踹到坑裏郭福又怎麽埋海川認爲可笑哈哈這麽一笑才知道自己笑得不是地方馬亮有可能借機逃跑鄧九公往外來海川跟他一轉身就跑到樹林裏頭去了藏在樹後面這一刻工夫黑臉閻羅郭福把馬亮拽上來撿雙鐝逃跑了海川瞧著鄧九公愣了一下然後去了風雲莊越牆而過來到東跨院東房九齡這會兒麻木已經緩過來了師父您怎麽來得這麽巧哇我跟師哥們定規是七個人分七面我才追到這邊來碰見柳影鄧玉我們倆拜了把兄弟海川點了點頭把自己的事情一說咱們爺兒倆到前面看看去這樣師徒爺倆兒才往前來沒想到雷普惱羞成怒舉三節棍跟鄧九公動手鄧九公確實是不錯讓你三招你要再動手手足之情絕了我可對你不客氣海川這才高聲喝喊墊步擰腰出來雷普你真乃大膽拒捕官差鎮八方紫面昆侖俠童林在此海川一報名姓這雷普有點兒害臊姓童的你敢擾鬧風雲莊他蹦起來一甩三節棍咯啷照著海川的腦瓜頂來了一棍海川也不客氣上左一滑步立著自己的右手一捉這三節棍砰左手在三節棍上往前這麽一推啪嚓一掌就把這雷普給揍了一個跟頭然後飛身形過來腳尖一點他的腰眼道雷普想不到你哥哥朋友們都是好人唯有你不是好人縱子行兇攔路劫搶隱藏欽犯拒捕欽差你有意作亂除惡人即是善念今天童某對你絕不留情一舉三節棍咯啷一挑這三節棍要是真的下來雷普的命就沒了海川是成心嚇唬嚇唬他千里飛來雷煙不敢奔人家童林跟前來遠遠地撲嗵跪下了哎呀童大俠客爺貴手高擡草民雷煙給您磕頭了您饒我二弟一命吧鄧九公也一拱拳童衛員大人手下留情海川聽鄧九公這麽一喊把三節棍扔了氣哼哼地說哼不看在你兄長朋友的份上童某決不容情這個時候紫面豹子雷普也起來了老實多了俠客爺我給您磕頭連鄧九公都過來行禮恭請海川夏九齡等人來到客廳內盛情款待一個家人把三節棍撿起來給雷二爺撣了撣土我說什麽來著您要把人家這位隨行衛員給殺嘍二爺今天這漏子就大了您吃東西就不香了別別說了誰知道這些事呀還是的您趕緊進去賠禮去吧雷普進來對海川和九齡說二位俠客爺我錯了千錯萬錯是我雷普一人之過我給您行禮最後又安慰了夏九齡幾句這樣海川爺兒倆也就不再計較了海川爺兒倆把來意說清楚後雷普站起來說那好在下看看去等雷普來到後院一看紅毛禿頭狸子馬俊這小子驚弓之鳥早跑了只得吩咐廚房預備了夜宵請爺兒倆吃點東西第二天天光亮海川說得了事情到此爲止我帶著我弟子回去了鄧九公連連地道謝這個事說大就大說小就小大起來沒邊說小了一句話全完全在童海川師徒一句話上比如說童林帶著夏九齡回去說雷家是好人賊人已經逃跑我們沒法捉拿完了如果童海川回去說風雲莊雷家拒捕欽差就這四個字呀他這小日子就沒了恐怕命都得搭上但人家哥兒仨對於海川師徒是千恩萬謝送到了村口鄧九公他們才回去這爺兒倆回公館擦臉漱口梳洗已畢讓劉俊給回一聲劉俊來到上房稟大人我師父帶著我師弟回來了大人點頭好叫他們爺兒倆快進來海川跟九齡來到上房見大人行完禮參見了三寶大人才問海川你回來了昨天你怎麽不跟我見個面呀本欽命很是著急你上哪去了海川就把自己的事情由頭至尾一說我要再去晚一步夏九齡的命就沒了風雲莊雷家是好人而且我還結交了鄧九公這可是武林中的英雄啊年大人相信海川交的朋友所以對鄧九公的印象特別好現在大人聽完之後問海川這事怎麽辦海川想了想就說馬俊馬亮這些人是奉燕普之命一路之上與咱們爲敵的我們爺兒幾個多加小心就是了也不能爲這事兒再拖延時間了大人您去四川要緊我看我們今天就啓程讓楊師爺給備兩份海捕公文夏九齡一份司馬良一份讓這兩個孩子在咱們大轎的前頭按官站先走一左一右慢慢地明察暗訪然後在太原府見面大人聽完了認爲海川安置得很好就傳下話去一切照此執行等兩個孩子走後便傳丁開甲三座皇亭子放好了聖旨金牌尚方劍一百名親兵前簇後擁大人上轎海川騎馬相隨劉俊騎馬在前頭開路行李車壓陣大家打清苑縣起身按官站直奔山西太原府夏九齡這一次又得了不少的經驗自己這一路之上單獨行動明查密訪格外小心但由於貪功心切恨不得一下拿住紅毛禿頭狸子馬俊或一棵苗禿頭義士馬亮所以走得很急這天夏九齡已經過井陘入娘子關進到山西地界了由於趕吃趕喝天氣炎熱他肚子疼起來心說我可能受寒了再往前走暮色蒼茫天際已晚再看前後都沒有村莊眼前頭是一座大樹林在樹林的北面全是沙土窩兒在沙土道的西面方向有一座廟前後三層大殿孤孤伶伶東北奔西南西北奔西南兩條大道在廟前匯合四股道斜縱交叉九齡來到這裏一看此廟叫靈佑三皇觀也叫浮雲觀按綠林道的規矩孤廟不進可九齡想我肚子疼痛無奈就在這兒投宿吧來到角門啪啪一叫門時間不大有人出來開門無量佛您找誰呀九齡一瞧是個十七八歲的小老道長得眉清目秀齒白唇紅挽著發纂兒扣著楊木道冠兒竹簪別頂身穿藍道袍紮絨繩薄底雲鞋這小老道挺精神的九齡忙答道小道長我肚子疼得厲害打算在貴寶觀投宿一夜可以嗎您候一候啊小老道轉身形往後走時間不大從裏邊出來說我家觀主說您請進來吧九齡提拎著包袱道童把角門關好後領著他來到頭層殿的東配殿挑門簾進來摸火種把燈點亮靠東牆有架幾案後牆窗戶支起來倒很涼快八仙桌兩邊有椅子靠北邊是個格扇間挂著茶青色的門簾九齡一伸手就把這包袱放在幾案上了然後坐在這椅子上捂著肚子說小道童啊你看你能不能給我切點生薑沏一碗紅糖水幫我趕趕寒氣我這肚子倒許好了現在你讓我吃什麽我也吃不下去好吧我給您准備去說著話小老道先提了一壺涼水來您自己可以漱漱口這有碗把這涼水放到案頭上小老道走了時間不大給端出一碗薑糖水來九齡一看都是大片薑又辣又難喝沒法子還是吸溜溜吸溜溜喝了足有半碗然後把碗往前一推覺得自己的肚子裏好點不那麽痛了但是怎麽突然頭重腳輕天旋地轉呐往前一趴撲在桌上了原來這紅糖水裏有蒙汗藥這個廟叫浮雲觀浮雲觀的觀主叫浮雲仙長馬宗續這個老道在道門之中的輩分很高能耐大小先不談但是他的品行不端盡辦些壞事這會兒他在鶴軒內有兩個人正陪著他說話呢一個是他本門的師侄也是個老道姓陳名字叫陳道常有個外號叫采花羽士這位不是好出家人品行敗壞胡作非爲再一個就是他本家的孫子紅毛禿頭狸子馬俊他從風雲莊逃跑到這兒來了面見浮雲仙長馬宗續他磕頭說拜見爺爺讓我在您這兒躲幾天吧馬宗續口誦佛號無量佛馬俊呀你和你的叔叔馬亮你們爺兒倆辦這事都不怎麽樣豈能打草驚蛇呀行刺欽差要一下准得啦好在我這裏與人無怨與世無爭不招災不惹禍你就在我這兒住著吧當馬俊來後的第二天馬宗續的這本家侄子采花羽士陳道常也到了也把自己的事情一說沒別的老人家我在您這兒忍些日子吧馬宗續答應了又讓馬俊和陳道常認識了從年歲上來說馬俊大些陳道常聽了馬俊的事情就說馬大哥您放心不就是行刺欽差這點兒事嗎再多大漏子我給您遮風擋雨在這住下吧這麽著他們就住下來了今天晚上小老道說來了個人如此這般什麽什麽樣兒他肚子痛要在咱們這投宿馬俊一聽就一哆嗦老人家這一定是多臂童子夏九齡哎呀這怎辦陳道常一擺手無量佛沒關係就說請他到前邊配殿休息問他吃什麽喝什麽一會兒小老道來了他肚子痛打算喝點薑糖水那太好了馬宗續打開櫃子拿出一包蒙汗藥來把這個放裏面這蒙汗藥下到薑糖水裏給泡好了夏九齡喝下去趴在桌上人事不省過了一會兒打發小道童去看看小道童來到前院東配殿挑簾櫳進來見夏九齡紋絲不動一伸手把包袱提拎起來轉身形出來一直奔後院來到西跨院鶴軒內挑門簾進了北屋老人家這個姓夏的小孩已經喝了多半碗薑糖水這是他的包袱爺兒仨湊過來把這包皮打開裏頭有兩身衣裳一些碎銀兩最重要的有捉馬俊的海捕公文上頭有欽差大人的親筆手諭馬宗續說無量佛你看是不是跟著又給他包好了陳道常問那您說咱把他怎麽辦馬宗續一想嗯事到如今既然他已到了咱這廟裏又喝了蒙汗藥咱就不能讓他活著出去否則聲張出去那就壞事了我們只能把他活埋了然後把這些東西銷毀這樣一來任何人都不知道夏九齡到過咱的廟裏爺兒仨帶著小老道打鶴軒出來就奔前院東配殿了等來到東配殿進門一瞧大家都吃了一驚夏九齡蹤影不見馬俊急了哎呀老人家有人救他了無量佛趕快回去回到鶴軒九齡的包袱也不見了嚇得馬俊目瞪口呆不知所措這時院中有人喝喊浮雲仙長馬宗續你竟敢窩藏行刺欽差的要犯還不出來受死等待何時多臂童子夏九齡在此馬俊一聽嚇壞了哎呀師爺姓夏的來啦采花羽士陳道常一擺手沒事請放心有我呢老人家咱們爺兒仨出去看看各自拉傢夥往外走直奔當院猛然間有人喊陳道常你往哪里跑爺兒仨擡頭看眼前站著兩個人上首站著多臂童子夏九齡手拿著鏈子槊身上背著包袱在夏九齡旁邊也站著一個孩子這小孩中等身材細腰窄背穿著一身寶藍色的長衫腰裏系著絨繩右手拿著一個大冰釧三尺六寸長純鋼打制一尺六的三梭凹面大尖子後頭是圓棍往臉上瞧這孩子長得有點特別一副大蠶豆的腦袋梳著沖天杵的小辮兩道細眉似有似無一對小眼睛滴溜溜亂轉透著精靈原來這小孩姓張名叫張方師父給起的外號叫病太歲家住鎮江瓜州張家莊提起他父親來大有名氣就是風流俠鐵扇