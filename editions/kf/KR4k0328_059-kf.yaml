十二年不回家他真氣我我養的這孩子比你有出息我跟你結婚掐指一算好幾十年了你淨從家裏往外拿錢什麽時候往家裏拿過一個老錢這可好你一不在官二不在商又不掙米又不掙餉家裏吃飯外面打架你算幹什麽的我養這孩子有出息他師父給他二十兩銀子他路上一分沒花全都帶回來了還讓我買點粉擦買花戴呢老頭子這氣呀哎嘿沒法跟你們娘兒倆說話氣得老俠直哆嗦張方來到門房老總管趕緊一挑簾子讓張方進來張開李豹正在這兒坐著呢師弟你來了我來了我把東西給老太太了老頭子還要攔我這惡賊人分明是沖著我們爺兒倆來的他都不敢惹窩囊叼著一塊肺我不知道當初哪位瞎了眼給他起個風流俠的外號他算哪路的俠客老總管一聽不樂意了我說少爺你不能背著老爺說他不好哇老俠客當年叱吒風雲還沒有你呢張方聽完也不高興了我知道你吃他一輩子了你當然向著他說話張方轉身對張開李豹說好咱們走吧到了知府衙門跟李大人說這個案子我來辦張開李豹不知道張方的能耐心中不踏實但是人家大人拿禮物名片來了如果我們請不出師父來人家大人還要親自一請這讓我師父多爲難啊得啦咱們就死馬當成活馬治拿這少劍客爺搪塞一下吧省得我們老少家眷滿門親族被知府給押起來張開哥兒倆這麽一想可就問起張方來了師弟剛才在北大廳你可當著師父說你學成了當真學能爲回來了張方一聽不高興了什麽話呀我告訴你們本人躥高縱遠小巧之技無不精能因爲我師父是高人你們聽說過嗎聽說過道門門長三清教的歐陽老劍客爺當然了不起了這就得了我是老劍客爺之徒能爲還能錯得了現在老爺子不去你們倆就帶我去見李大人要不你們也別想交差張開點頭道也只可如此了兄弟咱們走吧張方看出人家兩人瞧不起他心中憤憤地說到時候我要不叫你們出大汗我就不叫病太歲三個人溜溜達達一直來到鎮江府東門裏路北的知府衙門口值班的和班頭全在門前坐著這裏一切都準備好了只要老俠客一來立刻全體出迎鳴放三聲大炮閃開儀門中門知府親自迎接現在大傢夥兒一看張開李豹領來一個這樣寒磣的孩子來了都挺納悶的這是幹嘛呀你們二位不是去請風流俠張鼎去了吧怎麽帶來這麽一個前出廊後出廈中間一個大凹棱梳著沖天杵小辮渾身埋汰的醜小子呢衆人都在疑惑又不便明問只說二位班頭回來啦張開李豹說話了衆位都過來見見我們的師弟他是風流俠鐵扇仙張鼎我們師父的親兒子廣東龍門縣三清教掌門歐陽老劍客爺的高足病太歲張方這些人一看張方想樂又不敢樂都捂嘴偷著笑張方心說他們幹嘛見我捂嘴呀呆了一會兒大家才都過來參見少劍客爺參見少劍客爺衆位都請起來行完禮大夥兒陪著張方來到班房張開對李豹說兄弟你在這兒陪著師弟說話我到裏邊去稟明知府大人其實是讓李豹看著張方怕這孩子嘴太損鬧起事來張開說完往外走一直來到書房書房在東院的一個四合院五間正北房前後窗戶支起來十分涼爽張開忙行禮下役張開見過大人嗷張開你帶著禮物和名片到張家莊去把張老俠客爺請來了嗎稟知府大人我師父剛從北京回來身體有些不爽他不能出來李知府一聽就不樂意了心說本地區出了這樣的事兒你就是一個老百姓也有責關心甭說你是一個行俠仗義的俠客了我手下人拿著名片去見你如同我親自去一樣你怎麽一點不理解呢你應當出來呀李大人剛要說話張開把他攔住了我師父老了確實心有餘而力不足不過我師弟我師父的親兒子把這事全給接下來了他今幾個二十歲在廣東龍門縣三清教掌門歐陽老劍客爺那兒學藝十二年師父給起的外號叫病太歲使一條三棱凹面呂祖錐還有三支絕門的邁門弩六顆棗核鏢我師弟辦這事兒准能馬到成功大人常言道長江後浪推前浪一代新人換舊人年輕人富有朝氣他敢想敢幹知府李連甲聽完點了點頭張開此言有理剛說到這兒門簾一挑從外頭進來一個人張開一看這人四十來歲兩肋無肉瘦小枯乾細眉毛圓眼睛鷹勾鼻子薄片嘴透著能說會道他穿紗袍系涼帶五分底的福字履鞋腰裏接著煙袋荷包眼鏡荷包檳榔荷包花白剪子股小辮沒留鬍子這是本府的師爺姓曹名叫曹志高浙江紹興府人曹師爺很聰明好手筆但這個人心術不正仗著和李知府的關係不錯背地裏做了不少壞事貪贓枉法貪汙受賄的事情他全幹過但數目每次又不太大總是三百五百的大傢夥兒對他很不滿意因爲他手很粘給他起了個外號槽子糕曹師爺進來就說哎呀知府大人曹志高有禮了曹師爺來啦張開有禮了我說張班頭你和知府大人在談什麽張開就把事情從頭至尾說了一遍這時曹師爺問李知府大人您聽張開說的怎麽樣呢李大人不解地說我聽張班頭說得還可以曹師爺連連搖頭哎呀大人你是太忠厚了你不要叫人家捉弄了看來你的名片不頂用這瓜州的張老先生不買你的賬啊可他是本地百姓既受皇家雨露之恩就當湧泉相報再說他身爲俠客本地出了這種事情怎麽能袖手旁觀呢張班頭把這位少劍客爺請來無非是搪塞公事張開心說這曹師爺真不是個東西他立刻辯解道曹師爺搪塞不也得辦案嗎刺到籃裏是菜打著狼就是好獵手咱們得看真能耐曹師爺聽張開這麽一說也不好再說什麽了便對李知府說大人我看這樣吧就在您這裏召見少劍客爺我們也看看他的本領如何李知府一想曹師爺是不放心少劍客爺的能爲試試也好便對張開說本府邀請少劍客爺到書房面談張開答應便轉身出來邊走邊想師弟呀你要真有能耐就給他們露一手殺殺他們的銳氣可你沒本事今兒咱們的眼就算現了來到班房張開一看李豹正跟大傢夥兒聊天呢張方不在屋裏張開忙問李豹咱師弟呢嗯不是剛才你出去他就跟出去了嗎張開一聽急得直跺腳我讓你陪著師弟說話你腦袋是榆木疙瘩呀他這是成心要咱們好看怎麽了知府有請他沒了李豹一聽喲也傻眼了大傢夥兒也全過來了哪兒去了找知府大人下了堂諭了有請這位師弟現在他沒了張開李豹可真急了師弟你在哪兒呀你讓我們哥兒倆著急呀你快出來吧哎呀祖宗你在哪兒呢這時候有人搭話我在這兒呐誰叫我呢這哥兒倆真生氣了大傢夥兒一瞧嘿這小子可真嘎咕他在院牆根的雨拍子底下盤膝打坐呆著呢這雨拍子是什麽東西呀就是用木頭做的架上頭釘上草席下雨的時候挂在窗戶上擋雨不下雨時立在牆根下大家呼啦全過來了張開一看他這樣就說你跑這兒幹嘛來了這兒涼快什麽涼快你看把我們倆急的張方也挺橫爲什麽監視我呀這是我給你們點教育嘿師弟你真是一點虧都不吃把我們哥兒倆給急壞了現在府台大人的堂諭下來了要請你去書房談話還有哪位還有一位浙江紹興府的師爺姓曹叫曹志高好嘛事不宜遲咱們馬上到書房去見府台大人您瞧這事兒聽說府台大人要在書房裏召見少劍客府衙裏的人早就都知道了這叫不脛而走呼啦啦來了四十多位衆星揍月一樣陪著張開李豹把張方帶到書房院大家都想開開眼大傢夥兒一起來到台階下兩旁人員都在旁邊站下師弟呀你先候一候我到裏面先回稟一聲張開挑簾櫳進屋大人我師弟張方來了請少劍客爺少劍客張方獻絕藝戲耍曹志高
