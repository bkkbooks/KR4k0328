父也已經給他寫了信去就說老爺子收你的事他是你的師侄喲這一位怎麽也有七十歲不錯他七十歲了這就是關帝廟的主持現在青雲山青雲長老寶鏡禪師的弟子水底金禪碧霞僧嗷他就是水底金蟾碧霞僧胡林點頭花純一瞧可不是呢挑著挑那手指頭掰不開胡蘿蔔似的那麽您說他這是幹什麽去呢不用問他找他師父去他師父在哪他也不一定知道也許他跟人家打聽知道了他師父在昌黎縣問問他師父這手指頭有辦法沒有不然的話就廢了哥哥有辦法嗎有啊用什麽辦法每天早午兩遍把手泡在熬得的豆腐漿裏頭泡這麽半個時辰以後拿出來用熱豆腐貼時間一長他這手就發軟了起這麽一層厚繭子這厚繭子一脫復舊如初但是鷹爪的功夫依然存在就成功啦嗷這麽回事咱們哥兒倆溜溜達達跟著他跟到黃土坡碰上兩個男孩胡大爸一瞧就瞧出來了這是一對女孩出來一大麻臉要截她們碧霞僧趕到了胡大爸可跟花純說咱瞧瞧碧霞僧到這裏把圓籠挑子一放三招兩式叭嚓一下把麻面分水鼈蔡虎給杵死了逗得胡大爸這笑啊你看見了沒有啊我看見啦他這功夫可真不錯是啊你瞧他怎麽辦碧霞僧把那死屍拉到樹林裏用刀刨了坑把麻面分水鼈蔡虎埋啦花純花子羽故意喊了一聲好和尚草菅人命嚇得碧霞僧撒腿就跑挑起挑來往南下去哥兒倆在這裏也就分手了哥兒倆一分手花純花子羽一想我到底瞧瞧這碧霞幹什麽去花子羽在後頭可就跟上了來到瀟水河岸他看人家小孩摸魚他躺下睡著了花純這個氣你是練家子跑這樹林睡覺來萬一有仇人給你一刀你都不知道趁這小孩下水紮猛子的時候花子羽把魚給偷了來一撩圓籠蓋把魚放裏面了轉到樹後瞧著果然一會這孩子們都呼啦一下全過來把碧霞驚醒花子羽戲耍碧霞僧罰了碧霞十兩銀子還叫小孩埋怨了一頓結果碧霞走了花子羽多快呀花子羽先走下來飯館給的飯錢又跑到擺渡口給雇了船這樣才到磐石島現在碧霞僧叫人家給捉住銀面仙童花純花子羽也找了一只船從磐石島旁邊貼了岸上來心說蔡方韓成你把我師侄給拿住啦真乃大膽花子羽在房上隱蔽身形看著蔡方韓成要殺韓成一比劃日子可快到了這主兒要來怎麽辦暫時先押起來這樣花純花子羽看著他們把碧霞和尚押到土牢全都走淨候了一會花純才來拿出十三太寶的鑰匙把鎖捅開轉到碧霞身背後去故意吹他脖子爺兒倆才見面花純說我要亮出東西你可不准叫嗷我不叫包袱皮打開腰中一圍鹿角雙棒這麽一亮你看這是什麽唉喲師叔唉師叔我給你磕頭我這兒綁著呢師叔您救我吧起來吧碧霞花純把自己的事情都說完包袱皮包好啦往自己腰裏一插你都損失什麽東西啦啊我損失的東西多啦我那圓籠裏頭有四百多兩銀子花純心裏說我翻圓籠時我瞧見啦你總共就三十多兩銀子怎麽這一會嗷我訛了你十兩怎麽這下你要在這裏發財呀還有什麽呢還有經卷不怎麽值錢衣缽戒牒也不要緊木魚還在我身上揣著呢我丟了一把刀那不要緊可以給你補償一把師叔咱們爺兒們可叫這賊給欺侮了他們把我給捉住掉在翻板以內而且還要殺我您既然是我師叔那您就應該給我做臉您瞧這碧霞也嘎咕著呢我給你磕頭叫師叔你得給我找臉給出氣呀花純心說爺兒們啊在別處這臉很難做因爲什麽呢因爲我不知道人家的能爲大小人家也不知道我怎麽回事唯有磐石島我瞧著他們倆他們倆就酥骨頭碧霞你不是要找臉嗎對呀他得賠咱東西你跟著叔我到前廳去你就瞧著他們兩人見到叔是什麽勁碧霞心想你有什麽出手的你才二十來歲我不相信叔我跟您一塊去走走走爺兒倆一前一後從土牢出來趕奔大廳大廳門口有兵丁一眼就看見花純心說要壞趕快過來磕頭拜見少劍客爺起來蔡方韓成呢叫他們出來是這和尚心說我能耐不小啊我到這來他們跟我掐啊怎麽我小叔到這裏瞧這兵丁怎麽俯首貼耳磕頭呀蔡方韓成正在北大廳研究這事呢沒想到花少劍客爺到了蔡方韓成一聽可壞了我先殺人就更麻煩趕緊往外走挑簾櫳下臺階一看喲這和尚怎麽跑這裏來啦少劍客蔡方韓成拜見花子羽故意不攔讓自己的傻侄子傻老爺兒們看看呱唧呱唧磕響頭起來這是我師侄水底金蟾碧霞上前見過蔡方韓成過來行禮大師父您跟少劍客爺既然有交情你怎麽不提一下我們得罪了請你原諒和尚口念佛號阿彌陀佛起來無可奈何請他們爺兒倆都進來坐下然後蔡方韓成也都坐好蔡方我跟你們有約法不准你們七十裏地以內作案可是你們今天就在水面劫了我的師侄你們欺負我師侄這可不行蔡方韓成趕緊站起來你們坐下你說我嗯少劍客爺您的師侄把我兒子給殺了父子之情啊現在我們知道您跟大師父沒得說我們再也不找大師父的麻煩就是事情過去了就算過去吧您說怎麽辦我們一定遵從你們兩人認打認罰認打認罰您說說我聽聽怎麽個認打認罰認打大廳前亮鹿角棒擊碎你弟兄二人頭顱不你別把我有了殺了我們還是認罰認罰那好辦碧霞呀你有多大損失都說出來讓他們賠償那好首先他們把我雇的那只船他們都給鑿漏了人家船家也不容易他們賠人家一隻船花純問蔡方這條怎麽樣我們應當賠船立刻派人到島外找這水手去找不到他到擺渡口也能找到碧霞你呢這船有我的衣缽戒牒這也不算什麽有幾本經卷也不值什麽不過我那圓籠裏頭有銀子蔡方韓成的心也都揪著心說你說多少就得是多少我們不能駁回我們也沒那膽子花純問你有多少銀子掉到河裏去啦唉大概有一百五十兩銀子把銀子賠我把那口刀賠我吧派人到翻板內把那刀撈上來給和尚馬上把和尚帶到後面讓和尚沐浴沐浴把僧袍內衣全都脫了僧鞋僧襪完全都給洗淨烤幹等和尚洗完了澡重新換了僧衣再到前庭坐下給了二百兩紋銀蔡方韓成擺隊相送送到山口上了船然後到了河岸爺兒倆上了岸碧霞啊天已經到這時候啦你是不是跟我回家你住到我那去不我不去我還得去找我師父聽說是在青雲山青雲寺路途太遠你找你師父幹什麽嘿我找我師父治手去花純道別去啦這手我給你治
