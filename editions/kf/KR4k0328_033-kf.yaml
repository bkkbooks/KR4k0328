body:
  text: 第三十三回小俠客風雪下書信三勇士夜闖八卦山上回書說到群雄聚會鐵善寺爬山虎趙勝報恩雍親王泄機八卦山韓寶吳志廣兩名欽犯都已回山趙勝走後大家有些舉棋不定秋佩雨要去八卦山探聽虛實王爺他們也都樂意秋佩雨帶好大寶劍離開狐兒山鐵善寺海川送到山門外哥哥您可多保重這你放心我跟他們都有交情什麽危險也沒有你們千萬千萬可別著急聽哥哥我的好信兒吧說罷秋老俠客順著山道往下走越過蜜蜂嶺出山口往北邊方向直奔八卦山去了半月已經過去仍然杳無音信海川早就等急了乾脆請示王爺大夥兒一起去吧王爺說這可不行你知道秋老俠在裏頭怎麽個事萬一秋老俠在裏頭都準備好了沒法通出信去咱們冒然間一去就把事情破壞了水晶長老亞然和尚想了半天道阿彌陀佛王爺衆位老俠客貧僧我倒有個辦法說出來大傢夥兒聽聽看看成不成大傢夥兒來到鐵善寺八卦山不可能不知道說秋老俠在八卦山出了問題我想不可能一定是在裏頭絆住了出不來這麽長時間天氣逐漸寒冷起來貧僧的意思是不是侯振遠童海川二位俠客寫一封信只是問候問候李昆李太極最好寫得不痛不癢就說我們哥兒倆已經到了鐵善寺了因身體不適未能到貴山前往拜望最近我們準備前去不知八位莊主可肯賜教您要樂意請您給我們來封回信就這麽個意思最後派個人這個人最好精明強幹到了八卦山以後察顔觀色見著或見不著北俠就通過言談舉止探出點消息來查出點冷暖來這樣回來咱們大夥兒就可以辦了可行則行可止則止這好不好呢王爺一拍手道于老俠衆位俠客高僧出的這個主意很好啊好既然如此我就寫信老俠侯振遠寫信筆走龍蛇寫完了念了念大夥兒一聽沒有什麽破綻裝在信封裏外邊寫著面呈大莊主李昆太極公親啓下面寫內詳海川拿著這封信看了看大夥兒問誰去送書信好呢這時候從衆人背後轉出一個人來師父您看弟子能去嗎大傢夥兒一瞧是穿雲白玉虎劉俊心裏都直嘀咕劉俊是童林的大徒弟捉拿盜國寶的就是你童林現在你的徒弟去八卦山這裏就有很大的風險呐海川看了看劉俊劉俊樂呵呵地往那一站師父讓我去吧師大爺讓我去吧老俠侯振遠一捋銀髯問俊哥你要去嗎師大爺我師父的事情弟子應當前往呀西方俠于成看了看他說爺們別人去還好你去八卦山可有危險呀大爺爲我師父的事情擔點風險也不要緊話說回來兩國相爭不傷來使何況我們武林同道的規矩呢李昆李太極也是當代的名家人家怎麽能辦出這事來呢王爺說這麽辦吧就讓這孩子去吧鍛煉鍛煉閱曆閱曆也未嘗不可我想也沒什麽危險不過到那兒多加小心就是了王爺衆位師伯師父你們放心吧劉俊把信接過來準備明天一早送去天黑的時候陰雲密布大雪紛飛雲南那地方還下雪嗎這也是山區呀陰晴不定啊冷極了第二天清早劉俊起來揣好了書信把軍刃放到家中寸鐵不帶打東配殿出來呀一陣風吹來瘦小的劉俊不由地打了個冷戰這雪雖小可下了一夜林如雪海山裏頭一片皆白劉俊打個寒噤又回來了打開包袱找了一件衣服穿上就下山了通過蜜蜂嶺出南山口往西走一直來到西頭頂風冒雪直奔西北八卦山而去越過十八棵楊樹就到了南盤江的江岸八卦山入山路口的金家渡口一江之隔北面就是八卦山江水甚狂山似銀裝林如玉簇劉俊知道金家渡口有一個金家酒店金家酒店是八卦山的耳目你要進山人家就得給你準備渡船他溜溜達達地往前走各處尋找猛然間風吹酒旗小英雄擡頭一看上頭寫著四個大字金家酒店劉俊尋著旗子來到金家酒店的門口一看呀竹子編的柵欄門圈著看不見的江水可江水的聲音牛吼一般就在這金家酒店的後頭院裏的雪堆成了幾大堆竹籬門已經開了半扇進去以後東西房還有北房北房接著厚厚的氈簾上頭兩個白字酒店院裏頭很清靜地方很幽雅劉俊撣了撣身上的雪跺跺腳一挑門簾進來了屋裏頭顯得溫暖如春半人高的大爐子爐子上頭有架架上頭有個大鐵鍋鍋裏頭開水冒著熱氣好多把酒壺盛滿了酒都在鐵鍋裏放著北面有個避風閣可能是後門外頭也有一個避風閣周圍一圈金漆的八仙桌和金漆的椅子當中有張桌子桌上蒙著雪白雪白的布單大清早現在還沒有喝酒的靠西面那兒放著好些個貨架子上頭擺著各種涼菜一進門靠西有個萬字欄櫃上頭一壇一壇的酒有紅標簽寫著黑字什麽女貞陳紹什麽遠年花雕罎子上頭是紅木蓋一個大將軍帽的疙瘩紅布墊酒提酒碗還有很多酒壺酒杯擺著一排一排的桌上放著賬簿和文房四寶桌裏頭高凳上坐著個人右手曲肱而枕攥著拳頭頂著自己的太陽穴哧呼哧呼睡著了劉俊來到這欄櫃旁邊伸手輕輕一拍掌櫃的哎唉呀咳兩隻手這麽一張揉了揉眼睛大夢誰先覺平生我自知草堂春睡足窗外日遲遲陰著天呐哎劉俊心說這位是三顧茅廬的諸葛亮啊等這人一展身形跟劉俊一對眼光劉俊才看清這個人大高個肩寬背厚身上穿著綢子的棉袍夾褲皮套褲腳底下是踢死牛的鞋腰裏系著青抄包外罩一件火狐腿皮斗篷紅緞子面的兩道花絞的眉毛三道旋斜飛入天蒼一雙大眼睛長長的睫毛像個豹子似的獅鼻闊口大嘴岔一對元寶耳連鬢絡腮的鬍子茬一臉的白圈癬一齜牙一咧嘴還挺喜歡人的哈哈哈喝酒呀請坐吧我不喝酒我跟您打聽一下這是金家渡口嗎不錯這就是金家渡口我再跟您打聽打聽這兒就是金家酒店了不錯你找人呐還是喝酒啊我不喝酒我跟您打聽個人金家酒店有兩名掌櫃的叫金錢豹金榮愛葉花斑豹