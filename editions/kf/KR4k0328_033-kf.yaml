不可辱你殺我不要緊皺一皺眉頭我就不是童俠客的弟子但是你要羞辱我我可不幹白天不錯下書信的是我今晚也不錯來的還是我大丈夫豈能怯死毀節以求生殺便殺你又何必多問徐源邵甫一瞪眼我弟兄甯死不辱要殺你就殺廢什麽話呀李昆回頭問北俠老哥哥這二位是誰呀這是振遠大弟的兩位高足浪裏雲煙一陣風徐源徐子特過渡流星賽電光邵甫邵春然哎呀原來是三位少俠客李昆李太極親自站起來把三個人的綁繩給解開了哈哈哈不知道三位少俠客今天晚上蒞臨敝山李昆實在對不起我指望是你們的師輩們今天晚上到我八卦山來我們好見面暢談沒想到是三位少俠客來了實在對不起不過你們三位來了沒有用這麽辦吧權當今天晚上沒有發生這件事三位請吧徐源邵甫劉俊三人全都站住不動唉不是跟你們三位說了嗎請你們回去有能爲讓你們三位的師父來你們三位來也沒用請吧三小依然不動啊你們三位怎麽還不走啊徐源心說廢話我們走得了嗎不認道我們怎麽走啊老莊主我們來的時候是跟著您這兒的更夫進來的哈哈哈那更夫是我安排的沒有更夫你們三位就是轉到天亮也到不了這裏徐源這才明白原來是人家的安排有意把我們引到這兒來的徐源他們也服氣了小子無知多有冒犯我弟兄早已入彀尚且逞能何異蚍蜉撼樹自不量力莊主莫怪李昆大笑起來哈哈哈少俠客言重了來人呐把他們三位帶出八卦山連環堡是有人過來這三位看得出來兩旁邊衆弟子咬牙切齒有人把三位帶著往外走也不著急慢饅地出了南莊門哎三位下山慢慢走吧沒事兒了啊謝謝人家回去了三位站在這兒發怔劉俊真不樂意呀三哥我說什麽來著我說不來到現在多沒臉啊咱們三人來這一趟不要緊叫人家八位莊主取笑我們的前輩呀這叫畫虎不成反類犬徐源瞪眼別說了這有什麽關係來了就來了逮住就逮住人家能爲大咱們能爲小走吧劉俊心說好我說你還不愛聽這不一塊跟著丟人嗎三個人垂頭喪氣無精打采跟鬥敗了的鵪鶉一樣順著山道往下走來的時候心裏一團火現在一桶涼水澆在頭上又加上這麽冷的寒夜天氣這三人順著山道好容易走到了南盤江的江岸到船塢旁邊把夜行衣脫下把水衣水靠換好把東西收拾齊了剛要往江裏跳突然間嘩地一下燈光通明來了四十多人爲首的是四莊主鐵臂羅漢法禪僧五莊主火眼金睛莫賀永賀建章七莊主清風過柳柳葉貓韓忠韓殿遠他們帶著韓寶吳志廣雷春賀豹兩頭蛇劉洞一枝花韓慶還有很多八卦山的弟子三十多人嘩地一下各拿刀槍蜂擁而至一個個滿臉殺氣高聲喊叫呔小輩哪里走還想逃離我八卦山嗎焉得能夠今天非把你們的命留下不可南無阿彌陀佛鐵臂羅漢法禪僧帶人就到了三位一看各自亮軍刃嘩楞楞把軍刃都抖出來了徐源往前一趕步刷地一下耍起自己的懷杖對準五爺賀建章的頂梁就砸下來了火眼金睛莫賀永賀建章雙手合著三楞分水狼牙釧往上一撞噹啷一響推釧頭拉釧杆嘩地一下橫風掃月就打徐源往下一矮身縮頸藏頭用懷杖急架相還邵甫擺雙鏟過來跟韓殿遠也打上了劉俊亮鏈子鐝撲奔法禪真不怕死你這小娃娃法禪拿大鏟就拍嘴裏說道我知道你是童林的徒弟你師父怎麽拍我腦袋來的今天也讓你嘗嘗以法禪的能爲讓劉俊碰上這不是要命嗎這時候徐源高喊快下水劉俊沒敢過來戀戰一抖鏈子鐝風車一樣往後一退緊跑幾步蹬蹬蹬下水了邵甫虛提雙鏟縱身出去也下水了徐源往後一倒步噌地一下也跳進了大江刷啦啦水花四濺三人帶著軍刃往南岸而來哎呀這狼狽呀被人家捆上又給轟出來又一打三位有些膽戰心驚這個工夫可就大了東方閃亮他們才來到南盤江的南岸三位一點力氣都沒了上岸後把水衣水靠脫了把水抖淨疊好又把白天的衣服穿好三人就像鬥敗了的公雞一樣劉俊可說三哥咱們回去吧徐源點頭師弟這八卦山真是刀山油鍋呀真沒想到如此厲害師弟看起來真不應當來劉俊不樂意地說我說什麽來的我說不來你們哥兒倆不樂意得啦這叫不見親喪不掉淚來一回也好吃一塹長一智邵甫也不言語了三個人跺跺腳往南來好冷啊繞過金家渡口往南走了幾裏地到了十八棵楊就聽樹林裏喊來了嘩地一下子沖出一班人來把三位的去路擋住當首的一位得意地說道南無阿彌陀佛哈哈哈哈娃娃還想逃生嗎啊三位一看原來是三位莊主帶著小弟兄幾十位把他們的去路擋住了原來他們一下江水鐵臂羅漢法禪高聲喝喊準備船奔十八棵楊截住他們別在這兒殺人法禪心說白天哥哥有令你真在這地方殺人回頭叫哥哥知道那就麻煩了這樣他們上了船離開八卦山過了金家渡口來到十八棵楊在這兒等著三位到來準備在這兒殺了他們您想啊三次一掌結仇的人全在這裏頭只有雷春雷震恒在北雙熊鎮叫海川打了一巴掌只是把炸醬麵給打出來不算太重以外賀豹是吐血了要不吐血韓寶吳志廣怎能盜國寶陷害童林呢法禪在杭州擂上被童林一巴掌險些沒拍死仇恨更深了三位垂頭喪氣耷拉著腦袋一步一步艱難往前走到現在又被人家給攔住了
