糊你這私刑姓武的可不受哇好在武爺有功夫自己只當在這兒耗功呢哎呀這滋味可真難受到了晚上吃飯了窩頭鹹菜條泡點溜鍋水兒牢頭問武雲飛朋友怎麽樣啊哈哈哈武雲飛心裏頭咬牙嘴上可說嘿哥們兒這尿桶蹲著可很舒服呀嘿哈哈敢情這牢頭外號叫小刀子十分兇惡陰險好吧讓你歇會給他放到鞭床上去武雲飛心說什麽叫鞭床呀等他叫人拉到這兒一瞧武爺可就咧嘴了本來這炕上躺十個人現在已經躺十八個了人擠人擠在一塊兒腿腕子這兒是一根橫木頭棍由這頭往下一壓那頭兒一鎖把你腿腕子壓住了脖子這兒一根長棍壓住了你想動根本不可能武雲飛可沒有越獄的心他只想著自己殺人償命欠債還錢或者是斟酌情節我可以不死熬幾年我能出去就完了沒想到這私刑實在兇惡來來來給他騰個地方這犯人已經擠不下了這獄卒會一手功夫叫刹車什麽叫刹車就是用腳一蹬牆拿他的屁股一拱犯人的腦袋硬拱出一個縫兒來讓武雲飛往這兒一躺等武雲飛一躺的時候他一起來人一擠武爺噔又出來了這橫木棍拉不下來武雲飛三次都沒躺下這個罪過就實在不好受了獄卒拿著鞭子啪啪叭叭就是一頓抽打打得犯人呲牙咧嘴牢頭在旁邊站著給我打武雲飛禿腦袋一晃雙手一錯嘎啦啦把手銬子錯折了跟著一貓腰兩手一錯鐐三下把鐐給揪掉了連銬帶鐐用手一攥你們這私刑武大爺可不受犯人們一愣神獄卒一瞧了不得了這牢頭轉頭要跑武爺上去啪就拿這鐵手銬腳鐐照他腦袋一下把牢頭就給砸死了回手又一下把獄卒也砸死了武雲飛飛身形起來上後看後窗戶都是拿大沙木插的說真的太結實了武爺伸右手叭一砸這沙木的窗戶棍打這後窗戶噌地一下就躥出去了長腰上獄房獄裏頭犯人一陣大亂了不得啦有人越獄啦武雲飛一想得啦一直就往永定門來了連夜來到自己家門口越牆而過舅父舅母都剛躺下武雲飛在窗戶外頭一叫舅舅舅媽老夫妻兩個一直等著不見雲飛回來這一聽叫門急著問雲飛你上哪兒去了您別點燈把門開開再說門打開了雲飛進來趴地下磕頭我惹禍了就把今天的事情由頭至尾說了一遍最後說舅舅我可要走了我不能給你們二老抓把土埋了養老送終都得看我表姐了但我也不能把禍給你們留在家裏我走了老太太沒嚇死孩子你怎麽打死人呐這沒法子啦行完禮磕完頭老太太拿出二兩銀子武雲飛一擺手我不要來到自己屋中連軍刃帶十二隻鐵蓮子完全都帶好了遠走高飛出離家中越城牆舉目無親乾脆出口外吧雲飛這麽一想跺腳繞走北京城可就奔了昌平縣進關溝出居庸關就奔口外了武雲飛半道上做了幾號買賣賺了點兒錢銀兩路費足啦自己換了衣服乾乾淨淨來到口外真是景物全非風土人情全變了來至塞北往前走跟人打聽前邊有個大鎮甸叫沙雁嶺因爲北邊有一片大山就叫沙雁嶺這個鎮甸起碼得有五六千戶是個通衢大鎮武雲飛溜溜達達進了鎮一看路南有座大店黑匾金字何家老店敢情這店姓何在宦行台安寓客商大小車輛草料俱全看得出來這個店很大這時打裏頭出來一個夥計二十來歲剃得黢青的頭皮兒能說會道的客人住店嗎咱們何家老店吃喝也便宜做出菜來也很有味道您就住這兒吧好吧我住下我問問你有跨院兒單間兒嗎有啊您呐爺台您跟我來武雲飛跟著夥計往裏走來到三道院兒往東東邊有個月亮門進去往北奔北房三間確實很乾淨您瞧這三間房爺台好不好很好很好武雲飛進去把小包袱放下軍刃也放下擦臉漱口沏上茶喝茶武雲飛問夥計貴姓啊我姓何我叫何小三兒嗷你跟本店的掌櫃是本家不錯掌櫃的是我本家一個大老咱們這店是老店三輩子啦好啊你們這地方叫沙雁嶺啊我們這兒北面有座山叫沙雁嶺所以這地方也叫沙雁嶺嗷是這麽回事夥計何候著武爺到時候喝點兒吃點兒想著自己已經不能回關南了一陣的難過來到口外舉目無親我得有個落腳的地方啊我看這何家老店店也大這夥計何小三兒也挺和氣咱就不如在這兒住下來這樣武雲飛就不想再走啦白天出去遛遛各處逛逛晚上回來每天如此在這兒一住半個月武雲飛不斷地拿出幾兩銀子來給何小三時間一住長顯得悶得慌這天何小三對武雲飛說爺台您還是外頭逛逛去吧哎呀你們這一帶我全都逛到了也沒有什麽特殊的風景我早逛膩了爺台逛膩了您也出去逛逛去你這是什麽意思您在店裏頭呆著不太好爲什麽呢爺台您是關南人您總給小子我點兒零錢花我感謝您您在店裏住下一悶您瞧西院裏有寶局您極容易走上這個道兒一上了這賭道兒恐怕您帶的這點東西很快就得輸在這兒哎喲喝你們這兒有寶局有啊所以我願意您外頭去遛個彎兒晚上回來吃完飯一睡覺明天您出去還遛彎兒去比什麽都強那麽你們這兒這寶局嗷我們這寶局一共是四股兒再加我們掌櫃的掌櫃的是胳膊股兒因爲借他的地方這四股的頭一股姓王叫王強王大爺人稱坐地虎二一股就是朱三爺他的外號叫鐵算盤朱三就是我們店裏頭的寫賬先生手筆很好三一股兒是淨街神孫利孫三爺四一股是我們掌櫃的四兄弟叫鐵胳膊何四他們哥兒四個加上我們掌櫃的大爺一共是五股我們掌櫃的不拿錢說真的這些位都是站著能打躺著能挨抓士揚煙兒的主哈哈您瞧寶局這個行業好人沒人幹賴人幹不了哇說真的每天可不少進錢呐嗷好吧你帶我到那院去看看您別去我瞧您是個好人武爺您不能走這條道兒唉我閑著也是閑著嘛您要去那就讓您隨心隨意得啦雲飛跟著何小三奔裏走進了西跨院武雲飛要跳寶割肉威震沙雁嶺
