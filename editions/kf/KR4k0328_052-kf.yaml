body:
  text: 第五十二回童海川揚名燈市口武雲飛傷人隆福寺上回書說到年羹堯出世他本是高僧寶如和尚顧啓顧肯堂東山老先生的高足顧肯堂拜江西省貴溪縣臥虎山的尚道明何道源爲師兄學的武藝尚何二仙長跟和尚學的文學王爺聽完鼓掌大笑亮公啊你和海川是大水沖了龍王廟一家人不認識一家人呐哈哈哈你老師的師兄就是海川的兩位授此恩師啊你們是師兄弟這不是該著的事嗎哎喲是啊海川咱們哥兒倆比王爺近王爺一聽忙道等等還是海川跟我近你別往你那邊強拉王爺痛快海川見過你的師兄海川趕緊躬身施禮趴地下磕頭沒想到海川跟年大人又攀上了師兄弟這幾天來有時候王爺跟海川在一塊兒有時候海川教徒弟有的時候帶著徒弟們上大柵欄雙龍鏢局跟衆位師長見面正月裏的時間過得很快一晃就到了初十前後這天海川在自己的家裏大管家何吉來叫了原來年羹堯在這兒爺兒仨一塊兒喝茶吃飯說點兒閒話越說越投脾氣老年海川今兒都初十啦眼下就燈節啦你說咱們哪天逛逛燈去呀年大人一想說這麽辦吧讓海川說他說哪天好咱們就哪天王爺您瞧我來北京也好幾年啦經過好幾個燈節了可還不知道燈節一共有幾天王爺告訴海川咱北京的燈節是三天十四十五十六十五是正日子那樣好咱們就十五到燈市口逛逛燈老年你聽見沒有到那天你早點兒來到我這兒吃晚飯咱們一塊兒走年大人說好吧說著年羹堯告辭走了轉眼之間就到了十五衆人隨著王爺不騎馬不坐轎遛遛達達地走把兩府的官銜燈全都掌出去了年福的四盞官銜燈都是鐵絲兒擰的氣死風燈多大的風也刮不滅上頭有紅字禮部侍郎年府朱紅油漆的籠頭杠兒挑起來雍親王府的四盞官銜燈在前頭比年府的燈就高得多大得多了也是朱紅油漆不過是綠頭的籠頭杠兒挑起來上面寫著雍親王府王爺當然穿一身皮衣服天寒地凍正月十五還是正冷的時候年大人也是一樣雖說是便服但都穿得比較暖和海川可就不然了依然是土黃布褲子粗藍布大褂兒紮絨繩搬尖兒靴鞋白襪子因爲成名船俠義都有寒暑不侵的真功夫多冷也不冷多熱也不熱腰裏圍著落葉秋風掃寶刃爺兒幾個由府裏出來出王府大門往西一拐等到了富貴巷西口往南這麽一瞧直奔北新橋喝都是過街的焰花呀兩邊對著放當間兒一條火胡同似的人已經擠不動了綠女紅男人山人海萬頭攢動不過王爺跟年大人他們這兒就比較好走一點兒看見官銜燈了不用趕老百姓自動地就閃開趕到了北新橋往燈市口這麽一看呀就好象正南方一條火龍宮真是火樹銀花鞭炮震耳熱鬧非常兩旁邊的鋪戶叫買叫賣懸燈結彩一輪明月高挂天空星斗之光爲之而奪因爲城裏頭燈火通明月亮的光華都小下來啦兩邊幾鋪面房懸燈挂著許多謎語叫打燈虎也有用燈籠打燈虎的也有用字條打燈虎的各種都有門口外頭放著大八仙桌擱著一份兒一份兒的元宵這是怎麽回事打燈虎給彩頭只要您打中了就送給您一份元宵本櫃上的老人兒在一旁看著打燈虎海川一瞧這藥鋪的門口貼著這麽一條燈虎兒亞旁邊寫著一行小字打俗語一名猜中者贈元宵二斤王爺跟年大人是打得上來的海川不行海川得琢磨琢磨這時由打人群裏頭出來一個小孩也就在十二三歲帶著緞帽墊兒穿著一身棉褲棉襖由下人陪著就進來了這小孩站在老頭兒的跟前說老師傅您這亞字打俗語一句我猜了兩個可不知道哪個對大傢夥兒一瞧這個小孩挺聰明這位老先生就問了嗯學生你猜什麽呢一個就添個口字叫有口難言再一個就是噁心不善亞字底下擱一心字不就成了惡了就這麽兩句俗語這老先生點了點頭學生你這第二個謎打上了就是惡心不善行回家煮元宵吃去吧把這份彩頭就拿過來了又走到一個買賣鋪戶門前那兒也有謎語海川一瞧有這麽一條兒門口格子上挂著一個小孩兒玩的唱戲的假臉兒旁邊還有兩吊錢也是打俗語一句猜中者不但這兩吊錢歸你還給你二斤元宵大傢夥也都在猜海川也想這是怎麽回事呢這時候一位穿著羊羔兒皮襖系著青褡包帶著老氊帽穿著老氈疙瘩邁步進來了說道掌櫃的這條兒謎語我揭了嗷好啊爺台祝您年節快樂您來吧揭這個吧這人到這兒一伸手把這兩吊錢摘下來轉身就走走到人群這兒一回頭老師傅我打上來了吧老頭兒樂了哈哈這元宵也歸您他把這兩吊錢拿了元宵也拿了分人群走出去了大傢夥就問啦嘿老頭他怎麽打上了到這兒把錢拿走了您還給他元宵您給揭一揭這個叫什麽老先生笑著說諸位您瞧這兒有錢還有假臉這句俗語叫要錢不要臉他把錢拿走了把臉擱在這兒了不正對了嗎大傢夥這樂呀連王爺都樂了好這個謎語編得好再往前又碰見打燈虎的了這兒上頭紅紙寫著黑字鐵打一隻船金子兩鑲邊一腳踢碎了還須用線連打四個地名有一個文墨人兒說老先生這個燈虎兒要打上來有什麽彩頭哇您瞧見沒有四斤元宵兩吊錢元宵您回家一家子煮著吃去兩吊錢您打點酒買點兒菜回家喝二兩這個不好打這個我打上來了您當著大傢夥說說吧對了您就把彩頭兒拿走這位說好吧我打這頭一句鐵打一隻船是陳州金子兩鑲邊是貴州一腳踢碎了是蘇州還須用線連是杭州不知道對不對您打對了把元宵和錢全拿走了海川還納悶兒呢這位打得很脆呀後來自己這麽一想嗷對了鐵打一隻船船就是舟那還不沈嗎金子兩鑲邊拿黃金把兩旁邊鑲起邊兒來那可不是貴重嗎值錢哪貴州一腳踢碎了把這船給踢碎不就酥了嗎蘇州哇還須用線連拿這針一縫這不是杭州嗎高年大人陪著王爺指指點點說說笑笑擁擁擠擠便由北新橋走十條奔錢糧胡同口過東四牌樓奔燈市口來了越走越近很快就進入燈市口了爺兒幾個正在那逛燈呢猛然間燈市口一陣大亂嘩就像開了鍋一樣人群波開浪裂就聽有人喊不得了啦有人拖人呐這人膽兒可不小哇聽說是皇上的孫子搶人呐又有一個老太太的聲音救命啊還有人喝喊著打打打年大人聽了就一怔王爺聽完了把臉沈下來了正月十五逛燈天子與民同樂大傢夥兒正在高興的時候繁華之地怎麽有皇孫搶人呐王爺忙說海川快過去瞧瞧不管他是誰把他給我抓來王爺說了話了海川敢管了英雄馬上分人群往前走老百姓四散奔逃海川擠到現場擡頭一瞧海川可是一愣一匹白馬鞍嚼環鮮明馬上坐著一位公子阿哥爺迎頂鑲著一粒明珠身上穿著紫色宮綢皮袍外罩火紅緞子的斗篷看年紀也不過二十來歲手下有二十幾個惡奴都是短衣襟小打扮絹帕纏頭每人身上別著一根檀木斧把搶一個老太太和一個姑娘這個老太太撒野打潑地喊救命啊搶我的女兒啦一個惡奴過來照著老太太胸口就是一腳這是你們家的造化不識擡舉搶你們閨女算什麽海川一想真有這事千人瞧萬人看隨便搶人家婦女海川不由得勃然大怒不用說王爺有話沒話我也得管呐海川墊步擰腰燕子三抄水飛身形過來來到馬前伸手一橫光天化日朗朗乾坤天子與民同樂你們竟敢在衆目睽睽之下擅搶良家婦女旁邊有人說這老鄉你逛燈就逛唄見著這事躲遠著點兒你管這事幹嗎旁邊又有人搭茬道二哥您甭說今兒這場事這老太太家裏有德性碰見這位敢管換個主兒真沒人敢問喲喝你認得他多新鮮呐我憑什麽不認得他呀不認得他咱們就敢說話了嗎哎喲喝那麽他是誰呀你們聽著吧別人能管嗎這位是北城根兒雍親王府的教習鎮八方紫面昆侖俠童林童海川把旁邊這位嚇了一哆嗦怎麽著童教師大名鼎鼎下江南拿二小請國寶就是他對啦別人誰敢管海川真把這位阿哥給攔住了他是九皇子九貝勒爺的兒子阿哥弘濤這位阿哥仗著他父親的勢力仗著是皇親在北京城裏做盡了壞事沒人敢惹他今天他帶著惡奴到這兒來也是爲了尋歡作樂他手下有四位教師爺一位教師爺叫土蜘蛛何立很有本事一位教師爺叫神拳無雙趙有來一位叫鐵頭李四最厲害的叫賽燕青周蘭這賽燕青周蘭也是江洋大盜通過趙有來把他介紹到九貝勒府在九貝勒府當了教師爺他是少林弟子有很好的功夫沒想到這次童海川要管這閒事阿哥弘濤勃然大怒什麽人鄉下人竟敢管閒事來呀給我把他打死阿哥爺傳下命令土蜘蛛何立可就過來了大胖子小短脖子小腦瓜兒晃晃悠悠往前走一撇嘴兒嘿鄉下人放著燈不逛怎麽多管閒事呀你知道這是誰嗎這是九貝勒爺府的阿哥爺弘濤別說搶一個大姑娘搶十個八個的那是他們被搶家的造化你在這兒擋什麽橫兒呀童林這麽一聽真是皇子府裏的皇孫哎呀那我也得管呐身爲俠客不能見義勇爲瞧見這種不平之事不能說一說公理那算什麽英雄這時海川一壯英雄膽說道不管你是誰搶人犯法把姑娘放下你打聽打聽你家教師爺叫土蜘蛛何立我要你的命說完往前這麽一趕步左手一晃面門問心一掌海川一叼他的腕子伸左手一托他的二膀子左手往起一擡右手往下一按嘎叭一聲海川就把這土蜘蛛胳膊給掰折了弘濤一瞧啊真把我的教師爺胳膊給掰折了老百姓可就更亂了正這個時候打阿哥弘濤旁邊噌地又躥過來一位一晃腦袋說道打聽打聽我鐵頭李四是什麽人物你敢攔阻我家阿哥爺搶人我要你的命舉雙拳泰山壓頂嗡地一下就下來了海川一撤右步伸左手往下一壓一擡右手說你叫鐵頭李四我試試你這腦袋有多大勁兒說完照著腦門子上啪一掌撲這口血就噴出來了甭說你這腦袋鐵背羅漢法禪僧那腦袋多棒啊一巴掌我都讓他吐了血兩位教師都受傷了神拳無雙趙有來墊步擰腰過來用手點指你這鄉下人真乃大膽太歲頭上動土老虎口邊拔牙認識你家教師爺神拳無雙趙有來嗎往前一搶步左手一晃面門右手一攥拳單風灌耳海川上右一滑步褪頭一躲立右手一叼他的二膀子就這麽一擰他一伸左手啪拿左胳膊往下一插一掌把趙有來的右膀子給砸折了阿哥弘濤可就急了氣呼呼地大喊道給我上二十幾個惡奴就呼啦啦往上沖三位教師爺全都傷了他能不急嗎惡奴們各自把檀木斧把抽出來你這鄉下人是找死我們二十幾個小夥子每人一條檀木斧把一個人給你一下就二十多下把你砸死你敢管這個閒事你問問北京城誰敢惹我們呀海川一瞧一窩子狗金上來了您別看他們人多這些人在海川眼睛裏什麽都不是這都是馬勺蒼蠅混飯吃的主兒英雄就使了一手兒金剛八式掌的虎抱龍拿又猛又狠嘩地一下子惡奴們的斧把掄起來往下蓋海川就這麽一矮身一個旋風腳啪啪啪就踢趴下四五個反崩一拳叭叭叭打得這些人鼻腫眼青王八吃西瓜連滾帶爬落花流水正在這個時候馬後頭有人高聲喝喊什麽人竟敢攔阻阿哥爺搶人你真乃大膽認識九貝勒府的教習賽燕青周蘭嗎其實周蘭和海川是同等的人物不過從兩人所處的環境倚仗的勢力和他本人的爲人都大不一樣九貝勒爺雖是皇子但他卻只是個貝勒雍親王就不然了他是封了親王的貝勒封了親王就不一樣了二者說周蘭不是好人海川是正人君子周蘭不是俠客海川是鼎鼎大名的童俠客這怎麽能一樣呢海川一瞧周蘭三十多黃白淨臉穿一身青腰裏紮著絨繩著青色夾褲外頭罩青皮套褲搬尖靴鞋白襪子墊步擰腰過來左手攥