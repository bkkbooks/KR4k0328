body:
  text: 第六十八回愛賢女釋嫌許終身司馬良遇險轉心亭上回書正說到小白猿王環夜上七星山在西二十五間倉房的翻板內被擒韓志押著王環擡起來奔前山走沒想到在內宅的花園巧遇姑娘愛賢女段銀娘她一聽說這就是鏢打自己親哥段世寶的仇人親兄妹能不難過嗎過來拿燈光一照才知道王環是個年輕的小夥兒這樣從韓志的手裏頭要過來一直把王環搭到自己的閨房把他綁在椅子上頭細問王環王環實話實說我王環的父親太谷縣快手王能王班頭訪案在七星山附近被本山的寨主霹靂烈火火眼狻猊段國柱帶著巡山寨主楊山董玉把我父親給亂刃分屍了那時我王環尚在繈褓呀母親無力養活我爲此母親帶著我前去尋死不想被我恩師銀面仙猿鐵臂昆侖石老俠發現才將我母子救下八十歲的老人嘔心瀝血教我王環一身的武藝十二年臥薪嘗膽也爲了給我死去的天倫報仇父兄之仇不共戴天我焉能不報爲此在彩鳳山祥雲島刀劈楊山鏢打了段世寶原爲給我死去的天倫報仇既然被擒我王環不惜一死不是說你們山上若獻金牌必須有我王環這條命頂著你們才換現在我來了讓你的天倫伯父把我王環殺了金牌送往公館這是實情請問你是誰呀姑娘聽了就一陣發愣長歎一聲說哎喲我乍一聽說你把我哥哥殺了我是萬分地難過想不到你滿腹含冤現在殺我的兄長不能埋怨你呀現在你王家的人殺了我段家的人將來我段家的人再殺你王家的人子子孫孫輩輩往下傳成了世仇爲子孫多留後患做長輩的可就大不應該揚湯止沸不如釜底抽薪公子你要問我是誰我就是大寨主的侄女二寨主火眼狻猊段國柱的親生女你打死的段世寶是我的親兄長王環一聽上下打量喲你是段家的姑娘啊不錯咱們應當想個辦法使咱們段王二姓不但不成仇將來能化仇敵爲朋友化仇人爲親人你看這好不好哇王環這麽一想等等吧這個姑娘長得俊美她可是我仇家之女呢看她剛才說這些話的意思我王環能不明白嗎可有一樣我能跟仇人之女結爲秦晉嗎此事萬萬使不得即使我樂意母親恩師也不答應王環想到這裏把臉往下這麽一沈說姑娘方才我已經跟你說過爲報父仇來到七星山既然被擒我決不怕死你不如把我帶到前廳有什麽話到那再說殺剮存留就任憑他們說完了以後王環不言語了姑娘臉一紅微有點笑容說王公子你也不用這麽強橫我這裏有個條件要死要活由你嘴裏說要死是很容易的要活也不難哼姑娘你這叫什麽話什麽條件呢你要打算死我就把你送到前廳去交給我伯父父親給我三哥報仇不過到了前廳二話沒有按照山裏的規矩把你推到外頭就殺了我要活呢姑娘微然一笑你要願意活就很容易了我問問你你家裏頭都有什麽人呢王環一琢磨來了是這麽回事你問我的家裏只有老母在堂上無三兄下五四弟形單影只我是孤身一人姑娘聽了臉色緋紅欲言又止點了點頭說嗷那麽你訂親了沒有呢王環很不以爲然姑娘我是被擒之人你問這個何用我有我的心思剛才的話你沒聽明白嗎你應該跟我說實話告訴你吧只因爲家境貧寒尚未訂親姑娘一聽到這兒心裏可就樂了我要跟他成親這不就是天生一對地造一雙的美滿姻緣呀時逢恰巧他又沒有訂親看起來這是天作之合呀自己想到這兒便道公子啊這話我可跟你說殺了我們本山巡山寨主追風牡丹楊山這個仇可不小你敢到七星山來是禍由自取呀我很欽佩你的爲人我雖然是個女流之輩但會文武絕藝不是我這麽大的姑娘不顧廉恥剛才我跟你說了如果段家王家做成了世仇子子孫孫生生殺殺一代一代殺起來沒完那麽這就不是祖宗的本意了所以我說揚湯止沸不如釜底抽薪我願意唉怎麽說呢姑娘一背臉如果你要樂意的話你我年貌相當不棄蒲柳之姿情願侍奉箕帚有這麽句話墳中有骨是親戚如果我們兩家成了親戚那麽就不至於再結世仇了吧王環心想這個女子當面求親真是不顧廉恥呀有失閨門之禮可是我要不應她惱羞成怒她還不殺我不如我應了她假意誆她把我解開設法逃走再設法盜走金牌王環把主意拿定又看了看愛賢女段銀娘唉姑娘說句良心話姑娘你貌似天仙文武全才我真要得你這麽個媳婦這一輩子也沒有別的所求了段銀娘一聽這是誇自己呢王環又說可有一樣沒有父母之命媒妁之言我可不敢答應呀再說還有你的伯父你的父母說真的我把你們家的少爺段世寶給打死了即使姑娘你樂意那麽姑娘你的伯父天倫樂意嗎我看這個事你還得慎重跟你的父伯商量一下吧再又說回來了我王環家境貧寒日無隔宿之糧你要過了門能隨著我的寡母過日子嗎段銀娘道哎王郎你這話就錯了嫁雞隨雞你家裏頭窮我可以多帶錢呀使你們母子能過上比較寬裕一點的日子這不就行了嗎什麽一定要君子安貧呐唉可是姑娘你竟這麽說了你還沒把綁繩給我解開呢哪能捆著談論親事姑娘這麽一聽喲慢待了王郎跟著就往前走小丫鬟機靈噔噔噔跑過來就要給解綁繩姑娘拿手一扒拉她慢著男女受授不親你懂不懂呀這個活不是你幹的你趕緊到廚房去讓大師傅做十個八個的精致的菜我和姑爺一起喝兩杯小丫鬟答應如飛而去心說喲這麽一會兒就成了姑爺了嘿姑娘親自把王環解開用手把王環身上的白灰全都給撣掉又讓另一個小丫鬟準備一盆洗臉水讓王環洗了洗臉借著銀燈一照真是容光煥發更顯得英俊姑娘的眼珠都不錯位越看越喜歡越看越愛兩個人一前一後可進了裏屋小白猿王環這麽一瞧喝自己長這麽大也沒住過這樣的房子真跟金鑾殿似的陳設不俗啊靠西山牆有一張八寶逍遙自在床大紅洋縐的幔帳黃澄澄赤金如意鈎倒挂繡的百幅留雲的床圍子閃緞褥子閃緞被子這個帳頂上挂著一個大鮮花籃茉莉晚香玉撲鼻噴香一個個大箱子哎喲足有四五個頂天立地摞著再有梳粧檯穿衣鏡沒有一樣不是講究的王環上了腳踏坐在床沿上馬上有小丫鬟把茶泡好端來床上放著一個小桌段銀娘讓王環收上腿去坐在裏邊臉沖南姑娘也收上腳去坐在南邊臉沖著北就隔一個小桌兩個人喝著茶王環把自己的經過從頭至尾都說完了姑娘也把自己的事情說了不瞞你說王郎呀我想只有這一個辦法才能止住咱們兩家的世仇不然的話那是沒有辦法的王郎你出身名門是石老俠的弟子可是我家呢是占山爲王落草爲寇的如果妾身願隨君去不知道你老母親那方面意下如何王環一聽這丫頭想得周到啊姑娘這個你放心到了時候我可以把你領到家中拜見老母老母一看你相貌嬌豔也沒有不樂意的再不成我給老母磕頭央告老母一定能成全我們說著話酒菜擺上來姑娘親自給斟酒布菜啊王環這麽一想我要把她給灌醉了然後我把刀鏢拿起來我一走了之不然我誆過刀鏢來把她殺了我再上前山好在他家是我家正式的仇人這時候王環就一個勁地勸姑娘的酒越喝越多兩人的話也越說越近乎正在興高采烈的時候猛然間外間屋有人說話半夜三更的你跟哪個男的在說話呀唰一挑簾子段銀娘不由得就回過身來王環也擡頭瞧見了借著燈光一照是一個俊美如花的少婦身形苗條體態輕盈常言說男子俏一身皂女子俏一身孝這位少婦穿著一身重孝更顯得俊俏正是墨粉蝶段世寶之妻陳月娥原來姑娘勸三嫂子回去陳月娥怎麽也睡不著獨對孤燈潸然下淚自己哭了半天又一想丈夫已經死去不能複生怎麽著我也得打起精神來撫養我這個孩子呀銀娘妹妹知道到這裏來勸我大嫂二嫂人家就不來一來隔著一層二來沒有那麽深的感情我也睡不了覺不如到妹妹房中再說會兒話熬到困了回來再睡陳月娥想到這就站起來去了沒想到來到妹妹的當院就聽見屋裏頭又說又笑心裏就想你是沒出閨閣的十九歲的大閨女深夜裏你在閨房當中跟一個男的又說又笑這像話嗎再說你哥哥剛死兩天屍骨尚且未寒你跟人家又說又笑好象你們家沒死人一樣與禮不合這樣陳月娥就過來說話了妹妹你招待誰呢見是一位二十來歲的小夥兒長得很俊風流瀟灑倜儻不羈不覺一愣妹妹這是誰呀你怎麽會跟他在一起又說又笑挺大的一個姑娘你就不知羞恥三嫂子咱們姐兒倆最好你來了我就跟你說說吧你要問這是誰小妹已經把終身大事許配於他就是他在彩鳳山祥雲島刀劈了巡山寨主楊山鏢打我的三哥您的丈夫段世寶他就叫小白猿王環王郎啊你趕緊見過三嫂子沒等王環見禮呢陳月娥就把臉沈下來了妹妹你真乃大膽大伯父和公公尋找仇人王環爲給你哥哥報仇雪恨這王環既然是飛蛾投火自尋死路來到咱們山中你就應當仗大義爲兄長報仇把這個人送到前山親手交與伯父公公任憑伯父公公把他處治開膛摘心給你兄長祭靈這才是你做妹妹的道理怎麽你無緣無故私訂終身恬不知恥置兄長的深仇大恨于不顧你丟盡了我段家的臉面銀娘聽完了可不大樂意了三嫂子你這人好糊塗呀我怎能無緣無故嫁與仇人呢你問問王郎人家是無緣無故地殺人嗎他和三哥有什麽仇三哥和他房不連簷地不連邊素不相識爲什麽兩人動手三哥叫他殺了禍因結在老一輩人的身上當初我的天倫你的公公帶著董玉在山下遇見王郎的父親太谷縣的班頭快手王能無緣無故不問青紅皂白把人家亂刃分屍這你知道嗎那個時候王郎的母親抱著王郎一起尋死被小王家砣銀面仙猿鐵臂昆侖石老俠看見救了他們母子石老俠教給王郎本事臥薪嘗膽藝業學成在彩鳳山給自己的天倫報仇三嫂子你知道嗎人家王郎爲他父親報仇當年你的公公我的父親又爲給誰報仇殺了人家王郎之父嫂子事遇反諸己不管什麽事出來先得問問自家自家樂意不樂意啊你怎麽過來就說王郎要殺我三哥呢我聽了王郎爲報父仇含辛茹苦實非不容易我敬他一片孝心而且又是一位將門之後石老俠的弟子將來的前途不可限量爲這個我才把終身大事許配給王郎墳中有骨是親戚今後也不會再有殺人流血的事情發生了你說我怎麽不對呢陳月娥聽完以後把臉沈著用手點指妹妹呀妹妹你還跟我強詞奪理不管是怎麽回事也應當把他交到前山任憑伯父公公做主哪怕伯父公公認爲這人好把你終身大事許配於他我決不多說走吧你跟我上前山吧說著拉著姑娘就要走段銀娘的功夫比陳氏強並不怕她段銀娘把臉往下沈道我可告訴你了嫂子咱們姐兒倆的感情不錯誰要打算破壞我的婚姻攔阻這件事別說是你就是前廳的二老來了我可野麥子不分壟酸棗眼青紅不分依我說你趕緊走陳月娥見銀娘破被窩不賃喝道走你認打認罰認打怎麽樣認罰怎麽樣認打我拉著你們兩人到前山讓二老把你們兩人全殺了讓你們結個鬼緣嗷要認罰呢一說到認罰陳月娥面泛紅雲臉兒呼地一下就紅了妹妹你要認罰嫂子我說一件事你聽聽你三哥已然死了嫂子我今年二十三歲呀哎呀棒打鴛鴦兩分離呀試問問我這後半生又怎麽能活下去我看我和王郎兩人倒很般配你不如把王郎讓給我我和王郎結爲夫妻妹妹你是個姑娘而且有一身好本事長得俊美玉潔冰清你要擇夫事主兒不乏其人呀你要打算嫁人什麽好樣的你都嫁得著比王環好的俊的都能我就不然了不知你意下如