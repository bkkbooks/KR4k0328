body:
  text: 第六十六回童海川斗膽闖三關小白猿如願捉董玉上回書說到石老俠海川哥兒仨來到七星山擡頭一看謔山連山嶺環嶺山嶺環抱綿亙不絕各種桑柳榆槐松樹林漫生於山坡之上怪石嶙峋好不險惡西山口坐東朝西大片的樹林裏有暗哨猛然間傳來風吹皂旗聲就在山口裏頭有一杆大旗杆上面有一面皂綢旗上頭有字七星山狻猊寨三俠到了一陣鑼響嗆啷啷出來四十名兵丁卒巾號坎兒打裹腿搬尖灑鞋腰裏紮著絨繩坎肩前邊一個勇字後頭一個兵字每人抱著一口刀爲首一個頭兒呼啦一下子過來攔住了老三位衆位別往前進老俠石金聲一抱拳問衆位辛苦辛苦哎好說好說您老怎麽稱呼在下住在本地太原府西關外小王家砣姓石名鐸表字金聲闖蕩江湖有個小小的美稱銀面仙猿鐵臂昆侖哎喲喝大名鼎鼎的石老俠啊哈哈小的有眼不識泰山我趙五這廂有禮了啊不敢當不敢當趙五你瞧他們了沒有啊這兩位是這是你們街坊兩界山嶺的後頭彩鳳山祥雲島的老寨主金頭壽星洪勳洪老俠趙五雙膝跪倒哎呀洪老俠客爺老街坊小的給您行禮石金聲一指童林這位是奉聖命保欽差查辦四川的隨行衛員伴差官鎮八方紫面昆侖俠童海川童俠客啊趙五一哆嗦哎喲喝原來是三位俠客爺到了恕趙五未曾遠迎海川一伸手您起來吧童某今天跟著兩位兄長來到七星山狻猊寨原爲拜望段家弟兄你給通稟一聲啊三位俠客爺您候著趙五往裏通報來到大寨廳單腿一打千兒報上垂首坐著段國基下垂首坐著二寨主段國柱大寨主段國基用手點指趙五報將上來啓稟老寨主銀面仙猿鐵背昆侖石鐸金頭壽星洪勳鎮八方紫面昆侖俠童林三位前來拜見兩位寨主段國柱一聽立時火冒三丈嘿呀一聲嘎啦啦就好象半空中響了個霹靂非要下山找老兒石金聲報仇雪恨不可爲什麽讓你弟子王環殺了我的兒子幸虧大爺段國基慢慢地勸著段國基想啥呢石老俠能耐大他要一瞪眼你給我滾我們得走尤其是童海川要找的金牌在這兒呢童海川是隨行衛員伴差官咱惹得起嘛只好傳話準備二百兵丁鼓樂三奏出山迎接段國柱一拉哥哥您先等等二弟啊你我趕緊出山迎接三俠有什麽話到裏頭再說呀咬人的狗不露齒就是仇再大見了面以後也不用瞪眼吹鬍子哥哥那也給他們點兒顔色看看李軍師旁邊一位元瘦小枯乾獐頭鼠目的李吉李軍師過來了大寨主我看二寨主說的很對呀呵怎麽個意思李吉對著段國基耳朵唧咕半天道我們應當這般對待他們三人尤其是童林段國基聽完了點點頭道李軍師照計而行來呀擺隊迎接狼狽李吉調遣一切段氏弟兄帶著一部分人擺隊相迎一直到山口外轉眼之間來到切近段國基笑道恕我弟兄未曾遠迎當面請罪石老俠伸手相攙這次帶著我的兄弟來到貴寶山前來拜望哈哈哈哈冒昧造訪還望二位寨主海涵哦石老俠太客氣了又對金頭壽星洪勳一抱拳道昨天是老兄你的封刀盛典只因我弟兄二人窮事多忙未能前往只是打發幾個孩子前去祝壽哈哈哈沒想到在你那兒出了點兒事兒我的侄子段世寶被人家給打死了我的巡山寨主楊山被人家給劈了我不知道爲什麽如果說屬於我七星山的錯人死了算白死我弟兄正要前去賠禮道歉沒想到您來了洪老俠行禮道我跟著哥哥兄弟這一次來到寶山也爲了說明此事哦哈哈哈哈好好好失迎失迎這位呢海川一抱拳二位寨主在下家住在直隸省京南霸州童家村姓童名林表字海川北高峰獻藝賀號得了個小小的美稱我可不夠鎮八方紫面昆侖俠段國基道唉呀原來是大名鼎鼎的童俠客聽說您當初頭下江南拿二小請國寶兩次杭州擂獻藝賀號威鎮武林此番奉聖命保欽差查辦四川路過太原童俠客您是大人貴足蒞臨賤地就應當擺隊相迎來請吧往前一趕步伸手拉海川的胳膊拉著童林往裏走海川明白要試試我的勁頭啊段國基一伸手抓的是海川的脈門寸關尺脈門要讓人家抓住這可就危險但是海川面帶笑色道請吧哈哈哈哈那意思隨便抓大寨主段國基扣住海川的脈門打腎眼一提真氣這麽一用力他才感覺到海川的肉皮兒直頂他的手指頭一股大的力量在手指上打算往下扣勁就跟扣在鋼棍上扣在石頭上一樣段國基嚇得一哆嗦趕緊把手撒回來了哈哈哈哈童俠客請請請就領著三俠往裏走順著山道上來走到半山坡上就是正寨門一進寨門往裏走走出不太遠一大片樹林後頭嗆啷一陣鑼響海川一瞧喝唰地一下轉過一百人來每人都是一口雙手鋥明瓦亮的長把短刀五十對兒臉對臉兒雙手往空中一舉刀對刀搭成一條人字胡同段國基來到跟前兒一抱拳童俠客請吧海川仰面大笑哈哈哈哈大寨主隆情盛意迎接童某感恩不淺二位老哥靠後海川邁著四方步就奔這刀子陣來了真的往下一低頭亮出脖子來往裏走嗨談笑自如面不改色滿不在乎往裏這麽一走走到一半兒的時候段國基一擺手唰地一下這一百兵丁就撤了俠客好膽量哈哈哈大寨主誇獎了請走出沒有多遠一陣鑼響打樹林後頭轉過來一百兵丁來每人端著一杆蠟杆槍槍尖對槍尖成一條槍胡同童俠客請海川點了點頭邁步往前走海川大搖大擺順著他的槍陣往裏來這叫鑽刀山過槍陣連石老俠和洪老俠都豎大拇指稱讚好樣的再往前走出不遠嗆啷啷一陣鑼響樹林後頭又轉出一百名兵丁海川一瞧這個可懸這一百名兵丁可不是人對人一對兒一對兒的犬牙交錯而是每人一張弓認扣填弦全部拉圓了上頭有箭叫引滿待發如果海川走到這兒一撒手箭唰地就出去只能射童林射不著別人那刀也好那槍也好要想暗算海川是不容易的這弓箭可撒手不由人啊大寨主段國基一抱拳道恭候童俠客請吧海川把心一橫邁步往前走唰唰唰從弓箭陣裏頭往前鑽段國基一擺手唰啦弓箭陣撤了段國基豎大指童俠客盛名之下絕無虛士罷了不枉您年輕輕的享此大名果然膽略過人啊哈哈哈大寨主二寨主跟三俠這才合在一起趕奔大寨順著大門往裏走來到分贓大廳大寨主段國基一抱拳道三位俠客請來上座老俠石金聲趕緊把海川一拉二位寨主爺這是您的座位常言說得好帥不離位我們還是便坐一談吧大家分賓主坐好段國基施禮道不知三俠來到鄙山有何公幹老俠石金聲一抱拳二位寨主我們都是很好的朋友這一次我的兄弟童林保欽差到四川放糧路過太原府一時不慎有人把大人的代天巡狩如朕親臨的金牌盜走了我們打聽到牌落在貴寶山爲此我弟兄三人前來尋討我想大寨主是聰明人隱匿金牌分明陷害四川父老大寨主我們也不打聽是誰偷的可以任其逍遙法外主要的您把金牌賞下來趕緊讓大人到四川放糧事情就算完了大寨主段國基聽完後一陣大笑哈哈哈哈石老俠您放心金牌在我這兒呢不過您要讓我們弟兄獻金牌也可以不但獻金牌窩主的官司我們哥兒倆跟著一塊兒到公館領國法受王章不過有一件事情要問問石老俠嗷大寨主有話請講當面老俠客昨天我打發幾個孩子還有兩位巡山寨主到彩鳳山祥雲島洪老兄台那裏拜夀不想在拜夀當中您讓您的弟子以練刀爲名刀劈了我巡山寨主楊山鏢打了我的侄男段世寶您老是本地的人道高德重江湖路上您也是了不起的前輩俠客我段國基小小的名譽和您比起來那就差得太遠了駑馬難比麒麟烏鴉難比鸞鳳螢火之光比不了你這天心的皓月話雖如此您也不能依仗您的威名欺壓我弟兄再又說回來了我弟兄在七星山這兒佔據這麽多年離您的府上不過幾十裏地您也可以打聽打聽我們犯過什麽法我既然沒犯法您無故殺人我倒是不明白了您這是爲了什麽呢老俠石鐸抱拳道大寨主責備甚是不過我這弟子叫小白猿王環今年二十歲十五年前他的父親太谷縣大班頭快手王能訪案在七星山被令弟段國柱段二寨主帶著巡山寨主楊山董玉把王能亂刀剁了說官人同我們綠林冰炭不同爐爲什麽七星山依仗著勢力就把王能無故殺死他母子二人無奈要跳水坑自殺身死被老夫看見我聽了一時憤怒我把這孩子收留在我們家下奉養他的母親這個孩子跟我練藝十二年臥薪嘗膽爲報父仇我到彩鳳山祥雲島前去祝壽我的孩子也到彩鳳山祥雲島前去祝壽時逢湊巧讓這孩子練藝才殺了楊山段少寨主這可是人家子報父仇啊有道是父兄之仇不共戴天焉能不報再說這件事情是我石鐸所爲我讓弟子報的仇你們哥兒倆要認爲不應當要認爲這裏頭我姓石的欺負人你們哥兒倆拍我的家門找我去好漢做事好漢當我既敢讓我徒弟報仇老夫我等著你們弟兄拍我的家門找我可這個時候金牌的事情出來了落在七星山大寨主咱們是冤有頭債有主誰的事情誰承當我今天陪著海川兄弟與二位寨主要金牌這是一回事請二位寨主不要往一塊兒攪我就問您一句話咱們先辦理金牌咱們今天就說金牌的事您要說咱們解決王環的事咱們今天先解決王環的事大寨主段國基一聽哈哈大笑老俠客您是人間的俠客手一份腳一份文一份武一份這個段國基也明白您要說是兩碼事就是兩碼事實際上這兩碼事也是一碼事此話怎講您要讓我們獻金牌打官司成我們也不怕死但是您得把王環給我送來我把王環殺了我就給金牌石老俠您不把王環送來金牌我不能獻哈哈哈大寨主剛才不是跟您說了麽您獻金牌不獻金牌您跟海川去說至於王環的事情您劃出道兒來我們師徒當河走您說怎麽辦官私兩面我姓石的不在乎您不能往一塊兒攪和這件事情是雙方攪起來的您要金牌您先把王環給我送來您先把金牌交給公館王環的事情咱們單說海川在旁邊一拉石哥哥兄弟我說兩句話成嗎嗷兄弟你是正差呀你說吧海川一抱拳大寨主二寨主我童林年輕沒有什麽經驗閱曆我說出話來對與不對你們二位寨主多多原諒我聽了這麽半天只不過是兩件事變成了一件事我哥哥石金聲一定要求金牌的事情辦金牌的事王環的事情辦王環的事您要把兩件事攪在一塊兒獻王環金牌就交到公館如果王環不到七星山那就是說縱有風流隨何的善辯浪子陸賈的奇才口似懸河舌如利劍你在七星山也說不出去金牌是不是這個意思段國基點頭童俠客聖明就是這麽個意思二位寨主啊比方說我們不獻王環你再畫出一條道兒來說你們不獻王環也成你們能辦到這一條你們就把金牌拿回去我童林本著交朋友的心您要有主意您說出來大寨主段國基看了看自己的兄弟段國柱然後一樂哈哈哈童俠客您說到這兒我們也本著交友之心我在後山修建了一座七星八寶轉心亭金牌就在七星八寶轉心亭內咱們定個日子你們能進了七星八寶轉心亭也就是說破了這個亭子金牌自然到手我弟兄打官司如果你們破不了七星八寶轉心亭金牌當然不能到手我們也不給童俠客您看怎麽樣海川聽了想起當年沅江金銀亂石島破達摩堂立刻有底了其實這是兩回事達摩堂那是武術不是走輪捎息武術你破得了七星八寶轉心亭可不成都是西洋八寶轉輪消息蹬上死撞上亡寨主原來貴山有七星八寶轉心亭很好很好您沒讓我們看見我們不知道七星八寶轉心亭是什麽意思怎麽跟您定日子呢您帶著我弟兄到七星八寶轉心亭看一看順便我們瞧瞧金牌好好好好好好三