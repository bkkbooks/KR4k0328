七星山面見段氏弟兄說明此事小太爺決不怕死你給金牌你把我姓王的亂刀剁了我決不含糊小英雄思索到此就撤身奔東院又由東院翻牆而過穿大街過小巷趕奔東南城角施展狸貓登樹的功夫上了城牆越過了護城河腳底下攢勁唰啦啦快極了王環雖是本地人打八歲學藝到二十歲出藝沒離開過家門他根本不認得七星山在什麽地方他應當往東南啊沒想到他往正南下來出去將近六十來裏地他約摸著該到了怎麽還不到呢突然從打東面順著大道沙沙沙半貓腰跑著個人身背後斜插柳背著一口刀五十上下歲王環趴在小道上正看這人借著月光嗯這人我怎麽瞧著眼熟啊嗷他想起來了狹路相逢冤家路窄正是我的仇人七星山巡山寨主望月牡丹董玉彩鳳山祥雲島刀劈的就是楊山鏢打的是段世寶喝這可該著啊小子你這是上哪啊我得抓你望月牡丹董玉從彩鳳山祥雲島回來他可琢磨啊這個小孩刀劈了楊山拿鏢打的可是我董玉啊看來這小孩和我有仇是我躲過去了但總有一天還要把我給弄死嘿看起來七星山是是非之地於是他找到段世鈴道我從彩鳳山祥雲島回來渾身發緊有點發燒病了你能不能跟大寨主提提我請幾天假下山就醫段世鈴是忠厚人就批准他下山了第二天他溜溜達達從七星山往西了走出去有二十幾裏地眼前頭出現一個大村子東西一趟正街到了村口路邊上有一個石碑石碑上有三個大字叫耿家莊一進耿家莊路北裏有個大戶人家一看就是個大財主正走到這家門口猛然間後頭有車馬聲音董玉回過頭來一看前頭是一匹馬後邊是輛車馬上騎著一個二十二三歲的年輕人細高挑圓方臉粗眉大眼好精神領著十幾個家人也有騎馬的也有步行的都在後頭保護著車輛馬一站住車也停住望月牡丹董玉是行家車裏頭坐的是女子因爲這招式連頭都不回車一停住大門咣啷啷開開門分左右打裏頭出來幾個婆子丫鬟來到車轅的外頭一個婆子把接腳凳拿下來往外首一放把車簾兒撩起來董玉這麽一瞧真是魂飛千里叫姑娘的美貌把他的魂都給勾走了千嬌百媚的一個大姑娘荊釵布裙長得俊極了婆子丫鬟攙著姑娘由車上下來登上接腳凳下了地簇擁著姑娘進了大門進了大門一回身咣啷啷關門了董玉心想我讓這姑娘嫁給我想到這兒他可就往街裏頭來了走到十字街他一擡頭見是個兩層樓的小飯館就挑簾櫳進來樓底下的座位差不離都滿了董玉只好上二樓坐下要酒要萊時間不大酒菜全都擺上來了一個人自斟自飲越想這姑娘他越迷瞪哎呀國色天香啊嘿嘿嘿該著我董玉有造化喝著喝著酒一瞧夥計在旁邊侍候著忙問道夥計貴姓啊我姓李嗷李夥計你大名怎麽稱呼沒有侍候人的排行第三哎喲喝李三夥計你是本村人嗎祖宗三代都在這村住對於這村裏的街南街北鋪戶住戶你全知道嗎這您放心沒有我不認得的全認得那我問問你一進村東口路北這家人家是本村的大戶吧哈哈哈不瞞你說那是咱們耿家莊的財主是莊主爺他們有功名好嘛您沒看見門口的旗杆嗎旗杆代刁鬥啊那是兩位舉人老爺大員外爺姓耿名字叫耿文一肚子好學問三墳五典八索九丘五帝三代之事百家之說人家沒有不懂的那是一位文舉人還有一位二爺馬步箭弓刀石都有一套姓耿名字叫耿武那是我們二員外爺嗷家裏還有什麽人呀兩位舉人老爺的父母都沒有了有一個小妹妹還小今年大概是十八歲名字叫玉香姑娘待字閨中還沒嫁人哎客人您問這幹什麽沒有事我剛才從村口路過瞧見車馬人輛的來了不少有男有女我一看男女僕婦侍候著很夠意思我才打聽打聽說話飯吃完了董玉讓夥計算賬給了錢由這小飯館出來再走到耿家的門口他看了看四下沒人他做了個暗記兒可就出了村了一直往正東出去了有幾裏地在一座破廟裏頭躺倒睡下了他心裏還是折騰得了我今天晚上無論如何也要去耿家莊再一睜眼天可就黑下來打破廟裏頭出來大月亮地兒一直往西腳底下攢勁沙沙沙直奔耿家莊萬沒想到叫冤家對頭小白猿王環看見王環趴在地下借月光一看喝仇人相見分外眼紅殺我天倫的兇手也有他王環暗含著可就打後頭跟上了董玉一直往正西來到耿家莊的村口他往街裏頭瞧萬籟無聲路靜人稀也沒聽見什麽狗咬老百姓的窗戶也映不出燈光來看來人們都睡了覺董玉一拔腰起來單胳膊肘跨牆頭往裏頭一看他瞧見了二員外爺耿武正帶著家人巡夜同時小白猿王環高聲喝喊董玉哪里走小白猿王環在此王環也拔腰上牆頭要揪他家人王三爺也喊上了來人嘍別讓他跑了啊這些個人董玉不怕王環一說話他一摘胳膊肘唰一下就下來撒腿就往北跑有人喊呐不是一個賊是倆賊一塊拿開大門由耿武帶著巡夜人也往北追下來他們再快也不成啊董玉王環多快呀王環壓著刀追趕董玉高聲喝喊董玉你往哪走吧董玉一邊回頭一邊跑一前一後二人出了村越過護村的樹林兒大片兒大片兒的莊稼地董玉腳底下趲勁沙沙沙飛跑王環他更快呀眼看著就追上前頭一片高梁地王環怕他鑽進去他跑到暗處我在明處再想拿他可就不容易在彩鳳山祥雲島一鏢沒把你打死我後悔了一瞧這賊人真要往高梁地裏鑽這王環使個詐語董玉你鑽高梁地我哥哥在那兒蹲著等你呐嚇了董玉一跳再瞧王環三躥兩蹦到跟前兒董玉沒法子我也不能讓你就這麽樣把我逮住我也得往這高梁地裏鑽他往前這麽一跑王環高喊哥哥您出來別讓他跑了董玉一想你使詐語我不聽這套董玉就到了高梁地邊了王環又喊哥哥別在那蹲著了董玉就一愣神高梁地裏噌蹦起一個人來嘩楞楞一抖亮銀鏈子錘你喊什麽我蹲這兒您瞧見就得了王環一看是玉麒麟司馬良真是無巧不成書啊
