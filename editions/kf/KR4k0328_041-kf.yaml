個人叫張和住在牛街清真寺的南隔壁當然他也是清真貴教的人爲人忠厚老實家裏的日月很好過就在這南口外的南下窪上坡兒有這麽幾間房這幾間房是一個姓顧的在這蓋的遠在三百多年前這個地方是一片荒野地塋地墳頭兒一片一片的姓顧的爲了這地方清靜蓋了這幾間房又拿磚頭壘起一個牆院兒來房子蓋得了以後他是準備上這兒住可沒住兩天他不住了覺得這個地方太下梢就惦著把它賣了張和瞧著這地方不錯因爲這下坡的葦子都是張和的花的錢不多便把房子買過來了但他不在這兒住打算招個住房的住房沒人來這樣他把葦子收上來打成捆兒就在這院兒裏碼上張和張爸家裏有錢呐就買了很多的家具鍋盤碗竈桌椅板凳甚至水缸木筲都準備好了誰上這兒住家具算白用這樣寫了個招租條兒貼到門上了可是依然沒人上這兒來住張和發愁了再想賣沒人要了所以張和每天要到這房子轉個圈今天他又來了他一邊走一邊琢磨錢也不多怎麽會沒人住呢一掉臉兒鐵三爺在他身後呢鐵三爺一抱拳辛苦這位大哥張和一瞧鐵三爺在三十多歲高個兒寬肩膀四方大臉忠厚老實再一看坡兒下葦塘旁邊兒擱著不少行李還坐著一個年輕的婦人也就二十多歲一聽口音不是本地人起碼屬於直隸省往南嗷您您找我有事兒嗎鐵三爺一抱拳沒事兒跟您打聽打聽咱們附近哪有店呐是暫時住還是長期住聽你的口音不是咱們北京人你住得起嗎鐵三爺想了半天我們兩口子打河間府來到北京投朋友來了可是朋友也不定準好找住店嘛是要住些日子還是的你貴姓啊我家住河間府鐵家寨我姓鐵名木金排行在三嗷你是老表吧不錯是垛子體嘿呀哈哈哈老表老表咱們都是一樣我也是清真按咱們回教的習慣就叫你鐵三爸吧我就住在這牛街裏頭清真寺南隔壁我姓張名字叫張和說真的你呀別住店了鐵三爺搖頭嗨不住店一時也投親不著訪友不遇那我住哪兒去你看見沒有張和一指自己這幾間房這是我的房子你到屋裏頭去看一看桌椅板凳一應家具全有你進門兒就住什麽都不用買手使的傢夥都齊了你瞧這好不好鐵三爺一想這可不錯這位大哥您您這兒得要多少錢呐張爺一想我要是跟他要多了他不住就說這麽辦吧咱們都是回回親戚一個月你給兩吊錢你看怎麽樣鐵三爺一想哎呀有這麽便宜的事兒四吊錢我也租不下來呀張和認爲人家嫌多了不要緊哈哈哈你要嫌多咱們就改一吊呲鐵三爺這麽一吸氣一吊錢你要嫌多你就一個月給一百錢裏頭家具一切東西算我白給你使喚老表這還不成你瞧見沒有我這院兒裏的葦子你隨便燒哈哈哈你看好不好鐵三爺說這位大哥咱們哥兒倆萍水相逢一句話我要在您這住長了您可不能說到時候覺得不上算了那您得給我找房去您放心老表你這裏往著甭說你每月還給一百錢即使你不給你也隨便住你瞧好不好那我謝謝您了來我幫著您搬東西張和爲人還真忠厚幫著兩口子一趟一趟把所有的東西完全都搬進來了你們夫妻兩個趕緊歸置歸置我給你們挑水去說著來到當院拿起扁擔挑起大木桶來一會兒的工夫水挑來了先把水缸刷乾淨然後把清水倒上兩趟這水缸就滿了你們就在這兒住下吧好啦好啦還有你在這兒一直往北進了牛街口兒再往北只要是挂著盤兒的就是咱老表的買賣你隨便買吃喝用的東西全有行了張爸我謝謝您了甭謝你們兩口子外鄉人大老遠的來到北京城咱們都是回回親戚嘛這沒得說有什麽不足困難的時候找我去連三奶奶都給人家行了行禮大哥呀真的謝謝您了我們兩口子沒出過遠門兒這還是第一次一切求您多關照說完兩口子開始收拾就算有個落腳之地
