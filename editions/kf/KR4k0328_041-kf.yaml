body:
  text: 第四十一回康熙帝赦免童海川鐵木金落腳北京城上回書說到童林押解囚車來到北京城自己深深地出了一口氣打發劉俊他們先回家然後來到帽兒胡同北衙門白守備大人正在當值差人往裏走來到裏面書房咳嗽一聲堂役打裏頭出來了大人有事嗎你給回一聲現在奉聖旨下江南捕盜的童林已經把差事解到了聽大人的示下您候一會兒堂役把公事接過來進了書房呈給白大人白大人看完了說好吧來呀把差事起下來準備升堂外頭梆點齊敲白大人換好了官服戴好了大帽子手下的跟班拿著馬褥子水煙袋一切應用之物打書房出來趕奔大堂的後門從後房門進去轉過了屏風來到大堂口公案後頭落座兩旁邊快壯皂三班人役再加上馬快班步快班八班人馬在兩旁邊排班站立二十名護衛站在背後案前左右一邊一位京承大人還有各科各方的師爺書辦招房錄供的繕寫的該坐的坐著該站的站著這是堂口兒啊了不起呀早有人把差事提了下來來呀帶童林童林進來了跪在堂口磕頭草民童林拜見大人此番下江南如何捉拿欽犯有無拒捕等情你要從實地說來不准欺騙本衙門謝大人草民不敢欺騙大人就把捉拿盜寶二賊前前後後細說一遍完了讓童林畫了押大人吩咐帶韓寶吳志廣這是九門提督衙門韓寶吳志廣豈敢含糊不由地激冷冷打個寒戰他們往堂口一跪其實他們口供完全串通好了白大人也不過草草潦潦地一問畫了押過路衙門嘛白大人把公文備好把他們三個人的口供也都畫了招放在一塊兒派了四名護衛和綠營的一百名官兵還有雲南府的四十名官兵由白守備大人帶著直接從後門把二小押解到南衙門來到刑部衙的衙門口車輛停穩兵丁在兩旁邊一站保護著差事海川帶著公文跟著四名護衛來到衙門口的角門值班的還是郭豹喲這不是童教習嗎你的事情轟動了南北兩城老弱婦孺沒有不知道您的來吧請進來連同四名護衛一塊兒來到裏面把公事一樣一樣驗看清楚然後帶著公文往裏走來到書房刑部正堂張翔雨在書房裏剛剛下朝自己坐在書房喝茶這時候堂役進來把一樣一樣的公事放在桌上張大人看完了吩咐一聲升堂張大人馬上把官服換好戴好了大帽子翎頂俱全照樣當差的拿著馬褥子捧著水煙袋應用之物有人把公文抱著一直來到刑部大堂南衙門是執掌生死大權的地方北衙門進去死不了南衙門要說砍馬上沒命郭豹出去傳堂官的堂諭升堂快壯皂三班人役各持鞭牌索棍站立兩廂喊喝堂威皂班頭進來單腿一跪稟大人差事帶到張翔雨坐在堂上來呀帶原差堂役出來高聲喊堂官鈞諭下帶原差海川趕緊往裏走匍匐在地草民童林給堂官大人磕頭張翔雨心說童林啊爲你這點兒事險些把我這二品前程鬧掉哇下跪可是童林正是草民張大人一瞧不錯這是王爺的教師你要從實講來不許欺騙本部堂海川又從實細說一番畫了供然後退下堂口大人一拍驚堂木來呀欽犯韓寶吳志廣帶欽犯堂口一喊韓寶吳志廣嚇得直哆嗦從脊梁溝兒發涼韓寶吳志廣規規矩矩腳戴著鐐皂班頭拉著脖鏈來到堂口一托脖鏈兩個人雙膝點地跪倒了磕頭罪犯韓寶吳志廣參見大人你二人擡起頭來有大罪不敢擡頭唯恐衝撞堂官大人的虎威當堂無罪謝大人韓寶你二人真的吞了熊心吃了豹膽竟敢在大內盜走國寶以身試法還不從實講來稟大人韓寶吳志廣弟兄二人自幼學習武藝聽說童海川在雍王府內充當教習以爲他出身農民沒有什麽好本事因此一時賭氣我們武林之中的前輩也有過這種事從大內盜出國寶叫流芳千古不怕千刀萬剮我們爲的是跟童林賭賭能爲沒想到這件事情觸動了朝廷國法請求大人筆下超生你二人所說是實情嗎不敢欺騙大人張大人不願窮追道來畫供口供畫好了標好了牌子然後把他二人押入監牢海川是差待外押在衙門裏頭隨便愛上哪兒上哪兒但出大門不成就算軟禁起來了因爲你的官司還沒完呢皇上還沒有來旨意呢皇上說放你當然就沒事了皇上說不放你得在這兒待著這叫差待外押最後給雲南府打回了公文囚車及四十名官兵完全回轉雲南就算銷票無事了張大人把所有的口供完全都帶好然後放在護書內有跟班的拿著大人傳話回私宅就散堂了大人上了大轎嗆啷啷十三棒金鑼響大轎啓程穿大街越小巷趕奔東四北三條胡同西口路北到了自己的私宅張大人來到書房以內自己坐下換下了官服擦臉漱口喝茶吃完了飯趕緊讓師爺草擬一份折本師爺擬完了張大人親自看看行了然後工筆繕寫把所有犯人口供也完全放在裏頭這叫奏帶夾章當皇上看的時候不單看自己的折本也要看犯人的口供一切寫得十分詳細然後標好了紅頭白牌子也入在折本上面這叫牌子上頭寫著刑部正堂張翔雨跪奏次日五鼓燈火通明大人起來梳洗已畢帶好了折本然後坐大轎直奔東華門朝房來到朝房把燈籠也就是官銜燈放在門口外邊張翔雨就在候旨地方坐好了官員們陸陸續續文東武西全來了到了時候宮門開開官員們紛紛地直奔養心殿文武官員按著品級陸陸續續站好等靜鞭三響駕升養心殿四名小太監把所有奏事處遞來的折本牌子都放在上面在龍椅左肩下站著四司八處督領事梁九公下垂首是抱黃本的鄯起眼前頭跪著的是八大朝臣以神力王爺額爾金泰爲首匍匐在聖駕前剩下的文武官員都在殿外丹墀之下兩旁邊跪好叫哪位哪位進來吉祥金爐內點滿檀香香煙繚繞這個時候太陽還沒冒嘴兒裏外燈火通明康熙讓他們把折本拿上來撿緊要的關節看上頭都有引黃如果說不是緊要關節的那麽就草草的看幾眼交朝臣們辦看來看去就看到張翔雨的折本從頭詳細看完康熙皇帝知道童林打官司賊人盜國寶陷害童林奉聖命百日早就逾限了但有皇子龍兒遞來的求恩折子讓自己寬限國寶還朝康熙皇帝這個氣兒就消了禦筆朱批童林戴罪捕盜國寶已然還朝欽犯就擒將功折罪從此銷票回府好好當差侍奉皇子下邊寫著韓寶吳志廣盜國寶罪犯天條秋後處斬底下寫著欽此公事辦完康熙散朝了海川放出來了頓時覺得身上輕鬆多了溜溜達達穿著大街越著小巷趕奔安定門裏富貴巷雍親王府府門前冷冷清清沒有人海川就過了王府奔自己的府內見過爹爹母親跪道不孝兒童林久在外面使二老爲兒擔心真是罪該萬死說著連連磕頭舉家團圓悲喜交加老人問了問外邊的經過海川不敢說實在話怕二老受驚害怕只把獻藝賀號收弟子這些事說出來讓二老歡喜然後把劉俊他們叫進來給師祖父母磕頭二老夫妻自是歡喜問了問名字年齡然後告辭出來海川叫小弟兄帶著禮物一直來到王府莊園處給衆位見面不提這天師徒們剛從功房回到前廳家人韓路跑進來俠客爺何二總管送信來盜國寶的韓寶吳志廣越獄逃跑刑部堂官張大人記大過一次真像晴天霹靂可把海川嚇壞了連屋都不敢出怕來一個二次捕盜如何是好海川足不出戶叫弟子把從前所練的套路全擱下只練八卦掌這一天海川換了一身乾淨衣服溜溜達達出富貴巷口往南奔北新橋東四東單出崇文門過河走東河沿一直到前門五牌樓這是前門外最熱鬧的地方商賈雲集人煙輻輳繁華似錦車水馬龍海川站在這裏發怔見一位年高長者海川一抱拳老伯我跟您打聽個地方行行你打聽哪里請問琉璃廠在什麽地方你進廊坊頭條到西頭走北火扇出去就到啦海川就按著老者的話順著廊坊頭條走到西頭由於不認識北火扇他可就往南來走到大柵欄西口糊裏糊塗地來到李鐵拐斜街往前走不遠見路北一座敞亮大門左右門槐東面的走馬門起脊的門樓五層臺階大門口圍著裏三層外三層的人風雨不透海川納悶這裏幹什麽呢他來到人群的後面把紙扇往脖子上一插問前邊的人大哥這裏邊幹什麽呢說著擠到裏邊一看啊靠邊兒放著一輛牛肉車子喝這輛車是新打制的全都是榆木銅鐵件尺寸可大車軲轤都還沒什麽泥呢車板兒上蒙著嶄新的藍布單兒放著個茶湯盤上面擺的兩扇牛肉足有一百多斤銅盤上秤在上面放著牛肉刀錢匣俱全賣牛肉掌櫃的看上去不到四十歲肩寬背厚穿著白小褂藍褲子系著藍圍裙穿白布襪子方頭兒皂鞋四方大臉剃著青頭皮兒粗粗的辮子在脖子上一盤濃眉闊目鼻直口正青鬍子茬兒滿臉忠厚他面沖臺階上的一位大個兒和一位矮身材的人好像要跟賣牛肉的打架似的站在自己旁邊的這位十六七歲一條黑辮子也系著藍圍裙像個買賣人可巧這位也正回身海川問他這位大兄弟您知道這是怎麽一回事嗎這位也愛說朋友您問我就算問對啦就從頭至尾敍說前情原來這位賣牛肉的是清真大爸姓鐵名祿字木金祖居在河間府城北四十裏鐵家寨父母雙雙去世弟兄三人度日他大哥姓鐵名喚鐵福是個讀書人經文非常熟三裏村五裏店的提起鐵大爺那是無人不知無人不曉這人只是心眼兒多自己總有個小算盤兒鐵大奶奶爲人忠厚持家有法是個賢內助二爺鐵柱沒念過書不認字只會種莊稼爲人憨厚不多說不多道由於兄長常年在外教書二爺鐵柱把一年所做的活一五一十都稟嫂嫂做到無私財無私蓄二奶奶也很老實一天到晚該做的一定做完從來不多問多管可三爺鐵祿就不成了他們家中本來是個財主富戶水旱豐收的好地十頃銀錢浮財幾萬兩可三爺只愛使拳弄棒一天到晚結交很多人打拳踢腿使刀耍槍一塊兒吃一塊兒喝沒了錢就跟二哥大嫂子要銀子花得像流水兒三奶奶是河間府城裏洪大爸的獨生女兒洪大爸富貴一方鐵三奶奶在錢上不計較把母親給的錢也都讓丈夫花掉鐵二爸對三弟更加疼護總怕三弟的錢不夠花經常問他有錢花沒有鐵大奶奶也是總怕小叔受委屈儘量背著丈夫照顧三爺無奈這鐵三爺沒心肺只要哥一回家總要提出錢不夠花鐵福可就留上神啦對賬目摳得緊啦這還不算他想著一家人除去老三外都是省吃儉用只有他大手大腳不事生産只知花錢將來總有一天爲錢而兄弟鬩牆沒有百年不散的宴席乾脆分家吧他主意拿定請假回家到了家中在書房休息讓家人把二爺找來鐵二爸在地裏幹活一聽趕忙回來見著大哥立刻行禮請安鐵福知道二弟疼老三又看他喘著氣跑回來就說兄弟呀先喘喘氣咱們哥兒倆坐下一塊兒聊聊你先別著急定定神擦擦臉喝口茶哥兒倆坐下了大爺看了看二兄弟憨厚的臉兒說道兄弟今天我請你不是爲別的事兒就因爲咱們弟兄沒有合力創産守業的能力光靠繼承先人這一點兒遺産不過十來頃地怎麽成呢論起來咱們在鐵家寨雖然不算頭等戶也算過得去但是有一樣兒可得好好地幹老老實實地守著呀常言有句話創業容易守業難不用說家中多添個一畝半畝的只要守住了祖業産不給老人家丟人不給前輩丟臉不把地給折騰出去我認爲咱們就是好子弟二爺一聽可就愣了哥哥您跟小弟我說這個幹什麽呐說真的小弟我除去種地以外一無所有我沒說你我只是跟你商量商量咱們老三在外頭交了很多的人一天到晚就知道練武成天牛肉羊肉的總吃著他花錢就要多他本人不會掙就得跟咱們要咱們給了好兄弟好哥哥這沒的說但是咱沒有鑄錢的爐啊一旦供給不上他了弟兄可就會變心啦早晚這十