子教給他六十四個大氣站樁法慧斌外操筋骨皮內練一口氣天不閃亮不讓慧斌回去天一黑慧斌就到了練著練著慧斌能躥能蹦了可就讓慧斌越牆進廟那可就更有功夫了哎呀慧斌的功夫與日俱增光陰荏苒日月如梭轉眼間就十多年呐謔慧斌的這個能爲可就了不得啦師父哎慧斌您看您教給弟子這十三年的功夫傳授給弟子一條十三節鞭一百零八招打穴之招躥高縱遠的本領各種小巧之藝那麽您說以前我跟歐陽師父練的這個硬功夫還回得來嗎什麽事沒有只能對你有輔助十三年咱們爺兒仨再利用兩年的工夫把你的硬功全部找回來那麽也就差不離了從這天起一邊練著小巧的功夫一邊練著硬功前後十五年慧斌三十八歲謔這身功夫可就了不得了這一天晚上慧斌見著師父行完禮往旁邊一站師父今天晚上咱們爺兒仨練什麽功呐慧斌呐你追隨師父十五年爲師敢說我把身上的能爲十分之四五全都教給你了爲師本應當繼續教你孩子我說出來你可別難過呀師父怎麽啦您爲什麽不教弟子了孩子爲師明夜子時就要撒手西歸離卻塵寰我該死了明晚半夜我就要死去我沒法教你了慧斌一聽哎呀真好象萬丈高樓失足揚子江心翻船師父弟子真沒想到指望師父把弟子傳授出來以後把老人家您請到金鳳山廟中讓孩兒我好好侍奉恩師三年五載讓您老人家娛樂晚年沒想到大限來臨師父啊慧斌的眼淚嘩嘩地往下流老人家一擺手慧斌呐不必如此爲師死後你只要恪守僧門之規武林之戒行端履正在江湖路上享有大名你就算報答爲師的恩德人生百年也有一死悲傷無益慧斌我告訴你一點事兒您說吧師父明天一清早你親自下山帶一點銀兩買一口大一點兒的棺材你放上一根長繩拿著兩把鐵鍬明天晚上二鼓早了你可別來到二更天你再來不要哭泣使死了的人心亂不安只要爲師我一咽氣讓你師哥幫你把爲師盛殮起來遠擡深埋上面也不要立什麽痕迹立個樁子吧種棵樹吧都不要死了就完你記住了沒有弟子完全謹記心下孩子今天功夫就不練了你回去吧說完把眼睛閉上了慧斌不走哇師父您怎麽讓弟子走啊我就在您的跟前多奉陪您一會兒師哥過來了師弟呀師父怎麽說還是怎麽辦吧你回去吧師父說的你完全都照辦明天二更天你把棺材帶來需要的東西也帶來唉好又給師父磕了個頭慧斌掉著眼淚走了回到廟中可睡不了覺連功夫都練不下去輾轉反側坐臥不寧一直耗到天光大亮有心趕山神廟觀看可無奈師父不讓自己也不敢帶著錢下山了到鎮店買了一口四五六大放樣的棺材那棺材可不輕啊小起碼得有個幾百斤慧斌給了錢棺材鋪掌櫃的說給您找輛車拉回去吧慧斌搖搖頭說不用就一伸手一挾棺材嘿跟挾個小孩似的就這樣回廟了慧斌一白天就是這麽迷迷糊糊地過去一直到了天黑盼到二更天挾著棺材可就來到山神廟哥兒倆一頭一個搭進了角門放在了前殿的臺階下然後把繩子鐵鍬取下來棺材蓋好角門關上師兄師父在麽在呢許可小弟進去嗎哈哈哈你來了怎麽能不進去瞧瞧師父呢隨愚兄前來哥兒倆一塊兒往裏走一腳門裏一腳門外一擡頭啊可嚇壞了土坑上四個棕團連師父在內坐著四位老人有僧有道有俗並不是一位慧斌心裏納悶這都是什麽時候請來的呀看師父坐在正中的上首最尊貴的地方那慧斌就明白了在老人家的右肩膀下也就是第二位棕團以上坐著一位老和尚赤紅臉明禿禿的光頭露著九塊受戒的香疤慧斌看了看這個和尚再瞧瞧師父老人家耷拉著眼皮閉目吸氣養神還是一身藍粗布依然故我唉看著師父不覺得悲從中來再看看老恩師的左肩下是一位出家的道長這位道長爺是個矮個身上穿著杏黃色道袍配寶劍黃中衣寸五的粉底雲鞋白襪子打護膝過了膝蓋面似三秋古月金簪別頂背插著繩刷再看和尚的右肩下棕團上坐著一個俗家也跟師父的個頭兒差不離五短的身材瘦小枯乾不大點的小辮垂於腦後四字海口一對元寶耳山羊鬍子黃焦焦藍粗布大褂紮著絨繩這位老人坐在那兒就瞧著厲害呀慧斌躬身施禮跪倒了磕頭恩師在上弟子慧斌大禮參拜趴地下磕頭老師把眼睛睜開了微擡眼簾眼神還是那麽足慧斌你來啦是弟子謹遵恩師之命來到廟中待奉恩師慧斌呐在場的僧道俗你可認識恩師弟子一位不識那麽著好我就告訴告訴你一指和尚慧斌你記住了他是你的二師叔他家住在山西太原府壽陽縣薑家屯姓姜名達字本初江湖人稱碧目金睛佛哎喲慧斌一聽這可是個了不起的人物十五年來不但聽見師父經常說師哥也經常提呀其實這位就是四大名劍的二爺姜二爺不是個和尚姜二爺開始有媳婦有個兒子有兒媳婦兒子死後生下一個孫子孫子又生下重孫爲什麽出家當了和尚就因爲自己的兒子讓人家給打死了老頭一狠心他原來叫碧目金睛客姜達姜本初後來才改了碧目金睛佛慧斌趕緊跪倒磕頭二師叔在上侄男慧斌大禮參拜阿彌陀佛姜二爺眼睛一撩綠眼珠放光阿彌陀佛聽你師父說起你來刻苦用功是一位好徒弟我門戶將來發揚光大全靠你了謝謝二師叔的誇獎起來起來起來慧斌呐你看這位元道長你認識嗎弟子不認得這是你的三師叔家住在江西信州龍虎山玄天觀身爲觀主姓張名鴻鈞江湖人稱太極八卦庶士排行在三這是我的三師弟哎喲阿彌陀佛弟子早就久仰三師叔的名字了侄男慧斌參拜無量佛起來吧你師父說你很用功功夫也很好功夫雖好也不成得有才有德將來發揚光大門戶全靠你等這樣的三師叔誇獎弟子謹記三師叔的教訓起來起來起來老頭一指邊上一