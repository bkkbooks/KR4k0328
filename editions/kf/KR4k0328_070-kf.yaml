body:
  text: 第七十回童海川月臺戰秋禪慧斌僧學藝山神廟上回書說到西風寺請秋禪孔秀戲耍小僧人秋禪長老來到月臺之上心中十分惱火問孔秀叫什麽名字孔秀道你要問我的名字你要站穩了我家住在江南姓孔名秀字春芳闖蕩江湖有個小小的美稱叫走遍天下無遮攔探囊取物他說到物字兒瞅冷子蹦起來用手指頭照老和尚的眼珠子就摳老和尚甩左手往下拂孔秀的手腕兒孔秀的手往下一耷拉老和尚的右手照著孔秀的胸口窩上嘭就是一掌孔秀應聲而倒唉喲打了我了一折身起來坑了我了害了我了打了我了我要你的命老和尚蹦起來泰山壓頂雙拳就打下來老和尚右上一滑步立左手一穿他的腕子順手牽羊一拉他右手照著孔秀的後脊背啪就一掌孔秀在月臺上來個狗吃屎鼻子也搶了嘴也搶了嘴唇也腫起來了很快牙花也破了門牙也活動了哎呀打了我了我跟你完不了的說完蹦起來雙拳照著老和尚的胸口就是一下老和尚轉步一閃身這右胳膊軲轆翻車一壓左手反背一掌就在孔秀的腦門子上啪倆小和尚樂了該該師父狠勁打他狠勁打他哎呀師父這回小和尚一叫師父孔秀也把師父想起來了哎呀師父哇我成了爛酸梨了孔秀真乃大膽張方九齡一邊一個當中的海川轉眼之間來到月臺的南面這個時候孔秀躥下來捂著腮幫子哎呀哎呀這通哎呀張方過來哎孔老爺唉呀我說張方啊我明白了你明白什麽我叫老和尚打成這樣我師父爲什麽不過來你嘛一定給我說了壞話張方很機靈孔老爺你這話算對了你把人家小和尚打成那樣人家小和尚不會武藝你冒充人家小和尚的師祖你要知道小和尚的師祖姜老劍客爺也是師叔的師祖啊你找你師爺的便宜你還不該揍嘛喲我沒想到這旮裏看起來我挨揍嘛是一點也不多的得了好歹沒有傷筋動骨挨揍挨揍吧三個人站在月臺下瞧著海川一拔腰來到月臺上深施一禮高僧在上末學後進晚輩童林大禮參拜秋禪借著星月的光華看看海川小夥子往這兒一站真跟一隻小老虎一樣西風長老秋禪點了點頭想盛名之下無虛士你是童林是師兄尚道明何道源的弟子我們是一家子無緣無故地帶著人到我這兒攪鬧我的西風寺童林你是什麽意思你小小年紀對於本門的長輩就如此的無禮西風長老秋禪有點怒不管你是誰的徒弟你是我們師兄弟的徒弟也不成再說前頭的事我也不是沒聽說過下江南拿二小請國寶你在我師兄亞然和尚那兒也折騰得夠嗆你把我的師侄濟慈濟源都給打了這些事情老僧我也知道於是秋禪道嗷童俠客免禮免禮老僧不敢當童俠客久聞你的大名如雷灌耳今日一見緣在三生請問童俠客無緣無故夤夜之間你來到貧僧我的西風寺所因何故啊海川一瞧就明白了老和尚有點惱怒海川趕緊一躬到地前輩晚生童林有下情告稟有話請講海川就由頭至尾把自己的事情全都說了這一次跟七星山打賭破了七星八寶轉心亭得金牌大人起程奔四川開倉放賑聽說這擺亭之人是高僧您老人家給介紹的因此不揣冒昧前來請高僧駕赴耿家莊您給我們寫上一信如果能夠把擺亭之人請出幫我們破了七星山八寶轉心亭四川的百姓父老全都感謝您的好處這是您的最大功德高僧啊您能不能把擺亭之人說出來我們好請去阿彌陀佛童俠客你就是爲這事兒來的不錯七星山的七星八寶轉心亭是老僧介紹人給擺的但是我跟七星山多少是個街坊還有一些交情出乎你反乎你解鈴繫鈴這就不是英雄所爲吧我要把這擺亭人介紹給您破七星八寶轉心亭那樣一來綠林道會恥笑我西風長老秋禪無始無終作爲朋友不能全信這個老僧可不幹童俠客你有能爲破七星八寶轉心亭得金牌保大人上四川沒有能爲我想閣下你就不應該答應這麽重要的差事你說我說得對嗎你要叫我老僧請這擺亭之人出來鼎力協助你老僧可不幹再說你是惦著請我來請我還派你的打手把我兩個孩子打成這樣你這幸虧是請我來了你如果要是叫我來呢八成把我兩個孩子的腿都打折了童俠客難道說這也是交友之道敬人之方嗎童俠客這件事情老僧不管秋禪說的這些話海川明白但不敢著急啊一躬到地前輩您老人家責備童林甚是無奈我童林出身草莽被困王府蒙王爺擡愛知遇之恩才有我今日的童林想我童林是大清國的子民受國家雨露之恩當須湧泉答報甭說我童林還有一技之長就是我沒有這一技之長奉君之命也要保欽差奔四川哪怕死在四川乃是我海川的命該如此食君祿當報王恩普天之下莫非王土率士之濱莫非王臣我想我童林是這樣高僧也是一樣您也是大清國的子民呐您也應該協助官府鏟滅奸佞取回金牌到四川放賑如果高僧不管得不了金牌大人就不能起程晚一天四川省的父老就多死多少高僧救人一命勝造七級浮圖高僧怎麽能因爲一時的氣憤您就不管拒我童林於千里之外呢相反的我這弟子孔秀本沒有能耐他出的主意我童林本是到這兒拜訪您來的他說把您進出來讓我童林再跟您講話我想讓他去吧誑出您來也好說話他不聽我囑咐啊他到月臺上胡說當您出來我就應當過來我知道您有氣在心我不過來我讓您把他打了消消您的氣不想到高僧您還是盛氣淩人請問高僧您畫出一個道我童林辦到您能把擺亭之人說出來嗎老和尚一聽笑道哈哈哈好童俠客你這是手一份嘴一份呐好吧老僧可以把擺亭之人說出來只求一樣你我在月臺上當場較量三合五式你把老僧我贏了老僧我就管高僧您是前輩我贏不了您您要把我贏了您管不管喝童林這年輕人是有兩下子阿彌陀佛我知道你是我師侄你是我師兄尚道明何道源的徒弟我也不能把你怎麽樣了一旦叫我兩位師兄知道恐怕這事兒也不成不管輸贏勝負一戰之後我一定把擺亭之人說出來如此童林遵命海川轉到下垂手西面臉沖著東左腳一虛右腳紮根雙手一合抱腕當胸高僧您請吧老和尚秋禪往後一撤步一捋頷下銀髯阿彌陀佛童俠客請來進招海川往前一趕步左手一晃面門右手麒麟吐珠唰地一下掌不離肋肘不離胸龍驤虎坐右手掌就到了秋禪也看得出來海川一下手掌挂一團風內力足他不敢疏神大意上左一滑步立右手一穿他啪地一翻腕子進步摔掌奔海川的面門就打海川滑右步往右面伸左手立手一穿往前一搶身叫葉底藏花奔和尚的軟肋秋禪左手附肘沈肩一支海川的胳膊左腳紮根右腳唰坐下腰去就是一掃堂旋風一個樣海川一點月臺長腰出去一抱拳合掌打問訊彼此道請當場動手打在一處西風長老秋禪就爲看看童林的能耐到底怎麽樣三十歲的人其貌不揚爲什麽下江南能享這麽大的名只見海川把八八六十四式八卦盤龍掌旋展開了腳踩八門喝那還是真不錯大褂兜起風來如同蝴蝶相仿西風長老點了點頭像我西風長老秋禪這個人物三招五式十招八招也贏不了人家確受尚道明何道源弟兄的親傳聽說當年四門師兄弟共同研究最後請出我三師叔張鴻鈞來老人家把自己的精華揉進去成了這一門八卦掌這青年奉師命下山興一家武術可真夠啊海川跟人家秋禪一動手海川也瞧得出來要想把人家贏了這也根本不可能正在難解難分之際猛然間這山門洞裏頭有人念佛阿彌陀佛兄長何人在月下與你動手暫時住招海川撤身形出去回頭一瞧可就愣了前邊是個白鬍子老頭白髮蒼蒼精神矍鑠面似銀盆白鬍鬚白小辮頂全謝了約有八十多歲身上穿著銀灰色綢子長衫腰裏紮著絨繩左脅下別著一個藍綢子長包袱銀灰色中衣寸底福子履鞋老頭笑容可掬捋著鬍子文縐縐的形神瀟灑就在這老人的身後喝這人的個頭就快把這山門洞給堵嚴了比頭裏這個老頭得高二尺多前胸寬背膀厚虎背熊腰好棒的身子骨身上穿灰僧袍掐黃口腰裏紮著駱駝絨繩灰中衣厚底的黃僧鞋是個方丈一臉大黑麻子花絞的濃眉斜飛入天蒼吊著眉梢腦門子左額角上耷拉著一條子有三四寸的黑肉鐵頭皮露著六塊受戒的大香疤拉手伸出來跟蒲扇一樣手指頭都跟胡蘿蔔似的一攥拳拳頭就像大鐵錘子五十多歲這是親弟兄倆陝西鳳翔府城南有座山叫金鳳山金鳳山北十五裏有個村子叫北鳳莊金鳳山南十五裏有個村子叫南鳳莊金鳳山西十五裏有個大鎮店叫西鳳莊又叫四節嶺在金鳳山的正東十五裏有個大村子叫東鳳莊東鳳莊西村口裏路北住著一家大財主就是前邊這個老頭姓方名奎字伯林娶妻劉氏他的妻子劉氏就在東鳳莊的東北十裏地劉家村小舅子就是方大爺的內弟叫醉尉遲劉雄方奎自幼兒好武金鳳山上頭有座大廟叫玉皇觀是個老道廟玉皇觀的觀主三清教長教道門門長複姓歐陽單字名修他爲什麽起這麽一個名字呢北宋年間有一位官居宰相後稱爲古文八大家之一的老先生是歐陽修這位老人家是文班之首歐陽修想做武藝裏頭的最高人物歐陽修所以自己半路上改個名兒叫歐陽修方奎從起小就拜在歐陽爺的門下學習文武兩科之藝教給方奎一雙銀裝鐧十八趟鐧法藝能出衆方奎二十七歲那年母親又生下一個兄弟來起名叫方傑號伯生沒想到方傑六歲父親去世了又出了天花還抽風這一來孩子可就夠嗆了把本地有名的大夫都請來了也不見輕方奎夫妻兩口子挺急老太太倒不怎麽著急你著什麽急呀你弟弟這樣誰也不樂意他長這麽大你也不是不疼他是兒不死是財不散聽說南鳳莊咎鳳會瞧疑難症你請他來一趟看看嗷我快去方奎騎上馬就奔了南鳳莊沒走多大工夫方傑抽起風來了哎呀幾個人都按不住他抽著抽著風沒氣了老太太掉了眼淚趕緊把王三爺叫來說老三呐你們大爺在家看見二爺這樣他非疼死不可他已經死去投爹投娘他來了一場不容易但是他坑我他是討債鬼我也不給棺材你呀找一領炕席把他一卷拿繩一紮你拿鐵鍬到東村口咱們那菜園子外頭邊上深深地刨坑把你們二爺埋了吧醉鬼王三找了半領炕席擱到上頭一卷把二爺方傑給卷起來拿麻繩一系左手一夾右手拿著把鐵鍬嚓啦嚓啦他就由家中出來一直往東走到他們家的那個菜園子的籬笆牆外頭刨個坑把方傑往坑裏頭一放準備往裏頭鏟土正在這個時候從村裏出來兩匹快馬前頭是方奎後頭是昝鳳一出村口方奎就大喊別埋昝鳳來了喊著方奎也就趕到了飛身下馬上前一抱回家了老太太和方大奶奶婆媳正在屋裏頭哭呢婆子丫鬟們也都掉淚進來以後老太太一瞧這怎麽了娘啊老二還沒斷氣呢馬上給放到炕上讓昝鳳給治療真是偏方氣死名醫三服藥下去慢慢地緩過來了可惜落了一臉的大麻子過了幾個月到七歲了方傑跟哥哥商量哥哥幹什麽呢我願意出家什麽我願意出家出什麽家我願意到金鳳山上去你不是把我帶著去過嗎師父不是說我挺好嗎我願拜他爲師學點兒武藝我要出家當老道胡說爹沒有了娘還健在不通過娘你要出家出家要你幹什麽要你將來娶妻生子延續我方門後代香煙往下傳作爲我一個好幫手你出了家還剩下我一個人呐我不願意在家呆著我瞧見什麽都煩只要我一出家晨昏三叩道早晚一炷香我這麽一燒香一念經那我就全好了方奎不幹方傑就磨母親後來把母親給磨煩了當初出天花大難不死他一定要出家也不錯嘛老太太答應了方奎