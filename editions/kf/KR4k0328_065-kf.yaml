body:
  text: 第六十五回年欽差夜審梁妙興七星山三俠討金牌上回書正說到王環彩鳳山刀劈楊山鏢打段世寶童海川殺死飛天猩猩仉仁傑仉仁義眼睛都紅了他往前撲身過來鋼刀嚓楞楞迎風擺柳蓋頂就剁張方在桌子上高喊他也不是什麽好東西一塊兒吧叫他們哥兒倆前後腳兒搭伴走得啦海川一想得咱辦啦一瞧刀來了右斜身兒左手鉞一翻拿雞爪一叼這刀盤兒嗆一甩腕子他刀就飛了右手鉞往前一推立著大鉞牙尖子正在他小肚子下紮上往起這麽一擡撲可不得了大開膛兒仉仁義當時死於非命一瞧這個陣勢兒金頭壽星洪勳要哭哇哥哥您瞧您約來的可真宰人呐又往前一直步高聲喝喊朋友你倒是誰呀老俠客您要問我是石老哥哥所約石老哥哥所請打架不惱助拳的你對我哥無理我就要對你無理上左滑步一擺鉞急架相還兩個人又打上了倒下來的桌子倒了的板凳倒了的死屍一流血血又滑萬一絆到哪兒就一個跟頭老俠這麽大歲數兒怎麽能頂得住海川猛攻呀老俠客叫海川給累得只有招架之功並無還手之力一邊流著汗一邊喊一邊動著手石老俠真爲難這怎了哇只聽張方站在桌子上喊哎呀把洪老頭子累趴下海川正要雙鉞加緊由外頭撞進五個人來都是藍粗布一身絹帕纏頭肋下配刀斜插柳兒背著小包包兒喊道老俠客怎麽您老人家的壽誕之期院裏死了人了洪爺知道再動手就得趴下我借著這個臺階下吧虛點一刀長身出去海川分雙鉞擡頭看哦真是口外的歸化城北大青山董家山的五虎躥山虎董仁跳澗虎董義過街虎董禮攔路虎董志吊睛白額虎董信躥山虎董仁見此情景勃然大怒按刀把子頂崩簧唰一聲響後背雁翎刀亮將出來高聲喝喊你是什麽人如此無禮大青山的董仁我與你較量三合張方一想這個人怎麽辦張方多聰明呀他覺得時機到了猛地一聲喝喊呔你們知道你跟誰動手嗎鎮八方紫面昆侖俠童俠客是駐馬太原欽差年大人的隨行衛員伴差官你要跟他動手叫拒捕欽差董仁要過來張方這一嗓子可嚇得董仁收回刀一擺手跑都是賊呀見官人來了嘩啦啦撒腿就往外跑老俠洪勳這麽一聽哎喲一聲叫道他是童海川哥哥哎您可真有出手的您把官人給我引進來了這叫幹什麽呢啪一伸手把虎頭墨鱗刀噹啷啷一聲響扔在地下雙手往後一背哥哥您真好呐您讓官人上我這裏抓我來了石爺心說我哪是這心呐我碰上的呀張方從桌上飛身形下來來先把這罪之魁禍之首洪勳捆上司馬良過來把老俠客倒剪二臂捆了張方一指老俠石金聲你縱徒行兇你也是罪之魁禍之首給我綁起來石爺心想還有我呢壞啦那也過來綁上了王環持刀行兇殺人償命欠債還錢綁起來喲怎麽剛才說著好好的話現在又綁上了司馬良過來道兄弟你受點委屈也把王環捆上了張方的眼睛往四處瞧我看看還得找幾個見證人呐剩下幾個沒跑的撒腿就跑綠林道的賊到官府當見證人去誰敢做證呢全跑了孫亮何瑞等本家的人都在這呢順著禿腦門往下流汗張方喊道你們這倆禿子過來是是是是是是大人大人張方心說我算什麽官人呐嗯你師父洪勳今天這場事要賠吧也賠不了什麽人家都給了份子了您看死的這二位都給了二百兩銀子了啊對對對要像他們這兩人多好連一杯茶都沒喝弄二百兩銀子本應當把你們兩人押往公館但因你家裏頭有這麽一片事快給人家幫忙的道謝開錢你們兩人把這死屍掩埋把地上的鏢擦擦孫亮一想擦擦吧把王環這支血鏢給擦乾淨了孫亮咬著牙恨王環我們家的這場事叫你們給攪了什麽事啊又聽張方喊你們兩人把死屍掩埋血迹打掃乾淨辦理善後完了事不准出離這彩鳳山祥雲島隨傳隨到是是是是是是謝謝您呐轉過身張方押著他們回太原府一進東門來到路北的年公館往裏走一直到差官房劉俊他們都過來了師父師父怎麽樣了海川把這事情簡要說一說大家都坐下張方過來把石金聲的綁繩解開了石老爺子您甭說了對不起你們爺兒仨像王環我兄弟就甭說了捆就捆了就是捆你們老哥兒倆得提提海川這才過來行禮您多原諒我是石老哥哥的朋友因親至親因友至友我們都是朋友不到萬難不敢驚動哥哥殺幾個人沒關係尤其這樣的賊人殺了就殺了大人也絕不怪罪我海川有大事相求哇啊兄弟你說吧什麽事呀到底爲什麽海川如此這麽一說大膽賊人深夜入館盜走了代天巡狩如朕親臨的金牌留下字他說慶壽上西天您又叫金頭壽星您又趕上做壽您又是山寨的頭目我們不能不對您起疑心王環也是奉著公事捕賊的他已經答應陳龍賀虎和知府劉成一定要設法請金牌拿賊人因說道你們老哥兒倆祖居此地多年有這麽句話土居古十載無有不親認你們哥兒倆給我們指出一條道來只要有了一條線索什麽事兒沒有我再設法拿賊你看怎麽樣老俠石金聲搖了搖頭道哎海川我們是一見如故有什麽說什麽不錯在這一方洪勳的名要比哥哥我小得多按理說你這麽一問我就應當給你指出賊人在哪兒無奈幾十年我不出家門不入江湖涉足綠林賢弟現在還幹著他比我清楚海川點頭那麽洪老哥您就提提吧哎呀童俠客要說有人在我的家裏殺了人您給我什麽罪名我都領但是金牌之事我一概不知啊張方一擺手說別提了石洪二老跟師弟王環既然來了我想請爺兒仨到上房見大人把今天的事情稟報一下到上房年大人問道有線索嗎海川搖了搖頭就把這次彩鳳山祥雲島的事情全提了年大人聽了很贊成忙給爺兒仨賜座爺兒仨跪倒了磕頭石鐸道罪民石鐸拜見欽差大人年大人伸手相攙轉身問張方道你呀怎麽到這裏來啦張方回稟道我是爲捉拿采花羽士陳道常來到這裏現在我還帶著鎮江府海捕公文大人是否讓太原府知府打公事派專人交回鎮江公事就算完了請大人也賞我一份差事我也當一個隨行衛員伴差官跟您一塊兒上四川得了年大人笑著點了點頭很好很好我一定替你辦張方高興了這時年大人又轉身安慰石鐸和洪勳二位老俠客千萬千萬不要往心裏去這一次把你們爺兒仨捆到公館你們爺兒仨受屈了不捆可不好如果讓賊人認出您跟隨行衛員伴差官童海川有交情這金牌就不容易找所以還求你們老二位設法幫著海川把盜牌之賊拿獲停了一下又對海川說你下去陪著他們爺兒仨飲酒用餐替我盛情款待爺兒仨忙謝過年大人下去了這個時候天可就快黑了老俠石金聲感激地道洪老兄弟大人待我們弟兄恩重如山只恨哥哥我足不出門多年對現在綠林道的事我確實知道得不太多你比哥哥我知道的多得多請問兄弟你還有什麽顧慮咱們可是朋友啊你要知道點線索就應當說出來說著話酒宴也擺上來洪爺看了看海川道童俠客大人待我們爺們恩重如山我怎麽能知道不說呢可有一樣盜牌之賊是誰金牌盜走放到哪兒這您殺了我我也不知道我也跟這種人不接近但是有一個人跟這種人接近咱本地有一個坐地分贓的頭目只要你在他的管轄地界做案不管你偷些什麽不管這東西多值錢你必須把東西給他銷掉他要三成賬他要三成賬管什麽呢在本地你犯了案在本地你出了事有他給你一手遮天這個人我認得我看呐賊人盜走金牌也一定按綠林道的規矩該這麽辦石老俠點頭現在丟金牌已經十來天了你提出這個人來大小是個線索海川問老哥哥這個人是誰呀洪老俠這才說出來由太原府出東門順著城牆一直往北走到東北角往東北方向走二裏多地有一座大廟石老俠一聽你說的這座大廟是九轉還陽觀呀對對對觀主梁妙興對他外號叫九轉還陽道梁妙興哎呀他的歲數也不小啦他也六十多歲過去他發賣熏香蒙汗藥後來我勸他他不賣了按理說賊人按綠林道的規矩他要把金牌從公館偷出來必先擱他那兒咱們是不是設法把梁妙興找到公館裏來海川道請都可以您介紹的人我們決不能慢待這個哥哥您要相信洪勳說是這樣我去一趟得了咱們把梁道長請到公館跟他商量商量他如果知道提供一點線索我們順藤摸瓜就可能把金牌得回來不過海川咱們得說一件事只能把金牌得回來如果把盜牌之人一塊找那算人家梁道長出賣綠林他這飯鍋就砸了哎咱們可以說他畏罪潛逃或者是拒捕欽差叫咱們給殺了你再派倆孩子跟著一來多一個人多一心路二來這也可以證明哥哥我萬一到那兒沒有他不知道他又不在家這些事情我不用說你帶著人去自然好說話你這替哥哥我著想海川點了點道那派誰去呀旁邊轉過二人來師父我們哥兒倆去吧海川一瞧是插翅鶴楊小香一個叫楊小翠這是親哥兒倆說好了楊小香楊小翠老爺兒仨全都帶著軍刃由公館出來出東門過了吊橋順著河沿來到東北角往東北走一裏多地密林深處真有一座大廟紅圍牆三層殿上不著村下不著店孤零零一座來到西角門洪爺啪啪啪一敲門裏邊有點燈亮接著傳出話來誰呀啊道童你開開我是從彩鳳山祥雲島來道童把角門開了洪老俠問道童當家的在家嗎我師父在家呢還沒等進去就聽院裏有人念佛無量佛哈哈哈今天小弟事情太忙有失遠迎請兄長原諒小道童掌著燈光喝這老道是一位有六十歲的大高個兒肩寬背厚藍道袍左脅下配著一把武刃雙鋒鯊魚皮鞘的寶劍垂著燈籠穗兒穿灰色中衣厚底雲鞋水襪過了膝蓋背插大白馬尾的蠅掃四方大腦一臉的橫絲肉大三角眼大鷹鼻子花白髻用楊木道冠扣著金簪別頂只聽老道說道無量佛老兄呀我真對不起您呐我想著明天給您祝壽不想您倒先瞧我來了又指著楊小香哥兒倆問洪勳這倆小孩是誰呀這是新近收的兩個小徒弟楊家的兩個孩子他叫楊小香他叫楊小翠過來見過你師叔小香小翠趕緊過來一躬到地拜見師叔哎喲哎喲賢侄我可不敢當說著來到二層殿的東配殿挑簾進來了裏頭燈火通明架幾案八仙桌上放著許多的經卷兩旁邊擺著椅子和木凳經架子上一摞一摞的經書很講究請洪爺坐下小香哥兒倆在老師的背後一站梁妙興也坐下問道哥哥今天熱鬧嗎朋友到得多嗎哎呀山南的海北的凡是哥哥我認識的賓朋今天全到大殺風景就缺你呀是啊我頭兩天就把禮物給您送去了我知道你不去我真不高興哥哥您也太客氣了哎您怎麽有工夫到這裏朋友們都走啦哎只是今天出了點事就把彩鳳山祥雲島鬧事兒的情況全談了人家隨行衛員大人們把我們弄到了公館年大人不但不加罪而且溫語相勸和顔悅色不瞞你說兄弟你別記恨我把你提出來了要知道金牌的話您可別送哥哥吃官司無量佛哥哥您這算對了人家欽差大人年羹堯幹什麽去呀奉聖旨直奔四川開倉放糧兄弟我是個出家人我要知道這事我要不提四川省的父老就得等著多一天就多死多少那不全死在兄弟我的身上了出家人慈悲爲本方便爲懷舉足不傷螻蟻命愛惜飛蛾紗罩燈哥哥您別再往下說了這金牌可能有八寸橢圓上面有兩條龍有一挂金鏈一共八個朱紅大字代天巡狩如朕親臨中間是禦寶是不是這樣嗨兄弟我沒看見過我哪知道呀又指指楊小香他們是欽差大人手下的隨行衛員師父就是鎮八方紫面昆侖俠童林童海川我也跟年大人誇下了海口把兄弟你要請到公館去你要盡一些綿薄之力小弟我應幫忙願把它說出來一會咱們一塊兒