川往起一站感到頭重腳輕四肢無力渾身發軟心中亂跳只得雙膝點地往仙長跟前一跪唉老人家兩次三番搭救弟子性命弟子感恩非淺生當殞首死當結草啊晚生給您磕頭了老仙長點點頭無量佛童林呐要說你小小年紀離開師門在南七北六十三省闖蕩江湖武林之中不落人後爲師門增光啊你是門戶中的一個佼佼者確實難得呀話雖如此孩子在你身上也看出來有很多不足之處你還記得當年你在玲瓏島被困鎮海川嗎自己輕生涉險膽大妄爲不是你二位恩師跟你的師哥趕到焉有你小小年紀的性命吃一塹長一智啊難道把師爺教育你的話就當作耳旁風嗎不尊重老師對你的教育嗎上一次醜面佛馬寶善的師弟焦秋華被你所打當然我們相信焦秋華馬寶善都是好人但是人家約你到護國寺去你不想一想你把人家師弟焦秋華打吐了血人家喇嘛是要報仇哇有道是害人之心不可有防人之中不可無啊尤其是在武林之中即使人家真是好人自己也應當有所防備不是你抛鉞亮劍化險爲夷焉有你的命在這一次賽南極諸葛建把你約到九公主墳前來相會前門外大柵欄鏢局有你衆多的賓朋你應當帶上幾位一同前來怎麽能夠只身來此這不是屬於膽大妄爲輕身涉險嗎今天不是山人趕到童林呐你的命就沒了你一死如同草芥難道說你就忘記你二老爹娘了嗎忘了王爺對你的恩德了嗎忘了你師父在臥虎山玉頂玉皇觀耽誤他的悟道參修一十五年心血費盡培育於你嗎你小小年紀初入江湖就如此恃才妄作將來還得嗎一定要記住山人的話今後再不可莽撞行事了老仙長一句一字都是價值千金啊說得海川匍匐在地老人家啊責備童林之言童林一定謹記老仙長接著說道你來看賽南極諸葛宏圖雖然沒有壞心冒然間把你約至此處但不應當帶著杜清風燕雷至此他三人今天惦記把你毀於一旦被山人治住來吧你想如何發落致死他們三人也未嘗不可賽南極諸葛建在一旁聽得清清楚楚他真要掉眼淚啊他想我不是這個心啊這兩人我惹不起啊賽南極諸葛宏圖也是劍山蓬萊島二十名站殿將軍之一你別看都是站殿將軍這裏頭有好樣的有受尊重的也有不受尊重的賽南極諸葛宏圖是四川一帶武林的前輩也是英王一個揖一個揖把人家請到劍山的雖然是站殿將軍人家的份大這一次把諸葛建帶往北京城奪取十三省總鏢頭賽南極諸葛建欣然同意他來北京的目的倒不是爲了要奪取十三省總鏢頭他主要是聽說北京城有一位雍親王府的童教師鎮八方紫面昆侖俠童林我就爲訪訪這個人看看他小小年紀到底有多大本領敢奉師命下山要興一家武術這樣賽南極諸葛宏圖才跟著一塊兒來住在北孝順胡同西勝鏢局鮑古鮑天機鮑圖鮑殿元對於這些人當然得高看不但給老師找好的地方幽靜之所像諸葛建這些人住的地方也非常地講究諸葛建住好了以後他來得早每天出去玩玩逛逛其實他就是打聽打聽王府在什麽地方最後有人告訴了在北城根由北新橋一直往北奔城根那兒就是雍親王府賽南極諸葛宏圖連著來了三次把整個雍親王府都查看了一遍這一天他來了以後從北面看了看四下無人就打城根這邊越牆而過要說諸葛建真有膽子躡足潛蹤可就往南來了各處窺探天氣可還沒黑呢剛隱得住身子這時他聽見客廳內有人高談闊論諸葛建在房上慢慢地往下看最後就是年羹堯告辭王爺正往外送賽南極諸葛建長腰到了後窗戶往裏一看一個人沒有發現了一個煙壺賽南極諸葛建飛身形進來一腳蹬在案頭了然後把這煙壺拿起來掏出戳子啪往幾案頭上一戳然後長腰從後窗戶再出去上了房賽南極諸葛建就走了他來至在前門外到了鏢局自己的住處寫好了紙條約童林明天到九公主墳見面因爲他來的時間長了北京的一些地理位置也就記住不少了這九公主墳他也查看了一遍這個地方十分僻靜這樣約海川在那兒見面當天晚上賽南極諸葛建來到雍親王府發現海川在假山石那兒練功夫呢本事確實是好諸葛建很是欽佩蔫蔫地把紙條和煙壺放在石桌上然後撤身形悄然回去了到鏢局後他拉門一進來晃火摺子點燈啊雲霞道士杜清風跟野飛龍燕雷在他的屋呢諸葛建一瞧二位你們哥兒倆怎麽在我這裏燕雷一沈臉啊老義士爺我問問你來到北京城奪取十三省總鏢頭這是一件保密的事你怎麽天天出去你到底幹什麽去了今天你又上哪兒了說實話諸葛建心說幸虧我沒有大搖大擺地去拍王府大門找童林要是那樣的話說我勾結雍親王在劍山我受得了嗎人家軍師還不把我宰了現在燕雷一問他他傻眼了杜清風一擺手無量佛老英雄你我都是站殿將軍咱們互相都有監督的責任這些日子你到底有何公幹雍正劍俠圖第三部民國常傑森著
