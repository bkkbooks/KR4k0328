body:
  text: 第五十回喪良心燕雷打甘虎丟煙壺童林鬥三俠上回說到穿雲白玉虎劉俊帶著師弟霹靂狂風甘虎陪同燕雷來到孝順胡同西勝鏢局夥計往裏面通稟鮑古鮑圖弟兄二人出來迎接劉俊抱拳通名說燕師傅由於初次來京不識道路誤至雙龍鏢局我師父童海川命我弟兄把燕師傅給您送來鮑古一聽嗷原來如此那麽二位少俠客請到裏邊喝碗茶再回去吧離著很近我們說話就到家了我們跟您告辭了甘虎搭茬了哥哥人家鏢主看得起咱們哥兒倆還是坐一會兒吧劉俊說道好吧大傢夥兒一塊往裏來到東客廳進來以後請燕雷坐下劉俊甘虎也坐下鮑氏昆仲側坐相陪來呀獻上茶來燕雷喝了一碗茶鮑古問二弟呀你怎麽後頭又趕來了可不是嘛我打四川來走到北京不認得你們這裏我誤打誤撞的到了雙龍鏢局我就讓人家陪著來了燕雷也知道吃飯沒錢挨揍這是寒磣事所以他沒說哪知道燕雷剛說完甘虎蹦起來了不是這麽回事他胡說八道呢姓燕的來到北京城找我師父和我師大爺要奪取十三省總鏢頭的大印他在飯館吃人家飯不給錢叫大家給揍得跟爛酸梨一樣這樣我師父跟我師大爺才把他領到雙龍鏢局熱情款待給他衣裳讓他沐浴更衣跟他說好的跟他交朋友他卻小兒長小兒短說了很多蠻不講理的話我師父派我師哥送他我自報奮勇我惦記走到半道上給他來個倒拿毛教育教育他我師哥老攔著這樣我沒得手到這來我把這事跟你們提提這姓燕的不夠朋友甘虎這麽一說這下子燕雷可惱羞成怒了喊道嘿畜生你敢污辱燕二爺你出來墊步擰腰就來到當院甘虎一瞪眼道小子你不叫陣我還惦記著揍你呢教育教育你這鮑古最陰不過他不管因爲他知道野飛龍燕雷好能耐到底這能耐好到什麽程度上鮑氏弟兄沒看見過要借這個機會看看燕雷的本事劉俊可說話了師弟呀你這是怎麽了我說師哥你甭管啦你瞧個熱鬧甘虎墊步擰腰一陣風似地就躥出去了甘虎根本不傻呀往前一趕步左手一晃面門右手的拳頭就到了野飛龍燕雷向左一滑步立手一挽甘虎的腕子伸左手唰地一下烏龍探爪直奔甘虎的面門甘虎一瞧燕雷的掌來了雙插手拿這兩隻手吧噔一鎖他反背撩陰一錘燕雷閃身形躲過去跟甘虎就打上了六七個回合甘虎才有了破綻舉單拳單鋒貫耳燕雷往下一矮身右腳走掃堂左腳當軸甘虎腳尖一點地長腰起來燕雷往前一弓右步退左腿唰一轉身左手巧摘天邊月就到甘虎的胸口窩上嘣左腕子一較勁這掌就打上了啊甘虎往後一仰身覺得心裏一難受五臟六腑一翻個一張嘴哇地就噴出一口血來劉俊站在這裏瞧著心想怎麽樣你輸了我過去也白費這怎麽辦我要是被人家也打了誰把我兩人弄回去師弟啊你不聽哥哥的話呀燕雷一瞧甘虎吐血了洋洋得意哎姓劉的你怎麽樣一指劉俊鮑古鮑圖瞧著不管人家劉俊一擺手二師傅你吃飯沒錢被人家飯館污辱我師父給你候了飯賬把你請到雙龍鏢局給你沐浴更衣款待你吃飯又派我弟兄把你送來夠朋友了我師弟天真爛漫傻傻呵呵他不懂什麽我劉俊天膽也不敢跟您動手因爲我師父是惦記交你這麽個朋友沒想到你是一位言而無信之人你把我師弟打了我回去稟明師父自有我師父前來跟您講理我劉俊哪能跟你動手啊師弟跟師哥回家吧鮑古這麽一聽呀這小孩有點意思明知道自己打不過燕雷燕雷這裏點手叫他您瞧劉俊說這話不是我怕你我這麽一來對不起我師父不卑不亢這小孩將來准能成名劉俊把甘虎背起來回去了來到大柵欄雙龍鏢局門口鏢師們全看見了哎喲喝少俠客爺呼啦啦都過來幫著劉俊架著甘虎一直來到南客廳挑簾櫳進來把甘虎放好海川過來一問劉俊實話實說哎喲海川的臉唰一下子就蒼白了氣也上來了劍眉雙挑虎目圓睜用手點指燕雷啊我姓童的看你不錯啊你張口小兒閉口小兒可我姓童的對你沒有失禮之處愛屋及烏看佛敬僧他明知道是我的徒弟還要打啊他是瞧不起我童林衆位哥哥哪一位也別管我找燕雷辯理去海川伸手就要抓子母雞爪鴛鴦鉞的包袱老俠于成伸手一攔等等海川你別去你拿他當朋友是你瞎了眼了我早就瞧著這小子不地道我就惦記著把兔崽子摔死老俠于成往外走海川伸手一攔哥哥這事情是我的您不能去這個時候北俠等衆人呼啦啦全過來了海川你先等等不能操之過急呀哥哥這八個徒弟他燕雷打了哪個我都不往心去啊唯有打了這個傻該子我不能不動心啊因爲從白馬河甘家堡臨走的時候甘鳳池老哥哥拉著我的手說我跟你嫂子年近古稀只此一點骨血交給你我們兩口子放心沒想到孩子讓人家給打吐了血生死未卜萬一要點事我童林用什麽話對兄嫂去講啊哥哥這事你別攔著我跟姓燕的磕了說完了海川轉身形還要往外走老頭于成捋胳膊挽袖子地說海川啊你別去你去了針尖對麥芒我去我到那就把小子宰了老俠侯振遠過來一攔哥哥您先別惱海川我有兩句話說不知當講不當講哥哥您有什麽話就說吧我想甘虎是個天真爛漫胸無城府的傻孩子可他爲什麽還要說倒拿毛半道上要把這燕雷弄個跟頭教育教育他爲什麽知道到了西勝鏢局當著鮑古敗壞燕雷呢這裏頭有人挑撥物必自腐而後蝕海川頭一件事我得清理內部你先別著急其實于爺的喊大傢夥兒的勸都在給海川泄火氣但老俠侯振遠這個辦法更好這就給海川泄氣了不能讓海川找人家去啊侯老俠一搖頭海川你聽我的衆位都坐下于老哥哥您也坐下大傢夥兒全坐下了把徒弟們都叫進來這一下可全有了阮和阮璧徐源邵甫閻寶鮑信侯俊侯玉張旺劉俊司馬良夏九齡楊小香楊小翠洪玉耳孔秀連同李勇李寬小蓮花於秀這個可就多了是小輩兒的全進來了都站在這兒老人家侯振遠按著劍把看了看這些人厲聲說道誰挑唆你師弟甘虎到西勝鏢局辦這事你們給我說出來如果你們不說我要查出來可別說老夫變臉無情馬上手到劍落要你的項上人頭說出來斟酌情理我也可能不殺說吧大傢夥兒面面相覷老俠侯振遠這麽說是有目標的他看孔秀因爲他知道孔秀這孩子壞老俠一看孔秀用威懾之氣這麽一瞧孔秀很自然哎呀這是哪一個辦的我是沒有說的老人家侯振遠知道不是孔秀了擡頭再看壞事包張旺心說就你們倆沒有第三個果然張旺嘴唇發幹正用舌頭尖舔嘴唇呢侯振遠可厲害呀把臉往下一沈張旺這一叫張旺的汗就下來了阿彌陀佛他從師兄弟當中往前走跪在老人家侯振遠的面前師伯是你挑撥你師弟甘虎到西勝鏢局被打的吧說實話沒有弟子天膽也不敢嗯老人家蠶眉倒豎虎目圓睜就這麽一按劍把張旺嚇壞了師伯我說是弟子辦的侯老俠身上有一股力量小弟兄看見他就心怵得慌侯老俠一沈臉講是燕雷一來童海川一招待張旺的耳朵多好使呀師大爺侯振遠跟大傢夥兒把這事情的經過一說張旺就生了氣張旺准知道像燕雷這樣的人非揍不可不打他他不舒服張旺心說我師叔完了事要派人給他送往西勝鏢局全始全終唉呀誰能治往燕雷啊張旺一想只能是甘虎他知道甘虎有能耐又聽他的話事情容易辦到張旺把甘虎叫到一邊師弟這姓燕的對你師父那麽不禮貌果然甘虎生氣啦我說這小子不地道惦記揍他好你惦記揍他也得找個機會待會兒你師父把他招待完了還要派人送往西勝鏢局派人時你搭茬半道上瞅冷子給他來個倒拿毛呱唧一下子給兔崽子弄個狗吃屎如果辦不到到西勝鏢局當著鮑古那些人這麽一說實話他也得臊死這不就解氣了嗎對可是這麽著啊不管到什麽時候不能說出是哥哥我教的你這你放心我怎麽能出賣朋友呢事後甘虎被打張旺這後悔啊一瞧這事情鬧大了師叔童林急了眼張旺也傻了眼直到現在師大爺發現自己他知道侯振遠是殺人都不帶眨眼的你別看老頭這麽和氣張旺跪在這兒眼淚都下來了便把自己所辦的事從頭至尾一說然後痛心地說道師伯弟子我一時糊塗和氣憤才讓師弟甘虎辦這事我認爲我師弟甘虎的能耐總能贏了燕雷沒想到畫虎不成反類犬師弟被打弟子我追悔莫及請師大爺您饒恕我這一次吧老人家侯振遠捋著銀髯用手點指張旺當初你投入我侯家的時候我就不樂意是你師父說情才把你收下的要說這多年孩子你也辦了不少的好事可是自從你師叔童林一到山東邀我老弟兄把你們帶著往江南一走你看看杭州擂的事情你在擂臺上殺人致死了浪裏蜉蝣高俊燈前粉蛾南宮桃你在鐵善寺又搬弄是非看起來成事不足敗事有餘啊今天我決不能再容你了一按劍把嚓楞楞龍淵古劍一離鞘沒把壞事包張旺嚇死師伯千不好萬不好念侄兒我這麽多年沒有功勞有苦勞現在我追悔莫及了求師伯息怒您只要不殺侄男我怎麽著都成您可以隨便打隨便罵師伯饒侄男一命吧正在這個時候海川過來了哥哥您要殺張旺也不太好吧您殺了張旺王爺知道了都不樂意啊您忘了王爺賞他大班指了侯振遠想起來了杭州擂王爺把翡翠班指都賞給張旺了我怎麽能把張旺殺了呢再看壞事包張旺一副可憐相老人家侯振遠長歎一口氣唉把寶劍撞入劍鞘說道張旺是你師叔講情我也想到王爺很喜歡你但是我侯氏弟子之中不要你了把你逐出門牆轟出鏢局永不聽用你走吧師大爺你別價您還是饒了我得了我哪能離開您呐不再若多說定斬不饒海川也知道老哥哥生了氣便勸張旺說聽你師大爺的話走吧張旺無法哎師大爺小侄遵命張旺站起身形熱淚往下流自己的嘴不好啊挨著排地行禮行到侯傑這裏師父唉您疼了徒弟一場我給您磕個頭吧師哥們好好地孝順師大爺跟師父吧我不能在您的跟前盡孝了侯二爺挺喜歡張旺禿老頭眼淚下來了你沒事盡出餿主意今天又挑撥你師弟被打你師大爺怕你將來捅漏子孩子從今以後你要好好地混呀張旺又懇求候老俠道師伯我要走了弟子今天憑唇齒惹下了大禍師伯您把我逐出門牆那麽將來弟子如果憑唇齒立了蓋世之功您還要弟子不要這不是你師父你師叔和衆位師伯都在這兒王爺看著你都不錯啊說真的我怎麽能不要你呢只要你將來立了奇功你師父不要你師大爺我都要你得了師大爺記住咱們爺兒倆今天的話我給您磕頭我走了童林說等一等黃燦到櫃檯拿五十兩銀子給你師哥黃燦拿了五十兩銀子來師哥您帶著吧我謝謝衆位張旺行完禮後看了看甘虎自己轉身形往外走阮和等衆人一直往西給送到觀音寺了張旺難過地說師哥們師弟們回去吧大傢夥兒看著張旺怪可憐的灑淚分別張旺從這裏徜徉而去後來張旺立功勞了嗎張旺立的這功勞大了他和師兄弟們分手之後到了四川的劍山蓬萊島至於如何暫時先不提師兄弟們送走張旺回到大廳海川一瞧把張旺這件事情辦了自己心裏多少消了點氣便說哥哥張旺的事情完了我可要上西勝鏢局了南俠司馬空過來了無量佛海川我先攔你你現在上西勝鏢局去到底怎麽樣咱先不說虎兒被打這事管不管哥哥我是個大夫咱們把孩子治一治啊盡顧了報仇虎兒要耽誤了呢哎喲道兄我忘了我拜求您您趕緊給孩子治治傷吧大家全過來了等到了跟前一瞧把虎兒小子的衣裳撕開了一看正打在華蓋穴上都腫起來了黑紫黑紫的南俠知道要給