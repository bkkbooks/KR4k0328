body:
  text: 第四十二回鐵木金劫道遇官人爲生存長街賣牛肉上回書說到鐵木金來到北京城借住在張和家裏這多日子幸虧張和接濟不然早挨餓了三奶奶說你的朋友找不到難道就光指望接濟嗎過年啦我不能催你可你也得想辦法咱們買點兒年貨呀咱們兩口子這些日子也夠寒苦的啦再說要過個年也得要錢怎麽上人家張大哥的家裏去呀今天都臘月二十八了你還找不著朋友是呀這朋友很難找那麽咱們得多少錢呐我算了算起碼你得拿回二十兩銀子來嗯二十兩不多你甭管啦我我找去鐵三爺也沒吃什麽東西沒的吃啦伸手到門後把三頃二十畝大鐵棍抄起來了喲你拿著它幹嘛不我得拿著點兒棍子說話就過年了萬一碰上劫道的呢哎呀劫你什麽呐連個屁都放不響啊這個你甭管鐵三爺緊了緊褲腰帶打家裏出來了一個大錢憋倒英雄漢鐵三爺七尺的漢子到現在一點兒轍都沒有了舉目無親二十兩銀子上哪兒要去站在這高坡上往南瞧陸陸續續的打南門進關廂置辦年貨的人很多得啦下坡兒就是大葦塘置辦年貨的孤行客置辦年貨的都有點兒錢乾脆我打一號兒悶棍吧鐵木金拉著大鐵棍順著高坡兒就下去了溜餾達達往南走出去有這麽幾箭地進了葦塘抱著大鐵棍往葦塘裏一蹲悄悄地往道兒上看一般從城南來的都是村百姓穿得都不是那麽乾淨即便腰兒裏有幾個錢都是仨一群倆一夥兒有說有笑孤行客碰不上天又冷肚裏又沒食餓了煞煞褲腰帶打早晨等到中午打中午再往下午等進城的人少了出城的人多了十個八個三五成群絡繹不絕又起風了越來越冷地凍天寒幹葦子嘩直搖太陽壓山了有點兒雲彩起來了其實天還沒黑呢白天的時光太短了猛然間鐵木金聽到南邊咣噔咣噔車軲轤響原來是輛鏢車車上插著鏢旗上頭寫著字兒杭州上天竺街雙龍鏢局南號小孟長黃燦只見二十名夥計一邊兒十個各持刀槍前頭一個報頭的騎著小驢就是當初太湖丟鏢的張二此人大個兒大嘴岔兒好嗓音後頭保鏢的有兩個人都騎著馬三十多歲上垂首是燈前少影阮和下垂首是月下無蹤阮璧一路之上兼程並進今天臘月二十九才進南西門張二一高興在小驢兒上試試嗓子喊上趟子了阮和阮璧在後頭說二哥你怎麽喊鏢趟子應該喊啊前邊大墳地葦塘那你要喊出強盜來北京城圈裏頭哪兒來的強盜哇我還沒聽說過在北京城裏頭劫鏢的呢只是當初武林之中有位老前輩浙江紹興府的飛鏢黃三爺沙灘兒放響馬劫過銀橇那還是成心放份兒你放心沒事兒話音剛落鐵三爺從葦塘裏蹦出來了因爲他沒劫過道哇一橫大鐵棍就覺得自己不得勁再加上一天了水米不打牙眼前頭有點兒發黑腳底下跟踩上棉花一樣呔把鏢銀留下張二一瞧嘿還真出來劫道的了阮和一催馬來到鏢車前甩鐙離鞍下坐騎哥兒倆一瞧謔眼前這個大個兒黑臉兒五官端正十分憨厚攥的這條大鐵棍分量可不小阮和一瞧有這樣兒劫道的嗎就問朋友你劫道啊嗷不全劫你要劫多少紋銀二十兩過年就得阮和心想嗨你要二十兩銀子多好哇瞧了瞧鐵三爺朋友看來你不是劫道的這個你明白我明白你要二十兩銀子沒關係你看我們這鏢旗上有字型大小我們的分號在大柵欄你跟著我們的鏢車到大柵欄我們把鏢銀交了以後讓櫃上給你拿二十兩就是百兒八十兩都沒關係但你要在鏢車頭裏一橫這可對不起你了朋友一分錢你也拿不走我們得保我們這字型大小哇朋友你跟我們辛苦一趟怎麽樣不沒那工夫再說我也餓了我也走不動了嗨朋友你怎麽這樣兒啊你劫鏢不成啊阮璧到底是脾氣暴點兒一摁刀把嗆楞楞一聲響把刀就亮出來了朋友我哥哥對你說得挺清楚我們這是有字型大小的鐵三爺大吼一聲劫不出去我要講打鐵三爺剛才就覺著頭重腳輕天旋地轉一晃這大鐵棍眼前一發黑撲通連人帶棍倒在地下阮璧過來告訴鏢師和夥計們把他捆起來捆他幹什麽把他帶到鏢局問清楚了真要不是劫道的給他倆錢兒讓他回家猛然間葦塘以內有人喊朋友等一等哥兒倆還以爲又出來劫道的呢阮璧哥兒倆各自摁刀擡頭一看燕子三抄水唰從葦塘出來一個人阮和阮璧一瞧這位年紀在六十上下中等身材猿臂蜂腰看得出來是個練家高挽著袖面兒身上圍著亮銀鏈子鐝手裏攥著一條硬杆兒大馬棒阮璧問這位老兄您怎麽稱呼這個老頭兒托胡子哈哈大笑一通名勝敢情是本地西珠汛的五品花翎守備清真大爸姓丁叫丁瑞龍江湖上稱鼓上飛仙丁瑞龍過去是個買賣人領的是牛街清真寺北邊兒路東的一個羊肉館叫北恩利東家姓沙排行在七所以丁瑞龍領的是沙七爸的東他在外西華門七聖廟開了一個羊肉鋪代賣餡子貨字型大小叫恩順丁瑞龍很能幹櫃上用著十幾個人小買賣做得還很磁梆年年兒都有盈餘北京城這地方做買賣舊社會講究賒賬認得的知根知底的到了年下要錢三十兒晚上天一黑拿個摺子在北京叫溜子上邊寫著住址人名短多少肉錢打著燈籠一家一家要要到天交五鼓接神的鞭炮一響就不要了所以大年三十窮人家有還不起賬的就躲到澡堂子去接神的炮一響出來了再見著要賬的說聲恭喜恭喜發財發財就不提這賬了當然恩順也不例外丁瑞龍也去要賬要了幾十兩銀子那是大戶可是小戶多呀不但要不了賬一看人家太難得了再借人家三兩二兩的等到接神的爆竹響了這麽一看哎呀根本對不上賬跟東家說借給人了東家不信說你耍錢輸了要不胡作非爲了丁瑞龍十分爲難不由得走到宣武門外護城河凍冰了瑞龍站在那兒發愣越想越不是滋味兒頓萌死念找了塊大石頭啪嚓一下把很厚的冰鑿了個大窟窿就在這個時候兒北西護城河的邊兒上樹林裏頭嘩楞楞楞鐵球響有人挺大的嗓門兒喊那不是恩順家的丁瑞龍丁爺嗎這大年初一的幹什麽呐丁瑞龍一瞧喲從樹林裏出來個大個兒赤紅臉兒的白鬍子老頭兒右手托著四個大鐵球鐵球晃起來在手指頭肚兒上走再一細看原來是北京城赫赫有名的鐵掌賽昆侖方飛方四爸方四爸家住在西單牌樓的皮庫胡同方四爸這個人在北京城露過大臉有一回他走在前門大街正趕上下過大雨道路十分泥濘有一輛大鹽包車誤到那兒了兩套兒牲口把式怎麽拉也拉不上去看熱鬧的人多極了方四爸一高興下去了車把式一瞧老爺子您這是怎麽啦你把這倆牲口卸嘍我在西單牌樓皮庫胡同住名叫方飛我給你拉下這車你這車就上去了看熱鬧的喊好哇兩套車卸了方四爸一伸右手攥住了轅裏頭的皮套單臂一用力蠶眉倒立虎目圓睜把車就給拉上來了方四爸的這一招單臂擄鹽車使他成了名了北京城的人稱他鐵掌賽昆侖後來有人舉薦他在天子的慎行司當了內大班的班頭他還有兩個盟弟湯茂隆何瑞生當時正趕上康熙皇帝私訪密香居在二妞這兒挂著珍奇無比的十八子伽南秀串結果叫一個飛雲凶僧給偷走了方四爸奉命捉拿飛雲僧最後費了很大周折才把飛雲僧拿住了方四爸心說得了我告老了這樣慎行司內大班的班頭就歸了他的盟弟湯茂隆何瑞生了沒幾年湯茂隆何瑞生又交給他們倆的兒子湯英何玉了湯英何玉幹了些年又交給他們倆的兒子了到湯雲何貴這兒已是三代人了湯雲何貴就是拿童林的那兩位慎行司的班頭方四爸現在到歲數了在皮庫胡同抱著胳膊根兒忍了雖不說腰纏萬貫但也是吃幾輩子吃不了方四爺每天照樣練功今天初一也一樣老頭兒遛早彎兒其實早發現丁瑞龍了方四爺一喊丁瑞龍趕緊過來了哎喲喝老爸爸我給你拜年吧起來瑞龍啊你幹什麽呐爲什麽要尋死啊您要問如此這般這麽這麽回事一說然後又道賬沒收上來短了東家的錢人家沙七爸不幹會說我拿這錢不幹好事這可怎麽辦呢方四爸點了點頭道你呀說得很有理你別爲難了伸手把四個大鐵球揣到懷裏然後一貓腰從右邊的靴筒裏抽出錢夾來了那個年頭兒人們擱錢有兩個地方一個叫靴掖兒就是擱到靴筒裏頭再一個跟頭褡褳裏頭也可以裝錢方四爸拿出一張三十兩銀票來問丁瑞龍這是三十兩夠不夠老爸爸用不了過幾天我再給你拜年去好在是清真老表沒的說呀給人家方四爸請完安丁瑞龍回櫃了來到恩順今天根本不下板兒不營業正月初一呀丁瑞龍推門兒進去了見到沙七爸拜了個年大傢夥兒也彼此拜拜年說幾句吉祥話拿出銀票和摺子來把賬結了沙七爸問丁瑞龍掌櫃的怎麽你今兒個晚了應該接神以前回來按理說瑞龍說句瞎話很自然地就過去啦無奈瑞龍是個誠實人就把討賬反倒借給人家錢虧了錢砸冰尋死碰見方四爸的事都說了嗷沙七爸聽完了只說了聲好好兒地過年吧丁瑞龍高高興興地回家過年去了到正月初五的晚上回來了沙七爸跟丁瑞龍說掌櫃的我一個北恩利都忙不過來所以恩順的小買賣我打算明天不幹了大傢夥兒呐我多給幾個錢你也是一樣餘外再多給你四十兩銀子作爲花紅饋贈你呀打鋪蓋卷兒回家吧明天開市以後另謀高就丁瑞龍納悶兒買賣這麽好這是爲什麽沙七爸存自己的想法他說你跟徒弟師爺一塊兒出去要賬人家全要回來了你把錢都借出去了借出去也不是不可以你爲什麽要尋死啊幸虧遇見方四爸不遇上呢你紮到河裏死了我大年初一的來條人命這可怎麽辦我決不能再用你了瑞龍全明白了哈哈哈好吧好離好散君子絕交不出惡言我丁瑞龍沒什麽能耐這幾年也沒給您賺什麽錢但我還年輕到哪兒耍胳膊我也能湊合著吃碗飯說完叫小徒弟把鋪蓋捲兒打好了到櫃房算了賬該給自己的拿起來跟大傢夥兒道聲辛苦扛著鋪蓋卷兒回家了回家以後自己心裏不痛快丁瑞龍心說沙七爸這幾年我沒少給你賺錢呐你翻臉無情不用不用吧明天初六啦我給方四爸拜個晚年去吧再說這也有了錢啦第二天一清早兒打家裏出來就奔皮庫胡同來了等來到方四爸的家門口一看人家家裏頭地方大了前後得有上百間房子幾層院子座北的廣亮大門上有門燈下有懶凳兩邊兒還有門槐真有份丁瑞龍上前去啪啪一叫門時間不大出來個底下人也就是方家的總管人家問您找誰呀我找方四爸我給他請安來了我是恩順家的掌櫃的叫丁瑞龍嗷您是丁爸聽我們四爸提來著您跟我來吧方家總管轉身形往裏走丁瑞龍趕緊跟上過了垂花門一直奔大廳唰一挑氈簾兒進來丁瑞龍四處觀瞧五間大廳中四間一通連靠東邊有樺林的隔扇單有個里間屋挂著茶青色嶄新的門簾兒隔扇心兒都是名人字畫牆上挂著挑山對聯均出自名人的手筆迎面的架幾案上正居中擺著一個羊脂玉的福祿壽三星人真有一尺多高唰唰地放寶光底下是紫檀木雕刻得玲瓏透剔的座兒上頭有個玻璃罩兒兩邊兒是古瓷的帽筒上垂首有個鈞窯瓶下垂首是個屏鏡迎面的八仙桌太師椅上的椅披椅墊桌圍子都是南繡平金的一人來高的大銅爐子火苗子騰騰騰躥得很高方四爸在椅子這兒坐著瑞龍趕緊過來請安老人家晚生給您請安了哎起來起來瑞龍啊怎麽今天有工夫快坐下丁瑞龍坐下後歎氣道唉我不在恩順了啊爲什麽沙七爸不用我了你幹得挺好的你也挺有能耐的怎麽辭你啦嗨就因爲初一那天的我年輕輕兒的老爸爸您甭管這事兒了方四爸一聽火了