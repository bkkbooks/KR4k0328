body:
  text: 第五十七回分雙劍驚走燕雲風保欽差查辦蓬萊島上回書說到三月三亮鏢會四大名劍的三爺張鴻鈞來到北京城二救童海川九公主墳叫他抛鉞亮劍當海川聽到老人家的聲音亮出落葉秋風掃再敵三勇時不幸用力過大將內血努了出來這時劍客爺展身法把他三人點住然後交給童林處置童林不但不記私仇反爲他們說好話真是寬仁大義老仙長這才感覺到我這本門本戶的徒孫確實是不錯呀所以重打了燕雷幾下又賜了海川靈藥讓其安心養傷然後老人家飄然而去今日亮鏢會老人家來得很早在松棚的棚頂上面隱蔽觀瞧直到現在才從這東南角門進來飛身形來到梅花圈上一舉點穴橛照著這兩口寶劍的當中一擊力量十分的大燕普尚道明手上要是沒有勁兒寶劍就得脫手而飛老劍客爺分開寶劍二位各自縱身形出來燕普一看是張鴻鈞抹頭跳下梅花圈就走真可謂鐵條分雙劍驚走燕雲風原來燕普知道今天這場激戰如果一開始張鴻鈞就上場動手燕普不懼因爲兩人力量相當呀可是這會兒燕普瞧見張鴻鈞就得跑群俠會燕普他已經筋疲力盡了要是再與太極八卦術士張鴻鈞叫橫那准得輸沒法子自己帶著人回到西勝鏢棚後趕緊走了可燕普對於這件事耿耿於懷啊這就引出了後來三爺張鴻鈞六戰燕普燕雲風的事情燕普帶著人呼啦啦打西勝鏢棚一撤大傢夥兒可就全撤了這時尚道爺趕緊把寶劍插上過來行禮三爺張鴻鈞給攙住了因爲徒弟都這麽一大幫了哪兒能讓這麽大年紀的弟子磕頭哇寶鏡禪師何道爺也上來行禮老劍客爺也給攔了老篩海爺過來道哈哈哈張老前輩我這點穴橛是您拿走了呀其實老篩海爺輩兒大因爲他師哥是清真門的門長跟張三爺是一輩的聽金元這麽一叫老人家張鴻鈞不敢當啊張三爺解釋著說金老劍客我本不應當說您您跟道明道源寶鏡四位歲數都不小了桃李滿天下弟男子侄一大幫怎麽能當著晚生下輩比藝呢萬一有一個人練不上來你想過後果嗎你們幾個人無仇無恨怎麽能朋友之間互相找茬呢老篩海爺忙說三爺說得對下次我們再也不幹這個了張三爺看了寶鏡一眼又說道尤其是寶鏡心術不端怎麽能解扣害人呢這時寶鏡羞愧得無地自容啊張三爺說完後把點穴橛交給了老篩海爺尚道爺這才問您這些日子在哪兒來著老人家才把自己的事情從頭至尾一說最後三爺說道看來這十三省總鏢頭到底沒有被西勝鏢局奪去燕普自甘認輸跑了尚道爺也說讓他們主管的人馬上當衆宣佈明年該誰值年還是誰值年讓各鏢棚的鏢師夥計帶鏢主都退下黃燦潘龍當衆宣佈後大家夥兒順著梅花圈下來王爺也過來了幾位老前輩本爵有禮王爺連連地作揖尚道爺何道爺寶鏡禪師老篩海爺過來跟王爺見禮然後張老劍客爺也過去無量佛貧道稽首千歲哎喲老前輩你的令孫童林在我的府上呆了這麽長時間我們爺兒倆的感情十分好他保護本爵我的生命財産老前輩您來了使本爵大慰平生大家彼此見禮不認識的都給介紹介紹這個可就麻煩點兒了一輩兒一輩兒的都要見禮北俠這些人都要過來給尚道爺何道爺寶鏡見禮給張鴻鈞見禮一直到叱海金牛于恒劉俊這些人大傢夥兒各敘寒暄老仙長說這麽辦咱往裏邊來吧來到雙龍鏢局的鏢棚以內大傢夥兒坐下老劍客張鴻鈞把自己的事情都說了這個時候王爺一抱拳老人家您看看我們海川他吐了血了張三爺說王爺請放心當初他在公主墳山人就跟他提過你這個血並沒有吐淨還留點兒病根兒在心裏將來遇見急遇見怒還要吐血這回老俠于成於洞海怕海川栽到梅花圈上上去扶了他一把使他這病根兒沒吐完還留下一點兒將來沾急沾累沾氣還要有個三次吐血但是不要緊了老人家來到屏風後大傢夥兒陪著看了看海川號了號脈說他沒有別的病其實現在童林就有些蘇醒了張三爺拿出三十粒丹藥來劉俊過來給師祖行完禮您把藥賞給孫男吧老仙長問了問才知道這是海川的大徒弟名叫劉俊便把藥交給他說一天吃三粒慢慢將養自己的氣息很快就好劉俊剛把藥接過來旁邊有人說話道爺我們這兒還一個傻孩子呢他也吐了點兒血您那藥再多給我們留下幾粒吧原來是傻小子於恒尚道明趕緊把於恒叫過來於恒啊快過來給你的師祖磕頭尚道爺又對張三爺說道這是我收的一個小徒弟幫著他哥哥童林幹了很多的事啊無量佛天真爛漫很不錯於恒說您誇獎了師祖我給您磕頭起來起來你說誰有傷啊我們那個小侄子吳成叫人家打吐了血老仙長又拿出三十粒丹藥來告訴劉俊每天給他吃三粒很快也就好劉俊把藥接過去大傢夥兒陪著張三爺又回到屏風前自己落座天已經不早了年大人這才過來與張三爺見禮敍述自己的事情由於是朝廷命官簡單說也就行了張三爺坐了一會兒便說道明道源寶鏡跟老篩海爺我看你們幾位把這事清給完結一下吧貧道我要跟王爺大人告辭先走一步了王爺一聽忙說喲老仙長您別走哇本爵惦著這兒的事情完了把您恭請到我的府下我跟您一塊兒近乎近乎以增教益怎麽您老人家就急著走哇王爺貧道我還有很多的事情而且我還要追趕燕普他們這樣王爺不攔了因爲這于朝廷有利老人家我可就不敢攔您了什麽時候您到我捨下去我置辦點兒素席請請您王爺來日方長貧道告辭了大傢夥兒往外送送走了老劍客爺張鴻鈞後尚道爺何道爺寶鏡禪師和老篩海爺帶著朴鹿把西方俠于成北俠秋田和侯振遠都給叫過來了尚道爺說這兒的事我們不管了你們幾位照料一下吧我們得回清真寺了王爺想留他們幾位也是留不住人家老幾位也走了侯振遠和秋田這才吩咐讓人拿軟兜子把海川爺兒倆搭起來徒弟們跟著回北城根王府海川的家又恭請王爺和年大人也回府有什麽事兒以後再說然後大傢夥兒回轉大柵欄雙龍鏢局這個亮鏢會就此完結老俠客們當中有一部分人回杭州了還剩下一些人估計三兩天後必要到安定門裏北城根海川的府上去看看海川劉俊這些徒弟們也不荒廢學業到了時候給師父跟師弟吃藥兩三天後海川就恢復多了劉俊才把這場驚心動魄的事情跟師父都念叨了師祖露面鐵條分雙劍驚走燕普海川真後悔這個事情自己會不知道無奈只得慢慢地將養著幾天後老俠們來看海川見他不要緊了這才紛紛散去各自回家西方俠于爺跟北俠秋田侯振遠黃燦潘龍說我在杭州跟你們提的這件事情我回去就要辦在太原府我有的是房子我要成立太原分號雙龍鏢局南北兩號的太原分號讓黃燦潘龍把賬目結起來你們拿多少錢我拿多少錢咱們是三一三十一北俠說哥哥這邊有我們倆照料著山西有您照顧著將來這買賣都叫咱們做了他們別的鏢局子對您背地裏能說好話嗎不管他我是想讓你侄子于秀閱曆閱曆將來我一閉眼的時候我好放心就在海川養傷的時間裏太原府的雙龍鏢局分號可就成立起來了亮鏢的這一天老人家當衆練了一套通臂掌太原府的知府劉成劉大人親自來給挂紅賀喜黃燦潘龍親自帶著一部分人來幫著開了張跟小蓮花於秀見著說這分號經理就交給你了將來咱是一本賬清於秀也就答應了好在西方俠于成不在乎錢把一部分老成持重有經驗的鏢師夥計都給太原分號這邊帶過來了因爲這些人很有經驗能幫著於秀幹點兒事情於秀本人對這個還沒有什麽經驗群雄散後海川每日養傷這天吃完早飯以後海川正帶著徒弟們在客廳裏談論拳法大管家何吉來了童教師王爺請您過去海川回道好我這就去等等帶著所有的徒弟行讓他們八個人馬上收拾一下吳成的傷也痊愈了這小夥子身體多棒呀受點兒傷根本也不在乎爺兒八個打府裏出來奔西院來到王府大門前往裏走敢情這裏頭有事啊原來王爺和年大人參加這次亮鏢會後王爺就讓師爺楊友之寫了一個折本詳詳細細把這一次亮鏢會的經過都說了好讓皇上知道王爺特別提出幸虧有這些個不吃國家俸祿的英雄俠義參加了這場事才未能讓劍山蓬萊島得逞如果讓劍山蓬萊島真得了十三省的總鏢頭在十三省立分會招的一些高來高去的武林高手那可就增加了劍山蓬萊島的勢力於朝廷有礙皇上看見這個東西之後留中了沒想到就在前兩天康熙天子駕坐養心殿文武朝臣完全都在上垂首是軍機大臣達拉密抱皇本的鄯啓下垂手是四司八處的都領事梁九公大殿內當中一塊金匾黑字正大光明皇上升了禦座有兩架龍鳳扇搭起來在後面這麽一遮一邊一個小太監拿著金鎖提爐爐內檀香縷縷輕煙繚繞文武朝臣都在外頭按品級跪下軍機大臣達拉密把所有折本都呈上康熙皇帝該批駁的批駁該批示的批示該留中的留中留中就是不發皇上看完就擱在他那裏了別人不知道是什麽內容看來看去發出了四川巡撫趙家林的專人折本這是外聯官的折本康熙皇帝要仔細看看看完以後康熙就一皺眉一件事四川全省三年大澇顆粒不收老百姓吃草根兒樹葉也有餓死的請朝廷派幹員到四川開倉放賑以解民困還有一件事劍山蓬萊島皇兄富保臣勢力浩大羽翼豐滿整個兒的四川省從巡撫以下已經治不了啦清皇上定奪滿清以孝治國我哥哥私離北京到了四川因爲他不滿意我做皇帝而應當他做皇帝這是當年順治死的事情到了現在我怎麽說呢得啦我充耳不聞只當聽不見反正哥哥您在那裏小鰍不能翻大浪您一個人在那兒折騰去吧折騰到您死算完沒想到這一次趙家林的折本寫得劍山十分猖獗而且自己的皇子四貝勒胤禎也有過折本提到蟠桃宮亮鏢會這兩件事合起來看劍山蓬萊島的勢力浩大已經成了朝廷的心腹之患皇上把折本往前這麽一推小太監捧起來交給八大朝臣的第一位就是神力王額爾金康熙皇上沈著臉說額爾金你看看這個摺子是神力王打開摺子看完了舉到自己的眉前小太監過去捧上交給皇上奴才已經看明瞭康熙皇帝說道趙家林已經不是一次來摺子提到這件事朕原想我的王兄在四川就是不算當年皇阿瑪冥天之際廢長立幼越次傳宗這件事我做弟弟的也不好說什麽我們滿清以孝治天下得啦就讓他任其自爲吧沒想到養癰成患四貝勒前不久也過了一個摺子我已經給你瞧了蟠桃宮亮鏢會有這麽一件事看來反迹已明他們要奪取十三省總鏢頭欲成大事是皇上明鑒額爾金我想派個幹員一來到四川開倉放賑以解民困二來要查辦劍山蓬萊島查有實據立即剷除當然寡人不能過爲己甚但是這事情已經不能袖手旁觀了你看誰去合適神力老王爺是朝廷的重臣一言九鼎他說出話來皇上就要採納但是從秦朝說如果皇上讓宰相舉薦個人稱了職宰相可能要得些賞如果薦這人不稱職壞了朝廷的事就得殺了這宰相歷史上不是有這麽一件事嗎范睢舉薦鄭安平伐魏國鄭安平是魏國人跟著範雎一塊兒來投奔秦國鄭安平在秦國做了官范雎做了丞相要派鄭安平打魏國鄭安平故意打敗了又投了魏國這件事情就是丞相舉薦鄭安平所薦非人他破壞了朝廷的事兒就把范雎的宰相大印奪過來可見這是一件大事啊現在康熙皇上問神力王誰去合適神力王要舉薦不出人來還算什麽八大朝臣的掌班呢神力王聽了一愣神認真想了一下便道奴才想