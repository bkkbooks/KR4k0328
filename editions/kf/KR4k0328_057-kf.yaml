嚴厲查尋這時候小哥兒七個都站在大人面前覺得臉上無光年大人看了看他們就問看出這賊人是誰了嗎稟大人我們看他十分眼熟年大人點點頭對了在梅花圈上你師弟吳成力勝十傑那第九個紅毛禿頭狸子馬俊不就是他嗎劉俊心說這大人眼力可真好記性也真好沒想到隔了這麽長時間他還記著呐看來大人在梅花圈動手的時候每一個人他都注意觀察啊劉俊忙道大人明鑒確實是紅毛禿頭狸子馬俊大人接著說像馬俊這個能耐你師弟一個人勝了他們十個可相反今天晚上你們七個人就拿不住一個看來你們七個人都是酒囊飯袋劉俊的臉蛋臊得跟大紅布一樣大人連連擺手你們幾個人下去吧給轟出來了小哥兒幾個都覺得沒臉見人了回到差館房劉俊心說我父母都沒了身無立錐之地白馬河甘家堡真假童林相會我跟了師父才有今天實指望這次隨大人到四川三年五載立點功勞回來安家立業沒想到剛到清苑縣就出這麽大漏子這往後離四川越來越近賊匪猖獗可怎麽得了啊師父在這兒我管不著師父不在這我得管呐我是隨行衛員辦差官呐劉俊心裏難過夏九齡也難過心說自己無父無母跟著師大爺司馬空練藝十二年現在跟著師父指望將來寒門三級浪平地一聲雷我夏九齡查辦四川回到北京大小熬個官光宗耀祖看來前途磨難十分黯淡呐第二天早上起來梳洗已畢夏九齡跟劉俊商量師哥呀大人看來走不了啦咱們得拿那紅毛禿頭狸子馬俊別看大人讓本地面的官人去拿那是樣子貨根本拿不著我想咱們七個犬分成七條道咱們從正東來的這條道就算了我夏九齡奔西北找一找哎呀我奔正西找一找楊小香認承了西南楊小翠認承了正南洪玉耳認承了東南劉俊認承了東北大傢夥兒分開了各管一面單說夏九齡出了西關帶了點銀兩他心說看來昨天晚上的事老百姓都知道了老百姓認不出我來我不寒磣馬俊能認不出我來嗎賊人不好訪啊九齡各地查看離開清苑縣城一個上午往西北走出近二十裏路去天交中午走得又渴又餓小英雄擡頭看前頭出現了一個村鎮來到村東口瞧見村口有一個石碑石碑上有三個大字金官屯進了金官屯路南有個兩層樓的小飯館字型大小叫蓬萊春夏九齡無精打彩挑簾進去夥計上來問少爺您吃飯呐您到樓上吧樓上南北樓窗開著十分涼快農村的小飯館有七八個座可以了夏九齡撿北邊坐下夥計你給我配幾個菜來半斤酒您吃什麽呀爺台烙四張家常餅就齊了時間不大全給端上來了九齡滿滿斟上一杯酒端起酒來喝了一口想起自己前途磨難心裏很煩剛做官沒兩天就出了這麽大的漏子將來師父來了大人一句話還不把我們都打發回家呀如果沒有這件事我還願意在北京練功有了這件事再把我們送回北京在王爺面前都不好交待多丟臉呐剛當了兩天官叫人家給休回來了沒能耐給師父也丟臉呐他把這酒杯往下一蹲啪地一聲響唉長長地歎了口氣這時候旁邊也有一位啪地一蹲酒杯唉長歎一口氣夏九齡可就不樂意了心說我在這小酒館裏心煩唉聲歎氣你幹嘛學我你這是諷刺我啊九齡這麽一瞧那邊也坐著一個小孩十八九歲梳著沖天杵的小辮前發齊眉後發披肩圓乎臉尖下頦濃濃的眉毛大大的眼睛虎虎實實看著就那麽俏皮身上穿著藍綢子長衫腰裏紮著絨繩白棉布褲子汗衫薄底福字履鞋看起來在家裏養得很嬌這個小孩摔了酒杯歎氣完了他感覺到不大合適人家在那摔酒杯歎息我爲什麽摔酒杯歎息呐一擡頭看見夏九齡正瞧他呢也是前發齊眉後發披肩梳著沖天杵小辮一身寶藍長得也很俊自古惺惺相惜這小孩臉一紅九齡一抱拳朋友我摔酒杯歎息因爲我有心事你幹什麽也摔酒杯也歎息啊又不是人家這飯館有這種規矩不歎息不算吃飯的你這不是對我諷刺嗎兄弟您千萬千萬別這麽想摔了酒杯我很後悔因爲兄台您有心事不瞞您說我也有難言之隱啊所以我摔酒杯由衷地歎息這都是時逢恰巧我對不起您好你有心事我也有心事咱倆爲什麽不上一塊喝來那好極了夥計把我這份端他桌上去連酒帶茶全端過去了小哥兒倆坐到一塊兒了夏九齡問沒請教你貴姓啊我是本地人在這兒往正北八裏地有個小村叫鄧家堡我們老家不是這兒的人聽我父親說我們老家是山東平陰縣人小孩通名姓小英雄夏九齡大鬧風雲莊捉拿馬俊
