body:
  text: 第七十二回駱駝嶺巧得赤金牌碧霞僧行道黃土坡上回書說到駱駝嶺孔秀智誆趙小喬他說自己來找趙小喬要豆腐賬兵丁聽了心裏納悶我們少掌櫃的怎麽這麽能吃豆腐啊一短一千兩說你候著啊說完兵丁順著山道噌噌噌往上跑一直趕奔駱駝嶺大寨趙遠峰跟趙小喬帶領一部分小頭目都在北大廳待著呢趙遠峰責備趙小喬原來他自從來到七星山之後人家段氏弟兄按月發餉總要多給些銀子這筆銀子由趙小喬來領趙小喬這個人有點財黑銀子領下來之後他不給所有的兵丁發錢所有找老寨主反映情況的刺頭他全給發了錢老實巴交的他不給他在這裏時間一長認識了七星山的一些人便往外放閻王賬你借我銀子什麽時候歸還多大利錢趕到了時候老壓著這撥餉銀下來我放出去那撥收回來時間一長人家兵丁都有怨言這一有怨言慢慢地就吹到老寨主多頭太歲趙遠峰的耳朵裏趙遠峰老頭還挺細心暗地一調查除了刺頭說趙小喬好老實的兵丁都有意見趙遠峰把一部分頭目找到大廳裏把趙小喬找來訓斥你這孩子怎麽辦這個眼前這四百名兵丁都是咱們的鄉親每個人都撇家舍業離鄉背井跟隨你我父子來到山西他們不爲多掙幾個錢他爲什麽來你總克扣餉銀萬一人心離散他們一開小差把咱們爺兒倆就擱在這啦趙小喬一聽心說壞了這誰給我捅了爹哪有這事咱們總是一手來一手去公平合理一手托兩家我在前山領了銀子來回到後寨馬上就發餉從來沒扣過你呀嘴強牙硬不是一個人跟我提到我也調查過我也到前山查了明明有這個事你還不承認你還氣我爹呀這又算什麽不能這麽說你怎麽能這麽說呢因爲咱們帶著人都是自己的鄉親遠親近鄰全有你不發人家錢你還說這個你不在乎難道說我也不在乎嗎這個時候兵丁跑進來了單腿打千報告啓稟老寨主山下來人找少寨主你看山下來人咱們在這住的時間並不長沒有什麽朋友誰找你我不知道呀他說從洞庭湖來是賣豆腐的跟您要豆腐錢來了趙遠峰聽了大怒小喬啊小喬你真把爲父氣死你吃人家豆腐當時就應當給人錢人家小本經營你不給人家錢這叫什麽事呀趙小喬一聽哪有這事克扣軍餉是有的可我短過誰的豆腐錢簡直胡說我短誰豆腐錢孔掌櫃的豆腐錢孔掌櫃的盂掌櫃的我不認得他你看你吃人豆腐不給錢叫人家記賬到現在人家老遠要來了你還說你不短你這就不對唉爹我真不短呀再說我短的豆腐錢我能短幾個錢趙遠峰一想對呀難道人家大老遠的就爲要這三吊兩吊錢嗎到底短多少錢呢啓稟老寨主我也問了他說短一千兩銀子啊冤家你真不學好背著爲父你胡作非爲豆腐錢還能短這麽多你一定在外頭吃喝嫖賭你把錢都花虧了爹我哪有這事啊氣得他怪叫如雷伸手就把三節棍抄起來順著駱駝嶺跑下去了轉眼之間來到山口小子你是賣豆腐掌櫃的孔秀一瞧趙小喬啊趙小喬我就曉得你是賴賬的你還拉著三節棍我這旮裏也有軍刃的孔秀也把搖山動的小刀抽出來好小於你賴賬老子要你的命趙小喬嘩楞楞一抖三節棍就過來了孔秀撒腿就跑我是豆腐坊的夥計我們老掌櫃的在那旮裏呢你短與不短欠與不欠你跟我們老掌櫃的去說又向不遠處的司徒朗喊道我說掌櫃的你快過來吧我把短咱豆腐錢的人喊來了司徒朗一見把趙小喬誆出來了忙把包袱打開嚓楞楞一分五行輪飛身形過來小子豆腐錢不給你還要賴賬亮傢夥打人天底下還有好人走的道嗎老太爺我要你的狗命啊你是哪里開豆腐坊的我怎麽不認識你呀你這麽大的年紀還開豆腐坊有這事嗎司徒朗一瞪眼短錢不還你還要盤問我我宰你趙小喬大怒嘩楞楞一抖三節棍插花蓋頂對准司徒朗頂梁就打司徒朗上左一滑步跟右步立輪一點他的腕子左手輪奔他的腳面趙小喬腳尖一點地長腰起來司徒朗左腳紮根擡右腳往裏一腿啪一腳就把趙小喬踹出一溜滾去捆張方孔秀倆過來掐了絨繩抹肩攏臂四馬倒攢蹄把趙小喬就給捆了問你知道我是誰嗎不知道您呐九尾宗彜世界妙手老大爺我叫司徒朗把你拿住破七星八寶轉心亭得取金牌我們是得金牌來的剛說到這裏就瞧北面樹林裏出來一個人阿彌陀佛老人家你要得金牌嗎金牌在此順著樹林裏頭出來個大和尚左手托著黃蹬澄的金牌星斗之光一照唰唰地冒亮爺兒仨一瞧這和尚有點意思大高的個寬肩膀肚大腰圓短脖挺太陽穴有點癟但是大腮幫大嘴叉真跟蛤蟆一樣身上穿灰僧袍圓領廣袖紮絨繩配戒刀往臉上觀瞧臉色發綠兩道花角的眉毛一雙怪目圓翻那真是綠眼珠大秤砣的鼻子火盆嘴一嘴七顛八倒的大板牙明顯顯露著三塊授戒的香疤左手托金牌道阿彌陀佛老人家你要問貧僧家住在井陘大道娘子關核桃園關帝廟的廟中貧僧叫水底金蟾碧霞僧這個和尚看歲數也得有六十挂點零其實水底金蟾碧霞僧跟司徒朗他們是師兄弟當初核桃園關帝廟的方丈就是前回書上北京城亮鏢會咱們提到的生鐵牛樸鹿的老師大戰燕普的寶鏡禪師青雲長老就因爲青雲長老收了這個徒弟把核桃園的關帝廟給了他老和尚才回到長安到長安關帝廟去當主持碧霞和尚跟師父學了十幾年他這個人的功夫也挺硬棒的但是有一樣都學的是硬功有一次水底金蟾碧霞僧跟人打聽他要練鷹爪力但沒有找到老師有人告訴他就跟他開玩笑你練抓大肚罎子一邊一個每天沒事這兩隻手摳住罎子口從這頭走到那頭從那頭走到這頭空罎子抓熟了覺得手指頭上用點力就掉不下來拿這空罎子不算什麽了就抓把鐵沙子放在罎子裏提著到那頭到那頭之後再抓上兩把你走他三月老這樣繼續日久天長你這鷹爪力的功夫就有了把這罎子裏頭的沙子你裝滿了你還隨便提著走運用自如你手的鷹爪力的功夫就練出來水底金蟾碧霞僧還真這麽辦真是的鐵梁磨成針功到自然成五年的光景吃飽了沒事就抓罎子他這手的勁頭可就太大了夏天自己在這裏依然抓罎子快到半夜好象葡萄架上有人說話碧霞水底金蟾碧霞一反頭叭嚓嚇得把兩個罎子扔在地下全碎了裏面的沙子都流出來我說你這是哪位啊葡萄架上人說站住聽我說你練鷹爪力呢對我練鷹爪力呢哈哈你這麽練練不出來那麽要怎麽練呀我告訴你你呀買一張全牛皮你拿著這張牛皮到皮作坊裏頭讓他給拉整條三分寬的皮條來然後把他截成十段每一段你沒事就系死扣系一個系兩個都系成大圓疙瘩系好了之後你買他十斤魚鰾買那玩藝幹什麽把它熬開了之後把這十根皮條疙瘩放到魚鰾鍋裏讓魚鰾給它粘了然後把它陰乾起來等這魚鰾把這牛皮疙瘩都晾乾於就用十個手指頭耐下心來把疙瘩解開連續把這十個疙瘩全解開你的鷹爪力功夫自然就成了噯我聽您的您是哪位呀他往葡萄架外頭走突然間就看葡萄架上面騰一下掉來一個圓球甩出去幾丈遠落在花叢之中蹤影不見跟著就買了一張全牛皮買了好幾斤魚鰾然後就把它熬上把十個牛皮疙瘩都擱在鍋裏頭拿鐵筷子扒拉著讓這魚鏢都鑽到牛皮疙瘩裏面去然後一個一個撈出來找個不見太陽的地方就陰乾上了將近四個月魚鰾就幹了拿起來一瞧跟鐵的一樣沒法摳哇他可耐心啦就這樣地解開就費了十年光景全解完了他也覺出手指頭有勁了可惜也作廢了十個手指頭部跟大胡蘿蔔一樣掰不開縫了這怎麽辦呢我找師父打聽打聽有治沒治於是就奔昌黎縣青雲山青雲寺饑餐渴飲曉行夜宿一天走到直隸山西兩交界地方和尚有點餓只有個大鎮甸村口上有個飯攤謔人還真是不少好幾個長條桌基本上都滿著呢單有一個桌好象好一點和尚就找個地方坐下來要餅要面要萊吃完了準備出發了就在這麽個工夫在和尚旁邊有人說話一聽聲兒挺細挺婉轉好象是姑娘說話掌櫃的給我們算算賬碧霞這麽一瞧看這意思是主仆二人裏手一個外手一個坐對臉說話的小男孩解開包袱放在桌上碧霞僧一瞧包袱皮裏頭全是錢大部分都是金子銀子很少唉呀這兩個小男孩沒出過門這叫露白呀青酒紅人面財帛動人心大庭廣衆之下一露白你有錢就能招來圖財害命給你自己招來殺身之禍碧霞和尚這裏正瞧呢就聽旁邊好象有點響動聲在這主仆二人旁邊不遠的地方也坐著一個男孩在那裏吃飯長得很俊戴著馬連坡大草帽一身藍紮著絨繩薄底靴子脅下配著刀兩只賊眼直勾勾地盯上這倆男孩子嗨這還有錯嗎這主仆招來橫禍飛災我和尚焉能不管果然旁邊這小孩也趕緊算賬給了錢在後頭跟著主仆二人出來一直往前走出十幾裏路天也就黑下來前頭有個村叫德福鎮一進德福鎮的村口路南有座店這店叫雙和老店前頭主仆進了店後頭的這個年輕人也進店碧霞僧挑著擔也進店了一看這主仆就住在正院的北房那個年輕的就住在跨院他告訴夥計要住在南房來到屋裏頭把兩個筐摞在一塊嗨碧霞僧爲什麽單單要住在南房因爲主仆住在北房晚上休息吹了燈在北面的窗戶眼往北房看不是看得真切嗎老和尚果然把戒刀佩好就在北窗戶前頭一坐嗵就捅了一個窟窿和尚一瞧啊滿天星斗微風陣陣夜靜更深凡是店客全都睡了正瞧呢嗯就瞧見從東院唰地一下過來一條黑影和尚納悶這是誰呀說像白天那個年輕的可有一樣怎麽是個女子呀一張瓜籽臉一身夜行衣斜插柳背著鋼刀身形苗條兩隻小腳蹬在房脊上沙沙沙身輕似燕由東院過來又一瞧北房燈沒吹呢主仆正坐在那說著話不過這個女賊那確實是目不轉睛不往別處瞧瞪著眼就隔著橫眉子往裏瞧和尚蔫蔫地站起來把屋門開了一轉身出來他蹲在牆根房檐下觀看這時候女的一飄身下來腳踏實地一點聲音沒有上臺階她用左手一按按刀把頂碰簧把刀拉出來用這刀尖撥這門插棍轉眼之間把這兩道門插棍完全都撥開蹲下來一手拿刀一隻手托這門輕輕地就把門托開了她一閃身躍門坎就進了屋碧霞僧一個箭步飛身行過來也到了北房外他也施展珍珠倒卷簾的功夫隔著橫眉子往裏瞧女賊唰地一挑簾子撲地燈苗兒一晃主仆二位可嚇壞了僕人往主人那邊一靠把主人抱住心裏嘣嘣亂跳你是幹什麽的夤夜之間你敢到店房來擾鬧主人在旁說道別跟她這位大姐發火主仆也認出來了白天吃飯的時候她是女扮男裝大姐你要沒錢花我這包袱裏有的是錢你可隨便拿用希望你給我們主仆留下一點好在我們從這裏奔北京投親也沒有多遠有個十天半月就到了我們也用不了多少路費大姐你要用錢你就拿走吧說著把包袱打開你趕緊拿錢快走吧不然的話人家店裏頭的先生掌櫃的夥計覺察出來你一個女流之輩深夜之間到男子的房中來哎呀名譽可不好聽那時候與大姐你多有不便臉上無光你你快走吧這個女賊嗤一笑臉都沒紅這位公子爺我這一次到你的房中來可不是爲了你的金銀呐如果要爲你的金銀那我就不來了我就看著你公子爺年紀輕輕的二十多歲長得很好我是一個姑娘今年二十一歲又深通武技你不管到什麽地方去我都可以幫助你你上北京投親我也能幫助你可有一樣我跟你女貌郎才天生一對地就一雙我願意將我的終身大事許配與你但不知公子你意下如何這個女賊到這裏來是求人家男的收