可真顯出厲害來了抱著大杵往這兒一站剛要說話就見月臺的西邊一邁腿又上來一個人聲音洪亮唉小子我來跟你試試東廊下的人一看上來的這位可爲傻小子於恒擔心害怕呀這個人晃蕩蕩平頂身高也過丈啊比傻小子於恒還得猛點兒呢前胸寬背膀厚肚大腰圓頭如麥鬥紫綢子絹帕纏著頭紫黑的一張臉兩個顴骨特別高兩道紅眉毛似有如無黃眼珠滴溜溜兒亂轉大蒜頭鼻子大嘴岔耷拉著嘴犄角一對大耳朝懷青鬍子茬哎喲長得這個凶啊一身夾褲夾襖腰裏紮著皮挺帶銅飾件鋥明瓦亮腳底下大牛皮靴子右手攥著個小孩兒傻小子怪心疼的喲你怎麽攥個小孩兒還腦瓜朝下他怎麽不哭啊嘩月臺底下人都樂了那是真小孩兒嗎純鋼打制罩著一層金衣這個小小子兒整個是個人形攥就得攥著它兩條腿的腿腕上但是這小小子兒的右胳膊可到了腦瓜頂上反背著腦門這還有個三棱大尖子這叫獨腳反臂銅人槊這東西可厲害足有好幾十斤呐大個兒提溜著就過來了他就是塞北沙燕嶺叫甘虎給射死的那個二寨主燕凱的侄子大寨主咕嘟也罕的大弟子名叫金咕嘟於恒開門就問喲你使小孩的嗯猛漢臨陣對敵不要口出戲言我來跟你討教討教那麽小子你叫什麽東西報出名來吧我乃塞北沙燕嶺老寨主咕嘟也罕的大弟子名叫金咕嘟嗷你叫筋骨頭我叫牛骨頭咱倆敢情都是骨頭看你這意思身大力不虧好像你有點勁兒似的咱倆人幹幹吧好嘞他掄起這反背獨腳銅人槊來傻小子把八棱紫金降魔杵左手這麽一橫右手一托前頭這個八棱疙瘩渾身卯足了勁等他這反背銅人槊砸下來鳴砸下來了猛英雄往這麽一揉勁兒開呀這回可來真的了噹啷青煙亂冒火星四進呀啊金咕嘟一聲大叫指甲蓋裏頭都滲出血迹來了只見他噔噔噔倒退四五步撲通坐在月臺上了這反臂銅人槊熱啦一燙手拿不住金咕嘟往地上一放拿兩手就搓地傻小子也一樣噔噔噔倒退四五步撲通坐下了把杵也放在那兒了拿兩隻手也在地上搓於恒先說小子該我打你啦對你來打我金咕嘟站起來騎馬蹲襠式站好了把這反臂銅人槊拿起來一托小孩兒的後腦勺右手攥著腿腕架好了你來傻小子說這個你砸我一下我就得砸你一下不砸你就吃虧了猛英雄把八棱紫金降魔杵拿起來噔噔噔往前一趕步右手一搭腕子往下一砸當喝真有捂耳朵的噔噔噔兩個人各自往後退都來了大屁股墩兒兩人手搓地把軍刃放在旁邊金咕嘟說哎小子該我打你啦來吧傻小子於恒不含糊兩個人爬起來各自把軍刃撿起來傻小子於恒拖往了寶杵金咕嘟往前一趕步一舉反臂銅人槊噹啷又砸下來了你一下我一下棋逢對手將遇良才臂力相同誰也不容易贏誰該我砸你了傻小子於恒又要砸金咕嘟說嘿來吧小子騎馬蹲襠式站好以後抱著自己的反臂銅人槊這時候孔秀在東廊下喊上了牛兒小子好混蛋呐孔秀是江南揚州人傻小子呢是淮安人他們兩下裏距離不太遠再說這兩個人耳鬢廝磨彼此說話都聽得十分習慣但是孔秀說起話來要讓金咕嘟聽懂了就很不容易喲怎麽了你不要這樣地打他這打到什麽時候才算完結呀他比劃好以後你假裝打他上頭然後打他的雙腿不就完了嗎傻小子一聽對呀但是金咕嘟沒聽懂還催呢快砸呀好嘞猛英雄于恒攥著大杵其實呀只要反應快一點都瞧得出來他那大眼睛淨看人家雙腿傻小子噔噔噔往起這麽一趕步掄圓了從上往下一砸快到這反臂銅人槊這兒了他轉圈了右手往外一支從底下抄起來照著金咕嘟的兩條腿的迎面骨上啪啪就是兩杵再看這金咕嘟可慘了雙腿齊根打斷因爲傻小子那個杵是帶刃的仨尖仨棱只聽啊一聲慘叫金咕嘟把自己的反臂銅人槊扔起好高來撲通一躺傻小子再往前一趕步好小子你可真讓我費事啊說完撲哧撲哧撲哧拿著大杵紮了好幾杵鮮血濺在月臺上活活把金咕嘟給紮死了嘩連王爺都一愣喲怎麽給紮死了其實王爺也很喜歡金咕嘟這個人看他那悍壯魁梧身材高大的樣子真惹人高興老俠侯振遠可暗暗吃驚西廊下鐵善寺門人弟子連遭殺戮大禍突起呀
