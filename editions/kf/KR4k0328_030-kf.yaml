body:
  text: 第三十回鐵善寺暗伏十絕計戰月臺雙猛殺四寨上回書說到雙猛攪重陽群俠有驚無險來到東配殿廊簷下衆人往大殿以內觀瞧太師椅上端坐兩位高僧西邊這位站起來晃蕩蕩身體高大魁梧奇偉足有九尺多高前胸寬背膀厚虎體熊腰真是四楞胳膊起青線渾身的腰子肉往那裏一站非常結實這位和尚長得大腦瓜黑臉膛黑中透亮兩道襪子眉白了斜飛入天蒼一雙虎目閃閃發光鼻直口闊大耳垂輪頷下一部黃鬍鬚苫滿前胸怎麽也得有七十歲往外了鐵頭皮明顯顯露著六塊受戒的香疤拉這是本廟二當家監寺鐵面伽藍佛濟源和尚呐他往這兒一坐微然一撇嘴這份兒大了說真的渾身橫練骨硬如鋼出家的僧人自幼爲僧童男子啊棒極了你給他一刀白砍上垂首這位老和尚起碼在八十歲往外了中等身材雙肩抱攏身穿黃雲緞子僧袍腰系黃絨繩寸底黃僧鞋白綾高腰兒襪子赤紅臉微擡眼瞼慧目放光鼻如玉柱唇似丹霞大耳相稱頷下一部銀髯頭上明顯顯露著六塊受戒的香疤拉背插麈尾面目慈祥他就是鐵善寺的方丈主持當家的濟慈和尚紫面伽藍佛老少群雄都奔東配殿來到東廊下大家紛紛落座海川告訴劉俊把爺兒幾個帶的行李完全擱在東配殿裏頭這包袱可不少呐起碼也有好幾十個劉俊全給拿進去了然後把自己的包袱也放在裏面就連海川的龍批大票跟他在麒麟山洗硯池得的墨魚皮也放在裏面了劉俊出來準備茶水招待衆位群雄等所有的人落座後侯振遠童林二位才過來細問於恒兄弟你跟虎兒小子沒在一塊兒吧在一起呢那麽在一塊兒你怎麽一個人跑這兒來了他又在下面席棚呢於恒說有一天我們四個人住在一個店裏人家後門那兒有匹駱駝不是長脖子馬也不是小耳朵驢是駱駝虎兒非要騎把我還給拽了一大跟頭他騎人家駱駝跑了人家本家來了那我還不跑嗎我又把人家那杵給偷跑了壞事包張旺跟孔秀他們倆也跑了我就一個人下來了可是我一個錢也沒有啊傻兄弟我苦極了嗷兄弟你苦哥哥我知道於恒接著說那天天快黑了我碰見一隻大貓敢情是老虎它要吃我我真急了給了它一拳頭把它給打死了我又碰上一個和尚人家和尚把我帶到他的廟裏那老和尚叫什麽水晶肘什麽水晶肘是不是叫水晶和尚亞然呀對叫水晶和尚歲數不小了他問我吃飯了麽我說我得吃肉他們就弄虎肉讓我吃結果我拉稀了拉人一院子屎海川心說我這傻兄弟真有出息第二天病了老和尚把我帶到他那屋裏去讓我休息給我治病慢慢兒好了來了一個姓王的老頭兒他說鐵善寺的和尚要跟你們倆玩命非要把你們兩個人宰了不可他們在月臺底下裝了三缸炸藥這藥撚子通到廟外頭絕戶計不成最後就點這藥撚兒讓你們兩個人還有你們帶的人跟這鐵善寺同歸於盡啊老俠侯振遠一聽沒嚇死這裏頭還有王爺呢侯老俠急忙問那麽那麽這個事情你你著什麽急啊你知道我這人說話快不了著什麽急老俠侯振遠心說我是個不著急的人可說這個我還不著急啊傻小子接著說知道這事我也著急啊我說這怎麽好老和尚問我你還上鐵善寺去嗎我說我找老頭哥哥林兒哥哥和尚要害他們倆我怎麽能不去啊我們哥兒幾個死就死在一塊吧哎喲老俠侯振遠聽這話這個喜怒不形於色的人眼淚險一些沒下來就說傻兄弟這人心眼誠實他跟我跟童林的心是一個這意思是死都願意死在一塊兒兄弟你往下說吧我呢就打老和尚那破廟出來了人家給倆錢兒我全花完了我挨餓了我走到一個大山溝看人家很多人拿著碗盛牛肉吃大饅頭我以爲那是許願的施舍饅頭和肉呢敢情不是我跟人家幹起來了把一個小工頭的手指頭給咬掉了童林一聽嘿你可真有出手的跟人家打起來了你瞧我這身衣服是新的那是人家給我做的因爲我在那碰見我表弟了他們在那兒當頭兒呐小五兒小六兒過去在家裏打抱不平結果叫官府抓得很緊他們就跑了跑到懶龍溝當頭兒了人家給我換了衣裳給我做牛肉吃我把鐵善寺的事情這麽一說他們倆說不要緊就帶著人趁晚上天黑把那地溝刨開把藥撚子都給弄出來了現在他要再點呀就點那撚吧後頭什麽都沒有了這月臺底下就剩仨空缸了我今兒一清早來就碰見我們虎兒了他給了我解藥我跑這忍著來了老俠侯振遠想鐵善寺欲置我和童林于死地安排這樣的狠毒之計他自認爲很聰明但是聰明反被聰明誤老天不佑惡人你們是出家人辦這事可萬萬沒想到這樣周密的計劃竟讓兩個傻小子給攪了虎兒小子冒充鐵善寺的人使群俠化險爲夷順利過關牛兒小子把地雷給破了侯老俠感激地說太好了太好了哥哥我謝謝你甭謝了這時孔秀張旺過來了還拿著杵呐唉呀阿彌陀佛你真把我急死了虎兒小子跑哪去了爺兒們你怎麽跑這來了哎呀牛兒小子你怎麽跑到這旮裏來了我不跟你們費話了我那杵拿來了嗎這不是在這旮裏呢全擱在八仙桌底下了嗷我再給你介紹一個朋友於恒問你給我介紹誰呀哎呀師弟你過來病肋犀牛吳霸過來問師兄什麽事孔秀指著於恒說這是咱們本門本戶的新師叔也是咱們師父的師弟他叫叱海金牛于恒於寶元孔秀又對傻小子說牛兒小子這是你師哥給你收的師侄叫病肋犀牛吳霸這個吳霸可不敢虧禮趴地下道師叔在上侄兒吳霸參拜小子小子起來我長這麽大沒人給我磕過頭你給我磕頭幹什麽你就記住我是牛兒小子就行了吳霸一想我這傻師叔是個湖塗蟲啊你就坐這兒吧他們四個人坐在一塊兒了這個時候薰香燒起來了工夫不大可就倒下了不少人奇怪的是所有東配殿的來人甭管老的小的有一位算一位一個沒被薰倒而鐵善寺請來的山南英雄海北豪傑眼瞅著往下倒濟慈和尚看著新鮮便問濟源師弟你看見沒有東西兩廊下解藥顛倒這到底是怎麽回事呢趙遠峰趙小喬父子二人在山下是怎麽辦的東廊下的人都聞解藥了怎麽咱們約請來的人一位聞解藥的也沒有啊是啊小弟也正在納悶兒來人呐濟慈一擡頭兩旁邊站著和尚小沙彌足有二十位還站著許多俗家弟子金頭獅子孟恩孟少伯座山雕彭飛彭萬里紫面龍君羅烈羅焰光全都在這兒還有兩位大和尚的四大弟子法本法鐸法廣和金面貓法通也在旁邊侍候著老和尚一叫狠毒蟲法本就過來了伺候師父法本山口外頭你安排誰了稟恩師弟子安排的是黃風鬼燕凱燕二寨主還有趙遠蜂趙小喬父子二人以及二百名長矛手不對你看看東廊下都有解藥西廊下我廊下去法本吩咐人去拿解藥然後回來濟慈說燕凱不至於不認識咱們的人呀是啊弟子我到山下去看看吧快去速報我知法本答應著打鐵善寺出來順著山門往下走一直趕奔山下越走越近老遠地就瞧見了駱駝在那兒心想沒錯趙遠峰趙小喬父子當中有個黃臉大個可自己不認識這甘虎也琢磨著人家不可能老不知道啊他加著很大的小心呐這會兒便對趙家父子說哈哈哈哎呀我看這人上的不大離兒了燕寨主我們父子倆謝謝您今天沒有您這場事可就幹了這個您看滿盤滿碗全始全終這時候法本來了趙遠峰趙小喬一見忙說法本師父你來得太好了黃風鬼燕二寨主今天一早就到了不然的話今天這事可就辦砸了甘虎心說要壞法本一瞪眼他是誰呀我怎麽不認識黃風鬼燕凱在哪呢啊趙遠峰趙小喬父子倆不由得各自回頭一個往左一個往右爺倆看著甘虎問你是誰甘虎早琢磨好啦等這爺倆往自己這一瞧他兩隻手攥好了拳頭照著這爺倆的臉上咚咚兩拳把爺倆就打著了連人帶椅子哢嚓就摔倒了傻小子甘虎一個箭步順著桌子就躥出去了把駱駝解下來一騙腿上了金睛雪花駝哈哈哈拿我當燕凱了小子我是鎮八方紫面昆侖俠童林之徒霹靂狂風甘虎明白嗎爺們兒我走了一催駱駝就下去了趙遠峰趙小喬一聽這才知道上當了一拉三截棍嘩楞楞就要追法本給攔住了等等等等法本師傅您看我說我們不認識他您告訴我們黃臉大個兒帶著杵有駱駝這沒錯兒呀我們問他是燕凱嗎他也說是哪知道他是霹靂狂風甘虎我們把燕凱燕二寨主射死了法本一問怎麽回事您要問如此這般這麽們請來的人一個有解藥的也沒有趕快派人把解藥拿來送到西這麽回事兒趙遠峰就把剛才發生的事情敍述了一遍嘿嘿二位呀真有點意思得了你們要到廟裏去會擔不是的趁早帶著二百名硬弓手回轉洞庭湖走吧這爺倆走可是走剛回到洞庭湖又叫人家給請去了誰給請去了現在還不能提到了時候您就明白了法本派人拆席棚自己便往回來到了大雄寶殿之內見方丈把剛才的事情細說一遍濟慈濟源十分生氣濟慈問法鐸和法廣你們兩人在甘家堡的時候就認識童林了吧不錯我二人被擒的時候認識童林也認識侯振遠好吧你們兩人出去瞧瞧看看他們來了沒有法鐸法廣兩個和尚出來往東廊下一看畫地無形隱逸俠甘雨甘鳳池早到了同時也發現了王爺西方俠于成這些人他們都認得老俠侯振遠鎮八方紫面昆侖俠童林也在兩個和尚回來了師父白馬河甘家堡的畫地無形隱逸俠甘雨甘鳳池也在他們那邊還有西方俠長臂昆侖飄髯叟于成和那個王爺也在而且侯振遠童林也都來了阿彌陀佛好吧你馬上到東廊下去就說我弟兄二人有請鎮東俠侯振遠鎮八方紫面昆侖俠童海川二位施主大雄寶殿以內談話是法鐸答應著趕緊從幾案上把戶書拿起來拿出兩位方丈的名片轉身形往外走順著月臺邊上一直往東來到東廊下直接就到王爺跟于老俠侯振遠海川他們爺幾個這張桌前啊彌陀佛侯老俠客老俠侯振遠趕緊一抱拳嗷高僧您有什麽事啊奉我家兩位方丈之命面見侯老俠和童俠客這是我家方丈的名片說著把名片交給侯振遠侯振遠童林都看完了道高僧啊兩位方丈有什麽吩咐嗎侯老俠童俠客我家方丈有請你們二位到大雄寶殿以內一談哈哈哈哈好吧既然高僧吩咐我弟兄敢不如命請你們二位稍候我到大雄寶殿以內回稟一聲說完以後法鐸轉身形回大雄寶殿了老俠侯振遠站起來伸手把寶劍摘下來了往桌上一放王爺給接過來說海川呐你跟著哥哥到大雄寶殿與兩位高僧見面有這麽句話酒逢知己千杯少話不投機半句多一切都聽老哥哥的你不要自作主張也不要孟浪行事是童林知道這樣老俠侯振遠在前頭海川在後頭可就奔大雄寶殿來了剛來到堂階下法鐸領著濟慈濟源也從大雄寶殿裏出來了濟慈在前頭濟源在後頭說真的濟源這個頭兒可比濟慈高得多濟慈合掌打問訊口誦佛號阿彌陀佛侯俠客童俠客哎呀二位高僧老俠侯振遠樂樂嘻嘻躬身施禮一抱拳不知道二位高僧呼喚我弟兄有何吩咐哈哈哈哈二位俠客你們老二位蒞臨敝寺門頭僧又沒有通報我弟兄也不知道恕過我弟兄有失迎接之罪萬望二位俠客多多原諒高僧說哪里話來我弟兄二人此番應邀來至鐵善寺冒昧造訪還望高僧多多海涵啊老俠客客氣了濟慈一邊說著話一邊微擡眼簾看著侯振遠跟童林老俠侯振遠確有一番丰采童海川雖然衣不驚人但是渾金璞玉看得出來有很好的功底好吧此處不是講話之所咱們禪堂內待茶這樣侯振遠童林隨二位高僧來到大雄寶殿內座位已給準備好了客座上侯振遠童林主座上就是濟慈跟濟源坐下以後獻上茶來這地方