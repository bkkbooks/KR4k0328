關係為的是吃飯省事師弟這沒錯了咱師爺刮了臉你瞎説我不信你胡説我師祖父刮臉那麼大年紀老和尚美髯好看好不容易留起來的鬍鬚又刮了去再説我師祖是本地人説話是山西口音你是哪兒的人你是江南口音你胡説八道哎喲孔秀一想嗨這兩小和尚還真鬼哎呀混帳東西把師祖我給氣壞了老僧我身為劍客走遍南七北六十三省哪旮裏都去過哪旮裏的話都會説我説江南話我也説山西活我還想説兩句山東話這有什麼關系呢慢怠了師祖師父怪罪下來那還行阿看來老人家説的話是對的想説哪兒的話就説哪兒的話不不能聽你的師哥我問問你你是什麼東西你冒充我的師祖我師祖是碧目金睛佛緑眼珠你是賊你是黃眼珠這怎麼能一樣呢混帳東西孔秀想這不對呀這眼珠哪兒能隨便換呢混帳東西我的眼睛跟貓一樣那是隨便換的嗎竟敢隨便藐視老僧我要你的命呐看起來他不是咱的師祖他上這兒冒充找咱的便宜師哥打他法來一説往前一趕步左手一晃面門惡狼扒心當就一拳孔秀一瞧法來的拳來了往左一趕步一癟肚子一吸氣伸右手揪他的腕子順手牽羊麒麟吐珠把法來給打出一溜滾去孔秀樂得蹦高哎呀我也會動武我也會打人我不淨挨湊了哎喲這可太高明了就在這個時候法如在後頭一揪孔秀的脖子孔秀一掉臉鷂子翻身右腳扎根擡左腳掃堂一下嗨又把這法如踹了一溜滾混帳東西跟師祖動手哪兒有你們的便宜還不趕緊叫你的師父出來給我磕頭還要跟我動手嗎謔兩個小和尚摔了個跟頭險些哭出來正在這個時候猛然順著東月亮門出來人了阿彌陀佛什麼人夤夜之間來到老僧的廟中前來擾鬧真乃大膽小僧縱身出去阿彌陀佛師父你快來吧老和尚一拔腰上了月臺借月光孔秀一瞧哎呀大個兒的老和尚灰僧袍圓臉闊胸扎絨繩灰中衣黃僧鞋白綾高襪子赤紅臉六塊受戒的香疤拉頷下一部白鬍鬚苫滿前胸老和尚確實是了不起的三寶弟子西風長老秋禪你們兩人在這裏幹什麼呢他説他是我們的師祖父來了讓你出來給他磕頭我説我師爺爺有鬍子他説他吃飯礙事剃了去了我説我師爺爺是出家的和尚你是俗家他説他不願意當和尚他願意還俗他還俗了我説你説話是江南口音我師爺爺是本地山西口音他説我想説哪的話就説哪的話後來我們説你是黃眼殊師爺爺是緑眼珠他沒的説了他上月臺就打我們把我們哥兒倆都打了老和尚給兩個孩子身上的土撣一撣阿你們兩個站在一旁小和尚擦幹眼淚站到一邊去了西風長老秋禪過來道哼你是什麼東西竟敢到老僧的廟中來找老僧的便宜你姓什麼孔秀心説阿呀我可把西風長老秋禪誑出來了既然斑出來了嗎師父你就應該過來你怎麼不過來呀海川剛要往裏走張方攔住了叔你等等吧方兒怎麼了你要幹什麼這不是孔秀把西風長老秋禪誑出來了嘛咱們就應當過去呀師叔這孔秀用的什麼辦法誑人家西風長老秋禪呐找便宜冒充人家的師祖到現在把人家兩個小和尚都打成這樣了這個時候秋禪長老出來正有怒氣的時候你要一過去絶對不成海川一想對那你説呢你別忙阿孔秀過去跟西風長老叫橫西風長老秋禪便要揍他等西風長老秋禪把他打成了爛酸梨到那個時候西風長老秋禪已經把氣消了你再過去就合適了海川一想你這是成心讓他挨揍不過孔秀這東西呀也真可惡他冒充我的師祖薑本初他把人家兩個小和尚都打了我看方兒這文章不錯讓老和尚狠狠地揍他幾下人家秋禪長老那麼大的劍客也不至於把他弄死還得問問他怎麼回事呢到那個時候我再過去這多好阿海川問夏九齡夏九齡跟張方是一頭的夏九齡的媳婦是張方給説的張方的媒人呐他倆能不是一頭的嗎有跟媒人做對的嗎師父我看我師弟的辦法還真不錯應當好好管教管教孔秀這也太不象話了再前者你也不是不知道他盡捅漏子在北京這麼多日子漏子雖然捅得小一些但是他嘴太討人嫌哪有冒充薑老太爺的褻瀆之甚應該讓西風長老秋禪前輩好好地揍他幾下叔你看怎麼樣海川一想好吧那咱就不言語了
