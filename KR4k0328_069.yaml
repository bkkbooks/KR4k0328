body:
  text: 第六十九回蓮花觀弟兄巧相逢西風寺尋找擺亭人上回書説到司馬良遇難蠍子孔三俠來到耿家莊立刻請大夫會診時間不大請來四位大夫都是鬚髮斑白的老年人四位老先生立即取過脈枕各自細心號脈哎呀司馬良已經腫得不像人樣順著汗毛眼兒往外流黃水腥臭難聞怎麼喊怎麼叫也沒回聲四位老大夫號完脈一個徑兒地搖頭他們四位咬咬耳朵低聲商量一下這才跟耿文説耿莊主這位是誰呀這是欽差官年羹堯查辦四川的隨行衛員辦差官司馬良嗷喲這是叫蠍子蜇了呀説真的比方説什麼疑難雜症脈象裏顯得出來他已被蠍子毒遍全體我們不會治這種病人家連車馬錢都沒要就走了哎呀海川可抓瞎了老俠石金聲心裏説你能耐你非得要去七星山八寶轉心亭不可良兒這孩子要死了你看怎麼辦好難道説眼睜睜看著孩子死嗎説咱們什麼辦法也沒有了也別説附近是有一位他來了可能把孩子治好但是這個人的脾氣秉性別扭海川忙問你説誰太原府正南四十裏地有一座大觀是三清觀觀號叫玉瓣蓮花觀玉瓣蓮花觀的觀主姓韓叫韓景和他也是個緑林人脈象很好這不是洪賢弟在這麼我們哥兒倆跟韓觀長都有個不錯不過他這脾氣太古怪不好請海川一笑哥哥他來了能治那咱們哥兒仨一起去一趟海川又到司馬良跟前一瞧心裏頭急啦孩子一會不如一會兒南俠司馬空道兄看得起我童林人家把眼珠子摘下來交給我比方這孩子真死在此地那我怎麼對得起我道兄司馬空呀老人家這麼大年紀費了多少心血肯把倆孩子交給我我對不起人呐海川站在床邊上一動不動老俠石金聲説你甭多想了快走吧心急腳快老哥兒仨直奔太原府南門來到玉瓣蓮花觀這座觀周圍都是大樹林樹木蔭蔭圍著這麼一座觀前後四層殿有跨院三座山門關得挺嚴一杆大竹竿上葫蘆金頂有一杆杏黃旗在上頭隨風飄擺玉瓣蓮花觀老俠石金聲上前去輕輕地拍打角門就聽裏頭有人道無量佛哪位呀哐啷一聲響門分左右出來一位小老道喲這不是石老伯父洪老伯父你們二位這是從哪來呀説著小道行禮哎善哉善哉小仙長請起我們哥兒倆有點事來找韓仙長不知道韓仙長是不是在觀中他老人家在觀裏呢哦你給通稟一聲就説石金聲洪勳陪著一位成名的年輕兄弟少年英雄鎮八方紫面昆侖俠童海川前來拜訪小老道往裏走一會陪著老仙長出來無量佛阿石老兄洪老弟還有鎮八方紫面昆侖童俠客恕過山人未曾遠迎請罪阿請罪無量佛海川一看哎韓仙長可真有個相阿大高個細條的身材身上穿著藍綢子道袍卡青口系水長絲縧左搭絲扣又垂著燈籠穗銀灰色中衣厚底雲鞋白襪子過了磕膝蓋兒往臉上一瞧頂都謝了大約有七十多歲白鬢蒼蒼挽著髮髻楊木道冠金簪別頂頷下銀髯背插拂麈飄飄然有神仙之概呀老俠石金聲一躬到地韓仙長久違久違你身體可好呀老朽托你的福呀石老哥你幹嘛這麼客氣過來彼此行禮海川過來一躬到地韓仙長末學後進小子童林拜見石老俠心説應當這麼説話自稱末學後進這個人家韓仙長聽著痛快點只聽韓道長道哎喲童俠客久仰閣下的大名已非一日呀你的大名在我的耳朵裏可灌滿了總想拜望拜望閣下可惜無緣相見今日一陳香風把閣下吹到草觀默一見童俠客真是三生有幸呀韓仙長你太客氣了我童林文也不行武也不行全仗賓朋捧場仙長誇我童林實在不敢當無量佛童俠客太客氣了盛名之下無虛士請請請石老俠總提著心這提什麼心呀海川説得挺客氣你別認為客氣就行也不行你説的話他得中聽萬一哪句話不順耳也許就砸鍋三人都進屋喝茶哩石老俠還一直擔著心韓道長道石老哥哥你們老哥兒倆有什麼公幹為什麼陪著童俠客來到我的小觀呀二位有什麼吩咐嗎海川一聽這人多講理呀説出話來多客氣呀怎麼哥哥説他這個人秉性古怪呢石老俠抱拳阿韓仙長你我弟兄多年的交情了現在有點為難事打算請求請求你這一次海川賢弟從北京城奉聖命保欽差查辦四川開倉放糧沒想到了太原府丟了金牌大人不能走了剛要往下説韓景和一橫眼阿老哥哥咱們弟兄有交情雖然跟童俠客爺初次相逢也是慕名的朋友童俠客奉聖命保欽差奔四川路過太原府丟了金牌那是童俠客的事呀老哥哥你這話好象跟我説不著海川一聽毛病來了你得聽人家説完了呀石老俠趕緊擺手韓仙長事情並不算完最後發現金牌落在七星山哦金牌落在七星山那你們為何不上七星山找金牌去跑到我這裏幹什麼來了唉韓仙長你聽我把話説完我們到了七星山七星山金牌不獻把它放在七星山八寶轉心亭內定了日子破了亭他們給金牌破不了亭金牌就不能要我們老哥兒仨帶著一個孩子昨天晚上就去了沒想到掉進蠍子孔內成千上萬的蠍子把孩子給蜇了已經沒有什麼氣了群醫束手而老仙長咱們彼此是朋友精通歧黃如果能宏施法力把孩子救好了不但身受者感激無涯就是我弟兄也承恩不淺為此前來懇求仙長撥冗前往諒你不能推辭吧哈哈哈老哥哥不就是把孩子蜇得全身浮腫嗎哎呀再有成千上萬的蠍子蜇了只要貧道我去略施手術很快痊愈這麼點小事無量佛何勞石老俠你們弟兄三人的金身大駕來到我的小觀呀你不用派人來你要寫個紙條貼到狗腦門上這個狗到這裏唉貧道我看見紙條準就去了童林一聽這個雜毛老道這無形中罵我們哥兒仨呢阿老俠石金聲有涵養還樂呐海川心説哥哥我做不了你這樣都被人罵你腦門上了你還樂像話嗎海川攔住石老俠要説兩句話老頭心説糟了這一句罵你的話都吃不往怎麼請人呢童林道韓仙長如果狗到這裏來請你你都去那麼我們弟兄三人可是人呐老仙長不看僧面看佛面看佛敬僧這個孩子是我的徒弟你怎麼著也應當到耿家莊去一趟能把我孩子救好了我童林感恩不盡童俠客有你這句話那我就非去不可你放心吧我去哦那我謝謝你了心説怎麼又順當了不過你們老哥兒仨稍微候一候我這有點事我把事一辦完了咱們幾位就一塊走哦仙長你到底有什麼事呢哈哈哈小事一樁不多大工夫呀也用不了多長時間這樣吧有個七八年我這事情就辦完了海川一聽嗷好懸呐他耍笑我弟兄你七八年的工夫那算小事呀七八年我徒弟呢那麼老仙長辦事需要七八年的光景救人如同救火我孩子等不了呀你現在去最好回來再辦如果仙長你辦不了我童林願意大力協助你看怎麼樣無量佛童俠客我這人呢有點脾氣我告訴你等我個七八年就必須等我個七八年不到七八年儘管我到那兒就好我也不去哈這是我的這麼一點小脾氣哦韓仙長你知道我童林也有個小脾氣嗎我沒聽説過哈韓仙長我告訴你得了讓你去你就俯首貼耳乖乖地給我去你要不去我姓童的扛你也得把你扛到耿家莊給我徒弟治病去這是我的小脾氣你的脾氣就是讓我去我就得去不去不行對了我的小脾氣就是我要説去就去我要説不去我就不去石金聲一聽這可針尖對了麥芒了這怎麼辦韓道長挺彆扭童俠客你放心吧日從西起山人也是不去啪左手一按茶几他站起來就往裏屋走海川急了往前一趕步伸手抓韓景和脖頸這老仙長一挺前胸一彎腰挑簾進了裏屋可把海川嚇壞了裏頭站著一個人這正是玲瓏島大寨主仇人九尾宗彜世界妙手司徒朗當初四劍客會戰玲瓏島於洞海深江擒二寇司徒朗逃走就在商家林劫我童林的囚車險一險他把我殺了我也差一點把他宰了我們有互不兩立之勢那麼今天他還能幫我的忙嗎他一定要從中作梗大概我孩子司馬良活不了那麼司徒朗怎麼跑到玉瓣蓮花觀來了呢原來司徒朗商家林劫囚車被童林戰趴下以後站在桑林內二目發直叫著自己的名字司徒朗阿剛才你動手的時候你要打掉了童林的鉞你能饒他嗎你必要置童林於死地相反的我可八十多啦人家才三十多歲的青年人阿人家怎麼能夠有容人之量我怎麼就沒有容人之量呢也難説人家三十來歲的一個孩子闖蕩江湖就能落出一個鎮八方紫面昆侖俠來我闖蕩江湖八十多了我怎麼外號叫九尾宗彜呀我怎麼就落了九個尾巴的猴哇我跟人家差得太多了我要再跟海川為仇做對我在人間白活這麼大的歲數得了苦海無邊回頭是岸我痛改前非這個地方入直隸到北京還有很長很長的道路呐萬一有別人跟我的兄弟為仇做對我後頭跟著吧這樣一來海川保著囚車老頭司徒朗保著海川了無非是飢餐渴飲曉行夜宿海川他們爺兒幾個到了北京老義土司徒朗也來到北京城找了個地方住下沒事的時候就圍著雍親王府和海川的私邸轉個圈打聽著海川在家裏都幹什麼海川在家裏所經的事老義士爺全知道怎麼出的前門怎麼遇見鐵三爸怎麼遇見金魚胡同王子延怎麼有人領著海川一次溜城牆二次溜城牆三次溜城牆一直到公主墳三月三亮鏢會掌打燕子坡海川吐血哎呀急得義士爺跺腳不能看兄弟不但自己的師父師叔們全露了面了而且還有很多的朋友也在這兒露面了海川吐血也不知道有好醫生給海川瞧病沒有我不能去呀因為我跟海川從心裏頭和了我知道海川不知道呀我要貿然間到海川的府裏把人家爺幾個得嚇壞了就這樣老頭每天在海川家周圍轉聽説海川好了但是好了不久哎呀我兄弟的漏子來了奉聖命保欽差查辦四川劍山蓬萊島來了一些高來高去的人物把北京城攪得地覆天翻亮鏢會不但我師叔尚道明何道源來我師祖父都露了面這件事情總算化險為夷海川保著大人就憑海川的能為也確實真不錯可有一樣能把四川路踩平嗎能保大人平安無事嗎這怎麼可能阿得了我也跟著離開北京年大人大轎起程老義士爺司徒朗在後頭可就跟上了果然保定府清苑縣行刺到太原府丟了金牌大禍來臨了大海茫茫的無頭案就留下這麼幾句詩箋誰偷的呀我不管他我先找個地方住下然後再説第二步我得設法幫助我兄弟把金牌找著可住哪兒阿哎太原府南門外四十裏地有一座觀叫玉瓣蓮花觀觀主叫金針道長韓景和我跟他認識的年頭可太多了幹脆我找他去老頭司徒朗這才來到五瓣蓮花觀而且白天晚上就奔七星山這些韓景和都知道成功與不成功韓景和不敢多問但是兩人坐下來不管是茶餘還是酒後談起話來老頭就説童林好而今天小道童進來通報小王家匜的石老俠彩鳳山祥雲島的洪老俠還帶著鎮八方紫面昆侖俠童俠客前來拜望司徒朗一聽哎喲韓老道哎我跟我兄弟還沒見過面呢這怎麼好無量佛在這兒見面不好嗎在這兒見面好是好沒有人能給我通容見面能嚇我兄弟一跳還認為我還跟他為仇做對呢什麼我躲躲吧一挑簾老頭子跑裏頭去了韓道爺説你這老頭子跑裏邊藏起來我非叫你們兩個見個面不成這樣才出去把三俠迎接到鶴軒海川趕緊往後一撤步哥哥小弟童林大禮參拜趴在地上就磕頭嗨韓景和點了點頭老頭子這些日子你老跟我説海川這麼好海川那麼好我到底看看海川見到你以後是什麼意思還是記恨前嫌有戒心當場亮傢夥就得跟你打起來還是恭而敬之禮而賓之不管咱倆有多深多大的仇你也是我哥哥該磕頭我得磕頭嗨這青年還真磕了頭罷了阿怨不得你小小年紀身為俠客仔細看海川滿面春風從外表上