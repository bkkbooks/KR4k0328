body:
  text: 第七十三回莽和尚大鬧磐石島花子羽搭救碧霞僧上回書説到碧霞莽和尚路過磐石島有賊人行劫船家李三從水裏跑到岸上船也給捅漏了莽和尚氣往上撞亮出刀來長腰下到水裏開目視物謔船底下還有不少的水鬼子兵十個一排十個一排得有三四排每十個人裏頭有一個頭目每人手裏拿著兩樣東西一樣是純鋼打制的一支架像個筆尖特別的尖也叫禹王砸攥著把就等於攥著胳膊一樣右邊這個手上拿著一個什麼東西呢拿著一個小錘這個小錘跟一個甜瓜頭一樣這叫金瓜那麼禹王砸是幹什麼的呢傳説是當年大禹治水留下鑿船用的水鬼子兵在水裏看不清東西所以手裏拿著個小鼓在水裏頭一搖波啷波啷響能傳聲要不然在水裏頭你什麼也聽不見他就作為號令説船到了拿這東西一搖九個夥計聽到信號就知道奔哪個地方摸到船底下攥著禹王砸就鑿船底這個鼓叫諸葛鼓為什麼叫諸葛鼓呢因為是諸葛老先生留下的看起來賊人是有計劃的要把碧霞的船鑿漏了水底金蟾碧霞僧能不著急能不生氣嗎敢情這裏頭有事確實要找碧霞和尚報仇水底金蟾碧霞僧不是把麻面分水鱉蔡虎捅死了嗎為救這談靈仙主仆二人治死麻面分水鱉蔡虎那麼蔡虎這個女姘頭就是送子郎王麗娥他並沒在家裏他尾隨也出來了藏在小樹林裏一個黃土坡前大和尚碧霞把麻面分水鱉蔡虎給戳死而且還把他埋到了松林內的墳地他全看見了唉王麗娥一陳難受呀眼淚汪汪切齒咬牙憤恨和尚你把我的丈夫蔡虎給殺了我自己沒什麼能耐我報不了仇可是我也得設法報仇呀我不如趕奔磐石島前去送信這樣送子郎王麗娥從邊漪鎮起身換上素衣裳奔了磐石島有一個頭目叫劉成帶著幾隻小船在瞭望一切一看這個女的長得又挺俊便撑船過來默幹什麼的慢往前進劉成一喊王麗娥這船慢慢地停住衆位大哥多辛苦我到這來要見老寨主勇金剛蔡方喲你是幹什麼的你是哪位劉成這麼一喊船可就過去了王麗娥道我就是本寨蔡老寨主的兒媳少寨主蔡虎之妻王麗娥説話眉目含情死乞白賴地看著劉成劉成一想喲我們少寨主長得那寒磣默這小媳婦長得那麼好真是一朵鮮花插在牛糞上了喲原來是大嫂子我是小頭目劉成我請問你你到山裏頭幹什麼來啦我找我的公爹前來報信我丈夫蔡虎被人給殺了什麼阿劉成這麼一聽心裏可樂哈哈哈大嫂子呀王麗娥這麼一琢磨我丈夫死了他怎麼這麼樂呀劉成道大嫂子我劉成今年可都二十六啦説真的在山裏頭當個小頭目每月發一兩銀子我連蒙帶詐的每月能收入三兩多這些年我可沒少攢我攢了有二百來兩的銀子大嫂子想不到我們少寨主蔡虎大哥叫人家給害了大嫂子看來你是居孀守寡了阿不錯呀我丈夫死了哎默大嫂子不要緊那少寨主蔡大哥死了我還盯著呢王麗娥心説你也不拿鏡子照照你自己我閉著眼摸也摸不上你的腦袋呀哼癩蛤蟆想吃天鵝肉但是自己不願意得罪他怕他得罪了不給往裏通稟唉自從我丈夫死後我心緒不寧真的劉大兄弟等我把事情辦完以後我再找你咱們再商量有死的有嫁的這也不算什麼劉成一聽心裏這美呀好了大嫂子我給往裏通稟轉身駕小船往裏走來到這山口下了小船就飛奔大寨進廳單腿打千報啓稟大寨主外頭來了一個二十多歲的小婦人他自稱是少寨主蔡虎之妻前來給你磕頭拜見公爹來啦哼蔡方心想我兒子蔡虎離開山寨好幾天了這叫什麼話叫他進來是劉成轉身形往外走一直來到山口一招手小船過來大嫂子我看老爺子那意思可不太高興大嫂子你要進去可加點小心好吧再不高興我也要來送子郎王麗娥跟著劉成往裏走進三道寨門一直來到大廳前挑簾櫳進去劉成往這裏一站大嫂子趕快過去行禮上垂手老爺子就是你的公公下垂手就是你的叔叔二位老寨主送子郎王麗娥假裝著心酸難忍撲籟籟掉下眼淚跪下道兒媳王麗娥拜見公公叔叔蔡方一瞧就知道這個女人不是好人你叫何名兒媳名喚王麗娥我兒並沒婚配哪來的兒媳王麗娥雖然是沒羞恥的女人他臉也紅啦公公你老人家不要這麼樣説我雖然跟你的令郎蔡虎沒有舉行什麼儀式但是我們早已是夫妻啦哼來此何干王麗娥就怎麼來怎麼去怎麼碰上一個有錢的公子我想下手作案劫他由我丈夫來幫忙不料想在黃土坡前有個和尚趕到要行俠仗義要保護這有錢的公子我丈夫蔡虎過去跟他一動手他把我丈夫一掌打死公公阿小女子我沒有多大能為我丈夫想不到死在凶僧之手你一定設法找凶僧給我丈夫報仇雪恨唉呀蔡方一陳難過蔡虎呀蔡虎我勸你在山裏頭忍著不要在外頭胡作非為你充耳不聞執意不聽到現在命喪黃土坡賢弟他轉向青面瘟神韓成道你侄子死去凶僧如此猖獗此仇焉能不報哥哥報仇是應當的不過這個女子讓他到哪里去賢弟愚兄自有安排王麗娥你跟我的兒子蔡虎不是正式的夫妻念你報信有功來呀把他轟出磐石島王麗娥離開磐石島清水河回到邊漪鎮家中稍微地歸置歸置他走了上哪了他奔了晉北宋家峪後文書自有交待暫且不提勇金剛蔡方把精明強幹的小頭目叫過七八個來各帶利刃下山尋找凶僧劉成在山口往四外尋視著遠遠地就看見船頭站著個和尚他馬上來到大寨內報告了勇金剛蔡方蔡方傳命令嚓楞楞一棒鑼響帶著韓成小頭目兵丁就沖到山口立刻派下五隊水鬼子兵下水鑿船底水底金蟾碧霞一看這水手跑掉這船是完了碧霞僧亮刀就下水了好嘛嘁哩撲哧他就這麼一宰譁紅了一片就這麼一會的工夫叫他宰了有十幾個小頭目一瞧這個和尚可凶立刻一搖諸葛鼓唰啦啦全退了碧霞和尚踩著水就過來了露著半截身舉著刀默阿彌陀佛善哉呀善哉爾等竟敢搶劫於我老僧要你的命來到大船邊一摳船舷噌一下就上來了勇金剛蔡方青面瘟神韓成各亮軍刃蔡方把鑌鐵虎尾三節棍也抄起來高聲喝喊凶僧你叫何名阿彌陀佛好賊寇老僧乃大道娘子關核桃園關帝廟的主持水底金蟾碧霞賊人你是哪個老夫勇金剛蔡方這是我二弟韓成我問你是不是你今天在黃土坡殺了一個人呐阿那麻小子盡辦壞事意欲行劫老僧身為俠義焉能容得一掌擊死他那個女賊跑了老僧才來到此處與你何幹勇金剛蔡方一瞪眼好凶僧阿治死你凶僧給我兒蔡虎報仇雪恨譁啷一抖鑌鐵虎尾三節棍蓋頂就砸當場動手十幾個回合韓成可瞧的出來我哥蔡方絶對贏不了碧霞相反的如果我哥蔡方贏不了他那我青面瘟神韓成過去也是白搭只能智取不能力敵青面瘟神韓成在後頭搭茬好凶僧二寨主韓成在此韓成一舉青銅刺照著和尚就扎和尚鷂子翻身一調臉拿刀背一挂順水推舟就抹韓成一矮身縮頸藏頭走底盤青銅刺扎和尚腳面和尚碧霞腳後跟一點船板縱身行往後一退虎坐坡出去有四尺韓成可就喊上了哥哥馬上傳命令船隻後退咱與他江岸上一戰蔡方馬上傳命令船隻後退退到寨門前船隻都靠岸了大傢夥兒紛紛下船韓成一縱身也下船了凶僧敢與你家寨主爺山內一戰和尚心説我兩個圓籠也沒了衣鉢戒牒也沒了人家水手小船也叫你們捅漏了我跟你們絶對完不了阿彌陀佛畜牲你往哪里逃跑壓刀就追韓成還是真快呀順著頭道寨門往裏跑沒人敢攔進二道寨門就奔了大寨但他沒奔大寨他就順著寨門進來往東東面有房子青面瘟神韓成走月亮門他墊步擰腰噌地一下就躥進去和尚也是上當阿彌陀佛你哪里走他一進月亮門腳尖一點地壞了一塊翻板哢嚓就把和尚扣在這裏了嚓啷啷一聲響刀扔了撲嗵就摔下來好在這是淨坑淨坑裏頭沒有什麼弓弩沒有什麼別的埋伏只是幹石灰面一嗆和尚一身的水一沾石灰滿身皆白勇金剛蔡方派人用鈎杆子搭水底金蟾碧霞僧睜開了眼睛見鈎杆子下來他知道他有心不讓鈎杆子挨著自己碧霞一想別價搭不上去就把我扣在這裏不見天日也不好受這樣他兩隻手抓住了鈎杆子頭把他給搭上來了搭上來就被四馬倒攢蹄捆了個結實送進一間屋子裏邊有將軍柱把碧霞和尚捆在將軍柱上默這倒好倒剪著二臂腿也捆在上邊紋絲不動碧霞和尚倒不在乎就是身上有點難受和尚一想得了是福不是禍是禍躲不過該死活不了我呀困了睡覺吧一低腦袋慢慢地睡著了也不知道過了多大工夫一陳涼風進來把他給吹醒了就看脖子後頭有人吹氣誰呀阿彌陀佛阿彌陀佛和尚心説我是廟裏的主持我是出家人鬼神之事我一概不信怎麼回事你是誰呀跟老僧開玩笑嗯我還告訴你我和尚皈依三寶秉教沙門念經守法長處不提短處不掐不殺生不害命保護良善你是神你就歸廟你是鬼你就歸墳如果你不是神不是鬼你是五大門胡白黃柳灰在此戲耍老僧老僧就要罵你剛想到這裏身背後轉過一個人來碧霞你好大膽量碧霞和尚一瞧正是那攛掇好些個小孩贏我十兩銀子管我熱湯麵候我船錢冒充我師叔的那個小孩樂嘻嘻地站在眼前阿你又跑這來啦兩次三番冒充我的師叔你是誰趕緊説出來哈哈碧霞我是誰我是你師叔乖乖地叫我三聲師叔解開你不叫我不管你默你胡説八道你胎黃未退乳臭未乾老僧已經奔七十歲的人了怎麼能叫你師叔阿彌陀佛碧霞你敢不叫我你要知道我年小輩大你不叫師叔還敢罵我以小犯上你好大膽將來我好好叫你師父管教于你你説此大話我師父什麼歲數你怎麼能跟我師父論弟兄老僧也比你大上五十多歲你這是怎麼的你找我便宜看來碧霞你是絶對不叫我不能叫我叫了你我多寒磣我要拿出點東西給你看這年輕人一伸手就把長條的包袱拽出來包袱皮打開腰中一圍軍刃懷中一抱碧霞叫不叫碧霞一瞧我叫師叔哇快快救命真叫師叔那我就救你原來這個年輕人家住在山西太原府壽陽縣花家寨姓花名純表字子羽師父給起的外號叫銀面仙童花純花子羽清真大爸他父親排行在四叫神槍花旺花逢春花四爸也是祖傳的能耐跟前門外東光裕鏢局花四爸跟花四奶奶只生了這個男孩有一次花四爸保鏢到太原府由北京奔太原要路過自己的家門這一天來到壽陽縣薑家屯遇到一夥強人要劫鏢幸遇碧眼金睛佛老劍客薑達救助自此常相往來一次鏢車路過薑家屯花旺把兒子花純帶來寄住説是回來就帶走一晃就過了幾天老人家薑本初就感覺到這個孩子很勤儉就跟書童一個樣伺候得老人家無微不至能做到眉聽目語哎爺倆還越呆越近乎可這一氣兒就過半個多月吃完早飯以後爺兒倆在屋裏坐著花純呐老人家怎麼你父親還不來呀老人家我爹爹上呐你父親不是上我這來把你帶走嗎花純搖頭不來了阿為什麼哎這話怎麼説呢有一次我爹回家來就問我花純你這輩子願意露臉你願意現眼我説我當然願意露臉我爹跟我説孩子為你我這能為一生碌碌無為下也不算下叫上也夠不著我就在你叔叔李國良那裏湊合著過了大半輩子説話我就老了孩子你出身在武林世家從你爺爺到我這全是練把式的如果你一下武藝不會怎麼能説你是衣鉢傳人呢但你要想會近水樓臺先得月你就跟爹爹學孩阿爹爹這兩下你也知道我一招不留不藏私我傾囊相贈你能練到我這個份上看你的聰明看你的天資都很好未免有點屈才呀你要打算不出家門跟我學那將