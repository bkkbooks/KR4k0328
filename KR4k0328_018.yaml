body:
  text: 第十八回喪良心行刺神槍李捉淫賊奮勇上湖南上回書説到撓頭獅子陸滾逞能在李躍功房裏私下練功自己又不會結果身死誰都不知道李能把茶泡好端到大廳來一看陸滾不在心裏納悶二爺幹什麼去啦只好在廳中等候李躍爺子洗完澡後李英攙扶著高高興興回家等來到家中李躍擡頭看擱扇上的鑰匙沒有了問功房的鑰匙呢李能一怔老奴不知道哇跟我來爺三個往外直奔後院功房到了門前李躍一眼就看到門鎖啦一擡鎖哐啷踹開門嚇得李大爺混身顫抖顔色更變汗如雨下一歪身差點沒倒下幸虧李能李英給扶住老爺子你要保重阿陸滾在血泊之中早就身死啦李躍熱淚滾滾腳步踉蹌強掙扎來到近前長歎一聲賢弟悔不該叫你來到功房更不該叫你練這功夫也忘了教你躲避之法誰料你如此大膽私來功房到現在大禍鑄成愚兄追悔不及教我如何對得起弟婦侄男説著哽咽難言擦幹眼淚回到前廳將身坐定説李能阿你到西院見二奶奶去請他帶著侄男過來李能來到西院門口啪啪啪一叫門陸忠把門開開李能進門稟道拜見二奶奶二奶奶問找我有事嗎大爺請二奶奶帶著少爺去東院一趟説有事商量二奶奶答應換了一件乾淨的衣裙攏了攏頭髮領著孩子隨著李能奔東院心裏忐忑不安感覺著要出什麼事似的到了客廳李能挑簾櫳二奶奶進來萬福行禮拜見了兄長李能搬坐位請二奶奶左氏坐好李躍這才開口今日請弟妹過來有兩句話説二奶奶低著頭已然感到有不祥之事了大哥有什麼事你就説吧弟妹你可別著急剛才愚兄帶著孩兒前去沐浴不想兄弟趁我不在到後面功房練功出了一點錯請弟妹帶孩兒去看一看吧李能頭前帶路左氏安人心突突亂跳李躍站起身形大家一同往外走直奔功房來到門前李大爺拿出鑰匙打開鎖頭然後一推門弟妹請看吧左氏帶領陸寅往裏走低頭一看見刀子上有血陸二爺一身是血地下一片血迹早已身死陸二奶奶兩眼發直一下子撲過去撫尸痛哭八歲的孩子陸寅也泣不成聲捶胸頓足大哭起來陸二奶奶哭得死去活來一聲高一聲低撕心裂膽等二奶奶哭得力竭聲嘶李大爺過去一抱拳弟妹人死已矣不能復生悲傷無益請你多保重弟妹先到大廳説話吧陸二奶奶拭去淚痕帶孩子一齊來到前廳李能依然把門鎖好大家落座二奶奶抽抽答答哥哥這是怎麼回事你兄弟又如何遭此慘死呢説完又放聲大哭小孩兒陸寅在旁邊見母親哭得淒慘也大哭起來李大爺擦了一下眼淚弟妹事到如今愚兄不能不説話了左氏安人收住淚痕大哥有話講在當面吧我和陸賢弟交好幾十年推心置腹當初我弟兄應該各回鄉裏他回湖南我返雲南只因為他不願與為兄分手才一同來到雲南十幾年的光景得有今日也非容易呀我們分居另過各自有後愚兄的功夫不能擱下呀李躍把陸二爺在功房要練騰身步月功自己如何攔阻今日帶李英父子洗澡去他私入功房結果自戕而亡李躍含著眼淚弟妹我是做兄長的不能責備已故的弟弟兄弟想練功夫你府上也不乏間房釘個鐵環鍛造幾把尖刀也花費不了幾個錢在自己家裏喜歡怎麼練都可以為什麼非要到寒舍來練呐到現在使李躍有口難言弟妹如果你相信李躍説的是真話就請弟妹回家準備愚兄一定豐豐盛盛埋葬二弟事畢之後我把李氏家傳武藝傾囊傳授陸寅使其自立如果弟妹認為李躍這話有假這死尸尚且未離寸地請弟妹到府衙告狀愚兄與弟妹堂口相見盯著打官司陸二奶奶趕忙站起來大哥説哪去啦李陸本是一家你兄弟在世之時不止一次提到沒有兄長沒有陸氏一家人兄長與陸家只有恩沒有仇總是陸寅他爹任性才成此大錯怎能提到訴諸官府呐小妹是婦道人家沒經過這麼大事只憑兄長辦理弟妹如此知理李躍五衷銘盛啦就請你回家準備孝服吧陸二奶奶帶著陸寅一路悲泣回家啦陸二奶奶也是聰明人這絶不是李大哥害死的丈夫只能私了不能驚官動府孤兒寡母更需要兄長的照顧李躍等陸二奶奶走後對李能説道你馬上把地方劉三找來李能急匆匆去找地方李躍又叫底下人到北門裏水利杠房把掌匱張永利找來跟著又叫人去買壽衣壽帽壽鞋壽襪要合適的尺寸再買衾單經被裝老之物又叫人請來一位瓦匠師父把後院的通牆拆了一個大豁口跟西院打通了家人們一一照辦這時候李能挑起簾櫳帶著地方劉三進來他見了李躍磕頭行禮劉三請大爺安起來起來你找小子有什麼吩咐李躍伸手讓座你坐下我有件事告訴你劉三只好坐下來大爺有什麼事説真的地方劉三有點兒受寵若驚李躍沈得住氣劉三我這兒有點官事可必須私下和解你能幫我的忙嗎劉三很仗義大爺素常待我劉老三恩重如山逢年過節短與不足你經常周濟我可我沒什麼報答你的不管什麼事你提出來辦得到我給你辦辦不到的我也竭力給你辦不怕這個地方鬧沒了你還能讓小子我餓著嗎劉三知道李躍沒什麼大事所以順水推舟這麼説李躍點頭然後站起來到裏屋手裏拿著一個十兩錠兒老三這有十兩銀子你先拿著事成之後老夫還要重謝劉三一瞧真是見錢眼開雪白的細絲紋銀他眼眯成一條縫哎呀老爺子無功受祿寢食不安謝謝你呐他倒實心眼兒伸手接過銀子來往腰裏就揣嘴裏可問你有什麼事阿李躍就把陸二爺練藝慘死請陸二奶奶過來商量不經官府私了此事麻煩你開張殃榜出來封建年代死了人開殃榜就是擡埋許可證劉三通融道老爺子地面兒的事情由小子負責啦好你就辦去吧劉三走後家人進來道水利杠房張掌匱來啦好在都認識張掌匱的行完禮坐下才問老英雄叫我來有事兒李躍説張掌匱的你多受纍一會兒裝老的壽衣買來你帶著夥計洗尸穿裝裹成殮多預備一些香面子石灰然後用吉祥板把尸體擡往西院等門前挂出吊錢紙棺材來了隨即入殮正説著壽衣就到了老人家叫家人打開包袱袍套靴帽鋪金蓋銀衾單經被頭頂的蓮花枕腳下的白練一應俱全張掌匱回匱上叫人洗尸穿壽衣從後院用吉祥板把陸二爺尸體擡過去陸二奶奶母子也穿好孝服叫他母子親視合殮遵禮成服靈旁陪伴門前挂起吊錢紙大門心都挂了白門垛上貼好陸宅喪事街坊鄰居才知陸二爺病故擇吉日開吊款客出堂發引李大爺又請來風水先生來到自家塋地旁邊辟了一垛墳地定好紙人紙馬車船隨行亭子雪柳金庫銀山散請帖發喪出殯白事辦完之後李躍叫李英過去跟陸二奶奶商量好叫陸寅到東院學藝老英雄把滿腔心血傾注在陸寅身上二五更的功夫風雨無阻可這陸二奶奶左氏安人本來身體不好再加上遭此大故身體日漸消瘦慢慢地病倒床上李躍派李英每日三次問安叫陸忠請本城上好的名醫調治治病治不了命二奶奶天年已盡百日癆病竟然去世陸忠過去報信李躍嚇得魂飛千里自己思緒萬千坐臥不寧有弟妹在世我把陸寅撫養長大成人給他娶妻生子接續陸氏門中後代香煙到那時叫他掌管家産世代相傳即使我死在九泉之下也對得起死去的二弟陸滾弟妹活著怎麼都好辦現在弟妹已故只留下八歲的孩兒叫我如何處理如果把他放在我的家中人道我不安好心籠絡此子説我看中陸家財産蜚短流長有口難辨如果不把陸寅攏在身旁再過幾年孩子血氣方剛家財蕩盡怎對得起已故兄弟弟婦老英雄把心一橫事到如今怎能避嫌李躍之心唯天可表馬上派人把陸忠叫來陸忠眼含痛淚道啓稟老員外爺家宅不幸主母身亡少主人年紀幼小小子事事無能做主六神無依唯有聽老員外爺的示下老英雄聞此言胸前淚灑陸忠起來老夫本意趁你家主母健在把你家少爺教養成人也算完成老夫的心事現在先給你家主母發引死人奔土如奔金事畢之後你把陸家財産徹底澄清登載帳目上你一定親自管好把不得力的間雜人等盡皆辭退你只帶著三個人給陸家看房花錢的地方皆由你與李能説後再支付將來那院丟失東西物件由你負責陸忠連連答應員外爺如此辦理陸氏全家存歿均感連我們做奴才的都感激呀從此派專人侍候陸寅光陰荏苒日月如流一晃八年陸寅十六歲李英二十四歲陸寅的功夫別看比李英差八年可真是不軟李家的祖傳本領除三十手閃手刀盡命三刀的絶藝尚待開始教他其餘的全會啦這一年夏天天氣正熱吃過中午飯李躍告訴李能把一張竹床搬到小花園葡萄架底下去這個地方很涼爽李躍想睡個午覺老英雄躺在竹床上頭東腳酉臉沖著外邊用右手拿著芭蕉扇擋著臉慢慢地沈沈睡去就在這個時候李躍聽到腳步聲嚓嚓嚓大凡緑林人都十分警覺他微微睜眼從這破扇子縫隙處看見陸寅臉帶殺機咬牙切齒右手拿一把雪亮的匕首背在後面躡足潛行李躍一看他臉色不對哎呀莫非這個奴才聽信旁人蠱惑將恩做仇誤認我是他殺父逼母的對頭這叫老夫如何處理若當面質問於他他可能畏罪而逃那時他這份家産何人承繼如果不驚動這奴才難道眼睜睜被他手中的利刃置我於死地不成老英雄前思後想左右為難心口窩一發熱差點吐出一口血來覺得胸口突突亂顫陸寅越走越近啦老英雄急中生智猛然間想起個主意來老人家把芭蕉扇從臉上一撤好像要翻身微徽一睜眼陸寅來行刺賊人膽虛一看老人家睜眼右手把刀背起嚇了一大跳老英雄故作沒事陸寅呐你到這來有什麼事陸寅前不能進後不能退只好硬著頭皮一笑伯父孩兒見你午睡怕有蒼蠅給你轟趕蠅子來啦老人家心説拿刀子趕蒼蠅世間少有嗷你去吧這兒沒蒼蠅大伯還要睡呐陸寅萬般無奈只好告返走啦李大爺輾轉反側再也無法入睡他想阿我待陸寅的一片心他決無變動這是受了別人的蠱惑這個人一定跟我不睦他才挑撥李陸兩家不和坐山觀虎鬥是誰呢老英雄想不起來呀原來本地有兩個土混混一個五十多歲的叫胎裏壞一個四十多歲的叫一包膿都賴李家帳想不還這天陸寅過來胎裏壞故意説兄弟陸家這個後代可真不給他死去的爹娘爭氣呀陸寅趕忙一撒腿藏在籬巴犄角上心想這個人説誰呢又聽這一包膿説你提的是那位已故的撓頭獅子陸滾的兒子嗎沒錯就是他哥哥隔牆有耳這是他們家的菜園子別叫人聽見默怕什麼的就是他站在咱們的眼前説這話都沒錯你説什麼呐唉你看這年頭一年比一年壞人心在變哇有這麼句話修橋補路雙瞎眼殺人放火兒女多越辦好事越倒楣損陰喪德卻福壽綿長就拿這姓李的來説真叫人生氣説句轉文的話是外飾溫良之貌內藏虎狼之心這麼壞的人他活得長遠可那位真正的好人陸二爺不但家敗人亡很快就要斷子絶孫呐陸寅聽到這二人背地裏議論自己年高德重的大伯李氏勃然大怒他想過去痛打這兩個壞小子可聽到最後捉到自己去世的父親陸寅強忍怒火又停住了又聽那個四十多歲的一包膿説哥哥咱們可都是土生士長你説説我聽聽他一伸大拇指就拿他來説吧根本沒什麼能為在外邊混了那麼多年他要真有本事怎麼連個媳婦都娶不上呢他回雲南府可給人家陸二爺磕頭求人家別回湖南老家跟著到咱們雲南府沒有姓陸的他開鏢局能發財麼現在茶來伸手飯來張口都是人家陸二爺給掙來的姓陸的滿腔熱血都倒給姓李的可結果被姓李的給扎死啦反過來倒説自己練功夫不慎死的就憑陸二爺這