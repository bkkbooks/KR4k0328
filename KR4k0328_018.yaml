雄好漢我成全你們父子把陸小太爺殺了吧李英不愧是神槍向西來李躍的後代人家連一點兒氣都不生微然一笑二弟不提起報仇二字愚兄絶不多言今天你既然提出來報仇二字愚兄有滿腹的話要説給你聽阿李英的眼淚刷刷地往下流泣不成聲二弟呀你我的先人一在湖南一在雲南相隔幾千里關山相阻自從弟兄結拜之後始終如一當年我父回歸鄉里勸二叔回轉湖南可就因為手足之交才來到雲南他們當年同生死共患難是生死至交我的老父有什麼權利要害二叔一死如有害二叔之心當年分手就各奔東西豈有今日之事二叔慘死你已然八歲也應有所察覺即便你不知道難道嬸娘也不知道嗎是叔父自戕而死還是被別人害死你心裏能不明白嗎要説你家財産陸忠尚在財務房産由他一人掌管我父子何能霸占圖財害命天理不容你血氣方剛十六歲以前為什麼沒有敵對之心十六歲以後你才要刺殺我父看來是別人調唆挑撥離間李陸兩代深交是殺人不見血呀我父因你變心左右為難憂憤成疾臨危之際叫我對天發誓一定要保持李陸兩家之交四年來你我貌合神離愚兄不是不知只是無法談及此事如果兄弟聽得進哥哥的話化干戈為玉帛化嫌為好那就以前種種比如昨日死今後我弟兄要勝似同胞一母生交情高過先人讓那些小人們幹生氣這就是李陸兩家有德交情傳輩如果賢弟你一定要認為你父被害一定要殺李英而後快那就今天之事算做烏有把刀給你愚兄自己留神防範倘有疏漏之處任憑賢弟來殺那就是李陸兩家無德才生下你我這不能恪守父道的不孝子孫你看著辦吧只有一樣你千萬千萬不能離開這個家愚兄就感激不盡啦説著把刀遞給陸寅陸寅挺身站起伸手接過刀把眼睛一瞪哼你想讓小太爺在家中被你困死豈能辦到小太爺走啦將來有能為報仇沒能為仇不報啦説著轉身出去等李英追出來陸寅蹤影不見陸寅這一走李英犯難了傳出去不是我把陸寅擠走也是我給擠走的呀二來滿城風雨我李英也無法在雲南府立足啦李英無精打采奔正院內宅一邊走一邊在想看來陸寅並不是走了算完呐還要來雲南府找我一家的麻煩勢難並存非他殺我即我殺他致使兩家名姓不香唉惹不起我躲得起呀乾脆早離開這是非之地吧想到這兒來到上房屋中賢德的大奶奶王氏在炕上哄著一雙兒女玩呐一看李英面色難看趕忙下地你不是去休息一會兒嗎怎麼神色這樣不好哇我去泡茶去李英攔住快哄孩子玩吧不要泡茶很安詳地坐下王氏心中忐忑不安細問李英李英自從妻子進李家門事無巨細都要過問稟告只有這件事無法對妻子言講可王氏賢人心細如發早就看出來啦只是怕丈夫煩惱不敢動問李英是怕妻子分心也不能提看來今天是箭在弦上不得不發啦賢妻為夫有一件事很對不起你王氏一笑夫君之言差矣我夫妻結婚四載互相敬重如賓如友怎麼談到對我不起呀有什麼事不用為難就説出來吧賢妻原諒解我愁腸很是感激你可知道我們家的事阿李英就把以往之事一字不漏地詳細説出來賢妻本不當跟你説出此事自你過門之後操持家務生兒育女並沒有一刻舒心的日子做丈夫的覺得對不起你呀説著話李英用袖子拭淚大奶奶又驚心又擔擾驚心的是天下真有這樣忘恩負義之人擔擾的是丈夫功夫雖好也防不勝防萬一遭了暗算如何是好想到這裏眼望李英丈夫阿我一婦道人家見識很短二弟雖不好也是兩代深交不能違背先人遺言但是他既然與夫君決裂轉目成仇豈能善罷不能不防我有一個辦法倒不如遠奔他鄉隱姓埋名躲災避禍就這件事不了了之不知夫君以為何如李英一聽妻子跟自己想到一塊兒去啦忙問道賢妻舉目無親到哪裏去這個不必憂慮我的姨家遠在元謀山區銅牛鎮老夫妻並無子女這不是很好麼李英站起身來賢妻曉大義識大體能隨為夫離鄉背井成全李陸兩家之交上對得起死去的先人下對得起未成丁的子女真是女中之魁請接受李英一拜李英跪倒磕頭大奶奶趕忙扶起次日雇了幾輛大車把所有行李衣物全拴好然後一家上車連吳指南那裏都不辭而別李能等李英走後把家人都給另謀了事每人給五十兩銀子這樣陸忠給陸家看墳李能也就算給李家看墳可歎李英為了不忘遺訓維護先人的名聲只落得身無立椎之地來到元謀銅牛鎮投奔姨父母家中老夫妻十分好客又是這樣的親戚當然很歡迎李英拿出錢來托姨父在一個小山環的密林深處買了十幾畝地買了幾間房一家人定居于此並且囑咐姨夫不要往外聲張閉門課子把父親傳授的槍刀以及騰身步月的功夫苦苦習練武功大長一晃三年正是桃紅吐絲楊柳垂緑冰河破凍的清明時節了大奶奶跟李士鈞商量先人墳墓已經三年未填土啦祖宗雖完祭祀不可不誠阿趁此清明時節也應該暗暗地到父母墳前去祭掃才是做孝子的道理李英點頭賢妻所言正合我意大奶奶立即收拾上供之物李英告別妻子孩兒直奔雲南府而來到了東關外先找個小飯鋪吃些東西然後又請了幾炷香這才趕奔墳塋地當年立墳之時也就是葬埋母親的時候所栽種的杉木杆子三十多年來都已成一片茂密的大樹林欣欣向榮煙籠霧繞等來到墳前一看父母親的大墳頭兒又堆了很多新土又見墳前有大堆的紙灰尚沒刮走墳頭上壓著長錢隨風擺動墳前未燒盡的香根兒尚在英雄見墳塋念雙親不由得大哭起來跪在墳前越哭越痛眼淚汪汪抽抽答答又來到叔父嬸母的墳前一看墳頭兒也填得很大燒了紙錢李英想起當年李陸兩家一宅兩院親如手足何等的快樂曾幾何時相繼凋謝反目成仇陸寅下落不明我也背離鄉井對不起先人不由得又悲從哀來跪下哭了很長時間親自用手捧土給兩家的墳都填了填然後取出香蠟等物焚燒紙磕了頭他在墳前徘徊不忍離去猛然間樹林外腳步聲響正是義士李能三年不見他鬢髮皆白已是龍鍾老態肩頭上扛著一把鐵鍁進了樹林看見李英就是一怔然後回頭往樹林外觀看臉上顯得很害怕這才跑過來放下鐵鍁跪倒磕頭少爺老奴給你磕頭啦李英搶步上前趕忙跪下老哥哥你替李英盡孝我給你磕頭兩個人互相攙扶著起來老哥哥這兩家的墳地都是你填的不錯都是我和陸忠填的每年十月還有清明都來填墳上祭少爺你還敢來填墳趁著無人知曉你你你趕快逃命去吧李英一聽可就怔啦你這是什麼話小弟不殺人不越貨不偷資不劫取奉公守法逃什麼命阿李能臉色一變少爺這三年你都上哪兒去啦我三年足未出戶只是練功什麼地方也沒去呀怎麼啦不對大少爺你可別瞞著我呀我的為人你還不知道麼李能一伸手掏出一個紙條來你看看李英接過一看上寫一口鋼刀掌中擎五湖四海任縱橫豪傑一怒傷人命騰身步月叫李英看完之後李英臉色都變啦渾身發抖這事從何而起老哥哥你快説少爺你先別急三年前你走後不久老漢在家中有人叫門我出去一看是雲南府班頭金眼鷹孫亮因為當年咱開鏢局子孫亮他隨禮挂紅為此我認得他我問他找誰他説找你我説他全家已經搬走他問為什麼搬家我説內情我也不深知可能為躲災避禍他掏出個紙條來叫我看我説這是怎麼回事他才説出少爺你不顧桑梓之情鄉里之義竟不顧先人臉面在雲南府做了十八條命案殺害的都是大姑娘小媳婦最後一案把知府的掌上明珠十七歲的小姐給殺啦留下都是你的名字知府梁玉書立馬追風要破這案他説可別隱瞞我説絶不隱瞞確實不知孫班頭帶眼明手快的官人在咱家前後蹲坑有半年少爺真要是你辦的你可對不起死去的老主人李英呆若木雞半天沒説出話來老哥哥李英的為人你應該相信你看我長大的豈能做此折喪祖德促己之壽的壞事一定有人要害我才留下我的名字我一定要設法拿賊辨冤等一等老奴相信大少爺還有一件事二少爺陸寅在你走後回家一趟把家裏剩下的人都辭去剩下多少銀子全弄走啦陸忠跟我在一起過活別的什麼事也沒有啦你就放心去吧李英這才與李能分手他心急如焚想自己遭此不白之冤何日可雪邁大步連夜回到鋼牛鎮自己家中把這事詳細地跟大奶奶一提大奶奶也嚇了一跳他定了定神夫君我是知道你的三年足不出戶為妻有句話可不知對不對你説出來聽聽當年陸二弟行刺未成才離開雲南府走後不久他又回去辦理家務看來他是不是要殺夫君你而未成才在雲南府做案留名陷害妾身未嫁之時不知夫君得罪過人嗎你我夫妻在一處我感到夫君不會得罪人的想想過去能知現在看看現在能知將來一定是二弟與壞人勾結不然他才二十餘歲豈能做這種傷天害理受人唾罵對不起祖宗的壞事呢夫君可再思再想李英連連點頭賢妻所言非謬李英頓開茅塞陸二弟本系湖南常德陸家堡的人氏我想是他所為為夫三十歲不曾與武林同道接觸更談不到得罪人與別人有什麼深仇大恨我想去湖南查尋一下夫君前去是對的如果不把此案弄個水落石出死難者難以報仇沈冤者難以雪恥不是為妻離間你弟兄不合實因關係到先人的名姓夫君的清白賢妻深明大義拜托你照看孩兒啦李士鈞也知道三天五日回不來打點一個包袱單夾衣還有夜行衣備齊把治毒藥暗器的方子也帶上然後往身上一背厚背雁翎刀佩好離開家中直奔湖南常德府而來心急似箭晝夜兼程並進非止一日來到了常德府東關有座破廟李英一想住在這兒不錯並且還省店錢他找個飯館吃飯一邊吃一邊問夥計你是本地人嗎夥計笑啦哈哈爺台咱是土生土長的祖宗三代都住在這兒嗷跟你打聽一下有個陸家堡離咱這兒多遠兒夥計一聽這個樂呀你打聽陸家堡算打聽對啦那兒是我姥姥家離這兒往東南大約四十裏路那個鎮子裏姓陸的居多旁的姓很少我外婆家也姓陸可有一樣跟人家有錢兒的姓陸的就同姓不同宗啦李英點頭有錢的不也姓陸嗎夥計搖頭不行阿説不到一堆兒去陸家堡的大財主是姓陸的親哥倆大爺名叫陸占魁已死多年啦二爺名叫陸占鼇也不在家中只有大爺的獨生子名叫陸豐號叫松坡有個外號叫戲水江豬人家全都精通武藝高來高去來無蹤去無影你要得罪他那可了不得爺台我這話説多啦我還得張羅別的飯座呐李英一想陸曉村一定投奔陸松坡來了他吃完飯付了帳又找個地等到天光閃亮李英出了破廟直奔陸家堡而來來到之後一看也是個大鎮子足有上千戶人家東西長街南北短街李英暗地一打聽才知道陸松坡去了常德府他不在家中風言風語説來了個遠房的弟弟李英一想莫不是曉村已經跟陸松坡合在一處陸松坡在家中為富不仁欺壓鄰里並不是個好人如果陸寅跟這個人接頭啦近朱者赤近墨者黑恐怕兄弟身染下流看來雲南府的案子他做得出來呀李英主意拿定回到常德府白天他明察密訪到晚上破廟裏換好夜行衣長衫一圍小包袱一背插好了刀從廟中出來各處尋找這天巧啦李英在東關外正在查看突然間從西北方向往東南方向來了一條黑影他立即爬在地上借著月色看清了正是自己要找的陸寅陸曉村一身夜行衣背插鋼刀青色絹帕纏頭臉色灰白連一點血色都沒有鼻子發尖兩肋無肉二目無神十分難看李英到現在全明白了這陸寅已是身染下流的緑林敗類可惜二叔陸滾英雄一世生下這不肖之子自己有心過去把他攔住又一想不成他可以矢口不認倒不如給他插根尾巴看他幹什麼去抓住把柄不容他不認思索已定等陸寅過去李英在後面就跟上啦現在李英的本領比陸寅強萬倍順關東往東出去不到三裏地有個小村莊陸寅就從北面進了村穿過樹林越過護村壕靠北面有一大牆李英一看就知道是個大戶人家陸寅飛身上大牆輕車熟路飄身而入李英也跟著上了大牆往裏一看是個精致的花園兒雖不是十步一樓五步一閣也是水閣涼亭回廊曲繞百花盛開紅紫芳菲十分幽雅花林深處有一座四方小院後窗映出燈光越走越近內有姑娘媳婦説笑之聲嗷李英完全明白了陸寅並非偷盜竊賊確實是偷香竊玉污辱婦女姐妹來的李英暗暗咬牙心裏叫著陸寅的名字你出身名門父親也是緑林好漢家門無德生下你這樣的敗類九泉有知能不痛恨於地下看來你被陸松坡勾引壞啦才到雲南殺死十八名婦女又借刀傷人做下這為人不齒的蠢事李英下決心捉拿陸曉村不巧在常德府遭了凶險
