body:
  text: 第二回童海川下山初試藝探雙親風雪入京師話説童林心猿意馬恨不能肋生雙翅飛到家中探望雙親只顧貪趕路程不知將抄包內的銀兩失去原來自己這身衣服兜破了碎銀子都從這掉下去包銀子的綿紙尚在海川一賭氣把紙也扔啦他站在山口一陳發怔大丈夫不可一日無錢這便如何是好海川順丘陵地帶一邊兒走一邊愁離家萬里沒有分文這可怎麼辦他腦子裏轟的一下想起師父説過如有困難之時可去附近把式場內道道辛苦借個十兩八兩於是腳底下用力直奔北雙熊鎮而去海川一放步幾十裏地就出來啦來到鎮南口街裏也沒什麼人走進不遠路東高臺兒有一眼井上邊有盤轆轤有位大哥正在往上提水哪海川來到井臺問道大哥我跟你打聽個事好嗎這鎮上有沒有把式場挑水的大哥一聽上下打量海川覺得這個人又窮又怯暗暗地納悶兒道你從這兒往北到十字街往東快到東頭路南有個五間門臉兒前邊搭著大天棚那是大茶館再往東走不遠路北有個大廟是火神廟廟裏有把式場你去找吧海川順十字街往東一看路南果然有個大茶館字型大小是迎佳賓天棚的竿子頭上拴著繩吊著小牌兒底下挂著紅布條兒小牌上寫著毛尖龍井大方等等的茶葉名兒往前不遠有座大廟宏偉高大的三座山門海川一看藍額金字敕建火神廟他邁步進去東西鐘鼓二樓北大殿往後還有兩層殿東西一道長牆當中一個月亮門旁邊一根橫杆上面垂吊著很多布條這兒是賣饅頭的作坊西面也是一道大牆當中一個月亮門門旁埋著一根一丈長的大白蠟杆子標志著是個把式場海川來到西月亮門外這時候有個二十來歲的徒弟正從裏邊出來海川一抱拳朋友我找你們把式揚的師傅這位教場子的老師父已經五十多歲很有點功夫在這裏教了二十多年他每天去迎佳賓茶館喝茶現在不在場於裏場子裏有五十多個徒弟由兩位練藝多年的大師兄管理小徒弟往裏跑來到場子裏喊大師兄外邊來了個人要找咱師父轉身一指海川就是這位兩位大師兄一看喝把嘴撇的跟爛柿子似的你找誰呀海川一瞧這二位從年紀上看也夠三十多歲跟自己差不多少都穿一身藍海川見他們滿臉的蔑視一抱拳問二位怎麼稱呼孫我找場子裏的老師傅你們二位是教師嗎不我們哥倆是教師的大弟子我叫兩頭蛇劉洞他是我師弟一枝花韓慶原來是劉韓二位教師失敬失敬海川作揖客氣這二位連禮都不還道你找我家師父有事麼海川道二位師傅小可居住直隸省因路費丟失特來貴場于找老師傅借些盤纏劉洞一聽心裏説你連路費都被人偷去啦還冒充什麼把式匠哪行阿請到這裏一談劉洞韓慶帶著海川就往裏面去了小徒弟打簾子海川走進房中坐下小徒弟端過茶來道請問師傅貴姓不敢當姓童名林字海川直隸京南霸州童家村人氏你把老師傅請來相見吧你不就是借錢嗎我們弟兄都能做主敢問你是哪一門的人哪童林心説我這門戶還沒立哪説道二位你要問我的門戶尚且未定此次奉師命下山興一家武術我要自立門戶劉洞一聽差點沒笑死就憑這副尊容我們爺們兒出身名門這麼好的功夫都不敢説興一家武術你不怕風大閃了舌頭又一想人不可以貌相問問他師父吧你的老師是哪位呀阿我的本領是仙傳呂洞賓教的劉洞一聽這可是奇聞哪呂洞賓教武術真是豈有此理給你二十兩銀子不算什麼叫你蒙去可不成乾脆把他揍跑了得啦老師傅咱武林道有規矩你有門有戶只要進門道辛苦我們可以給你路費海川一聽有門兒便道那趕緊拿二十兩紋銀與我我還要立刻回家哪你先別忙可你沒門沒戶沒師傳這怎麼能給呢海川一聽真急了就問二位怎麼樣才能給錢哪對不起我們要討教你的武藝你有能耐勝了我們才能給錢海川很生氣沒有説話把哨碼子一放往當中一站韓慶也不答話左手晃面門右手攥拳挂著風聲黑虎掏心就是一下海川連動都沒動一看拳到用右手攥住他的手腕自己斜身形順手牽羊一帶右腳一踹韓慶的腳胯子嘭地一聲給韓慶來了個大馬趴劉洞見狀邁步過來往前一湊步腳踏中宮右手拳直奔海川面門一個仙人指路就打海川隨著身體一仰右腳扎根左腳照定劉洞小腹就踹撲通劉洞仰面朝天摔倒在地五十多位弟子全傻眼啦忙道童老師請到屋中一坐海川無法只好提著哨碼子進屋劉洞挨了打不服從火神廟出來直奔迎佳賓茶館叫師父去了把式場的老師父是雲南人姓雷名春字振恆江湖人稱通臂猿猴劉洞從外邊進來道師父有個人到咱們場子裏來找師父借路費雷老師把臉往下一沈道糊塗山南海北的困在咱們這一方江湖義氣四海之內皆朋友何必還找我呀旁邊的鄉親們議論紛紛對呀雷老師這麼多年揮金似土仗義疏財不知花了多少銀子啦劉洞答應是這麼回事弟子看這人衣衫襤樓十分窮困還沒等劉洞説完話雷老師就接上茬兒道你這叫什麼話以貌取人失之子羽再説武林前輩施思不望報經常身穿爛衣隱於市塵遊戲三昧甚至故弄玄虛神龍見首不見尾辦了好事飄然而去這種事還少嗎給他幾個錢就行啦是可弟于見他説話難聽不知他是哪路英雄問問他門戶雷老師點頭道這還可以不能由於咱們行善叫人家鑽了空子詐了財去那樣咱爺兒們就算栽啦他什麼門戶這個人説他奉師命下山自創門戶衆人一聽可都怔啦這人説話怎這麼狂阿雷老師揍他去雷老師什麼樣的英雄人物都會過心裏想這是踢場子來啦禍到臨頭須放膽劉洞阿你可以問他老師是誰呀弟子問啦他説是呂洞賓教的是仙傳這句話可炸了窩連喝茶的呼啦啦都站起來了雷老師這個人是踢場子的他吞了豹子膽啦太歲頭上動土老虎口邊拔須咱們都去助威看看雷老師怎麼打他七嘴八舌説什麼的都有雷老師看看劉洞質問道你跟你師弟還能允許他胡扯嗎為什麼不打跑了他難道説這麼一點小事也要為師出面不成嗎劉洞臉色顯得難堪道師父我和師弟都叫他給打了雷老師一聽勃然變色拔腿而去到了把式場兒劉洞挑簾子雷老師一看海川心裏話這是個老趕哪他一抱拳童老師失迎失迎海川也抱拳答禮阿打擾打擾你是這兒的老師嗎不錯在下雲南人姓雷名春字振恆江湖人稱通臂猿猴沒領教老師怎麼稱呼童林童海川霸州童家村人雷老師問門戶問師名海川還是照樣一説雷春看海川的眼睛閃閃如燈知道童林身懷絶技童老師你丟失了銀兩路費不錯愚下想跟閣下借紋銀二十兩可以可以我想跟你討教討教武功童老師不吝金玉吧海川一擺手道雷老師久在江湖你也是前輩常言説得好文不加鞭武不善坐我只不過缺些路費你又何必動武呢當場動手各憑己能萬一輸招雷老師在此多年如何收拾呢海川一再推辭雷春卻認為海川無能童老師今天不動手見見招數銀子可不能相贈海川無法就來到場子裏看熱鬧的鄉親們看海川一下子全笑啦心想這位老趕非叫雷老師給打壞不可雷春拱手童師傅咱們比拳腳哇還是比兵刃全行雷老師隨便吧好我們先比刀吧他一轉身從兵器架兒上拿起把刀來海川也拿起一把來雷老師一個箭步兒默乾淨利索往當院中一站夜戰八方藏刀式請雷春心想他任什麼都不會混充大尾巴鷹阿雷春左手晃面門右手刀纏頭裹腦唰照定海川斜肩帶背就砍海川的眼力身法招數以及實戰的應變都是尚道明何道源兩位武林劍客教出來的比方説尚老劍客砍童林一刀和雷春砍一刀同是一個砍法砍的也都是一個地方在速度上就大大不一樣海川看雷春的刀來砍自己就像慢牛車似的他也沒動地方只是往下一矮身用自己的刀反手一砸雷春的刀嗆啷啷雷春感覺好像有人從手裏奪的一樣刀就出去啦他的臉臊得跟大紅布一樣説真的他都沒看見童林怎麼閃躲怎麼還的招兒譁地一下人們可就都怔啦海川趕快把刀撿起來兩口刀都放在架子上雷老師承讓了你給我二十兩銀子我就走了你看好嗎劉洞他們一看心説壞啦這個老趕贏師父跟咱們一樣省事雷春搖了搖頭道童老師你的功夫太好啦我還要討教討教一伸手把大蠟杆子抄起來海川無法西配殿地下也橫著大蠟杆子童林也看出雷春拿杆子很有功夫他並不貓腰只用腳尖一搓中間跟著用腳尖一挑就把杆子拿起來了海川心裏想我要跟你一樣拿杆子何足為奇哪想到這裏就來到這條大杆子的一頭這種大蠟杆子足有一丈二尺長後把就有小茶碗那麼粗練這玩藝兒最吃功夫那麼海川練過嗎練過在山上練的不是蠟杆子是一丈多長的小松樹去了枝葉剝去皮比這杆子可難多啦海川一貓腰用右手當中三個手指平著一按大蠟杆子後把頭這條大杆子跟粘上一樣平著起來了鄉親們齊聲喊好雷春大吃一驚可了不得啦這人的內力可太大啦這運用的是五髒之氣呀海川懷中抱月請雷春一揮大杆子狸貓撲鼠照定海川胸前便點唰的一下就到啦海川胸有成竹上左一滑步大杆子霸王解甲花下一落正搭在雷春的杆子上蠟杆子講究崩砸挑纏海川功夫一到就好像一條蛇一樣把雷春的杆子纏上啦前把一抗後把一擰呼嚕硬把雷春的杆子奪出了手雷春扎撒二臂臉色蒼白他覺得跟童林比差得太遠啦鄉親們也都傻眼啦海川把杆子放下雷老師這都是小巧之藝本不算輸贏你把錢賞下來我就告辭了春聽完把心一橫童老師我還要討教你的拳腳海川一想這錢真難要哇乾脆我揍你一下可能就給銀子啦雷老師小可奉陪就是雷春一想問他門戶他不説讓他亮個架式憑自己的經驗也能看出他是哪一家的武藝童老師亮個式子吧海川琢磨我要亮出式子來人家可能看得出來不亮又不好來個半拉式子吧他左手平著往外一伸應該左腳也伸出去他沒有身體直立右手在胸前雷師父請吧雷春一看這是什麼架式雷春左手一晃右手對準海川胸前便打海川要揍他啦發招也就快啦他用左手一穿雷春的胳膊金絲纏腕右手一虜雷春的手腕往前一拉他雷春就往前一栽海川左手一扣就在雷春的後背上只用一成力呀嘭的一聲雷春栽出有二尺去他覺得腦袋嗡嗡的響耳朵眼兒吱嘍嘍放了響箭眼冒金星嗓子眼兒發甜心口窩發熱一張嘴哇的一下把早晨吃的炸醬麵全吐出來啦雷春臉色發白汗珠順額角往下流混身顫抖好幾個徒弟把他給攙起來雷春道童老師你好俊的武功雷春甘拜下風快拿十兩銀子去拿來銀子交給童海川海川心裏很不過意道雷師傅真對不起在下離鄉多年奔家心切什麼時候你走到霸州童家村小可一定竭誠相待雷春也説不了話了海川只好告辭這是童林頭結一掌仇他認為這事就完啦可他把雷春二十多年的飯碗給砸啦把式場踢啦人家能咽下這口怨氣雷春可不是一般的人哪在雲南府昆明縣管轄下有一片大山叫八卦山南盤江的江水三面回繞裏邊有八位莊主大莊主混元俠逍遙叟姓李名昆字太極掌中一對乾坤太極圖藝壓武林年逾八旬是一位有名的大俠二莊主姓胡名庭字元霸人稱鐵臂猿七十多歲久經大敵掌中一口單刀武藝絶倫雷春就是他的弟子三莊主姓任名光字志遠兩膀一晃力有千鈞掌中一條水磨竹鑌鐵鋼鞭翻天三十六式人稱單鞭將四莊主是位和尚混身橫練手硬如鋼使一把亮銀方鏟有達摩老祖易筋經的功夫江湖人稱鐵背羅漢