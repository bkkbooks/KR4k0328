來高臉兒似長不長似圓不圓似黑不黑似白不白不要説啦這話説了半天管什麼用呀都是一人來高你也一人來高我也一人來高他也一人來高章成錦耍賴了你必須管不管不成路費由我來掏錢嘛那是小事表弟身為俠義見到這事你不能見義勇為那還稱哪家的俠義那成了瞎義了不管怎麼説我是不認識他呀有很多朋友都認識他我在這裏跟你説説再帶你到別處諒訪這些認識他的人大家湊起來讓你腦子裏有個輪廓見到林寶能認識他就行了歐陽君無奈把自己的亮銀鏈子鈸帶好後章老先生帶著他到各處訪問兩人走出門四五裏地北面有個樹林就聽見樹林裏有人喊章大哥章大哥你站一站你幹什麼去呀歐陽君和章成錦都站住了打樹林裏出來個人也就在二十幾歲不到三十圓方臉重重的眉毛大大的眼睛矮胖子穿著一身藍辮子盤著章成錦這麼一瞧嗷認識這個人是北門裏何記布鋪的掌匱姓何名字叫何瑞生他在北門裏開了個一間門臉的布鋪現在北門裏出了袁泰家這麼一件事何瑞生心説林寶哇袁老頭父女對你多好哇你恩將仇報你是衣冠禽獸哇我姓何的逮著你默我不打你我也不罵你非拿修腳刀修你不成你辦的這叫什麼事小子我非找著你剛巧這一次他打西南來要回城他走到這片樹林就聽見樹林的北邊喊合字我給你戳的那朵呢你給我得了這還行阿別把我也搭進去啦何瑞生趕緊藏在一棵大樹後頭往北面一看見白玉人林寶旁邊還有一個三十多歲的人拿著把小鏈辮子盤在腦袋上反正也不是個好人何瑞生這個樂阿林寶呀該著你打官司這回你的腦袋就得掉下來了林寶怎麼沒走呀他走不了呀因為篩月庵有個不守清規的尼姑鳳清還拉著他呢林寶沒辦法了便來到城西王家營一個叫王均的朋友家林寶一叫門王均把他帶進去問你有什麼事呀哥哥呀我求你來了你給我指條明路怎麼啦林寶就如此這般這麼這麼回事一説王均一聽心説這小子喪盡天良呀我雖是個臭賊可你辦出的這事比我還臭我本應當把你拿了可惜我沒這麼大能耐哎呀兄弟你怎麼辦出這事來林寶説那沒法子我趕上這事了哥哥你得給我指條明路兄弟會稽你可不能呆了你得遠走高飛過個三年五年風聲下去了你還可以回來不然的話你在這非得被抓住不可那你説我去哪兒我舉目無親呐這樣吧我給你寫一封信你去北京德勝門外二十裏有個小村叫甜井村甜井村住著我的一個朋友叫闞子良他是專做南北東西四路飛虎廳二十州縣的買賣坐地分贓他是個人物你到他那兒做個夥計在北京忍個三年二年的行阿破壞星王均把信寫好了林寶把信收起來過了幾天今天王均正碰上他説你要不走可把這信給我你又讓篩月庵的小姑子給迷住了吧王均與林寶的對話何瑞生都聽見了林寶説哥哥那麼我到篩月庵跟他説一聲馬上就奔北京哥哥你放心好了説著話林寶打這可就奔了篩月庵何瑞生一想我找我哥哥去吧我有心動手可幹不過他甭説倆一個我也惹不起我把哥哥齊舉齊大鵬找來讓我哥哥對付他何瑞生從這撒腿奔齊家營沒想到剛跑出樹林就碰上章成錦了章成錦説你別去了我給你介紹介紹這是我的表弟隱賢村的神龍手歐陽君又對歐陽君説賢弟他是北門裏何家布鋪的何瑞生何瑞生道哎喲你是歐陽義士爺久仰你的大名我給你磕頭哎呀兄弟起來起來不要客氣你準知道這個林寶去篩月庵了這個沒錯了你呐歐陽君對章成錦説哥哥你回家吧又對何瑞生説道你也不要找齊大鵬去了你就放心好了那太好了事不宜遲咱們哥兒倆趕緊走何瑞生心説我跟我師哥齊大鵬練了好幾年了能為大小不提我這腳程可很快呀默我跟他賽賽腿瞧瞧神龍手歐陽君的腿有多快歐陽義士咱們哥兒倆可得快著點兒我可以跟你快點兒走何瑞生撒腿就跑一邊跑一邊看老義士腳底下如同閃電噌地一下就躥到前頭去了這樣兩人來到篩月庵神龍手歐陽義士施絶技要捉拿林寶
