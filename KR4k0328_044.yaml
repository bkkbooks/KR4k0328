body:
  text: 第四十四回慈父心三次饒林寶豺狼子毒鏢打恩師上回書説到神鏢手袁泰引狼入室恩收林寶請醫生調治他的疾病足有半年的工夫林寶病體痊愈人家袁家父女對他照顧得又好吃得又合口味使這孩子很快恢復了正常發育林寶長得十分俊美跟秀英姑娘青梅竹馬整日相隨盡情玩耍他比姑娘大一歲這天老鏢師袁泰非常高興林寶呀你願意學武嘛孩兒當然願學可是誰教我呀默默老夫就會武藝你在我家這段時間我看你還不錯得啦我收你做個徒弟吧林寶非常高興急忙趴地下磕頭打這天起袁泰給孩子盤腰窩腿站架子慢慢地又教他打拳軍刃光陰荏苒日月如流轉眼間就是十年林寶十八歲小夥兒長得很體面又有一身的好武藝衆人給他起了個外號兒叫白玉人姑娘也十七了出落得跟水蔥似的也有一身好本事但是袁泰把自己拿手的刀和鏢都教給了林寶老頭滿意地對林寶説再過二年哪我就把閨女給你將來生兒育女就續林袁兩家的香火就在這個時候發生了一件事兒林寶跟本城的一些壞人勾搭在一塊兒黑天白日背著師父耍錢一個十多歲的孩子對賭博沒有經驗非輸不可呀輸了有幾百兩銀子這件事叫章成錦知道了馬上找了袁泰哥哥我聽説林寶這孩子在外頭身染下流不學好功夫雖然不錯但他淨上賭場兒賭錢去呀不是押寶就是推牌九你這日月房子地跟著動阿你應當好好兒地教育教育他老頭兒想了想説是得教育有一天吃完飯袁泰知道林寶上賭局去了老頭兒也跟著去了進屋叫道林寶哇林寶臉色兒都嚇白了街坊鄰居都認得袁泰哎喲喝老鏢師有叫大爺的有叫叔叔的有叫爺爺的袁泰對這些人可説了諸位願我這孩子不錯應當把我孩子引入正途耍錢不是個行當吧莊稼人土裏求財靠天吃飯掙幾個錢不容易難道説就這麼一二三四五門兒賭把一年辛辛苦苦掙的倆錢兒都輸光嗎嗨嗨衆位大家喜歡我袁泰管不了只希望衆位爺兒們今後別跟我的孩子一塊兒來老頭接著又問林寶你都短誰錢呐林寶説短誰短誰輕輕一攏二百三十多兩好吧都跟師父家裏拿錢去老頭兒到家裏把銀子拿齊了短誰給誰打發走了衆人這才説寶兒阿你在這兒十幾年功夫也很不錯了我又沒仨沒倆秀英是個女的將來支應我這門戶需要你阿沒想到你身染下流不學好這可不得了我希望你苦海無邊回頭是岸今後不再耍了你放心吧師父我不耍啦林寶好像一咬牙記住了可沒多少日子故態復萌他跑到寶局又輸了不少的錢袁泰知道了又來了一問短誰的短誰的一説又是一百八十多兩銀子拿來還了大傢夥兒我再説一遍衆位今後不要跟我孩子再耍錢了把林寶領家來又規勸一番不料想第三次他又耍上啦老頭兒可就急了眼到寶局堵上了林寶你怎麼屢教不改阿老人家就給了他一個嘴巴你不爭氣呀説完了轉身形回家了林寶一想你姓袁我姓林不錯你教我能耐可當著這麼多的人你給我一個嘴巴默姓袁的你太難為人了有一次老頭兒出去了家裏就剩下林寶跟秀英林寶對秀英説妹妹你看見沒有老爺子前些日子打我我不往心裏去我的命是老爺子救的我這身能耐是跟老爺子學的飲水思源再説老爺子也有話再過一年半載的給咱們兩人一辦事將來生兒育女剛説到這兒秀英把臉沈下來了你説這個幹什麼呢讓我嫁給你告訴你絶不可能喲妹妹你這是什麼意思難道説你不樂意嗎咱們倆一塊兒耳鬢廝磨十年了我林寶是怎麼回事兒你也知道説著他就要動手動腳正在這時候老頭兒袁泰進院了秀英阿哎爹爹嚇得林寶一哆嗦抓個茬兒出去了姑娘見著老頭兒眼淚下來了爹呀今後你少出去我瞧他可有點兒行為不正阿袁泰自信地對女兒説我看了他十年啦不會看錯這個你只管放心爹呀你應當聽我的你要不聽我的將來就要得苦果子啦沒什麼得苦果子的諒他也不敢當天晚上老頭兒來到前院見林寶在屋裏坐著呢便道孩子從你八歲進我的門師父沒拿你當過外人呐你在我家一晃十年了老夫我待你不錯原先我説過我死以後讓你掌管我的門戶把你妹妹許配給你誰想你不成才我看呀如果你真不成才原先的話就作為罷論你翅膀也硬了謀個衣食也不成問題有你這身能耐也能吃飯你走吧林寶撲嗵一下就跪下了師父你別價這是我在你跟前撒嬌哪你説耍錢的事原先我也不幹他們非拉我去現在孩子知錯了嗯要是這樣嘛還不錯但老頭從現在起對林寶的一切就有所監視銀錢上也有所控制誰知這林寶花錢一緊覺得有點為難了凡是袁泰好的厚的他都暗中借了錢最後還跟章成錦借了五十兩銀子一晃日子不少了他説還是還不了章成錦就找來了説哥哥林寶背著你在外面跟我借錢你知道嗎阿我不知道阿他有什麼花銷他在外面借了有幾百兩銀子都隨手花掉了你這麼小的日子可不夠花呀看來我把這孩子介紹給你是我的錯兒不不能這麼説這與你有什麼關係呢一是這個孩子他自甘墮落二是愚兄我教育不嚴哥兒倆説了會兒話章成錦就走了林寶借了許多銀子幹什麼去了原來在西門外八裏地有個小尼姑庵這個庵叫篩月庵老姑子吃齋念佛只管念他的經他收了個徒弟叫鳳清這個小姑子是個不守清規的女人勾引了林寶為了讓林寶來去方便就暗示林寶把老姑子給殺了果然老姑子一死他自己就當了篩月庵的住持這天晚傍晌林寶回來了吃完了飯袁泰也真沈得住氣説道林寶阿這些日子師父也沒問問你你手頭緊不緊由於上兩次你在賭局輸了錢師父我責備了你細想起來老夫我偌大的年紀只有你這麼一個頂門立戶的男子漢這不是多管嗎你手頭緊嗎師父這些日子手頭説實話緊不緊不夠花的你都跟誰借錢了剛説到這兒林寶撲嗵跪下了師父我對不起你沒想到我又給你捅了不少漏子我花錢跟流水似地慣了就忘了師父的錢也來得不易我跟你的親戚朋友借了不少錢人家都看得起我我可還不起人家默默不要緊借了多少錢草草地拿筆這麼一算三百兩左右袁泰不露聲色地道孩子錢咱們該知道來得不易老夫我這麼大年紀打你八歲把你領到這兒教給你文武兩科技藝雖不指望讓你三十年後望子敬父但我也希望你有能耐謀一席之地早晚有碗飯吃不至於凍餓而死沒想到孩子你沾染下流越來越壞親戚朋友能隨便借錢嗎我希望你苦海無邊回頭是岸明天咱父子倆還帳去第二天一早起來老頭子拿著銀子跟著林寶還帳去了到哪個朋友那兒都抱歉賠禮把銀子還給人家林寶表面上服從實際上他心裏暗暗咬牙袁泰呀袁泰你這麼大年紀行將入木難道説你忘了死嗎將來你這家産是我小太爺林寶的你的閨女是我的難道你忘了嗎小太爺花你倆錢你還有點不樂意林寶暗暗記恨在心時隔數日一天吃完早飯老頭到城北訪朋友去了林寶見袁泰走了內宅只剩下袁秀英林寶轉身往後走越過屏風門直奔北上房挑簾櫳進來一看姑娘正暗自悲泣呢秀英想林寶這個男人不是個好東西雖説爹爹把他欠的銀子都給還了可他還經常招搖在家裏既然如此爹你怎麼能撇下女兒一個人在家裏呀姑娘正想著呢見林寶進來了紅臉地道師哥老爺子出門了你怎麼不在外面應著門戶到內宅來幹什麼呢妹妹你這兒幹什麼呢説著樂呵呵地就偎上來了默默妹妹你明兒給我做雙襪子吧上次我跟你説過老爺子把你的終身大事許配給我了我看妹妹咱們倆真是天生一對地造一雙你跟老爺子説説擇個日子咱們倆辦了婚事就得了這時林寶雙手一摟就把秀英抱起來了姑娘心裏怦怦直跳氣生兩肋用手指點林寶你這人面獸心的壞東西我爹爹待你像親生兒一樣你忘恩負義你給我出去姑娘正言厲色地罵他林寶反而樂嘻嘻地道妹妹你罵我可我疼你不往心裏去妹妹這會兒正是個好空兒你就跟我説著就把秀英抱在床上糟踏了猛然間院子中有人説話姑娘你師哥上哪兒去了這一下差一點兒沒把林寶給嚇死正是神鏢手袁泰回來了原來城北仁義屯有個武術家跟老頭子是過命的朋友此人姓任名元江湖人稱清風羽士任元不僅是內外兩家功夫好而且人品也好學問也好並且他使一對亮銀鏈子鐝功夫玄妙老頭是訪他去了想把自己的事兒跟任老義士提提出了城門一琢磨哎呀袁泰呀你這麼大年紀老糊塗啦林寶已經不是個好東西了你怎麼還給他時間呢萬一姑娘受了他的什麼侮辱十七十八的姑娘你讓他是死呀還是活呀想著就回來了過後院一喊林寶出來噌噌噌地往前面跑袁泰來到房中一看姑娘落淚如雨問孩子你怎麼了姑娘只是哭出了這種事情姑娘怎麼能啓齒呢老頭問急了道孩子你怎麼就不説呀你還讓我説什麼我這麼大的姑娘受了他的侮辱難道説我還能活著嗎爹呀神鏢手袁泰明白了不由地怒從膽邊升起林寶小畜生我待你這麼好你怎能恩將仇報呀袁泰轉身來到前廳挑簾櫳進來林寶心懷鬼胎見老人家臉色鐵青林寶明白了袁泰破口大罵你這個衣冠禽獸我待你這麼好你卻恩將仇報你這個惡賊説道一拳打將過去林寶卻噌地把鏢掏出來一抖腕子照袁泰投過去砰地一鏢正打在老袁泰的哽嗓咽喉上阿一聲慘叫老英雄一晃身撲嗵一聲倒地身亡了姑娘正從後院趕來眼珠子都紅了忙操起一把刀林寶哇想不到你恩將仇報一鏢將我爹爹致死我跟你拚了躥過來就給了林寶一刀林寶往旁一閃拿刀一擋丫頭你還要跟我動手嗎乖乖地俯首貼耳嫁給我咱們就説老頭得病死了不然的話你還跑得出你家小太爺林寶的手心嗎姑娘蛾眉倒豎杏眼圓睜林寶我功夫不如你我只有到陰曹地府去告你説完一掉臉往臺階上頭朝下叭嚓一聲只見腦漿迸裂萬朵桃花開大姑娘碰階而死鏢打恩師逼死師妹林寶一想我快走吧他從老頭銀匱裏拿了不少銀子放在包袱裏斜插一背把刀帶好飛身形上房就跑了沒想到清風羽士任元來了他將近六十花白的頭髮花白的鬍鬚功夫好沒帶兵器就帶了點錢打家裏出來溜溜達達直奔會稽城順北關進北門就來到了袁家門口輕輕地一叫門哎呀林寶我説開門呐叫了好幾聲也沒人言語任元一想這是怎麼回事老哥哥你把門開開秀英姑娘你把門開開喊幹了嗓子沒人言語任元就奔後牆去了看了看四外無人一拔腰就上了牆心説他們家不能沒人吧老哥哥不在家林寶不在家還有侄女袁秀英呢這是怎麼回事呢等老人下來一瞧可把任元給嚇壞了袁泰哽嗓咽喉上還插著一隻鏢任元自語道這個賊人棄凶逃跑真乃可恨這是哪一個幹的我不能在這兒呆著得快把地方找來北門裏的地方姓韓叫韓高生時間不大把韓高生給找來了哎任老義士爺你有什麼事街坊鄰居交頭接耳議論紛紛嬸子大娘有搖頭的有掉淚的有看著姑娘素常以往挺不錯的怎麼死了呢任元道哎呀韓高生阿現在我看沒別的辦法我們都在這兒等著你趕緊去報案吧韓高生看了看這兩具尸體就直奔會稽城的縣衙門去了會稽城的縣太爺姓鄭叫鄭文秉鄭大老爺二十五歲登科二十八歲登甲科甲出身榜下用的知縣鄭太爺兩袖清風愛民如子韓高生來到衙門口門口這兒站著好幾位官人喲韓爺韓爺衆位辛苦今是哪位值班呢今兒是王忠王班頭韓高生一進來值日班頭王爺站起來了韓高生你怎麼這