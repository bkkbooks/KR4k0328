body:
  text: 第十三回釋三寇火燒清雲寨賀美號簪花靈隱寺上回書説到夜操清雲寨徐源邵甫被困大廳前猛英雄叱海金牛聽見鑼聲響亮亮出降魔杵闖進山寨把守這頭道寨門的是兩個頭目水上漂劉成一文錢不沈底兒劉順他們倆從獅子寨到了清雲寨把太湖的事情全報告給羅焰光因此派他們倆把守頭道寨門由於今天是大喜的日子大寨出賞酒宴他們都在山寨間飲酒聽鑼聲一響五十多人各持刀槍把猛英雄圍在中間猛英雄大喝一聲猶如虎蕩羊群大杵一擺撲撲橫躺豎臥就死了七八個兵丁往上圍連砸帶扎又是七八個劉成劉順一商量劉順拿著刀順著寨門轉到傻於恆的身後去了劉成高聲喊叫別打啦嘍兵往兩旁一閃傻於恆一掄杵好小子敢欺負老牛劉成蹦到切近用力一指猛漢你從哪來呀我從那邊來呀你怎麼來的走著來的劉成一聽真生氣廢話傻於恆也説廢話其實劉成是引於恆的注意力只見劉順蔫蔫地往于恆身後邊湊越湊越近欲來個金風未動蟬先覺暗算無常死不知刷捧刀照定於恆後背就扎就聽傻於恆猛然一聲喝喊一轉身用大杵照著劉順的腦袋掄圓了就是一杵啪嚓腦漿崩裂譁地一下兵丁就亂了這傻東西有後眼劉頭目叫他給砸死啦於恆打仗並不傻他心裏琢磨這小子為什麼淨説話不動手哇又見劉成的眼睛總往自己身後看便想喲莫非後邊有人要宰我呀左眼睛微微往後一瞧默好小子真來啦所以才把劉順砸死劉成一看這才明白在太湖鍾山獅子寨碰見的就是這個傻小子好猛漢殺我胞弟哪里走舉刀就砍於恆也顧不得念叨啦默大杵一撩劉成的刀就飛啦他抹頭就跑猛英雄往前趕步喚虎出洞大杵對準劉成後心就扎撲哧一下劉成喪命嘍兵一見撒腿就跑好厲害山精大野獸傻小子在後頭也喊別跑啦一直奔二寨門追去於恆手持降魔杵追打著喊道好小子竟敢欺負我們家的孩子三兒四兒別害怕老牛來啦撞到人群之間不亞如鋼鑄金剛鐵打羅漢徐源邵甫一看牛兒小子來啦精神倍長三寨主分水忽律彭沖彭伯言一亮分水狼牙鑹飛身過來用鑹一指猛漢大膽一舉雙鑹蓋頂就劈傻於恆一抱降魔杵再來點再來點唰鑹就到啦於恆猛地往上一撩再來點兒吧當把雙鑹打飛了彭伯言抹頭一跑傻於恆回手橫杵一掄正打在後背之上嘭噌一聲硬把彭伯言給砸了個跟頭他鯉魚打挺噌地一下騰身而起嚇得臉色蠟白好厲害有兵丁把狼牙鑹撿回交給彭伯言何豹手持托天叉譁楞楞帶著不少人圍上於恆又是一場鏖戰這時候前後就有兩個更次四鼓都過了大廳前鑼聲響得更緊啦喊殺的聲音更高了羅烈一看來的這幾個人當中最凶的就是牛兒小子大杵掄開逢著死撞著亡如在無人之境他把彭伯言叫過來低聲囑咐賢弟你趕緊如此這般地去做只要這個傻大個兒一死諒那兩個小輩就好對付了彭伯言點頭兄長説得對我也是當事者迷説著他把狼牙鑹一擺闖進重圍高聲喊叫猛漢敢隨你家寨主爺到寬敞地方一戰嗎傻於恆殺紅眼啦龜兒子混蛋呐上哪里都行阿好隨我來兵丁一閃彭伯言在前傻於恆在後就往東啦徐源邵甫現在纍壞了可還是奮勇作戰看見傻小子被人調開就知道要壞立即喊嚷傻爺們兒別上當阿就在這裏打吧猛英雄連頭都不回就追下去了彭沖明白叫他追上自己就活不了他順著東配房的北山牆穿過一個月亮門兒原來東院是個大花園兒真有四時不謝之花八節長春之草桃紅李白芬芳緑柳青竹搖曳濃香吐蕊爭奇鬥豔真的羅烈要不把盜國寶的欽犯窩藏山中何至於山破勢敗彭伯言跑到一片假山石的旁邊墊步擰腰噌地一下躥出有一丈五去可傻小子不會躥往前一邁步壞了這裏有個陷坑一丈見方上邊用竹竿架住和平地一樣當中一個井口這口兒上有根鐵棍用木板架在上面也偽裝好了如果蹬上這木板在鐵棍軸上一滾把人漏下去然後恢復原狀傻小子哪里懂得咕嚓他就漏進陷坑裏了彭伯言過來這井口兩邊有個鐵插管他把這插管一插於恆想出來勢比登天彭伯言轉身走啦這個陷坑有一丈五六尺深裏邊墊著幹石灰細面兒傻於恆掉下來先扔杵然後一抱腦袋咚砸下去的幹石灰面兒就起來啦滾了他一身又把眼睛給嗆啦等了一會兒石灰面兒落下來他一流眼淚慢慢地將雌雄眼睜開了雖説眼睛辣辣的但到底能看啦站起來將杵拿起臉沖上喊好小子我中了你的姦計有本事讓我出去咱明著幹傻小子喊一通又一通就是沒人來於恆發怒了把大杵一掄在裏邊一通砸撲通撲通木板掉下來上邊兒有人説話猛漢我叫牛兒小子嗷牛兒小子幹什麼你願意出來嗎願意這裏邊很難受的那好我給你拿個梯子來你順著梯子不就爬上來了嘛上邊説著順下一個梯子來猛英雄脫了大難你猜搭救於恆的是何人原來是位老俠七十多歲家住雲南狐兒山下黑熊鎮在鎮東口開了一個客店叫黔南客棧他姓王單字名鳳江湖人稱天靈俠老俠一生不娶貪練武功有個弟弟夫妻相繼去世留下一個女兒名喚素蘭被老俠收養在家從五歲上就跟老俠學習文武兩課今年十九歲長得又俊功夫又好也能操持店務羅烈他們去鐵善寺有時候就住在店中和王鳳不錯老俠這次到杭州遊玩才想來揚州清雲寨本打算看看就走羅烈執意挽留盛情難卻這才提出來你一定叫我多住幾天也可以給我找個最幽雅最僻靜的地方派一個人侍奉我你們哥兒幾個也不用總在身邊陪同我獨自遊玩要能這樣我就多住幾天羅烈答應了並且在東花園竹林深處的翠雲閣款待王鳳今天的事老俠早有耳聞自從韓寶吳志廣一來老俠暗中偷聽竊看已經知道事情的原委大廳前鑼聲一響老俠來到北房上按屋脊往下看彭伯言把于恆引到陷坑以後老俠才來到這陷坑旁邊拔下鐵插管幾摘下翻板拿來梯子猛英雄于恆這才上來傻於恆擡頭看天東方發亮噔噔噔直奔前廳徐源邵甫本來動手就擔著心呐一看於恆來了爺兒仨往外沖何豹傳令兵丁往上圍何豹過來問羅烈大哥這小子勢如猛虎應當怎麼辦羅烈也問彭沖他怎麼出來啦彭伯言也莫名其妙三個人商議事已至此調弓箭手把這不明來曆之人全都射死就在這個時候竹城的頭目跑進來氣喘吁吁單腿打跪啓稟大寨主現有聖手昆侖鎮東俠侯振遠還有他的朋友童林童海川前來拜山他們在竹城外恭候羅烈一聽勃然大怒命令頭目們率領兵丁把他們爺仨圍住然後對何豹彭沖説二弟三弟隨我到外面會一會侯振遠童海川何豹彭沖答應帶領四個小寨主還有四十名兵卒直奔大寨門來到船塢登上大戰船水手解纜繩撤跳板船篙一點唰拉拉沖風破浪來到竹城裏然後吩咐把千斤閘絞起來船到山外水面上一隻小船一共有三個人船頭站著侯振遠左手按著劍把右手捋著銀髯旁邊站定童海川懷抱子母雞爪鴛鴦鉞威風凜凜船尾站著蠻子孔秀另有三個水手原來侯老俠跟童海川等到陶大爺走了之後一切事情託付給王爺跟北俠秋田當晚又囑咐黃燦一定聽師伯秋老俠的安排次日清晨告辭弟兄倆奔清雲寨走下來到瞭望潭莊天已快亮孔秀正從裏邊跑出來哎呀師大爺師父來啦侯二爺他們也出來了彼此見禮請到跨院侯二爺把事情一説最後道陶二爺帶著良兒跟九齡直到現在沒回來傻兄弟還有徐源邵甫又不知去向我和陶大爺正著急準備派人去尋找老俠侯振遠一擺手他們一定去了清雲寨陶老英雄請店裏給雇只船我帶海川立刻進山二爺侯傑立即找來悶棍手劉三雇好船隻爺兒三個登船從水路直奔竹城到了切近上面有人喊幹什麼的慢往前進我們可要開弓放箭啦侯老俠抱拳回答兵卒聽真我乃聖手昆侖鎮東俠侯振遠帶著朋友童林前來拜見羅寨主煩勞通稟候著兵丁下城上船到寨門下了船才來報告到現在羅烈的大船沖出來海川知道爺兒三個都是旱鴨子不會水呀幸好大船離小船一丈多遠兒就停住了羅烈在船頭躬身行禮對面小舟上敢是老俠客嗎侯老俠也作揖還禮面前就是羅大寨主吧在下正是侯廷阿久仰閣下的盛名羅某幼年就知道你是我們武林中的前輩道高德重怎麼今天身帶利刃來至草寨不知何故侯振遠微然一笑羅寨主老朽年逾八旬隱居山東閉門課徒耕耘壟畝樂老家桑本期埋沒于山林老死於戶牖落個與人無誨與世無爭也算含笑地下啦不想好友童林相邀於我協助捉拿欽犯今已訪知韓吳二寇躲避在貴寶寨昨遣小徒來山中暗視一夜未歸特此前來詢問羅烈聽了一陳狂笑哈哈哈哼想我清雲寨堅似金城湯池固如鐵壁銅牆不管他項長三頭肩生六臂如敢犯我山界也叫他有去無回老俠客明白嗎海川一聽勃然變色侯老俠沖著他一搖頭然後面對羅烈一笑好哇大丈夫敢做敢當果真欽犯落到貴山老夫辦的是案子不用説死幾個徒弟只要侯某三寸氣在也要受人之托忠人之事大寨主既然襟懷磊落那麼韓寶吳志廣一定在貴山住腳啦羅烈點頭侯老俠他二人現在敝山不假弟兄占據此地種地不納糧打魚不納稅專劫過往商賈已是非法何敢再容欽犯實因你身旁的童林他興一家武術與我們鐵善寺無關大不該揚言滅我們的山門前在太湖殺我師弟袁德亮韓大壽要想捉拿欽犯童林必須受死老俠侯振遠蠶眉倒立虎目含嗔左手按劍把右手一撩長衫腳尖微點船板哧飛身上了大船用手點指羅烈老夫以你為緑林英雄敵視國法如無物難道侯某懼怕鐵善寺不交欽犯與案犯同罪你還敢拒捕嗎三家寨主身後有四個小寨主兩頭蛇高成無腸公子高寶金槍蝦葉德成銀槍蝦葉德方各操兵刃現在一看翻臉啦高成一壓刀三位寨主某家不才願斬侯廷之頭來獻多加小心是高成一個箭步躥過來老匹夫侯廷敢到我清雲寨撒野分明自尋死路兩頭蛇高成要你的老命老俠把臉一沈無知鼠輩你敢辱罵老夫進招受死高成左手一晃面門刀走迎風劈柳唰就到啦侯振遠多大的份兒老俠身法展動上左一滑步劍走青龍戲水手腕子一反正是高成的脖子唰從脖子上就過去啦右腳尖兒一點他的小腹嘭高成的死尸出去一條兒人頭咕嚕嚕滾出去老遠無腸公子高寶一看兄長死啦紅了眼睛一顫紅纓槍唰槍走一條線奔老俠後心就扎老人家眼觀六路耳聽八方左腳當軸兒右步一滑來了個大轉彎劍走青龍出水正是高寶的小腹撲哧一聲龍淵劍扎進有半尺大船上一陳大亂葉德成葉德方每人一顫蠟杆槍前後夾擊葉德成在前邊分心就扎葉德方在後面照老俠後心也是一槍扎來侯振遠聽風辨物知道後面槍也到啦上左步一蹭閃開二人的槍尖兒右手龍淵劍海底撈月嗆一聲兩個人的槍頭兒都掉下來老俠一個長河斬蛟正是葉德方的胸前寶劍扎死葉德方就勢拔劍腳尖兒一點船板騰空而起順勢一落寶劍正劈葉德成的頭頂啪嚓一聲當時身死羅烈吩咐把尸體搬開一抖鑌鐵虎尾三節棍嘎楞楞姓侯的倚老賣老欺我太甚縱身過來童海川來到侯老俠近前兄長你先稍微歇息一下待小弟會戰羅烈老俠寶劍還鞘有勞賢弟海川分雙鉞高聲喝喊羅烈認識俺童林嗎阿仇人見面分外眼紅羅烈雙手攢在當中雙搖風火輪譁楞楞三節棍的兩頭奔海川左右太陽穴就打童林往下一矮身左手鉞揚起來右手城的尖子葉底藏花照羅烈右肋下就扎不等羅烈還招左手鉞又奔羅烈右腿鏟來羅烈一看不好想躲已