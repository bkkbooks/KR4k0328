天小辮子兩道黃眉毛似有如無一雙小黃眼珠嘀溜兒亂轉上唇有小黃鬍子兒地地道道的癆病鬼兒別看這人骨瘦如柴兩膀一晃卻有千鈞之力此人姓苗名叫吉慶師父給起了個外號叫黃病童子今年已經六十五歲了他的老師可是十二劍客裏的大人物姓周名叫周潯他有個師弟叫鹿民瞻老哥倆不但武術絶倫也是當代著名的畫家周老英雄專畫雲龍有三現五現九現的雲龍人家給他起個美號就叫雲飛九現鹿老英雄專畫鷹熊所以又叫英雄潯鹿周老劍客最喜歡喝西湖龍井所以經常叫苗吉慶來杭州好在紹興府周家集離杭州也不算遠苗吉慶腳程又快很不算什麼這次苗吉慶來到杭州一到天竺街發現前邊好多人馬耀武揚威吉慶往旁邊一閃跟旁邊一位老者打聽原來是鏢局的英雄到靈隱寺獻藝賀號去吉慶一想我要開開眼界他便跟下來在影壁後邊往裏看當海川練藝的時候從吉慶的眼裏看功夫確實不錯吉慶也點頭自語難得呀等海川站住大家一鼓掌苗吉慶生氣了那意思是他不錯就成啦怎麼不要命的拍馬屁叫齊了號的喊好他一生氣才喊出來不好從影壁上下來吉慶又覺得後悔人家一個年輕人功夫練到這個份很不錯了我為什麼要在這裏瞎起哄呐他心裏猶豫不定誨川一抱拳笑道老英雄剛才喊不好的是你嗎沒錯就是我請問你看我哪一招不好哇全不好衆群雄聽著都認為不像話王爺惱啦這位王爺胸有大志總是禮賢下士躬己待人上至公侯卿相下至販夫士卒他都能一般看待今天對待苗吉慶就不同啦又在這種場合認為他是故意搗亂王爺把一臉一沈海川給我打他王爺説打海川雙手一合照定苗吉慶胸前挂印就打唰掌就到啦海川並沒有看出苗吉慶這個把式有多大本領相反苗吉慶也根本看不起海川但心裏想動手你就得輸招這個人當著這麼多人獻藝賀號我與他遠日無冤近日無仇我勝了他他這號怎麼賀呀正在他二心不定時海川的招數到了當苗吉慶上右步一斜身海川不是跟苗吉慶對臉兒而是看他的右耳朵成了一條線海川用的一招叫胯打人的手腳除外肩肘胯膝都能發招海川用左胯一撞苗吉慶的右胯等他意識到的時候已被撞出好幾步去苗吉慶一害臊鑽進樹林跑了王爺心中大悅打得好其實秋佩雨他們幾位成名的人物看出來這是童林走運於是招呼大家回到天棚下坐好王爺請大家吃茶道衆位都是武林前輩快快給海川送個綽號吧秋佩雨老俠站起來道王爺示下大家給我師弟起個號大家心裏也明白起得不好王爺這關就過不去呀紹興府鎮南鏢局鏢主神鏢手黃仙舟站起來道爺駕衆位老前輩愚下想起一個來看童師傅在山門外轉圈功夫實在好就叫陸地神仙吧北俠鎮東俠一聽這個氣呀你起這個外號王爺能答應嗎秋老俠不好意思説什麼問振遠司馬大弟你們哥幾個看著行嗎王爺以為如何侯老俠也看王爺還是請爺駕提提吧雍親王爺把頭搖了又搖衆位老俠客我想一個人怎麼能叫神仙呐不大妥當吧秋老俠點頭道這樣吧振遠你先寫上等大家説完了咱們來個擇其善者而從之現在大家説吧侯老俠提筆記上神槍張凱站起來道我説一個剛才見童老師練功一眨眼不見啦可稱神行無影侯振遠記上這位提一個小旋風那位提一個個天下無敵有提賽霸王的還有的提今世典韋的眨眼之間提出了四十多個王爺腦袋搖得都發暈啦本爵想説兩句門外話也沒別的意思大家提的本爵覺著不大痛快這麼辦秋老俠提一個我們聽聽吧大家也隨聲附和對秋老俠説一個老英雄一抱拳衆位提得很多好吧我説一個大家再商量今天海川在靈隱寺獻藝確實令人欽佩在座的親眼目睹都很服氣可今日參加盛會的來自南七北六十三省各地這裏還包含著四面八方老夫雖然無能可朋友擡愛稱為北俠振遠為東俠司馬大弟為南俠只是號為西俠的于老前輩不在這裏可他的弟子李源李賢弟在這裏也能代表于老前輩將來李賢弟可去一趟山西我想于老前輩也一定願意提攜後進成人之美既然海川的武藝技驚四座他可稱威鎮八方海川的臉面發紫那麼就叫他鎮八方紫面昆侖俠不知爺駕和衆位以為然否侯振遠站起來道好海川的綽號是鎮八方紫面昆侖俠先謝謝哥哥侯振遠一躬到地王爺連連點頭太好啦海川快過來給老哥哥行禮海川趕緊過來趴地下磕頭道老哥哥小弟先謝謝北俠伸手扶起不必謝等愚兄與你簪花海川搖頭道你先等一等哥哥你再給想一個別的什麼號吧這個號小弟實實擔不起呀你想小弟才三十歲的人功夫尚不成熟如有緑林朋友找小弟的麻煩怎麼得了哇秋老俠一笑賢弟愚兄是過來人人怕有名兒豬怕壯當然這種事情也難免不能怕只要行端履正交友以誠肝膽照人雖説這個號是大了點兒緑林朋友也會捧你的普照過來也説師兄給你起的號是過了些望你好自為之潔身自愛勉勵而行就可以了怎能辜負老師兄的一片好心意呢鎮東俠南俠苗澤張鼎李源也都過來啦兄弟簪花吧將來的道路還長呐北俠把花給帶好很多同道都過來給童林道喜大家歸座侯老俠帶海川先給王爺斟酒再給北俠南俠等挨次斟酒大家開懷暢飲把飯吃完便坐著喝茶法元長老畢恭畢敬手捧緣簿來到王爺面前阿彌陀佛爺駕功德無量請結善緣吧有僧人捧墨執筆在旁邊立著王爺打開緣簿拿過筆來刷刷刷寫上了北京愛新覺羅胤禎布施銀一千兩黃燦潘龍叫夥計記數接著往下有五百的二百的幾十兩的幾兩的一一不等最後黃燦潘龍也寫了布施並且請法元派僧人到鏢局取銀子大家陪王爺起身僧衆鳴法器恭送大家回到鏢局皆大歡喜一番後很多人紛紛告辭離去不到幾天都走淨了最後北俠也要走爺兒幾個一再挽留北俠説你們要去雲南八卦山找國寶到時候給哥哥我去信我一定前去還有王爺是金枝玉葉豈能總在外邊家纍千金坐不垂堂還是勸王爺回京為妥北俠師徒告辭了當天晚上侯老俠和王爺商量説爺先回京隨時派人給爺送信再説過久在外面也不太好你回京之後草民同海川明天就去雲南啦王爺聽完一笑老俠客這次本爵為了訪訪民情本意到外邊走一走再説海川的事情尚無眉目本爵也不放心如果我自回北京也有不妥你不必多費心本爵自有主見王爺立刻寫了兩封信叫潘龍派人去北京一封信送到自己府上叫大總管何吉按時續假一封信送往老肅王府請老王爺在聖上面前求恩寬限侯老俠無法囑咐黃燦遇事多跟潘龍哥哥商量並讓二爺侯敬山帶於恆以及小弟兄暫在杭州住下侯童二俠陪著貝勒爺只帶司馬良夏九齡一行五人南下次日登程飢餐渴飲曉行夜住直奔雲南要拿二小請國寶
