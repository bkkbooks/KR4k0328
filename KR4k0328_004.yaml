勒爺現在又很得寵別的阿哥爺是貝勒貝子他可封王啦童林有門子靠王爺的人情管他冤不冤哪讓他有能力到堂口滾去咱們先擋了差就得啦何貴當著哥哥不敢説什麼啦可心裏不以為然他想人家童林上有老下有小的不就家敗人亡了嗎便説哥哥我想咱們回家跟兩位老爺子商量商量去吧也好他們倆説話的聲音很低旁人聽不見給了茶錢一直奔東華門大街來到家中見老哥倆喝茶哪行完禮往旁邊上站湯英老人可問聽説宮裏失盜啦我和你叔叔正惦著這個事哪湯雲點頭你和叔叔看這個老哥倆都看啦湯英説這童林不是貝勒府的教師爺嗎是的何貴在旁邊搭茬啦大爺我哥哥那意思是不管屈不屈也要把童林辦下來你説行嗎何玉老人點頭道何貴呀你哥哥説辦童林是對的你這腦袋總是榆木疙瘩不開竅當然誰都知道童林冤枉既是字條有他名字哪怕是別人陷害通過童林才能找到線索這叫情屈命不屈再説老佛爺也天聰睿智並不是拿住童林就殺童林有嘴也能分辨主要的貝勒府還有天大的人情真要是童林所盜四貝勒爺也有不是啦何貴一聽他爹的話恍然大悟湯英老頭琢磨這個紙條你們爺三看看這八句詩頭一句小巧之技數我能占個小字二句占個棒字三句占個錘字四句占個一字五句占個棵字六句占個蔥字七句占個盜字這是貫頂詩橫著念是小棒錘一棵蔥盜看來是事先寫好的字條暗入皇室盜什麼算什麼才把鴛鴦鐲盜去這也算這位教師的三災八難你們兩個人打算怎麼辦爹爹我和兄弟商量好了去王府辦案湯英一聽很生氣冤家你叔叔剛誇你不錯你就忘乎所以王府辦案你長著幾個腦袋你有慎刑司的公文也不頂用到時候王爺一瞪眼説你們入府行搶那就麻煩啦帶著公事見王爺呈字箋王爺必問你們説實話王爺一定交童林絶不會讓你們為難事不宜遲去吧兩個人總算有主意啦回衙門辦好公文湯雲帶上弟兄來到王府鮑石才給回上來到現在一看字箋童海川魂盡膽裂賊咬一口入骨三分哪王爺這事從何而起我始終沒有離開過你的左右哇海川你放心是真偽不了是偽真不了既然有人陷害官司你必須去打家裏的事你只管放心跟著他們走吧閉門家中坐禍從天上來海川長這麼大沒進過衙門我家中二老就托給你啦你千萬別讓我爹娘知道以免擔驚海川你不用囑咐放心去吧何貴湯雲你們帶著練兒嗎稟王爺小的不敢在王府辦案胡説童林是自行投首是我交出去的是你們辦的嗎王爺息怒小的説錯啦真該討打説錯啦你知道你們的話是有分量的嗎錯也分在什麼地方錯湯雲我把話説在前頭誰要對我的教師給錯待了咱們是以牙還牙以眼還眼請爺放心小的們天膽也不敢湯雲何貴帶海川出王府一直到富貴巷西口往北不遠就是成賢街園子監穿過去到方家胡同中路東就是協尉官廳俗名叫廳兒上滿洲話叫劄攔類似分駐所本廳兒上的協尉大老爺名叫塔木耳正白旗來到協尉官廳的門口這是前後兩層院子有二十來間房前院五間正房臨街一個小院子進了院子湯雲一使眼色暗示何貴監視海川自己挑簾子進屋辦公倒很寬敞南邊是間裏屋挂著布簾北牆一張辦公桌東牆有個大立匱桌上邊放著一遝子公文還有個帽架子上邊放著紅纓帽塔木耳三十來歲高顴骨濃眉大眼的好精神光頭頂一條大辮子挽著馬蹄袖在那兒寫字哪前胸的海馬九品補子直放光彩湯雲一抱拳塔老爺辛苦啦塔木耳放下筆一看是湯雲哎喲喝湯班頭哪陳香風給你吹來啦失迎失迎請坐請坐來人泡茶從後院來了個仆兵洗茶壺泡茶去啦塔老爺請湯雲坐在西牆大凳子上旁邊有茶几湯班頭你先請收腿坐著你是無事不登三寶殿哪説著話在懷裏掏出一個煙碟來喝是虯角染緑的真好看又厚又大放在茶几上隨著又掏出一個古月軒內畫壺來打開珊瑚蓋湯班頭你先聞著萬花露我自己又用茉莉加薰啦味道特別正倒出不少的聞煙好吧我沾你的造化湯雲用手拈起就聞湯班頭有什麼事嗎湯雲把公文拿出來塔老爺你看看這個塔木耳一看臉色都變啦差事呢在外邊這麼容易王爺交的人其時按理説廳上的塔老爺踉湯雲只能説是朋友談不到誰上誰下誰大誰小塔木耳為什麼要請安説好話呀原來王府是他的該管地面呀真的把海川直接帶到北衙門塔老爺最低也是個失職儘管不致於砸了飯碗可升一級那就難啦這一來遇缺就能高補怎能不謝謝湯雲哪塔老爺派人把童林何貴都請進來何貴他們喝著茶塔老爺立刻吩咐下去時間不大海川一看三大件拿來手銬脖練腳鐐塔木耳過來啦樂嘻嘻地説童教師你多受委屈海川一想既來之則安之大老爺你隨便吧好你們給童教師上傢夥要輕一點這是王府教師背屈含冤再説是朋友人們過來把三大件砸上塔老爺寫公事請案一切辦妥海川腳踩黃瓜架唏啦譁啦出了門一輛轎車兩頭騾子四名押護兵何貴先上車臉沖外坐好湯雲對海川説童教師我攙你上車吧海川擺頭用不著海川微一提氣譁愣愣縱起來六尺多高輕輕地落在車上湯雲何貴押海川往北衙門闖堂打官司
