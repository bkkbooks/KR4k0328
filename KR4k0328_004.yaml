body:
  text: 第四回赴約會地壇拜老俠戰賀豹二結一掌仇上回説到五小鬧王府打掉單刀拐今晚在地壇要會見八旬老俠侯敬山海川問清了道來到城門口跟著出城的人擠出來繞過箭樓過橋往北直奔地壇這時已路靜人稀關廂左右閃爍著兩三星火走著走著海川發現東邊一片紅牆裏邊茂密森林高大紅壇門關得很嚴海川來到紅牆下這大牆足足有兩丈多高英雄腳尖點地提氣輕身哧地一下真是身輕似燕飛身上牆手扒琉璃瓦的泥鰍背雙足輕輕蹬住出水的琉璃瓦壟右手用包袱擋住前胸舉目往下看裏邊都是參天古樹無風自響又加夜晚好不嚇人海川一飄身下來順著東西甬路來到二道壇門依然雙門緊閉海川拔腰上牆往裏觀瞧也都是大樹海川再飛身下來心裏納悶怎麼一個人也看不見哪突然間林中草動閃身出來兩個人海川一瞧見過面啦一位是陀頭和尚一位是斜著一隻眼睛和尚是壞事包張旺大個子是斜眼太歲閻寶張旺合掌打問訊阿彌陀佛童教師真不爽約果然前來我弟兄奉恩師之命前來迎接草草不恭請你原諒海川拿著包袱一拱手好説好説有勞二位久等童林一步來遲恕罪恕罪和尚一抱拳請吧順著大樹林往東來快到拜壇西門啦從裏邊走出兩個人來海川看這二位也都在五十多歲細腰窄背一身藍肋下配刀長眉朗目鬆散地梳一條大辮子面帶忠厚師弟童教師到啦師兄你陪著童教師往裏請吧説話間海川隨二位師兄進西門跨二門直奔裏來侯二俠早在壇階下恭候還有六個弟子都在身後有認識的有不認識的老俠面帶笑容童教師恕老朽失迎啦海川搶步進身行大禮老前輩晚生童林參拜侯老俠怎能叫童林磕頭哇雙手一拉童教師在下不敢當請吧海川隨著衆人登上拜壇北京有五壇八廟這五壇是地壇天壇日壇月壇社稷壇這拜壇有十幾丈見方高有一丈多四面有階石來到上邊四顧空闊顯得居高臨下鋪著幾領蓮花席放著壺碗包裹侯二爺執手相讓童教師星月皎潔深夜無風萬籟寂靜正好暢談席地而坐吧二人坐好老俠細問府上什麼地方晚生祖居京南霸州童家村世代務農為業你的貴老師是哪一位海川一想師父不叫提呀便道在下無師自通是仙傳老俠一聽這不像話呀又問你的門戶呢我準備在武林中自立門戶興一家武術侯老俠看出海川不像話有些生氣有意想考問一番便笑道哈哈哈教師所言老夫一生才第一次聽到你既承仙傳一定博學多聞老夫有一軍刃雖使用多年但不知其名既遇閣下倒要請教其名説話一招手徒弟把一個長包袱遞過來海川一看可就一怔阿老俠把軍刃一托童教師你請看一看純鋼粗制二尺四寸長一頭像核桃那麼粗一頭細得跟大棗差不離通體漆黑唰亮兩頭兒都是饅頭頂兒沒尖沒刃粗頭一邊鑿個透眼黃絨縵的挽手黃色燈籠穗兒刻著一條龍很講究不為好看為的是攥住澀手不打滑童教師你請賜教吧童林從心裏感激老恩師當年傳授便不慌不忙地答道老前輩你這對軍刃我是第一次見到在學藝的時候老師提過叫鑌鐵雙鐝此物出在清真教一只長三尺有六叫長鐝一隻二尺四寸叫短鐝還有短把鐝用這種兵器必須隔衣認穴專講打穴之招天下武林一共有四趟鐝第一趟鐝出在清真門戶叫七十二趟地行鐝招走中下兩盤從小腹一直到腳跟練此功必須從幼小練起不然不能成功會此絶藝的只有當代清真門長道秉清真術傳天外的西域大俠馬駿馬四爸馬老劍客爺第二趟鐝法為八卦進步邊環鐝招走中上兩盤從中腹到頭頂也是一門絶藝目前當推威鎮樟州白泰官白老劍客為獨步第三趟為天罡鐝招分三十六式神出鬼沒通此術者當為五台門戶會者大部為僧人第四趟為進步鐝會者寥寥無幾啦晚生妄談班門弄斧雕蟲小技老人家不要見笑吧侯二俠伸大拇指讚美博學多聞老夫甚是欽佩侯老俠把軍刃包好海川伸手把自己包袱打開把雙鉞亮出往手裏一托道前輩乃當代武林名人風塵俠隱晚生臨出師的時候蒙恩師不棄賜我一對軍刃臨行倉猝未能請示老師此軍刃叫作何名請老前輩示下侯二爺一看傻眼啦前後是尖兒裏外是刃兒阿你的軍刃可很出奇很特別呀老師誇獎你看這軍刃到底叫什麼名哪阿阿阿這個這個老頭子的汗順著禿腦門兒都流下來啦二爺一著急看到這大小兩個月牙子急中生智答道嗯你這軍刃叫鉞對嗎海川點頭老前輩見多識廣是鉞聽説武當內家有鴛鴦鉞講究蟒獅熊虎蛇馬猴鵬八形老夫生平未見只是聽家兄提過妄談妄談侯二爺一見童林雖然年歲不大十分老成而且為人行事很憨厚並且知道是內家弟子一定出身高門雖説初入江湖見人絶無自大之感而是渾金璞玉內力充沛定有一身好功夫將來在江湖路上必是龍騰虎躍不可限量倘若我跟他過過手交個朋友也好想到此侯二爺便道教師聽孩子們説在王府多蒙你手下留情我先謝謝童林捧拳答禮恕我不知是少俠客們多有得罪還請前輩和衆位少俠客們多多原諒我童林初入江湖不懂規矩喲童教師太客氣啦倒使我們爺兒幾個汗顔無地了我想閣下既然來啦老朽願與閣下手談領會一下高明的武藝也算不虛此行吧海川連連擺手道你是老前輩我學淺才疏技藝無進怎能與前輩無理老俠想了一下説這樣吧我們二位只是印證一下功夫這有一領席咱二位在這席上較量一番誰先出席誰就算輸你看好嗎海川不再堅持啦想到老師父叫我興一家武術如果我見人就怕覺得對不起師門便道老前輩既然説出來童林只有恭敬不如從命啦弟子們馬上把包袱什麼的都挪開海川心裏明白自己內家功夫講的是棒打臥牛之地挨幫擠靠縮小綿軟巧他左腳在前右腳在後左掌在前為引手右手護住中穴侯二爺左手搭勾右手拱掌螳螂捕蟬把門戶看好童教師請吧老前輩只管請好侯老俠往下一矮身真是守如處子動如脫兔唰地一下螳螂攥爪奔海川面門海川心想好快的身法出手不俗自己不敢疏神大意海川抱元守一氣貫丹田奔左邊劃右步右手從左肘下一穿左腳上步左手一攥獅子滾球掌挂一團風照定侯老俠胃脘就打老俠點頭好俊的功夫行家一伸手便知有沒有侯二爺往後一撤步還招動手步行門讓過步見招化招見式解式取己之利乘敵之弊摟打擋封踢彈掃挂啪啪啪眨眼之間就十幾個回合侯二爺倒吸一口涼氣童林招術變化無窮功底之深經驗之大無與倫比幾次自己都不能化解童林都不貪贏看來本領在我之上自己偌大年紀不遠千里來到北京要是栽了豈不把一世美名付於流水二俠侯傑進步掖掌海川左臂墜肘沈肩一壓二爺要變招海川來得太快兩個人本是斜對著海川就式左腳當軸兒右步後滑轉了個半圈兒海川的左胯可就貼近老俠右胯海川靈機一動微一發力嘭地一下這招跨打有啦老俠借力縱身噌地一下當老俠腳已離席落地的同時海川似乎也被老俠用胯擠出席面同時落地其實海川這一下連所有侯門弟子都給騙過啦海川先説話老前輩晚生輸招啦侯二爺臉一紅心裏很感激這個年輕人不讓自己栽跟頭其用力之準説明他的造詣不淺童教師是老夫輸招了二人再次落座老俠發怔海川一抱拳晚生第一次會見前輩實增教益老俠一擺手道童教師雖説年輕可發招非常老練老前輩太客氣不你不能叫我前輩有這麼句話江湖無輩緑林無歲肩膀齊為弟兄我們還是弟兄相稱吧老英雄侯傑的意思是你年紀很輕功夫深奧不用甘居晚輩哪知童海川錯領會了還以為侯老俠認為自己才德不錯結為弟兄趕緊站起來老哥哥如此不棄願與童林為伍如果童林不視兄長如至親手足必遭惡報哥哥請上受小弟大禮二爺知道童林錯領會啦一想也好結交個青年朋友侯二爺趕緊站起來説兄弟愚兄正是此意咱哥倆望空一拜吧撮土為香結為金蘭之好哥哥你請上首受小弟大禮二爺也不客氣上首坐好海川磕了八個頭兄弟起來二爺一回頭叫道阮和你們九個人各自通名拜見師叔哥兒幾個心裏這個罵張旺阿你吃多啦哪兒遛不了食兒單單跑到王府去遛彎兒沒事找個小叔叔來老人家的話誰敢不聽哥兒九個站齊都報了名姓師叔在上受侄男等大禮參拜海川還禮道衆位老賢侄請起請起討禮討禮大家重新坐好二爺這才細問情由海川長歎一口氣就把十七歲鬥紙牌誤傷老父逃亡在外臥虎山巧遇二恩師學藝十五年晝夜三十載的苦功奉命下山自立門戶如何探家宅風雪困京師王府當更頭乃遇賢侄兩次鬧府與二哥見面的經過細述一遍今後還望兄長提拔小弟爺兒幾個聽完點頭讚歎兄弟呀聽你這片肺腑之言真是深山大澤實藏龍蛇寒門生貴子白屋出公卿英雄生於四野豪傑長在八方愚兄年逾八旬交你這個兄弟我引以為榮放心吧將來在江湖上愚兄與你聯袂而行謝謝二哥請你帶著侄子們跟我去王府居住幾天吧王爺也是最講交友的侯二爺一搖頭兄弟儘管王府對你有恩可是你新來乍到哇再説咱們都是緑林人物粗蕩不羈多有不便這個我們就不需客氣啦我們爺兒幾個今夜就返回山東不再停留二哥為什麼此番來京之時你我的老哥哥不曾知道時長日久家中懸念再説孩子們也想家啦你我弟兄就此分手吧海川是個重情義的人一聽要走心裏覺得惆悵二哥不能再逗留幾天嗎讓兄弟好好地侍奉兄長數日阿賢弟何時有間請到山東寒舍那時暢談豈不好哇二哥説得對只要有暇小弟去山東拜見兩位兄長那麼小弟就不能送行啦你我豈是酒肉之友好你還需要什麼兄弟這次路費本來帶的很富餘這些日子花得多啦你要是能辦到借給愚兄紋銀百兩我叫你侄兒阮和隨你去取你看行嗎哎呀事情就怕巧了侯老俠絶不是路費短缺那為什麼又借銀子哪徒弟的單刀拐被海川打掉雖説是弟兄也無法啓齒老頭兒想跟你借錢回府以後你還想不起單刀嗎一塊兒交給阮和不就四水相合了嗎萬萬沒想到童林從腰裏一伸手把紋銀取出哥哥一百兩夠用嗎我這兒隨身帶來啦阮和賢侄你拿去吧謝謝師叔阮和帶好二爺心説看起來單刀拐是不給啦好吧兄弟請回吧海川趴在地下磕頭二哥回去見著老哥哥替我問候小弟兄們也紛紛行禮告別老俠叫徒弟送出地壇海川提著包袱往南走心裏是又驚又喜喜的是逢凶化吉遇難呈樣結交一位引路人武林的老前輩今後在江湖路上能給自己遮風擋雨驚的是一場大禍迫在眉睫總算是老人寬宏海量波平浪靜了這只是一方面還有最要緊的海川入江湖交的第一個朋友是位成名老俠用侯振遠的鼎鼎大名一照童林也就光射四海啦有道是與君子交如入芝蘭之室久而不聞其香則與之俱化矣與小人交如進鮑魚之肆久而不聞其臭則與之俱化矣想到此海川越護城河施展狸貓爬樹枝的功夫上了城牆竄進貝勒府的高牆大院回屋休息次日來見王爺爺倆談論武藝喝著茶王爺想起昨天的事來便問海川你的老鄉親怎麼知道你在本府當差呀爺還不知道哪有點兒事沒敢驚動爺的金身大駕來人不是我的鄉親此人家住山東東昌府姓侯名傑表字敬山江湖人稱一輪明月照九州蒼首白猿他有位兄長叫聖手昆侖鎮東俠侯廷侯振遠都是當代武林中的大俠海川把事情敘述明白王爺聽完直後悔海川有這事情為什麼不告訴我爺不要怪罪一來怕爺為我童林擔驚受怕二來