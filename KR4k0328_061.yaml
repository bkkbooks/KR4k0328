還不知道連前帶後十二年呐三支邁門弩六支棗核鏢一支三楞凹面呂祖錐打遍天下無敵舅舅你服不服你要不服氣默咱爺兒倆比劃比劃好好好你有能耐這大黑天兒你跑到大魔莊來幹什麼你怎麼不回家阿你又不是不認得唉舅舅是這麼回事我回到家中就趕上張開李豹出事他們是鎮江府裏的班頭可那兒出了十八條命案孩子我有這身能耐身為少劍客我不能不管我這麼一訪案在金山寺訪著了我是一二三四五六七趕陳道常我把陳道常趕到這兒來了走到靈佑三皇觀碰到我師哥多臂童子夏九齡我師哥是我叔叔鎮八方紫面昆侖俠童林童海川的弟子他現在是隨行衛員奉聖命保欽差大人查辦四川要説我叔叔童林的事兒你大概也有個耳聞我倒是聽你大爺提過他是個新出世的人物頭下南七省請國寶兩次杭州擂敢情跟你爸爸是好朋友沒得説那説一不二還告訴你呐他是王府的教習沾著王爺的勢有點大事小情兒的一句話過得去你先甭吹你這個人還是免不了你小時候的毛病你提這幹什麼我們拿的是保定府行刺的要犯紅毛禿頭狸子馬俊拿來拿去他們跑到大魔莊袁金標袁金豹這兒來了我們今天晚上去了我師哥夏九齡唉一個不留神叫人家拿住了我當場一動手還真不含糊我的三楞凹面呂祖錐叫袁金豹給打掉了我上房跑出來了唉怎麼説呢我是驚一陳喜一陳怪難過的哦是這麼回事兒可不是麼舅舅你可是我舅舅來到姥姥家門口兒外甥可叫人欺負了這事兒你説怎麼辦吧要不咱爺兒倆就玩兒命哈哈你寒磣不寒磣呐還要跟我玩兒命那沒法子誰叫我在你家門口栽了跟頭呢我大老遠地來叫人給揍了你這當舅舅的不管多差徑哪默默你呀甭跟我耍貧嘴從小時就滿嘴沒實話舅舅外甥這回都是實話我都急死啦你給管一管吧二爺一想得啦不就袁金鏢嗎我去就是銀鈎太保尚義年輕氣盛讓外甥張方在這裏等著躍花瓦子牆出來就進村兒了尚二爺這麼想我外甥在我家門口兒叫你們給欺負了那怎麼成我可不幹呐尚二爺遛遛達達來至袁家門口兒袁氏乓弟一愣趕緊跑出來迎接喲尚義士爺弟兄有禮了尚義挺沖二位大晚傍晌兒的我來找找二位是有點事情提提哦義士爺有什麼事兒阿尚二爺一指馬俊陳道常這二位是誰呀你要問都是我兒子的朋友紅毛禿頭狸子馬俊采花羽士陳道常噢剛才我碰到我的外甥張方大概齊你們也知道他他父親是鎮江瓜州風流俠鐵扇仙張鼎是我的姐夫也是我死去的先父的得意門生這次張方和夏九齡捉拿的是馬俊陳道常這個陳道常是鎮江府十八條命案的正凶殺害少婦長女袁金標你們大魔莊可不能容留這種人馬俊在清苑縣行刺奉旨的欽差是國家的要犯你們把隨行衛員夏九齡給捉住了把我外甥的軍刃也給打掉了我到這兒來跟你們二位見個面兒把夏九齡給我放出來把三楞凹面呂祖錐給我拿出來把馬俊陳道常給我捆上咱們呐還是好朋友袁金標聽完了説這個尚義士按理説你説得不錯你怎麼説我們就應該怎麼辦陳道常是什麼人我們哥兒倆不知道沒想到你比我們知道的還詳細這麼辦吧明天清晨我們兄弟二人親自把夏九齡給送到你府上同時我們也把這兩個人捆上一併送去你看容半宿好不好那可不成一會兒都不能容鐵面魔王袁金豹聽完勃然大怒尚義我們哥兒倆拿你高看想不到你説話這麼不講理難道説我弟兄二人懼怕於你看我的軍刃哈哈哈袁金豹好吧你説到這兒了咱們亮傢夥試試吧尚二爺一伸手把包袱皮兒打開往腰上一圍嚓一聲響把亮銀護手鈎亮出來了袁金豹魚尾雙鋒鈎左右一分來吧姓尚的真是酒逢知己千杯少話不投機半句多銀鈎太保尚義心裏有底兒你們哥兒倆跳多高蹦多遠我明白呀你們兩人過來都不是個兒尚二爺雙手一分鈎袁金豹你進招吧袁金豹往上一趕步魚尾雙鋒鈎這麼往前一扳這叫搬鈎獻月大月牙子沖上鈎沖後這兩個魚尾沖前對準尚二爺的前胸唰地就來了尚二爺左手鈎一橫月牙子往上一頂右手鈎一帶唰仙人解帶對準袁金豹的腰眼就摟來袁金豹腳尖一點地長腰起來雙鈎走上盤尚二爺雙鈎走底盤二個人四條鈎並舉打了起來銀鈎太保尚義知道自己十八趟鈎比他們袁家的鈎強得多一動上手尚二爺一看心説壞了我這鈎丟了原來袁家這魚尾雙鋒鈎遠遠不如尚家台的十八趟形鈎什麼時候動手什麼時候趴下哀金標袁金豹這麼一看麻煩了這怎麼辦呐他手下有個徒弟姓張叫張玉這個小孩兒很聰明他説師傅現在只有一個辦法到尚家去偷鈎怎麼個偷法呀只要弟子我可頭頂門生貼兒給尚均衡尚老英雄叩頭拜師三節兩壽可得多給他送禮這樣買動了老英雄等他把十八趟形鈎都教給我我回來之後再教給你們哥兒倆你們二位是高人把他的鈎招拿過來一穿咱們的鈎招可就比他們的鈎招強了袁金標袁金豹一聽這主意不錯張玉頭頂門生帖兒就來到了尚家台兒老英雄尚均衡把十八趟形鈎三年的時間都教給張玉了他一點一點都教給袁金標袁金豹他倆把十八趟形鈎和自己的十二趟魚尾鈎這麼一碴碴出二十四趟魚尾雙鋒鈎來今天尚二爺這麼一瞧阿鈎丟了贏不了人家啦結果他這麼一愣神兒叫袁金豹啪地一鈎打掉了單支亮銀鈎尚二爺一長腰出去臉兒一紅袁金豹別打了我輸了我走他剛一出門人家咣啷就把門關上了尚二爺往東看拿著單支鈎越想越後悔我們家的鈎招怎會丟了呢唉低著腦袋往東來剛到東口兒對面有人喊舅舅怎麼樣阿尚二爺一擡頭見是自己的外甥張方張方在袁家墳兒呆不住了出了墳院往村口兒走見舅舅低著頭出來問舅舅怎樣阿唉回去説去二人進了墳院尚二爺把一支鈎往供桌上一放如此這般這麼這麼地一説回去讓你舅母給你弄點飯吃先休息休息我請人去請誰去唉也不好請我只好去石家鎮請你大爺噢張方明白了他要去請神掌地佛仙石寶魁爺兒倆商量好張方出樹林繞走大魔莊請出石老俠寶槍打二魔掌震三尺鬼
