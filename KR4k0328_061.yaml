body:
  text: 第六十一回小豪傑九趕陳道常大魔莊巧遇親娘舅上部書中説到張方追趕陳道常三皇觀大戰馬宗續菩提寺寶闊寶月二位高僧趕到原來太原府東南七十裏路有座七星山狻猊寨寨主叫反手托天金頂狻猊段國基二寨主叫霹靂烈火火眼狻猊段國柱哥兒倆一共有三個兒子一個女兒大寨主有兩個兒子一個叫金粉蝶段士林一個叫銀粉蝶段士賢二寨主段國柱有一個兒子排行第三叫段士寶人稱墨粉蝶他們都娶妻生子了二寨主還有一個老生女兒名叫愛賢女段銀娘文武全才長得俊因為這兩位還不滿足打算約寶闊寶月來七星山狻猊寨給兒子女兒加工練武另外請寶闊寶月來還有一點事兒這點事兒雖很要緊但暫時先不能提等到了時候再説寶闊寶月接到請帖以後哥兒倆不便再在廟裏呆著了這才帶著亮銀方便鏟跟鄧九公雷大爺從廟裏出來直奔山西了一路上不快走而是遊山玩水白天走天氣炎熱夜晚走倒涼爽今天他們二位走到這個地方發現前頭有人動手老哥兒倆知道前頭不是靈佑三皇觀麼三皇觀的觀主浮雲仙長馬宗續是個老半大的人了在他的廟外跟誰動手呢越走越近看真了是和兩個小孩兒動手那邊也有兩個四五十歲的人浮雲仙長馬宗續正跟一個小孩兒動手老哥兒倆很不以為然南無阿彌陀佛馬道友深夜之間你與何人動手張方看出了這兩個和尚是好人把三稜凹面呂祖錐這麼一別趕緊過來一躬到地二位元前輩認識我嗎那個老和尚一想你這麼年輕我怎麼能認識哦小施主你是誰呀我家住在鎮江瓜州張家莊我爹是風流俠鐵扇仙張鼎張子美我叫病太歲張方提起我父子來名譽並不高提起我的老師來祖居在廣東龍門縣清源山寒風島祥慈觀他是觀主三清教掌教的道門門長復姓歐陽單字名修彌陀佛少俠客失敬失敬你父親張老劍客就是當代的英豪將門出虎子你的老師是武林道的前輩受後人敬仰少俠客你這是幹什麼呢你可別提了你瞧這姓馬的老道外飾溫柔之貌內藏虎狼之心你瞧那兩位一個是保定府行刺的要犯紅毛禿頭狸子馬俊一個是鎮江府十八條命案的主凶采花羽士陳道常我跟我師哥夏九齡他是鎮八方紫面昆侖俠童海川的弟子萬歲爺親封的隨行衛員他是官人捉拿的是這倆賊沒想到馬宗續他不但不幫助我們拿賊而且還要袒護大師父哎你要是好人給幫幫忙兒你可留神他可會兔子刨沙寶闊一聽默少俠客貧僧專管人間不平事那可好極啦瞧你的啦寶闊伸手把方便鏟交給了寶月降龍羅漢寶闊邁步往前走來到馬宗續身邊合掌打問阿彌陀佛馬道友咱們可都有菩薩保佑你挽發為道身在三清出家人講究無為二字你我都應當清靜無為這兩人既是國家的要犯馬道友你為什麼袒護他們呢馬宗續無理就講不下來了他沒法往外推無量佛寶闊師兄你我風馬牛不相及河水不犯井水你皈依三寶我挽發為道咱們是兩碼事至於貧道為什麼要掩護這兩個人也與你無關以我説咱們多年交情可別抓破了臉兒你們兩位該幹什麼就幹什麼去這裏的事情我們是事有事在不道路不平旁人鏟我們二人管的就是間事人家少俠客張方所説的難道有假麼無量佛沒假既是沒假你就不應當袒護惡人大師父依我説你趁早別管不貧僧非管不可無量佛如果説高僧你非要管不可山人也與你見個高低哈哈哈不是貧僧説大話你那一點能耐叫飛塵野馬呀好吧你使軍刃也好你使拳腳也好你請過來我就空著手奉陪無量佛馬宗續往前一趕步左手劍訣一晃唰一下劍走秋風掃敗葉奔脖項上就來了大和尚寶闊縮頸藏頭往下一矮身兒左腳在地上當軸兒唰就是一掃堂腿照著浮雲仙長馬宗續的腰眼上騰地一腳就把馬宗續給踹出一溜滾兒去張方高興打得好老雜毛讓你跟驢似的你給我滾一個老道鯉魚打挺起來無量佛寶闊你真乃大膽就往前這麼一湊和腳尖一點地唰地下照著和尚的面門就打老和尚一甩臉好一個蛋沒打上左腳的蛋又起來了留神大師父他可會兔子刨沙和尚寶闊這麼一瞧哈哈哈馬宗續你班門弄斧就見和尚往下這麼一矮身兒他蹲下了他兩隻手抓這沙土一抖腕子啪啪啪也甩過去了馬宗續這手叫足能化塵就是用腳把這沙土化起來打人大和尚寶闊會打土標馬宗續這手功夫要走在山地上就不行了山地上土帶不起來可人家和尚走到哪兒都成因為他手上有鷹爪力山地也能抓起一塊來打你沙土窩也一樣打出這沙團兒來大得多這個五指一插往下一攢兩個人手腳齊忙塵沙蕩起正這時候南邊有一片樹林樹林裏有人念佛南無阿彌陀佛聲音宏亮張方納悶哎呀默怎麼今個兒個又鬧老道又鬧和尚阿大傢夥兒擡頭看打樹林裏走出一個老和尚來這個老和尚的年歲可顯得太大了中等身材雙肩抱攏猿背蜂腰身上穿黃僧袍卡白護領系絨繩黃中衣兒黃雲緞子僧鞋白綾的高腰襪子十分講究空著雙手脖子上挂著一百零八顆素珠頦下一部銀髯飄蕩在前胸不散不亂鋥光瓦亮的頭頂一溜三行九塊受戒的香疤瘌背插著一個馬尾蠅刷兒理著鬍鬚原來是嵩山少林寺的方丈賽達摩元修長老嵩山少林寺在武林中可是被人敬仰的地方據説達摩老祖來到中國渡江在嵩山面壁十九年才傳下了武藝才有了少林寺這個門戶前任嵩山少林寺方丈一圓僧普靜大師就是王十古年輕的時候進嵩山教給他人骨鞭和鞭圖的那位老和尚一圓僧普靜年歲太大了可他看了看手下的弟子所謂兩堂八院八院三十二位院主十二大弟子裏頭要説夠當方丈的他知道都不夠格兒這樣他外請來的賽達摩元修長老當了方丈人家元修長老武術也好經文也好德性也好到了少林寺以後頗受衆弟子的歡迎自從賽達摩元修入主嵩山少林寺以後辦了很多的事威信更高了就在這時候鐵扇寺的兩位和尚紫面伽藍佛濟慈鐵面伽藍佛濟源他們兩個在鐵扇寺九月九重陽會上濟源被老俠于成給打吐了血王爺罰他們到少林寺學禮三年兩位和尚就來到嵩山少林寺把亞然和尚寫的這封信呈交給賽達摩元修賽達摩元修並不小看鐵扇寺因為鐵扇寺也是武林聚彙的地方也有幾百年的歷史這樣把所有的院主和各齋戒堂的老師父們都請在一起和濟慈濟源見面咱們就不細提了濟慈濟源深受賽達摩元修的垂青有什麼事兒都跟濟慈濟源商量他們本來是好人呐人家給賽達摩元修出謀劃策治理的嵩山少林寺越來越好就保舉他們兩人為戒堂老師濟慈濟源在嵩山少林寺當了戒堂老師賽達摩元修就能騰出一些時間離開少林寺訪問一些舊日賓朋這次他打嵩山少林寺下來直奔山西地面打算訪一些出家的高僧今天晚上走到這裏他發現前面有人動手借著月亮的光華才看出來這有不少的人賽達摩一看有寶闊寶月心想這是兩位很有名的和尚怎麼在這裏呢他這才在樹林裏念佛馬俊陳道常一聽撒腿就跑馬俊陳道常一跑張方急啦師哥哎甭管和尚打老道老道打和尚咱們趕緊抓賊吧回頭喊道陳道常你哪兒跑夏九齡腳底下攢徑也追趕紅毛禿頭狸子馬俊順著靈佑三皇觀可就往西來了也搭著夏天青紗帳起障眼地方太多病太歲張方可急了眼陳道常哎上天我趕到你靈霄寶殿下水我趕到你水晶宮你上哪兒跑哇張方這通追阿小子我瞧你往哪兒跑這一來不要緊夏九齡把馬俊追到什麼地方不知道了張方把陳道常追沒了他扳著手指頭一算都第五次追趕陳道常了張方是又渴又餓又勞纍往前趕前面有一個小村兒路南有幾棵大樹樹下頭有個茶攤一個老頭正拿著一把破芭蕉扇在那兒扇火兒呢張方來了哎唷我説掌匱的給我弄碗水兒喝吧我實在太渴啦茶館掌匱的道少爺你得等一會兒我這水沒開呢張方點頭心裏在想自打靈佑三皇觀追趕采花羽士陳道常直到現在師哥到什麼地方自己也不知道哇陳道常跑到哪兒也不知道張方正想著呐只見陳道常由東往西邊奔這小村兒來了默陳道常得了張方往下一伸腿兒拿起一個荊苕子筐來把自己扣上了睜著兩個小圓眼睛往外瞧小子這可該著阿采花羽士陳道常一邊逃跑一邊想無量佛我逃到山西地面你從鎮江追來看來我們是今世冤家來生的對頭阿陳道常又渴又餓一見有茶攤兒急道你給我沏一碗茶吧山人我很口渴掌匱的示意他坐下道你等一會兒説話這水就開還有一位少爺呢陳道常是驚弓之鳥漏網之魚他能不害怕嗎一聽説有位少爺忙往四外看張方一抖荊苕筐兒往起這麼一蹦陳道常哎陳道常撒腿就跑噌地一下腳底下用力往北一溜煙兒下去了張方跳起來就追直追了一天天色晚了眼前出現一座小破廟張方想我到這廟裏頭忍會兒吧我實在太困了吃也吃不好喝也喝不好我可受不了啦張方哩啦歪斜地往前走到了這破山門進去了一看這北大殿神像前邊有張供桌他把這桌圍子拿下來抖抖浮土桌子面上倒挺乾淨張方一腿上了桌子拿這桌圍子一卷當枕頭往那兒一躺大腿壓著二腿臉兒沖上一合眼就要睡著心説我怎麼能睡呢我要剛睡著陳道常來了可怎麼辦呢得啦我往這桌子下邊睡去他從桌子上下來把那桌圍子墊在底下張方鑽到供桌底下睡去了躺下就要著哇剛一迷糊無量佛采花羽士陳道常進來了陳道常實在叫張方給追昏了頭走道兒都不行啦站到那兒就合眼睡覺了擡頭一看眼前一座小破廟得了我進去歇會吧他從外邊進來走到供桌這裏拿手這麼一抹好説真的一點兒土沒有老道飛身形上了桌子就躺下了張方你別看有能耐有計謀經驗還差他一著急由打桌底下上來啦陳道常哎這一喊差點沒把陳道常嚇死噌地一下縱出去出了破廟沒命地狂奔小子你哪兒跑張方在後面玩命地追就這一夜都沒間著直到天光閃亮前頭發現了一個墳圈兒就聽這墳圈兒裏頭有點打呼的聲音張方走過來這麼一找在墳頭後面坐著一個仔細一瞧敢情多臂童子夏九齡追趕紅毛禿頭狸子馬俊也追得夠嗆躺到這兒就著了默師哥哎張方一喊你在這睡覺哇我在道邊上都聽見你的呼嚕聲啦這還行萬一碰到馬俊陳道常你還有命麼看起來你是富生富長沒受什麼熬煎你説得一點也不假師弟我是這麼追趕紅毛禿頭狸子馬俊來到這裏師弟你怎麼樣阿嗨別提啦我碰上他兩次可都沒捉住他那咱們現在怎麼辦呐張方説得了咱們先找一個地方吃點喝點然後再去睡覺你睡覺我尋風我睡覺你尋風師弟這主意不錯咱們走吧直走到天光放亮眼前出現了一個小村兒進村口往北邊兒風吹酒旗撲嚕嚕地響三角旗有字叫王家酒店路北柵欄兒門三間房東西各一間廂房院裏頭掃得很乾淨哥兒倆就進來了一直來到上房挑簾進來過堂風很涼快屋裏也很乾淨有幾張桌兒酒館掌匱的正在一張桌上收拾東西掌匱的掌匱的一回頭兒哎唷你看看剛走了二位你們二位又來了快坐下坐下夏九齡聽這話就不走腦子張方是善於動腦子的問剛走了二位嗎小爺你坐下我這不拾掇傢夥麼剛才來了一位周圍有點紅毛不多鋥光刷亮一個大禿子他身上沒包袱兒只是腰裏別著這麼一根我也叫不上名來的噢小時候聽説書哇説的是大宋朝五鼠鬧東京有一位翻江鼠蔣平蔣四老爺使的那個傢夥那叫三楞蛾眉刺哎對對對噢還有誰呀還有一位道爺張方一聽得紅毛禿