吧大傢夥兒吃完飯於小三叫掌作的過來一人帶多少短工到哪塊地裏拔去到時候有大車往場里拉三夏大忙農民們辛苦一年到頭哪有清間的日子這麥收就更受纍了一天過去到收工回來説吃晚飯啦人們都纍壞啦坐著躺著抽煙聊天唯有李源不間著折個跟頭打拳踢腿招大傢夥兒一笑於小三看見可就説默李夥計你真不纍呀李源哈哈笑起來于管家我這個人跟猴兒一樣登梯爬高好動不好靜拔麥子這種活纍呀你還有力氣幹這個這點活算什麼我的武藝可不能扔下一扔下就要退步哇你練的玩藝怎麼樣很不錯呀於小三一撇嘴你呀在我們這兒你少説會武藝不瞞你説咱們這兒可有震天動地的人物喲誰呀怎麼沒聽説告訴你就是我們本家老爺子我怎麼沒看見哪你下地幹活上哪兒瞧去他老人家怎麼稱呼老爺子叫于成號洞海多大年紀啦八十多歲啦於管家你想法子讓我見一面成嗎於小三一撇嘴你要托我還是準成那是我本家的爺爺別人真辦不到咱們可説好啦見著他可別動手動腳的嚇死我都不敢于管家明天你派完活等著我只要收工咱倆到十字街醉月樓喝兩盅去於小三最愛喝好吧果然第二天晚上收工倆人去啦一頓就花了好幾兩第三天又去啦又花了好幾兩一連五天如此這天吃完了飯於小三一笑李夥計你請我吃飯花了二十多兩可你拔麥子才掙個十來吊錢你賠本啦李源搖頭我不在乎我只要能看于老爺子一眼就值阿哈哈來吧老爺子今晚上就見你你給我説了麼説啦于管家就是你帶我去見可不能有別人根本也沒有別人好極啦付了飯帳兩個人來到老俠家門口悄悄而入一直進到四層院子來到西跨院書房你等著於小三進去一會兒出來啦招手叫李源兩個人一同到屋中李源也沒工夫細看屋裏的陳設迎面紫檀的架幾案紫檀大號八仙桌兩邊太師椅上首坐著一位老人大身材雙肩抱攏身穿藍綢子長衫白綿綢子的汗衫中衣白綾的高桶襪子寸底的福字履白剪子股的小辮通天的鼻子四字口唇若丹塗一部花白鬍子飄灑胸前兩隻眼睛亞賽明燈好精神李源趕緊磕頭老人家在上末學小子李源叩見老頭沒讓起來用手點指你是什麼人聽你口音好像直隸的來到山西幹什麼來了實話實説還可以不實説諒你插翅也飛不出去我這小小的宅院李源就知道老人家對他注意啦其實第一次李源跟於小三説完話當天晚上小三就見著于老俠先把麥場的收割情形跟老人家説完然後又提到李源老爺子這個人幹活不惜力而且有用不完的徑兒他想看看你老人家點點頭三兒什麼時候我讓你叫他你再叫明白嗎行啦聽你老人家的信兒從這天起老人家暗地裏跟上李源從地裏幹活到飯館吃飯花錢不在乎老人家一想這個人看來五官端正言談舉止都不像個壞人到底見我幹什麼萬一要是不法之徒呢這才叫於小三叫李源來現在老人家一説話李源跪倒磕頭老人家莫怪小子有下情上稟這才把所有的事一説然後説道這次千里迢迢來到山西設法接近老人為的是請你約束子弟在外邊怎能無故傷人呢老人家聽了很生氣他右手放在硬木的桌子上稍微一擡往下一落啪地一聲李源嚇了一跳紫檀木的桌面都碎了好大的力氣呀老俠把李源攙起來孩阿叫你受委屈老夫之過也你很喜歡練武嗎孩兒十分喜愛苦不得名師指點好於小三今日之事不準對外人言講更不準叫你小叔叔于秀知道是孩兒知道一擺手於小三退出去啦李源老夫有意收你做個入室弟子你樂意嗎李源跪在地下恩師不棄腐朽之材弟子願列門牆起來你隨我來老俠把李源帶到一個小院落派一個書童專門侍候李源吃喝擇個吉日正式拜師李源你記住不準離開這個院子只要你好好刻苦練功我一定使你成名天下徒兒記下了老俠這才督促李源把二五更的功夫逐步深入並且準備兩個大笸籮裏邊盛滿鐵砂子就教給李源鐵砂掌的功夫光陰如箭轉眼就是八年李源學會三十六路白猿掌三十六路白猿棍一粒混元大氣並且有鐵砂掌的功夫
