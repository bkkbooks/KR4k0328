body:
  text: 第五回遭奇禍海川打官司遇釋放限期捕盜賊上回書正説到康熙五十四年四月十四丟失國寶栽贓陷害把海川抓到北衙門海川上了囚車湯雲何貴這才説道童教習來你朝我坐下吧海川點頭説好把兩只手放在何貴的腿上何貴用雙手壓住海川的手為的是防備海川撞籠腦袋撞個窟窿人家北衙門不收就麻煩啦湯雲上車臉兒沖外怕有劫差事的塔木耳跨車轅把式搖鞭趕車往南走奔帽兒胡同北衙門就是五軍都督府後來的九門提督衙門他們來到門外塔木耳下了車來到門前裏邊兵丁出來請問今天是哪位守備大人值班白德勝大人你給回一聲吧方家胡同協尉塔木耳求見候著時間不大白守備大人從裏邊出來紅纓帽花翎子五品熊補兒樂嘻嘻地一站喝老塔最近不錯呀託福託福有差事按理説白守備應該過來看看這回沒有只説老塔進來是塔老爺心裏還説呢白守備是個仔細人兒什麼差事他都看看這回這麼重要的欽犯他倒粗心起來到了屋中看完公事又詳細問了有關犯人被捕前後的舉動好吧你先出去看差事我去回稟提督大人塔木耳出來心裏總覺得不是徑兒這回差事怎麼這樣好交哇一點兒不刁難這麼快就回提督啦剛想到這兒就聽裏邊當當當一響提督升堂啦老塔覺得更新鮮提督大人今天辦事真痛快呀這麼順利交差事從我當差起是頭一回呀都督府提督大人姓陶名宗訓號致廉見公文立刻傳話升堂快壯皂三班人役站立兩廂出辦招房各位師爺以及謄録生全都到齊陶大人換好了官服坐好不怒自威往兩邊看了看來人哪喳喚塔木耳進堂回話塔木耳登堂跪在堂口回話下役正白旗四甲拉協尉塔木耳請大人安起來回話謝大人恩典如何拿獲欽犯童林在何處拿獲有無拒捕案情你要從實講來不準包庇如有不實本提督定不寬容王法無情留神你的前程下役不敢徇私隱瞞刑司內大班湯雲何貴去到王府前案犯正陪王爺吃茶説話當知情以後案犯毫無拒捕之情據王府之人透露前不久有賊人兩次擾鬧王府這五六個賊都是江洋大盜高來高去之徒盡被教習趕跑保護了王爺的身家性命真若拒捕非班頭所能致是案犯自行投首王爺親自交出的你敢做證嗎下役願做死證其時塔老爺的話可最要緊因為他是該管地面的長官塔老爺斬釘截鐵的死證無形中能救童林哪陶大人點點頭好你所説與你的立案相符下去之後好好當差謝大人恩典其實這是湯雲何貴修好的地方三個人統一口徑這就等於三個人一齊辦的案啦將來就能升賞北衙門給海川換了刑具交待清楚塔木耳領了回文又給湯雲何貴道了謝便帶著空車押護兵刑具回協尉官廳啦陶大人傳話喚刑司的原差原辦進來回話湯雲叫何貴在班房看著童林自己來到大堂跪倒磕頭下役刑司班頭湯雲叩見大人陶宗訓細問一番湯雲説的跟塔木耳一樣大人一擺手湯雲下來啦大人傳話帶童林皂班頭往外走拉著長聲帶童林真是聲震屋上瓦海川一聽就好像在頭頂上嘎啦啦打了一個沈雷皂班頭一托脖練兒童林來到堂下跪倒磕頭犯人童林參拜大人童林擡起頭來有罪怎敢擡頭當堂無罪謝大人海川很害怕擡頭看提督大人此官身高足有八尺十分魁梧奇偉肩寬膀厚虎背熊腰頭戴紅頂大花翎身穿醬紫色的袍子腰系犀角涼帶胸前猱獅補褂頂戴朝珠好不威風陶提督看童林忐忑不安雖然害怕卻一團正氣一拍桌案大膽童林看你外飾溫恭之貌內藏虎狼之心既為我大清子民不謀報皇家雨露之恩竟敢包藏禍心進宮盜寶國寶藏於何處還不從實招來兩邊衙役一齊呐喊講講講童林以頭碰地説道大人哪犯人行端履正奉公守法怎敢越理胡行我在王府當差素日小心謹慎從不離開王爺左右不用説盜國寶皇宮在什麼地方犯人都不曾到過請大人恩施額外派員調查犯人言語不實願擔欺君之罪再説犯人受王爺隆恩厚誼感戴之餘報答唯恐不及決不敢觸動律條而犯天顔請大人明鑒哪其實陶大人也聽得出來童林的話發自肺腑便道念你自行投首免打四十大板即使你矢口不招到了南衙大堂你也是自討苦吃當堂畫供你要問北衙門怎麼這樣好説話不但一堂轟而且這四十板子的例行公事也開恩啦原因是這樣第一北衙門是過路衙門他定不了罪第二賊情匪盜之案尤其是欽犯必須根據北衙門的供詞才往南衙送第三王爺的人情到啦有此三點北衙門對童林才沒有為難童林離開貝勒府王爺悵然若失心裏很不好受敢情這件事已然震動全府大家聞訊都跑來向王爺求情王爺也很感動説我一定設法救出童林不過你們誰也別到東府告訴童林的父母知道否則我查出來可留神你們的皮喳奴才們不敢快走我還辦正事哪這一來大家都放心了何吉進來説爺快想法子吧你看大家都為海川擔心他們都要找老佛爺要人去啦王爺想了一下説何吉你帶六百兩銀子拿著我的片子要面見陶宗訓陳述詳情叫他不準為難童海川另外你再拿四百兩銀子去南衙門打點一下教師爺回來要説受委屈啦我可罰你奴才都記住啦何吉攜銀子帶片子飛馬而去何春你馬上這麼辦越快越好何春也去了王爺又吩咐馬號備馬換好衣服上馬加鞭趕奔哈德門裏船板胡同神力王府神力王額爾金軍功最大門內有四十一杆阿葫兒槍現在是參政五大臣之首康熙皇帝決定什麼事第一個就要征得他的意見雍親王託人情托的是地方兒府門外下了馬回事處的人出來趕忙跪下請爺安你去回稟就説四阿哥請安來啦問他賜見不是回事處的人轉身往裏走時間不大樂嘻嘻地出來了回爺話老爺子説算計著你該來啦有請到書房見面王爺邁步奔書房甩瓦行袖搶步行禮胤禎請王爺安神力王爺微然一擡身用手接安四阿哥免禮吧謝王爺哈哈哈我算計你要來的丟失國寶翡翠鐲子皇上止鑾不去木蘭了賊人大膽留下字據上有你府裏教習的名字叫什麼童林對嗎王爺點頭侄子已經給皇阿媽寫了請罪的摺子侄子再來給老爺子你請罪順便把原委説明老爺子明早見主子問及此事時你心裏有個準譜好你説説王爺從童林學藝説起一直説到戰五小會老俠捨命護府又説道他來京半年家眷也接來除去定省父母就陪著侄子練武可以説形影不離老爺子贊襄朝政經歷大事無數也沒見過盜了國寶還把自己名字寫在上面的吧他為人如何直到今天尚不改農民本色事父母至孝侍候侄子恭謹嗯求忠臣于孝子之門你回去吧王爺出來細細想想沒有不妥當的話這才放心回府其實何吉去北衙門比海川到的早等海川到啦上下都買通啦陶大人換了官服草草的過了堂備好公文當堂用了大印又派了四名監守四十名押護兵叫原差湯雲何貴一同去南衙交差門外備好囚車依然何貴打底子湯雲在外邊監守帶兵丁押護走在大街上人們知道這是解大差來到刑部管值日的班頭叫鎖頭兒有兵丁往裏去一會兒的工夫值日鎖頭兒郭鈞出來此人是個大個兒黑臉兒説道衆位老爺們辛苦監守官把官文遞過去郭鈞接過文書看了一下然後圍著海川看了看二位老爺把差事帶下來湯雲何貴攙扶海川下了車來到班房當差的把刑部的三大件拿來你看北衙門的刑具比廳兒上的大刑部的刑具又比北衙門的大不用説鐵鐐背繩手銬就這挂脖練兒也是十分厲害的當然海川是有功夫的人這要含糊一點兒三大件一上就暈啦小青龍老稱十五斤哪就是童林都感到不得徑兒心想南衙門好厲害呀郭鈞一看就完啦手拿公文來到書房問事稟大人北衙門把差事送過來啦刑部正堂尚書張翔羽看完了公文吩咐下來換衣服侍候升大堂外邊一陳忙亂三班人役兩班站立有四個跟班兒的拿著馬褥子水煙袋一切應用之物各科各司各房的頭目人全都來到大人居中而坐左右兩堂陪侍護差人員把公文放好張大人傳話帶原差喳堂上壯班站堂的一齊喊帶原差湯雲進來行禮後挺身而立大人問的都是例行話問完一擺手湯雲告退帶童林海川機伶伶打個寒顫如狼似虎的公差一個個怒目橫眉使人不寒而栗海川匍匐堂口請安犯人童林給大人叩頭因何不擡起頭來唯恐衝撞虎威正面遵諭海川擡頭看見堂官張翔羽頭帶新緯帽血點的纓子六道高梁二品頂戴身穿二口錦雞褂子四開氣的紫袍腰系犀角帶大紅珊瑚頂子光芒四射翡翠的翎管單眼大花翎朝珠補褂好不威嚴大人細看海川一副天地有正氣雜然賦流形的剛正氣度便知他負屈含冤一拍桌案喊道大膽童林竟敢以身試法偷盜國寶翡翠鴛鴦鐲因何起意夥從多少國寶藏在何處從實講來本部一定開脫於你如想以身抗刑僥幸躲過本部院絶不容情兩邊人役一齊呐喊講講講大人童林冤枉阿犯人祖居霸縣童家村世代務農從無非份之想只因自幼習武又遇名師藝成之後被困京師蒙王爺提攜王府充當教師與王爺相處日久常侍左右王爺可以做證犯人自到王府身不離王府皇宮地處何方犯人尚且不知怎敢犯天顔盜國寶欺君王害自身犯人本系農民在家只知種地納糧國寶雖珍貴寒家有何用再説犯人讀過書會寫字你可以賞下紙筆犯人寫出來查對筆體犯人實屬冤枉請大人明察你的話説完了嗎犯人尚有申訴如果犯人真的盜寶因何還留下自己名姓焉能自害自家犯人受明師所授門規甚嚴妄動人間一草一木門規不許如果犯人真的盜寶早是亡命之徒兩位班頭的武藝遠遠不及犯人若想逃脫官府追緝易如反掌豈能俯首貼耳甘領國法呢望大人仔細思量開脫犯人張大人點頭嗯聽你之話很是有理有拒捕的本領而不拒捕安分守己看來顯系有人挾嫌誣告借刀殺人哪堂上大小官吏一聽怎麼順著犯人的意思問案看來大人吃人情了吧其實這還不算吃人情因為張翔羽本來就是王爺的人哪王爺在大內皇上的左右有舅舅隆科多朝廷上有自己的妻兄禮部侍郎年妃的哥哥年羹堯還有張翔羽均為心腹王爺前者打發何春騎快馬直奔東四北三條張翔羽的私邸何春下了馬正趕上管家張忠良出來何老爺吉祥奴才給你請安喲喝忠良阿見著你太高興啦二老爺今天怎麼這樣間在你又饞啦上我們這兒吃燒魚翅來啦猴兒別開玩笑啦主子都急壞啦你們堂官在府上嗎趕緊回一聲在在我給你回去忠良知道有急事立刻到了書房説道稟大人北城根雍親王府何二老爺有急事相見張翔羽剛下朝萬歲爺止鑾他就知道有事可不知道什麼事雍親王府來了何二總管看來是有要事急忙説道有請忠良出來請何春來到書房喲大人好哇何春請大人安説著下跪請安張大人趕忙扶住總管請起吧你來有事嗎其時張翔羽身為朝廷大員都不敢隨便受何春的禮看來何春這個人物不一般何春是皇上給皇子的這是隨爵的差事要知道何吉何春哥倆都吃三品俸祿哪何春馬上把事情原原本本説明後又道請大人開脫童教師張翔羽一聽好為難得罪王爺不行真按著王爺的辦鬧不好要掉烏紗帽又一琢磨童林這個人我認識看他也不是歹人再説盜寶也不會寫上自己的名字得罪皇上我丟官是暫時的得罪了王爺那才會完了哪想到這兒便對何春説何二總管你先回去一切照辦何春走後張翔羽傳轎直奔刑部張翔羽稍事休息童林就到啦大人給童林領供你這是有仇人借刀殺人童林心裏也納悶怎麼大人替我説話啦他仔細一