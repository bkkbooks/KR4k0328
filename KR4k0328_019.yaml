body:
  text: 第十九回以怨報德鏢打李英惡貫滿盈難逃法網上回書説到李士鈞巧遇惡賊陸寅陸曉村不由得氣從心頭起惡向膽邊生他想阿我李士鈞乃堂堂男子豈能對你善罷甘休我必須一追到底拿你等歸案洗刷李陸兩家的清白即使陸二叔和你母親泉台有靈也不能怨我李士鈞不念舊義了原來陸寅跺腳離開雲南府他無處投奔落葉歸根就回湖南常德府了好在手裏有錢長這麼大沒出過遠門兒到了陸家堡打聽老人們他才明白陸滾這支派沒有近人啦只是跟出了五服的大財主陸占魁的兒子戲水江豬陸豐陸松坡還近一些陸寅一聽很高興既有綽號定然精通武藝我設法接近他叫他鼎力幫助致李英於死地給父親報仇這樣他來到陸松坡的家門口啪啪啪拍打門環一會兒從裏邊出來個下人把大門開放一看陸寅眉清目秀齒白唇紅問你這位少爺找誰呀請問本家主人陸松坡莊主認識不認識當年遷往雲南府居住的撓頭獅子陸滾陸老英雄你給回一聲我是陸滾之子名叫陸寅前來認祖歸宗嗷你等著家人往裏去時間不大就跑出來道你是少爺陸老爺子是家主的伯父家主和你是弟兄請你快進去這是自己的家呀陸寅聽了感到很溫暖家人帶著奔裏院客廳挑簾櫳陸寅進來一看屋裏明窗淨几在八仙桌上高椅子前邊站著一個大高個也就在四十來歲背厚肩寬黑紅色的粗辮子白煞煞地一張大臉滿臉的橫絲肉大賁兒頭翻鼻孔連鬢絡腮的短胡須扇風的耳朵厚嘴唇十分凶惡陸寅哇地一聲哭道小弟陸寅拜見兄長請兄長看在先人的份上照看小弟他跪在陸豐的面前淚如湧泉陸豐也半跪半蹲兄弟不要哭有什麼事都不要緊咱們一筆寫不出兩個陸來快起來起來陸豐扶起陸寅讓了座位兄弟先父去世的時候還有我的叔叔都提過雲南府的伯父當年落了戶由於多年不走動也就沒時間去雲南府伯父家中問安不想兄弟倒來認祖歸宗伯父伯母的身體如何你到此定有要事你我是弟兄盡管説陸寅流著淚就把如何幫助李躍成家立業父親被害母親也相繼被害身死説了總之血口噴人信口雌黃陸寅最後説道只求哥哥能為我父母報仇死而無憾了陸豐一聽氣得哇呀呀怪叫如雷老兒李躍如此喪盡天良渺視我陸家無人此仇不是兄弟你一個人的是咱陸家的仇此仇必報陸寅趴在地下磕頭把這個哥哥看成是得力靠山哪知道陸松坡是個淫賊專門殺害少婦長女他叔父陸占鼇也不回家可惜陸寅這個清清白白的武林後代從此江河日下了在家裏住了三天兩個人收拾東西物件又給陸寅夜行衣百寶囊就直奔雲南府而來了二人來到雲南府在北關住店吃完晚飯耗到二鼓兩個人換好夜行衣背好單刀陸豐打手式陸寅把後窗戶支好兩個人墊步擰腰躥出屋外然後飛身上房手搭涼棚四下觀看銀河耿耿夜風陳陳陸寅在前陸豐在後審縱跳躍滾背爬坡直到護城河邊燕子三抄水二人躍過護城河掏出飛抓鎖鏈搭到城垛之上兩個人倒繩而上收好飛抓從城上往下看萬家燈火已寂長街上有三三兩兩的巡更走夜的人下城牆上民房直奔東門裏來到李英家的東牆外二人進院一片死氣沈沈李英家裏空無一人陸寅咬牙哥哥難道他藏起來不成陸豐一擺手先回店再説二人照原路回到店中從後窗跳進去把窗戶關好低聲商量哥哥是不是李英聞風逃跑啦陸豐點頭很有可能即使不是聞風他也想到你必回常德府我陸家藏龍臥虎有的是武林高手能不報這血海深仇我們必須打聽出李英的下落也好跟蹤尋迹誼殺李英滿門陸寅也著急忽然間想起來哥哥我的家人陸忠和李英的家人李能多年相處很不錯李英到什麼地方陸忠一定知道陸豐點頭這倒是條線索賢弟你家中到底還有多少錢財陸寅搖頭詳情我不知道大約數萬兩好吧明天晚上咱去一趟陸寅答應到第二天晚上二鼓兩人換好夜行衣進城直奔陸寅的家越牆而過陸忠還沒有休息屋裏點著燈陸寅一敲窗戶陸忠開門吧陸忠出來一看是陸寅忙説喲小少爺奴才給你磕頭這些日子你上哪兒啦你起來到屋裏説去三個人進了屋陸寅一指陸豐道這是我哥哥我已經到湖南認祖歸宗啦陸忠立刻給陸豐行禮陸寅好像是漫不經心的樣兒陸忠東院裏怎麼樣阿嗨你別提啦大爺大奶奶帶著兒女離開雲南府啦到什麼地方去啦老奴不知道李能也不知道説是躲災避禍才走的陸寅看了陸豐一眼嗷陸忠我也回湖南啦這個家就交給你掌管啦把所有的傭人多給幾個錢全部辭掉家裏還有多少錢哪陸忠把帳目拿出來你自己看吧陸寅一看都在乾德銀號存著呐四萬多兩銀子陸忠你明天到銀號去結帳留下兩千銀子做為你養老和每年填墳燒紙的用度餘下我鏢行交傭錢給我送到湖南常德府城東南陸家堡陸松坡收即可你還有什麼事嗎沒有啦老奴照辦就是陸寅陸豐出來回店等了十天陸寅説哥哥看來李英是絶啦這雲南府也沒什麼留戀的算他李英命大咱們明天回家吧陸松坡一搖頭豈能便宜了李英此仇必報可找不到他呀陸豐一陳冷笑找不到他咱還可以借刀殺人叫官府拿他治罪陸豐説出在雲南府采花做案殺害少婦長女留下李英名字從此他們在雲南看到有姿色的女子晚上就去污辱婦女之後用刀殺死留下李英的名字最後把四品知府梁玉書的掌上明珠也給殺了做了十八案神不知鬼不覺逍遙法外回到常德府陸寅的銀子也到啦叫哥哥給存起來陸豐跟他商量我想給你蓋房可家裏的房子很多何必再蓋呢你就跟我住在一處吧陸寅搖頭哥哥我暫時不想跟你住在一處恐怕李英猜到小弟他會來到常德府尋找於我那時給你添很多麻煩陸豐一想也對依賢弟之見呢小弟到常德府找店住下隨時可以來家你也可以去店中找我呀陸豐答應陸寅在北關的三合店包了三間房每天出去尋找俊美的女子夜晚之間前去胡為陸豐給他圓了一個號叫展翅彌猴三年來的光景他做盡了壞事這天他來到東關從東往西來信步間遊正往前走突然間發現一位千嬌百媚的大姑娘坐在敞蓬車裏陸寅呆若木雞兩眼發直真是五百年風流孽冤這般可喜娘兒罕見他眼花繚亂口難言魂靈兒飛去半天他立刻在車後遠遠地跟著人家進西街口往東路北大門車子停住跟著的婆子下來大門開放從裏邊出來幾個女人有婆子拿過接腳凳放在車轅兒裏首扶著姑娘進了大門陸寅遠遠地盯了半天順著西牆往北直轉到北牆做好了粉迹兒才回到三合店直耗到晚上他換好衣服背插鋼刀從店裏出來走東北城角飛身上牆這晚還有月色正好行事陸寅分花拂柳來到這後窗戶輕身提氣單肘一跨窗台兒用右手的指蓋兒捅了個小口兒瞟一眼剛要往裏看覺得一陳寒風啪地一下有人拍了他肩頭一掌陸寅顧不得往裏看膝蓋一碰出牆飄身下來見是李英李士鈞正是仇人見面分外眼紅李英怕他喊出來如果一嚷對人家婦女的閏名有玷但沖陸寅一招手轉身形順後院往北跑下來陸寅一咬牙好李英前仇尚且未報你又破壞小太爺的好事新仇舊恨豈能容你想到這兒一伏腰就追了下來兩個人一前一後來到常德府東北城角外一片大樹林的邊兒上李英把身形站穩陸寅一伸手探背膀嗆啷啷把刀亮將出來用手點指姓李的狹路相逢今日要報父仇你的死期已至李英一笑哈哈哈兄弟三年來你采花作案身犯王法只圖一時之樂而遺萬世之醜你活膩啦陸寅一陳狂笑默默默小太爺喜歡這個樂兒與你何干你管不著李英把臉一沈亂臣賊子人人得而誅之要知道人之姐妹己之姐妹見色而起淫心報在妻女你小小年紀身染下流歸入賊匪敗類我都替你害羞雲南府乃是你先人墳墓之地衣袍都埋在當地桑梓鄉里之情全然不顧你已經是衣冠禽獸啦李英心裏還想著陸寅不敢承擔雲南府的命案得用現在的事情引到雲南去看他説什麼沒想到陸曉村把羞恥仁義全然不顧哼雲南府十八條命案正是小太爺所為就為讓雲南府的人知道知道俺陸寅的厲害陸寅你既然讓雲南府的人知道你的厲害為什麼留下我李英的名字這一句話問得陸寅張口結舌阿阿為的要你李英一命李英仰天狂笑哈哈哈哈哈哈笑什麼你陸寅哪陸寅你枉為鬚眉你既然認為應該殺我李英就該拍門找我呀為什麼要殺害手無寸鐵的無辜姐妹再説你殺我李英用什麼辦法都行為什麼用這種低級下流的辦法你做別的案我可以替你去死你做這種案要我李英替死也成咱倆人手拉手到雲南府大堂只要你當堂承認我可以引頸受戳你看如何陸寅一瞪眼呸你胡説沒有那麼混蛋的官兒我招供你受刑天底下有這個理嗎陸寅你出身清白焉能做出這種歹事殺人為報仇難道采花也為報仇嗎胡説小太爺今日就要宰你説著往前一趕步左手晃面門刀走纏頭裹腦斜肩帶背就砍李士鈞往左邁步跟右腿微一低頭刀就砍空啦陸寅右手一擋反背倒劈刀又回來啦李英弓右步蹦左腿縮身藏頭躲第二刀又空啦陸寅跟著上左步踏中空進步撩陰刀奔李英的襠內李英一個虎坐坡退出去有五尺陸寅攏刀往這兒一站李英你因何三招不還手李英長歎一口氣陸寅我連讓三招你可知取其何意嗎默你是懼怕小太爺不敢還手天下武林我都怕可就是不怕你因為我從小到大沒有做一件對不起你的事我讓你頭一招因為你我先人八拜結交闖蕩江湖幾十年同生死共患難先人尸骨未寒你我變目成仇為此追念先人之義讓你頭一招第二招呢第二招你我孩童廝守一塊兒光著屁股長起來的你從小叫我哥哥不想你流於賊寇是我做哥哥的對不起你讓你第二招第三招呢第三招我李英在先人面前有約在先寧許你不仁不準李英不義沒想到出自我李英身上不能恪守此言對不起先人而你殺人越貨損陰喪德我也覆水難收當與你變目成仇從心裏對不起你呀我讓你第三招李英侃侃而談十分動人可這忘恩負義的陸寅已然毫無人性他往前一上步滿口胡言我要你的命迎風劈柳奔李英的頭頂就劈李英歎了一口氣萬般無奈把心一橫探背膀按崩簧嗆啷啷鋼刀出鞘左手搭右腕刀走外剪腕刀刃沖上陸寅一撤刀李英刀隨身轉閃左手右手刀刷的一下攔腰就砍陸寅就是一怔李英的刀法跟自己的不一樣其快如風陸寅腳跟蹬地金魚穿波往後一縱李英隨著一刀拿雲趕月奔陸寅的肚腹扎來兩個人雙刀並舉打在一處動手不過十個回合陸寅刀走掃堂李英雙足點地飛身起來躲刀右手刀順風扯開一掃陸寅的脖子陸寅縮頸藏頭一躲李英的招數太快啦退左步閃左手招走拔草尋蛇陸寅想躲來不及啦只有閉目等死李英右手往回一撤刀左腳扎根右腿用力嘭地一聲把陸寅踹出一溜滾去陸寅撒手扔刀倒在地下李英一個箭步上去想把他拿住李英剛一落地從旁邊黑暗處唰一點寒星裏飛出一支毒藥鏢來嘭正打在李英的腿上李英知道不好撒手扔刀一翻身正好樹林邊有棵樹李英踉踉蹌蹌雙手扶樹渾身顫抖他明白自己是大難臨頭身中毒鏢擡頭一看從草叢中躥出一個人來正是淫賊陸豐陸松坡他今天晚上想到三合店看陸寅沒想到來到三合店撲空啦就順北關往東來穿過樹林他立刻趴伏在草叢中借月光攏目神仔細觀瞧正是自己的兄弟追趕一位夜行人離自己不遠都站住了兩個人一談話才知是李英二人動手他暗暗吃驚李英