亮李英白潔你們三個人的事不用再提啦因為在大墳頭的後邊仙長問你們以及你們所説的我們爺倆都聽見啦不必重復我們二人的事你們也不必問因為不是一句半句的話能説清楚我要説的就是孫亮在公門中為官數十年不分青紅皂白亂捕亂抓非皇上愛民之道今後辦案一定要心細白潔小小年紀見義勇為搭救李英血心熱膽是我大清的好臣民好子弟白母深明大義教子有方比古之賢母不為過也李士鈞可稱丈夫保全兩代深交寬宏大量是武林中的好後代很是難得呀王爺又吩咐你們三人應該同舟共濟不計前嫌馬上押著這個賊人重返常德府衙挂號投文要讓知府給白潔恢復名譽使其母子團聚以慰慈母之心然後孫亮又懇求李士鈞幫助押解案犯回轉雲南伏法為死難者伸冤報仇三個人給王爺海川致謝李英過來看了看陸寅道兄弟不聽愚兄苦口婆心再三規勸你一定認為愚兄是你的仇人到現在你有何感想當年先賢歐陽文忠公説過先王治法本乎人情你見識不明視友為敵認敵做友到現在身敗名裂領受國法愚兄無法救你只能這一路之上照顧不叫你受罪這就算哥哥我盡了心對得起你也對得起死去的叔父嬸母了説著落淚如雨陸寅眼含著淚光哥哥千錯萬錯是小弟一人之過到現在追悔不及這才是未曾害人先害己哥哥人之將死其言也善鳥之將亡其鳴也哀小弟回到雲南府難免一刀之苦是我咎由自取我並不怨天尤人只求你兩件事第一二老墳前就託付你逢年到節你替我盡孝墳前一祭第二我的死並不是兄長所害實是陸豐所為你能抓住他也讓他領國法小弟就含笑于地下啦陸寅的話人們聽了也是難過的李英點頭道兄弟你放心吧説著李英把陸寅的刀撿起插入鞘內然後把他背起三個人又給王爺海川道了謝走了童海川二目發直看著幾個人趁著曉星殘月越走越遠不由地一陳難過想著人家的案子怎麼就會機緣湊巧遇到了我們很快抓住主犯銷票無事到我這兒怎麼這樣難呢什麼時候才能拿住韓寶吳志文國寶還朝自己能奉養雙親呐他深深地歎了一口氣王爺跑了一身汗在廊簷下站了這麼半天又感到渾身發緊頭暈腳軟心説壞了我又感冒啦一看海川發怔王爺就知道他在想自己的事心裏難過就説海川呐我可又要病這麼一會兒我覺得又感冒啦咱們爺倆找個地方先休息休息吧海川也明白王爺的心他們二位順著道走了時間不大遠寺鍾敲沿村雞唱天已大亮啦往前走黑壓壓霧沈沈煙籠霧繞是個大鎮甸鎮口有塊大石頭上面刻著三個大字長樂鎮東口路北有座大店匾金字高升老店來到店門口夥計覺得新鮮怎麼大清早就有住店的把爺倆請到西跨院三間北房十分清靜擦臉漱口喝茶吃早點海川告訴夥計我們掌匱的初到南省有些不服水土你把本鎮最好的郎中給請一位來夥計侍奉殷勤又派人請來先生診脈爺倆住了四五天吃了幾劑藥王爺病體痊愈算還了店飯帳離開長樂鎮王爺覺得神清氣爽爺倆説説笑笑頗不寂寞走到中午天氣顯得很熱沅江就在北邊不遠護江堤上的大樹林蔥蔥郁鬱前面有一大片竹林當中有一條狹窄的道路路上沒有行人王爺説海川咱們找個地方歇一下吧海川答應正在這個時候就聽見前面有人喊救命阿救命阿聲音透急海川有了劫道的啦我看這地方就很凶險快去救人西面的聲音越喊越近奔跑的腳步都聽見了海川心裏有譜不管發生什麼事自己都不離開王爺就説你先藏進竹林王爺邁步進了竹塘海川一貓腰隱蔽身形往外看有一位老人穿得十分襤樓鬚髮皆白滿臉急怒身上背著一個包袱跑得直喘按理説偌大年紀走路費力可他現在跑得不慢後邊追的一個人三十多歲短矬蹲兒柿餅子臉又扁又白兩道肉貢子眉毛一雙小圓眼兒趴趴鼻子大嘴岔兒兩條小短腿兒掖把灑鞋一身藍褲褂兒海川一看這個人認得這氣就不打一處來呀原來是蠍虎子白亮他是潘龍的夥計兩次杭州擂都是他挑起來的最後把他開除了侯老俠給他幾十兩銀子讓他做個小本經營以資糊口他這樣的人不能安分守己就愛賭博結果一頭扎進賭錢場兒沒有幾天輸得像黃鼠狼烤火爪幹毛淨小子傻眼啦結果就斷道劫財非偷即搶可他又不敢在附近做案這樣他奔湖南大道就下來啦他本想去雲南八卦山投奔法禪今天他在沅江南岸等侯做案很長時間不過一個人他心裏著急呀正在這個時候他發現這個孤行的老頭老人姓張家境貧寒活活把老妻窮死指著拉船纖為生家裏只有個女兒今年二十歲雖説出身貧家長得倒很標致許配本村劉家的孩子為妻不管怎麼也要給女兒做兩件衣服他這是到女兒的舅爺家去取衣服老頭兒給女兒取嫁妝被白亮發現他攥著短刀氣勢洶洶地蹦出來站住張老頭一聽嚇得魂不附體往東就跑高喊救命白亮在後邊追老小子把東西給我放下萬事皆休不然我要你的老命老頭跑得一溜煙似的白亮一邊追一邊説老東西你隨便喊喊幹了嗓子到沅江裏喝水去一個人沒有他追得這快呀白亮眼看追上啦就覺得腳脖子被人用手一抄喲白亮這個樂兒可就大啦咕嗵來了個大馬趴狗吃屎差一點把前臉栽平了從竹林裏噌地一下鑽出一位來一拍腿右腳踩住白亮的腰骨白亮你這奴才真乃大膽光天化日之下朗朗乾坤之中公然斷道劫財殺生害命真是屢教不改怙惡不悛説著海川一擡右手照白亮後腦勺就是一巴掌白亮摔懵啦現在聽著好耳熟他歪腦袋一看是海川而且怒容滿面自知必死可他也尋找生的希望就喊道俠客爺念白亮也是鏢局子舊人你饒我一條狗命吧俠客爺小子求你啦白亮都哭出來啦一提鏢局海川的鐵掌實難落下可自己又生著氣呐可巧白亮腦袋旁邊就有一塊大石頭得啦把氣出在巨石上吧掌到石碎叭好厲害碎石塊濺在白亮的腮幫子上崩破了十幾處鮮血譁地一下就流出來了海川一用力右腳一使徑差一點把白亮給踩放了炮張老頭本來往前跑看海川把賊人給弄倒了就停了下來王爺也從竹塘出來問海川別把白亮踩死快擡腿叫他起來海川把腿擡起來白亮一看王爺知道自己死不了啦過來磕頭小子白亮給爺磕響頭啦王爺把臉一沈可惡的奴才你真給鏢局丟人不是給你幾十兩銀子嗎奴才都輸啦可惡為什麼又劫道哇奴才不是餓嗎你不務正業怎能糊口奴才在鏢局子吃得慣慣的花得慣慣的奴才就是個不務正業的人阿你這奴才差點兒喪命你今後能改嗎奴才一定改海川再給他幾個錢叫他走吧童林又拿出二十兩銀子來對白亮説道白亮你可真得改把錢拿去吧白亮接過錢給童林王爺都磕了頭走了爺倆來到張老頭的面前海川扶起來道老人家你受驚了怎麼會遇見歹人呢張老頭掉著淚把家中事全説了最後説道要不是遇見二位恩公怕我命都沒啦王爺也讓海川拿二十兩銀子給了張老頭得啦你也算因禍得福拿這錢給女兒添箱吧老頭千恩萬謝含著眼淚走了白亮跑進一個大樹林他暗自叫著自己的名字白亮阿白亮你可真白亮啦今天不提出鏢局童俠客爺不念舊義這巴掌下來我這小腦袋就成了那塊大石頭了看來我是死狗扶不上牆去我得學好哇苦海無邊回頭是岸童俠客現在正捉拿韓寶吳志廣我好好訪一訪他們只要知道下落我一報告請王爺説兩句好話鏢局子還得要我白亮橫下一條心回心向善暫且不提再説貝勒爺海川他們一邊走一邊聊王爺可説像白亮這樣的人惡習難改白天劫道給百姓帶來災難就應該殺死以絶後患海川點頭道你把他放了也對誰叫他是鏢局子的老人兒又是潘龍的夥計提出鏢局子就下不去手啦希望他回心向善莫要胡為下次碰上你別心軟啦你心疼他一個可給多少人帶來不安呐王爺一聽笑啦對對對依你依你爺倆説説笑笑不知不覺走出十幾裏地來靠近沅江的江堤有一片茂密森林聽著江水聲如同牛吼眼前都是丘陵地帶王爺有些纍啦説海川咱們進這樹林兒歇歇腳兒我的兩腳板都走疼啦其實海川知道王爺身為皇子不忘武事騎馬射箭搬石舉刀每年都要隨鑾射獵兩次弟兄諸皇子之間一起論武射箭更是常事何況王爺現在照樣兒每天早晨跟海川練八卦掌呐王爺可能是前幾天得了病身體尚未復原之故便道好我還是扶著你點兒二人進了樹林海川用個樹枝子抽打青草這叫打草驚蛇把它們驚走啦然後搬來一塊大石頭往草地上一放王爺坐在上邊倒也涼爽宜人海川跟王爺商量歇會兒咱就走你身上有汗這樹林太蔭王爺答應海川提著雙鉞的包袱站在一邊就在這個工夫噔噔噔從西邊跑進一個人來説話的聲音透著慘完啦完啦老天不睜眼得了我上吊吧説著他扔了手中的紅纓槍解系腰的絨繩擡頭找歪脖樹王爺臉沖西正看見這人滿頭大汗二目發直正是雲南府八班總役孫亮他眼睛光看歪脖樹啦沒看見這邊有人海川早瞧見是他啦心想著他可能差事丟了可李士鈞呢王爺招手海川那是孫亮要上吊尋死快去攔阻海川高聲一喊孫班頭不要行拙見童林在此金眼鷹孫亮真把扣都拴好了就要鑽套兒一聽聲音好耳熟急忙回頭一看他可高興啦解下絨繩系好了貓腰撿槍跑過來跪倒磕頭給王爺叩頭給俠客爺叩頭我我不死啦有救啦哈哈哈我不死啦王爺一看孫班頭這副神經質的樣子便問孫班頭你們的差事輸啦按江湖上説輸啦就是丟啦孫亮點頭恩人一點兒也不錯原來他們從菩提寺押著陸寅三個人直奔團練所來到之後三大件就給陸寅帶上啦把事情都説明給團練所的人道了謝陸寅捆在車上一路押解陸寅回到常德府來到衙門前往裏一回還是王頭值班孫亮一説王頭樂啦孫爺我跟你説過白少爺是好人得啦我給你回一聲金知府得信後看了公文吩咐升堂金知府升公堂先問原差孫亮首先認錯白潔確系善良然後又把拿陸寅歸案的事如何拒捕李英如何協助陸豐如何逃走詳細説明然後帶陸寅審訊明白陸寅全招啦當堂畫供給陸寅三大件砸死提牌子押入大牢退堂後金知府來到書房把李英白潔叫到房中行禮之後細問一番白潔李英把當年的事又敘説一遍金知府也很讚歎知府拿自己名片請來本城的紳商知名的老人恭送李英白潔回家使全城的人都知道白潔李英是好人白潔李英見了白母悲喜交加紳商告辭母子三人重聚哥倆把事情説完才跟老太太商量娘阿弟弟已然回家事情總算過去孩兒尚有未了之事必須幫助孫班頭把陸寅解回雲南府洗刷兩家先人的清白然後孩兒接你兒媳孫男女來常德府居住我和弟弟好好孝順你老人家安人自是高興左胳膊劉三爺夫妻聽訊趕來李英也給道謝從此跟劉三交了朋友李英吃完飯囑咐兄弟看家然後來到衙門跟孫亮相見才知道金知府出了火票調城守營二百官兵以及三班人役到陸家堡捉拿大盜陸豐陸豐沒拿到案後訪查緝查歸案全部家財充公入庫以助善舉倒也不錯孫李二人商定提出陸寅上了囚車金知府給撥了十六名兵丁押送陸寅直奔雲南府囑咐一路上嚴加防範今天就走在沅江的江堤下邊往西是一段山溝南邊是大片的竹林湛青碧緑這個地方叫青竹塘冷風嘴李英告訴孫亮老班頭這個地方十分凶惡加點小心這些日子孫亮感到李英為人忠厚能為又好而且心細如發有了李英孫亮省了心他想阿這個年輕人老成練達將門虎子不愧是李光輝的跨竈佳兒自己六十多歲已是風燭殘年此番能平安回家還鄉告老一定保舉李士鈞為八班總役孫亮打定主意所以李英説什麼他準聽從正往前走只見江堤之上嗆啷啷鑼聲震耳順著沅江江堤以內呼啦啦撞出足有一百多名嘍羅各持腰刀喊殺連天竟有大膽賊人在冷風嘴劫囚車
