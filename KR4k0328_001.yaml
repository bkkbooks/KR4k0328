body:
  text: 第一回避嚴親畏罪走他鄉人深山窮途遇劍客清康熙雍正年間在北京京南的霸州城城南童家村有一個人姓童名林表字海川年方一十八歲相貌魁梧秉性剛直純厚朴實他生平有一樣古怪的性格不諾寡信若有人失信於他絶不與之交往另有粗糙過猛也是其劣家有嚴父童懷慈母楊氏外有叔伯兄弟童緩因無所依遂一處同居他們住東村口第一家房數椽連場隔院良田五十餘畝雖非富戶然亦稱小康雖不是詩書門第總算勤儉人家一家四口頗稱相得外有長工月工是年風調雨順國泰民安兵歸甲庫馬放南山海晏河清萬民樂業要是在村莊上無非是農務春種秋收提籃撒種半年忙半年間當時不少地方農間時一些青年子弟在家無事各家恐其效尤差不離兒的村均要請武術教師帶領習練單説童家村請了一位教師滄州人姓李名直外號人稱彈腿李就在本村場院練習童林也在其內練習彈腿還有青年子弟二十余人其他拳腳李直也會但沒有真實的硬功惟有彈腿是這位李教師的專門這個彈腿分為六家師何為六家呢分串拳門彈腿化拳門彈腿回回門占四家彈腿共分為六家師此是少林的絶技按僧道俗共為六家拳經上説南京到北京彈腿出於教門中清真正教實授傳留下彈腿十趟拳故六家中為回回彈腿最好所以當時流傳著這樣的歌詞名師授我十趟拳術理無窮妙無邊頭趟順步單鞭式二趟十字奔腳尖三趟披蓋夜行臨四趟稱抹步斜纖五趟攻擊力要猛六趟防腿式單看七趟雙看多急快八趟須還腿相連九趟連環須捧索十趟見彈復周全後人休笑式法單拳到臨時多機變此為回回十趟彈腿少林彈腿十二趟即和尚彈腿道教為串拳彈腿此為彈腿之根基為何將彈腿言之鑿鑿呢凡練武術各種拳腳是皆由彈腿而起童林乃書中之主角此謂初蒙之始故巧遇李直得彈腿之精華後遇劍客方能一學而成天天聚練無奈好事多磨不料李教師家裏來了一封家信家內有緊要的事務只得回歸故里這場子一散各家子弟不少效尤惟有童林不肯將工夫丟失仍然每日照常用功二五更的功夫仍不耽擱好在家中諸事有老父照管清晨在場院練完必要出東村口繞北村口進西村口回歸家內及至回到家中早飯已然做熟鄉下的飯做得最早每天家常的飯不過就是玉米麵餑餑熬小米粥來點鹹菜吃完了也就無事可做了這一日童林起晚了一點將功夫練完到村外邊去間遛一趟進西村口在北面有三間更房這三間房子是村中公共所立專辦一切善舉及青苗會等等的事村子裏夜間打更的在內居住所有本村間散的人年老的人無事也願來此聚坐間談鬥鬥紙牌無非是解悶也沒有多大輸螺童林進了西村口看見更房裏面有不少人在內聚談童林也時常在裏間坐今天正走到外面衆人看見童林走來內中有一個人走出來此人姓劉名祿論來是童林長輩童林尋常和睦鄉里親近四鄰人緣很好人們都愛童林純厚這位劉爺往裏相讓道海川少見哪因為什麼總不到這裏頭坐童林含笑回答家事太忙你一向可好説著進了更房一同落座劉爺首先含笑開言道海川你是個沒事的人我們幾位今天也間暇我們商量鬥個小牌你來正好咱們解解悶童林未及回答旁邊一個答道要是鬥牌可得有我童林聽了心中有些個不悅怎麼呢這個人的品行不好乃市井無賴凡是村中闊一點的沒有不怕他的因為什麼呢此人姓王排行在三小名叫狗兒外號叫青草蛇這小子在村子裏邊無惡不作何為叫無惡不作呢他終日裏在莊子裏假充光棍與人拍頭抹血欺負老實人踹寡婦門挖絶戶墳跟未滿月的孩子打架能打個十個八個的鬥瘋狗罵啞巴騙傻子這還不要緊你要是得罪了他趕到青莊稼正長成了的時候他夜間跑到你的莊稼地裏去高梁將要收成的時候他把高梁穗都給你弄了下來扔到地下要不然玉米長成他全給掰了下來扔那麼一地他也不要他是成心禍害人這還不算等到秋收冬藏糧食入囤柴草上垛夜裏給你弄把火他那個胎子身量不高橫下卻有一身藍布褲褂白襪子穿一雙踢死牛的灑鞋這個腦袋的造像四六旋不出個球來兩道小眉毛再配一雙狗眼一嘴的食火兩個兔子耳朵還真蠻橫打遍了街罵遍了巷單打單鬥還真打不過他要能打他打輕了他不怕打重了還得料理他貧寒之家惹不起他真有勢力之家好鞋不踏臭狗屎沒有那麼大的工夫理他童林是何等的人物豈能看得上他又不好得罪他常言説能得罪君子不得罪小人童林笑道三哥你若願意鬥讓你我還真沒有工夫青草蛇一聽把眼那麼一翻嘴一咧道默海川你不鬥牌你是多心我童林趕緊含笑道三哥你願意鬥我還喜歡和你來沒有你我還不來王三冷笑道是呀那麼咱們四位都是誰劉爺答言道有張二爺咱們四家不好嗎張二爺道咱們把前後窗戶滿都摘下來過堂風涼快大家説道對王三道海川你上炕裏邊去靠著窗臺面向北海川笑道就是我年輕焉能那樣子呢大家説不可拘束那麼我就斗膽依從了張二爺在東面劉爺在西面我老王坐在炕邊向南咱們牌呢大家拿過牌來放好了牌墊把牌放在當中王三説道海川你先搶牌童林微笑我若先搶我可就是頭牌哪有那麼放的呢你搶童林果然伸手翻牌卻是九萬怎麼樣是我頭牌大家言道你真有頭牌的命兒於是這四位就鬥起牌來惟有這個耍錢哪最品人的性情要不耍錢怎麼能有賭品呢劉爺童林倒是隨便無非是解悶惟有這個王三素來他的品行就不端等到耍上錢那就不問可知啦醜態百出不是摔牌就是罵街真可稱得起手握多張如擎團扇左覷人而有顧己真是望穿鬼子之睛費盡魍魎之技非得把小鬼的能耐拿了出來方才能贏錢他原本沒有多少錢坐下他就想贏輸了他就要滾賭找碴兒打架這個耍錢場呢原有這個毛病誰不會來誰不能賭誰準贏錢可巧三家輸就是童林一家贏真是錢奔大堆童林不會賭就是他贏這位王三爺真是水吊子坐在煙筒上怎麼講呢就是他沒開張他看了看自己的錢只剩下三文手裏這把牌不行底下的錢已不夠輸的看手中牌非叫七萬不行因為什麼呢六萬八萬手裏頭的張兒是腰裏插槍獨叫七萬方能滿牌他看了看牌地上的亂牌已經有了三張七萬那一張七萬還不定在誰的手內這把牌是非輸不可他一著急要用腥賭何為叫腥賭呢俗説就是偷牌他用手將亂牌裏的七萬扒拉在上面相近牌垛他是用右手去抓牌暗在拳著那三個手指上用舌一舐第二指卻不在牌垛抓牌用那三個手指上的唾沫將亂堆的七萬沾了起來將手一舉高聲叫道哈哈自掏七萬趕緊與我家裏報喜我可糊了牌啦童林眼快看見他是偷牌這個名字又叫系牌童林將自己的牌一合放在牌地以上叫道三哥這個錢我們不能輸王三把眼一瞪説道怎麼呢我好容易頭回滿牌童林你這不是給我添滿嗎童林接著説道要是從亂牌裏挑那事我也會阿王三聽罷氣往上撞忙説道你看見我挑了嗎説話之間站起身來立於炕沿之上此時童林看他惱羞成怒勢將用武童林也就站起身來立於炕裏面向王三青草蛇用左手指著童林説你真可惡遂用右手向童林面上啪的就是一個耳刮子所幸童林練過一身好武術早就預防童林見勢不好忙將左手一揚王三的手正磕在童林左臂上童林一伸手用了個黃鶯掐粟式正托在王三的脖項之上這個亂子可就大了王三來了個仰面朝天倒在炕底下他一翻身就爬起來素常真還沒吃過這個虧這可是接三的竹竿子他就火兒了一聲怪叫哇呀勢如衝鋒決一死戰無奈屋中人多連看鬥牌的共有十幾個人還能看他們打架嗎大家只得相勸自然向著童林的人多大劉爺上前相攔笑道王三弟你可不準這樣童林年輕無知有我們評理王三一看大家都向著童林明知打不出圈去便高聲喊叫姓童的我與你完不了啦童林連聲答應好好怒目相視地叫道王三今天我可要收拾收拾你啦王三聽罷氣得渾身亂抖大聲嚷道今天人也太多此處也不是打架之地擱著你的放著我的咱們兩個人後會有期再見吧王三説罷一轉身一溜煙似的跑啦這就是王三伶俐明知打不過童林自己找臺階下了打算日後暗算童林這且不表大家勸著童林童林餘氣未息劉爺説道海川你這是多餘跟他對什麼常言有話人不跟狗鬥其實我們大家也看見他偷牌啦你就裝作沒看見其實他也螺不了你必得想明白鬧起來有什麼意思再説有我們在場還能叫你吃了虧嗎我見見王三日後與你們和氣和氣還得與你們見個面免得日後誰找報誰再説倘若此事要是傳到你們老人家耳內我們不是都不好看嗎得啦你也消消氣千萬別把這件事放在心上童林道這東西真是可惡我早就記著他啦不是一天半天的要不是衆位在其中解勸今天非管教他不可大家一聽齊笑道得啦童林別生氣啦跟他也不值來來來咱們三家鬥吧童林説道天也不早啦我也得回家去今天與王三賭氣若叫我父親知道反為不美咱們是改天再見我得回家看看於是就收拾收拾自己東西便與衆人告辭回家出離更房一邊走著一邊心中暗想王三這小子真不是好人倒得留心防備他點才是自此到家後日夜防範好在沒事雖然如此常言有句話好事不出門壞事行千里這天外面評論此事這一評論不要緊一傳十十傳百可就傳到童林父親耳內他老人家雖聽説童林在更房日日鬥牌又與王三打架究因不知細理他老人家也不追問自此在童林的身上可就留上心了老人家雖然年邁精神倒是很好對於莊稼院的日子克勤克儉一到晚間自己點著燈籠前後院都要看一看門都上好這才安歇睡覺一到清晨起得還早雖不比朱夫子治家的格言也要清晨早起灑掃庭階內外整理天天起來將屋中收拾乾淨用掃帚把前後院都掃乾淨這一日正掃門前有鄰右幾個孩童在門前亂跑內中有一個小孩名叫小二哥老人家很愛惜他機靈遂問道你們做什麼去別跑看拗著吧小二哥仰著小臉笑道我們上西村口玩耍去老人家點頭小二哥你要上西村口看你大哥童林在更房裏做什麼呢與我送個信來我給你錢買點心吃好孩子你去趟吧小二哥答道我去你等著説罷帶著一頭狗兒一群小孩走到更房往裏一看可巧童林在此正在那更房裏面坐在炕上面向著裏鬥牌呢小二哥看見如此景況遂叫三頭狗兒你們在西村墳地等我我與童老伯送個信去來至東村口正趕上他老人家將掃完門前小二哥遂叫道老大爺童林大哥在西村口更房裏鬥牌呢耍還不小老人家聞聽概不由己心中有氣內中暗想莊稼人除去春種秋收別無消耗吃喝無非村中鄉糧嫖之一途村中無有唯賭之一道甚為可畏可以由淺入深家中五十畝良田不足以供賭品想至此老人家焉得不惱遂叫小二哥回手掏了兩文銅錢給你買點心吃小二哥説道謝謝你接錢去了他老人家將掃帚往肋下一挾往西村口而來臨近更房早看見童林手握多張紙牌面向裏正在高興之際童懷有心到窗下伸進手去抓住童林重責他一頓又恐怕傷了鄰右的臉面倘若童林還口又怕人恥笑教育有乖雖然是當面教子總也得與他留些個體面不如先進到裏面間坐裝作沒看見他他若知改前非那還罷了他若不改然後再責罰於他衆鄰也沒的可説這就是童懷的老成之見於是遂走至更房之內説道衆位解悶大家這才看見童懷大家拱手道請坐吧惟