二人收弟子無多只有你兩個師兄皆都是帶藝投師就是你作科十五年日夜苦練可折為三十年的學業你頭一個師兄四川人氏姓明名燈字照遠江湖人稱賽北俠現在不知在於何處第二師兄乃是出家的和尚綽號人稱長眉長老亦不知所在今命你下山得使我二人再與你收個師弟相助你興一家門戶門戶之中五戒你可願聞童林聞言弟子願受教但不知何為五戒望恩師指示銀髯仙長説道你我門戶之中以五戒當頭第一戒戒的是色行俠作義學會高來高去夜間在外面作事見了女色妄動邪念門戶之中所不許你若犯了色戒見美色動淫心若有敗行之舉為師必取汝項上之頭懸於山門外柏樹之上柏樹即汝之師不能令汝破壞門戶此謂第一戒汝可願遵童林答道弟子願守第一戒弟子願聞第二戒銀髯仙長説道第二戒就是盜戒汝學會小巧之技竊取之能汝若行於熱鬧市井之中觀看銀樓緞鋪大戶之家金錢滿目妄動竊取偷盜之心你若將金銀偷到手內任意揮霍你不管被竊熱事人員有性命關係此謂傷德我們正大的門戶豈能令汝竊盜以毀壞門戶的名譽若犯此戒必當斷汝之頭以清門戶童林答道弟子不敢願遵第二戒弟子願聞第三戒銀髯仙長説道就是不準賣藝旁人賣藝皆學的是花拳你我練的功夫與花拳不同若要將黃金之藝扔之於地之上豈不可惜練著又不好看又與門戶無光反受旁人非議豈不有傷門戶你我門戶之中並沒有在外賣藝之人若犯賣藝之戒定取汝之頭懸于柏樹之上童林答道弟子願遵這第三戒並請教第四戒仙長説道這第四是藝不輕傳弟子不知願聞示諭銀髯仙長説道你若問就好有一比比作什麼呢就拿你我師生説我二人身藏絶藝隱避深山實指望修得飛升羽化離魂奪舍效純陽之故轍這飛升羽化離魂奪舍效純陽之故轍都是什麼呢這個道家與和尚原是兩道和尚修的是陰道終日打坐參禪修成為鬼仙這個道教修的是金丹已成必當離魂奪舍就是自己的肉皮囊能夠魂靈出竅在四外雲遊若遇有富貴之體能把魂靈投入可以肉體成仙就拿八仙之內純陽呂祖惟有他修道最難他原是漢朝人修練到唐朝他的大道還未成皆因欲赴瑤池朝拜王母他找了個僻淨陋室內打坐他的魂靈去朝王母蟠桃會赴畢回歸時他的肢體已然腐爛不堪由此他的魂靈兒飄飄蕩蕩正值唐明皇駕崩他的魂魄投於明皇之體若不然到如今畫八仙有呂祖穿黃袍非是自己的形體乃唐明皇之尸體因被呂祖奪去書歸正傳銀髯大仙説與草木同苦修成大羅金仙奈因絶藝未有人承受我二人行於山谷之內你追趕我二人欲拜為師豈非是緣在三生就説我二人有此絶藝欲尋汝這誠實弟子就是打著燈籠尋遍天下亦難以尋找怎麼呢就説十五年寒暑日食不過白飯渴飲山下清泉連鹹菜也沒有你忍得了勞耐得了苦專心習學別人恐難做到就説家有萬貫富有資財欲拜我二人為師我二人若為黃金白玉所動豈能將絶藝授汝就譬如這樣説我將絶藝傳授於你你奉我二人之命下山若與人動手一掌將人打死按你我門戶之戒的規矩殺人償命欠債還錢自己就得投案豈有殺人放火自己逃走的道理就得遵國家王法與人抵償你若與人償命我二人十五年的苦工傳授於你心血耗枯這豈不竹籃打水落了一場空嗎如同我二人藝傳匪人童林聞聽心中暗想學會武術何用必當問個明白童林隨又問道弟子蒙師之教學會武技恩師又不讓與人動手恐傷人之性命但不知武術用於何所望恩師指教銀髯仙長説道童林你化解不開武術原有大用往上説報效疆場往己身説可以保護身體非不令你與人動手是沒有武術的人不準與他動手你若打在他的身上輕者重傷重者喪命他沒有武功豈能禁得住你打這是不準你與人動手的理由若真遇見有能力的有好武術的能人你要與他動手的人如果動起手來這還不準你讓他要遇見對手時與他動上手你的眼要賊步兒要隨心要穩手要準打上他要狠為什麼要狠呢因為你打輕了他他不知你的門戶厲害若要打重了他他才知道你的門戶不好惹你的門戶由此可自興一家這個藝不輕傳非是不讓你傳授武藝是藝不傳授與匪人若不傳授與人豈能自成一家門戶呢還怕人不學呢是擇良者而授教這就是第四戒要謹記在心不可輕傳匪人童林答道弟子願遵師命何為第五戒銀髯長老説道這第五戒就是本身的責任何為叫本身的責任就是自己的一身全挂子武術身背負者天職就是國家辦不到的事比如貪官酷吏惡棍土豪他們所做的事國家豈能知曉這可是你當盡的義務應當你我終日裏浪迹萍蹤與人排難解紛自己原無事枉為他人忙喜忠正惱姦猾殺姦誅佞除惡安良搭救忠臣孝子義夫節婦若有忠臣遭屈孝子被難只要自己知曉不辭千里前去拯救除暴安良這就是本身的責任你若背門戶之中五戒錯行道路定取汝首懸於臥虎山柏樹之上童林跪叩弟子願遵門戶之中五戒弟子有一事不明望師指教銀髯仙長説道為師若有不對你只管言講童林答道弟子蒙恩師之教一不準竊取偷盜二不準打把式賣藝弟子有通身的武術奉師命下山興立一家弟于思想已久弟子怎樣求其衣食哪里找飯銀髯仙長大笑道癡哉童林萬朵桃花一樹生天下武術是一家用之于國與國家出力報效國家不用將自己的包袱一背走遍天下遇有村鎮若有把式場子走在裏邊道聲辛苦請教師答話照著原先我告訴你的規矩不但他管飯臨走的時候還得與你帶盤纏錢童林一聽好在還有這麼一個飯門文武聖人所留沒有餓死的道理文的亦叫遊學念書人學而未成不能入仕落魄江湖小書箱一背到了鄉下叫串書房到裏面先放下書箱與聖人神位作個揖然後與教學的夫子談話人家亦得管吃管喝可有一樣不能白吃吃喝已畢人家先生把大學長文章拿過來叫你給批點批點你若告訴我不認得字那可不行就趕出去啦這個學武亦是一樣的道理童林説道願遵恩師的教訓弟子敢問恩師姓氏望請賜教銀髯仙長説道你別忙我還有事仙長回手在神廚內拿出一個小褡褳裏面裹著一對子午雞爪鴛鴦鉞交與童林仙長又拿出一個包袱來命童林打開觀看裏面土黃布的褲褂白骨頭鈕子左大襟抄包一根鞋襪全份俱是新的命童林更換童林遵命背轉身將鞋襪新衣換齊將舊的包於包袱之內仍然交與仙長仙長將包袱放在神廚以內隨手又拿出一本書來交與童林説道汝生平所學都在其中矣童林跪接展開觀看裏面俱是畫圖飛禽走獸水蟲靈動之物童林看不明白啓稟恩師弟子所學並非圖畫恩師何言所學盡在其中呢銀髯仙長説道汝好不明白汝豈不聞軒轅黃帝指猿猴而留技藝猴有三躲六閃之功虎有三絶察天地之氣候訪萬物之靈動遠取於物近取於身哪一件技藝不是由靈動而求童林恍然大悟只因黃帝察萬物之靈都有天然躲閃之能力不但猴兒只要有吸呼的靈氣他就有保命的祕訣將這些學在自己的身上這就叫遠取于物近取於身今之行意拳也是行發心意求於靈動的絶藝故名行意即此謂也銀髯仙長命童林將此書收好命童林隨時習練童林將書帶於小褡褳之內將雙鉞一邊一柄插在小褡褳之內銀髯仙長用手一指花白髯的仙長他這位恩師姓何雙名道源江湖人稱太極真人我姓尚名叫道明江湖人稱無極子我二人隱迹多年無人知曉千萬不可令旁人知道你我師徒一場無物可贈我二人清苦並無積蓄今有紋銀一兩相贈與你作杯水之資遂由兜囊之中取出銀兩交與童林童林接過觀看俱是零星碎塊小小的紙包兒隨手掖在抄包之內復又行禮謝過恩師銀髯仙長説道徒兒免謝吧説著話二位仙長站起身來往外相送隨走隨説道你到家中見你父母多多替我二人問安童林只得將小褡褳扛在肩頭拜別二位恩師走出山門之外童林説道弟子豈敢勞動恩師遠送請恩師回廟尚仙長説道你路徑不熟待我指引於你師生三人隨下山往北行至不遠又是一矮嶺二位仙長帶童林上嶺來到嶺上用手往北一指你來看這就是臥虎的前山你來的時候是誤入後山因而迷於山谷你看前面茂林正北便有大道可通於京師你沿途保重回家替我二人問安童林聽罷不由得心中一酸可惜十五年師生感情甚厚不忍相離今又奉命歸家省親又不敢不遵遂含淚説道今與恩師相別但不知何日方能相見尚仙長用手一指你來看青山不老緑水常存他年相見後會有期童林於是跪倒與恩師告辭遂站起身來不由得珠淚雙流只得與恩師相別這就是丈夫淚兒不輕彈只因未到傷心處童林也是不忍分離走十步九回頭仍然看見仙長在山嶺上目送其實二位仙長也是難舍童林依然遠望不表二位仙長再説童林只得往前趕路走至樹林之內回頭一看為樹所遮竟看不見二位恩師童林跺腳而言恨童林無伐樹之能不得觀看恩師誰有伐樹之能呢三國劉皇叔伐樹送元直方有走馬薦諸葛之故事童林挂念父母歸心似箭只得賓士道路就走下來了穿過樹林直奔通京師的大道往前行走正行之間已至巳牌時分覺著腹中飢餓只得回手往抄包內一摸銀兩毫無蹤迹童林出了一身冷汗常言有雲有錢走遍天下無錢寸步難行這便如何是好要知童林怎樣歸家如何初試絶藝請看第二回便知分曉
