body:
  text: 第三十九回四劍客會破玲瓏島西方俠潛江擒二小上回書説到張子美一鐵扇子把韓忠砸死賀永與賽判飛行俠苗澤動手賀永雙手合狼牙釧泰山壓頂奔老俠頭頂砸來苗老俠用的是以巧破千鈞跨左步刀走外腕一手紅雲捧日刷刀刃沖下就奔賀永胸前扎來萬沒想到正在這個時候韓忠死了賀永不由地回過頭來一瞧他一回頭苗爺的刀尖就點上賀永的心口窩了噗哧刀扎了進去紅光一起鮮血迸濺肚子裏的零碎往外一流賀永慘叫一聲也躺在船板上了賀永是陝西人他家鄉會武的很多遍及南七北六十三省賀永落在雲南雖然他死於賽判飛行俠苗澤苗潤雨之手但傳出去可就不是那麼回事了而是童林致死了賀永人家賀永的本家親屬能不找海川報仇嗎這樣就生出很多的事來賀永韓忠一死玲瓏島就塌了半截天法禪和尚跟自己的師兄動手人家北俠秋田多大的份呀一壓大鏟順劍一抹一剪他他往回下一扳鏟北俠秋田的大寶劍就朝法禪和尚的脖子來了正在這個時候靠南山根蘆葦裏邊竄出一條小船有人高聲喝喊諸位仁兄賢弟為我侯廷擔驚受怕了侯振遠站在船頭他旁邊站著一位老仙長個不高白眉毛慧眼遙觀金光四射挽著一個小髮髻金簪別頂一部銀髯青道袍系水火絲縧這人是北俠秋田和鐵臂羅漢法禪的授業恩師知機子穀道遠沒想到莊道爺尚道爺何道爺谷道爺四劍客在此聚會其實這些動手之人大部分都是他們老哥四人的弟子侯老俠怎麼會跟穀老劍客聚到一起呢原來昨天晚上侯振遠一看海川跟到那塊大石頭上去了也跟著一拔腰上去了再看海川沒了就知道要壞事他的意思也要跟著往前來猛然間身背後有人拍他的肩膀頭侯振遠右手一推啪一掉臉沒有看真那人他就跟一縷青煙似的落在蘆葦的深處去了一個聲音説道老檀越請這邊來侯振遠想這是誰呀也顧不得找海川了拔腰就奔聲音過來了趕到近處他才看清這裏灣著一隻船船頭上有篷颳風下雨不礙事船上有兩個水手船篷裏頭點著燈在自己眼前頭站著位老仙長侯振遠忙抱拳施禮道仙長爺你叫我老檀越你到裏頭來一挑布簾二位一前一後進了艙裏頭還很乾淨有住的地方能吃能喝鍋盆碗竈全有借著燈光可以看得出來這是一位了不起的人物侯振遠問仙長爺你呼喚弟子侯廷請問你怎麼稱呼仙長看鎮東俠彬彬有禮微微一笑老檀越貧道姓穀雙名道遠闖蕩江湖有個美稱叫知機子鎮東俠肅然起敬施禮道哎喲喝久聞前輩的大名今日一見實為幸會谷道爺道阿老檀越免禮免禮你這邊來我給你點東西老仙長到桌子旁邊貓腰往桌底下一伸手拿出個包袱來放在桌子上邊老俠客你看看侯振遠一看阿地一聲驚叫原來是劉俊丟的那個小包袱海川的兩身褲褂還在裏面龍批大票也在裏頭侯振遠一看忙跪下道前輩呀晚生失禮我給你磕頭了仙長伸手相攙無量佛你起來起來侯老俠客你跟佩雨都是好朋友咱們見面就有緣請坐吧爺兒倆坐下後侯老俠道請問前輩呀這個包袱怎麼落在你的手裏你又如何到這裏的仙長一笑無量佛説起來話很長阿老仙長穀道遠為什麼來到江南因為他雲遊四海行無定所這一次回來他才知道八卦山鐵善寺的事情老仙長一想這個可不大好辦因為童林是自己兩位師兄的弟子可是李昆也是師兄的弟子老哥兒四個在一塊兒耳鬢廝磨穀道遠還是比較講理的唯有莊道爺有點護犢子護短而且我徒弟秋田也涉足其中九月九以前老劍客爺就來到黑熊鎮他和黑熊鎮黔南客棧掌匱的是朋友這位掌匱的可了不起姓王叫王鳳江湖人稱天靈俠王鳳使一口單刀很俊的功夫他有一個弟弟比他小得多兩口子染時疫而亡他的弟弟跟弟妹兩人留下一個姑娘王鳳就把這個姑娘留到自己的家中教給姑娘能耐拿姑娘當兒子養著姑娘的能耐學得很好他管王鳳叫爹爺兒倆在後面收拾出一所房子就使到後院來了一邊練功夫一邊照顧這店老道爺谷道遠跟王鳳很不錯所以就來到黔南客棧夥計一看這可新鮮因為出家的僧道住店的太少了夥計往裏讓道爺出家人住店的很少沒想到你不怕花錢無量佛你給我換個後院比較幽靜的地方貧道恨吵恨鬧夥計答應把谷道爺帶往西院北房三間屋裏收拾得很乾淨谷道爺坐下了擦臉漱口喝茶把夥計叫過來説我一個出家人住你這麼好的店有這麼多錢嗎夥計心説這道爺有病吧不是説讓我給準備一個很幽靜的屋子嗎既然住不起可以再找別處嘛你為什麼擦臉漱口之後坐到這裏又嫌貴呀道爺你要如果住不起我可以給你改換一下穀道爺想了一下擺了擺手行了不用了讓我兒子給拿錢吧夥計一聽覺得更新鮮了出家老道有兒子這可是位風流老道喲你有兒子你是個出家人哪里來的兒子穀道爺一聽很不樂意呀把臉往下一沈胡説出家人就不許有兒子啦沒有真兒子還沒有假兒子嘛喲道爺你這兒子在哪呢跟咱們這裏有什麼關係對是在你們這裏開店夥計一聽才知道是掌匱的乾爹便問你説的就是我們掌匱的王鳳嗎道爺你稍候我給你叫去夥計見到王老俠一説王鳳就知道準是穀老劍客來了趕緊跑進來道哎呀老前輩阿你來啦我給你磕頭説著跪倒就磕穀老仙長趕忙用手相攙王鳳細問你從哪兒來谷道爺把自己的事都説了王鳳聽完便説默你還提呢我們這個店都包給人家侯振遠童海川了就把事情也由頭至尾一説谷道爺點點頭王鳳阿濟慈濟源是我的師侄童林也是我的師侄我無法插手金磚不厚玉瓦不薄我看你呀最好別讓他們認出來要認出來你是管呢還是不管你跟鐵善寺的人也是朋友阿王鳳説你放心我管這個幹什麼你都不管我也沒那麼大的份兒阿到了九月九日谷道爺説不去其實頭天晚上可就去了他剛到鐵善寺的後山就發現越牆來了一條黑影刷身法很快谷道爺可就背到一棵樹後面觀看這個人鬼鬼祟祟地提了個包袱他就是八卦山的七莊主清風過柳柳葉貓韓忠他越牆進來以後大傢夥兒都在大廳內議論明天的事兒東配殿沒人他進去了一伸手就抽出一個包袱來然後提著這個包袱越牆出去韓忠心説這包袱裏有什麼呢他找了一棵大樹把這包袱擱在眼前的地上又從百寶囊中掏了白蠟撚兒火摺子點上白蠟撚他貼到樹上低頭一看阿就在他晃火折的時候這包袱沒了韓忠嚇出一身冷汗這是誰呀往四外看了半天什麼都沒瞧見把韓忠給嚇跑回山了老仙長穀道遠提著這個小包袱就回到了黔南客棧越牆進去來到的自己屋中燈光點亮把包袱打開一瞧有一張墨魚皮和一張龍批大票谷道爺心裏説侯振遠呐你的這些人太疏忽大意了龍批大票都叫人給偷走了如果這龍批大票落在歹人之手你童林即使把韓寶吳志廣給拿住你往哪里交待谷道爺又看了看墨魚皮琢磨著我乾脆給它做出來得了第二天谷道爺拿筆開出方子又把王鳳找來讓他按照藥方去配藥王鳳挺納悶問老前輩要這些物件幹什麼呢我得了一個包袱裏面有一張墨魚皮嗷是不是麒麟山洗硯池那個墨魚谷道爺點頭對了王鳳一聽心裏非常可惜呀哎喲那麼好的東西誰給毀了仙長搖頭這個咱們不知道哈我把它做成件鎧甲吧你是修好積德這又是寶物刀槍水火都不怕呀谷道爺把墨魚皮做成鎧甲後依然把包袱包好了每天打聽劉俊下書三人夜探八卦山被困十八棵楊這些事情老仙長都知道最後十老請八卦會太極老人家也讓王鳳給雇了一條船去了八卦山鍋臺爐竈柴米油鹽船上都有船上還有兩名水手伺候老仙長格外周到老仙長提拎著包袱就上了小船順著江岔子放到南盤江內到了試藝五絶法禪僧這些人奔玲瓏島逃跑老仙長全知道這天晚上船就停在玲瓏島的南邊蘆葦蕩中劍客爺心裏想道要説司徒朗不是個東西我早就知道但是你們不能犯國法韓寶吳志廣犯的是國法呀把皇上的東西偷了他們哥兒倆就算完了要領法呀你司徒朗長著幾個腦袋你助紂為虐使韓寶吳志廣對抗朝廷今天晚上我就進山我要責備責備司徒朗如果他不聽我的話我就把這孽障給拿了老劍客谷道爺正在船上站著想呢突然發現童林侯振遠説話童林走了這才上來把侯振遠引到了船上谷道爺把自己的事情由頭至尾説了一遍侯振遠並不隱瞞八卦山的事情從頭至尾也詳細稟明然後説道老前輩阿晚生和我的師弟童林一起來到玲瓏島司徒朗這人意狠心毒玲瓏島裏頭消息埋伏重重我兄弟一個人進去晚生可不放心呐穀老仙一擺手自己沈思一下無量佛你儘管放心你把包袱看住了好好地在船上休息一會兒貧道到山裏頭去看一下你們對於消息埋伏轉輪走弦一絲不通萬一碰上了那就不得了侯振遠在小船上呆著像熱鍋上的螞蟻一樣來回轉悠直到天快亮谷道爺回來了侯振遠問老前輩呀此番進玲瓏島你看見我兄弟了嗎老人家這半夜工夫查遍了全山早晨回到船上對侯振遠説道你的兄弟並沒有遭什麼凶險你只管放心聽了老劍客爺這句話侯老俠才放下心來天光閃亮就聽見外面喊殺聲震天噹啷啷鑼聲響亮把兩個水手都嚇壞了谷道爺一聽可能前山有了響動了也許有人來攻打玲瓏島咱倆去看看侯老俠立即答言是晚生遵命谷道爺讓水手蕩槳搖櫓由蘆葦中出來爺兒倆站在船頭老俠侯廷腳下放著包袱左手按著龍淵寶劍旁邊站著老劍客知機子谷道爺小船往北這麼一轉哎呀看見大船之上打得難解難分風流俠鐵扇仙張鼎張子美一鐵扇子把七莊主韓殿遠給打死了北俠秋田的轆轤大寶劍正放在鐵臂羅漢法禪僧的脖子上正在這時候侯振遠高聲喝喊衆位仁兄賢弟侯廷在此法禪僧往喊聲處一回頭稍一走神北俠的手腕就這麼一顫法禪的脖子就碰在秋田的轆轤大寶劍上了北俠秋田就勢一拉劍嗤鐵臂羅漢法禪僧鬥大的人頭落在船板之上尸體往前一栽撲嗤一腔子血噴出來了北俠秋田熱淚滾滾一陳子難過師弟呀司徒朗一看你這不是貓哭耗子假慈悲嗎這時候侯振遠的小船就奔王爺的大船了老俠于成這些人可全在王爺一看侯振遠來了就知道司徒朗在説瞎話既然侯老俠生還可是海川呢説話間小船到了爺兒倆一前一後拔腰上來提拎著包袱王爺一看這包袱老俠客昨晚上遇到什麼事了老俠客遞過包袱你看這是什麼王爺又喜又驚道阿龍批大票侯老俠點頭道還有墨魚鎧也在這裏快交給劉俊吧劉俊趕緊過來接包袱給師大爺磕頭阿老人家謝謝你侯老俠這才把老仙長請過來説道老前輩阿這就是千歲爺當今萬歲爺的四皇子固山多羅貝勒府的雍親王爺侯老俠一指谷仙長王爺這是我哥哥秋佩雨授業的老恩師知機子穀道遠穀老仙長衆雄也都呼啦啦地圍過來了王爺一聽哎喲老仙長連連地作揖谷道爺趴在船板上給王爺磕頭啦貧道谷道遠拜見千歲王爺絶不能讓谷道爺磕頭雙手抱住哎喲我早就知道你的大名沒有機緣跟你見面今天跟你一見真是三生有幸你們爺兒倆這是打哪來呀侯振遠就把昨天晚上的事全説了北俠秋田來到恩師的跟前熱淚盈眶跪在船板上恩師呀弟子拜見弟子誤傷師弟在恩師面前請罪秋田你起來像法禪這樣的人作為一個和尚不守僧門之戒作為一個武林弟子不守俠義之規分明是罪有應得咎由自取他已不在我門牆以內有道