羅漢吳成還真沒招兒只見他往前這麼一趕步雙手一晃面門一擡右腳照著一棵苗禿頭義士馬亮的小肚子上就踹馬亮一瞧這我還能贏不了你呀眼看著吳成這腳踹來了馬亮就勢往後一撤步雙手一合兜吳成的腳後跟馬亮心説你吳成的招數並不那麼靈敏呐你就是這靠山背一招好我只要拿這兩隻手一抄你的腳後跟就把你扔個大高吊兒哈哈小子我當初闖蕩江湖的財候還沒你這一號呢我想贏你那還不是拿過來你就趴下嗎只見馬亮往後一撤步雙手這麼一兜正把吳成的腳腕子給兜住吳成一瞧壞了人家一扔我可就把我扔個大跟頭吳成因為練靠山背他的底盤功夫好就跟那摔跤的一樣底盤功夫得有徑他一著急往回下裏使徑兒一收腿在馬亮還沒發力的時候猛地一蹬徑兒這一棵苗禿頭義士馬亮還不願意撒手吳成這徑兒又大了點兒馬亮就隨著吳成這一奪腿他往前一栽身這禿腦袋正沖著吳成吳成一想得了我揍你一下吧一伸右手照著馬亮的禿腦門上啪就給了一掌只見馬亮噌噌噌倒退出七八步呱唧一個大屁股蹲兒他這麼大年紀險些沒給墩壞了馬亮覺得腦門子火辣辣地疼屁股也疼眼前頭直冒金星好半天才喘過這口氣來他一隻手胡擼禿頭一隻手胡擼屁股噘著嘴説道好小子你這叫什麼招兒吳成也説你那叫什麼招兒阿幹嘛單問我什麼招兒阿小子你輸了沒有輸了就滾人們這個樂呀像贏馬俊跟馬亮的這招兒阿都不是吳成贏的是他們自己把自己給整輸了馬亮臉一紅我長這麼大頭一回瞧見這招兒哩胡擼著自己的禿腦門兒順著梅花圈上跳下去了吳成往這兒這麼一站還有哪位上來再沒上來的這十三省總鏢頭可就是我們雙龍鏢局的啦猛然間正西方西勝鏢局內有人如燕子三抄水一疊腰飛身形來到梅花圈上等等怎麼能説十三省總鏢頭是你的呢這時所有群雄老少王爺他們在雙龍鏢局的鏢棚內攏目神往梅花圈上看是野飛龍燕雷燕子坡這一下雙龍鏢局的人全都長了精神因為誰都知道他打過甘虎同時誰都知道海川對他真不錯燕子坡大高個兒渾身的練子肉穿著藍綢子長衫腰裏扎著絨繩白綿綢的褲子汗衫兒薄底兒的靴子辮子盤在脖子上黑黲玲的臉膛兒濃眉闊目鼻直口方大耳垂輪雄赳赳氣昂昂要説燕雷那可有份兒阿鐵羅漢吳成一看是燕雷就氣打心頭起惡向膽邊生用手指點姓燕的我師徒與你仇深似海你打得我師哥甘虎吐血今天我非要你的命哈哈吳成阿要我的命你今天拿了去要不了我的命你這小命兒就很難保了鐵羅漢吳成往前這麼一投身説真的不是這種情況他還是不能先動手因為他沒招兒阿吳成伸左手一晃面門右手的拳頭就到了惡狠狠對著燕雷的胸前就是一拳燕雷往左一閃向前一趕步雙手直奔吳成的兩脅就這一下正擠到吳成的胸口上啪就把吳成震出七八尺去叭唧就摔在地板上了猛英雄就覺得自己五腹六髒一翻個兒眼前頭一發黑一咬牙兩隻手一按台板兒要想起就沒起來一口血撲地就噴出來了當時往後一仰就躺到那兒了野飛龍燕子坡兩隻圓眼睛這麼一睜一瞪眼甭説你就是你師父來了他也不成剛説到這兒梅花圈中落一個人來身輕似落葉往這兒一站正是鎮八方紫面昆侖俠童林童海川英雄飛身形登了梅花圈一陳冷笑吳成阿在你練藝時時候為師是怎樣地囑咐於你練藝之時多加小心要刻苦用功你今天出頭露面來到梅花圈上領教天下的群雄武術不過是逢場作戲點到而止又誰想你來到梅花圈連贏了幾陳所遇的還都是武林出衆的英雄好漢他們當中有的是有意讓你一招兒而你就任意地倡狂嗎雖然説咱們師徒的武術平常可是咱們爺兒們所學的都是光明磊落之技要像那種以德報怨仗勢欺人以多為勝不倫不類寡廉鮮恥的人在梅花圈上與你動上手你就不應當讓他而是發招要準打上他要狠不怕失手把他結果了性命那就算是他惡貫滿盈咎由自取俠義道本著除惡人即是善念的宗旨也應當把他置於死地據為師的眼光看剛才被你打下去的這些人屈指一算整整的十名看他們的武術也都不是尋常之輩可是竟被你不費吹灰之力把他們打下了梅花圈何況這位燕老師呢顯然你是讓著他啦你可別跟為師學阿為師以前看這位燕老師父堂堂儀錶非俗認為他是武林之中的正人君子也夠個朋友又誰想他的所作所為居心叵測實在叫為師失望阿得了既然把你打吐了血了你還不下去嗎這時候黃燦潘龍早派人上來把傻兄弟攙起來了鐵羅漢吳成心裏頭一陳子難過阿師父的話自己哪能聽不進去呢自己輸了招兒師父還要給自己遮蓋不讓自己丟了名譽唉猛英雄長歎了一口氣那個意思是師父我不能給師哥報仇了我雖然被燕雷打倒了但我也不能忒讓人家看不起了鏢師夥計們要攙他黃燦潘龍説師弟阿來吧隨著哥哥我走吧猛英雄搖了搖頭自己走下梅花圈下了梅花圈可就走不了了潘龍一下腰把師弟就給背起來了黃燦在後頭扶著鏢師夥計們跟在後頭大家一直往北進了雙龍鏢局南號鏢棚順著樓梯上來進到棚子後頭大家可全站起來了連王爺年大人都過來瞧南俠司馬空過來把衣服撕開一瞧老仙長就一皺眉阿燕雷這個東西好狠阿幾乎就要把吳成一掌打死阿老仙長趕緊拿出藥來先給吳成敷上然後把內服的藥讓吳成服下去止住了疼又給他漱了漱口擦了擦嘴有專人這裏照顧著大傢夥兒才來到前面落了座衆人議論紛紛地談這碼事再往梅花圈上看海川可就過來了一抱拳燕老師父我弟子無禮你多多地原諒阿你別看海川臉上帶著笑容説話很和氣可海川已經蘊怒於心