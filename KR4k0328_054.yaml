body:
  text: 第五十四回鐵羅漢臺上勝十傑童海川惡鬥野飛龍上回書説到亮鏢會西方俠于成等群俠陪著王爺年大人海川繞場一周從北面三家鏢局轉到西面當中才發現這位老仙長穩坐在棕團之上西方俠于成暗暗地跟王爺説看見沒有王爺點了點頭我看見了大人跟海川看見沒有海川點頭我看見了哥哥這是誰呀哈哈今天這場鬧事兒的總頭兒就是他這就是劍山蓬萊島的首席軍師雲台劍客燕普燕雲風西方俠于爺那個意思呀也暗含著示意大傢夥兒你別看這麼多的鏢師夥計連你我都在內大傢夥兒合在一塊兒也幹不過他這個人要奪取十三省總鏢頭燕普燕雲風這個人喜怒不形於色他發怒的時候臉上不帶出來他高興的時候臉上也不帶出來衆人再往兩旁看賽南極諸葛宏圖雲霞道士杜清風野飛龍燕雷燕子坡聖昆侖歐陽致正玉面童子白昆插翅灰鶴左金童百步神拳石天龍隔山打虎石天風禿頭義士馬亮紅毛禿頭狸子馬俊金頭龍趙登鐵銀龍趙亮再往下天海神鱉班竇生閉目金蟬班竇佛攔江蛇顧忠橫江蟹周義九尾龜謝文醜鎮江狸謝文治鬧海金甲何清泰海底金蝦何陽泰等不下六七十位全在這兒坐著呢在上垂首樓梯口兒挂著一杆鏢旗紅緞子旗面上有字北京城前門外北孝順胡同西勝鏢局鎮西方閃電神底下一個鮑字王爺看得挺清楚上垂首這位花白鬍子大個兒是鎮西方鮑古鮑天機下垂首也是位大個兒花白鬍子説不上但是有幾根兒白的也十分雄壯叫閃電神鮑圖鮑殿元等大傢夥兒再往前走過了西勝鏢局路西又是一家鏢棚樓梯口兒一把椅子一杆鏢旗上頭有字北京前門外西河沿東光裕鏢局金弓小二郎李李國良這兒坐著呢王爺可認得他當初王府那位教師爺神槍花逢春就是李國良給介紹的李國良趕緊過來給王爺磕頭請安後跟西方俠于爺這些人見面國良阿怎麼兩次杭州擂你沒去呀老爺子我不是要去嘛就是太忙顧不過來了國良我可要開鏢局跟你爭點兒買賣老爺子你這是給我們鏢局子裏頭添彩兒呢你幹這個我們大傢夥兒都高興你爭不著我的買賣我不往你那邊去寒暄一陳以後可就往東來了就是南面兒的三家中盡西頭路南的第一家這一家大傢夥兒都認得原來是營口水發鏢局神槍張凱張四爺正坐在椅子上這時趕緊站起來跟王爺同西方俠于爺一塊兒見禮年大人心説王爺這一次下江南可認識不少人連這人物都認得大傢夥兒説了一會兒話又往東來這是南面的當中一家也是三間口面可沒有西勝鏢局那麼大鏢師夥計坐著不少樓梯口兒一杆紅鏢旗杏黃的燈籠穗兒杏黃的飄帶兒金槍罩頂杏黃的纓子上頭有字北京城前門外糧食店鎮北鏢局在裏面椅子上坐著個人這人是個大高個兒前胸寬臂膀厚虎體熊腰四方的一張大臉黑黲黲的臉膛五官端正新剃的頭皮兒黢青油亮亮的肋下佩著一口刀這人就是塞北宣化府東北裏忠勇義士古雷古鎮北的師弟叫鎮北天尊羅雷于爺跟他師哥古鎮北有很好的交情羅雷這個人性情十分爽直但是也很古怪嫉惡如仇如果他知道你是下五門的賊那你見到他就跑不了非逮著你不可而且逮住你並不拿刀殺你也不刨個坑把你活埋了而是左腳一踹胸口兩隻手一摳下巴頦兒非把腦袋給揪下來不成下五門的賊人發現了鎮北天尊都捂著腦袋跑怕他把腦袋給揪了去于爺跟羅雷説完話又帶著大傢夥兒往東走這就是南面的三家最末一家浙江紹興府鎮遠鏢局神鏢手黃仙洲王爺他們都認得大家再往北來也就是東面的盡南頭這家三間口面裏頭坐著不少的鏢師夥計蘇州閶門外鎮海鏢局巡府夜叉石倫石鏢主在椅子上坐著他跟大傢夥兒都認識彼此見禮各道寒暄西方老俠于成對石倫説石鏢主咱們有時間再説話我陪著王爺轉轉老俠客爺你轉吧王爺過了這事兒我要給你到府上請安去説著大傢夥兒往北來正中這一家是蘇州胥門裏鎮南鏢局鏢主是長臂仙猿陸永傑所有的鏢師夥計各就各位陸永傑跟大傢夥兒也都是熟人見王爺西方俠于爺南北俠等衆人行完禮之後大傢夥兒再往前就是最末一家到了東北上了東面緊北頭這家是雙龍鏢局北號藍緞子旗面白蜈蚣走穗兒白火焰兒白飄帶葫蘆金頂紅纓子上頭有字雙龍鏢局北號獨占北方笑鼇頭南極昆侖子北俠客秋這裏是秋老俠的椅子按理説秋老俠應該坐在北號但是不行阿得上南號那邊去跟侯振遠在一塊兒今天是他們哥兒倆還有黃燦潘龍四個人的事情得到那邊兒商量來到雙龍鏢局的南號大傢夥兒順著樓梯上去一看屏風後頭有兩張軟榻當中還放著一張桌這時老俠于成對王爺説王爺我想年大人和你老二位要來咱立這亮鏢會弄不好就得挂晚了我怕王爺跟大人纍得慌告訴黃燦潘龍給你們老二位預備了兩張床榻纍得慌就躺那兒歇會兒説著話就進欄杆裏頭落座正居中是王爺坐的上垂首是年大人下垂首是海川挨著年大人的就是西方俠于成這邊兒就是司馬空甘雨苗澤張鼎李源這邊兒的人最多最後侯振遠跟北俠老哥兒倆一商量侯振遠説道我看呐今天能壓住咱們就把它壓住這樣吧讓黃燦他們上去讓各鏢局把所有新出世的徒弟們的花名册交上來回頭讓他們練藝小孟嘗黃燦這才來到梅花圈上道諸位同行同業們我的老師跟師伯有話咱們各鏢局子把新教出來的弟子們的花名册統統交到雙龍鏢局南號交到我黃燦的手裏説完了黃燦可就回來了陸陸續續十幾家鏢棚所有徒弟們的花名册一樣一樣都交來了上頭都有人家鏢局的名字裏頭是出師徒弟們的姓名年齡外號等侯老俠看了看對秋老俠説哎呀哥哥秋田秋佩雨瞧了瞧侯振遠怎麼著兄弟往年他們這兒可是先練功夫後吃飯乾脆今年咱們給它改改咱們就先吃飯後練功夫大傢夥兒吃完飯了説真的練功有愛看的有認為與自己無關的愛看的可能看一會兒不愛看的人家就走了可你要老不吃飯大家夥兒老在這兒盯著非盯出事來不可咱們要先吃飯呢那不愛看的一走越走人越少再出事也就大不了啦兄弟你還是真有招兒阿咱們就按你的辦潘龍你去説潘龍潘宏鼎來到梅花圈上作了個羅圈兒揖衆位往年咱們三月三亮鏢會都是弟子們報了花名先練功夫事情完了咱們再吃飯由於今年的弟子多一些我想這樣改個章程咱們是先吃飯後練如有不愛看熱鬧的沒有他們鏢局子什麼事的沒有徒弟在這兒練功的人家想走啦那也隨便大傢夥兒都同意然後潘龍傳話馬上準備底下人立刻調擺桌椅廚茶兩行一塊兒忙用清真菜的單有人家清真的廚房有清真的師父夥計用素菜的單有素菜的廚房有素菜的師父夥計用大教飯的單有大教飯的一套設備冷葷熱素往上一端大傢夥兒暢懷痛飲有吃有説十分興致飯快吃完了老俠侯振遠這才讓黃燦潘龍把所有的花名册拿過來那個意思可就要派徒弟到梅花圈上練功夫了老俠侯振遠很高興哥哥你瞧見沒有直到吃完了飯沒有一點兒出毛病的地方這可就念了佛了但願得吃完飯咱們平平安安的徒弟們練完了之後咱們一散明兒一報帳就齊了秋田秋佩雨反駁他説兄弟哥哥我才不這麼看呢哥哥你怎麼看呀恐怕這事情得鬧起來是癤子就得出膿這個時候王爺可就喊了侯老俠客哎爺駕怎麼還不打呀侯振遠心想這王爺幹嘛盼著打起來打起來就不得了啦侯振遠也大聲回王爺王爺但願得化干戈為玉帛唉不打可沒有徑爺指著你老人家跟大人在這兒一福壓百福呢你怎麼先盼著打起來這打起來傷人流血又有什麼意思呀王爺笑了咱們可以不傷人不流血但是大家必須得正徑練點兒功夫我們好開開眼正説著呢猛然間南面的盡西頭有人喊秋老俠客爺侯老俠客爺在下有兩句話説不知當講不當講秋田一聽便對侯振遠説兄弟你知道哥哥我拙嘴笨舌我可説不上話來要説話可得瞧你的老哥兒倆站在北面兒一看永發鏢局神槍張凱説真的這位張四爺為人很討厭侯振遠就問哎喲張鏢主你有什麼話説徒弟們練功與不練功不是要緊的當著咱們所有的同行同道我有兩句話要問問二位不知道該講不該講鎮東俠侯振遠沖他一笑張鏢主你也是咱們同行同道的老前輩了幹了一輩子了有什麼話你只管説我弟兄洗耳恭聽侯老俠客秋老俠客當初兩次杭外擂我張凱可都在內最後有王爺出頭給雙方説合了當著群雄雙龍鏢局化干戈為玉帛本是兩號鏢局最後成了一號也就是雙龍鏢局南號雙龍鏢局北號按咱們同行同道的關係自從十三省總鏢頭沒有了以後咱們是十二家鏢局説你有錢要再開鏢局你得附屬一個鏢局而不能出第十三個同時你這兩號鏢局要關了一個出現一個富餘字型大小自有別的鏢局往上頂現在這十二家鏢局可就剩了十一家了因為雙龍鏢局南北兩號是一個東一個西歸黃鏢主和潘鏢主哥兒倆辦了這件事情你知道我張凱也知道但是你可沒有通知衆同業這兩號就改成一號了我們大傢夥也有心背地裏頭研究研究想找找你後來一想侯老俠秋老俠都年逾八旬是武林的老前輩也可能事情多把這事給耽擱了你也忘了那麼我們也就不好意思再找你了直到現在徒弟們都要練功了我總認為你應當當衆説出這件事來因為我張凱跟二位有交情不然的話我就不管了現在我給你提出來也不知道對不對老俠侯振遠一聽心説張凱這人可厲害明明地將我弟兄一軍到了現在反説跟我們哥兒倆有交情真跟我們哥兒倆有交情你就背地裏告訴我們就成了何必當著大傢夥兒喊呢一人作倡衆者相隨萬一事情出來鬧大了你就是罪之魁禍之首張鏢主請你慢開尊口不錯雙龍鏢局是改了字號沒通知衆同業但這是由於我和秋田我們哥兒倆要管我們的弟子黃燦和潘龍的事我和哥哥雖然年歲已高在武林道可謂知名人物但徒弟要聽師父的可師父對於這行裏有規矩並不完全通曉就猶豫直到現在要説這事情沒通知同行同道還是我弟兄之過兩個孩子到底是聽我們哥兒倆的我正要當著大傢夥兒賠禮道歉把這事通知衆同業可是張鏢主你就發了言哈哈哈張鏢主咽還真是的幸虧咱們有交情你當面質問侯某要是沒交情的話你也許攥著刀拍著我的門找我去哈哈哈哈謝謝你多言了侯振遠可能説呀回答的話也很厲害張凱聽完了侯振遠的話一看沒人響應這麼多的鏢局沒有一個幫著他説話的他感覺到有點發怵同時臉臊得跟大紅布一樣老俠客爺這算晚生張凱我多嘴哈哈哈你多原諒北俠秋田聽完了心説我這兄弟還行這要是我的話呀明明沒理硬要説出理來這可太難了老人家看了看侯振遠沖侯振遠笑了笑侯老俠客説哥哥你別笑你總以為這件事叫我一句話給説出去了就能壓住我侯振遠沒那麼大能耐果然正西方有人搭茬了侯老俠秋老俠雙龍鏢局南北兩號出現的這點兒錯誤我看都因為我們十二家鏢局輪流執年所致如果要有十三省總鏢頭雙龍鏢局改字型大小人家總鏢頭必然要派人前往馬上通知衆同業就避免了這種錯誤所以我認為我們還是恢復恢復當年金鏢將勝子川勝三爺的那個制度咱們還改為十三省總鏢頭吧要是認為誰德高望重夠這身份我看我們今天以武會友在梅花圈上比試各鏢局都請了不少的賓朋哪個鏢局最後贏了十三省