body:
  text: 第三十二回鐵善寺群俠戰濟慈白玉虎大意丟龍批上回書説到西方俠長臂昆侖飄髯叟于成老人家在月臺之上展開閉戶精研數十年的行拳掌打鐵面伽藍佛濟源濟慈跟著上了月臺老俠一笑大和尚既然登了月臺你不怕死嗎濟慈一笑貧僧登臺豈能懼死怯戰于老俠説的可不是廢話他太纍啦多延誤點時間好緩口氣這才是老謀深算濟慈雖沒想到這一點但事實上他是採取進攻式的對於老俠説你的能為上乘實令貧僧欽佩久仰你掌中鏈子抓打遍天下無敵請你不吝金玉而下教不勝榮幸濟慈明白想憑藉拳術勝他太難乾脆用軍刃吧就一撩僧袍把軍刃亮出來其實是一對一尺二寸長的鋼針把手有小指粗細前邊是針尖這是和尚打坐參禪用的在濟慈手中就是軍刃于爺心裏想我打濟源也真不容易他濟慈一口氣都不讓我喘跟著就上來了是打算一下子把我弄死給濟源報仇哇可我虎老雄心在你也未必能辦到和尚既然如此于成奉陪轉過身于老俠一撩長衫肚子一吸氣就把雞爪鏈子抓從腰裏亮出來二尺四長的銅鏈頭上有個圓蓋像龜背似的底下是鈎像個雞爪有皮挽手于老俠之所以叫長臂昆侖就是因為有這對抓只見于成譁啦啦一抖鏈子抓左手一悠譁啦一聲響鏈子抓就在和尚的眼前一晃右手抓悠起來對準和尚的肩井穴抓來和尚墜肘沈肩微然一斜身自己的身子就順在正中左手針往前一趕步來了個金雞抖翎直奔于成的小腹于成明白這和尚好狠呐一針就惦記著把我扎死于老俠往回一退右步右手抓抽回來點手喚羅成往下對準濟慈拿針的手腕左手抓一回來對準和尚的面門就抓濟慈往後一撤身雙針一搭閉住門戶兩人彼此道請就又打在一處西廊下的這些人都嚇暈了二當家濟源多大的本事人家上來一個老頭兒就把他打成那樣幸虧是二當家的要是換了別人剛才那一下子還不把命要了哇現在濟慈又和老頭交上手了臺上的老二位都在各展平生所學都不敢輕易進招而是看箭定式不求有功但求無過轉眼間三十多個回合過去了于老俠心想兄弟們別看我的哈哈笑誰先上來替換我等我活動活動喘過這口氣來哪怕呆會兒我再上來也好這時哥兒幾個在台下看著也都在想于老俠打了濟源王爺高興得不得了拍著巴掌喊好這會兒王爺可説了諸位老俠客我看于老爺子是不是有點纍了你們大夥兒哪位去替替風流俠鐵扇仙張子美笑著説你也成了行家了於老俠打了濟源這口氣還沒緩上來咱們應當替替這麼著我先來吧老俠張鼎穩了穩自己的大鐵扇子一拔腰上了月臺于老俠客能為高強武術絶倫濟慈高僧針法玄妙你們二位是棋逢對手將遇良才不相上下戰到何時是了哇於老俠請來撤招在下不才要向高僧討教三合説出話來不卑不亢兩不傷于老俠縱身形把自己雙抓收回挽好了和尚捧雙針也往回一撤步張子美伸手抽出鐵扇子來道高僧看你的功夫實在使我技癢難熬我張鼎要討教討教老和尚濟慈也點了點頭張老俠也是名滿寰宇的人物遇高人不能交臂而過請吧看看你的點穴之術老俠張鼎點點頭上右步一斜身左手並食中二指金鋼指一晃面門左手的鐵扇子一刷來個喚虎出洞對準濟慈的奇門穴上便是一點濟慈一轉身拿著左手針一點張鼎的外手腕子左手針往下一頂對著張老俠腿上的三裏穴上便點張鼎張飛騙馬起來一轉身橫風掃月對準和尚的太陽穴就打濟慈和尚縮頸藏頭躲兩個人當場動手打在一處兩個人招術一加快彼此身法展動猶如打雷掣電一般三十個回合開出去老俠張鼎就不成了進不去招了濟慈的針法展開身形又快張老俠只能封閉躲閃正在這時候旁邊有人念佛無量佛子美賢弟你的鐵扇子招術十分驚奇大和尚的針法出衆二位且慢動手貧道有話講張鼎趁此往後一撤扇子封住門戶濟慈也一撤步抱著雙針擡頭看來了一家仙長高大身材長四方臉面如三秋古月頷下一部白鬍鬚張鼎把鐵扇子別好沖和尚一抱拳高僧這是揚州鈔關街玉頂九龍觀南俠客海內巡針昆侖道長司馬空他來與你繼續會戰在下告退南俠司馬空過來了無量佛高僧看你的招數實有獨到之處貧道願討教三合請高僧不吝金玉鼎鼎大名的南俠客司馬仙長貧僧早想去揚州拜會閣下實在因廟內繁忙多事不能如願今日幸會實在是千載難逢請南俠按劍把嚓楞楞一聲響寶劍出鞘這可是價值連城斬金斷玉的寶刃南俠一按寶劍一捋銀髯和尚不敢疏神大意雙針一分仙長請阿無量佛恕貧道無禮劍俠一搭腕子燈籠穗一晃舉火燒天往下一落對準和尚的腦門子就擊過來了和尚十字架避面一搭雙針左腿一虛右腳實著左腿繃直右腿弓著體重在後往下一弓身雙針十字架往上頂拿雙針接寶劍南俠一瞧心説濟慈呀不是貧道大開殺戒是你這人太沒經驗閲曆了看不出我這把寶刃的光芒我這是斬金斷玉的寶劍你那針純鋼打制小拇指般粗細你十字架搭上封我的劍你不是找死嗎寶劍碰上你的針你的針就得折寶劍一落就是你的頂梁你想跑都跑不了南俠想到這劍就過來了眼看寶劍離針也就一寸多高南俠心説實啦你跑不了了猛然間往下一落老仙長上了一個大當濟慈多大的份兒能不知道南俠的劍是巨闕寶劍即便純鋼的針一接這劍也得折濟慈左腿弓左腿繃等南俠的劍近了招用實了濟慈猛一低頭變成右腿繃左腿弓照著南俠的小肚子就扎過來了無量佛好厲害的凶僧南俠就勢腿尖一點地噌地一下橫著就出去了來個鯉魚跳龍門南俠往外一縱濟慈把雙針就收回來了阿彌陀佛仙長請吧這一下可把南俠給氣暈了北俠在台下看著想當年和南俠在杭州擂上交過手知道南俠秉性急躁太自信啦北俠心説你把你那招當實招是把濟慈看成什麼都不會的了所以你上當人家可沒上當但從濟慈的臉上看不出來依然笑容可掬仙長請吧無量佛南俠二次縱身健步如飛和尚擺雙針急架相還僧道二人打做一團僧袍道袍一齊兜起風來猶如穿花蝴蝶圍繞在一處轉眼間打出四十個回合南俠也不往裏進招月臺底下大家議論紛紛王爺瞧見沒有南俠不進招了看來人家濟慈能為實在不錯呀旁邊有人答言王爺衆位哥哥兄弟給我看著點我跟高僧討教討教正是常州北門裏清風巷賽判兒飛行俠苗澤苗潤雨老俠苗潤雨一按刀把兒飛身形跳上月臺道兄阿你和高僧可打了不少時候啦彼此都是一樣的本領無法分出勝負道兄你撤下來小弟不才願跟高僧討教南俠虛點一劍縱身形出去道無量佛高僧咱們今天就到這裏貧道告退現有常州府北門裏清風巷飛行俠苗澤苗潤雨前來討教説完南俠下了月臺濟慈一看心想童林侯振遠約來的朋友怎麼都是這些知名人物論真的哪位單獨較量也不含糊苗潤雨也是堂堂有名的俠客阿彌陀佛苗施主久仰大名如雷貫耳閣下的紅毛寶刀價值連城天罡刀法三十六路南北十三省武林公認今天在這裏見面真是幸會幸會老俠客請你亮軍刃吧高僧阿微末之技何勞挂齒徒增汗顔你也是武林的前輩有這麼句話叫知足不辱阿你想過沒有你我都是這麼大的年紀在江湖上略有微名要是一定憑自己的能為把對方戰敗我看也不是一件容易事高僧不是提過嘛紅花白藕青蓮葉三教原來是一家咱們都是武林的弟子也都在上三門門戶之中何必為了一己私見爭個長短輸贏呢濟慈很佩服苗老俠的見解只是他騎虎難下呀苗老俠我謝謝你你這話應該在不動手以前提出來你也是老前輩金石良言我濟慈也能聽信現在不成啦師弟被打有了人命我下帖子請來的賓朋已經死去不少這時我要聽你的良言相勸激流勇退懸崖勒馬人家緑林道的賓朋説我濟慈算什麼人物阿老俠客亮出軍刃咱們一戰吧嗷既然如此苗澤奉陪苗老俠摘刀鞘兩道崩簧一頂嚓楞楞楞金磕金的聲音龍吟虎嘯把刀鞘一放紅毛寶刀掌中一擎只見這刀有四尺開外一巴掌半寬的刀身背夠一指刃夠一絲吹毛可過鋭鋒霜快猶如電閃一樣兩個人都往後一撤步夜戰八方藏刀式苗俠客左手晃面門寶刀在濟慈的面前一扇反背撩陰刀上右步右手從左邊過來寶刀往前一推倒提寶刀順著濟慈的下襠就上來了濟慈和尚點點頭向左一滑步收過右腿右手針往斜推直奔苗老俠拿刀的手腕苗老俠往後墜肘沈肩一撤刀濟慈上左步跟身進去半個圈似的刷左手針沖著苗老俠的太陽穴就點苗老俠就勢一拿寶刀左手搭在右手的手腕上往前一推拿刀刃一迎和尚往後退苗老俠進步掃堂和尚濟慈腳尖點地長腰起來兩人動手三十幾個回合戰了個平手這時有人旁邊搭茬了苗老俠好俊的刀法高僧的針法也實在令人欽佩你們二位暫時罷招晚生有兩句話説濟慈虛點一針出來苗老俠往後一撤步擡頭觀看見是湖南三老莊老英雄左臂神刀洪利洪炳南就轉身形跳下臺去了左臂神刀炳南公洪利肋下佩著八寶電光寶刀上來道左臂神刀洪利前來討教濟慈口誦佛號阿彌陀佛和尚心想沒聽説過這個名字看洪利六十歲上下穿著打扮也不驚人濟慈想左臂刀就是左架了看他也沒什麼出奇的便問阿彌陀佛這位是洪利過來一躬到地高僧你的招法太出奇了實令晚生欽佩一時技癢來到月臺以上有意拋磚引玉打算跟你討教三合五式明知不敵還望高僧高擡貴手阿彌陀佛太客氣了請亮軍刃吧説著話洪利把刀摘下來按刀把一碰崩簧一聲響寶刀悄然一離鞘一道寒光光芒四射照人二目濟慈一瞧心裏納悶他們也不知哪找來的軍刃怎麼都這麼好的鋼口這又是一口寶刀刀亮出來刀鞘往地下一放高僧阿我洪利初學乍練高僧你可要高擡貴手嗷老施主你太客氣了請先進招洪利遞刀和尚擺雙針急架相還左臂神刀微然施展刀法六七個回合刀光閃閃這時濟慈就手忙腳亂洪利螺濟慈很有富裕東廊下的成名俠客們都看愣了這左臂刀真是出奇這是道門門長三清教教長歐陽爺的真傳天下無雙阿又搭著一口寶刀濟慈只有招架之功沒有還手之力這時候洪利虛晃一招縱身形出去了高僧承讓承讓我跟你告假了撿刀鞘轉身下月臺王爺走了過來老英雄好能為可沒一個人敢問洪爺為什麼不螺濟慈臺上濟慈捧著雙針道阿彌陀佛這位施主的刀法獨出一門勝過貧僧萬倍按理説我就應知難而退不再動手無奈貧僧是鐵善寺的主人今天的事沒有完厚顔無恥我還要陪諸位施主走上幾趟哪位上來貧僧奉陪正在這時月臺下躥上一位高僧好功夫真令愚下欽佩濟慈一擡頭心説吃裏爬外我給你下了請帖你倒跑那頭去了正是白馬河甘家堡畫地無形隱逸俠甘雨甘鳳池左肋下挎著一個長條包袱濟慈一笑老俠客你要跟貧僧動手嗎高僧我不是跟你動手來的甘某在白馬河破土動工蓋房的時候我挖出一對軍刃來在下查遍兵刃譜沒有這樣的軍刃訪了多少高人也沒有知道這對軍刃的當然我訪的這些高人比你可是差多了高僧你博學多識身為鐵善寺一門之長你一定知道這對軍刃叫什麼名字我拿出來請你告訴告訴我濟慈聽罷心想你不動手打我反到拿這個來撅我剛才洪炳南用刀撅我你現在又用這對兵刃來撅我可我又不能不説阿再説武林當中像甘雨甘鳳池這樣的舉動也是有的呀你考考我我考考你光靠打不成阿儒將要懂文學要能講