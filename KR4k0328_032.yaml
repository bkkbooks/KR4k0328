子寨清雲寨金銀亂石島的事情與我兄弟無關呀你的弟男子侄都在呢二位俠客不要再提了這都是我師弟一人之過依著老僧就不讓他幹這個尤其地雷這事情這是得罪天下英雄的事情貧僧一一道謝請罪了亞然和尚跟大夥兒見面這就又算言歸於好啦于爺可問水晶長老亞然和尚是前輩王爺説的這幾條如果你全答應下來那麼就請你準備回漢兩教的飯食太陽都過午了大傢夥兒可有些餓了亞然和尚應允然後讓僧衆們預備床鋪給大家準備鋪蓋好在鐵善寺是十方常住的廟經常有幾百和尚吃喝這不算什麼馬上把東西配殿收拾出來還是分開了住各找自己相好的到時候分開吃飯水晶長老亞然和尚又去看了看受傷的門人弟子並申斥了濟源一頓還有孟恩這些人然後把尸體埋了把山外頭的席棚也都拆了把所有沒有用的人也打發走了武林道的賓朋都在這兒這多好阿大家三個一群五個一夥的高談闊論大家吃完了飯稍微休息可就掌上燈了穿雲白玉虎劉俊這才查點東西這一查點把他嚇壞了哎喲怎麼我那包袱沒了原來東配殿的門開著裏頭有的是地方大傢夥兒休息便坐把東西都放在東配殿每個人的包袱全有就是劉俊的包袱丟了他臉也嚇白了汗也嚇出來了這張魚皮魚眼珠子值多少錢都不要緊這裏頭有海川的海捕公文慎刑司發下來的龍批大票阿也就是官憑文書阿劉俊流著大汗找著師父説師父壞了怎麼啦咱們那龍批大票跟那墨魚皮的包袱丟了那怎麼能阿怎麼丟的不知道呢好像白天我看著還有呢晚上我要找身衣裳一檢查沒有了這下海川可抓瞎了王爺跟侯老俠走過來問海川怎麼啦唉海川把事情一提侯老俠忙説別嚷嚷雙方已言歸於好但是鐵善寺那邊請來的好多人不見得裏頭都是好人良莠不齊他們盜這個包袱也沒多大的用處等咱們消停一天半天的跟水晶長老亞然和尚提出來讓濟慈和尚查一查千萬千萬別嚷嚷一嚷出去就壞了王爺也説不要緊沈住氣都不成了還有我呢實在不成咱們騎快馬趕奔北京城叫何吉到慎行司再辦一份來不要緊別著急了大傢夥兒到時候都休息了第二天起來吃完了早飯一部分人在大雄寶殿一部分人在東配殿王爺這部分人全在東配殿連水晶長老亞然和尚帶濟慈這些人全都在這兒陪王爺説話正在這個時候門頭僧進來了哪位是童俠客呀海川一抱拳我是還有一位千歲爺是呀不錯本爵就是嗷外頭來了一個人一定要跟你見個面説有要緊的事跟你商量定要面稟嗷誰呀讓他進來吧門頭僧轉身出去時間不大領進一個人來大家一看這人四十多歲寬寬的肩膀一身藍絹帕纏頭青鬍子茬兒濃濃的眉毛大大的眼睛長得挺端正系著絨繩肋下佩著一把刀走過來就給王爺磕頭千歲爺恩人童俠客爺我給你磕頭了海川趕緊伸手相攙快起來與閣下素不相識你怎麼有事嗎王爺瞧出來了還是王爺好記性説海川你怎麼把他忘了這不是爬山虎趙勝嗎嗷海川這才想起來當初王爺和海川背著海捕公文送單刀拐奔山東走到清河油坊鎮有個賣藝的王爺贈他錢讓他走海川跟王爺才住在展翅金雕鐵掌李源李老俠的英雄把式店打了李老俠的二兒子的就是這爬山虎趙勝想起來了你是趙壯士不敢當正是我趙勝你怎麼上這兒來了唉王爺童俠客爺你賞給我錢以後阿我就十分不落忍阿我暗含著跟了你一程一直跟到巢父林才知道你是王爺童俠客是王府的教師爺後來我跟你到杭州才知道童俠客獻藝賀號鎮八方紫面昆侖俠我有個師弟是八卦山九宮八卦連環堡的他在後山菜園子我從杭州來到八卦山渡過南盤江進了山跟八莊主袖吞乾坤小武侯田方田子步見著以後提出我的師弟來八莊主賞飯吃讓我跟我師弟在後山看菜園子一塊兒種萊但是我對王爺的恩德永遠不能忘阿我知道王爺俠客爺由杭州往這邊來到八卦山要請國寶捉拿兩位少莊主小粉蝶韓寶鬧海金鱉吳志廣為這個我這次才來王爺俠客爺現在由二莊主胡庭胡元霸下山把韓寶吳志廣國寶完全都找回來了這兩個人已然回到八卦山我特意告個病假坐船出山來鐵善寺給王爺俠客爺報個信請你趕緊深入八卦山可能請出國寶拿住二小我還不能在你這兒呆著唯恐走漏風聲説完了以後磕頭如果王爺俠客爺沒有什麼吩咐我就走了王爺説好吧不就是這事嗎我可得謝謝你呀看起來得罪一個朋友多堵牆交上個朋友多一條道爬山虎趙勝泄機八卦山這不是大好良機嗎趙勝走了童海川把他送出山門外打發趙勝走後大傢夥兒研究這事海川可説爺趙勝知恩報恩這個人可不錯既然群雄都在這兒人多力量大二小回來了咱們就應當去八卦山呐王爺點頭對唯有北俠一擺手海川你先等等吧有道是畫虎畫皮難畫骨知人知面不知心王爺跟你在清河油坊鎮給他倆錢他很感激那麼這次趙勝來是真的是假的你能斷定嗎大傢夥兒一想可也對呀萬一趙勝是李昆打發來的呢咱們到那兒不是羊入虎口嗎秋老俠説這不是王爺在這兒大家也在這兒嗎一會兒愚兄收拾東西去趟八卦山我跟李昆又是很好的朋友我師弟法禪又是那兒的四莊主再説以往我也經常去我去了八卦山以後打聽到了真實事情然後我設法給你們送出信來你們再去王爺跟大夥兒商量商量怎麼樣王爺一聽忙説還是集思廣益好呀秋老俠説得太對了就該這樣兒那我們就拜託了侯振遠也一抱拳哥哥那你可就多受纍了哎自己弟兄何必客氣呢老俠秋佩雨準備好了東西直接趕奔八卦山
