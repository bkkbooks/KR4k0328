舞臺上蹲著走的矮子功雙手左右下沈膝蓋沖自己前胸腿往前伸悠起來走當右腳著地時左腿文從後面悠過采往返回圈跑每一步將近一丈遠差點兒的也有七八尺跑起來像一條線兒一樣要不怎麼叫千里腳程呢仙長給秋田拆招解招教他如何後發制人如何發力這些用的都是五臟之力光陰荏苒日月如流從前的不算爺倆朝夕相處十八年這其間父母雙雙去世了佩雨孑然一身這天老仙長把秋田叫過來徒兒你的功夫很不錯了挾此技擊之藝與天下英雄爭一時之短長倒也不落人後咱爺倆該分手啦秋田一聽可就怔啦師父你這是什麼話無量佛秋田呐消長盈虛天地至理離合聚散人之常情沒有百年相聚的事阿秋田熱淚直流跪在地下弟子不願與恩師離開你就給弟子挽發弟子願人三清教下老仙長搖頭不到時候你先到江湖闖蕩闖蕩去吧我把門戶告訴你你師祖是江西龍虎山玄天觀主清朝四大名劍的三爺太極八卦庶士張鴻鈞為師弟兄四個我排行在末大師伯莊道勤二師伯尚道明三師伯何道源谷道爺給秋田説得很詳細並把門戶之中的五戒説出不可犯戒秋田一一答應老仙長又道秋田你的劍法是我們門戶中的絶藝今後要守身如玉我再送給你個物件説著把寶劍拿過來托劍鞘按碰簧嗆啷啷一道寒光刺入二目一汪秋水相仿老仙長道此是轆轤寶劍當年秦王用此劍斬過荊軻此劍乃五金之鐵精六合之金英冶煉鍛造而成斬金斷玉削鋼剁鐵唯遇錘棍之物要注意好在你藝已學成要善視此寶你師祖珍藏兩口寶劍一口贈與你大師伯莊道勤你師祖要將此劍送給你二師伯尚道明為師與你二師伯孩童練藝就在一起感情最好我私下裏求你二伯父央告師祖把此劍贈給為師你二伯父慨然應允因此才落在為師手中此劍雖在我身上多年我並未傷一個生靈今將此劍給你望你好自為之弟子怎敢奪恩師所愛弟子不要寶劍雖好終是殺人之利器出家人舉足不傷螻蟻命愛惜飛蛾紗罩燈帶劍何用為師心意已定你不必推辭秋田這才把劍收起問師父什麼時候走哇明日早晨你今晚收拾一下明晨送行即可秋田給師父行完禮就回家了自從二老雙雙辭世就搬在家裏居住稍微休息一下起來收拾天光閃亮來到廟中谷道爺已經飄然遠揚秋佩田只有往空一拜把家裏安置好秋田這才在南七北六十三省闖蕩江湖一來是武藝超群二來是為人忠厚結交不少緑林豪俠在蘇北銅山松棚會上獻藝簪花當衆賀號人稱獨占北方笑鼇頭南極昆侖子北俠客有一年去雲南昆明縣的八卦山才知師弟身為四莊主因此結交了李昆等人來往頻繁秋田跟李昆的交情很深又是師兄羊兒相反跟法禪顯得不很近回到秋林寨就有藍家寨的藍田寶藍田玉藍田璧弟兄三人頭頂門生帖前來拜師北俠收留了他們又收了不少的弟子潘龍也在內藍氏弟兄是本地的大財主拿出錢來給師父起蓋房屋置辦田産儼然大戶潘龍要開鏢局親自到北俠府上來報告這時秋老俠已經八十多歲閲曆豐富不叫他幹潘龍一看師父不願管才去八卦山拜見師叔法禪法禪道別管你師父他膽小怕事你幹去吧有什麼事找我來杭州擂起來了潘龍寫了封親筆信叫兒子潘震把信送往秋林寨潘震面見秋田秋老俠跪倒磕頭祖父在上孫兒叩見起來孩兒千里迢迢怎麼來到塞外呀潘震把信拿出來道孫兒奉爹爹之命有信面呈師祖老俠把信接過來一看問孩兒這是怎麼回事潘震不敢隱瞞説出真情老俠一聽蠶眉直立虎目含嗔道你父實為大膽當初開鏢局老夫不許他一定要開到現在為爭漁業打傷人命老夫豈是那助紂為虐之人為虎作倀之輩把小冤家給我攆了出去底下人把潘震給帶出去潘震狼狼狽狽回到杭州細説一遍潘龍嚇壞了他萬般無奈又親自來見師父老俠嚴厲責備我偌大年紀不能因為你得罪侯振遠我也相信侯振遠也不能因為黃燦得罪老夫再説我們倆又怎能受你們的指使快回去息和此事徒弟來了雖然沒攆但也絶對不管潘龍回去發愁白亮進來道你別發愁秋老爺子請不動還有和尚老爺子嘛你寫信我去雲南這才把法禪請來童海川探掌打法禪潘龍叫潘震多帶人把和尚送往八卦山他又馬不停蹄備路費來到秋林寨老俠的家中進門就跪下哭道師父侯老俠不但親自前來鎮擂而且邀請一位要在武林中自興門戶的童林把我師叔險些一掌擊死秋老俠一聽心裏不痛快啦我秋田決不給弟子撑腰你侯振遠又為什麼給弟子撑腰當然我知道這件事起因完全是潘龍不對你到了杭州也應該以長輩的身份給説和一下怎麼你還邀人打法禪示威你是打法禪哪還是打我秋田我和師弟沒什麼感情可這童林為什麼這樣狠毒呐法禪也七十多歲的人啦為什麼打這麼重阿唉禍到臨頭需放膽隱忍避讓叫人看我秋田軟弱可欺老俠是這麼想的可不這麼説只道潘龍你是想讓我去麼弟子想請師父去看來這就是你對我的孝順潘龍知道師父惱了趕忙跪下道只求師父別生氣起來吧秋田把家安置好帶著大小五個弟子還有潘龍來到杭州到了鏢局當然是遠接近迎各路英雄相陪老俠告訴潘龍你要叫為師登臺打擂為師年紀已高我只能出頭給你們兩造和解寫好了信叫白亮送去白亮回來説侯老俠不在過幾天再去送信才知道侯老俠太湖要鏢去了直到回來才送去第三封信白亮回來説侯老俠身體不爽秋老俠一琢磨這裏有事吧侯振遠你來跟我姓秋的見個面也小不了你呀秋老俠派白亮去打聽白亮回來報告侯二俠去常州請苗澤張子美去揚州請南俠秋田一聽再沈得住氣也有些兒火了侯廷阿侯廷想不到你年逾八旬如此辦事你用天罡刀來對我天罡劍南昆侖來對北昆侖不但要勝我而且還氣我好吧我接著吧後來又一想我別以小人之心度君子之腹萬一請司馬空給説合呢沒想到司馬南俠跑到擂臺底下説合來啦才發生今天之事到現在叫海川一擠把老俠心裏話給擠上來了連從小到老的事情全都説了出來我不袒護潘龍他侯廷也別袒護黃燦海川聽完站在擂臺上發怔老人家你的老師是知機子谷老前輩不錯童師傅認識家師你知道穀老仙長的二師兄三師兄是誰嗎我二師伯談笑清居無極子尚道明三師伯愛蓮居士太乙劍客何道源喲你提的這二位仙長是我童林的授業恩師穀道長是我的親師叔哇秋老俠一聽阿你是我的師弟呀這可是大水沖了龍王廟一家人不認得一家人啦師弟是愚兄的不對了秋佩雨好度量阿海川一聽心想我該認這個哥哥可他年紀太大我年紀太小哇有些不敢現在一看北俠笑容可掬風采可親雙手抱拳顯著內疚於心似的拋雙鉞於擂臺之上哥哥小弟童林參拜兄長説著話行大禮北俠伸手相攔南俠過來給北俠行禮你是哥哥小弟稽首北俠馬上把南俠抱住大弟這顯得愚兄不通情理啦不對俗語説好漢子怕調個兒文言講故事欲反諸己哥哥你沒有錯小弟錯啦北俠搖頭不不愚兄不對海川攔住全沒錯有道是不打不相識老哥哥不出氣你就打兄弟我吧豈有此理呐海川拱手秋老哥對小弟的事你還有不痛快的地方嗎我與賢弟一天雲霧散結識賢弟就是愚兄最大的痛快那你跟我哥哥侯振遠呐秋老俠聞聽此言唰地一下臉上的顔色更變蠶眉微皺虎目睜圓兩位兄弟莫笑愚兄心地狹窄腹不能容物我與侯振遠不同天地不共日月江湖路上天之所覆地之所載有他沒我有我沒他勢不兩立風雲突變正是酒逢知己乾杯少話不投機半句多
