body:
  text: 第十一回秋佩雨力戰衆俠客童海川雙鉞分雙劍上回書正説到二次杭州擂猛英雄于恆登臺連贏數陳永發源局的鏢主張凱上來雙手一順這手兒叫虎撲子刷直奔於恆胸膛來了猛英雄等張凱的掌到了一伸左手虎口沖著自己把張凱的右手腕攥住左腳當軸自己的身軀從右邊往後轉使自己的後背跟張凱的後背正對上然後大喊一聲呵這手叫山熊硬靠出蹲縱這一下張凱可慘了叫於恆摔了一個嘴啃地鼻子也破了門牙也活動了腦門子起了個大包猛英雄在臺上自言自語喲多少碗肉啦多少饅頭啦全忘啦他一著急沖西看臺點手叫北俠老頭你來吧有你這一鍋肉一屜饅頭就夠吃的啦北俠秋田告訴大家誰也別過去老俠站起身來小童兒高清捧著大寶劍高和在後面跟隨爺仨下木梯直奔後臺高和把台簾高高挑起老俠上臺兩個童兒站在大帳前頭猛英雄高興來吧老頭兒快躺下我們吃饅頭肉老俠大笑行阿你只要把我打躺下吃什麼都可以進招吧於恆用的是以逸代勞招術是一下準你要叫他先動手他立刻就抓瞎了猛英雄舉鼎托閘伸雙拳照老俠頂梁就打唰地一下就到了秋老俠上左一滑步伸右手一攥于恆的左胳膊稍一用力順手牽羊底下右腳一絆借徑使徑猛英雄來了個馬趴於恆面傻心不傻知道自己不是老頭的對手傻徑上來了説老頭你真損哪我只能吃半飽説完了順著梯子下去了這時老俠秋佩雨站在台口道衆位鄉親們武林同道們這飛龍鏢局的鏢主潘龍是我的徒弟他與金龍鏢局兩造的事情在下不想過問無奈一節聽説有位新出世的英雄要興一家武術擂臺之上把我七十歲的師弟法禪和尚打得口吐鮮血這倒不怨位英雄手狠心毒還是我師弟經師不高學藝未到為此老朽打算見見這位師傅給他道歉而來現在擂臺恭候説完往後一撤步很自然地站在那兒童海川一聽點了自己的名非出臺不可了只好拿雙鉞上去王爺可顯得慎重用手抓住海川的胳膊幹什麼去海川一陳冷笑爺沒聽見秋田叫我麼王爺點頭聽見啦我想你還是應該慎重先跟衆位哥哥們研究一下好嗎老俠侯振遠也抓住海川道王爺的話如金石賢弟著什麼急今天你想不登擂臺都不行不過不要忙先看幾位兄長的到時候上去也好有底呀二爺侯敬山也過來勸道兄弟你別著急哥我先拋磚引玉會會北俠老頭子剛要走海川拉住二哥上次把和尚打重啦你不能去老頭子一樂道哈哈不對你打法禪和愚兄會俠可不一樣北俠不是你二哥也不是法禪你放心吧老英雄一按護台欄杆飄身下看臺飛身登擂臺道秋老英雄愚下不才願在台前領教秋佩雨上下打量道閣下莫非是山東侯二俠嗎正是在下好哇你們弟兄聯袂江湖一世成名今天倒要討教二爺伸手打包袱亮出鑌鐵雙鐝包袱皮兒往腰裏系大鵬展翅左腳在前右腳在後拿樁站穩秋老俠請吧北俠一抱拳恭敬不如從命了一轉身高清把劍往前一遞老俠攥劍把大拇指用力頂崩簧喀嘣嗆啷啷聲音如龍吟虎嘯光閃閃冷森森猶如一道電閃光芒四射這是切金斷玉削鋼剁鐵的寶劍名叫轆轤寶劍老俠秋佩雨右手寶劍沖天左手掐劍把往前指舉火照天式侯二俠請來進招有僭了二爺左手鐝晃門上右步右手鐝丹風朝陽對準秋老俠左邊太陽穴就打鐝挂風聲十分迅速老俠秋佩雨久經大敵一看鐝到並不慌忙微然往右一斜身寶劍斜著往侯二爺右臂上一放二俠突然往後撤右臂秋老俠右手一翻腕子紫燕抄水大寶劍從侯二俠的右肩上往上一挑劍招來得好快二俠左肩一閃往後一縱身嗖地一下子躥出足有七尺侯二俠心想好厲害的秋田哪雙鐝一分看住門戶秋老俠就勢寶劍尖往下落手往上提左腳如釘猛提右腳金雞獨立兩位彼此道請當場動手又打在一處有這麼一句話棋高一招殺得你乍手乍腳放在武術上更是這樣二爺侯傑的本領可比北俠差得多呀人家北俠駕輕就熟運用自如天罡劍三十六式施展開走行門讓過步隨著加快的步法把二俠圍在正中二爺禿腦袋一晃雙鐝展開上中下走三盤封避躲閃自己本不貪功不求勝這樣破綻少漏洞無也就不易輸招北俠秋田很佩服侯二爺知己知彼百戰不殆這個人有自知之明夠個俠客二俠也明知不敵可老頭想這個為了我家的事山南海北的全來了我要不上擂臺恐被賓朋恥笑二位動手侯振遠很注意臺上他看秋佩雨的武藝精湛老練可用的都不是螺人的招數可見是位忠厚長者其實北俠心裏想的是這些位都是成名的人物一來不敢都得罪二來是輸了招就把一世美名葬送我只對南俠司馬空因為他跟我對著號哪侯振遠心裏很服氣秋老俠南俠也看得很仔細王爺是外行也看出些門道來了道司馬道爺本爵看著二俠客要不行啦無量佛王爺你成了行家啦王爺一聽這話非常高興老俠誇獎當然本爵還不真懂我只覺得侯二爺進不去招好像是在挨打爺的話説得很是侯二弟從開始就不敢進招我看哪位賢弟去替換一下吧展翅金雕鐵掌李源站起來道王爺道兄衆位哥哥兄弟給我看著點兒我來會會北俠客侯振遠一抱拳道賢弟多加小心李源答應一按欄杆飄身而下飛身登擂臺二哥你先住手秋老俠請出招二位各自縱身出去侯二俠收雙鐝拱手抱拳秋老俠客現有清河油坊鎮李源老俠前來討教侯傑失陪説完走了李源一躬到地老俠客你是武林前輩李源本不敢班門弄斧因看著前輩的武藝絶倫超群一時技癢斗膽給你接個三招兩式請前輩不吝金玉為是秋佩雨倒提寶劍連連作揖李老俠你太謙了秋田忝為武林後進聽説你乃當代著名大俠西方老俠長臂昆侖飄髯叟于洞海老前輩的高足秋田久仰阿我們只能弟兄相稱江湖無輩緑林無歲秋田不敢當李老俠請亮兵刃吧恭敬不如遵命李源無禮啦這叫你敬我一尺我敬你一丈人敬人鳥擡林李源背過身去一撩長衫兒唰亮出鹿筋藤蛇捧往前一縱身白猿獻果後把對準秋佩雨胸前便搗從身法帶招數一碰面兒秋老俠就知道李源的本領不比侯二爺差呀老俠秋田劍訣變掌弓左步左手一扶藤蛇棒李源一撤秋佩雨右手劍隨著身體一剎矮式唰對準雙腿一掃李源點台板長腰往前鯉魚跳龍門躥出有六尺跟著調過臉來右手棒唰起來蓋頂就砸老俠閃身躲過兩個人彼此道請搶步進身打在一處展翅金雕李源把三十六手白猿棒展開撥挂扒打上中下走三盤棒帶風聲一招一式十分緊密老俠秋田劍招加緊盛名之下絶無虛士步法擇得準唰唰唰十幾個回合過去冷森森一片寒光把李老俠罩住了李源一看自己的能為就到這兒啦不敢貪功冒險司馬道爺跟侯振遠老俠商量侯賢弟我看李檀越氣力不敵如若戀戰很是危險趕快派人吧老俠張鼎站起來道王爺哥哥兄弟給我看著點兒説著一按欄杆飛身而下然後長腰登臺來到旁邊抱拳拱手秋老英雄且請住手李老英雄也請罷招愚下有話講二位各自縱身出去張老俠面帶笑容李源賢弟你的白猿棒非同凡響秋老俠乃武林名流二位真是棋逢對手將遇良才戰到何時是了請李賢弟暫時下去待愚兄拋磚引玉吧李源的本領遠遠不如秋佩雨張鼎的話明明是貶低秋佩雨擡高李源若一般人都要生氣臉色有些不痛快可秋田臉上絲毫沒有張鼎暗暗驚服心想秋田是個了不起的人物我真心願意交這個朋友無奈勢成水火實不容易張鼎又躬身施禮秋老俠看閣下的武藝絶倫不愧為前輩晚生明知班門弄斧一時技癢斗膽請教望老俠不吝金玉才是秋佩雨連連提劍抱拳張老俠誇獎誇獎實使秋田汗顔無地你我都是江湖路上的人交流技擊之術也不過是點到而已老朽早就知道張老俠師出高門點穴功夫有獨到之處縱有心登門拜謁趨前聆誨以增術藝奈因年紀衰邁未能如願今日機緣湊巧得識尊顔還先請你賜招吧恭敬不如從命張鼎獻醜了張鼎伸手拉出大鐵扇子右手一拎左手劍訣一晃右手扇子孔雀剔翎照定秋老俠精厥穴位上纏點秋田劍一搭手腕右手劍一迎鐵扇子秀女穿針奔張鼎左肋便扎張鼎跨左步繃右腿拔草尋蛇在秋佩雨左腿足三裏一點唰地一下就到啦秋田抽身點頭好俊的功夫比剛才二位也都強秋老俠腳跟蹬徑虎坐坡出去有四尺拎寶劍左手一推銀髯看住門戶張老俠也往後一撤步右手拎鐵扇封好門戶兩個人彼此道請趨身進招打在一處張子美把鐵扇子的招數展開腳下碾得台板哧哧作響大衫兜起風來好像一篷傘兒身法加快北俠秋田封避躲閃見招化招見式迎式確是一個久經大敵的人物不慌不忙展開天罡劍式十幾個回合難解難分到二十個回合老俠張鼎已經占不得絲毫便宜秋佩雨劍招加緊霞光萬道瑞彩千條舞成了一座劍山把張鼎圍在當中南俠等人在看臺上看得觸目驚心這秋佩雨不僅為人忠厚而且功夫爐火純青造詣非淺苗老俠也在想自己本領絶對難敵北俠可哥哥兄弟大遠的把我找來無論如何也要上擂臺最起碼也撤一撤秋田的精力不然恐怕司馬道兄也非對手想到這裏一抱拳王爺司馬道兄衆位哥哥我看子美難勝秋佩雨你們爺幾位給我看著點兒我到臺上討教秋老俠王爺和大傢夥都囑咐他多加小心老俠苗澤一按刀把飛身下看臺擰腰登擂臺往這兒一站道子美賢弟你與秋老俠戰夠多時且請住手愚兄苗澤有話講張鼎縱身出去封住門戶老俠秋田站穩身形張鼎把大扇子掖好秋老俠張某暫時失陪秋佩雨答應道張老俠請回張鼎沖著苗老俠點頭道老哥哥多受纍説著跳下擂臺去了苗潤雨躬身行禮道秋老俠劍術絶倫實令愚下敬佩不揣冒昧願為閣下接上三招兩式以增教益望你不吝金玉才是老英雄太謙了看你堂堂儀表莫非是常州府賽判飛行俠苗澤苗老俠客了好眼力正是苗澤苗老英雄久曆江湖老朽早有耳聞本當早該趨前拜訪實因家事多忙未能如願今日相逢堪慰平生渴念其實北俠心裏很不痛快他想你侯振遠老姦巨猾邀南昆侖對我北昆侖你還邀天罡刀對我的天罡劍不過人家秋佩雨腹能容物臉上不帶出來就是了苗澤抱拳道秋老俠請賜教吧説完一按刀把頂碰簧嚓楞楞寶刀離鞘夜戰八方藏刀式秋老俠二目凝神劍在右手左手劍訣前指請苗澤左手晃面門刀走纏頭裹腦斜肩帶背就劈秋佩雨弓右步寶劍一指苗澤的手腕苗澤一撤刀秋佩雨仙人指路奔苗澤胸前便點苗澤左手搭右腕白猿獻果用刀一截兩個人刀劍並舉打在一處老俠苗澤幾十年閉戶精研天罡刀翻天三十六式戳砍劈剁刀光閃閃腳下既清楚又準確身如練翅雲燕秋老俠暗自欽佩果然是盛名之下無虛士自己不敢疏神大意劍招走開身法展動銀髯亂擺守如處女動如脫兔苗澤心裏明白自己絶非秋田敵手開始慢越來越快扭在一起好像一團大火球咕嚕嚕在臺上滾轉都看不出來誰是誰了王爺目不轉睛仔細觀看心有所思這些人不論哪家哪派都是年高有法行端履正嫉惡如仇的武林俠義國家法律森嚴但也有鞭長莫及之處這些人浪迹天涯與人排難解紛抑惡揚善正是補朝廷王法所不及他們含辛茹苦練就本領不求仕祿自帶路費常年邀遊在外一手托兩家主持公正給貪官污吏和頑匪刁民以懲罰使他們稍加收斂少做惡事強不淩弱衆不暴寡閭裏安然也是大好事阿王爺一邊看一邊想兩看臺的人還有台下看熱鬧的人都是目瞪口呆這時候臺上二位已經是三十個