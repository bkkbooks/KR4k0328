氣功把字兒吹給童林不能讓杜清風聽見了這是老人家的功夫哇結果撇鉞亮劍砍下了杜清風的道冠老人家可就追杜清風去了看杜清風怎麼辦結果杜清風轉一個圈又回來了派人打聽童海川的去處半晚上鏢局子行刺老人家拿著點穴橛也來了大傢夥追他往外一跑來到後院老仙長用點穴橛把他點中後責備了他一番又拿這鐵條把他給打了個跟頭杜清風走了老劍客爺也走了第二天海川侯振遠到了清真寺打清真寺出來到牛街口遇見燕雷老劍客爺也在這兒呢給燕雷説好的約著走老人家可説這個孩兒阿你要把他帶到鏢局子以多為勝贏人家你可不對沒想到老人家到大柵欄看一會兒劉俊帶甘虎把燕雷送走回來甘虎被打老人家又跟著來了在樹林裏瞧著很不滿意童林的行為害人之心不可有可防人之心不可無阿諸葛建是什麼人約你你就來你身為俠客怎麼這麼聽話呀你即便來也不要緊前門外大柵欄鏢局有這麼多位兄弟你説一聲讓大傢夥兒跟著你來老仙長認為童林辦事太莽撞結果戰三勇最後告訴童海川二次拋鉞亮劍
