body:
  text: 第五十六回衆群俠會戰燕雲風老劍客親臨梅花圈上回書説到亮鏢會梅花圈上動手雖説越戰人越少可也越戰越精武林前輩風塵俠隱都在後邊西勝鏢棚內也只有連雲台劍客燕普在內的兩三位了這時候展翅金雕鐵掌李老俠李源登臺會鬥勝昆侖歐陽志正群俠衆星捧月都圍著西方俠於洞海紛紛議論這麼大的松棚內燈火通明照如白晝李源明白人家用的是鏈子鞭兵刃長我用藤蛇棒尺寸短跟歐陽動手我要總往外跑那就太吃虧了我必須想辦法讓你這鏈子鞭施展不開那只有在招術上運用短小精悍乾淨快捷的技藝想到此李源往裏這麼一弓身上右一跟步鹿筋藤蛇棒唰來了個仙人解帶照著歐陽志正的胸前便打歐陽志正岔右步跟左步單手一搖鞭譁楞楞一個青龍出水對準李老俠的胸前便點老俠李源閃身形躲過去擺自己的鹿筋藤蛇棒急架相還三十六手白猿棒上中下走三盤真是烏龍攪海怪蟒翻身招法展開捷似飛鳥歐陽志正的變招兒那也確實是出人頭地譁楞楞長鞭響兩個人的長衫兜起風來如同蝴蝶一個樣所有的人都往梅花圈上看兩位當場動手十個回合展翅金雕鐵掌李源棒走上盤歐陽志正鞭走底盤一個底盤掃趟李源腳尖兒點台板兒長腰起來轉棒蓋頂一砸歐陽志正腿往這邊一岔步李源移左步跟右步左手一搭鹿筋藤棒的後把這功夫叫漁公伐舟就是漁翁撑船呀拿著船篙往船後頭一杵哧船公就往前去了這樣一來李源鹿筋藤蛇棒的鋁疙瘩正杵在歐陽志正的屁股上歐陽志正一哆嗦噌噌噌往後退出好幾步遠去晃了晃身子站穩腳跟説道哎呀老俠客你的功夫很好你這鹿筋藤蛇捧杵了我的屁股我跟你告假了哎歐陽老師傅承讓承讓李源把鹿筋藤蛇棒往懷中一帶看著歐陽志正提鞭下去了歐陽志正往下走剛到西勝鏢棚門口由打裏頭往外出來一個人很快來到台下一拔腰上了梅花圈哈哈李老俠好功夫歐陽志正不是敵手我來討教討教這時西方俠于爺可就告訴王爺了你瞧見沒有上來的這個人李源絶不是他的對手王爺仔細一瞧這人矮身材大錛兒頭墜子臉跟老壽星一樣雪白的白鬍子白剪子股的小辮兒一身米色綢扎絨繩福字履鞋白襪子王爺一看就很喜歡這個老頭王爺問于老俠哎呀老俠客這個人是誰呀嗷王爺我一提你就知道你府裏頭煙壺蓋被人拿走約海川公主墳試藝都是他賽南極諸葛宏圖他是劍山蓬萊島的二號人物他完了就剩一個燕普了哎呀這個就是賽南極諸葛宏圖看他偌大的年紀精神矍鑠面帶忠厚白髮蒼蒼倒不像個歹人他本不是歹人劍山蓬萊島的客禮把他請進山中對他不敢小瞧他是江南的隱士功夫確實不錯阿閲曆多經驗也有李源打不過他是呀老俠客咱們好好地看看賽南極諸葛宏圖往這兒一站説道我的朋友歐陽志正輸給你了不枉你是名人弟子出了名的英雄俠客老朽賽南極諸葛宏圖不才我要當場討教老義士請你亮軍刃吧好諸葛宏圖一撩長衫譁楞一抖三十六節蛇骨鞭往外一亮王爺嚇了一跳怎麼他拿出一條長蟲來呀仔細一瞧借燈光直冒亮王爺才知道不是於老俠告訴王爺他這條軍刃叫三十六節蛇骨鞭蛇口之內含著子午問心針專破金鍾罩這是諸葛宏圖的拿手功夫展翅金雕李源橫著自己的鹿筋藤蛇棒也往這裏一站賽南極諸葛宏圖一抖三十六節蛇骨鞭説道老李俠客請進招兒來李源回道好吧恭敬不如從命藤蛇棒蓋頂就打賽南極諸葛宏圖閃身形躲過去擺三十六節蛇骨鞭急架相還兩個人當場一動手走行門讓過步叭叭叭就是十幾個回合只見李源這條潑風八打三十手白猿棒真不錯呀打到二十幾個回合都還是棋逢對手不分勝負直到人家諸葛宏圖展動身法施出絶藝李源李老俠才漸漸地落了下風這個時候諸葛宏圖三十六節蛇骨鞭走上盤李源縮頸藏頭一躲帶棍走底盤一個掃堂棍人家諸葛宏圖就不躲了一擡左腳叭把鹿筋藤蛇棒緊靠著銅疙瘩的這地方給踩住了但是鞭可悠起來蓋著李源的腦頂上就來了李源一撒手往後倒步出去有五尺李源紅著臉説喲喝諸葛義士我輸招兒了人家諸葛宏圖把棍給撿起來交給李源説默老俠客我再會鬥別位你請吧李源把自己的棍圍上後由打梅花圈上下去了賽南極渚葛宏圖倒提著鞭一抱拳衆位我是西勝鏢局所約所請江南人士復姓諸葛單字名建表字宏圖闖蕩江湖有個小小的美稱叫賽南極還有哪位登梅花圈諸葛建奉陪你三合五式剛説到這兒北面的梅花圈下有人樂哈哈哈諸葛建哪奉陪三合五式你這話不大點嗎你奉陪人家三合五式可你有什麼能耐阿諸葛建心説你的話大還是我的話大呀這時諸葛建擡頭一看老頭兒一拔腰就上來了原來是西方俠長臂昆侖飄髯叟老俠于成常言説打了人家孩子人家大人出來了只見人家老俠客往這兒一站一捋頷下角髯這份兒太大了諸葛建一瞧哎喲壞了這是山西太原府太谷縣于家莊的西方俠長臂昆侖飄髯叟于成李源的師傅老人家偌大年紀精神百倍諸葛建抱拳莫非是武林前輩山西太原府于老俠客哈哈哈正是老夫老朽一百零三歲要説老俠客嘛也還有點不配不過諸葛建呐我雖然老了但你這個能耐若與老夫較量恐怕還不行吧諸葛建心説這老頭子多狂阿就問于老俠客你到這兒來大概也是被人家所約所請也為了十三省總鏢頭吧對了哈説為十三省總鏢頭也可以説為和你們那位道長比試比試也可以諸葛建沒別的咱們倆較量兩圈兒吧好老前輩既然如此請你亮軍刃什麼請你亮軍刃諸位群俠以及王爺年大人都往臺上看也知道老俠于成的份兒大但是人家讓你亮軍刃這也是禮之常有的阿怎麼跟人家愣愣眼兒阿讓我亮軍刃諸葛建哈哈你還不配諸葛建心説喝你這老頭子怎麼這麼大的話阿我還不配便問老俠客難道你還要空著手對晚生的三十六節蛇骨鞭嗎説完諸葛建拿右手這麼一晃蛇骨鞭譁楞楞這麼一響諸葛建也放份兒阿于老俠大笑道諸葛建呐老夫今天空著手會會你這蛇骨鞭你留點兒神我要把你的鞭給奪過來老俠客你還要奪晚生我的鞭哈對説到哪兒辦到哪兒老俠客如果你在三十個回合以內把我的鞭奪出去我此次回轉江南埋名隱姓不再出世了多少個回合三十個諸葛宏圖哪你把你自己看得太高啦我只跟你來一個回合就這一句話譁人們都在交頭接耳議論紛紛一個照面你就要奪人家諸葛建的鞭老爺子你有多大能耐王爺的心噌一下就到嗓子眼兒了急得直歎氣唉老俠秋田南俠司馬空侯振遠這些人也都這兒瞧看怎麼這老頭子的脾氣越來越強北俠説江山易改秉性難移他就這毛病一個回合奪人家鞭是有那能為但是也不應當放這麼大的份兒阿你歲數到了諸葛建也是久經殺場老謀深算的人物阿聽了于老俠的話就問老俠客你是跟晚生我開玩笑呢還是真的於老俠十分硬氣地説大丈夫一言出口如白染皂呐豈能玩笑梅花圈上是玩笑的地方嗎那麼老俠客要一個回合你奪不過去呐一個回合奪不過去諸葛建我一百零三歲抱著腦袋滾回山西太原府永不出世既然如此晚生討教老俠于成一推頷下銀髯左手一捋右手伸出去往這兒一站來吧賽南極諸葛建單手一搖鞭譁楞楞一聲響猶如一道白線這長蟲腦袋直奔老俠的心口鞭出去了諸葛建有點兒後悔這個老頭子説大話就能辦得到我這招兒不是給他送去了嗎老俠于成也樂了心裏説諸葛建呐你這叫什麼招兒我説一個回合你怎麼單給我送鞭來于老俠左手捋著鬍子右手支出去唰地一下鞭來了眼看都到了長衫兒上了于老俠左手一長砰真把諸葛建的鞭給攥住了但是這鞭是滑溜的跟長蟲一樣阿人家諸葛建要是一奪阿你也攥不住阿因為人家那邊套著手腕呢但是于爺不給他功夫左手砰攥住這鞭後弓右腿繃左腿往後一轉身兒就把鞭搭在自己的肩膀兒上了一直往前拽諸葛建一看立刻明白了他怕我奪這鞭自己使不上徑兒就跟我把方向順成一致的那可不成我還得奪這鞭想到這兒諸葛建就反身一轉往回一坐腕子叭拽這三十六節蛇骨鞭沒拽動其實這一切都是老俠的做派跟下棋一樣我要奪你的鞭我讓你往我哪兒來你就往我哪兒來我要讓你怎麼辦你就怎麼辦也就是説于老俠爭取了主動賽南極諸葛建只是隨著人家的意願走這時于老俠調過臉兒來弓右步繃左腿好象要使徑的樣子但你在後頭往回一拖鞭老俠于成這左胳膊跟著鞭走因為于老俠這頭兒沒擋頭你一奪我這手就跟著你往後走了但是身子可就轉過來左手腕子就這麼一挑鞭上右步往諸葛建的胸口窩上一捅要是一般人可就捅不著了可于老俠是成了名的通臂掌阿這胳膊由於練功是比別人長出一截來這會兒于成要想把諸葛建捅死那是太容易了不過老俠客沒有這樣當諸葛建抖挽手往後撤步時于老俠輕掌一擊賽南極諸葛宏圖就出去一個滾阿老俠于成提著這條蛇骨鞭得意地問諸葛建怎麼樣阿賽南極諸葛宏圖這老頭子臉一紅起來了老俠客罷了晚生服了我認為你能贏晚生這是人所共知的但是你説一招奪鞭晚生我真不信現在真是話應前言晚生我服你了哈哈哈諸葛建阿你説得對你捧了我把鞭拿了去吧賽南極諸葛宏圖接過鞭來圍好了長衫放下來臉倒是沒紅西方俠于成把我給贏了我紅什麼臉兒阿你們來試試阿我一下就交給人家了恐怕你們連一下都辦不到阿説不定一口吐沫能啐你們個跟頭默諸葛建還臭美呢老俠于成捋著胡子站在這兒臉沖西道長你看看可就剩了你一位了燈都點上來了天可大黑了道長你還耗著什麼徑兒阿哈哈哈請上來吧這不是點手叫嘛隨著老俠于成的手勢和説話大傢夥兒都在往西看果然西勝鏢局沒人上來了帶來的人全輸了雲台劍客燕普燕雲風往左右前後一瞧就剩下自己一個人了西方俠于成叫的就是自己了雲台劍客燕普燕雲風那確實是有兩下子所謂折衡於樽俎之上卻敵於談笑之間人家一點兒都不著急慢慢站起身來從西勝鏢棚到了梅花圈上單掌打稽無量佛于老俠客壽至耄耋依然如此強健實令山人欽佩敢問閣下也是被人邀請來奪取十三省總鏢頭的嗎老俠于成見燕普兩位老人真是酒逢知己千杯少話不投機半句多呀于老俠抱拳説我並不是到這來奪取十三省總鏢頭的因為我與幾位朋友到北京玩來了十分恰巧趕上這事甭説我不奪就算衆同行看我于成不錯公舉我為十三省總鏢頭我都不幹但是道爺你想幹也辦不到因為你我的年歲都老了雲台劍客燕普一聽知道于成這人十分厲害看來盛名之下無虛士阿老俠貧道如要仰仗武力一定要奪呢哈哈哈除非于成三寸氣不在阿好老俠客貧道久仰你的碧眼神桴雞爪鏈子抓能為高強藝業出衆武林之中成為魁首好吧既然如此你亮軍刃老俠于成也不客氣恭敬不如從命于成無禮老人家銀髯甩在肩頭一撩長衫譁楞楞楞把自己的雞爪鏈子抓亮將出來説真的這種軍刃純粹得憑氣功阿盡指著這對鏈子抓不成得跟自己本身的基礎功夫合在一起才起作用只見老人家左右手一晃雞爪鏈子抓大鵬展翅為什麼叫長臂昆侖就因為使抓雲台劍客燕普雖然説自己身份比于成高但是這可是一隻猛虎不能拿老頭子于成當狸貓阿燕普按劍把頂碰簧嚓楞楞一聲