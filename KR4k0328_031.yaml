力老俠李源險些趴下李源挺身軀站穩才知道濟源比自己高多了李源忙著説高僧李源輸了改日再見展翅金雕鐵掌李源跳下月臺喝月臺左右連個出大氣的都沒有濟源合掌念佛南無阿彌陀佛和尚眼睛往東廊下西方俠于爺這邊一瞅然後説道貧僧是本廟的二當家身為本廟的監寺名喚濟源闖蕩江湖有個小小的美稱鐵面伽藍佛論我的能耐比起我兄長濟慈來有天淵之別貧僧是笨鳥先飛諸位剛才這位清河油坊鎮展翅金雕鐵掌李李老俠客南七北六十三省武林同道誰都知道但和貧僧相比多少還差點兒先讓他下去休息凡是占山的為王的落草的坐寨的戳杆的教場的保鏢護院的所謂南七北六十三省的武林英雄就不必登臺了不是貧僧説大話登臺你也不成今日貧僧是要會鬥高一頭的英雄扎一背的豪傑身為俠客義士類似興一家武術之人這樣的人上來老僧奉陪其他的人物上來恕老僧無禮我是概不奉陪剛説到這兒東北角月台下有人説話了哈哈哈和尚我也算不了俠客我也算不了義士挎小籃的賣個酸棗我也充個果木行的人吧聲音一到唰地一下像一道白線這人就上來了正是西方老俠于成大和尚一推頷下鬍鬚擡頭看只見老俠于洞海雙肩抱攏往這一站精神抖擻不亞如墜角的蒼龍勝似那落牙的猛虎海川緊挨著于老哥哥站著聽見老頭一樂説了話知道他要上去忙伸手去抓于爺還沒等挨上老頭就上了月台了在金銀亂石島時海川振遠老哥兒倆看過于爺的本事遊戲三昧當然是不錯可是他年歲太大我們這兒又有這麼多人能讓一百零一歲的老爺子上去嗎擦肩蹭袖如果輸了豈不把一世的英名付於流水所以大家不願讓老人家上去真動上手到底是老胳膊老腿可老頭不這麼想于老俠在月臺下看著一見和尚出來就知道徒弟李源不行五個照面非趴下不成哪知道一個照面都沒照就趴下了于爺的心裏就有點怒喝好哇這不是當著媽媽打孩子我這坐老家的是幹什麼的同時于爺思緒萬千想得多呀我于成一百零一歲隱居在山西太原府太谷縣于家莊我不找人家的麻煩沒有人找我的麻煩到我死那天準能落個淨胳膊淨腿一輩子在武林當中沒叫人捅過一下更別説讓人家踹我一個跟鬥打我一個趔趄我沒事好賭這口氣訪這個鎮八方可他鎮十六方礙我于成什麼事出來一個鎮八方我於成就沒能為了不至於吧我為什麼訪海川呢訪著了也知道海川義膽俠心小孩兒可交可又碰上亂石島的事我也卷到渾水裏去了要想指望辦完事回家也回不去了答應童林必須拿到盜國寶的二小韓寶吳志廣可誰知半路打出個鐵善寺來誰不知道鐵善寺哇鐵蝠拳一百零八招揚名天下他本廟的好徒弟快打這套拳都得一天這可是獨門的把式我于成也沒見過既然來了就得看看好開闊自己的眼界自己眼前這些成名的俠義都管我叫聲哥哥恭維我是個前輩我的徒弟李源輸了這和尚濟源是本廟的二號人物我是在這裏等著所有在場的弟兄都讓和尚給弄趴下了我再上去那我就不是跟和尚交手而是借和尚的手來號我這些兄弟的脈那人家怎麼看我于成呢可我要上月臺去一百零一歲我還能行嗎太不保險了如果我今天是三四十歲甚至五六十歲將來能在緑林道上找回來呀現在我一百零一歲要是栽了跟頭可沒地方找回來呀但是不上月臺也不行阿于老俠思前想後認為還是得上仰仗平生所學戰敗濟源濟慈把鐵善寺的事給了結了然後幫著海川奔八卦山如果我于成上去車攔頭一輛讓濟源給打了鐵善寺的月臺就是我於某的佳城什麼叫佳城佳城就是墳地我寧可死在衆位兄弟的前面也不能讓我的兄弟們死在我的前面老俠想到這裏長腰上了月臺台下的哥兒幾個心都提到嗓子眼兒了老人家往臺上一站和尚上下打量這可不是一般的人物看意思也要高過侯振遠童林濟源合掌問道看老英雄偌大年歲精神矍爍敢問是哪路的高人老人家托銀髯哈哈哈和尚我沒什麼能為在緑林道也是個馬勺的蒼蠅混口飯吃你要問我小老兒是誰就是你剛才提到的打孩兒娘出來我就是展翅金雕鐵掌李源的授業師父西月臺下的人都睜開眼睛驚訝著哎呀這就是緑林道鼎鼎有名的人物西方俠呀這麼大年紀了濟源一陳冷笑阿彌陀佛我打量何人原來是于老俠客不敢當正是在下哈哈哈于老俠聽説早在明末崇禎九年你在幼年時期就闖過桃花會三進桃花寺在北京城京西北妙峰山瓜打石露過大臉踢死過金頭牛撞死過銀頭豹單臂力舉過千斤寶鼎戴過守正戒淫花單掌開碑擊石如粉十八趟通臂掌二十四式形拳打遍天下於老俠擺手過去的事就讓它過去吧那都是七八十年前的事早巳成了昨日黃花不值一提啦老頭兒心説我幹那事兒的時候你還沒生出來呢崇禎九年到現在都八十多年了你不過剛七十歲濟源説老俠客話雖這麼説人老不講筋骨為能英雄出於年少月臺以上乃逞強鬥勝之所萬一老英雄不敵豈不把一世的英名付於東流哈哈哈老俠于成仰天大笑道和尚此言差矣不才于成幼年學藝整世童男直到如今闖蕩江湖不落人後怎麼能提到老呢豈不聞武術講究老辣二字越來越辣呀哈哈想當年戰國廉頗年逾百歲尚食鬥米只羊各國諸侯不敢犯趙後漢的趙子龍年逾八十威鎮鳳鳴關力敵五將何況于成説到這兒于老俠兩手托大白鬍子老只是年歲老可我的手掌不老哇望和尚以身嘗試方知金言不謬也這句話一下子激怒了濟源兩道濃眉往上一立南無阿彌陀佛既然如此恕貧僧無禮請老俠往後撤步左右手上下一搭五花左腳在前橫著一斜右腳在後拿樁站穩小辮往後一甩噹啷一聲響右手掌左手鈎這叫前掌後鈎子拉了個跨虎和尚這叫跨虎阿你學過嗎有拳經讚歌為證跨虎登山不用忙斜身繞步逞剛強上打葵花式下踢抱馬樁喜雀登枝沿邊走童子拜佛一爐香和尚把鼻子都快氣歪了月臺上身為大俠你就用跨虎贏我兩個人彼此各道請濟源腳踩黃瓜架兒兩腿一進步兒左手一晃面門右手往前一趕步進步切掌對準老俠于成的脖子就來了這叫飛蝠展翅老人家于成往下一矮身縮頸藏頭躲於老俠不但要接他的招而且還要記記他的鐵蝠拳見濟源的掌過來一矮身右手一搭腕子左手打和尚左腿的踝骨和尚微然一晃縱身形起來落地無聲進步一切叫金蝠落地對準老俠的胸前便按老人家白虎洗臉往下一耷拉左手伸右手隨著左手一反腕子葉底藏花對準和尚的肋骨便打這個于老頭不虧整世的童男不用腿的時候一擡腿到頭項不用腰的時候往後一仰後腦勺能挨著後腳跟不用跳高時長腰一縱就兩丈三四不用縱遠的時候微然一疊腰就一丈七八行似猿猴恰似狸貓老人家暗地裏就把十八趟通臂掌施展開來但是一點徑兒都不用純粹以逸待勞甭管你來得怎麼快怎麼凶百煉鋼化為繞指柔到于爺的近前全都得化了和尚的鐵蝠拳施展開腳踩八門大僧袍兜起風來如同穿花的蝴蝶兩人扭作一團攪在一處矯若遊龍翩若驚鴻和尚瘋狂進招恨不得一下子把于老俠給置於死地但是他摸不著挨不上更甭説打上人家就是連大褂都沾不上于爺一點兒徑都不使和尚瘋狂用力老俠于成用的是曹劌勝齊之法一鼓作氣三鼓衰竭我且不擂鼓等我翻過來一用力能讓你一下子趴下和尚完全明白于成是以逸待勞而我是以勞勝逸我不敢撤徑了如果我一撤徑命就沒了本來哥兒幾個在台下為老人家擔心畢竟年歲太大了等老人家一動手他們明白了老人家是成竹在胸以逸待勞老人家打了一輩子仗了閲曆豐富濟源就是今天不死也得脫層皮呀大家反倒踏實多了濟慈在大雄寶殿裏往外一看心説哎呀西方俠幾句話就把你濟源火激起來了這樣你不是甘受其苦嗎濟慈這時候不敢想別的只恐自己到時候上臺亂了方寸那鐵善寺不就一敗塗地了嘛師弟不成我濟慈還在呢所以不敢著急濟源那麼大的人物也明白于老俠的招術但他不敢撤招稍一撒力就得輸招他想你于成雖説是以逸待勞難道就不躥不蹦了嗎反正你也是年紀大了這樣一想濟源就更加瘋狂進招老俠于成心説你小於找死呀兩個人還招動手招術加緊踢彈掃挂摟打堂封轉眼間就四十個回合于成擡頭見和尚上右步右手往前搭來了個鬼扯鑽搭他的肩井穴老人回手一個倒撚猴退左步左手往下一按他的胳膊右手一晃他和尚認為老俠于成要打自己忙跨左步轉身右手回來了伸左手打于爺的肩膀和右臂老俠于成就勢再往後一退右步伸右手持他的右胳膊伸左手一晃和尚連三掌左邊一下右邊兩下都被老人躲過去了和尚再往前一起步老俠使了一手雲手左手在自己的眼前一變唰地一個抽撒連環掌右手在自己左胳膊底下往前一滑伸右手往自己的右面一揚跟著塌下身去左手虛晃一掌和尚雙手往下一按一退步老人家右手再往前伸踏中宮一斜身手就伸進去了正按在和尚的左胸膛上和尚再想躲已不可能這時老人才從丹田提一口真氣順著脊梁往上來叫三車拉上昆侖頂達到自己的百會穴通過神庭到達任督二穴也就是上下牙又順著右臂到了右手的指鋒于老俠右手的中指用上內力一點和尚的左乳下和尚的五臟就張開了只聽和尚阿地一聲老人家掌心一托一口真氣用上大喊一聲哈哈渾身顫動蠶眉倒立虎目圓睜和尚哼了一聲老俠于成一掌把和尚托起五六尺高往後一仰叭就把和尚打出去了足有一丈多遠從前孔秀等人在金銀亂石島説老爺於是狗掀門簾子全憑嘴上的功夫拿賊也好破達摩堂也好連一招真能耐都沒用今天在月臺上打得是濟源也讓兄弟們看看作哥哥的還老不老老俠于成往後一撤步雙手一托長髯鼻孔之中擤氣打濟源準備了十成力但不能過了力氣過了自己該吐血了只用了八成力打濟源餘下的二成力順著鼻孔把它擤出來了像兩道白氣這時老人家的汗可就下來了再看濟源仰面倒在地上黑臉膛煞白五官挪位面目痙攣兩隻手按地心想還得起來還沒等坐起來叭又倒下了再想起來噗一口血吐了出來染紅了大白鬍子和灰僧袍吐完之後就昏死過去了紫面龍君羅烈羅焰光金頭獅子孟恩這些人忙出來上了月臺把老和尚擡進方丈室找人治傷紫面伽藍佛濟慈看看法本法鐸法廣這些人道看見沒有你們大夥兒出主意報仇報仇報得了嗎二當家的讓人家給打成這樣濟慈自己一點急怒也不敢動阿恐方寸亂了不能報仇穩穩僧袍下香袋裏的於午間心針在大殿裏念佛南無阿彌陀佛于老俠果然是盛名之下無虛士不枉是武林道的老前輩我師弟濟源被打不虧老俠客請留貴步貧僧討教説著話就出來了濟慈也想不能讓你于成下去你把我兄弟給打了你下去換別人怎麼算我得想辦法把你致死于老俠這口氣可還沒緩過來但仍笑著説哈哈哈哪位和尚阿紫面伽藍佛濟慈一提氣從月臺下上來了阿彌陀佛貧僧濟慈願與閣下在月臺上分勝負見輸贏
