body:
  text: 第三十一回洪玉耳智燒老閻成西方俠掌打濟源僧上回書説到九月九重陽會猛英雄愚昧不知深淺寶杵扎死金咕嘟侯振遠心中嘀咕看來這場禍小不了莫非還有新鮮事兒這月臺下面緊挨著就是他們爺兒四個的桌子咕啷也罕坐在北面臉兒沖南當然要回過頭看月臺上動手南邊是鐵咕嘟坐在西邊面沖月臺的是銀咕嘟他瞧見師兄雙腿一折猛地扶桌子往起這麼一站正巧反臂銅人槊從月臺上落下來砸在銀咕嘟的頂梁上銀咕嘟一聲慘叫哎呀當時死於非命這一下月臺下邊就亂了連東廊下所有的英雄也都愣了鐵咕嘟火了哇呀呀怪叫如雷伸手在桌底下把自己的豹頭鐵娃娃拽出來墊步擰腰噌一下就躥上來了好小子砸死我兄金咕嘟撞死我兄銀咕嘟鐵咕嘟跟你完得了嗎喲你也是咕嘟阿那就過來咕嘟咕嘟吧剛要動手猛然間在東廊下走出一人來一拔腰上了月臺牛兒小子你先等等喲這是誰呀往後一撤步鐵咕嘟也往後一撤步橫攥著鐵娃娃擡頭一看默又上來大個兒原來是霹靂狂風甘虎甘虎吳霸于恆張旺孔秀他們幾個人坐在一塊兒於恆上去動手扎死金咕嘟撞死了銀咕嘟這鐵咕嘟上來了他的個頭比金咕嘟還高腦門子還大面似鑌鐵黑中透亮身子骨結實極了攥著鐵娃娃比金咕啷那個好像份量沈孔秀心眼兒多呀牛兒小子跟金咕嘟撞了半天的徑了現在徑不大了鐵咕啷過來嘛牛兒小子就許要吃虧他跟甘虎就使上心眼兒了我説虎兒小子你趁早躲起來吧你看人家牛兒小子月臺上當場動手砸死金咕嘟撞死了銀咕嘟一下兒弄死兩個咕啷這個傢夥上來嘛你還不敢過去如果這幾個大個兒全都讓牛兒小子給扎死你可就摸不著了對呀我説呀你快過去好虎兒小子伸手把杵拽出來了到月台這兒一拔腰上來道牛兒小子你弄死倆行啦把這個給我留下吧這個要是別人我可不讓我今兒一個人包了你你來了那就沒法子了好吧讓給你嗯我走了傻小子於恆下去了甘虎提溜著杵過來了小子你叫鐵咕嘟阿來吧還用多費徑嘛躺下吧躺好了之後我一杵把你扎死就完了呸胡説八道你叫何名霹雷狂風甘虎小子你讓虎爺費徑來吧説著甘虎往前一搶身唰舉起八稜紫金降魔杵就砸鐵咕嘟上左一滑步丹風朝陽奔甘虎的太陽穴打下來了甘虎往下一矮身縮頸藏頭躲開順寶杵走掃堂鐵咕嘟腳尖兒一點地長腰邁過去兩個人當場動手走行門讓過步就打起來了鐵咕嘟奔甘虎的太陽穴拿鐵娃娃一砸甘虎上右步一斜身這手功夫叫金剛亮背迎著鐵娃娃寶杵往下一砸噠一見響豎力砸橫力鐵咕嘟這個鐵娃娃是橫著過來的虎兒小子那個是上下的一般兒大的徑頭橫的就得吃大虧呀鐵咕嘟的鐵娃娃往下一耷拉虎兒小子就一反右手的腕子寶杵橫風掃月正中鐵咕嘟的腦袋上啪嚓腦漿進裂萬朵桃花開鐵咕嘟當時死於非命月臺上月臺下三具死尸人們都在晃動心説可了不得了一會兒的工夫死了仨流了血了老寨主咕嘟也罕眼淚汪汪伸手從桌底下抄出自己的八稜紫金倭瓜錘一根錘杆四尺八上頭一個大倭瓜純鋼打制罩著金衣這倭瓜就跟真的似的還有個倭瓜把兒能拿人家的軍刃他一邁步從月臺底下上來了怒道哎猛漢甘虎傷了我的弟子金銀鐵三咕嘟認識老夫咕嘟也罕吧你咕嘟就咕嘟得了還喊什麼呀過來吧老東西咕嘟也罕往前一搶步雙手一合八稜紫金倭瓜錘蓋頂就砸猛英雄拿寶杵尖子一點他的手腕兩個人這麼一動手幾個回合開出去軍刃也沈步眼也快咕嘟也罕就有點兒喘了八稜紫金倭瓜錘蓋頂一砸傻小子甘虎上左一滑步拿這單杵往上一撩他把咕啷也罕的八稜紫金倭瓜錘就給砸出去了喚虎出洞正中咕嘟也罕的胸口窩上這八稜紫金降魔杵噗哧就扎進去了就看咕嘟也罕渾身這麼一顫五官挪位死了虎兒小了啪這麼一拔杵死尸往前一栽悶著的這股子血噗噴了甘虎一身這個時候從大雄寶殿裏頭來了個小和尚站在月臺上就高聲喝喊天下的英雄鐵善寺的門人弟子聽真方丈有渝暫時罷戰傻小子甘虎在這裏等著吧這小和尚從月臺上下臺階繞過了香池子登殿階進了大雄寶殿一會兒的工夫法廣從裏頭出來了來到東廊下合掌打問道阿彌陀佛侯老俠童俠客雙猛打死四個寨主這個事情就算鬧大了我家兩位方丈恭請侯童二俠客大雄寶殿二次談話侯老俠一抱拳好我弟兄這就前往王爺囑咐海川呀一切聽哥哥的阿千萬千萬你要少説話王爺你放心吧老哥兒倆站起身形隨著法廣往回走來至大雄寶殿殿階前濟慈濟源依然迎出門外阿彌陀佛二位俠客請吧哥兒倆一抱拳進了大雄寶殿彼此落座海川的性子很急王爺怎麼囑咐也不成沒等侯老俠説話海川一抱拳二位方丈把我弟兄喚到大雄寶殿有什麼金言賜教童俠客侯俠客濟慈歎了一口氣今天這場事貧僧可真沒料到指望我們兩下裏紅花白藕青荷葉三教原來是一家雙方言歸於好從此再不犯心沒想到今天在月臺上動手指望是點到而已各自把自己的絶藝留在月臺以上成為千秋佳話現在雙猛打死四個寨主杯盤之地一時化為干戈之場使貧僧一唉有些覆水難收阿因此把你們哥兒倆請來商量商量嗷高僧你説吧別的事情先甭提有道是殺人償命欠債還錢咕嘟也罕是塞北沙燕嶺的寨主帶著三家弟子爺兒四個千里迢迢打塞北來到江南現人家師徒爺兒四個盡皆致死説真的要是一刀一槍當場動手致死也不冤屈而這是暗算傷人以貧僧之意這樣兒可不成那麼高僧打算怎麼辦呢殺人償命欠債還錢沒有別的請你們二位回去把雙猛交出來就在月臺上斬殺給死去的師徒爺兒四個抵償性命然後咱們再説下一步我總認為這還是一手托兩家金磚不厚玉瓦不薄哇老俠侯振遠剛要説話童林一搖頭二位高僧阿當場動手各憑己能格殺勿悔誰讓他沒能耐呀再説高僧你的話跟你的心不一樣阿如果高僧真認為我們雙方言歸於好鐵善寺是個説理之會那麼又何必準備六條絶戶計呢我再問高僧既然想言歸於好約我弟兄二人來到鐵善寺説理那麼又何必埋藏地雷阿濟慈濟源都一愣心裏説這個事情他怎麼知道呀高僧你們二位所行所做司馬昭之心路人皆知阿雙方有能耐就動手沒能耐的量力而行趁早別上去在旁邊看個熱鬧當場動手難免傷人高僧這事情不能抵償濟慈濟源聽完以後説道阿彌陀佛童俠客你所説之話也算有理好吧咱們雙方動手各憑己能這便才是高僧你還有事嗎嗷沒有了一告辭哥哥咱們走吧老俠侯振遠心説兄弟我聽你的了哥兒倆一前一後出來這回濟慈濟源可不送了兩個人回來以後落了座王爺細問侯老俠説些什麼呐你問海川行了我一句話沒説海川就把兩個和尚所説的話全都説了最後補充道我問的就是這個為什麼用六條絶戶計要把我們全部害死到那個時候誰給我們抵償阿又問為什麼安放地雷王爺點頭對抵償這一説沒有有本爵我在這兒死幾個人沒關係我頂著他們倒行逆施有目共睹咱們大家留神注意得了侯振遠一想得王爺又發話了這下子多助威阿濟慈濟源等海川侯振遠哥兒倆走了馬上派法廣把所有的尸體擡封後面塔院然後把血迹完全收拾乾淨連桌子都撒了濟慈説童林問的話怪呀六條絶戶計他們都知道了因為有甘虎這一層那麼這地雷的事情他怎麼也知道了是阿我也納悶兒呀法本阿彌陀佛弟子在你帶著幾個人到後頭風雨亭看看法本帶著人到風雨亭這兒把石頭挪開把鐵鍋撬起來一看紋絲兒沒動呀法本回來了老人家這地雷的藥沒動阿嗯必要的時候再説吧你傳下話去所有西廊下的人一定要量力登臺儘量施展自己的拿手絶藝致死東廊下的人一切後果由我弟兄負責但是如果自己不小心死了我們可不管又對法廣道你去月臺上宣布此事老和尚一面派人到西廊下暗中全串通了一面又指揮法廣來到月臺上法廣合掌打問訊天下英雄四海豪傑聽著月臺上雙猛打死四個寨主我家方丈把侯童二俠客請到大雄寶殿言説殺人償命欠債還錢讓雙猛抵償性命童俠客不允童俠客説了當場動手各憑己能格殺勿論咱們請天下英雄哪一位登月臺都要量力而行否則死傷我家方丈概不負責説完了法廣回去了甘虎往這兒一站發話道小子還有不怕死的嗎快再過來一個猛然間由廊下燕子三抄水飛身形登臺如同一片紅雲彩霧上來了傻小子甘虎這麼一瞧喲這是個什麼東西呀敢情是個老道叫大塊的紅綢子包起來了此人腰裏扎著紅綢帶子兩隻薄底靴子肋下佩著劍斜插柳背著個大葫蘆這大葫蘆有一尺多長有葫蘆蔓紫紅紫紅的葫蘆嘴頂著他的腦勺突突亂顫這個老道就是仙霞嶺棲霞觀的觀主五龍火祖閻成閻成的能耐大小咱先不管他有個專門的東西就是身背後這大葫蘆他這大火葫蘆是長成了以後摘下來陰乾等全幹透了一劈兩半兒裏頭做一個薄薄的紫銅片的衣兒把所有的火蛋兒完全都裝在裏頭當中有一個筒一直到葫蘆蔓底下這裏頭有一盤硬簧你打出一個去從旁邊兒擠進一個蛋兒來再從底下一拉千斤匜葫蘆蔓一起就把這煙硝火蛋崩出去了崩在你身上就起火所以他叫五龍火祖這個老道也十分厲害呀無量佛猛漢你二人致死我寺好友今日山人要大開殺戒好小子你叫什麼東西五龍火祖貧道閻成好了亮你的寶劍姓甘的跟你討教討教閻成也知道甘虎你別看他憨憨楞楞實際上他的能耐比于恆強於恆不會躥不會蹦可甘虎會躥會蹦而且心眼兒多閻成便説甘虎進招來甘虎往前一起步左手一晃面門往前這麼一攤唰地一下白亮亮一道寒光對準閻成的胸口就扎來了閻成也知道這個傻東西可十分厲害呀他上左一滑步拿寶劍一點甘虎的腕子甘虎往回一撤步他反過腕子來劍走撩陰甘虎往後一撤步他寶劍走半截撤回來便上左步一斜身劍在左手右手伸到背後一拉千斤匜啪噠葫蘆蔓一起用自己的腦瓜頂找準唰地一個小蛋兒就出來了正打在甘虎的胸口上火起來了閻成撒腿就跑這時甘爺在台下著急了我兒子雖渾身橫練刀槍不入但也怕火燒呀孔秀趕緊過來呀虎兒小子嘁哩哢嚓把甘虎的衣服給撕下來了把皮帶也給拉下來了甘虎光著膀子火倒是弄滅了前胸口燒了雞蛋大的一片旁邊有人念佛阿彌陀佛虎兒過來貧僧給你治治這就是左臂花刀小火神洪玉耳的授業老師神行賽羅宜普妙在三義莊的時候普師傅偷得炳南公洪利的六手閃手刀最後又教給了炳南公的兒子玉耳他就是火神爺呀他傳洪玉耳放火可就跟閻成這個不一樣了他放火的藥黃豆粒大的這麼一塊擱在指甲縫兒裏當場動手不留神啪往你身上一彈一會兒的工夫就起藍火你要用手這麼一摸一胡嚕就著一大片更凶了普師傅治這燒傷那也是一絶就見他拿出兩樣藥來一樣兒是白麵子藥拿個小茶碗趁著這兒有熱茶倒上一點熱茶和弄和弄讓甘虎喝下去這個幹嗎護住心房別讓這火毒攻心又拿出一種粉紅色面子藥來也用熱茶調調要是起泡可就麻煩了為什麼呢一起泡肉皮兒一破這金鍾罩就完了所以不等他起泡拿藥就給他糊上了老俠甘鳳池把包袱打開拿過一件衣裳來你呀先穿上吧甘虎把衣裳穿好了坐在那兒踏實多了五龍火祖閻成一按寶劍無量佛衆位方才這位姓甘的甘虎阿