認識的直到海川取金牌王環哈哈大笑噌一下跳將下來把五佛冠摘掉把僧袍錦藍袈裟一脫現露出自己的本人來挨次一行禮海川才道孩呀你怎麼跑到這裏來我們都急壞了你幹了些什麼王環把自己的事情説了一遍海川把金牌拿過來一瞧跟自己手裏的假金牌一對這個分量差多了這時候七星八寶轉心亭下面一陳大亂譁譁譁譁梆梆梆一陳梆子響震人耳鼓四百名長箭手一下子把七星八寶轉心亭團團包圍張方一瞧哎喲可了不得了四百名弓箭手打梆子一定是趙小喬趙遠峰所為司徒朗這老頭兒可真急人家袁先生算計到了我沒把趙小喬趙遠鋒父子二人殺掉現在出了這麼大的禍事他帶著長箭手來到老頭打包袱箭翎這麼一忽閃嚓楞楞把五行輪亮出來隨我來爺兒幾個順著三層樓下到二層樓顧著二層樓往樓下走這可就有危險了因為四面的門開著四面都有弓箭手司徒朗剛要往外沖梆子一響亂箭齊發老人家司徒朗不顧死活一分五行輪撥打雕翎準備往外一躥就在這個時候這長箭手的身背後來了人撲哧撲哧拿寶劍就這麼一挑這人是誰火德真君趙謙趙二爺趙二爺這幾天盡找王環就是找不著晚上他知道有人來破亭子就收拾東西把放火藥掖起來也到七星八寶轉心亭來梆子一響趙遠峰趙小喬帶著弓箭手一圈趙二爺心説可了不得把這些位都給圍在七星八寶轉心亭內我呀對不起你蹦過去摸著黑在後頭一陳大砍長箭手叫苦嚷糟司徒朗早就蹦出來趙小喬一看正是賣豆腐的掌匱譁啦一聲響鑌鐵虎尾三節棍蓋頂就砸老人司徒朗跨步閃身就在這趙小喬的肋窩子上撲哧一下就扎了進去趙小喬撒手丟棍一聲慘叫咕咚就躺下了趙遠峰一看千頃地一根苗我就這麼一個兒怒從膽邊生老小子你把我兒子殺了趙遠峰飛身形過來一甩虎尾三節棍阿老人家司徒朗跨步閃身左手輪立著一穿右手輪就到了他的脖子哧一輪扎死趙遠峰司徒朗把這爺兒倆全扎死所有洞庭湖來的長箭手呼啦下子全跑了司徒朗高聲喝喊快出來呀爺幾個呼啦就撞出來了趙二爺可沒看見王環王環也沒看見火德真君趙謙趙二爺趙二爺把趙遠峰趙小喬一個一個的死尸搬到七星八寶轉心亭內趙二爺一想我在這兒住了幾年人家段國基段國柱待我也真不錯又把這七星八寶轉心亭託付給我我現在要回家得了我也送給你點禮物吧趙二爺一伸手把放火藥的藥瓶拿出來打開蓋手指頭一粘就是一塊往四面一抹一會兒的工夫大火就著起來趙二爺看了看沒錯了老頭回山下收拾收拾東西回家了爺兒幾個打七星八寶轉心亭出來往西走三俠在頭裏袁化袁先生這些人在後頭走到西山坡再往下走有二道寨門再往下還有頭道寨門這是三道寨門的一拐彎這個地方十分平坦就聽當當當鑼聲響亮響徹連天原來大寨內自鳴鑼一響知道七星八寶轉心亭有人給破了忙派人到後邊一看立刻報告大寨主段氏弟兄率領一二百人各持軍刃短衣襟小打扮絹帕纏頭由打大廳裏頭一出來剛往北一拐人就到了老人家石金聲來到且近一躬到地大寨主二寨主老夫石鐸有禮石老俠真想不到阿你把我七星八寶轉心亭給破了大寨主當初海川在大廳前與大寨主你三擊掌破了七星八寶轉心亭金牌我等拿走你弟兄束手到案打官司哈哈哈沒別的這場官司你們哥兒倆打了吧等等段國基飛身形過來用手點指石老俠人敬人鳥擡林你們弟兄太不仗義大寨主你讓我們一個月內破亭屈指算來也不過數日之功七星八寶轉心亭已經破掉怎麼算我弟兄不仗義老夫九十六歲不義之事我長這麼大沒有辦過石老俠我問問你我們跟誰打的賭一月破亭當然跟我弟兄打的賭對亭子是你破的嗎是童俠客破的嗎是袁家屯百靈先生袁化破的袁先生在那邊站著呢西風長老秋禪當初介紹百靈先生袁化把七星八寶轉心亭的亭圖畫出來我準備了一萬兩黃金才把這七星八寶轉心亭修齊嗷袁先生給我擺的亭子你們請出袁先生破亭解鈴還需系鈴人那不是你弟兄三人的本領我弟兄不服哈哈哈大寨主不是石某強詞奪理如果你們要説不許可擺亭之人來破亭那你就應當講在前面説話説在前頭是話你們並沒有説出來當我們把袁先生請來之後把亭手破了你這個時候再説豈不晚矣那袁先生可就不對了當初我請袁先生給我擺亭袁先生怎麼又來破亭呢這叫什麼事為人謀而不忠哈哈哈段大寨主你這話很不合乎道理袁先生一想人家怎麼不合乎道理呀我給人擺的現在又給人破了出乎爾反乎爾我真對不起他這石頭老子還有什麼可説的哈哈哈大寨主袁先生給你擺亭其目的何在就是你段家有一些貴重的財産貴重的東西珍寶等物怕人家偷你給你擺這個亭子讓你存這些個珍寶所以袁先生才給你擺亭而今天你用七星八寶轉心亭做了什麼了你把欽差大人的金牌放在七星八寶轉心亭裏你利用七星八寶轉心亭阻住年欽差不能起馬直奔四川開倉放賑與朝廷為敵是十惡不赦那袁先生就擔不起了甭説袁先生還是我們邀請出來的即便袁先生自己知道他是大清國的子民受國家的雨露之恩他也應當挺身而出來破此亭難道説你段國基不法袁先生也跟著你不法嗎依我説話應前言金牌我們已然得到你跟我們規規矩矩地到趟太原府在大人面前請罪全始全終童海川銷票無事大人斟酌情形愛惜武林也可能貴手高擡饒你不死阿因為我石金聲為弟子報仇刀劈楊山鏢打了段世寶對不起你弟兄今後你們銷聲匿迹閉門思過也就是了段國基勃然大怒亮出刀當場拚命真是酒逢知己千杯少話不投機半句多
