body:
  text: 第七十四回見金牌真假難分辨遇王環火焚轉心亭上回書説到磐石島少劍客花純搭救師侄碧霞爺兒倆一塊回到這瀟水河的河岸打發磐石島的船隻回去少劍客花純才問十年前你在葡萄架底上練鷹爪力有人告訴你解皮條瘩疙你知道是誰我不知道那也是你師大爺哈哈結果你現在解開了好象是功夫出來了可這手指沒辦法掰不開鑷子了拿筷子都費徑我打算找我師父問問怎麼辦你師大爺跟我提了甭找你師父了哎那麼你説有辦法嗎回去阿每天早午兩遍用熱豆腐漿泡手泡半個時辰然後就用熱豆腐片貼手把你的手指頭都包過來貼上這樣用不了一個月那麼它們就全軟乎了但是你的功夫依然保存你記住師叔阿我全記住怎麼我師大爺沒跟你一塊兒來阿他有事回延安啦你不如上我家住下明天再走不咱爺倆就此分手碧霞和花純分手之後沒有回廟就奔太原府南邊一帶來了連走帶逛今天他就走到七星山後山正是夜晚之間他突然發現一條黑影唰啦啦在眼前頭過去了碧霞和尚一按刀把揪僧袍追下來碧霞能耐是不錯轉眼之間追了個首尾相接嘭騰身一腳把賊人踹倒在地然後一按刀把一頂繃簧嚓楞楞把戒刀亮出來夜晚之間你施展夜行術鬼鬼祟祟定不是好人貧僧雖然出家人也本著除惡即是善念的宗旨我把你宰了這人可嚇壞了大師父你等等你先等等小子有話説借著星斗的光華碧霞和尚攥著刀一瞧這人也就在三十來歲斜插柳背著個小包袱問道嗯你是幹什麼的今個晚上你幹什麼去你跟我説實話大師父你要問小子我姓劉我叫劉善嗯劉善你在哪兒住呀我就在七星山當個小頭目侍奉我家軍師我家軍師姓李名字叫李吉有個外號人稱狼狽我是他手下的踩盤子的小夥計你説下去不瞞你説呀在咱們山西太原府東北角不遠的地方有一座廟這座廟的道長姓梁名字叫梁妙興有個外號叫九轉還陽道他有個朋友也是我們老寨主的朋友這個人在西川路那是了不起的一個大人物叫一棵苗禿頭義士馬亮江湖武林道的好人壞人大部分都認得他都跟他有交情別廢話説哎我説他呀在太原府城裏頭夜入公館乘人家官人不防備的時候他偷出代天巡狩如朕親臨的金牌好偷大人的金牌這個你放心跟我沒什麼關係結果這件事情被我家寨主知道我家軍師李吉跟寨主説必須把金牌要到七星山不瞞你説這個事情你不知道阿我家老寨主反手托天金頂狻猊段國基二寨主霹靂烈火火眼狻猊段國柱都是陝西長安城西北一百五十裏地白沙江裏的萬龍藏風島的人有意反叛國家想著把金牌得下來送往陝西萬龍藏風島這樣呢他只好帶金牌同梁道長一齊來到七星山當時遠接奉迎説好的過了兩三天這一棵苗禿頭義士馬亮一瞧這七星山無險可守保欽差大人年羹堯的隨行衛員伴差官鎮八方紫面昆侖俠童林童海川能耐可大了就你這小小七星山能擋得住人家童俠客爺當時他把金牌交給老寨主放在七星八寶轉心亭內沒想到他又要當然我家寨主爺不給兩方面就爭執起來愈演愈烈險一點都動了手狼狽李吉最後還是把這金牌給了他一棵苗禿頭義士馬亮也是老緑林跟人家山裏頭已經不和了金牌也給你了你就走得了可是他還總在人家山裏住著我家李軍師就跟我説馬亮沒安好心可能要謀害寨主把寨主給殺了我一聽怪生氣的我家老寨主待你不錯阿人家不為金牌幹嘛把你接到七星山來呀到現在把金牌給你了你還不走還要刺殺我家兩位老寨主我就借著侍候他為名到晚上他睡覺了我就給他用了熏香我把包袱給他一搜查結果把這金牌搜出來了當時我劉善想這個金牌不能再放在七星山七星山有意要挾欽差大人他們要送往萬龍藏風島乾脆我呀請個假出去把它送往太原府公館交給年大人我要將功折罪這樣我才暗地裏離開七星山從後山駱駝嶺旁我打算奔太原府不想你這大師父腳程很快結果把我逮住了此是以往實情還望大師父貴手高擡饒小子劉善一命我感激不淺你説的都是實話嗎我怎麼能蒙哄大師父你呐既然是實話金牌在哪兒呢金牌在包袱裏頭包著呢和尚把刀還鞘包袱打開翻了翻一瞧可不是黃澄澄赤金如意牌上頭有朱紅字代天巡狩如朕親臨你別看碧霞心眼挺細翻過來調過去掂著分量把金牌揣起來回手把刀嚓楞又拉將出來劉善一哆嗦怎麼啦大師父苦海無邊回頭是岸放下屠刀立地成佛我把屠刀放下了你幹嘛又拉刀惦著宰我呀碧霞和尚道劉善你有這一念的好心貧僧怎麼能殺你希望你洗心革面痛改前非金牌歸我了和尚拿了二十兩紋銀來得了給你當個路費回到家裏做個小本經營也能吃飯在七星山當賊終非了局我説得對嗎羅漢爺謝謝你你説得都對小子給你磕頭把銀子帶起來得了大師父青山不改緑水長流他年相見後會有期小子劉善跟你告辭了抱頭鼠竄跑得無影無蹤碧霞和尚把刀入鞘自己從懷裏把金牌拿出來一邊走一邊看在樹林裏頭突然間就聽見有人樂哈哈哈逮住你然後到七星八寶轉心亭得到金牌碧霞一聽金牌在我手裏怎麼有人還要得呀從樹林裏頭往外一瞧一老二少拿住了一個人和尚一高興就喊上了南無阿彌陀佛老朋友你要找金牌呀金牌在此碧霞和尚噔噔噔噔走出來九尾宗彜世間妙手司徒朗帶著張方孔秀把趙小喬給誆下來老人家司徒朗正捆趙小喬呢忽然打樹林裏出來一個蛤蟆臉的和尚托著黃澄澄的金牌來到切近張方孔秀都愣了大爺這是怎麼回事阿彌陀佛老朋友你們要金牌你們都是幹什麼的張方就把自己的事情都説了我們到這兒來就為把駱駝嶺的趙小喬趙遠峰治住大傢夥好奔七星八寶轉心亭破亭子奪取金牌嗷是這麼回事你們衆位是官人老朋友你怎麼稱呼九尾宗彜世界妙手老夫司徒朗阿我聽這名字怎麼這麼耳熟你的老師姓莊叫莊道勤對不對阿和尚你怎麼知道老夫的授業恩師阿哈哈我師父是青雲長老寶鏡莊道勤的師弟那麼你也是師弟啦哎喲你怎麼稱呼核桃園關帝廟的住持我叫水底金蟾碧霞僧師哥那就沒的説了老師哥在上貧僧拜見哎喲師兄弟起來起來金牌你怎麼得的你跟我説説碧霞僧就把事情由頭到尾都説了老哥哥既然如此我把金牌給你吧大兄弟咱們是一見如故阿這是你奇功一件哎師兄阿咱是一個出家人要什麼功勞但願金牌得到讓大人早日起馬奔四川開倉放賑救濟災民老哥哥我跟你告假就走了別價阿你跟我們一塊兒走不不不師兄小弟急於回廟去醫治我的雙手張方孔秀也都攔怎麼也不成説罷就走了張方道咱想取金牌結果金牌在這裏得到你説這事多巧哎小子剛才我看了我琢磨這金牌不見得是真的即便是真的怎麼能得來這麼容易呀張方點頭依你之見呢依我咱們趕緊通過臥虎灣到七星八寶轉心亭也許你叔他們同著袁先生到了咱們見著他把這金牌交給你叔是真是假讓他們去鑒定大爺你説得太對了老爺兒仨把金牌帶好扔下趙小喬不管了撒腿往西來老人家司徒朗多次進七星山七星八寶轉心亭他也去過多少趟所以這條道他很熟按原道通過一線通趕奔七星八寶轉心亭趙小喬還在駱駝嶺下捆著呢等到老寨主多頭太歲趙遠峰下來才把趙小喬的綁繩給解開兒阿賣豆腐掌匱的呢爹呀什麼賣豆腐掌匱的他們是前來殺你我父子的好呀多頭太歲趙遠峰氣得哇呀呀怪叫如雷帶著兒子也奔七星八寶轉心亭而去司徒朗他們爺兒仨到這裏百靈先生袁化已經把七星八寶轉心亭周圍的周邊消息完全都關掉爺兒幾個都在七星八寶轉心亭的臺階下站著大家還沒進亭子煙籠霧繞七星八寶轉心亭燈火齊明照如白晝老人家司徒朗高聲喊海川等一等把金牌掏出來海川伸手把金牌就接過來喲你們爺兒仨怎麼得了金牌老人家司徒朗就把剛才的事情説了一遍問道你們看看這金牌是真是假海川掂了掂分量問良兒你看看司馬良過來拿起金牌掂了掂道師父我琢磨這金牌是假的沒有原來的金牌分量沈百靈先生袁化點了點頭海川不是袁某要居功七星八寶轉心亭如果不把它破了終究是患這是一金牌是真是假我們也應當把七星八寶轉心亭破了到裏頭看看果真沒有金牌也可能是真的你説呢就看百靈先生袁化一拔腰噌地一下就上了臺階到了左邊這根抱柱底下看著好象是大塊石頭上頭是柱子其實這石頭裏頭有一塊假的是多少塊石頭對的表面看是石頭實際上拿手一摳就下來是木頭片釘的跟石頭一樣把這個東西扒拉下來以後裏頭有一個銅拐子袁先生拿起銅拐子就跟鐘錶上弦一樣哢哢哢一共上了九扣重新把石頭再安放上説你們爺兒幾個跑上來吧在臺階上下沒事果然爺兒幾個上了臺階沒問題司馬良瞧著嗨老人家司徒朗凡次就找不著機關看來人家百靈先生袁化要勝司徒朗一籌其實呀老頭司徒朗在外國學的消息埋伏要跟咱們中國的消息埋伏差得遠呢他是從西洋學來的實際上在武林道有兩個門戶專門做消息埋伏一個門戶是百靈先生袁化受業于南陽臥龍莊諸葛華老義士還有二個門戶出在山東泰安州大傢夥兒讚歎了一番海川這才知道消息埋伏不是武術所能敵呀武術不管事唉這不是達摩堂阿怨不得我哥哥石金聲一再地攔我英雄想到這兒就注上意了站在門口外頭往裏看有只老虎在夜晚之間叫燈光一照兩隻眼睛跟玻璃球一樣喝好凶阿海川你們老哥兒幾個看看這只猛虎可非常凶一般地説我們到了這兒上了臺階邁步就要進這門一登上門裏頭的這塊方磚老虎就張嘴上中下叭叭叭打出三支弩箭來這三支弩箭都是毒藥箭見血封喉天羅神仙也逃不出去阿不是打完了三支弩箭就完了它還有一撲之力非常凶惡那麼袁先生你看這個消息埋伏怎麼破呢袁先生接過金頭壽星洪勳的虎頭墨鱗刀往下一矮身腳尖一點地輕身提氣噌這手功夫叫蛇行縱跟一條長蟲一樣一道直線向上從老虎的肚皮底下鑽出去叭來個大蟒翻身落在老虎的胯骨軸上左手一刀哢吧一下把老虎尾巴就砍了下來原來老虎尾巴裏頭有個三尖的大鑰匙順著砍下來的痕迹把鑰匙一擰老虎咕嗵就躺下了百靈先生袁化腳尖一點地下來站穩一招手群雄都進來了司徒朗老頭一瞧道袁先生你這消息埋伏好精明好厲害呀我在我的玲瓏島修得全山都是山窟窿都沒有這種精致的東西老義士呀你誇獎了那是室外的東西這個屬於室內的東西你再看這五霸爭雄大牌樓椽子頭全都是毒藥弩如果你從牌樓底下一過這毒藥弩就萬箭齊發跟下雨的一樣你躲不開而且這個毒藥箭都是用毒藥喂過的十分厲害剮上一點蹭上一點只要肉皮一見血毒氣就進去袁化來至這大牌樓時底座邊兒往這兒一站拿起刀來順底下一擰擰下這個蓋來把手伸進去裏頭有機關就聽這牌樓裏頭咕碌咕碌一響一會兒的工夫袁化把手縮回來把蓋兒蓋上行了這個牌樓沒問題了牌樓過去是個人熊這人熊不但站立而行嘴裏頭肚臍眼裏頭也能打出毒藥箭來袁化飛身來到人熊的背後就在他的脖梗子上拿刀啪嚓一切這人熊的腦袋一轂轆就看見腔子裏頭唰地一下出來一個橫拐子東西袁化拿刀啪一削人熊倒下大家隨著袁化往裏走到了樓梯這個樓梯三十六層梯上頭有三十