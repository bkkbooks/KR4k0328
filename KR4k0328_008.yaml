body:
  text: 第八回法禪僧踩街顯威風童海川打擂見神功上回書説到火焚巢父林老俠客侯振遠帶著童林到西北村口借火光發現四個人海川喊道老哥哥內有盜寶二寇老俠一亮龍淵古劍用手點指好賊人竟敢火燒老夫的巢父林還不下來受死等待何時韓寶吳志廣是驚弓之鳥吳得玉柳未成是兩個臭賊可他們想在二位莊主面前逞英雄呔看我二人的本領説著往下縱身過來斜肩帶背就砍老俠左腿一上步右手寶劍從下往上一撩劍走青龍出水嗆啷一聲吳得玉的刀就兩截兒啦就在一怔神兒的工夫老俠右手劍反腕子一推就是賊人的脖子上唰劍從脖子上過去腦袋就搬家了柳未成一看急了從後邊蹦起來對準老俠後腦就劈老俠久經大敵聽風辨物鷂子翻身輕如落雁寶劍一壓刀嗆啷跟著劍尖照定柳未成的哽嗓一點噗哧就扎進去了老俠也不拔劍往下一矮身照著賊人小腹上一腳蹦死尸一溜滾兒出去好遠韓寶吳志廣亡魂失膽撒腿就跑急如喪家犬忙似漏網魚老哥倆腳一加緊追了上去眼看追上韓寶二位噗嗵都跳下河去了海川不會水問哥哥你會水嗎老俠把寶劍帶好説劣兄不識水性海川一跺腳道咳怎麼我不會你也不會哪沒有辦法哥倆只好回去了這時候火也救滅了等來到家中王爺他們都在大廳裏等著本村的村正村副排頭戶主一些老人們都是盛世耆英十幾位全來了二爺拿著一張紙問哥你看吧誰家損失多少都在上面鄉親們過來道老爺子二老爺子説是你的話鄉親們損失都要賠這不能阿侯老俠面帶笑容道老哥老弟們真的是自己不慎失火我弟兄當然不賠這把火是跟我有仇的人放的我會叫侯寶管家按戶賠償的於是叫來侯寶頭一件事讓他按戶賠償二件事連夜殺豬宰羊預備二十桌酒席明天給鄉親們壓驚把該請的父老開出人名來挨戶通知侯寶接過紙條答應著走了次日清晨在大廳前擺下二十桌酒席王爺他們也入座老哥倆給大家輪流斟酒開懷暢飲酒過三巡萊過五味老俠傳話道酒萊慢上大家也就停杯不飲只聽他道鄉親們侯廷與弟兄侯傑當年隨父下居巢父林落戶棲身已經兩代了多蒙鄉親擡愛我弟兄常言説得好好漢護三村我弟兄身為俠士拜師習武多年來村中不失一草一木總算對得起鄉親們不想昨夜竟有仇人縱火使鄉親們受驚乃我弟兄之過也已命侯寶管家如數賠償以補罪過今天請鄉親們吃杯薄酒壓驚略表寸心從今日起我弟兄蒙好朋友邀請暫離家鄉今後再有昨夜之事我弟兄就不能負責了千萬請鄉親們多多諒解老鄉親們異口同聲道老爺子鄉親們沾了兩位老俠客的光為我們遮風擋雨我們是感激不盡大家吃得酒足飯飽全都告退了當夜老俠把家事安置停妥計算一下人數王三虎提前回去不算王爺海川李源侯振遠侯敬山孔秀李寬李勇阮和阮壁徐源邵甫閻玉鮑信侯俊侯寶壞事包張旺再帶上七個聽使的家人一共二十四位次日清晨備好了馬匹來到村口先請王爺上馬然後老少上馬出離巢父林飢餐渴飲曉行夜宿行船過渡行隘過關直往杭州進發長話短説來到杭州進北新關穿城而過一出錢塘門就是西湖衆人順著蘇堤而行真是上有天堂下有蘇杭王爺初到江南看這錦繡江山美景如畫目不暇接仕女如雲如燕瘦擬環肥粉白黛緑一個個紅飛翠舞玉動珠搖蘇堤兩岸楊柳搖曳隨風飄擺令人心曠神怡胸襟舒暢兩旁碧波千頃漣漪蕩漾湖中的彩蓮畫舫油漆得五顔六色走馬王孫揚鞭公子攜帶歌妓在船上聽彈觀舞琴韻悠揚笙歌悅耳醉生夢死遠望青山疊翠直入雲端天空白雲片片澗內流水潺潺飛來峰上寺廟隱約可見猿鶴相親松竹為友樵子謳歌漁夫撒網山清水秀人物精奇遠眺雷峰夕照近睹三潭映月樹影入湖魚上樹槐蔭照地馬蹬枝江南美景別有洞天王爺貪看風景早已來到上天竺街熙來攘往十分繁華路北臨街一大片房屋當中大門兩邊走馬車門一塊黑匾金字金龍鏢局上首斜插著鏢旗黃緞色旗面紅蜈蚣走穗紅火焰紅飄帶葫蘆金頂紅纓子一行小字金龍鏢局小孟嘗當中一個黃字鏢師夥計足有一百多名很是威風王爺一看當中站著一位上年紀的人看來有六十多歲是練武藝的人身條兒很美身穿藍綢子大衫兒腰系絨繩白綢子褲子衫白綾襪子福字寸底履面如冠玉白中透潤眉分八彩目若朗星鼻如玉柱唇似塗朱頷下一部黑鬍鬚微見幾根白的一條發帶形神瀟灑風采可愛這人年輕時候一定很俊到老來還是那麼利索左肋下插著一把大鐵扇看來不是為扇風止熱的大股小股都是純鋼打制一尺八寸長帆布的面兒你看著像竹子的其實不是這種兵刃專講究點穴右手用扇子左手和用劍一樣也是並食中二指的劍訣這是金剛指點穴法點穴共分四種每種九手共三十六手有九手輕穴九手重穴九手醉穴九手軟麻穴點上輕穴人就好像岔氣一樣不能動轉挪移軟麻穴位被點之後非軟即麻跟過電似的醉穴被點如同酩酊大醉東倒西歪必須在旁穴上順氣才能好也就是用手指點在醉穴上他就不能自控相反在別的穴上一點馬上又恢復正常但是重穴可就不然了不能隨便點在人的身上如果一點人當時斃命如華蓋穴咽喉穴湧泉穴陰交穴腎腧命門天聰百會承泣四白這些穴道點上輕則重傷重則喪命這位老俠家住鎮江瓜州張家莊姓張名鼎字子美江湖人稱風流俠鐵扇仙他的教師是山西太原府管轄下尚家台的人姓尚名秉字均衡有個外號叫銀鈎無敵鎮太原家傳十八趟形鈎威鎮武林張子美當年長成之後尚老俠有個姑娘就給了徒弟張鼎了現在張鼎有個兒子正在廣東學藝尚秉有個老來生的兒子小名叫二嘎子大名尚義跟父親學武藝兵刃是亮銀雙鈎外號雙銀鈎太保張老俠跟侯老俠是結義弟兄他聽武林人説到擺擂臺的事情他先來到金龍鏢局黃燦當然很高興把事情都説了爺幾個盼著侯廷他們早日來到今天聽説來了張子美才帶著黃燦他們接出來黃燦跑過來跪在侯老俠的面前眼睛發紅眼淚差點流出來道弟子無德給師父惹事使你和叔叔偌大年紀為弟子奔波弟子良心何忍侯老俠把他拉起來道事情我已盡知非你之過也又叫夥計把馬拉走安置一切侯老俠跟王爺説咱們還是到裏邊去吧黃燦帶著大家來到二層院子的北房把隔扇全都打開成了一通聯大家擦臉漱口休息老俠這才把張子美叫過來賢弟為了孩子們的事叫你操心受纍我給你介紹幾位朋友吧轉臉道這是當今萬歲康熙老佛爺的四皇子分府固山多羅貝勒府雍親王爺張子美趕忙磕頭道草民給王爺叩頭王爺立即抱住道不敢當振遠老俠這位是王爺他是我的拜弟江湖有名的俠客張鼎張子美風流俠鐵扇仙的便是哦張老俠久仰久仰啁張子美真沒想到一個皇子貝勒爺能這麼平易近人真不簡單老俠叫海川道過來張賢弟這是你二哥的拜弟咱們的好兄弟王府教師童林童海川海川磕頭道張老哥哥小弟童林拜見唉喲兄弟我不敢當王爺這才跟張老俠説話我和海川還有要事以後如實奉告還請子美老俠協力相助這次是微服出京請老俠不要到外面言講王爺放心今後如你用得著草民我萬死不辭侯老俠又把李源等叫過來給張老俠一一介紹完畢黃燦過來從王爺往下排按次序磕頭這時侯二俠也進來和張子美見面然後大家落座喝茶黃燦才把這次鬧事的詳情説明大家都認為潘龍不對張子美又問海川道賢弟的門戶還有王爺金枝玉葉怎麼也到江南來海川才把自己的事情説明請仁兄鼎力相助大家各敘前情之後黃燦向老俠道師父你説咱家的鏢還應不應啦買賣又沒關張為什麼不應阿該做的還是要做侯老俠還沒説話就聽外邊響起了震天的鞭炮王三虎進來道稟爺台們飛龍鏢局踩街哪很快就到咱們門口爺台們看看嗎侯振遠可不樂意誰輸誰螺還難以預料有麝自來香何必迎風站哪黃燦潘龍請人啦稟師爺據説是八卦山的四莊主潘龍的親師叔鐵背羅漢法禪和尚還有誰呀據徒兒所知同行同道他都請啦有浙江紹興府鎮遠鏢局鏢主神鏢手黃仙舟以及他們的鏢師夥計有蘇州南門外鎮海鏢局鏢主巡海夜叉石倫以及他們的鏢師夥計有漢口利勝鏢局鏢主陸地仙狐上官倫還有他弟弟玉面小靈狐上官瑞以及他們的鏢師夥計有營口水發鏢局鏢主神槍張凱張四爺以及他們的鏢師夥計還有遼陽遠東鏢局三位鏢主邊老橋侯老佩金老壽和他們的鏢師夥計還有關東梁家莊的梁氏三傑閃電手梁志電光手梁興琉璃手梁光還有鎮江府丹徒縣蓮花山荷葉嶺的寨主九朵朝花實武實文志鐵爪魚鷹左雄分水鷺鷹陳海還有江西省夾江驛龍泉塢的王氏三傑金鬢鐵背蒼龍王增吒海烏龍王甲翻江小白龍王凱山南的英雄山北的豪傑飛龍家倒是請了不少聽説有一二百位南七北六十三省的人物老俠點點頭你都請了誰弟子只請三虎哥給師父去了個信不敢驚動別位瓜州張叔叔是因為到杭州來住在弟子的鏢局裏正趕上這時侯鞭炮聲就到啦王爺都著急啦黃燦快領著我們到門前看看去黃燦答應躬請大家往外走來到門口王爺一看呵勢派可不小哇足足有幾百口子人高的矮的胖的瘦的醜的俊的等等不一再加上看熱鬧的男的女的老的少的真有成千上萬的人最前邊的全份執事金瓜鉞斧執掌權衡花錢顧的人再往後兩邊有十幾個年輕力壯的小夥子雙手高舉長竹竿挂著萬子頭的鞭還單有人擡著大筐裏邊都是鞭炮嗵噠響徹天空再往後鼓樂手又吹又打再往後是飛龍鏢局的鏢師夥計全穿的是新衣服一位位挺胸疊肚雄赳赳氣昂昂撇唇咧嘴到了金龍鏢局子門口都使徑撇都快撇到後腦勺上去了原來鏢主潘龍有話到了金龍門前誰撇的大給誰五十兩銀子你想誰不鼓著徑兒的撇哪再往後是高舉紅羅傘下面一乘竹椅轎兩個棒小夥兒擡著上邊兒坐著一位大和尚看身量晃蕩蕩足有九尺胸寬背闊虎體熊腰頭如麥鬥面似鑌鐵黑中透亮兩道濃眉一雙大三角眼鑠鑠放光大獅子鼻四方海口連鬢絡腮一部大黃鬍子身穿黃色僧袍腰系絨繩高桶白襪子厚底僧鞋上領插著白馬尾兒的大蠅刷顯得特狂兩邊都是請來的武林人物到了金龍鏢局門口停一會兒鞭炮鑼鼓響得震耳欲聾原來潘龍寫好了信和請帖邀請四海英雄來杭州又叫白亮帶書信晝夜兼程趕奔雲南八卦山八位莊主爺全在白亮挨次行禮李大莊主問白亮你來此何干稟莊主爺小子白亮奉鏢主之命給四莊主爺帶來一封信説著他把信拿出來雙手舉過頭頂道請大莊主爺觀看李太極一搖手道交你四爺看信法禪接過來看完之後就是一皺眉衆位哥哥賢弟看看吧潘龍鏢局子裏出事啦又把信交給李昆李昆看完問白亮道你們看金龍鏢局掙了錢才開飛龍鏢局對嗎正是你們又看人家包了魚帖眼熱你們才包魚帖對嗎是沒錯由於你們越境捕魚才爭鬥傷人官準立擂對嗎對對對李老俠把臉一沈道白亮潘龍無事生非見利忘義品德甚是不佳你還要助紂為虐從中蠱惑到現在把事情鬧大你還要把我們老弟兄牽扯進去再引起殺人流血使武林道蒙此奇恥大辱你們簡直是緑林敗類你們糊塗我們老弟兄也落個糊塗嗎又向衆人道來人把白亮趕出八卦山下人過來就趕白亮嚇得汗都出來了七莊主清風過柳柳葉貓韓忠韓殿遠一伸手道慢著我有幾句話説八卦山