body:
  text: 第三十四回老劍客戲耍衆莊主赴廣東十老請八卦上回書正説到三小夜闖八卦山毀譽而歸又冷又氣又寒磣像鬥敗了的公雞一樣東方破曉來到十八棵楊萬沒想到有這麼多的仇人劫殺三個人本來就作不了戰啦可也只好重振雄威各亮軍刃陸地金蛟賀豹一按刀把頂碰簧嗆啷啷一聲響金背鬼頭刀亮將出來飛身過來用手點指小畜生劉俊當初你師父童林在北京一掌打得小太爺吐血此仇焉能不報今天我與師弟吳志廣韓寶等前來殺你要想活命勢比登天説著纏頭裹腦刀就到了斜肩帶背劈來穿雲白玉虎劉俊譁楞一抖練子鐝把牙一咬劍眉雙挑虎目圓睜上左滑步用練子鐝砸賀豹的手腕賀豹往回一撤刀往旁邊一閃身擺金背鬼頭刀急架相還跟劉俊就打上了好一場凶殺惡戰兩個人的招數加快賀豹恨不得一刀下去把劉俊宰了這個時候鬧海金鼇吳志廣一提金背鬼頭刀刀鞘往身後一別飛身形過來賀永賀建章搭茬了娃娃躲開瞧我的他一橫自己的三楞分水狼牙釧娃娃哪里走徐源一分懷杖過來接頭就打賀建章和徐源就打上了邵甫把雙鏟亮出來吳志廣飛身形到近前跟邵甫也打上了鐵背羅漢法禪僧沒過來他的能耐高可清風過柳柳葉貓韓忠韓殿遠也沒過來他為什麼沒過來他怕叫人家給宰了因為韓七莊主的能為不成所以吳志廣過來和邵甫動手一口金背鬼頭刀一對短把追風荷葉鏟打在一處難解難分冰天凍地十分寒冷一夜賓士四肢乏力三人只有招架之功沒有還手之力眼看就得被殺就在這個時候突然間從西往東來了一頭特殊的驢阿呀呀呀前胸一挂紫金串鈴譁楞楞直響大家一瞧這個驢可新鮮呐確實跟驢那麼大個兒但是蹄子不一樣是整蹄子當中有一道線是白的就跟牛蹄子一樣驢哪有半拉蹄的灰色小驢上面一根毛沒有全是肉皮肋骨一根一根的露在外邊七層毛氈的軟屜風靡銅的銅蹬紫檀木的驢軸棍鑲牛皮的肚帶前胸一挂紫金鈴雙合股的籠頭都是金飾件你就知道騎驢的這個主兒絶非一般人物這驢尾巴上也沒毛跑起來可真快飛一樣再瞧這驢背上有個白鬍子老頭他喊閃開點閃開點我這驢踢上你我可不管我收不住韁繩啦只見這驢直奔當中來了你不躲開硬往你身上沖別看你拿著刀拿著槍它不在乎吳志廣賀建章陸地金蛟賀豹縱身形出去他們在南面一站三小各自撤傢夥往北面一站吁吁作喘這驢站在當中不走了驢身上坐的老頭兒年歲可太大了這樣的天氣還是米色長衫白綿綢褲子汗衫挽著袖子手伸出來跟雕爪一樣腳穿寸底的福字履鞋不過這米色綢長衫不怎麼新不怎麼漂亮上邊有砂油點老頭赤紅臉兩道蠶眉壽毫老長微擡眼瞼二眸金光炯炯頂都謝沒了白剪子股的小辮皺紋堆壘一字齊口是位回回大爸下邊有一尺多長的黃鬍子梢身背後別一根拐棍兒其實不是拐棍三尺六寸長黃銅打制一頭粗一頭細都是圓頂兒這是一種鐝叫單支點穴鐝粗頭跟雞蛋那麼粗細頭跟大拇指肚一樣分量可真不小老頭兒一騙腿下來了衆位你們這是幹什麼呐大清早起來到這兒練功大冷的天你們自己沒有家嗎不在自己功房裏練怎麼上這兒練來呀這個時候韓殿遠機靈了一按小片刀把走過來一晃腦袋你是什麼人竟敢多管間事老人家不以為然什麼叫管間事阿問問還不成嗎你少問吧你要想管間事可別怕趟渾水老頭兒一陳狂笑哈哈哈怕趟渾水就不管了你是什麼東西告訴你這是我四哥八卦山的四莊主鐵背羅漢法禪僧你瞧這個這是我五哥火眼金睛莫賀永賀建章再往下問就是我七莊主清風過柳柳葉貓韓忠韓殿遠哎喲原來是七莊主爺老頭又轉身問徐源三位我問問你們仨都姓什麼叫什麼徐源一躬到地老人家我家住在山東東昌府巢父林侯家莊我姓徐名源字子特闖蕩江湖有個小小的美稱叫浪裏雲煙一陳風這是我的四弟過渡流星賽電光邵甫邵春然這是我的小師弟鎮八方紫面昆侖俠童林的弟子穿雲白玉虎劉俊你的師父是誰老人家我的授業老恩師是聖手昆侖鎮東俠嗷你是侯廷的徒弟老人家不錯你們三人身為少俠客應該循規蹈矩遵禮守法怎麼跟山賊打起來了徐源就如此這般把事情都説了最後又解釋説夜闖八卦山原是我弟兄三個的不是可是老莊主把我們放了他們背著老莊主在此劫殺好不仗義阿韓七莊主你家大莊主放了人家不管怎麼説你算長一輩的人物貴手高擡讓他們走了不就完了嗎什麼讓他們走了哪有這事阿非宰了他們不可你知道嗎童海川與我們八卦山有三次一掌之仇此仇今日就要報七莊主你這話可有點不對頭誰跟你們八卦山有三次一掌之仇阿鎮八方紫面昆侖俠童林童林現在哪兒呢鐵善寺還是的你要想報一掌之仇不會上鐵善寺找童林去嗎你跟人家的孩子發什麼橫阿韓忠心説我敢去嗎我去了還不把我拍死我四哥的腦袋多棒都不成阿韓忠説老頭子你少管這事我們一定把他們三人的命給撂到這兒那我一定要管呢你一定要管就別説你家七太爺我酸棗眼青紅不分韓忠呐你也別説想跟我動動手把我拉到裏頭去你連我這頭驢都贏不了韓忠一翻眼皮什麼一個畜類我都贏不了不信你就過來試試老頭拿手沖著驢一指韓忠就瞧這驢猛地一下躥過來驢一擡前蹄照著韓忠的腦袋就拍下來了敢情這驢聽老頭兒的話老頭讓它幹什麼它就幹什麼要説韓忠真不含糊急忙往旁邊一閃沒想到這驢前蹄沒往下落它一轉身就斜了過來一擡屁股蹶子尥起來照著韓忠心口窩就一下好險差點沒踢上韓忠心説這驢比人都靈呐韓忠一撤步原來這驢近幾天腸胃不和一撩這沒毛的尾巴噗一個屁把草渣子全都崩出來了崩了韓忠一臉一身韓殿遠氣得三尸神暴跳五陵豪騰空他邊用手擦臉上的糞渣子邊説哎喲好畜牲韓忠揮刀就扎老人家一點手靠邊去這驢可聽話噠噠噠一邊去了徐源邵甫劉俊在一旁不好意思笑出來心説老頭兒讓這驢就把韓忠給戲耍了你韓忠身為八卦山的七莊主什麼都不懂這驢要沒兩下子老頭能讓它過來嗎一看這鞍子嚼環所有驢身上的東西價值連城老頭要不喜歡這驢能花這麼大的錢買嗎韓忠可急眼了老匹夫你敢讓這驢戲耍你家七太爺我要你的命蹦起來給這老頭就一刀老頭兒把臉往下一沈不要臉的東西辱罵老夫也沒看這老頭怎麼揚手好像他那米色綢長衫的袖口長點拿這袖口往上這麼一撣徑兒嚓韓忠這口刀就飛了老頭往下一耷拉胳膊在韓忠的中窩一蹭韓忠就出去一溜滾兒跟扔個小雞兒似的老人家哼了一聲可惡的蠢才你要幹什麼阿韓忠鯉魚打挺起來我的刀呐這個時候賀永賀建章過來他心説老七呀你可真不懂事看這老頭的樣子也是遊戲三昧的風塵劍客你惹得起嗎他到了這位老人家的面前抱拳拱手老英雄你一定要管我們的這事情嗎這位老爺子一笑哈哈哈你是五莊主誰讓我趕上了呢我要不趕上絶對管不著既然趕上了沒別的五莊主你就賞個臉兒吧怎麼著你也得成全我老頭子阿老朋友那不成我們是仇殺好我也不勉強這樣我練兩手功夫如果説我練上來了你們雙方不論哪邊也得練上來我騎上驢就走不管你兩家之事這手功夫我要練完了你們雙方練不上來哈哈哈哈咱們就一笑了結今天這事就算是一天雲霧散了五莊主你看怎麼樣法禪還算明白始終沒過來韓忠抹著驢糞渣子不敢過來了他心裏罵惹不起呀就這一下我這屁股蹲得這個疼賀永點頭好吧老朋友你把功夫練上來我們大家一看真好知道你是世外高人我們就沖著你了老頭兒一伸手把身後這單支點穴鐝拿出來了這兒是雪地雪底下是山地把撅往雪地上一立你們衆位上眼阿用左手的二拇手指一按這單支點穴鐝粗頭的饅頭頂往後一撤手右手一頷海下銀髯説了一聲嗨就看這單支點穴鐝隨著老頭兒的一個手指頭往地裏插刷地一下離地皮兒還有半扎這可是山地並且還下了雪點穴鐝不帶打停頓的就跟刀進鞘一樣釘到地皮兒下面了韓忠一瞧哎喲我的姥姥這下要杵我腦袋上就我這小糟腦袋跟面窩瓜似的非杵個窟窿不成賀永和法禪一瞧可了不得這老頭兒太凶了再看這老頭用倆手指頭夾住了這銅頭兒往上一使徑兒刷地一下把這山地的土帶下足有一二尺見方一大塊來嗚哎呀就這一下嚇得法禪賀永韓殿遠魂飛膽裂老英雄你的本領高強武藝出衆我們爺們敬佩了敢問英雄家住哪里姓甚名誰你能給我們説説嗎這位老人家提起來那可是大大有名阿他家住在北京城牛街清真寺是個清真教的回回大爸姓金單字名元他是清真寺的篩海江湖也都管他叫老篩海爺他有一個叔伯師兄家住在河南衛輝府牛圈村姓馬單字名駿排行在四闖蕩江湖有個美稱叫道秉清真術傳天外西域大俠馬四爺像馬四爸的本事可以説是上上的人物了身為清真門的門長論馬四爸的能耐跟他師弟金元的能耐可不能拉平阿如果説馬四爸是一流人物那麼老篩海爺金元也就是五六等人物雖説師兄弟能耐還差得遠著呢可是這老篩海爺金元就不得了了掌中的單支點穴鐝熟銅打造分量也重能為也好內外兩家俱臻絶頂在牛街清真寺他的北隔壁是個豆腐坊每天老篩海爺在北房裏頭沒有事了帶著幾個晚生下輩談論談論武藝靜了就是自己喝點茶可總聽見北隔壁這院裏頭有噔噔的聲首響得非常的沈老篩海爺一想一個豆腐坊買頭小驢拉著盤小磨不管做豆腐還是熬漿也不致於噔噔地老響阿如果要是響一天兩天那麼老篩海爺也就不注意了這天老篩海爺在清真寺門口外頭站著嗨可巧這豆腐坊的王二爸正回家喲老爸爸你早阿嗷王二爸你這買賣不錯阿托你的福咱這買賣還是夠吃的那就好我聽你這院裏頭天天噔噔地響這是怎麼回事哎喲老爸爸吵了你啦不吵我不吵我沒關係我就問問怎麼回事嗨你可別提了貪便宜受害我先頭那頭驢老了我説得了把它賣到湯鍋去我再買一頭結果我買來個比較小點的驢就是蹄子大點這四個蹄老跟茶碗那麼大走道笨點我看這驢很有徑得也便宜反正咱們也不騎它不要快只要能拉磨就成結果呀我花了一兩四錢銀子把這驢買回來了要説它幹活還是成可是有一樣它這蹄子是越來越大你不信老爸爸你上我那兒瞧瞧去這驢蹄子現在都成了小三號盆啦走起來更笨重了把那磨道都砸了個大坑它這蹄子落到坑裏頭也真有準徑還有就是有一樣它太笨了我説把它賣了吧人家沒人要了我就湊合著使吧嗯這蹄子什麼樣阿嗨這蹄子就是挺大的倭瓜盤似的這蹄子下淨土也黑了我也不知道怎麼回事我請過獸醫大夫給瞧過結果也瞧不出來也不敢動阿你帶我去看看哎喲老爸爸你看看去吧王二爸領著老篩海爺可就進了他的豆腐坊了來到後院東房三間這裏是磨房等進來一看見這驢正在拉水磨一家子幹活呢見到老篩海爺都過來來請安老爸爸起得早唉大傢夥兒都挺辛苦的阿你叫這驢停住驢停住不走了老篩海爺伸手一摸這驢的骨架這個驢渾身灰色有點發紅身上沒多少毛但是驢十分雄壯個也不小猛一瞧像個騾子似的就是它這蹄子唉呀太大了往四外長起碼有這麼半扎多厚可不是嗎個大倭瓜盤似的把地都砸成坑了凡有蹄子窩就是個大坑它一步一邁還正合適正