中醫講究望聞問切呀號完了以後拿起筆來開藥方讓病人去抓藥跟著叫第二號慢慢地一個個往下瞧順順當當的人們出來都是高高興興的這一瞧就到晌午了金睛紅龍應太和到門口一瞧沒人了一擺手老俠王十古一推桌子站起來正要往裏走亞然和尚合掌打問訊阿彌陀佛王老俠客王施主別來無恙阿哎喲喝哈哈哈是哪位阿亞然和尚説老施主你不認得我了貧僧亞然呐哎喲喝先輩王十古連連拱手作揖這是哪一陳香風把前輩吹到寒舍恕過王某未曾遠迎恕罪恕罪老俠你太客氣了這一次不是貧僧我自己來拜訪我還同著一些朋友來的大夥兒請吧王十古就知道這裏有事邀請大家往裏走進門迎面是個影壁往西是四扇緑油漆灑金星的屏風門門口四個字齋莊中正當中兩扇開著等大傢夥兒由這屏風門外頭進來一看院裏頭豁然明亮磚墁的院子十分講究各房屋都是抄手的遊廊朱紅油漆的抱柱北大廳足有七間門面東西房也有五間門面這裏不僅有住人的房還有存藥的庫房再往後兩旁邊有箭道一層院子一層院子東西有跨院有花園牆腳下栽種著奇花異草濃郁花芳應太和把簾子撩起來大家執手相讓全都進來王老俠樂嘻嘻地説我先洗洗手太和給預備洗手水去了大家坐下後觀看四圍迎面是架幾案八仙桌兩旁邊有椅子凳子寬敞阿牆上挂著挑山對聯不計其數完全出於名人手筆正居中的中堂是個八仙慶壽工筆畫真講究上下首挂著對聯上聯是春水船如天上坐下聯是秋山人在畫中行喝這是明朝四大才子中唐伯虎的手筆了不起阿屋裏頭的陳設也很不俗氣這時亞然一笑老施主我給你介紹幾位朋友阿嗯高僧阿這我可求之不得來吧亞然和尚從普照鎮東俠鳳池甘大俠一直介紹到海川剛把海川介紹完王十古走到海川面前一抱拳喲童俠客哈哈哈你是我心目中的好兄弟好朋友劉俊我給你介紹去了大概你已經收下了吧哎呀老人家晚生童林怎敢呢童林就把白馬河甘家堡的事情從頭至鹿説了王十古給甘大俠連連道謝這個孩子無知你多原諒你説到哪去了前輩衆位我們的鬍子全白了江湖無輩緑林無歲我們都是弟兄阿對對對大家弟兄相稱泡上茶來衆人喝茶王十古這才細問不知道海川賢弟和衆位仁兄賢弟怎麼一旦之間隨著亞然高僧來到寒舍老和尚看了看童林唉海川你説説吧童林一抱拳哥哥此番前來有大事相求提起我的事情儘管有賓朋跟你提了恐怕知道的不甚詳細海川就把從家裏出走鬥紙牌誤傷老父逃亡在外臥虎山學藝奉師命下山興一家武術頭結一掌仇風雪困京師一直説到現在海川最後説道幸虧衆位兄長的幫忙幾次我童林都化險為夷這一次大家在鐵善寺準備到八卦山找李昆太極公要國寶拿二小但是從中又有高人提到哥哥跟李昆李太極交情莫逆本系雙方都是武林道的正門正戶不能為此小事多傷和氣多樹強敵所以我們想通過哥哥你斡旋此事讓兩造言歸於好化干戈為玉帛只要太極公能獻出國寶此事也就作為罷論因為有王爺做主我童林有心自己來給哥哥跪門怕哥哥不肯前去因此約請衆位兄長們一起來人多臉重哥哥你能不能撥冗前往阿亞然念佛號阿彌陀佛王老俠海川所説你聽明白了沒有老人家王十古聽明白了説衆位不錯二十多年前我王十古到雲南一帶去遊歷知道八卦山九宮八卦連環堡有位混元俠逍遙叟太極公李昆掌中一對乾坤太極圖按周天三百六十五式愚兄我也有一對五形八卦掌也是按周天三百六十五式這樣阿我就找到太極公蒙他以禮相待我們兩個人談了幾天很不錯我們兩人通過口談又到了手談後來我們兩個人就分手了事隔多年時過境遷一晃二十幾年了今天既然衆位來了我王十古是義不容辭説著話王十古又轉向海川説兄弟你我之間另有一層關係雖説你我素不相識可你看得重哥哥我我一封書信你收下了劉俊愚兄有一份感激之情無奈你們爺幾個來的時候也看見門前了我這兒有多少病人呐每天需要我診脈看病這要一走不是把大家的病都給耽誤了嗎大傢夥兒一聽得看起來還是推辭海川聽完了説哥哥咱們弟兄一見如故我童林這個人從來不説拐彎話不錯你現在給大家瞧著病但是我要問問你你現在八十多歲你也有個百年之後阿那麼你要死了人家那些得病的人就不看病了嗎大家一聽嗨這位還真愣王十古這麼一聽覺得也有道理便説車到山前自有路按兄弟你説那麼哥哥我就應當奉陪大家去一趟但是我可有個條件海川忙説老哥哥只要你去不管什麼條件我都能應衆位仁兄賢弟亞然老前輩如果大家認為我王十古打得過李昆李太極拿我作為打手請我到那兒憑我王十古三個字壓制李昆強迫他們交國寶獻二小那可不成我跟李昆是朋友我跟海川是兄弟這樣我跟你們衆位也是朋友金磚不厚玉瓦不薄一手托兩家雙方都是朋友如果哥哥去了或者是李昆把我邀到八卦山或者是哥哥我把李昆約到鐵善寺當衆言明給你們兩造息事寧人大事化小小事化了要是那樣我就去哥哥的心就是我童林的心到了以後你説怎麼辦就怎麼辦讓我童林吃虧都沒關係哥哥你只管做主阿要是那樣的話愚兄也就放心啦大傢夥兒商量已定王老俠叫八卦堂藥鋪寫了個紙條貼在門口今日停診一切準備就緒王老俠又到了後邊見老伴言明原由拿軍刃欲與衆俠客一同趕赴昆明八卦山
