樣兒猛英雄于恆下看臺分人群登上擂臺往當中一站兩隻手一捂肚子雌雄眼兒一瞪饅頭肉過來藍田璧一想誰是饅頭肉哇傻小子扣著食哪猛漢通上名來喲麻煩啦你聽著別嚇趴下了我乃淮安府漂母河于家莊姓於名恆號寶元師父起的外號叫吒海金牛來吧説完一捂肚子雌雄眼瞪圓藍田璧左手一晃面門右手拳猛虎出洞照於恆胸前就打傻小子嘴裏嘀咕再來點再來點嚇得藍田璧往回下一撒猛漢你説什麼哪混蛋哪饅頭肉還招早了就得餓著藍田璧一咬牙蹦起來就一拳眼看拳到啦於恆又道再來點吧隨著左手往起一撩右手一托他的小腹嘭把藍田璧給托起一丈高往下一落叭嚓差點給摔死他一咕碌爬起來捂著肚子轉了好幾個圈兒才緩過這口氣來傻小子一捂肚子臭豆腐壞事包給我記著饅頭肉哇還有誰上我這兒擂來猛然間有人喊傻小子不要裝傻充愣某家來也西看臺飛下一人長腰登擂臺猛英雄急看來人大高個兒五十多歲寬腦門大鼻子頭大嘴岔兒黃眉毛黃連鬢鬍子深眼窩黃眼珠子一身藍系絨繩倒是英雄形象猛漢某家會會你好説好説饅頭肉你叫什麼東西我乃江西臨江府夾江驛龍泉塢金肩鐵臂蒼龍王增是也饅頭肉你是龍兒小子快過來王增也是老人物啦往前上步右手掌奔傻小子胸前就打於恆的招數是一招接一招的用不能錯了他要第二式伏虎將軍神威廣急提猛按莫因循他一説再來點左手往上翻一提王增的右掌王增往後一撤哪知道傻小子的厲害右手從上往下這手叫月罩雲龍大巴掌猛的往下一按正是王增的腦瓜頂兒叭可了不得了把王增的鼻涕眼淚全打出來硬給打了個大坐墩兒疼得他齜牙咧嘴傻小子兩隻手又一托他的下巴一按腦袋這通晃悠擂臺下一陳笑聲傻小了捂肚子朝東看臺張旺道記著兩饅頭一碗肉還不夠吃哪還有哪位再給添一點兒西看臺有人答話我來也飛身形下看臺長腰登擂臺傻小子高興好小子真孝順知道我不夠吃這個人一瞪眼讓你知道叱海烏龍王甲的厲害王甲搶步進身掄雙拳打虎式泰山壓頂奔傻小子頭部砸來傻小子一看雙拳到啦上右步順右手斜肩帶背奔脖子砸來真是迅雷不及掩耳王甲想躲焉得能夠右手拿正剁在脖子上叭可了不得了把王甲的脖子給砍歪了疼得他一個鯉魚打挺起來捂著脖子直轉悠再看傻小子一隻眼睛瞪圓在臺上也轉上啦一邊轉一邊喊嗨喲錯啦錯啦要了我的命啦師父不給饅頭吃錯啦兩看臺上的人都納悶兒傻小子怎麼啦王爺忙叫孔秀過去問問哎呀傻老牛你怎麼了混蛋我的招用錯啦剛才咱們提啦他的招換著用按秩序應該是前沖錘法誰能擋倒推九牛勇絶倫那就是王甲雙拳到啦於恆該是上右步用右手封拳右手用前沖錘奔王甲的小腹或者前胸就對啦傻小子當時一急跳過去啦用了立掌斜臂開山斧這樣把王甲給剁啦他自己的招兒錯格兒啦猛英雄焉能不急呢錯啦哪位快來給找補找補吧看來沒人給找補上傻小子就得急死猛然間有人喊猛漢我來給你找補上太好啦你真孝順飛身形上擂臺正是遠東鏢局鏢主單鞭將邊老橋六十多歲很精神傻小子笑啦老頭兒看見就喜歡你快找補邊老橋真沒瞧起傻小子上右步腳踏中宮右手掌奔於恆胸前便打再來點真合適再來點真合適傻小子高興邊老橋掌奔胸膛正好給傻小子遞過來他左手一攥拳從下往上翻反拳一壓右手攥拳正好使用前沖錘嗚地一下正打在邊老橋的胸口上這麼大的年紀差點給打死哇地一聲仰面朝天出去一條兒撲通倒在台板兒上當時都昏過去啦潘龍潘宏鼎親自帶人上擂臺把老橋擡回西看臺傻英雄兩手捂肚子又道默你是個好人到底給我找補上啦壞事包哇記著饅頭肉還有誰再給添一份這時候有人高聲説話傻小子待某來説罷飛身形登擂臺正是營口永發鏢局鏢主神槍張凱要會鬥於恆
