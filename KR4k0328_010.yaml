body:
  text: 第十回飛龍觀夜趕喬玄齡北高峰二次杭州擂上回書正説到下揚州請南俠誤入飛龍觀小老道端上酒來孔秀要喝風流俠張子美不讓他喝那意思是喝了酒就沒命啦孔秀的心裏有些不服説咱爺兒們從小就幹這行當的老俠微然一笑哈哈哈賢侄你所見到的是第三等最次的蒙汗藥既有色也有味第二等是有味五色或有色無味第一等是五色無味清亮透明這是最好的蒙汗藥叫雙無散海川在旁邊一聽臉上有些發燒看來自己初入江湖經驗閲曆還差得遠哪看來吃一塹長一智老俠張鼎張子美這個人物自幼在江湖闖蕩那些大道邊兒小道沿兒蹲包頭放響箭紅鬍子藍靛臉花布手巾纏頭墳前裝神墳後裝鬼打網棍套白狼偷雞摸狗拔煙袋隔著窗戶拉被窩大喊一聲褥套留下的那些白天放火夜晚殺人窮凶極惡的勾當沒有張子美沒經過的海川忙問老哥哥你怎麼看出來的海川你看這種藥放在酒裏其性最烈沾唇即醉你看這酒面底下被藥力拿得這酒在酒杯的周圍轉不仔細看不出來海川一看真是這樣哥哥這是賊廟別忙孔秀賢侄你出去藏在柱子後面等小老道來了你把他拿進來咱們用酒灌灌他好的孔秀出來躲在一棵抱柱的後面果然沒多大工夫小老道躡足潛蹤來了一上臺階孔秀一個箭步到了身後右手奔脖子用力一掐左手一攏小肚子腳尖一點簾子板麻利脆叫道師大爺來灌他張老俠一點手賢侄把他放下道童你不要怕幹什麼來啦小老道哆嗦著道看看衆位檀越酒飯夠不夠你喝酒嗎不出家人忌五葷三腥不敢喝酒今天喝點吧老俠右手一托下巴頦中指拇指一掐腮幫子左手拿酒碗照他嘴裏一倒咕嚕嚕想不喝都不行阿一口酒下去道童口吐白沫一攤泥兒似的就躺下了海川打包袱亮雙鉞哥哥這是賊廟你別忙咱們出去看看不要莽撞哥倆出來孔秀王三虎也跟著出來爺四個飛身上房施展輕功來到西跨院南房上扒中脊往北屋觀看鶴軒內有三個人正在飲酒左右兩個正是盜國寶的二小韓寶吳志廣當中坐著一位道長身高有六尺藍道袍卡青口系水火絲縧肋下佩寶劍薄底雲鞋細脖子大頦嗉小腦袋生羊肝的一張臉黃眉毛三角眼大嘴岔兒挽著牛心發纂金簪別頂背插蠅刷連鬢絡腮的鬍子十分凶惡原來這個惡道姓喬名叫喬玄齡有個外號紫面分水鱉他還有個親弟弟叫臥虎道長喬玄清在四川白龍江岸有座山叫劍山蓬萊島歸劍州管轄這個島上有當今皇上康熙的親哥哥英王富昌富寶臣在內山外邊有個廟叫玉皇觀觀主姓華名圖號亮羽外號叫九尾金蠍道英王封他為護國軍師華亮羽這個惡道專門發賣熏香蒙汗藥補助英王的軍餉這個喬玄齡就是華圖華亮羽的弟子叫他帶著大批的蒙汗藥上中下三等藥全有去雲南安座子挑汗意思就是買賣蒙汗藥喬玄齡來到昆明縣他知道八卦山九宮八卦連環堡有八位莊主必須靠他們遮風擋雨喬玄齡買了一份重禮來到金家酒店面見金榮金亮行禮把禮物獻上二位頭目貧道能不能請八位莊主爺賞臉見我一面金榮細一盤問喬玄齡詳細一説金榮哥倆直搖頭喬道爺咱們不客氣八位莊主爺身居緑林可嫉惡如仇類似你的門戶出身恐怕是不能允許的我不敢給你通稟更不敢把你的禮物呈進去任憑喬玄齡怎樣哀求金家弟兄不敢應承正在這時候賀豹韓寶吳志廣出山辦事回來到酒店歇歇腿兒順便喝點酒金榮一看來吧你們三位來喬道爺這是山裏的少莊主你們近乎近乎吧給三個人一介紹喬玄齡忙給行禮幾個人坐下一問喬玄齡不敢隱瞞實話實説請三位少莊主爺通融通融賀豹大包大攬喬兄你放心有我們哥三呐給我預備船金榮立刻備好船隻把禮物放在船上一支篙渡過南盤江來到船塢下船三小陪著喬玄齡來到大廳三小叫喬玄齡在廳外等候三個人進來給師伯行禮啓稟師伯來了一位朋友從四川至此在廳外候命求見有請賀豹出來喬兄請進吧喬玄齡來到大廳一瞧這氣派他就含糊啦小道喬玄齡參拜大莊主和衆位莊主爺説著跪下磕頭道爺請起我與你素日無交何故前來老莊主久仰你乃武林前輩特地前來拜謁並有禮物獻上説著把禮物一樣一樣呈上喬玄齡他想著有錢偏能役鬼堵上你的嘴就行可李老莊主更起疑心啦素不相識為什麼禮物這麼重和雙方的交情不相符喬道爺是什麼門戶貧道下五門令師是哪一位九尾金蠍道華圖華亮羽你來此何干願在貴方借地求財出售薰香蒙汗藥李昆一聽把臉往下一沈虎目含嗔喬玄齡我八卦山乃上三門弟子你敢以此醜行污辱老夫弟兄本應將你致於死地老夫不忍來呀把這不齒於人類的東西給我趕出八卦山所有禮物扔了出去喬玄齡只得抱頭鼠躥狼狼狽狽出了南莊門喬玄齡正在為難賀豹韓寶吳志廣來啦喬兄真是對不起喬玄齡直道歉對不起少莊主爺們韓寶拍著他的肩膀喬大哥你別難過我師伯為人固執請你原諒我四師伯法禪和尚五師伯賀永他們叫我跟你説禮物收下你只管在本地做買賣有什麼事發生四莊主五莊主七莊主還有我們小哥三給你擔著賀豹吳志廣把禮物拿進去一會兒回來四個人乘船來到南岸進了金家酒店叫金榮金亮準備許多酒萊幾個人暢飲開懷韓寶把事情跟金榮金亮説啦今後只要喬玄齡來你就告訴四五七爺必須瞞著大二三六八五位莊主爺金榮金亮答應喬道兄還有一事三位老人家叫我跟你提你每月交給三位莊主爺紋銀一千兩必須辦到喬玄齡大喜過望完全答應喬玄齡走後按月給銀子他的買賣在雲南府一帶可就做起來啦每到三節他都暗進八卦山其中金榮金亮得了很多的好處喬玄齡賀豹韓寶吳志廣四個人又結為異姓兄弟幾年光景喬玄齡淨剩雪花銀五萬多兩這時候華圖來信叫他回四川交銀子再取貨喬玄齡一捉摸乾脆我跑奔內地銀子歸我自己吧這樣找韓寶一商量韓寶也同意哥哥你上哪兒劣兄本揚州人我還回家鄉等我有了安身之處再給你們送信喬玄齡回到揚州飛龍觀原先這個廟坍塌倒壞根本無人管理他拿出幾個錢來重修了這座廟又托人給韓寶他們送情韓寶他們等喬玄齡走後花幾個錢雇了一些人在緑林中吹風喬玄齡被官人捉起來殺頭啦華圖派了幾撥人來問訊都是這麼一種説法只可認倒楣完啦這次火焚巢父林二小來到揚州在他們盜寶的時候知道不能回雲南也想到來揚州躲災避禍這回到了飛龍觀喬玄齡很高興韓寶把事情説啦哥哥我們來投奔你躲一躲你要怕連纍我們就走喬玄齡一聽橫打鼻梁兄弟們士為知己者死女為悅己者容人在難中想賓朋你們哥倆瞧得起愚兄只管住著萬無一失韓寶就住下來每天三個人到禦花園來一待就是一天因為這兒賞心悅目的地方很多今天在風暖閣雅座吃茶外邊一説話韓寶撩了個門簾縫隙道哥你看這就是童林喬玄齡一瞧把嘴一撇兄弟我認為姓童的是個什麼樣兒的大人物原來是鄉下老趕哪哈哈韓寶一下兒把嘴給捂上哥哥你不要命啦喬玄齡道二位賢弟你們久曆江湖怎麼怕這麼個人物喬大哥你別瞎説啦我沒告訴你呀杭州擂上我四大爺多大本領差一點叫童林把腦袋給拍碎了你別看貌不驚人吳志廣也説道兄我們能殺他何必冒風險盜國寶哇看來童林訪我們已到揚州咱們不能再出廟啦忍幾天吧三個人商量好啦外邊也下起了雨天色漸黑點亮了燈叫徒弟備飯三個人可就喝上啦正在這個時候道童進來啓稟師爺外邊來了四個人避雨有個人名字叫童林韓寶一聽喬大哥吳大哥怎麼辦呐喬玄齡沈得住氣把他們讓到東配殿去是道童走後喬玄齡看他們倆驚慌失措的樣子無量佛兄弟們放心他們又不知道你們在這兒喝酒喝酒這時道童進來師爺他們要吃些素食還要喝酒喬玄齡哈哈大笑這叫天堂有路不走地獄無門自投賢弟童林他們末日到啦好吧給他們準備把砂酒壺拿出是韓寶吳志廣忙問道哥你要幹什麼給他們放點藥吳志廣搖頭道兄千萬別放藥打不成黃鼬鬧身臊引火燒身兄弟們沒有金鋼鑽不敢攬瓷器活兒我這藥童林他們見都沒見過小道童把砂酒壺拿來喬玄齡把箱子打開拿出一個小匣子來打開匣子裏邊有個瓷瓶兒是個珊瑚蓋兒把蓋兒取下往壺裏倒了一點兒不用溫酒涼酒即可去吧韓寶有點兒猶豫行嗎喬玄齡冷笑哼哼哼我這藥十兩黃金也買不了一兩藥哇二位賢弟這是最上等的雙無散呐韓寶他們這才放下點兒心三個人又喝上了過了一會兒喬玄齡叫小道童去看看賢弟準備兵刃殺童林吧喬玄齡真是忘乎所以海川他們已經來到南房上仇人見面分外眼紅海川分雙鉞從丹田一聲斷喝呔盜寶欽犯韓寶吳志廣還不束手就擒嗎童林在此英雄飛身往下走鶴軒裏的燈滅了喬玄齡毫不在意二位賢弟隨我來回手按劍把頂碰簧嗆啷啷拉出寶劍伸手抄起木凳來往外一扔墊步擰腰嗖地一下躥出來他回頭一看默好朋友韓寶吳志廣都沒出來當喬玄齡往外躥的時候吳志廣也拉刀往外來韓寶用手一拉後窗戶吳志廣低聲説喬大哥可出去啦不管他咱是什麼案子快跑吧兩個人一前一後飛身出了後窗戶一伏腰施展夜行術撒腿就跑喬玄齡就知道二小跑啦什麼人敢在祖師爺面前撒野惡道通名上來紫面分水鱉喬玄齡刷寶劍順風掃葉奔海川脖子就抹喬玄齡怎知海川的厲害海川往右一斜身左手鉞一立用雞爪一拿劍嗆啷就叼住啦左手一歪嚓楞楞寶劍脫手而飛右手鉞用了一招金猴戲月刷就到啦其快無比老道往下一矮身稍慢一點兒噌了一下把發纂給挑啦無量佛喲嚇得老道魂不附體扭頭就跑海川高喊惡道哪里跑腳下加緊追下來張子美怕海川吃虧也追下來夤夜之間前後三條黑影從飛龍觀出來一直往西北奔跑喬玄齡急急如喪家之犬忙忙似漏網之魚江南水鄉水網交錯不遠就是三岔河口眼看都追上了韓寶暗地裏高聲喊合字龍溝裏扯呼喬玄齡一聽見是韓寶他們於是三個人前後跳進水裏逃生去了海川他們哥倆也追到了哥哥你的水性怎麼樣對不起賢弟哥哥也是旱鴨子海川長歎一口氣又被他們逃啦咱們回去吧這也沒法子哥倆回到飛龍觀越牆而過喝孔秀正在審訊四個小老道兒現在孔秀派小老道弄涼水把另外那個小老道給灌過來孔秀伸手把小刀抽出來在袖口上備刀混帳東西竟敢跟你的師父老雜毛老牛鼻子來害我們現在機關敗露我孔秀是不能饒你們的一定送你們去見三清教主請罪王三虎在旁邊兒看著也不言語四個小老道嚇壞了環跪在孔秀面前壯士這不關我們的事我們聽師父的師父叫我們幹什麼我們就幹什麼混帳東西那個牛鼻子叫你們殺人你們也要去麼混帳話我來問你那個老雜毛叫什麼名字紫面分水鱉喬玄齡鱉是什麼東西是不是叫紫臉大烏龜對對對你們都是小烏龜對對對那個烏龜是幹什麼的他是出家人賣薰香蒙汗藥的棍帳那兩個東西幹什麼來了我師父的好朋友一個叫韓寶一個叫吳志廣他們在雲南的時候就認得這次聽説盜了國寶到這兒來躲災避禍哥倆一聽張老俠點頭道很好三虎你馬上帶路費去三岔河口查看兩個欽犯只要探知下落你立刻回杭州報信以便捉拿孔秀用腳把小老道給踢起來混帳東西快起來不要氣我老人家張老俠走過去溫和地道你們都是哪里人哪我們都是揚州人家裏都有父母嗎我們四個