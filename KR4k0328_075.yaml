長江潘龍潘宏鼎他們可從杭州鏢局來了來了之後于爺當著親友練了十八趟通臂掌練完了以後買賣就算開了張真是那句話開張就挺風光潘龍跟黃燦在這兒應了幾號買賣看著走幾趟鏢沒事可跟于老俠商量大爺我們就回去了回去吧見了你大爺你師父他們都問個好潘龍黃燦帶著幾個人回了杭州老夥計都留在這裏于老俠並不經常到這幾來開始小蓮花於秀走鏢那麼老俠倒很精心時間稍微一長過了幾個月平安無事老俠客也就不常來太原這一次來碰巧年大人駐馬太原沒想到第二天聽説丟了金牌于爺心説童林你要來了給我磕個頭我一百零三歲的老頭子還得蹶著腚給你找金牌去這個我忍老俠客就在這鏢局裏聽消息因為于秀不在家老頭得在這兒頂著今天二更來天了鏢局子門口外頭一過兵也聽見東南方向喊殺連天有人稟報了老俠客開開鏢局子大門老俠客于成出來心想這可麻煩如果是仨倆賊沒什麼問題一百多賊這怎麼得了海川顧前難顧後顧左難顧右顧拿賊保不了大人這我要不去和海川算什麼交情我去一趟吧老俠客進來把自己的雞爪鏈子抓圍在身上可就來了走到大街上走不動了幸虧老俠于成有份兒人們見到都躲趕到公館這兒就成了人粥了老俠于成一飛身蹬著人們的肩膀頭就進來了順著箭道往前走閃開閃開我可蹬腦袋了噌地一下進院了石寶奎過來趕緊行禮老俠于成伸手相攙你倒好阿于老俠過來見大人行禮年大人連連地作揖老俠客本欽命我可不敢當我們有半年多不見面了你老人家身體倒好託福託福劉俊等衆人可都很高興老俠于成一看道寶奎呀你瞧見沒有嘎子的能耐我有幾年不見了這能耐沒長阿叫尚二爺的小名嘎子你盡貪玩了你這能耐不長你給我下來尚義這氣什麼事呀我都娶媳婦了見面叫小名尚二爺沒有辦法虛點雙鈎縱身形下來老俠客於成就過來了好賊還用我費事嗎趕緊乖乖地伏首貼耳跪下我把你們捆上默哪有這事呀南宮利往前一趕步呸左手一晃面門刀就來了于老俠高喊我讓你趴下你就趴下右手一揪腕子左手一托他的小肚子弓左步就這麼一斜身就把南宮利提了起來就勢往劉俊的眼前頭一拽咕嗵趴伏在地魏九成飛身過來一刀老人家伸左手一叼他的腕子伸右手一橫他的小肚子你也給我躺下吧啪正倒在楊小香楊小翠的跟前雲中鳳韓猛往後一撤步阿你是什麼人哈哈哈老夫乃西方俠長臂昆侖飄髯叟于成喲我的媽呀噌一下雲中鳳韓猛上了房撒腿就往東跑底下這熬粥的兵丁高聲喊燙他雲中鳳韓猛飛身形一上牆叭叭叭就這幾斗子小米熱開粥呀全撩到韓猛臉上身上了疼得他嗷嗷怪叫折身出去撒腿就跑西方俠于成到房上看看賊人去遠這才下來見大人重新行禮于成老俠抱拳道大人這是怎麼回事呀我聽説大人來到太原我家裏事情太忙沒有工夫來要不早給你請安來了我今天才到怎麼聽説丟了金牌年大人就把這兒的事情都説了海川他們幾撥人都奔了七星山直到今天黃鶴無音還有石老俠洪老俠老二位幫忙協助可他們老哥兒仨前頭走了都沒回來于老俠聽完點頭默人多瞎胡亂他都九十六了辦事這麼沒根基這樣吧尚義在這兒保護點大人我想賊不至於再來寶奎咱們哥兒倆到七星山去看看老哥兒倆由打公館出來公館派人到東門叫開了城門老哥倆出城上了大道腳底用力往東南走沒走出多遠東南上這大火就瞧見了于老俠説寶奎這著火的地方不是七星山嗎等老哥兒倆到這一瞧阿燈火通明打起來了老哥兒倆往上來正趕上海川把矮腳兔子佟威花面判官裴文陰陽判官裴武這些人打敗正往回走雙俠就到了雙俠講完太原城裏打退刺客這事衆人十分高興忙整理軍刃捧好金牌浩浩蕩蕩返回太原次日啓程保著年欽差向四川進發路上將又發生許多事情聽官欲知後事且待續書講述
