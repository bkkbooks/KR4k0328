body:
  text: 第七十五回童海川雙鉞敗三寇西方俠鐵掌打五虎上回書説到大戰西山坡段國基三言兩語跟石老俠説翻了事到如今只有憑本領決一生死他一搖三節棍猛然間身背後念佛無量佛大寨主貧道來到你貴寶山這麼多的日子蒙你的擡愛加意地款待你起來殺雞焉用宰牛刀有事貧道服其勞我將老兒石金聲致死報答閣下的款待之情無量佛按劍把頂碰簧嚓楞楞一聲響飛身形過來段國基一瞧唉瞎掰這人是采花羽士陳道常你還記得張方九趕陳道常在石家鎮把他給追跑了陳道常就跑到七星山這兒來了如果他看見張方在那邊呢他就不過來樹林這兒挺黑的這邊燈火通明阿光亮也達不到他沒瞧見張方一瞧大爺這老道是采花羽士陳道常我這帶著公事我拿他呢你可別讓他跑了陳道常一眼瞧見張方老俠石金聲説道孩兒呀放心他跑不了一按刀把頂碰簧嚓楞楞五金折鐵寶刀離鞘刀鞘子往旁邊一放惡道你進招來陳道常要跑也覺著怪寒磣的他一想我動手打一下就跑左手劍訣點面門唰一劍白蛇吐信唰一道寒光直奔老俠石金聲而來石金聲向左微然一劃步銀髯甩在左肩拿刀往左面這麼一扇嗆啷啷把陳道常的寶劍就給削折了反腕子反背就是一個掃堂刀陳道常腳尖一點地長腰起來老俠石金聲左腳擺蓮花合腿拿腳面往外一抽往左面踢他方兒阿接著嘭這一腳把陳道常踢起有一丈多來老頭一喊張方往前一上步陳道常就過來了啪就摔在張方的眼前哈張方這美呀一上步把陳道常就給踩在那裏張方一伸手把包袱皮打開三稜凹面呂祖錐亮將出來照著陳道常的腳後跟這條懶筋嘭扎進去一挑這懶筋就折了然後四馬倒攢蹄把陳道常就給捆上了張方往他肚子上一坐噗地一下喝小子我拿你先當板凳吧爺兒們你想跑你等等譁眼前的賊人一陳大亂霹靂烈火火眼狻猊段國柱一瞧阿呀哥哥老兒石金聲如此倡狂待我來譁楞楞一抖鑌鐵虎尾三節棍飛身行過來單手一搖棍照著老俠石金聲腦頂就砸石金聲就勢往下一矮身從他三節棍底下鑽過去臥看巧雲式右腳扎根右腳起來一踢就是段國柱的小肚子他撒手扔棍叭唧就扔在那兒了石金聲折身起來一招銀髯哈哈哈段國柱想跟老夫動手你還得練個三年五載呀反手托天金頂狻猊段國基一瞧默飛身形過來三節棍掌中一合譁楞楞一聲響他這手可厲害往前一趕步好你石鐸雙手合住當中雙搖風火輪譁楞楞楞兩邊兩節隨著環一轉往前一抖腕子雙風灌耳對準石老俠兩面的太陽穴就來了石老俠上左一劃步躲他雙搖風火輪接著段國基又左手一摟棍尾反棍仙人解帶奔老俠石金聲攔腰就打老人家腳尖一點地張飛大騙馬唰一下起來接著段國基左手棍又掄過來就是老俠石金聲的頂梁石老俠見棍下來長腰出去段國基往回一帶棍道石老俠你怎麼三招不還手呀大寨主你和段國柱不一樣你段國基占據七星山這麼多年你沒禍害過誰不瞞你説呀像你這樣的人物在我石某眼皮子底下占山為王你要辦壞事我石金聲早把你趕跑了第二你段國基沒殺快手王能那是你們老二段國柱辦的所以我讓你招好象這一次與你無干也不過就是城門失火殃及池魚哈哈哈連纍上你了那麼這第三呢當場動手你不行阿一定要傷你到那個時候你多多地原諒我石金聲九十六歲腹不能容物我要傷你段國基聽得惱了往前一趕步譁楞一聲響三節棍第四下就到了老竺上右一錯步見三節棍來了順手一穿單臂如鐵唰地一下這手功夫叫回身捉蟒把段國基的三節棍攥住了就拿這刀一推唰地一下把段國基的腦皮削下小燒餅蓋那麼大一塊來老俠石金聲刀交左手捋銀髯往這兒一站正在這個時候了不得了後山七星八寶轉心亭大火起來烈焰飛騰濃煙沖空黑雲滾滾照紅了半邊天段國柱擡頭一看七星八寶轉心亭這火起來了咬牙切齒一萬兩黃金修造的亭子完了哇衆家兄弟為我弟兄出一臂之力與他等拚了吧所有的人員各自持軍刃嚓楞楞亮將出來也就在這個時候順著山口往上走來三個人沙沙沙沙這個快呀高聲喊道段家兄長且慢呐且慢老俠石金聲刀在左手扭項觀瞧這三人就來到近前頭裏這位矮身材小胳膊小腿大耳朵溜肩膀一身藍紫絨繩攥著一口刀兩邊有刃在他護手盤這裏刀把上有個月牙的蛾眉支子護手叫龍形刀使起來可了不起往後還有兩位都是大高個寬肩膀前頭這位一臉的白圈癬黑臉蛋後頭的這位由打左額到右嘴角一半發紅一半發紫長得十分凶惡高聲喊道段寨主休得驚慌我弟兄來也説完話飛身過來彼此見禮這三個人一抱拳段寨主我們弟兄三個人來了我們弟兄要跟公館這些人較量較量段國基段國柱正在危急來這麼三位給大傢夥兒精神提起來既然如此有勞三位賢弟那矮個的一撇嘴二位兄弟你們誰先過去大哥我先來就是一半臉發紅一半臉發紫的那位擰腰過來一按刀把嚓楞楞一聲響把刀亮出來老俠石金聲剛要刀交右手身背後有人説話哥哥你打了幾仗身體勞纍且請休息待某來老俠一看正是鎮八方紫面昆侖俠童林童海川海川心想這麼多的賊你知道打到什麼時候去讓賊人對老哥哥石金聲車輪大戰自己在旁邊看熱鬧這不象話呀既然這賊是生賊我就不能再讓老哥哥輕身受險了海川墊步擰腰過來那位攥著刀往這兒一站用手點指你是什麼人阿也敢過來動手我刀下不死無名之人報上名來海川一陳冷笑賊人問某家家住在直隸省京南霸州童家村姓童名林表字海川北高峰獻藝賀號鎮八方紫面昆侖俠默海川一報名姓很多緑林賊人都是一愣海川問道你叫什麼名字通上名來問某家四川人姓裴名喚裴武江湖人稱陰陽判官原來那個一臉花白圈癬的是他親哥哥花面判官裴文那矮個兒使龍形刀的那位叫矮腳兔子佟威前者咱們已經表過雲台劍客燕普從北京城走的時候打發下幾撥人來這第二撥就是他們仨這三個賊也是由四川起身往這邊來的不知道雲中鳳韓猛南宮利魏九成三個朋友到了什麼地方是不是下了手這三個賊今天就走到七星山下突然間發現這把大火段氏弟兄並不是劍山蓬萊島的人但和島也有關係他們是萬龍藏風島的人而且裴文裴武和佟威這三個賊跟段氏弟兄還真不錯怎麼七星山會起火呢這才來到七星山下借火光一看西山坡人聲呐喊燈火通明他們才順著山道上來跟段家弟兄見面裴武一聽是童林道喝好你小兒童林哪里走往前一搶身左手一晃面門唰地一下裴武的本領並不錯呀往前一搶身刀奔海川的頂梁就劈海川微然轉臉上左一貼身右手鉞這麼一支地拿著雞爪一搭他的刀盤咣搭上刀盤這麼一坐腕子一擰裴武的刀就撒了手海川左手鉞裹手就是一捋巧摘天邊月把裴武的絹帕就給挑下來就身擡腳啪一腳把裴武就踢翻了裴武起來也找不著刀了扎著兩隻手站著俯首貼耳這寒磣哪打仗親兄弟上陳父子兵花面判官裴文墊步擰腰過來嚓楞一聲響把刀拉出來小兒童林傷我的兄弟認識俺花面判官裴文嗎猛然一長腰到了海川面前左手一晃面門刀走攔腰斬海川腳尖一點地張飛大騙馬躲過了刀右手鉞墮肘沈肩往下一戳一架他的刀往外這麼一推他左手照著他的胯骨軸上嚓一鉞就到了正把他胯骨軸連長衫帶褲子全給刮破了刮了足有半尺長的串肉皮兒血唰就下來喲媽呀疼得他一咧嘴都叫了媽了海川一想你還有什麼出息雙鉞這麼一變右腳一擡扁踩臥牛腿嘭地一聲正踢在裴文的小肚子上出去一條兒咕咚摔在地上張方高聲喊好腿這是人呐要是雞蛋把黃兒都摔出來啦衆人聽了大笑這倆賊前後都輸了頭兒有點挂不住了右手攥著龍形刀飛身形過來好你姓童的認識老太爺嗎海川一看他這口刀知道他是內家門的功夫矮腳兔子佟威往前一搶步左手食中二指一點右手龍形刀往前一趕步叫麻姑獻壽一翻腕子刀尖挑海川的哽嗓海川知道這種內家的軍刃實有獨到的功夫於是海川叉右步右手鉞走底盤這手功夫叫玉蟒翻身唰這鉞就到了佟威腳尖一點地長腰起來海川左手鉞奔佟威的右面右手鉞反過來一個掃堂左手鉞往前一支掉過臉來這叫金猴戲月這手功夫太漂亮阿叭一甩臉這鉞就到了佟威要想躲就躲不開了唰一下子血就下來矮腳兔子佟威噔噔噔倒退出七八步去總算站穩了哈海川力勝三寇都不怎麼費徑正在這時候順著山道往上來人了海川哪你們盡顧了這兒動手可就忘了家裏海川聽著耳音很熟扭頸觀瞧來了兩位大個白鬍子老頭前頭這位雙肩抱攏猿背蜂腰奔兒頭墜子臉厚嘴唇面似銀盆皺紋堆壘頂都謝沒了手裏拿著傢夥樂嘻嘻地一邊走一邊喊後頭這個老頭比前頭的老頭有點壯米色長衫四方大圓臉一部白鬍鬚苫滿前胸肩頭扛著一杆大槍紫紅紫紅的槍桿一尺八的鴨嘴式槍頭犀牛尾的大紅纓海川認識前頭這位元西方俠長臂昆侖飄髯叟一百零三歲的老俠客于成于洞海後頭這位元夏九齡認識是老嶽爺神掌地形仙石寶奎這兩位和石金聲是太原府的三傑老俠石寶奎跟銀鈎太保尚義哥兒倆讓張方為媒把女兒許配給夏九齡臨走的時候石老俠不是提過嗎方兒阿你們哥兒倆到太原府我們也打算到太原府去為什麼他要到太原等著童林哪石寶奎原來這麼想的我閏女給了你徒弟怎麼著我也得跟你見個面所以等他們倆人走後老俠石寶奎就告訴尚義老二阿你打聽著我也打聽著大人要往太原府來總會有信的不過大人公務在身不能為了咱們孩子的事情在太原多住兩天咱們得提前動身到太原等著銀鈎太保尚義聽完説我也想到啦哥幾倆就這樣説定了這一天尚義打聽到年大人已到了太原府急忙回家告訴自己的內人收拾好東西就奔了石家鎮面見石寶奎説哥哥壞了我在家裏碰上個人他説大人已經到了太原府哎喲這多耽誤事呀咱們哥兒倆趕快走吧老哥兒倆帶好銀兩路費就奔太原了飢餐渴飲曉行夜宿時間不長就到了太原跟本地人一打聽才知道大人沒走進了東門一看路北的公館尚二爺説哥哥咱們來了也不知方兒跟九齡他們哥兒倆回來沒回來咱們去公館吧石老俠搖頭別去上人家公館去好嗎對既然大人明天也走不了咱們先找個店住下明天早晨再去公館的西邊有個店叫仁義老店老哥兒倆來到店門口夥計出來老爺子你們二位住店嗎正房可沒有了不客氣咱們跨院裏頭有個單間就成我們哥兒倆只住一夜喲你二位奔裏來吧夥計給帶到西院的南房燈光點亮屋裏倒是很乾淨老哥兒倆擦臉漱口喝茶又讓夥計到廚房準備飯菜老俠石寶奎向夥計道貴姓阿我姓王嗷王夥計你隔壁不是欽差大人的公館嗎不錯不錯年欽差北京下來的大官嗷來了多少天啦喝不瞞你説來了日子可不少有半個多月石老俠點頭這位大人從這裏路過要上哪兒呀到四川放賑去怎麼還不走咳可甭提了滿城風雨誰都知道急得我們太原府的大班頭都快上了吊如此這般把丟金牌的事情都説了石老俠一聽怨不得咱們哥兒倆會追上大人呢原來大人根本沒走哥兒倆喝酒談心吃飯吃完了也就在這麼個工夫就聽見東邊一陳大亂聲音鼎沸嗆啷啷院裏噔噔噔跑出來個人老客們千萬別出來有賊人擾鬧公館留神誤傷快著趕緊上大門尚二爺一聽喲哥哥怎麼