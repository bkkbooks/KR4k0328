哥倆意見不合啦我們作為底下人實在不好説話吳指南一聽也很納悶兒這麼好的買賣怎麼不幹了呢好吧張先生你先回去安慰大家不要心慌依然按部就班我馬上去一趟見見李大爺説罷吳指南先到陸二爺家裏老哥倆坐下一談吳指南明白啦陸二爺一笑不瞞你説我們哥倆辭了鏢行我都不回家在我陸滾來説哥哥是我的當家人他説怎辦我無不應從哥哥不想幹我也絶不幹吳指南很讚美老弟兄的義氣辭別出來又到東院老哥倆坐下李躍一笑我琢磨著賢弟要來是張先生把你請出來的吧吳指南點點頭我剛才去陸二哥府上問了一下你們哥倆不像是鬧了口角的可又為了什麼呢李大爺沈得住氣吳爺你要認為我和陸二弟發生了糾紛那可是錯了賢弟呀衣食足而後知榮辱我這幾年省下幾個錢這刀尖上的買賣愚兄早就過膩啦趁此急流勇退全始全終于人於己都有好處我這麼想陸賢弟也這麼想知足不辱哇賢弟愚兄心意已決絶不更改兄弟你也應該成全哥哥吳指南鼓掌同意當晚吳指南來到鏢局把大家都找到了把意思説明好在都是徒弟每個人都多給了幾個錢最後除去淨剩李陸哥倆每人分得白銀五萬餘兩都存在乾德銀號李躍無官一身輕毫無牽挂吳指南想給李躍續娶一位被李躍婉言謝絶李英到了四歲老英雄給孩子盤腰窩腿站架子大架子三十六個小架子七十二個教孩子打拳練功光陰好快李英已經八歲啦有一天爺兒倆在書房休息雞叫兩遍爺倆剛起來要練功老家人李能來到門外道剛才陸忠來啦二爺打發他來給你道喜二奶奶剛生了一個胖小子母子都很平安順便讓伯父給起個名字李躍很是高興問現在什麼時候雞叫二遍嗷正是寅初就叫陸寅吧金雞報曉號叫曉村李能答應著出來告訴了陸忠陸忠回去一説陸滾夫婦十分高興洗三朝過滿月光陰似白駒之過隙一晃李英十六歲陸寅八歲老弟兄都鬚髮皆白了但李躍每天都帶著兒子練藝二五更的苦功夫從不間歇兒子練完自己還要練這天陸滾起早一點他來到東院客廳問李能喂大哥呢在後院練功呐陸二爺點了點頭道我去看一看撓頭獅子陸滾一高興站起身形出客廳一直往後院小花園兒走去緑蔭深處有三間房門兒虛掩陸滾推門進來哈哈哈哥哥這麼大年紀還苦練什麼阿兄弟快進來陸滾一看三間房好乾淨一通連兒都是三合土砸的地兩頭放著兵刃架兒擺放各種兵器擦得耀眼生寒房頂棚有南北下裏兩架明槍正中有個一尺的鐵環環上各有三十六個固定小鐵環兒東面這三十六個小鐵圈兒每個上面拴著一根繩兒緑豆粒粗細垂下來人要站在地上正好到人的肚子後腰下面的繩子拴著比拳頭大些的棉花團整整圍了這麼大的一個圈兒可西面的木柁正中吊的三十六個固定小鐵圈接著三十六根小拇指粗細的鐵鏈兒當然鐵鏈兒的分量比繩兒可就重多啦鐵鏈的下頭是一斤重的一把尖刀刀背沖上跟鐵鏈子銜接刀尖兒沖裏刀刃沖下鋒利無比三十六把刀子也圍一個圈兒陸滾這麼多年沒有親眼看見李躍練功便問哥哥這就是你的家傳祕藝吧賢弟説得不錯這就是騰身步月的功夫愚兄練了幾十年啦你這麼大的年紀為什麼還不收心呐李大爺搖搖頭賢弟呀一來是幼功兒擱不下它二來熬練筋骨三來如果有緑林朋友來訪咱也不能説咱不練啦你説得對這種功夫高在什麼地方李躍一笑也沒什麼高超的地方我們練武首先套路要熟而實際的功夫要下在手眼身步上所謂眼快在心手快在身身快在腿一個練武的腿下不行只能挨打這騰身步月的功夫練的就是手眼腰腿陸滾一聽雖説兄長的話他聽得進去但在功夫上心裏也有個不服人的徑頭兒哥哥你要不纍讓兄弟我開闊一下眼界練練我瞧瞧李躍往下一貓腰再一長身就鑽到這棉團兒的裏邊去了老英雄二目凝神意念貫足就看他雙手一彈左右兩個棉團兒刷這兩個棉團應聲而起都是一邊大的徑頭正和房柁上的大鐵環一般平不等這兩個棉團落下來就看李躍微然一轉身雙手不停啪啪啪又打起三對兒來這可就是八個啦由於棉團起來有前有後這樣落下來也有先有後第一對回來再打出去啪啪啪又是幾對這十八對兒不大工夫全打起來此起彼落使人眼花繚亂李躍銀須一擺身法展動手彈腳踢跟旋風似的然後一對一對再穩住直到最後才從裏邊鑽出來鼻孔之中省力氣不湧出面不改色賢弟你再看這個李躍説著話在功房遛了一個彎兒然後來到西邊微一低頭鑽到刀子圈內他沈了沈氣左右手的中指食指一夾這刀子尖兒一錯手腕兒譁楞楞兩把刀也跟上面的鐵環一平然後往下落這鏈子跟刀都是鐵韻分量可比棉團重得多它回來的速度當然也快得多必須用兩手指迎著刀尖一夾再送出去還有棉團要碰在身上手上都沒關係這刀子扎在身上能出人命阿李躍練了幾十年啦駕輕就熟十分老練也無需用眼睛看準再用手去送李躍把三十六把刀全打起來身形轉動體似飄風一片白光罩體冷嗖嗖如飛瑞雪眨眼間把三十六把刀全穩住之後貓腰出來陸滾鼓掌叫好哥哥好功夫賢弟誇獎也不算什麼哥哥我來來説著陸滾把小辮挽了個髮髻兒解絨繩脫大褂蹬了蹬靴子摟胳膊挽袖口兄弟要加小心陸滾答應著鑽到棉花團裏面照著李躍的打法施展身手把三十六團兒全打起來然後再穩住他出來之後大笑哥哥看來小弟還不老兄弟技藝超群愚兄欽佩我再來來這刀子説著就奔刀子去了李躍伸手一攔這刀子有危險不用練了咱們到前邊喝茶去吧陸滾聽了有點不樂意認為哥哥瞧不起自己其實李躍不肯明言怕兄弟臉上不好看早瞧出陸滾不成了因為他是把三十六個棉花團打起來可沒功夫這棉花團往上起由於徑力不勻有高有低落下來不一致再説他碰棉花團的部位也沒準碰刀子不行阿陸滾穿好衣服扎好絨繩李躍把功房門鎖好拿著鑰匙來到前廳一個月過去了陸滾心裏有些不痛快原因就是李大爺沒叫他練刀子心想有工夫我非練一下不可這天吃完中午飯李躍帶著李英爺倆來到東門外關廂永來澡堂洗澡叫李能好好看家李躍父子剛走陸滾就來了李能陪著到了客廳陸滾一看隔扇銅釘上挂著後院功房的鑰匙心裏想哥哥不在家我為什麼不去功房練練去想到這裏伸手把鑰匙摘下來自己走出客廳就奔後院小花園去了到功房門口開開鎖放在門墩兒上推門進來在屋裏活動活動腰腿然後鑽進刀圈之內精神集中也照著李躍的樣子雙手二指一夾刀尖刷往外用力兩把刀子就起來了又一轉身刷刷把第一對送出跟著又起兩對本來陸滾的本領也很不錯三十六把刀他悠起來二十把這可就前後左右你來我往應接不暇啦陸滾全憑自己的武功並不掌握要領現在他意識到這跟棉團大不一樣雙手的力量也不能平均起來的高度不同回來的速度有快有慢左手的到啦右手的還沒到顧此失彼可這二十把刀全是蕩體不能由人的意志支配稍一失神一把刀的尖子扎在陸滾的手指上就在打閃認針的工夫這前後的刀子全回來了撲哧撲哧從陸滾的前胸後心扎了進去再想躲閃絶不可能可惜陸滾馳騁江湖一生由於逞能遭此大難三魂渺渺七魄茫茫倒在血泊之中絶氣身死
