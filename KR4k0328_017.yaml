body:
  text: 第十七回遇捕快白潔遭奇冤逞英雄陸滾喪功房上回書説到白潔奉母命結識李英跟兄長學三十六手絶命槍今天隨劉三來逛龍王廟到賣藝的場子裏觀看賣藝的是個老頭手裏拿著一杆蠟杆槍左手一抱右手作了羅圈揖衆位朋友坐著的金剛站著的佛一站一立的子弟師傅們打過一拳踢過一腿的同道們還有僧道兩門回漢兩教六扇門裏六扇門外只要是喜歡武藝的師傅們今天都來巧啦在下姓孫雲南人氏不遠千里來到貴寶地投親未遇訪友不著流落異鄉舉目無親常言説得好人貧當街賣藝虎餓攔路傷人還有人説學會文武藝賣與帝王家帝王不用交與識家識家不用扔在地下學徒偌大年紀窮途末路就算給師傅丟了臉我練趟六合槍我練不好那位先生説既然練不好就別練啦你可別那麼説褒貶是買主吆喝是間人練不好你別叫倒好練好了你給喊一嗓子好在下非常感激那位説練完了看著不錯怎麼樣呢在下求幾個錢我看看有走的沒有説著他看了看四面兒罷了我學徒的人緣真不錯一位走的沒有你不用走身上帶著富餘就給我掏一把半把的多富餘多掏少富餘少掏你可想著掏自己的別掏旁人的真沒帶著富餘你別著急只要你給我站腳助威我照樣感激間話少説咱們練啦説著一拉架式眼望四外又道我還要託付託付諸位你可千萬別像那種人練的時候他看喊好的時候他也喊剛一説要錢他扭頭就跑他不給錢把想給錢的財神爺也給帶跑啦風雨不透的人群他給撞個大窟窿人緣不幫財緣不幫這種人咱就別提他啦無君子不養藝人四面為上我再給大家作個揖衆位上眼吧一抖槍烏龍攪尾怪蟒翻身叭叭叭地練上啦蹦砸窩挑大槍的功夫真不軟練完了把槍往地下一扔抱拳一站衆位師傅鄉親們在下求錢啦真有大把扔錢的譁啦啦你也扔我也扔地下見了不少的錢老頭兒站在旁邊點頭哈腰謝謝謝謝他慢慢地把錢都撿起來放在桌子上劉三問白潔兄弟你説這個老頭練的功夫怎樣白潔看得出老頭兒的槍法不錯不過白潔學的是三十六手絶命連環槍法看李士鈞的手法再看這老頭的功夫可就看不上啦便説三哥老頭的槍法很不錯不過要比好的還差得遠呐劉三一聽兄弟你幫幫場兒練趟槍讓老頭看看你瞧他洋洋得意的徑兒光壓行當你氣氣他白潔剛要拒絶這劉三喊上啦老朋友現有我們本地的師傅鳳尾巷白潔白玉如來幫幫你的場子他一邊喊著就用左胳膊一推噔地一下把玉如給搡進去了這位賣藝的老者把錢拿起來伸手抄槍還要練聽見劉三一喊推進一個青年人來老者趕緊把紅纓槍放下把場正面的攔門凳子搬開一抱拳子弟老師傅在下短去拜望求你多捧場老頭兒滿面春風笑嘻嘻地往裏請白潔一看這可沒法了啦只能邁步進來抱拳道老師傅見你的槍法出衆一時技癢班門弄斧請不要見笑我叫白潔朋友替我説啦你替我墊墊場子我幫你練一趟獻獻醜老者點頭遵命遵命又作了個羅圈揖道鄉親們俗語説得好人奔福地虎奔高山在下借貴方一塊寶地求幾個錢吃飯本事不值識者一笑可拋磚引玉了現有貴處武術名家白潔白師傅前來幫場白師傅倒不是故意顯示武藝實在是惜老憐貧請鄉親們站腳助威謝謝啦説完又四面作揖然後沖白潔一笑白師傅請吧白潔來到當中也沖大家作揖叔伯父老兄弟我家住本城北門裏鳳尾巷他一指劉三爺他是我的街坊哥左胳膊劉三劉三在常德府是大有名氣的四面鼓掌聲如爆豆大家都看他劉三爺一撇嘴左胳膊一晃悠鄉親們譁地一下子全樂啦白潔接著往下説我和三哥是逛廟來啦人家賣藝的老師傅有真功夫白潔不過是一知半解落落秋螢之火逐逐野馬之塵今天既然進場那就請鄉親們人緣財緣一齊幫吧説完話伸手把母親給的幾吊錢全拿出來解開繩串的扣兒譁往地下撒這叫墊場子好財買臉白潔眉梢一鎖伸手把大辮子往脖子一繞挽好袖面兒賣藝的把槍橫著往白潔的面前一遞白沽雙手接過沖著賣藝的一笑獻醜説完一轉身左腿尸蹦右腿一弓陰陽一合槍刷刷刷就練上啦真是行家看門道力巴看熱鬧頭一招金蛇串地跟著摔杆一變是玉莽穿林左插花右插花十字插花還有雙插花都是絶命槍裏最絶的招數賣藝的老師傅在旁邊一站嘴裏喊著好功夫這招叫毒龍出洞好這招叫撥雲現日這招叫秀女穿梭開始幾招這老者還給報十幾招一過去這賣藝老頭兒的眼睛睜圓注目觀瞧白潔練到高興的地方自己也洋洋得意這趟槍練了一半到了懷中抱月接著躥起來一丈四五尺頭沖下腳沖上這手功夫叫玉杵搗藥最難練最吃功夫可是這一招最引人注目白潔一想不必練完趕忙見好收場回家想到這裏一收式刷地一下挺身而立真是氣不湧出面不更色把槍橫過來笑嘻嘻地一遞老師傅獻醜獻醜四外一片叫好聲掌聲如同爆豆按理説這老漢得給公子道謝照顧人家給錢的可這老頭兒卻沒這麼辦他右手接槍很不禮貌右手手心沖上攥住扎槍頭後邊不過半尺他一立右手就成了槍尖對著白潔槍杆在後邊好像要槍扎白潔似的白潔納悶怎麼這人如此無禮哪料到這老頭兒伸左手嘭地一聲把白潔劈胸抓住你別動你只要一動我就扎死你譁啦啦四周百姓一陳大亂左胳膊劉三爺勃然大怒呔你這賣藝的好不通情理念完了經打和尚左胳膊一舉就要打白潔沈得住氣道三哥不必動武咱們跟他講理説著就問賣藝的朋友你這是幹什麼這賣藝老頭如臨大敵哼我問問你你這套槍法跟誰學的白潔一陳冷笑默默默我幫你的場子盡的是江湖義氣又不求你給我贈匾紅傳名全國你管我跟誰學的你管得著嗎賣藝老頭一瞪眼你練的這是雲南府李家祕傳三十六手絶命連環槍白潔見他還真懂便説不錯跟盟兄所練你的盟兄是哪位姓李名英字士鈞人稱騰身步月好你跟李士鈞是兄弟情屈命不屈這場官司你打了吧一聽打官司白潔明白兄長李英循規蹈矩安分守己怎麼能有越軌之行呢老朋友你是何人打什麼官司哼我也不是什麼賣藝的我乃雲南府八班總役金眼鷹孫亮我地面一連出了十八條無頭命案最後我家府台梁玉書的小姐被殺留下騰身步月李英的名字俺孫亮訪案至此朋友這場官司你打了吧原來三年前雲南府連著出了十八條人命案殺害的都是少婦長女最後一位是梁知府的十七歲女兒每次做案之後都留下一首詩一口鋼刀掌中擎五湖四海任縱橫好漢一怒傷人命騰身步月是李英梁知府正在派孫亮明查密訪李英的時候自己的女兒又被殺了他痛苦萬分又不敢聲張生怕於自己的名譽有礙他立刻傳話叫八班總役孫亮二堂回話差役答應飛也似地來到班房孫亮現在是坐立不安每天帶著眼明手快的官人明察密訪雲南府城裏城外的大小旅店庵觀寺院熱鬧場都查到怎奈這凶犯黃鶴無音孫亮束手無策來到內堂門外一見知府雙眉緊鎖面沈似水就知道府台大人十分震怒孫亮請大人安知府伸手接安孫班頭坐下吧知府沈一沈氣道孫班頭小女已然悄悄埋掉夫人思女哭得死去活來本府到任之後拿你不當差役只做朋友因你老幹吏事辦案有方精明強幹此次連出命案也是本府官運欠佳倘被朝廷知道連出命案就要被參革職這倒無關緊要只是死者含冤受害做案者逍遙法外身為地方官長實在問心有愧按字箋來説即使非李英所為李英也必知其人你是否訪過此人呐下役多次造訪他家只有一老蒼頭只知三年前帶妻子孩兒遠奔他鄉未曾回轉他先人也確是雲南府有名人物此人幼受父訓知書達禮循規蹈矩根本沒有前科豈能擾桑梓污辱先人不是下役為李英開脫下役敢以人頭擔保絶非李英所為梁知府搖頭前者你跟本府幾次談過本府也相信李英並非歹徒哪有留下自己名字的道理可要想拿賊必須先拿李英到案本府賞限十天一定拿李英到案孫亮行禮告退設法捕捉李英這是辦不到的事情從此三日一逼五日一拷把這三班人役打得遍體鱗傷知府又傳命把孫亮全家滿門二十七口一併打入監牢叫孫亮捕盜拿李英李英不到案孫亮一家不放出監這手可損啦孫亮落淚如雨他跪在母親的面前孩兒不孝連纍老娘老太太掉著眼淚兒呀食君祿當報王恩居其地應保其土你在雲南府四十年孩子你能忍心看著這些無辜死去的姐妹沈冤難雪嗎你去吧勿以為娘為念孫亮狠心咬牙一跺腳帶好海捕公文領了盤費帶著衣包軍刃離開雲南各處明查密訪光陰荏苒日月如梭眨眼就是三年披星戴月越嶺翻山費盡心機可這李英連個影兒都沒有這次來到洞庭湖畔常德府他先到府衙的回事房到裏邊一看坐著六七位又説又笑孫亮抱拳衆位老爺辛苦大家一看就知道是外府官員也都很謙虛辛苦辛苦老哥有事嗎孫亮先把公文拿出來問衆位老爺哪位值班呐值班兒的王班頭過來孫亮把自己的事情一説請你驗看公文往上邊回一下在下要在常德挂個號王班頭多受纍好説好説王班頭接過公文看了看孫亮等著王班頭來到簽押房見著該管的師爺呈上公文驗看無訛這才給孫亮挂號注册一切手續辦妥拿著公文出來交給孫亮孫亮掖好公文告辭出來他在茶館喝茶聽説龍王廟開光他心想借打把式賣藝以武會友也可能發現線索這樣兒他才來到龍王廟找到會頭辦了手續劃了地方兒賃幾條板凳租一張桌子他已經賣了三天藝啦今天遇到白潔等白潔一練槍他認出來這是李家祖傳看了看白潔的年歲心想可能李英就在白潔的身旁這才把白潔抓住用槍尖兒對準白潔的胸口盤問白公子怎能含糊現在一聽是這種不名譽的案情殺害少婦小姐十八人不由得心裏一陳難過有心要走心裏一想不能跑哇誰不知道我住在此地豈不連纍老娘再説也被鄉親們恥笑不走替哥打這場官司死倒不怕可惜這案子太難聽死後也受人唾罵白沽前不能進後不能退又一想哥哥李英是這種無恥之徒嗎要是這種東西怎能中毒鏢而又逢凶化吉呐最後一跺腳把心一橫常言説得好交朋友受朋友之益受朋友之害大丈夫為朋友則生為朋友則死誰叫我跟他一個頭磕在地下了呢再説哥哥夜晚離家多次我問他又不説不見得沒有隱情不如跟這姓孫的到案他説我殺人難道就是我殺人嗎真的動刑不過滾不出來我替哥哥死了他必然代我盡孝再説當年教藝之時哥哥也曾諄諄囑咐這趟絶命連環槍不要到外邊隨便顯露我根本沒聽兄長的話這叫禍福無門咎由自招豈能怨天尤人更不能對兄長胡亂猜疑想到這裏一陳大笑哈哈哈孫班頭你先把槍放下姓白的真要走你這只槍也攔不住官司我打啦可有一節你捆我不成我一定跟你去衙內這時候劉三也嚇壞了兄弟可沒想到哇白潔一笑三哥你回去設法婉言告訴我娘請他不要著急只不過是誤挂官司你記住啦記住啦白潔一回身孫班頭我們走吧孫亮提著槍道朋友好漢的脖子是拴馬的樁子好朋友不叫好朋友為難我給你亮面子絶不給你加繩兒你也別讓我為難白沽點頭二人直奔城裏府台衙門來到府衙班房孫亮一眼看見王班頭班頭王順可就出來啦他認得白潔喲白少爺有事嗎白潔一笑打場官司你問孫亮吧王順當時就怔住了怎麼白少爺你打官司來啦回頭又問孫班頭是怎麼回事孫亮一一説明請王班頭借副刑具再回府告訴一聲多受纍王順聽完