body:
  text: 第四十六回清真寺海川會篩海僧道俗三次比神功上回書正説到吳成王府訪童林被海川啪嚓一掌擊上塵土飛揚磚渣亂蹦再找鐵羅漢吳成蹤迹不見了這可把馮昆石勇嚇壞了喲吳師傅到底哪里去了衆人都在找吳成自己説話了衆位快幫忙把我摳出來我嵌到磚裏啦動不了徑兒快呀衆位尋聲一看呐不由得暗笑原來海川這一掌把吳成正撞在西窗下的磚牆裏一來是海川借力發力徑頭很足二來是吳成有獨到的功夫所以他碰到牆壁時磚撞碎了衣服破了人只是嵌到磚裏出不來了吳成一通喊快著唄把我摳出來呀海川心裏非常害怕這要把吳成給打死怎麼辦大家過來七手八腳揪住他的胳膊把他給拽出來了衆人一看吳成什麼事兒都沒有默倒把牆撞出一個人坑來海川心説這吳成身體還真叫棒哎呀吳師傅你這功夫還真不錯呀你甭説了我就問問你這是你輸了還是我輸了海川一想這叫什麼詞呀就説我都把你打到牆裏頭去了那麼是誰輸了是嗎是我輸了那要是我輸了可就有事了剛才我跟你説得明白我贏了你沒事你贏了我我拜你為師海川便道我贏了你也不要緊咱們剛才説的話不算數那哪兒成阿咱説話得算數阿他連衣裳都不整理撲嗵跪下了得了你得收留我我瞧你剛才那一下就好你一抄我小肚子我可把這招學去了後來吳成拿這招打了不少人我拜你為師了海川最喜歡這樣的人説話算話但嘴上仍説吳師傅咱們倆人鬧著玩呢哪能鬧著玩呀我這人一輩子不跟人鬧著玩我説話算話你贏了我就拜你為師我就給你磕頭師父在上弟子吳成有禮咣咣磕上響頭了海川一看唉收下你石勇馮昆過來給童俠客爺道喜海川説咱下不為例今後不準再給我往這裏帶人行了你呐吳成你起來唉我起來了有師娘嗎海川道沒師娘不用給師娘磕頭見過你衆位師兄劉俊等衆人過來吳成一一行禮行完禮之後都進了屋海川馬上把管事的叫進來吩咐立即收拾房子又給吳成找了一件比較合適的衣服讓吳成換上吳成説沒關係我家裏有的是衣服師父我向你打聽打聽你一月要多少錢呐海川一想怎麼問錢呢就説我一個子也不要你要願意住這裏就把行李搬來跟你師兄們住一塊每天下場子練功你要願意回家你就每天來師父我每天來吧好嘞只要你堅持每天來風雨無阻就行這時馮昆石勇對海川説童俠客爺我們可要跟你告假了好吧海川一再囑咐下次不許再帶人了馮昆石勇回家咱先不表海川進來之後跟吳成聊了聊吳成就把自己的事情全都説了出來當年雲霞道士杜清風救了我十年來這般這般我學了一手靠山背我外號叫鐵羅漢師父你可得教給我一手好能耐海川知道吳成家裏是大財主就對他説吳成阿你回家吧把家務事安置安置以後你每天就上這兒來師父我教你本事謝謝師父打發吳成走了劉俊這些人這樂呀師父呀你瞧見沒有這一下咱們十兩銀子都不夠他撞碎了多少塊呀海川説練武有這麼句話不怕你千招會就怕我一招熟就這一手靠山背不大離的把式匠就贏不了他呀劉俊説師父還真是的你又給我們收了這麼個傻師弟海川對劉俊説明天我還得去趟城南你帶著師弟們好好在家裏練功第二天早上起來練完了早功海川喝了點兒茶把子母雞爪鴛鴦鉞的包裹包好了腰裏圍上落葉秋風掃寶劍囑咐劉俊好好帶著師弟們練功看家吳成也來了跟著一塊練海川提拎著鉞包袱可就打家裏頭出來了現在海川對北京的大街小巷多少熟悉點了他仍然出前門走李鐵拐斜街奔五道廟穿騾馬市菜市口一直趕奔牛街北口再往南就到了清真寺海川站在角門擡頭一看清真寺建造得十分莊嚴富麗牛街清真寺在全國都很有名據傳説是從遼代聖宗十三年建成距離現在已經有一千多年了明朝正統七年重新修建到了清朝康熙三十五年又照原樣大修了一次海川看見的就是康熙三十五年重修後的清真寺過了大影壁一過山門有望月樓再往裏有梆歌樓這梆歌樓就是教民們做禮拜的地方又叫喚醒樓宣禮樓閲台兩邊有兩個碑亭座西朝東的禮拜殿這個禮拜殿能容一千多人殿的西北角有木制的宣講台這裏是講經的地方禮拜日呀或者是節日呀教民們全都在這裏聽經碑亭是明代弘治九年制的望時樓在門裏裏面還有恆堂造的大銅香爐乾隆四年造的大銅鍋清真寺年代久遠呐海川到了角門這裏角門開著海川還按照漢民的規矩站在角門這裏喊了幾聲回事呀回事呀沒人答應海川納悶這麼大的清真寺怎麼沒有回事的呀其實人家教民來了隨便出入這裏沒有回事的地方海川喊了半天沒人言語一想我進去吧就順著北面這個角門往裏來了剛走出不遠去鐵三爸從裏邊出來了喲童俠客爺你來啦我還正要去接你呢嗷鐵三爸你好哇彼此請了安海川問我喊了半天回事沒人言語鐵三爸解釋道咱們寺裏頭沒有回事的不瞞你説教民進出隨便怎麼樣都可以嗷原來這樣海川隨著鐵三爸往裏走一層殿一層殿順著北邊這角門往東來走到第二層殿路南就是大月臺東大殿前出一走廊巍峨壯觀斗拱重簷十分講究正這個時候北屋的簾子板叭嗒一響打裏邊出來一個人鐵三爸高聲喊童俠客爺來了海川一看謔這不是輔成鏢局的鏢主鼓上飛仙丁瑞龍丁大爸嗎丁大爸光頭沒戴帽子頂還沒謝呢花白剪子股小辮花白的眉毛斜飛人天蒼一雙大眼睛閃閃發光鼻似玉柱唇似丹墀一對元寶耳上嘴唇一字齊口頷下壽毫有一尺來長謔丁大爸還真有份兒鐵三爸可説童俠客爺這就是我哥哥鼓上飛仙丁瑞龍丁大爸又對丁瑞龍説哥哥這就是童俠客爺丁瑞龍過來了搶步進身請安俠客爺丁瑞龍給你請安喲丁大爸童林不敢當童林給你請安兩個人彼此打橫都請了安都有愛慕之意海川先説道聽鐵三爸提到你我早就想跟你見個面了一直不得機會這次鐵三爸到我家裏頭來送信我今天才來與閣下相逢堪慰平生之願呐俠客爺你太客氣了久仰你的大名聽我們寺裏頭老爸爸經常提到你呢不瞞你説你的大名鼎鼎我丁瑞龍早就有耳聞了也想到府上去拜望你就是不得機會俠客爺此處不是講話之所裏面一談吧鐵三爸把簾子撩起來二位進來室內的陳設也十分講究眼前八仙桌角站著個人海川一見這人瞧著有點兒眼熟個不高精瘦兒一身土黃布的衣服腰裏扎著絨繩搬尖灑鞋白襪子高腰黃黃的眉毛一雙大眼睛閃閃地有神氣歲數在五十上下臉上有幾塊傷已經定了痂二位元認識嗎丁大爸這是誰呀哈哈哈你們二位見過幾次面了就是沒打過交道海川瞧得出來這人的腦門鼻梁骨都有傷這人過來就請安俠客爺我給你請安了真對不起你我訪了你好幾次就是不能跟你見面因為我不敢呐俠客爺我可栽在你的跟前了我栽了我栽了嗷海川明白了這可能就是領著我四次溜城牆的那位海川忙説不朋友是我童林栽了不俠客爺我栽了我栽了他拿著手指頭一指自己的腦門子和鼻梁骨你瞧瞧我這裏有痕迹呀我栽了不是我栽了丁大爸樂了你們二位不打不相交他也是我們教的一個兄弟神形無影伍金堂他只是腿快一些能為不成俠客爺從江南押著盜寶的欽犯來到北京城從菜市口一走他就在西鶴年堂沖天招牌下站著呢瞧見你後他總想拜訪拜訪你可又不敢所以他才領著你去溜城牆伍金堂搭上話了第四次你已經把我截上了我扭頭一跑就覺得有人抄我的腳脖子把我從城牆上扔下去了好像我聽見這麼兩個字淘氣你瞧我這栽的不伍兄還是我童林栽了你在我大褂上拴了城磚又掐我的辮穗我都不知道不我沒那能耐我只是兩條腿不慢跟你比比腿拴城磚絶對不是我伍金堂幹的海川心有所思就憑伍金堂伍爺的本事能掐我的辮穗大褂提擺上拴城磚我也有點兒不相信那麼又是誰呢神形無影伍金堂和童海川客氣了一番丁大爸又説咱們也就不必客氣了正這個時候鐵三爸把裏屋的簾子也給撩起來了由打裏間屋出來一個白鬍子老頭説道瑞龍哇把我和海川我們爺兒兩個介紹介紹哈哈哈聲音洪亮海川一看眼睛一亮這位老者中等身材猿背蜂腰身上穿著米色長衫腰裏扎著絨繩腳底下福字履鞋白襪子白綿綢的汗衫赤紅臉大白鬍子半截黃兩道蠶眉斜飛入天蒼微擡眼瞼二眸子金光炯炯亞賽兩盞金燈喝笑容可掬風采可愛捋著頷下銀髯站在那裏丁瑞龍丁大爸可説話了海川跟老爺子見個面吧海川可就愣了丁大爸這位老人家怎麼啦你不認識了哈哈你琢磨琢磨這是清真寺老人家能是誰呢嗷你是老前輩老篩海爺吧嗯哈哈海川呀你那徒弟沒有跟你提過我哎呀老篩海爺老前輩在上請受晚生童林一拜清真人不受禮請個安就得了海川趕緊跪倒了給老爺子請安老人家伸手相攙海川這才想起來原來這位是金元金老劍客爺當初徐源邵甫劉俊三小被困在八卦山十八棵楊多虧老人家騎著千里追風騎趕到了救了三小並且提出來下廣東請王十古會太極才把二小拿住國寶還朝説真的老前輩對我童林有恩呐海川至至誠誠地給老人家道謝孩子們多虧你老人家搭救哈哈海川呀不用客氣徐源邵甫是你哥哥侯振遠的弟子跟我另有淵源將來你會知道的你的孩子也不屬外這是我應當責份的事我從江南早就回來了最近你倒好哇托老人家的福快坐下快坐下咱們把這事情説穿了鐵木金我叫他在寺裏邊擔點兒事就行了伍金堂幾次拜訪你我都知道我對他説你也不是壞人就跟海川見個面可是他又不敢因為他就是腳程還比較快點兒別的能為不行我説你要這麼樣幹海川要是拿你不當個朋友你可有點兒危險最後呢他還是栽了跟頭了至於你説到拴城磚的事他倒是沒跟我提這個小孩不會説瞎話得了我們大傢夥兒坐下獻上茶來大傢夥兒喝著茶先從鐵三爸提起又提到鼓上飛仙丁大爸海川也把自己的事情説了爺兒們喝著茶交著心談著話這個工夫可就不小了老篩海爺喝著茶問童林海川呀我聽説你奉師命興一家武術叫八卦綿絲盤龍掌説真的這趟功夫我這麼大年紀只是聽説過還沒有看過海川你今天既然來了能不能到月臺以上練趟功夫讓我們爺兒幾個開開眼呢別人讓海川這樣練海川不一定練可老篩海爺一説海川可就不能不練因為是老前輩甭説對自己就是對自己的哥哥侯振遠老人家都有恩自己最敬仰的人讓自己練一趟功夫怎麼能不練呀而且自己練出功夫來讓老前輩看看哪一招哪一式功夫不到家老人家給指點指點這不是好事嗎泰山不讓寸壤故能成其大河海不擇細流故能就其深不能因為我是泰山了我這土多再來的土塊兒我不要那還成呀什麼土到我這兒我都吸收以鞏固我的大我是河我是海給來幾滴水我不要那不成呀什麼水我都要只有其他的水來了才能幫助我的水越來越多越來越深我有能耐就不能拒絶老前輩的指點海川虛懷若谷是個謙虛人老人家按理説我不敢班門弄斧既然老人家吩咐弟子倒要獻醜請老人家指點指點海川你太客氣啦哈哈那麼好吧我們大傢夥兒都到月臺上吧海川把包袱放在桌上大傢夥兒都從北屋裏出來了月臺設在西殿和東殿的中間上頭鋪墊得十分平整在這個月臺上練功夫那是天然的一個好場子月臺有兩尺多高海川一個人上了月臺海川好好