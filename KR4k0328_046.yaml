動任何人都沒看見老篩海爺也粗心大意寶鏡禪師練完了阿彌陀佛飛身下來洋洋得意地説老篩海爺該你的了老篩海爺過來了拿手指頭掐住了這點穴鐝的鐝頭唰地一下人們的眼睛往上一看只見老篩海爺十分起徑老篩海爺揪長衫腳尖一點地剛要起縱可是這根繩輕輕地落下來上頭那點穴鐝沒有了不翼而飛尚道爺身法多快呀燕子三抄水飛身形來到東殿的中脊以上老篩海爺也上來了兩人四外觀瞧整個清真寺內清肅肅靜落落十分寂靜沒發現人寶鏡心説默這是哪位呀把老篩海爺成全了不然的話他非栽下來不可何道爺也有點兒傻眼了老哥兒幾個心裏都有這麼一個想法我們這幾個人的身份可不軟呀怎麼當著我們把點穴鐝拿走了衆目睽睽之下我們都寒磣了老篩海爺很難過喲我的點穴鐝沒有了尚道爺安慰説老篩海爺別難過能拿走你點穴鐝的可能是武林道的前輩像我們四人的年紀和在武林中的身份不應當著晚生下輩在此試藝萬一有一個人練不上來不是把半生的名譽付之東流了老篩海爺你出的這個主意可不怎麼樣我們弟兄仨也不應當陪你今日之事雙方都有過失看來拿走點穴鐝這是教育我們幾個人呢老篩海爺點點頭怎麼這位當著我們的面拿走點穴鐝我們不知道呢這得多快呀他從東殿的簷頭探身下來伸手抄點穴鐝然後他得走當這繩往下來的時候要打算晃身下來離開這清真寺沒那麼快呀再快也能看見你人的身法快還能有眼睛快那麼這個人當著我們大傢夥兒眼底下拿走點穴鐝我們就不知道看來這個人可了不得海川也嚇愣了人外有人天外有天呐我二位恩師的本領我童林可是知道的比我強萬倍呀老篩海爺跟師叔寶鏡也是他們同輩的人功夫也差不多那麼拿走點穴鐝這個人豈不是超人嗎甭説比我就是比四位老前輩那也高得多呀哎呀學無止境阿鼓上飛仙丁瑞龍也有這種想法這裏尚道爺説老篩海爺屋裏説話去吧大傢夥兒跟著來到北屋分賓主入座尚道爺細問海川呀到這兒幹什麼來了海川這才稟明原委然後問尚道爺師父我看你們老哥兒幾個要在清真寺住下來阿對了我們就住在清真寺了不過你回去不要往外聲張有什麼事可以到清真寺來跟我們哥兒幾個商量商量千萬不要獨斷專行我們這次來京確實另有事情你先回去海川答道師父師叔老篩海爺這兒方便嗎不如住到弟子家裏去孩子家裏有的是地方我們原是想住到你家裏看來老篩海爺這清真寺裏可比你家裏清靜多了我們老哥兒幾個住在一起盤桓盤桓我看也不錯嘛篩海爺也説我們有事找你去至於住哪兒都一樣今天我們哥兒四個都有不對之處得了別説啦你先回家吧有事你就來海川答應著辭別了二位恩師師叔老篩海四位前輩然後往外來丁大爸鐵三爸他們幾個給送出來到了角門海川攔住丁大爸鐵三爸伍爺改日再會丁大爸連連致意道不瞞俠客爺説我不請你了因為你跟雙龍鏢局有關係可能在明年三月三北京城裏有點兒事幾位老人家來大概也為這個咱們改日見吧海川告辭出來一個人往北走越想心裏頭越急恨自己的功夫還不夠眼看著都到牛街北口了迎面來了個人師父你趕快回家吧海川擡頭一看心裏不由得一驚
