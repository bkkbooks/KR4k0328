body:
  text: 第六十回訪賊人巧遇陳道常三皇觀搭救夏九齡上回書正説到少劍客病太歲張方來到府衙張開到裏面回稟知府大人大人吩咐有請少劍客在書房相見這時候衙門裏的大小官吏來了下少都在臺階下站著門簾一挑張開李豹陪著張方來到屋中張方環視了一下四周迎面擺著一張八仙桌上垂首坐著知府李大人四品皇堂五十多歲黃白淨子臉三縷墨髯穿著便服很有氣派下垂首是曹師爺張開李豹往旁邊一閃府台大人張方來了又忙對張方説師弟見過大人知府大人在上小人張方拜見李大人差點沒樂出來天底下咋有長得這麼醜的人呢真是三分像人七分似鬼但這孩子身上別了一個大冰釧倒是增添了幾分精神知府怕失官體沒敢笑哎呀小劍客爺不敢當不敢當李大人雙手相接張開李豹過來把張方扶起張開對張方説師弟見過曹師爺曹志高張方一抱拳默槽子糕我還從來沒有見過一百多斤的槽子糕呢哎呀你怎麼這樣叫我呀你要吃了我嗎大人忙勸好了好了張方心説看你就不是好東西張方坐下後李大人説少劍客爺你是張老俠之子也是本地人普天之下莫非王土率土之濱莫非王臣你也有保護本府保護黎民百姓的責任以盡俠義道的天職請問少劍客爺你的本領如何呀稟大人我自從八歲蒙父親帶我到廣東龍門縣清源山寒風島祥慈觀拜三清教的掌門主歐陽修老俠客為師學藝十二年真可謂臥薪嘗膽絶門的三支邁門弩六隻棗核鏢一條三稜凹面呂祖錐打遍天下無敵手李大人聽得直點頭旁邊曹師爺搭茬了我説老大人聽少劍客爺一説真是將門虎子不過咱們光聽説還不成既然少劍客爺有這麼大的本領能不能在這兒練練讓學生也開開眼界呢知府也明白少劍客爺曹師爺要瞻仰瞻仰你的功夫你能不能在這裏練一練讓我們看看呢張方點頭説當然可以只是屋子裏地方太小練不開還是到外面去練吧張方一伸手把三稜凹面呂祖錐拿起來大家來到院中李大人和曹師爺站在房簷底下的臺階上張開李豹站在第二層臺階上院子裏還有四十多位張方站在臺階下邊説好了大人既然如此張方獻醜了一伸手把長袍撩起來往絨繩上一掖兩手一按地唰地一下拿了一個大頂曹師爺心説憑這大頂能捉住十八條人命案的凶手哇便對大人説這叫大頂我學生小的時候也會大人請看唰地一下他一伸胳膊也拿起一個大頂來大夥譁地一聲全笑了知府可説了曹師爺看少劍客爺在下面練功夫你不要打擾曹師爺這才站起來張方拿的這個大頂使了一手蠍子爬拿手當腳走兩條腿微彎著朝前往南爬嗷這叫蠍子爬我也會他也要練被李大人再次攔往了張開李豹心説師弟呀你到底會不會練功你要是會就練兩手鎮鎮曹師爺你拿大頂算什麼呀這誰不會張方兩隻手倒著倒著走幾步突然他兩隻手的掌心離地了用十個指頭支撑著仍然輕飄飄地往南來走出幾步張方的大拇指突然離地全憑著兩手的四指支地再往前走李知府得意地問曹師爺這一手你還會嗎這手學生辦不到了哼知府回過頭來哼了一聲張方走著走著兩個個小拇指也褪回來了但走得還是那麼快走著走著食指也蜷回來了全身的力量都壓在兩個中指上了走得還是飛快好張方這時候到了南房臺階下憑這兩個指頭上了臺階到了東邊這根抱柱邊上突然往上一貼兩腿往上一盤雙手一擡腦袋沖下就把這抱柱給抱住了默真跟蠍子倒爬一樣哧哧哧來到房簷兒這兩腳勾住房簷身子一彎兩隻手一絞徑就到這椽子頭了唰唰唰往東來了比貓都輕到了東頭返回來再往西唰唰唰由東到西由西到東就順著這椽子來回走開了其快無比譁掌聲如同爆豆也聽不見曹師爺嚷嚷了大家都瞧直眼了再看張方一飄身由前坡躍脊後坡人沒了張開李豹便喊師弟府台大人賞識你的功夫欣賞你的才幹快下來吧大傢夥全都往南看知府大人心説曹師爺這回你不嚷嚷了吧少劍客爺的功夫果然十分超群武藝玄妙本府十分欽佩快下來吧大人一喊那些瞧不起大錛頭的官人們也都跟著喊起來了你快下來吧這時就聽南房坡脊上有人大笑曹師爺怎麼樣阿大傢夥兒回過身來這麼一看曹師爺四馬倒攢蹄被人給捆上了不知是從哪兒找來好些用過的手紙把嘴給堵嚴了阿衆人全都一愣其實這是張方辦的他故意躍脊後坡把人們的眼神都引到房上頭他又從東房坡下來了東房坡下頭有個廁所張方心説小子我得算計算計你他從廁所裏撿來好多用過的手紙從書房的後頭進來了鷹拿燕雀一樣就把曹師爺拽到屋裏來了曹師爺想喊可出不了聲連氣嗓都給掐扁了張方膝蓋一頂曹師爺的腰眼抹肩頭攏二臂四馬倒攢蹄捆好了曹師爺心裏這個罵張方把曹師爺放在臺階上順原路回去到南房坡一露面哈哈大笑飛身形下來大家一看張方的技藝果然身手不凡師爺讓人給捆上了都不知道張開對張方説哎呀師弟你把曹師爺給戲弄了沒有我就是讓他吃點好東西等大家過來一瞧哎喲曹師爺的氣嗓都給擠過來了出得來氣説不出話等曹師爺解開塞在嘴裏的擦屁股紙掏出來哎呀他噴著臭氣就跑了李知府把張方請到上房大家分賓主落座又命人請曹師爺等了半天差役回稟曹師爺告假不來了大人説好吧然後便跟張方聊上了少劍客爺你的武藝不錯希望你能好好幫助本府把這件事辦完也算為本地區除去一害我請曹師爺給你開份公文一定要把賊人抓住張方很痛快答應了知府又從自己的薪俸裏拿出紋銀四十兩對張方説得了我也不給你拿官錢了這些銀子就算你我兩人的見面禮拿著吧謝大人然後準備了一桌豐盛的酒席款待張方張方吃完了飯把三稜凹面呂祖錐帶好公文紋銀也收好告辭回家了回到家中一直趕奔後院燈都點起來了老兩口這兒正吵嘴呢老安人念叨你説我兒子不好我兒子他師父給他二十兩銀子他一分沒花都給我帶回家來了你倒是一生行俠仗義都是家裏吃飯外面打架你有什麼出息你你婦人之見什麼都不懂阿這孩子一應這件事從此我們家中沒有安寧的日子了十八條無頭人命案上哪去查呀你什麼都不明白唉我也這麼想過可我兒子有能耐你甭管正在這時候張方挑簾櫳進來了張老俠一見他又數落開了冤家你真是小馬初行嫌路窄鵬飛雲外恨天低呀你有什麼能耐應這件事呀張方不理他爸爸媽這個公文你帶著我要這公文幹什麼用對了這是知府大人托我的如此這般他全説了這有紋銀四十兩媽你全拿著吧張老俠一見這樣也無可奈何了就嗔怪地説小冤家我們給你準備好飯了我吃過了是知府大人請的客老頭張鼎一生氣又跑到外面呆著去了娘兒倆到時候休息張方把在廣東學藝的事都説了第二天早晨起來擦臉漱口已畢張方喝了點茶就説媽給我做點飯吃完了飯躺下就睡了第二天還是這樣一連在家中睡了三天大覺老太太還直説你受人之托忠人之事你也得給人家訪訪案子去三天一過張開李豹可坐不住了儘管知府大人沒給期限可時間長了也不行呀哥兒倆打衙門裏出來到張家莊師父家門口往裏走總管張宏也正好出來二位少大爺你們倆幹什麼來了看師弟來了知府是不是讓他訪案去我跟你們哥兒倆説你們別拿武大郎當神仙這可是兩碼事老哥哥你這話什麼意思他回來就睡了黑天睡白天睡除去吃喝拉撒就是睡他還防案呢訪個屁喲真的那我還説著玩嗎哥兒倆一想這可不行就往後院來了到上房一看可不是嗎張方正在那睡呢哥兒倆趕緊趴在地上給老太太磕頭老太太一瞧是徒弟起來吧你們今天怎麼這麼間在呀我聽説頭幾天你們來找你師父了娘阿可不是嗎今天是找師弟來了我聽這孩子説了説也沒往心裏去到底發生了什麼事娘阿是這麼回事現在我師父不在家我們來了就跟你提提知府李連甲把我們倆給請去當班頭這一年多了公事也還過得去沒想到咱們這兒出了十八條無頭人命案都是少婦長女大姑娘小媳婦叫賊人給殺了事主三天兩頭的到衙門哭訴要求知府給他們做主緝拿凶手給死者報仇知府當然依靠我們阿娘你是咱們緑林中的老前輩你知道這無頭案上哪兒去訪阿我們哥兒倆才找師父商量沒想到師弟倒把這事給應承下來了我們陪著師弟到衙門當堂獻藝知府大人認為他技藝高超給了他幾十兩銀子做為賞錢並寫了一紙公文讓他幫著拿賊緝盜現已分手三日我們哥兒倆不知師弟進展如何所以來看看怎麼師弟大清早的就睡覺呀這孩子打一回來就困你們哥兒倆説的這事我不知道他也沒跟我念叨這樣吧你們哥兒倆先回去回頭他醒了我讓他設法幫你們訪案去哥兒倆道謝其實張方在這兒也睡不著正躺著呢這時一擡身起來呦師哥來了瞧你這孩子沒睡也不早點起來見過你師哥怎麼啦難道鎮江府又出了十八條人命案嗎張開李豹心説你還嫌漏子小哇這十八條就夠要我們哥兒倆的命了張方穿好了鞋下地見過師哥坐下你們倆幹什麼來了幹什麼來了我們找你來了師弟你離開府衙已經三天了我們不放心師弟你訪案沒有嗨這案子還用得著我三天兩頭的去訪辦大案的人平時不訪一訪就訪著了我今天也準備動動你們倆先回去等信兒吧鬧好了我把賊人給你們扛去鬧不好再有那麼三天五天也就能辦完了張開李豹一聽喲天底下有這事嗎無頭命案就是惡賊人站在你的眼前你也本能拿呀因為你沒根據呀師弟十八條無頭人命案可不是鬧著玩的這是大事呀放心放心你們哥兒倆要是吃飯讓媽給咱做點飯咱們一塊吃你們要是不吃呢就先回去等我吃完飯就去給你們訪一訪那好吧師弟我們給你道謝告辭了來到院子裏張鼎在這等著呢瞪了這哥兒倆一眼這哥兒倆趕緊過來行禮師父你早起來了我問你你們幹什麼來了師父你要問是這麼回事真沒想到師弟睡了三天覺老人把臉一沈哼你們倆讓他去訪案問道於盲呀讓我説你們倆什麼好呢師父沒法子誰讓你不管呢我們回去了給師父行完禮哥兒倆回衙門了張方吃完了飯説媽給我點錢老太太給張方散碎銀子足有十好幾兩又拿大藍包袱把三稜凹面呂祖錐給包好了六隻棗核鏢在軟囊裏包好三支邁門弩在身上掖著收拾得全身上下緊趁利索便家裏出來了他也納悶這上哪兒訪去呀無頭案呐得了我先出去遛遛張方記得小時候跟他爹逛過金山江寧寺這裏有世界馳名的羅漢堂是個好地方阿張方來到了江邊上有很多船都沖張方招手少爺你上船嗎你到金山逛逛你這邊來這條船是新油刷的你看看裏頭座位都十分乾淨張方看了看這大江的水面上來往的船隻一隻挨著一隻采蓮畫舫什麼樣的船都有有的是善男信女坐著船去金山燒香叩頭拜佛求福也有的是紈褲子弟攜妓間遊彈唱歌舞兩個年輕人都二十多歲濃眉大眼挺精神的少爺你上山嗎嗷上山你們二位是這條船上的不錯我們是親哥兒倆這是我兄弟趙青海我名字叫趙青江好我就坐你們的船吧張方站在船頭遊覽著江景來在金山腳下纜繩系窄了跳板搭上張方上了岸説道二位過來你們兩人就指著這船吃阿不瞞你説少爺咱們就指著這船吃好張方一伸手掏出五兩銀子來給了船家哎喲少爺謝謝你嘍你幹嘛給我這麼多錢呐我們十天也掙不出來默默該著我們