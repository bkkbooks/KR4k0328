響呔大膽的洪勳你敢在你的家中招引人當場殺人你還跑得了嘛給我過去海川墊步擰腰噌就過來了這人群裏認識海川的多了看來這裏頭有事海川來到跟前子母雞爪鴛鴦鉞嚓楞一擺姓洪的撒手石金聲心裏頭説洪勳你跟我怎麼都成你拿刀宰我都成你可別跟他動手你別瞧這位是怯老趕這位是太原府年欽差公館的隨行衛員伴差官你只要跟他一動手你就算拒捕欽差到時候就得砍頭洪爺這麼一瞧怎麼還出來人了你是什麼人到我這又吃又喝你還要幫著我哥哥石金聲跟我打架老寨主你要問我姓什麼叫什麼我不告訴你我跟石老哥是朋友我是他所約他所請打架不惱助拳的你別走啦哥哥你連助拳的你都約來了好好好洪勳左手一晃面門刀走纏頭斜肩帶背就砍海川海川往下一矮身縮頸藏頭躲用右手鉞一點左手鉞麒麟吐珠就到啦金頭壽星洪勳的能耐差得遠呐俠客跟俠客裏頭尺寸也差得大極了海川好大的份阿八八六十四式八法鉞施展開了唰唰唰一加緊海川想反正方兒讓我聽他的我就聽他的那麼金頭壽星洪勳人家是好人我怎麼辦呐咱們訪的是金牌訪的是賊呀我不能贏他我贏了他豈不把他一世英名付於流水那我不贏他我跟他打到什麼時候一邊動手一邊看張方張方就明白了加緊加快把洪老頭子纍趴下洪勳心説這還有參謀官呢果然海川嚓楞楞雙鉞這麼一加緊唰啦啦變更門路不亞如雨打梨花三百八十四著盡命連環鉞招如泉湧就把這洪爺圍上了石老俠客在旁邊站著為難王環蔫不唧兒地跟張方司馬良夏九齡他們小哥兒幾個跑到一塊兒去了大家夥兒才知道這幾位呀白吃白喝白打架來了段世鈴段世賢董玉瞧事不好趕緊搭著死尸帶著家人離開彩鳳山祥雲島童海川招術一加緊洪爺一會兒就趴下果然金頭壽星洪勳有點噓噓作喘鼻凹鬢角見汗海川正在招術加緊圍住老俠洪勳的時候猛然間有人説話哥哥今天你的好日子怎麼會出現了殺人流血什麼人膽大跟你動手洪勳就勢趁這機會縱身形跳出去刀尖一拄地張著嘴呼哧呼哧直喘海川分雙鉞大鵬展翅一瞧來了倆人都三十多歲前頭這個也是個圓乎臉一臉的橫絲肉後頭這個也差不離過來行禮哥哥我們來給你拜夀來啦這兩位全姓仉是山西石嶺關的兩家寨主頭裏這位是哥哥飛天猩猩仉仁傑後頭這位是兄弟陸地猩猩仉仁義仉仁傑仉仁義過來行禮道哥哥我們來晚了賢弟談不到早晚了哥哥家裏頭被人家擾了哥哥你先沈住氣不要緊伸手把刀就亮出來飛身形來到了童林的跟前你是誰我們也知道想不到緑林道就任你腳踩任你欺辱金頭壽星洪勳也是了不起的人物威振一方的客你也不能容飛天猩猩仉仁傑我要你的命左手一晃面門刀就到了海川心説這小子説出這麼難聽的話來一看仉仁傑的刀到往下一矮身弓左步一繃右手鉞反腕子一壓左手鉞的大鉞牙子跟刀似的斜著照仉仁傑的太陽穴上嘣這大尖就剁進去了微然一擰哢叭把額節骨就給崩開了花紅腦子往外一流仉仁傑嗷地一聲咕嚕躺那就絶氣身死打仗親兄弟上陳父子兵這陸地猩猩仉仁義一瞧他哥哥大老遠的由晉北剛到太原府阿這就完啦呸好小子就看他血貫瞳仁目眥盡裂要與海川拚命
