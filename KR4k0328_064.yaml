body:
  text: 第六十四回報父仇王環施英勇劈楊山鏢打段世寶上回書正説到小白猿王環巧逢童海川來到屋中行禮提出老恩師的名姓海川一聽哎呀這位鼎鼎大名的人物我可知道我哥哥西方俠長臂昆侖飄髯叟于成早就跟我提過他們太原府有兩位朋友一位就是這位石老俠客還有一位神拳地行仙石寶奎賢侄你快起來我跟你師父是慕名已久的朋友因為我的哥哥西方俠于成上次就跟我提過于老俠那是我師大爺我知道你過來良兒你們哥兒倆見個面兒你叫王環呐對我叫王環那你給你二哥行禮這是我徒弟玉麒麟司馬良良兒以後跟你兄弟多親近又問王環王環把自己的經過全都提了我想你跟我師父一定是慕名的朋友你們都是成名的俠客我給我二叔陳龍賀虎的事兒攬到自己身上我才替他們哥兒倆訪案訪到這兒對我跟良兒我們爺兒倆也是這意思公館丟金牌也是咱爺兒們的責任這樣咱們爺兒們在一塊訪吧王環問夥計剛才院兒裏來兩人是哪的叫什麼名阿嗷這二位是師兄弟高個胖子姓孫名字叫孫亮有個外號叫海底燈那個瘦子姓何名字叫何端有個外號叫閃電光他們兩人是哪兒的呀打咱們這往東南不足四十裏有一片大山這山叫彩鳳山祥雲島對了祥雲島裏頭住著一位成名的老俠你別看占山為王落草為寇不打家不劫舍行俠仗義姓洪名字叫洪勳江湖人稱金頭壽星洪勳掌中一口虎頭墨鱗刀能為高強藝業出衆現在年到花甲明天是洪老俠客壽誕之期打發他們倆徒弟到這來打聽打聽有沒有明天去上壽的人有今天去也可以明天早晨去也可以讓他説一聲我們好不收錢完了事跟他彩鳳山祥雲島有一筆帳算嗷這麼回事阿你下去吧夥計走了爺兒仨吃著飯這麼一琢磨慶壽上西天金頭壽星洪勳外號又有個壽星看來與這金牌有關係王環在旁邊説叔父阿這金頭壽星洪勳我們沒見過我聽我師父説過他跟我師父是挺好的弟兄他們是把兄弟總是我師父上他家去也搭著這十幾年來在功房裏頭練功不讓我陪著師父一塊接待客人即便洪勳到了我家我也見不著我聽我師父説過嗷慶壽上西天是不是這賊人沒有上壽的份禮他把金牌給拿去了有沒有可能還是的咱們爺兒仨明天一清早借著上壽為名咱們也去一趟爺兒仨商定了第二天早早地起來爺兒仨可就按夥計説的道路往東南方向走下來太陽剛冒嘴就來到彩鳳山祥雲島的正山口再往南一座大山叫兩界山兩界山過去還有一片大山就是七星山狻猊寨這兩界山就是彩鳳山祥雲島跟狻猊寨交界的地方海川他們爺兒仨一到正門口一瞧這是怎麼了人喊馬嘶一陳嘈雜之聲聚集的人足有上千口子在西邊的山坡上有這麼兩間小席棚這地方有兩對兒動手打架的一個使一條鑌鐵虎尾三節棍五十上下歲跟他動手的是個大個兒晃蕩蕩身材足有一丈兩人打了個難解難分旁邊那對兒一個使一條鑌鐵虎尾三節棍粗眉大眼二十多歲另一個也使一條鑌鐵四楞子方頭沖四個人打兩對海川一看堵著山口的這些人大部分都認識兩次杭州擂九月九重陽會雙方的朋友各鏢局的鏢主完全都在內但是這些人一看童林都不敢説話了童林不跟他們説話他們不説話因為知道童林現在是官人奉聖命保欽差查辦四川的隨行衛員伴差官仿佛又聽説太原府出了事人家穿著便衣兒幹什麼來了所以都不跟海川説話與海川臨近的雙方甩眼光海川一樂點了點頭兒都不説話王環在後頭可説話了叔父咱立這邊來吧他爺兒仨在後頭跟著從人群兒後頭轉到東面擦著這山口可往裏來正是四個人動手的眼前頭這兒有一座石碑這大石碑足有半尺多厚七尺多高一尺多寬上頭六個朱紅大字彩鳳山祥雲島借著晨起的霞光往這山上一照唰啦啦金光萬道瑞彩幹條真像一條大彩鳳凰一樣金頭壽星洪勳能耐很好掌中一口虎頭墨鱗刀一生濟人之急救人之難終日裏浪迹萍蹤與人排難解憂洪爺在這兒開出不少山荒來現在六十多歲不願貪什麼外務想抱著胳膊根在家裏這麼一忍以樂晚年可惜手頭拮據跟兩個徒弟孫亮何瑞商量我想著今年我做一次封刀大會的大壽把南七北六十三省武林同道全請來我今後金盆洗手退卻緑林大傢夥兒來了積沙成塔集腋成裘能給我湊這麼三萬五萬銀子我呢到老了也就夠了沒有媳婦沒兒沒女光杆一個剩下的都是徒弟的孫亮跟何瑞一聽也不錯爺兒幾個商量好了就上中下三等朋友全請把請帖寫好了之後根據多少人定多少桌酒席除刨淨剩也能剩幾萬銀子這倒不錯結果派人分下去南七北六十三省散請帖在彩鳳山祥雲島的北面三裏地有個小村叫吳家村吳家村有位員外姓吳叫吳鈞外號賽尉遲是個大財主他跟洪爺是把兄弟吳鈞聽説這事有點不樂意可就親自來到彩鳳山順著山口往裏走過了頭道寨門奔裏寨有兵丁報告了洪爺洪爺出來了哎喲喝賢弟你接著我的請帖了嗎哥哥我接著了接著哥兒倆來到大廳分賓主落座獻上茶來喝了一碗茶洪勳道兄弟到了日子你可得捧捧哥哥替哥哥支應支應阿哥哥你這一次做壽做封刀大會你是打抽風吧是不是要撒大網你要來一筆洪老俠臉一紅哎兄弟你這叫什麼話哥哥我闖蕩江湖這麼多年我從來不吝惜錢財我到晚年了手頭緊點兒倒是真的但也不至于打抽豐我做封力大會當著群雄告訴大傢夥我封了刀離開緑林今後不再用刀我樂老林泉這裏邊也包含著我得點份禮到了晚年我不至於手頭拮據你看怎麼樣哥哥我可不是説你辦得不怎麼樣阿我聽説你這一次請的朋友高人的你也請差點徑的你也請你請的這些朋友他們要給你上壽來不遠千里能拿十兩八兩三五十兩銀子上壽嗎出手就得一百往外你是能剩下三萬兩萬可是有一樣人情大如王法你的請帖到了他手頭沒錢他要怎麼辦是不是他妻作案呢他要一作案甭説他還殺人越貨就説他偷人家的這缺德可就在哥哥你身上了我是你的兄弟我才敢説這個我跟前就一個兒你就那一個侄子我家裏頭趁不趁你説要多少你要十萬八萬兩我馬上給你送來你還不夠花的嗎兄弟我要花你的我跟你要去不就得了嗎可是有一樣我能那麼辦嗎我做個壽也應當嘛我跟你要了我能自做壽嗎那是我跟你要畦兄弟這你甭管你看你不聽我的我不能聽你的我拿大車給你拉銀子你別拉我不要哥兒倆越説越僵氣得賽尉遲吳鈞老頭子作了個半截子揖我跟你告辭吳鈞就回家了吳鈞有個兒子今年二十四歲渾身橫練骨硬如鋼一條鑌鐵虎尾三節棍父傳子授很有本領他得了個外號叫渾膽義士吳祿到家老頭兒就把洪老俠的意思都提了説孩子你瞧瞧我拿好心沒好意了我想著給你大爺個十萬八萬的在咱們家拿出去也不算什麼可是你大爺還不幹非要做這份缺德封刀大會萬一來的這些緑林道劈哧叭喳在本地一作案到那個時候招一脖子狗蠅你説怎麼辦爹呀你想的這個是挺好咱們給我大爺個十萬八萬的他也用不了可大爺不樂意他那算伸手跟咱們尋錢不管你們哥兒倆多好的交情孩子我也不在乎你願意給我大爺多少就給多少可我大爺人家心裏頭不落忍他做二次封刀大會他做壽大傢夥給攢個份子這個好説好聽可就應了你這句話了萬一人家在咱們周圍做案偷了錢到彩鳳山上壽去這將來我大爺不好辦我是這麼想的所以我才跟他提他不樂意呀他不樂意孩兒我有個辦法咱們把一切東西都準備好夠搭兩間小棚的就得不是我大爺正日子是十五嗎十四天一黑咱們帶著人咱爺兒倆拿著軍刃就去在山口裏頭在西山坡搭起兩間小棚來咱晚上就在棚裏一待如果有上壽的他晚上來了咱們就亮傢夥把他打回去你贏了我們爺兒倆你就過去贏不了我們爺兒倆你就別過去上壽直到第二天天亮這上壽的一來咱爺兒倆橫軍刃這麼一攔天氣這麼熱我大爺他們家裏預備的肉菜預備的酒席讓他預備的這些東西阿都腐爛了他想得錢讓他賠錢咱們把他這拜夀封刀給攪了完事之後咱爺兒倆拉著銀子往我大爺山裏頭一送我大爺也就説不出什麼了咱不就把這事兒過去了賽尉遲吳鈞還真聽他兒子的餿主意爺兒倆商量好了之後把搭棚的杆子席都準備齊了吃喝都準備好了到時候渴了喝茶餓了吃點心到正日子晚上天黑了搭起兩間小席棚來擱上兩張竹床爺兒倆等到天亮來了三十多個人有騎馬的有騎小驢兒的是漢口利勝鏢局兩位鏢主陸地仙狐上官倫玉面小靈狐上官瑞這哥兒倆都很年輕也很漂亮吳鈞跟吳祿這爺兒倆各自一樣鑌鐵虎尾三節棍嘎楞楞一聲響把山口堵住上官倫上官瑞哥兒倆納悶兒從打湖北來山西上壽怎麼到了山口出了劫道的了哥兒倆各自從馬上跳下來吳祿一瞪眼喂幹什麼的二位辛苦我們是漢口利勝鏢局鏢主上官倫上官瑞弟兄二人來彩鳳山祥雲島給老寨主洪勳洪老俠客上壽二位起開讓我們過去不行怎麼回事官兒還不打送禮的呢你是幹嘛的幹什麼的你別管想上壽也不難阿怎麼著你呐贏得了我掌中軍刃放你二人過去你是幹什麼的橫打鼻梁兒不讓上壽上官倫上官瑞一想好哩隨人份禮還要先玩兒命我們躲在一邊瞧著我們不敢惹你拉著馬帶著人躲到一邊去了他們這撥剛躲過去蘇州鎮海鏢局的巡海鏢主石倫常州鎮南鏢局鏢主長臂仙猿陸永傑紹興府鎮遠鏢局鏢主黃燦洲喝全都騎著馬來了剛要下馬拉著牲口帶著底下人往裏走吳鈞老頭一抖三節棍嘎楞一聲響站住你們是幹什麼的我們是給洪老英雄前來上壽不行要想上壽贏了我掌中鑌鐵虎尾三節棍好咱們跟上官弟兄那邊忍會兒吧這會兒營口水發鏢局的神槍張凱還有遼陽遠東鏢局的邊老喬金巷壽侯老佩帶著不少的鏢師夥計全來了也照樣給人攔住來一撥擋一轅來一撥擋一撥最後來了二位雲南瀾滄江幹漁洞主野人熊車立山挾山都督車立達上官倫喊車洞主車立達跟車立山哥兒倆下來哎衆位鏢主都幹什麼呢哎呀你瞧這亂我們來上壽這不讓進去我們由雲南來的怎麼著既然有請帖又不讓進去這是怎麼回事呀我們也不知道怎麼回事反正要想進去就得勝了這爺兒倆的掌中三節棍好了我們哥兒倆去走車立山車立達各自在馬上頭把四楞方頭沖拽出來來到近前吳鈞一瞧你是什麼人野人熊車立山到此何干前來上壽贏了掌中軍刃放你過去來呀你我一戰車立山蹦起來舉四楞方頭沖蓋頂就砸吳鈞閃身形擺三節棍急架相還兩個人連磕帶咂打起來了渾膽義士吳祿一亮鑌鐵三節棍過來跟車立達打上了人越聚越多海川他們爺兒幾個站在這石碑旁邊也瞧著熱鬧心説這得打到什麼時候算完呢正在這個時候有人喊師父你好海川這麼一看正是多臂童子夏九齡九齡把自己的事情一説這才給張方介紹介紹完了張方才問叔父這兒怎麼回事阿海川把太原府丟金牌的事兒説了張方一聽叔父這慶壽上西天那就跟這山裏頭的金頭壽星洪勳有關係了對爺兒們你聽我的到這山裏頭我讓你打你就打我讓你殺你就殺咱們準把金牌得到海川一聽心想我哥哥張鼎張子美這一輩子老實巴交怎麼生這麼一個比猴都靈的孩子呀便道方兒我聽你的這個時候就看這山上頭從頭道寨門一道線兒似的閃出一個大白鬍子老頭眨眼之間就